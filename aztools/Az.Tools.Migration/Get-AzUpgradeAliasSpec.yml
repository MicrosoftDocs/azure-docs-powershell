uid: Az.Tools.Migration.Get-AzUpgradeAliasSpec
name: Get-AzUpgradeAliasSpec
module: Az.Tools.Migration
isPreview: false
summary: |-
  Returns a dictionary containing cmdlet alias mappings for the specified **Az** module version.
description: |-
  Returns a dictionary containing cmdlet alias mappings for the specified **Az** module version.
parameters:
  cmdletParameters:
  - name: ModuleVersion
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specify the version of the module to import command aliases from.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
