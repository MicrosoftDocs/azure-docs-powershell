syntaxes:
- syntax: |-
    ```Syntax
    Uninstall-AzModule
        [-ExcludeModule <String[]>]
        [-PrereleaseOnly]
        [-RemoveAzureRm]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Uninstall-AzModule
        [-Name] <String[]>
        [-RemoveAzureRm]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
examples:
- title: EXAMPLE 1
  description: |-
    ```powershell
    Uninstall-AzModule storage, network
    ```
- title: EXAMPLE 2
  description: |-
    ```powershell
    Uninstall-AzModule -ExcludeModule storage, network
    ```
- title: EXAMPLE 3
  description: |-
    ```powershell
    Uninstall-AzModule -PrereleaseOnly
    ```
