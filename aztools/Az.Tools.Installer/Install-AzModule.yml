### YamlMime:PowerShellCmdlet1
uid: Az.Tools.Installer.Install-AzModule
name: Install-AzModule
module: Az.Tools.Installer
isPreview: false
summary: |-
  Install Azure PowerShell modules.
description: |-
  Install Azure PowerShell modules.
parameters:
  cmdletParameters:
  - name: AllowPrerelease
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Allow preview modules to be installed.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Installs modules and overrides the confirmation messages of each step.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Az modules to install. Can be the names without Az. prefix.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The url or local path of a nuget package to install the module from.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPath
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemoveAzureRm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Remove all Azure and AzureRm modules.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemovePrevious
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Remove the module specified installed previously.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Repository
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The Registered Repository to install module from. If only one repository is registered in
      PowerShell, `Install-AzModule` will use it. If more than one, please specify the Repository.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RequiredAzVersion
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Required Az Version.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Scope to install modules. Default value is `CurrentUser` for all the PowerShell platforms. Accepted
      values: `CurrentUser`, `AllUser`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UseExactAccountVersion
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Use the exact **Az.Accounts** version that meet the mininum requirement from the Az modules to
      install.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Install-AzModule
        [[-Name] <String[]>]
        [-RequiredAzVersion <String>]
        [-Repository <String>]
        [-AllowPrerelease]
        [-UseExactAccountVersion]
        [-Scope <String>]
        [-RemovePrevious]
        [-RemoveAzureRm]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Install-AzModule
        -Path <String>
        [-Scope <String>]
        [-RemovePrevious]
        [-RemoveAzureRm]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPath
  isDefault: false
outputs:
- name: <xref href="System.Management.Automation.PSObject" data-throw-if-not-resolved="False" />
examples:
- title: EXAMPLE 1
  description: |-
    ```powershell
    Install-AzModule -Repository PSGallery
    ```
- title: EXAMPLE 2
  description: |-
    ```powershell
    Install-AzModule Storage,Compute,Network -Repository PSGallery -AllowPrerelease
    ```
- title: EXAMPLE 3
  description: |-
    ```powershell
    Install-AzModule -Path https://my.repo.com/Az.Accounts.2.5.0.nupkg
    ```
