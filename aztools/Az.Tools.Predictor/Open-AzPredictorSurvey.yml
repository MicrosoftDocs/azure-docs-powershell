### YamlMime:PowerShellCmdlet1
uid: Az.Tools.Predictor.Open-AzPredictorSurvey
name: Open-AzPredictorSurvey
module: Az.Tools.Predictor
isPreview: false
summary: |-
  Cmdlet to open a survey link in the default browser.
description: |-
  This cmdlet opens a survey link in the default browser and writes the link to the output stream. All
  data from this survey will be anonymized. See the
  [Microsoft Privacy Policy](https://privacy.microsoft.com/) for more information
parameters:
  cmdletParameters:
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether the user would like to receive output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Open-AzPredictorSurvey
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Open-AzPredictorSurvey
    ```

    Open a survey link in the default browser.
