### YamlMime:PowerShellCmdlet1
uid: Az.Tools.Predictor.Send-AzPredictorRating
name: Send-AzPredictorRating
module: Az.Tools.Predictor
isPreview: false
summary: |-
  Cmdlet to send a rating between 1 and 5 about the suggestions provided by the **Az.Tools.Predictor**
  module.
description: |-
  This cmdlet sends the given rating about **Az.Tools.Predictor** to the server. Accepted values for
  the rating range 1 (poor) - 5 (great). All data from this survey will be anonymized. See the
  [Microsoft Privacy Policy](https://privacy.microsoft.com/) for more information.
parameters:
  cmdletParameters:
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether the user would like to receive output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Rating
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      The rating of Az Predictor: 1 (poor) - 5 (great).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Send-AzPredictorRating
        [-PassThru]
        [-Rating] <Int32>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: EXAMPLE 1
  description: |-
    ```powershell
    Send-AzPredictorRating -Rating 5
    ```

    Sends great satisfaction rate about **Az.Tools.Predictor**.
