syntaxes:
- syntax: |-
    ```Syntax
    Add-AzIotHubEventHubConsumerGroup
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-EventHubConsumerGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
