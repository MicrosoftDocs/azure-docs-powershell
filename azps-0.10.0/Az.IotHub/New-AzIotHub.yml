syntaxes:
- syntax: |-
    ```Syntax
    New-AzIotHub
        -ResourceGroupName <String>
        -Name <String>
        -SkuName <PSIotHubSku>
        -Units <Int64>
        -Location <String>
        [-Properties <PSIotHubInputProperties>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
