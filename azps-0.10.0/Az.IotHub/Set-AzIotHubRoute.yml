syntaxes:
- syntax: |-
    ```Syntax
    Set-AzIotHubRoute
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-RouteName] <String>
        [-Source <PSRoutingSource>]
        [-EndpointName <String>]
        [-Condition <String>]
        [-Enabled]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzIotHubRoute
        [-InputObject] <PSIotHub>
        [-RouteName] <String>
        [-Source <PSRoutingSource>]
        [-EndpointName <String>]
        [-Condition <String>]
        [-Enabled]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObjectSet
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzIotHubRoute
        [-ResourceId] <String>
        [-RouteName] <String>
        [-Source <PSRoutingSource>]
        [-EndpointName <String>]
        [-Condition <String>]
        [-Enabled]
