syntaxes:
- syntax: |-
    ```Syntax
    New-AzIotHubExportDevice
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-ExportBlobContainerUri] <String>
        [-ExcludeKeys]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
