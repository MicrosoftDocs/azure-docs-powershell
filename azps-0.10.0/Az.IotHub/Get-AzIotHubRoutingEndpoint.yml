examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-AzIotHubRoutingEndpoint -ResourceGroupName "myresourcegroup" -Name "myiothub"

    Name EndpointType			AzureResource
    ---- ------------			-------------
    E1   EventHub				resourcegroup1/event1
    E2   EventHub				resourcegroup1/event2
    S1   AzureStorageContainer	mystorage1/container
    ```

    Get all the endpoints from "myiothub" IoT Hub.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-AzIotHubRoutingEndpoint -ResourceGroupName "myresourcegroup" -Name "myiothub" -EndpointType EventHub

    ResourceGroupName SubscriptionId                       EndpointName
    ----------------- --------------                       ------------
    resourcegroup1    aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e E1
    resourcegroup1    aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e E2
    ```

    Get all the endpoints of type EventHub from "myiothub" IoT Hub.
- title: Example 3
  description: |-
    ```
    PS C:\> Get-AzIotHubRoutingEndpoint -ResourceGroupName "myresourcegroup" -Name "myiothub" -EndpointType EventHub

    ResourceGroupName : resourcegroup1
    SubscriptionId    : aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e
    EndpointName      : E1
    ConnectionString  : Endpoint=sb://myeventhub1.servicebus.windows.net:5671/;SharedAccessKeyName=iothubroutes_myeventhub1;SharedAccessKey=****;EntityPath=event1
    ```

    Get all the endpoints of type EventHub from "myiothub" IoT Hub.
- title: Example 4
  description: |-
    ```
    PS C:\> Get-AzIotHubRoutingEndpoint -ResourceGroupName "myresourcegroup" -Name "myiothub" -EndpointName E1

    ResourceGroupName : resourcegroup1
    SubscriptionId    : aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e
    EndpointName      : E1
    ConnectionString  : Endpoint=sb://myeventhub1.servicebus.windows.net:5671/;SharedAccessKeyName=iothubroutes_myeventhub1;SharedAccessKey=****;EntityPath=event1
    ```

    Get an endpoint information from "myiothub" IoT Hub.
