### YamlMime:PowerShellCmdlet1
uid: Az.IotHub.Get-AzIotHubCertificateVerificationCode
name: Get-AzIotHubCertificateVerificationCode
module: Az.IotHub
isPreview: false
summary: |-
  Generates a verification code for an Azure IoT Hub certificate.
description: |-
  This verification code is used to complete the proof of possession step for a certificate. Use this verification code as the CN of a new certificate signed with the root certificates private key.
  For a detailed explanation of CA certificates in Azure IoT Hub, see https://learn.microsoft.com/en-us/azure/iot-hub/iot-hub-x509ca-overview
