### YamlMime:PowerShellCmdlet1
uid: Az.IotHub.Add-AzIotHubCertificate
name: Add-AzIotHubCertificate
module: Az.IotHub
isPreview: false
summary: |-
  Create/update an Azure IoT Hub certificate.
description: |-
  Uploads a new certificate or to replace the existing certificate with the same name.
  For a detailed explanation of CA certificates in Azure IoT Hub, see https://learn.microsoft.com/en-us/azure/iot-hub/iot-hub-x509ca-overview
