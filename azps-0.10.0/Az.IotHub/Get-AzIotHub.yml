outputs:
- name: <xref href="Microsoft.Azure.Commands.Management.IotHub.Models.PSIotHub" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-AzIotHub
    ```

    Gets all the IotHubs in the subscription.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-AzIotHub -ResourceGroupName "myresourcegroup"
    ```

    Gets all the IotHubs in the subscription belonging to the resourcegroup named "myresourcegroup".
- title: Example 3
  description: |-
    ```
    PS C:\> Get-AzIotHub -ResourceGroupName "myresourcegroup" -Name "myiothub"
    ```

    Gets information about the IotHub named "myiothub".
