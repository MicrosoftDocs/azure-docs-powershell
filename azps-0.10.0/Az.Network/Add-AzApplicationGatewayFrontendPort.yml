  cmdletParameters:
  - name: ApplicationGateway
    type: <xref href="PSApplicationGateway" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the application gateway to which this cmdlet adds a front-end port.
    defaultValue: None
    dontShow: false
    isDynamic: false
