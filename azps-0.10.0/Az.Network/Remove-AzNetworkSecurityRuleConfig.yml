syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzNetworkSecurityRuleConfig
        [-Name <String>]
        -NetworkSecurityGroup <PSNetworkSecurityGroup>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
