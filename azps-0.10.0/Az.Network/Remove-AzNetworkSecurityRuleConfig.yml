inputs:
- name: <xref href="PSNetworkSecurityGroup" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'NetworkSecurityGroup' accepts value of type 'PSNetworkSecurityGroup' from the pipeline
outputs:
