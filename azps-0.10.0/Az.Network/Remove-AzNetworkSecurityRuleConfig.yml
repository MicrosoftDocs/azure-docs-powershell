uid: Az.Network.Remove-AzNetworkSecurityRuleConfig
name: Remove-AzNetworkSecurityRuleConfig
module: Az.Network
isPreview: false
summary: |-
  Removes a network security rule from a network security group.
description: |-
  The **Remove-AzNetworkSecurityRuleConfig** cmdlet removes a network security rule configuration from an Azure network security group.
parameters:
  cmdletParameters:
  - name: DefaultProfile
