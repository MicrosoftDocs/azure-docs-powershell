uid: Az.Network.Set-AzApplicationGatewaySslCertificate
name: Set-AzApplicationGatewaySslCertificate
module: Az.Network
isPreview: false
summary: |-
  Sets the goal state of an SSL certificate.
description: |-
  The **Set-AzApplicationGatewaySslCertificate** cmdlet sets the goal state of an SSL certificate.
