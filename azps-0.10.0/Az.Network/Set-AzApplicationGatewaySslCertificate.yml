syntaxes:
- syntax: |-
    ```Syntax
    Set-AzApplicationGatewaySslCertificate
        -ApplicationGateway <PSApplicationGateway>
        -Name <String>
        -CertificateFile <String>
        -Password <SecureString>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGateway" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set the goal state of an SSL certificate'
  description: |-
    ```
    PS C:\> $appGW = Get-AzApplicationGateway -Name "ApplicationGateway01" -ResourceGroupName "ResourceGroup01"
    PS C:\> $password = ConvertTo-SecureString "P@ssw0rd" -AsPlainText -Force
    PS C:\> $cert = Set-AzApplicationGatewaySslCertificate -ApplicationGateway $AppGW -Name "Cert01" -CertificateFile "D:\cert01.pfx" -Password $password
    ```

    This command sets the goal state for an SSL certificate from the application gateway named ApplicationGateway01.
