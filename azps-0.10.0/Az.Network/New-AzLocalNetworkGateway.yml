syntaxes:
- syntax: |-
    ```Syntax
    New-AzLocalNetworkGateway
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        [-GatewayIpAddress <String>]
        [-AddressPrefix <System.Collections.Generic.List`1[System.String]>]
        [-Asn <UInt32>]
        [-BgpPeeringAddress <String>]
        [-PeerWeight <Int32>]
        [-Tag <Hashtable>]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSLocalNetworkGateway" data-throw-if-not-resolved="False" />
examples:
- title: '1: Create a Local Network Gateway'
  description: |-
    ```
    New-AzLocalNetworkGateway -Name myLocalGW -ResourceGroupName myRG -Location "West US" -GatewayIpAddress 23.99.221.164 -AddressPrefix "10.5.51.0/24"
    ```

    Creates the object of the Local Network Gateway with the name "myLocalGW" within the resource group
    "myRG" in location "West US" with the IP address "23.99.221.164" and the address prefix
    "10.5.51.0/24" on-prem.
