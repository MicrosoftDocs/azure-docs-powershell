syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVirtualNetworkGatewayAdvertisedRoute
        -VirtualNetworkGatewayName <String>
        -ResourceGroupName <String>
        -Peer <String>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
