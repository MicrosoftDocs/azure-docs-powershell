### YamlMime:PowerShellCmdlet1
uid: Az.Network.Remove-AzLoadBalancerInboundNatRuleConfig
name: Remove-AzLoadBalancerInboundNatRuleConfig
module: Az.Network
isPreview: false
summary: |-
  Removes an inbound NAT rule configuration from a load balancer.
description: |-
  The **Remove-AzLoadBalancerInboundNatRuleConfig** cmdlet removes an inbound network address translation (NAT) rule configuration from an Azure load balancer.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LoadBalancer
    type: <xref href="PSLoadBalancer" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **LoadBalancer** object that contains the inbound NAT rule configuration that this cmdlet removes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the inbound NAT rule configuration that this cmdlet removes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzLoadBalancerInboundNatRuleConfig
        [-Name <String>]
        -LoadBalancer <PSLoadBalancer>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="PSLoadBalancer" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'LoadBalancer' accepts value of type 'PSLoadBalancer' from the pipeline
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSLoadBalancer" data-throw-if-not-resolved="False" />
examples:
- title: '1: Delete an inbound NAT rule from an Azure load balancer'
  description: |-
    ```
    $loadbalancer = Get-AzLoadBalancer -Name mylb -ResourceGroupName myrg

     Remove-AzLoadBalancerInboundNatRuleConfig -Name "myinboundnatrule" -LoadBalancer $loadbalancer
    ```

    The first command loads an already existing load balancer called "mylb" and stores it in the variable $load
        balancer. The second command removes the inbound NAT rule associated with this load balancer.
