syntaxes:
- syntax: |-
    ```Syntax
    Get-AzEffectiveNetworkSecurityGroup
        -NetworkInterfaceName <String>
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
