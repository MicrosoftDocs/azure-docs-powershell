### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzLoadBalancerProbeConfig
name: New-AzLoadBalancerProbeConfig
module: Az.Network
isPreview: false
summary: |-
  Creates a probe configuration for a load balancer.
description: |-
  The **New-AzLoadBalancerProbeConfig** cmdlet creates a probe configuration for an Azure load balancer.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IntervalInSeconds
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interval, in seconds, between probes to each instance of a load-balanced service.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the probe configuration to create.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Port
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the port on which the new probe should connect to a load-balanced service.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProbeCount
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of per-instance consecutive failures for an instance to be considered unhealthy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the protocol to use for the probe configuration.
      The acceptable values for this parameter are: Tcp or Http.
    acceptedValues:
    - Tcp
    - Http
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RequestPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path in a load-balanced service to probe to determine health.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzLoadBalancerProbeConfig
        -Name <String>
        [-RequestPath <String>]
        [-Protocol <String>]
        -Port <Int32>
        -IntervalInSeconds <Int32>
        -ProbeCount <Int32>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSProbe" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a probe configuration'
  description: |-
    ```
    PS C:\>New-AzLoadBalancerProbeConfig -Name "MyProbe" -Protocol "http" -Port 80 -IntervalInSeconds 15 -ProbeCount 15
    ```

    This command creates a probe configuration named MyProbe using the HTTP protocol.
    The new probe will connect to a load-balanced service on port 80.
