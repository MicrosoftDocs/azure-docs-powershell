### YamlMime:PowerShellCmdlet1
uid: Az.Network.Add-AzRouteConfig
name: Add-AzRouteConfig
module: Az.Network
isPreview: false
summary: |-
  Adds a route to a route table.
description: |-
  The **Add-AzRouteConfig** cmdlet adds a route to an Azure route table.
parameters:
  cmdletParameters:
  - name: AddressPrefix
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the destination, in Classless Interdomain Routing (CIDR) format, to which the route applies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name of the route to add to the route table.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NextHopIpAddress
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address of a virtual appliance that you add to your Azure virtual network.
      This route forwards packets to that address.
      Specify this parameter only if you specify a value of VirtualAppliance for the *NextHopType* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NextHopType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies how this route forwards packets.
      The acceptable values for this parameter are:

      - Internet.
      The default Internet gateway provided by Azure.
      - None.
      If you specify this value, the route does not forward packets.
      - VirtualAppliance.
      A virtual appliance that you add to your Azure virtual network.
      - VirtualNetworkGateway.
      An Azure server-to-server virtual private network gateway.
      - VnetLocal.
      The local virtual network.
      If you have two subnets, 10.1.0.0/16 and 10.2.0.0/16 in the same virtual network, select a value of VnetLocal for each subnet to forward to the other subnet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RouteTable
    type: <xref href="PSRouteTable" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the route table to which this cmdlet adds a route.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
