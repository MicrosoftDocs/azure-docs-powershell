### YamlMime:PowerShellCmdlet1
uid: Az.Network.Get-AzExpressRouteServiceProvider
name: Get-AzExpressRouteServiceProvider
module: Az.Network
isPreview: false
summary: |-
  Gets a list ExpressRoute service providers and their attributes.
description: |-
  The **Get-AzExpressRouteServiceProvider** cmdlet retrieves a list ExpressRoute service
  providers and their attributes. Attribute include location and bandwidth options.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzExpressRouteServiceProvider
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSExpressRouteServiceProvider" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a list of service provider with locations in "Silicon Valley"'
  description: |-
    ```
    Get-AzExpressRouteServiceProvider |
       Where-Object PeeringLocations -Contains "Silicon Valley" |
       Select-Object Name
    ```
