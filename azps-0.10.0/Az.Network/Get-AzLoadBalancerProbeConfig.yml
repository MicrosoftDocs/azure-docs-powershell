### YamlMime:PowerShellCmdlet1
uid: Az.Network.Get-AzLoadBalancerProbeConfig
name: Get-AzLoadBalancerProbeConfig
module: Az.Network
isPreview: false
summary: |-
  Gets a probe configuration for a load balancer.
description: |-
  The **Get-AzLoadBalancerProbeConfig** cmdlet gets one or more probe configurations for a load balancer.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LoadBalancer
    type: <xref href="PSLoadBalancer" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the load balancer that is associated with the probe configuration to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the probe configuration to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzLoadBalancerProbeConfig
        [-Name <String>]
        -LoadBalancer <PSLoadBalancer>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="PSLoadBalancer" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'LoadBalancer' accepts value of type 'PSLoadBalancer' from the pipeline
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSProbe" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the probe configuration of a load balancer'
  description: |-
    ```
    PS C:\>$slb = Get-AzLoadBalancer -Name "MyLoadBalancer" -ResourceGroupName "MyResourceGroup"
    PS C:\> Get-AzLoadBalancerProbeConfig -Name "MyProbe" -LoadBalancer $slb
    ```

    The first command gets the load balancer named MyLoadBalancer, and then stores it in the variable $slb.

    The second command gets the associated probe configuration named MyProbe from the load balancer in $slb.
