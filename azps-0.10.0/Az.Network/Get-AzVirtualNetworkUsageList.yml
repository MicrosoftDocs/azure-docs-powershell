syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVirtualNetworkUsageList
        -ResourceGroupName <String>
        -Name <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
