### YamlMime:PowerShellCmdlet1
uid: Az.Network.Remove-AzExpressRouteCircuitPeeringConfig
name: Remove-AzExpressRouteCircuitPeeringConfig
module: Az.Network
isPreview: false
summary: |-
  Removes an ExpressRoute circuit peering configuration.
description: |-
  The **Remove-AzExpressRouteCircuitPeeringConfig** cmdlet removes an ExpressRoute circuit
  peering configuration.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExpressRouteCircuit
    type: <xref href="PSExpressRouteCircuit" data-throw-if-not-resolved="False" />
    description: |-
      The ExpressRoute circuit containing the peering configuration to be removed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the peering configuration to be removed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PeerAddressType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The Address family of the peering
    acceptedValues:
    - IPv4
    - IPv6
    - All
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzExpressRouteCircuitPeeringConfig
        [-Name <String>]
        -ExpressRouteCircuit <PSExpressRouteCircuit>
        [-PeerAddressType <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="PSExpressRouteCircuit" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'ExpressRouteCircuit' accepts value of type 'PSExpressRouteCircuit' from the pipeline
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSExpressRouteCircuit" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove a peering configuration from an ExpressRoute circuit'
  description: |-
    ```
    $circuit = Get-AzExpressRouteCircuit -Name $CircuitName -ResourceGroupName $rg
    Remove-AzExpressRouteCircuitPeeringConfig -Name 'AzurePrivatePeering' -ExpressRouteCircuit $circuit
    Set-AzExpressRouteCircuit -ExpressRouteCircuit $circuit
    ```
