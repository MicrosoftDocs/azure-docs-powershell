uid: Az.Network.Set-AzApplicationGatewayRedirectConfiguration
name: Set-AzApplicationGatewayRedirectConfiguration
module: Az.Network
isPreview: false
summary: |-
  Sets the redirect configuration on an existing Application Gateway.
description: |-
  **The Set-AzApplicationGatewayRequestRoutingRule** cmdlet modifies a redirect configuration.
