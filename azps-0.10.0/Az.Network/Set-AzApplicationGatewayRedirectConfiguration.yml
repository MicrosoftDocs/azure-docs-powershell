syntaxes:
- syntax: |-
    ```Syntax
    Set-AzApplicationGatewayRedirectConfiguration
        -ApplicationGateway <PSApplicationGateway>
        -Name <String>
        -RedirectType <String>
        [-TargetListenerID <String>]
        [-IncludePath <Boolean>]
        [-IncludeQueryString <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SetByResourceId
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzApplicationGatewayRedirectConfiguration
        -ApplicationGateway <PSApplicationGateway>
        -Name <String>
        -RedirectType <String>
        [-TargetListener <PSApplicationGatewayHttpListener>]
        [-IncludePath <Boolean>]
        [-IncludeQueryString <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SetByResource
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzApplicationGatewayRedirectConfiguration
        -ApplicationGateway <PSApplicationGateway>
        -Name <String>
        -RedirectType <String>
        [-TargetUrl <String>]
        [-IncludePath <Boolean>]
        [-IncludeQueryString <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SetByURL
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGateway" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGateway" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\>$AppGw = Get-AzApplicationGateway -Name "ApplicationGateway01" -ResourceGroupName "ResourceGroup01"
    PS C:\> $AppGw =  Set-AzApplicationGatewayRedirectConfiguration -ApplicationGateway $appgw -Name "RedirectConfig01" -RedirectType Permanent -TargetUrl "https://www.contoso.com"
    ```

    The first command gets the application gateway named ApplicationGateway01 and stores it in the $AppGw variable.

    The second command modifies the redirect configuration for the application gateway to redirect type Permanent and use a target url.
