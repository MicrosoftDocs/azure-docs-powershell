syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzNetworkInterface
        -Name <String>
        -ResourceGroupName <String>
        [-Force]
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
