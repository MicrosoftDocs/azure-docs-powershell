uid: Az.Network.Set-AzApplicationGatewayConnectionDraining
name: Set-AzApplicationGatewayConnectionDraining
module: Az.Network
isPreview: false
summary: |-
  Modifies the connection draining configuration of a back-end HTTP settings object.
description: |-
  The **Set-AzApplicationGatewayWebApplicationFirewallConfiguration** cmdlet modifies the connection draining configuration of a back-end HTTP settings object.
parameters:
  cmdletParameters:
  - name: BackendHttpSettings
    type: <xref href="PSApplicationGatewayBackendHttpSettings" data-throw-if-not-resolved="False" />
    description: |-
      The backend http settings
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DrainTimeoutInSec
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      The number of seconds connection draining is active.
      Acceptable values are from 1 second to 3600 seconds.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Enabled
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Whether connection draining is enabled or not.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
