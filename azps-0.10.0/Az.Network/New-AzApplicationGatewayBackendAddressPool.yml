    ```Syntax
    New-AzApplicationGatewayBackendAddressPool
        -Name <String>
        [-BackendIPAddresses <System.Collections.Generic.List`1[System.String]>]
        [-BackendFqdns <System.Collections.Generic.List`1[System.String]>]
