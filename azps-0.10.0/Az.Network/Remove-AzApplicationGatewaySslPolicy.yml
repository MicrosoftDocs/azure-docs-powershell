name: Remove-AzApplicationGatewaySslPolicy
module: Az.Network
isPreview: false
summary: |-
  Removes an SSL policy from an Azure application gateway.
description: |-
  The Remove-AzApplicationGatewaySslPolicy cmdlet removes SSL policy from an Azure application gateway.
