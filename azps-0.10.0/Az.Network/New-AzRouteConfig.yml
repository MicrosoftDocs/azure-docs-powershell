### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzRouteConfig
name: New-AzRouteConfig
module: Az.Network
isPreview: false
summary: |-
  Creates a route for a route table.
description: |-
  The **New-AzRouteConfig** cmdlet creates a route for an Azure route table.
parameters:
  cmdletParameters:
  - name: AddressPrefix
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the destination, in Classless Interdomain Routing (CIDR) format, to which the route applies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name for the route.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NextHopIpAddress
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address of a virtual appliance that you add to your Azurevirtual network.
      This route forwards packets to that address.
      Specify this parameter only if you specify a value of VirtualAppliance for the *NextHopType* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NextHopType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies how this route forwards packets.
      The acceptable values for this parameter are:

      - Internet.
      The default Internet gateway provided by Azure.
      - None.
      If you specify this value, the route does not forward packets.
      - VirtualAppliance.
      A virtual appliance that you add to your Azure virtual network.
      - VirtualNetworkGateway.
      An Azure server-to-server virtual private network gateway.
      - VnetLocal.
      The local virtual network.
      If you have two subnets, 10.1.0.0/16 and 10.2.0.0/16 in the same virtual network, select a value of VnetLocal for each subnet to forward to the other subnet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzRouteConfig
        [-AddressPrefix <String>]
        [-NextHopType <String>]
        [-NextHopIpAddress <String>]
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSRoute" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a route'
  description: |-
    ```
    PS C:\>$Route = New-AzRouteConfig -Name "Route07" -AddressPrefix 10.1.0.0/16 -NextHopType "VnetLocal"
    PS C:\> $Route
    Name              : Route07
    Id                :
    Etag              :
    ProvisioningState :
    AddressPrefix     : 10.1.0.0/16
    NextHopType       : VnetLocal
    NextHopIpAddress  :
    ```

    The first command creates a route named Route07, and then stores it in the $Route variable.
    This route forwards packets to the local virtual network.

    The second command displays the properties of the route.
