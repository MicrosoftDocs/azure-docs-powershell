syntaxes:
- syntax: |-
    ```Syntax
    Get-AzExpressRouteCircuitRouteTableSummary
        -ResourceGroupName <String>
        -ExpressRouteCircuitName <String>
        [-PeeringType <String>]
        -DevicePath <DevicePathEnum>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
