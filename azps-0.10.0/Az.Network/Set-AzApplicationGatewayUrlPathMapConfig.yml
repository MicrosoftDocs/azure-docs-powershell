uid: Az.Network.Set-AzApplicationGatewayUrlPathMapConfig
name: Set-AzApplicationGatewayUrlPathMapConfig
module: Az.Network
isPreview: false
summary: |-
  Sets configuration for an array of URL path mappings to a backend server pool.
