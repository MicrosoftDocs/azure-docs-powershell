syntaxes:
- syntax: |-
    ```Syntax
    Add-AzLoadBalancerProbeConfig
        -Name <String>
        -LoadBalancer <PSLoadBalancer>
        [-RequestPath <String>]
        [-Protocol <String>]
        -Port <Int32>
        -IntervalInSeconds <Int32>
        -ProbeCount <Int32>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="PSLoadBalancer" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'LoadBalancer' accepts value of type 'PSLoadBalancer' from the pipeline
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSLoadBalancer" data-throw-if-not-resolved="False" />
examples:
- title: Example 1 Add a probe configuration to a load balancer
  description: |-
    ```
    PS C:\>Get-AzLoadBalancer -Name "myLb" -ResourceGroupName "myRg" | Add-AzLoadBalancerProbeConfig -Name "probeName" -RequestPath healthcheck2.aspx -Protocol http -Port 81 -IntervalInSeconds 16 -ProbeCount 3 | Set-AzLoadBalancer
    ```

    This command gets the load balancer named myLb, adds the specified probe configuration to it, and then uses the **Set-AzLoadBalancer** cmdlet to update the load balancer.
