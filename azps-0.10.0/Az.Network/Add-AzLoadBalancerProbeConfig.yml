### YamlMime:PowerShellCmdlet1
uid: Az.Network.Add-AzLoadBalancerProbeConfig
name: Add-AzLoadBalancerProbeConfig
module: Az.Network
isPreview: false
summary: |-
  Adds a probe configuration to a load balancer.
description: |-
  The **Add-AzLoadBalancerProbeConfig** cmdlet adds a probe configuration to an Azure load balancer.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IntervalInSeconds
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interval, in seconds, between probes to each instance of the load-balanced service.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LoadBalancer
    type: <xref href="PSLoadBalancer" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **LoadBalancer** object.
      This cmdlet adds a probe configuration to the load balancer that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the probe configuration to add.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Port
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the port on which probes should connect to a load-balanced service.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProbeCount
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of per-instance consecutive failures for an instance to be considered unhealthy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the protocol to use for the probe.
      The acceptable values for this parameter are: Tcp or Http.
    acceptedValues:
    - Tcp
    - Http
    defaultValue: None
    dontShow: false
    isDynamic: false
