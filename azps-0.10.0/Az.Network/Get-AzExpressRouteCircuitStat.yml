syntaxes:
- syntax: |-
    ```Syntax
    Get-AzExpressRouteCircuitStat
        -ResourceGroupName <String>
        -ExpressRouteCircuitName <String>
        [-PeeringType <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSExpressRouteCircuitStats" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Display the traffic statistics for an ExpressRoute peer'
  description: |-
    ```
    Get-AzExpressRouteCircuitStat -ResourceGroupName $RG -ExpressRouteCircuitName $CircuitName -PeeringType 'AzurePrivatePeering'
    ```
