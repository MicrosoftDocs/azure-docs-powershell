### YamlMime:PowerShellCmdlet1
uid: Az.Network.Get-AzExpressRouteCircuitStat
name: Get-AzExpressRouteCircuitStat
module: Az.Network
isPreview: false
summary: |-
  Gets usage statistics of an ExpressRoute circuit.
description: |-
  The **Get-AzExpressRouteCircuitStat** cmdlet retrieves traffic statistics for an ExpressRoute
  circuit. The statistics include the number of bytes sent and received over both the primary and
  secondary routes.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExpressRouteCircuitName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the ExpressRoute circuit being examined.
    aliases:
    - Name
    - ResourceName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PeeringType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The acceptable values for this parameter are: `AzurePrivatePeering`, `AzurePublicPeering`, and
      `MicrosoftPeering`
    acceptedValues:
    - AzurePrivatePeering
    - AzurePublicPeering
    - MicrosoftPeering
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the resource group containing the ExpressRoute circuit.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
