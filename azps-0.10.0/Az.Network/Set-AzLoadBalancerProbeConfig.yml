syntaxes:
- syntax: |-
    ```Syntax
    Set-AzLoadBalancerProbeConfig
        -Name <String>
        -LoadBalancer <PSLoadBalancer>
        [-RequestPath <String>]
        [-Protocol <String>]
        -Port <Int32>
        -IntervalInSeconds <Int32>
        -ProbeCount <Int32>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
