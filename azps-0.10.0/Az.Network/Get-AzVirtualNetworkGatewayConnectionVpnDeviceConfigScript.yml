syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVirtualNetworkGatewayConnectionVpnDeviceConfigScript
        -Name <String>
        -ResourceGroupName <String>
        -DeviceVendor <String>
        -DeviceFamily <String>
        -FirmwareVersion <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
