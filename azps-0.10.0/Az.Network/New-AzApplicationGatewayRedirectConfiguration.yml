### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzApplicationGatewayRedirectConfiguration
name: New-AzApplicationGatewayRedirectConfiguration
module: Az.Network
isPreview: false
summary: |-
  Creates a redirect configuration for an application gateway.
description: |-
  **The New-AzApplicationGatewayRedirectConfiguration** cmdlet creates a redirect configuration for an application gateway.
