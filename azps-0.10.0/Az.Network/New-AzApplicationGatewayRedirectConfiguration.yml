syntaxes:
- syntax: |-
    ```Syntax
    New-AzApplicationGatewayRedirectConfiguration
        -Name <String>
        -RedirectType <String>
        [-TargetListenerID <String>]
        [-IncludePath <Boolean>]
        [-IncludeQueryString <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SetByResourceId
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzApplicationGatewayRedirectConfiguration
        -Name <String>
        -RedirectType <String>
        [-TargetListener <PSApplicationGatewayHttpListener>]
        [-IncludePath <Boolean>]
        [-IncludeQueryString <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SetByResource
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzApplicationGatewayRedirectConfiguration
        -Name <String>
        -RedirectType <String>
        [-TargetUrl <String>]
        [-IncludePath <Boolean>]
        [-IncludeQueryString <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SetByURL
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGatewayRedirectConfiguration" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\>$RedirectConfig = New-AzApplicationGatewayRedirectConfiguration -Name "Redirect01" -RedirectType Permanent -TargetListener $listener01
    ```

    This command creates a redirect configuration named Redirect01 and stores the result in the variable named $RedirectConfig.
