### YamlMime:PowerShellCmdlet1
uid: Az.Network.Set-AzRouteConfig
name: Set-AzRouteConfig
module: Az.Network
isPreview: false
summary: |-
  Sets the goal state for a route.
description: |-
  The **Set-AzRouteConfig** cmdlet sets the goal state for an Azure route.
parameters:
  cmdletParameters:
  - name: AddressPrefix
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the destination, in Classless Interdomain Routing (CIDR) format, to which the route applies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the route that this cmdlet modifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NextHopIpAddress
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address of a virtual appliance that you add to your Azure virtual network.
      This route forwards packets to that address.
      Specify this parameter only if you specify a value of VirtualAppliance for the *NextHopType* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NextHopType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies how this route forwards packets.
      The acceptable values for this parameter are:

      - Internet.
      The default Internet gateway provided by Azure.
      - None.
      If you specify this value, the route does not forward packets.
      - VirtualAppliance.
      A virtual appliance that you add to your Azure virtual network.
      - VirtualNetworkGateway.
      An Azureserver-to-server virtual private network gateway.
      - VnetLocal.
      The local virtual network.
      If you have two subnets, 10.1.0.0/16 and 10.2.0.0/16 in the same virtual network, select a value of VnetLocal for each subnet to forward to the other subnet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RouteTable
    type: <xref href="PSRouteTable" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the route table with which this route is associated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzRouteConfig
        -RouteTable <PSRouteTable>
        [-AddressPrefix <String>]
        [-NextHopType <String>]
        [-NextHopIpAddress <String>]
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="PSRouteTable" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'RouteTable' accepts value of type 'PSRouteTable' from the pipeline
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSRouteTable" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Modify a route'
  description: |-
    ```
    PS C:\>Get-AzRouteTable -ResourceGroupName "ResourceGroup11" -Name "RouteTable01" | Set-AzRouteConfig -Name "Route02" -AddressPrefix 10.4.0.0/16 -NextHopType VnetLocal | Set-AzRouteTable
    Name              : Routetable01
    ResourceGroupName : ResourceGroup11
    Location          : eastus
    Id                : /subscriptions/xxxx-xxxx-xxxx-xxxx/resourceGroups/ResourceGroup11/providers/Microsoft.Networ
                        k/routeTables/RouteTable01
    Etag              : W/"58c2922e-9efe-4554-a457-956ef44bc718"
    ProvisioningState : Succeeded
    Tags              :
    Routes            : [
                          {
                            "Name": "Route07",
                            "Etag": "W/\"58c2922e-9efe-4554-a457-956ef44bc718\"",
                            "Id": "/subscriptions/xxxx-xxxx-xxxx-xxxx/resourceGroups/ResourceGroup11/providers/Micro
                        soft.Network/routeTables/Routetable01/routes/Route07",
                            "AddressPrefix": "10.1.0.0/16",
                            "NextHopType": "VnetLocal",
                            "NextHopIpAddress": null,
                            "ProvisioningState": "Succeeded"
                          },
                          {
                            "Name": "route02",
                            "Etag": "W/\"58c2922e-9efe-4554-a457-956ef44bc718\"",
                            "Id": "/subscriptions/xxxx-xxxx-xxxx-xxxx/resourceGroups/ResourceGroup11/providers/Micro
                        soft.Network/routeTables/routetable01/routes/route02",
                            "AddressPrefix": "10.4.0.0/16",
                            "NextHopType": "VnetLocal",
                            "NextHopIpAddress": null,
                            "ProvisioningState": "Succeeded"
                          }
                        ]
    Subnets           : []
    ```

    This command gets the route table named RouteTable01 by using the Get-AzRouteTable cmdlet.
    The command passes that table to the current cmdlet by using the pipeline operator.
    The current cmdlet modifies the route named Route02, and then passes the result to the **Set-AzRouteTable** cmdlet, which updates the table to reflect your changes.
