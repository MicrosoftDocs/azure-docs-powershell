syntaxes:
- syntax: |-
    ```Syntax
    Add-AzLoadBalancerBackendAddressPoolConfig
        -Name <String>
        -LoadBalancer <PSLoadBalancer>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
