uid: Az.Network.Add-AzLoadBalancerBackendAddressPoolConfig
name: Add-AzLoadBalancerBackendAddressPoolConfig
module: Az.Network
isPreview: false
summary: |-
  Adds a backend address pool configuration to a load balancer.
description: |-
  The **Add-AzLoadBalancerBackend** cmdlet adds a backend address pool to an Azure load balancer.
