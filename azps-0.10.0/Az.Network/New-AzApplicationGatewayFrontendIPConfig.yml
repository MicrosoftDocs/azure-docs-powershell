- syntax: |-
    ```Syntax
    New-AzApplicationGatewayFrontendIPConfig
        -Name <String>
        [-PrivateIPAddress <String>]
        [-SubnetId <String>]
        [-PublicIPAddressId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SetByResourceId
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzApplicationGatewayFrontendIPConfig
        -Name <String>
        [-PrivateIPAddress <String>]
        [-Subnet <PSSubnet>]
        [-PublicIPAddress <PSPublicIpAddress>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
