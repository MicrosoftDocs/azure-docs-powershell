### YamlMime:PowerShellCmdlet1
uid: Az.Network.Add-AzApplicationGatewayProbeConfig
name: Add-AzApplicationGatewayProbeConfig
module: Az.Network
isPreview: false
summary: |-
  Adds a health probe to an Application Gateway.
description: |-
  The Add-AzApplicationGatewayProbeConfig cmdlet adds a health probe to an Application Gateway.
parameters:
  cmdletParameters:
  - name: ApplicationGateway
    type: <xref href="PSApplicationGateway" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the application gateway to which this cmdlet adds a probe.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HostName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the host name that this cmdlet sends the probe to.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Interval
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the probe interval in seconds.
      This is the time interval between two consecutive probes.
      This value is between 1 second and 86400 seconds.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Match
    type: <xref href="PSApplicationGatewayProbeHealthResponseMatch" data-throw-if-not-resolved="False" />
    description: |-
      Body that must be contained in the health response.
      Default value is empty
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MinServers
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Minimum number of servers that are always marked healthy.
      Default value is 0
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the probe.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the relative path of probe.
      Valid path start with the slash character (/).
      The probe is sent to \<Protocol\>://\<host\>:\<port\>\<path\>.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PickHostNameFromBackendHttpSettings
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Whether the host header should be picked from the backend http settings.
      Default value is false
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the protocol used to send probe.
      This cmdlet supports HTTP only.
    acceptedValues:
    - Http
    - Https
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Timeout
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the probe timeout in seconds.
      This cmdlet marks the probe as failed if a valid response is not received with this timeout period.
      Valid values are between 1 second and 86400 seconds.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UnhealthyThreshold
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the probe retry count.
      The backend server is marked down after consecutive probe failure count reaches the unhealthy threshold.
      Valid values are between 1 second and 20 seconds.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-AzApplicationGatewayProbeConfig
        -ApplicationGateway <PSApplicationGateway>
        -Name <String>
        -Protocol <String>
        [-HostName <String>]
        -Path <String>
        -Interval <Int32>
        -Timeout <Int32>
        -UnhealthyThreshold <Int32>
        [-PickHostNameFromBackendHttpSettings]
        [-MinServers <Int32>]
        [-Match <PSApplicationGatewayProbeHealthResponseMatch>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="PSApplicationGateway" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'ApplicationGateway' accepts value of type 'PSApplicationGateway' from the pipeline
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGateway" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add a health probe to an application gateway'
  description: |-
    ```
    PS C:\>$Probe = Add-AzApplicationGatewayProbeConfig -ApplicationGateway Gateway -Name "Probe01" -Protocol Http -HostName "contoso.com" -Path "/path/custompath.htm" -Interval 30 -Timeout 120 -UnhealthyThreshold 8
    ```

    This command adds a health probe named Probe01 for the application gateway named Gateway.
    The command also sets the unhealthy threshold to 8 retries and times out after 120 seconds.
