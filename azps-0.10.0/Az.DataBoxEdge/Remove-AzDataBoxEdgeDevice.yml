uid: Az.DataBoxEdge.Remove-AzDataBoxEdgeDevice
name: Remove-AzDataBoxEdgeDevice
module: Az.DataBoxEdge
isPreview: false
summary: |-
  Removes a Data Box Edge device.
description: |-
  The **Remove-AzDataBoxEdgeDevice** cmdlet removes the configuration for a Data Box Edge device.
  Note that the device can only be deleted after you have placed the order and before the device is prepared by Microsoft for shipment.

  Refer the documentation on Deleting the resource before using this [cmdlet](https://learn.microsoft.com/en-us/azure/databox-online/data-box-edge-return-device#delete-the-resource)
