- syntax: |-
    ```Syntax
    Set-AzDataBoxEdgeRole
        [-ResourceGroupName] <String>
        [-DeviceName] <String>
        [-Name] <String>
        -ShareName <String[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
