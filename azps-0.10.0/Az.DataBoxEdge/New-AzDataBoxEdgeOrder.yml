        -ContactPerson <String>
        -CompanyName <String>
        -Phone <String>
        -Email <String[]>
        -AddressLine1 <String>
        -PostalCode <String>
        -City <String>
        -State <String>
        -Country <String>
        [-AddressLine2 <String>]
        [-AddressLine3 <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
