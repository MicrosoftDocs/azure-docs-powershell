syntaxes:
- syntax: |-
    ```Syntax
    Get-AzEventHubConsumerGroup
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [-EventHub] <String>
        [[-Name] <String>]
        [-MaxCount <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
