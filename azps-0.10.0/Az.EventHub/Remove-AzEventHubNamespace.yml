examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Remove-AzEventHubNamespace -ResourceGroupName MyResourceGroupName -Name MyNamespaceName
    ```

    Removes the Event Hubs namespace \`MyNamespaceName\` in resource group \`MyResourceGroupName\`.
- title: 'Example 2.1 - InputObject - Using Variable:'
  description: |-
    ```
    PS C:\> $inputObject = Get-AzEventHubNamespace <params>
    PS C:\> Remove-AzEventHubNamespace -InputObject $inputObject
    ```
- title: 'Example 2.1 - InputObject - Using Piping:'
  description: |-
    ```
    PS C:\> Get-AzEventHubNamespace <params> | Remove-AzEventHubNamespace
    ```
- title: Example 3.1 - ResourceId - Using Variable
  description: |-
    ```
    PS C:\> $resourceid = Get-AzEventHubNamespace <params>
    PS C:\> Remove-AzEventHubNamespace -ResourceId $resourceid.Id
    ```
- title: 'Example 3.2 - ResourceId - Using Piping:'
  description: |-
    ```
    PS C:\> Get-AzResource -ResourceType Microsoft.EventHub/Namespaces | Remove-AzEventHubNamespace
    ```
- title: 'Example 3.3 - ResourceId - Using String:'
  description: |-
    ```
    PS C:\> Remove-AzEventHubNamespace -ResourceId "/subscriptions/xxx-xxxxx-xxxxxx-xxxxxx/resourceGroups/ResourceGroupName/providers/Microsoft.EventHub/namespaces/NamespaceName"
    ```
