syntaxes:
- syntax: |-
    ```Syntax
    Set-AzEventHubConsumerGroup
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [-EventHub] <String>
        [-Name] <String>
        [[-UserMetadata] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
