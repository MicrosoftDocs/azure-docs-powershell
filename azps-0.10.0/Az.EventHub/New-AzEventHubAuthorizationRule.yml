syntaxes:
- syntax: |-
    ```Syntax
    New-AzEventHubAuthorizationRule
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [-Name] <String>
        -Rights <String[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NamespaceAuthorizationRuleSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzEventHubAuthorizationRule
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [-EventHub] <String>
        [-Name] <String>
        -Rights <String[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EventhubAuthorizationRuleSet
  isDefault: false
