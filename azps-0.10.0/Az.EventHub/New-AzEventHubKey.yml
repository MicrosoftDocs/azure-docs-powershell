syntaxes:
- syntax: |-
    ```Syntax
    New-AzEventHubKey
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [-Name] <String>
        [-RegenerateKey] <String>
        [[-KeyValue] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NamespaceAuthorizationRuleSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzEventHubKey
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [-EventHub] <String>
        [-Name] <String>
        [-RegenerateKey] <String>
        [[-KeyValue] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EventhubAuthorizationRuleSet
  isDefault: false
