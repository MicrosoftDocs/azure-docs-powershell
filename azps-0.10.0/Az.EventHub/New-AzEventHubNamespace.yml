syntaxes:
- syntax: |-
    ```Syntax
    New-AzEventHubNamespace
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        [[-SkuName] <String>]
        [[-SkuCapacity] <Int32>]
        [[-Tag] <Hashtable>]
        [-EnableKafka]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NamespaceParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzEventHubNamespace
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        [[-SkuName] <String>]
        [[-SkuCapacity] <Int32>]
        [[-Tag] <Hashtable>]
        [[-MaximumThroughputUnits] <Int32>]
        [-EnableAutoInflate]
        [-EnableKafka]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AutoInflateParameterSet
  isDefault: false
