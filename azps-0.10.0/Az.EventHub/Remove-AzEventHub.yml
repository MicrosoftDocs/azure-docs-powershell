uid: Az.EventHub.Remove-AzEventHub
name: Remove-AzEventHub
module: Az.EventHub
isPreview: false
summary: |-
  Removes the specified Event Hub.
description: |-
  The Remove-AzEventHub cmdlet removes and deletes the specified Event Hub from the given namespace.
