syntaxes:
- syntax: |-
    ```Syntax
    Get-AzEventHub
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [[-Name] <String>]
        [-MaxCount <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
