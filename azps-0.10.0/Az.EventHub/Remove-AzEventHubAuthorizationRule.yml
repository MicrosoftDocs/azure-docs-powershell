syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzEventHubAuthorizationRule
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [-Name] <String>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NamespaceAuthorizationRuleSet
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzEventHubAuthorizationRule
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [-EventHub] <String>
        [-Name] <String>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EventhubAuthorizationRuleSet
  isDefault: false
