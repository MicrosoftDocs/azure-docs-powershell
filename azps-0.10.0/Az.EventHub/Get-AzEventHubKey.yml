syntaxes:
- syntax: |-
    ```Syntax
    Get-AzEventHubKey
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: NamespaceAuthorizationRuleSet
