examples:
- title: 'Example 1: Remove a certificate contact'
  description: |-
    ```
    PS C:\>Remove-AzKeyVaultCertificateContact -VaultName "Contoso01" -EmailAddress "patti.fuller@contoso.com"
    ```

    This command removes Patti Fuller as a certificate contact for the Contoso01 key vault.
