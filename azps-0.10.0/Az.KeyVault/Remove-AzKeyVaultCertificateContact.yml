syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzKeyVaultCertificateContact
        [-VaultName] <String>
        [-EmailAddress] <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
