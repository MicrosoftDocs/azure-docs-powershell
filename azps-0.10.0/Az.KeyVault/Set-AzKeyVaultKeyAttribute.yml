syntaxes:
- syntax: |-
    ```Syntax
    Set-AzKeyVaultKeyAttribute
        [-VaultName] <String>
        [-Name] <String>
        [[-Version] <String>]
        [-Enable <Boolean>]
        [-Expires <DateTime>]
        [-NotBefore <DateTime>]
        [-KeyOps <String[]>]
        [-Tag <Hashtable>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
