### YamlMime:PowerShellCmdlet1
uid: Az.KeyVault.Set-AzKeyVaultKeyAttribute
name: Set-AzKeyVaultKeyAttribute
module: Az.KeyVault
isPreview: false
summary: |-
  Updates the attributes of a key in a key vault.
description: |-
  The **Set-AzKeyVaultKeyAttribute** cmdlet updates the editable attributes of a key in a key vault.
