examples:
- title: Example 1
  description: |-
    ```
    PS C:\>Undo-AzKeyVaultKeyRemoval -VaultName 'MyKeyVault' -Name 'MyKey'
    ```

    This command will recover the key 'MyKey' that was previously deleted, into an active and usable state.
