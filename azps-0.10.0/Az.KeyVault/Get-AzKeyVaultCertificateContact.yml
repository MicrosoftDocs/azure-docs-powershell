uid: Az.KeyVault.Get-AzKeyVaultCertificateContact
name: Get-AzKeyVaultCertificateContact
module: Az.KeyVault
isPreview: false
summary: |-
  Gets contacts that are registered for certificate notifications for a key vault.
description: |-
  The **Get-AzKeyVaultCertificateContact** cmdlet gets contacts that are registered for certificate notifications for a key vault in Azure Key Vault.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VaultName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the key vault.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKeyVaultCertificateContact
        [-VaultName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not accept any input.
outputs:
- name: <xref href="List<Microsoft.Azure.Commands.KeyVault.Models.KeyVaultCertificateContact>" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all certificate contacts'
  description: |-
    ```
    PS C:\>$Contacts = Get-AzKeyVaultCertificateContact -VaultName "Contoso"
    ```

    This command gets all of the contacts for the certificate objects in the Contoso key vault, and then stores them in the $Contacts variable.
