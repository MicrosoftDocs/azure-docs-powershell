uid: Az.KeyVault.Set-AzKeyVaultSecretAttribute
name: Set-AzKeyVaultSecretAttribute
module: Az.KeyVault
isPreview: false
summary: |-
  Updates attributes of a secret in a key vault.
description: |-
  The **Set-AzKeyVaultSecretAttribute** cmdlet updates editable attributes of a secret in a key vault.
