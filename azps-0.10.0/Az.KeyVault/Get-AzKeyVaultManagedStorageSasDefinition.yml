### YamlMime:PowerShellCmdlet1
uid: Az.KeyVault.Get-AzKeyVaultManagedStorageSasDefinition
name: Get-AzKeyVaultManagedStorageSasDefinition
module: Az.KeyVault
isPreview: false
summary: |-
  Gets Key Vault managed Storage SAS Definitions.
description: |-
  Gets a Key Vault managed Storage SAS Definition if the name of the definition is specified. If the definition name is not specified, then all the SAS definitions associated with the specified Key Vault managed Storage Account in the vault are listed.
parameters:
  cmdletParameters:
  - name: AccountName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Vault name.
      Cmdlet constructs the FQDN of a vault based on the name and currently selected environment.
    aliases:
    - StorageAccountName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Storage sas definition name.
      Cmdlet constructs the FQDN of a storage sas definition from vault name, currently selected environment, storage account name and sas definition name.
    aliases:
    - SasDefinitionName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByDefinitionName
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VaultName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Vault name.
      Cmdlet constructs the FQDN of a vault based on the name and currently selected environment.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKeyVaultManagedStorageSasDefinition
        [-VaultName] <String>
        [-AccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByAccountName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzKeyVaultManagedStorageSasDefinition
        [-VaultName] <String>
        [-AccountName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByDefinitionName
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Collections.Generic.List`1" data-throw-if-not-resolved="False" />
  description: |-
    Microsoft.Azure.Commands.KeyVault.Models.ManagedStorageSasDefinition
examples:
- title: 'Example 1: List all Key Vault managed Storage SAS Definitions'
  description: |-
    ```
    PS C:\> Get-AzKeyVaultManagedStorageSasDefinition -VaultName 'myvault' -AccountName 'mystorageaccount'
    ```

    Lists all the SAS definitions associated with Key Vault managed Storage Account 'mystorageaccount' managed by vault 'myvault'
- title: 'Example 2: Get a Key Vault managed Storage Account'
  description: |-
    ```
    PS C:\> Get-AzKeyVaultManagedStorageSasDefinition -VaultName 'myvault' -AccountName 'mystorageaccount' -Name 'mysasDef'
    ```

    Gets the details of SAS Definition 'mysasDef' associated with Key Vault managed Storage Account 'mystorageaccount' managed by vault 'myvault'.
