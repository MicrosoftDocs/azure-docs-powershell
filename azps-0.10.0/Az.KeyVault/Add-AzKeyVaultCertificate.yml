syntaxes:
- syntax: |-
    ```Syntax
    Add-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        [[-CertificatePolicy] <KeyVaultCertificatePolicy>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
