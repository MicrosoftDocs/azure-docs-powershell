syntaxes:
- syntax: |-
    ```Syntax
    Backup-AzKeyVaultSecret
        [-VaultName] <String>
        [-Name] <String>
        [[-OutputFile] <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
