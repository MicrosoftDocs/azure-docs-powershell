syntaxes:
- syntax: |-
    ```Syntax
    Add-AzKeyVaultCertificateContact
        [-VaultName] <String>
        [-EmailAddress] <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
