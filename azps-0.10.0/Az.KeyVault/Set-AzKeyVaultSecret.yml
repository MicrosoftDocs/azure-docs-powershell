syntaxes:
- syntax: |-
    ```Syntax
    Set-AzKeyVaultSecret
        [-VaultName] <String>
        [-Name] <String>
        [-SecretValue] <SecureString>
        [-Disable]
        [-Expires <DateTime>]
        [-NotBefore <DateTime>]
        [-ContentType <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
