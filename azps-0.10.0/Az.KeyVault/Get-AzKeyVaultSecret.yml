### YamlMime:PowerShellCmdlet1
uid: Az.KeyVault.Get-AzKeyVaultSecret
name: Get-AzKeyVaultSecret
module: Az.KeyVault
isPreview: false
summary: |-
  Gets the secrets in a key vault.
description: |-
  The **Get-AzKeyVaultSecret** cmdlet gets secrets in a key vault.
  This cmdlet gets a specific secret or all the secrets in a key vault.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeVersions
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet gets all versions of a secret.
      The current version of a secret is the first one on the list.
      If you specify this parameter you must also specify the *Name* and *VaultName* parameters.

      If you do not specify the *IncludeVersions* parameter, this cmdlet gets the current version of the secret with the specified *Name*.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BySecretVersions
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InRemovedState
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to show the previously deleted secrets in the output
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByDeletedSecrets
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the secret to get.
    aliases:
    - SecretName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BySecretName
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: BySecretVersions
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VaultName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the key vault to which the secret belongs.
      This cmdlet constructs the fully qualified domain name (FQDN) of a key vault based on the name that this parameter specifies and your current environment.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Version
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the secret version.
      This cmdlet constructs the FQDN of a secret based on the key vault name, your currently selected environment, the secret name, and the secret version.
    aliases:
    - SecretVersion
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BySecretName
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKeyVaultSecret
        [-VaultName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByVaultName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzKeyVaultSecret
        [-VaultName] <String>
        [-Name] <String>
        [[-Version] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: BySecretName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzKeyVaultSecret
        [-VaultName] <String>
        [-Name] <String>
        [-IncludeVersions]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: BySecretVersions
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzKeyVaultSecret
        [-VaultName] <String>
        [[-Name] <String>]
        [-InRemovedState]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByDeletedSecrets
  isDefault: false
inputs:
- name: <xref href="String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="List<Microsoft.Azure.Commands.KeyVault.Models.SecretIdentityItem>, Microsoft.Azure.Commands.KeyVault.Models.Secret, List<Microsoft.Azure.Commands.KeyVault.Models.DeletedSecretIdentityItem>, Microsoft.Azure.Commands.KeyVault.Models.DeletedSecret" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all current versions of all secrets in a key vault'
  description: |-
    ```
    PS C:\>Get-AzKeyVaultSecret -VaultName 'Contoso'
    ```

    This command gets the current versions of all secrets in the key vault named Contoso.
- title: 'Example 2: Get all versions of a specific secret'
  description: |-
    ```
    PS C:\>Get-AzKeyVaultSecret -VaultName 'Contoso' -Name 'ITSecret' -IncludeVersions
    ```

    This command gets all versions of the secret named ITSecret in the key vault named Contoso.
- title: 'Example 3: Get the current version of a specific secret'
  description: |-
    ```
    PS C:\>Get-AzKeyVaultSecret -VaultName 'Contoso' -Name 'ITSecret'
    ```

    This command gets the current version of the secret named ITSecret in the key vault named Contoso.
- title: 'Example 4: Get a specific version of a specific secret'
  description: |-
    ```
    PS C:\>Get-AzKeyVaultSecret -VaultName 'Contoso' -Name 'ITSecret' -Version '6A12A286385949DB8B5F82AFEF85CAE9'
    ```

    This command gets a specific version of the secret named ITSecret in the key vault named Contoso.
- title: 'Example 5: Get the plain text value of the current version of a specific secret'
  description: |-
    ```
    PS C:\>$secret = Get-AzKeyVaultSecret -VaultName 'Contoso' -Name 'ITSecret'
    PS C:\> Write-Host "Secret Value is: " $secret.SecretValueText
    ```

    These commands get the current version of a secret named ITSecret, and then displays the plain text value of that secret.
- title: 'Example 6: Get all the secrets that have been deleted but not purged for this key vault.'
  description: |-
    ```
    PS C:\>Get-AzKeyVaultSecret -VaultName 'Contoso' -InRemovedState
    ```

    This command gets all the secrets that have been previously deleted, but not purged, in the key vault named Contoso.
- title: 'Example 7: Gets the secret ITSecret that has been deleted but not purged for this key vault.'
  description: |-
    ```
    PS C:\>Get-AzKeyVaultSecret -VaultName 'Contoso' -KeyName 'ITSecret' -InRemovedState
    ```

    This command gets the secret ITSecret that has been previously deleted, but not purged, in the key vault named Contoso.
    This command will return metadata such as the deletion date, and the scheduled purging date of this deleted secret.
