syntaxes:
- syntax: |-
    ```Syntax
    Set-AzKeyVaultCertificatePolicy
        [-VaultName] <String>
        [-Name] <String>
        [-SecretContentType <String>]
        [-ReuseKeyOnRenewal <Boolean>]
        [-Disabled]
        [-SubjectName <String>]
        [-DnsNames <System.Collections.Generic.List`1[System.String]>]
        [-KeyUsage <System.Collections.Generic.List`1[System.String]>]
        [-Ekus <System.Collections.Generic.List`1[System.String]>]
        [-ValidityInMonths <Int32>]
        [-IssuerName <String>]
        [-CertificateType <String>]
        [-RenewAtNumberOfDaysBeforeExpiry <Int32>]
        [-RenewAtPercentageLifetime <Int32>]
        [-EmailAtNumberOfDaysBeforeExpiry <Int32>]
        [-EmailAtPercentageLifetime <Int32>]
        [-KeyType <String>]
        [-KeyNotExportable]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Expanded
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzKeyVaultCertificatePolicy
        [-VaultName] <String>
        [-Name] <String>
        [[-CertificatePolicy] <KeyVaultCertificatePolicy>]
        [-EmailAtNumberOfDaysBeforeExpiry <Int32>]
        [-EmailAtPercentageLifetime <Int32>]
        [-KeyType <String>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByValue
  isDefault: false
