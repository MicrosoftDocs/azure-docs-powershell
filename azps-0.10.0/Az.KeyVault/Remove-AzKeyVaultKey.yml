syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzKeyVaultKey
        [-VaultName] <String>
        [-Name] <String>
        [-Force]
        [-PassThru]
        [-InRemovedState]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
