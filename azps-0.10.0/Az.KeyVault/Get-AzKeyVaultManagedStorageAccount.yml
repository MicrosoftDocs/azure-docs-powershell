### YamlMime:PowerShellCmdlet1
uid: Az.KeyVault.Get-AzKeyVaultManagedStorageAccount
name: Get-AzKeyVaultManagedStorageAccount
module: Az.KeyVault
isPreview: false
summary: |-
  Gets Key Vault managed Azure Storage Accounts.
description: |-
  Gets a Key Vault managed Azure Storage Account if the name of the account is specified and the account keys are managed by the specified vault. If the account name is not specified, then all the accounts whose keys are managed by specified vault are listed.
parameters:
  cmdletParameters:
  - name: AccountName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Key Vault managed storage account name. Cmdlet constructs the FQDN of a managed storage account name from vault name, currently selected environment and manged storage account name.
    aliases:
    - StorageAccountName
    - Name
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAccountName
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VaultName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Vault name.
      Cmdlet constructs the FQDN of a vault based on the name and currently selected environment.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKeyVaultManagedStorageAccount
        [-VaultName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByVaultName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzKeyVaultManagedStorageAccount
        [-VaultName] <String>
        [-AccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByAccountName
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Collections.Generic.List`1" data-throw-if-not-resolved="False" />
  description: |-
    Microsoft.Azure.Commands.KeyVault.Models.ManagedStorageAccount
examples:
- title: 'Example 1: List all Key Vault managed Storage Accounts'
  description: |-
    ```
    PS C:\> Get-AzKeyVaultManagedStorageAccount -VaultName 'myvault'
    ```

    Lists all the accounts whose keys are managed by vault 'myvault'
- title: 'Example 2: Get a Key Vault managed Storage Account'
  description: |-
    ```
    PS C:\> Get-AzKeyVaultManagedStorageAccount -VaultName 'myvault' -Name 'mystorageaccount'
    ```

    Gets the details of Key Vault managed Storage Account of 'mystorageaccount' if its keys are managed by vault 'myvault'
