syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        [-Force]
        [-InRemovedState]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
