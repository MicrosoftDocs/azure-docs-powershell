uid: Az.KeyVault.Remove-AzKeyVaultCertificate
name: Remove-AzKeyVaultCertificate
module: Az.KeyVault
isPreview: false
summary: |-
  Removes a certificate from a key vault.
description: |-
  The **Remove-AzKeyVaultCertificate** cmdlet removes a certificate from a key vault.
