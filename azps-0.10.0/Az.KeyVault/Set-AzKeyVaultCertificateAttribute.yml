syntaxes:
- syntax: |-
    ```Syntax
    Set-AzKeyVaultCertificateAttribute
        [-VaultName] <String>
        [-Name] <String>
        [[-Version] <String>]
        [-Enable <Boolean>]
        [-Tag <Hashtable>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not accept any input.
outputs:
- name: <xref href="Microsoft.Azure.Commands.KeyVault.Models.KeyVaultCertificate" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Modify the tags associated with a certificate'
  description: |-
    ```
    PS C:\>$Tags = @{ "Team" = "Azure" ; "Role" = "Engg" }
    PS C:\> Set-AzKeyVaultCertificateAttribute -VaultName "ContosoKV01" -Name "TestCert01" -Tag $Tags
    PS C:\> Get-AzKeyVaultCertificate -VaultName "ContosoKV01" -Name "TestCert01"
    Name        : "TestCert01"
    Certificate : [Subject]
                    CN=AZURE

                  [Issuer]
                    CN=AZURE

                  [Serial Number]
                    5A2EF60501F241D6A4336841B36FEA41

                  [Not Before]
                    7/27/2016 6:50:01 PM

                  [Not After]
                    7/27/2018 7:00:01 PM

                  [Thumbprint]
                    A565D568082FEE2BE33B356ECC3703C2E9886555

    Id          : https://ContosoKV01.vault.azure.net:443/certificates/tt02
    KeyId       : https://ContosoKV01.vault.azure.net:443/keys/tt02
    SecretId    : https://ContosoKV01.vault.azure.net:443/secrets/tt02
    Thumbprint  : A565D568082FEE2BE33B356ECC3703C2E9886555
    Tags        : {[Role, Engg], [Team, Azure]}
    Enabled     : True
    Created     : 7/28/2016 2:00:01 AM
    Updated     : 8/1/2016 5:37:48 PM
    ```

    The first command assigns an array of key/value pairs to the $Tags variable.

    The second command sets the tags value of the certificate named TestCert01 to be $Tags.

    The final command displays the TestCert01 certificate by using the Get-AzKeyVaultCertificate cmdlet to verify the operation.
