syntaxes:
- syntax: |-
    ```Syntax
    New-AzKeyVaultCertificatePolicy
        [-SecretContentType <String>]
        [-ReuseKeyOnRenewal]
        [-Disabled]
        [-SubjectName <String>]
        [-DnsNames <System.Collections.Generic.List`1[System.String]>]
        [-KeyUsage <System.Collections.Generic.List`1[System.String]>]
        [-Ekus <System.Collections.Generic.List`1[System.String]>]
        [-ValidityInMonths <Int32>]
        -IssuerName <String>
        [-CertificateType <String>]
        [-RenewAtNumberOfDaysBeforeExpiry <Int32>]
        [-RenewAtPercentageLifetime <Int32>]
        [-EmailAtNumberOfDaysBeforeExpiry <Int32>]
        [-EmailAtPercentageLifetime <Int32>]
        [-KeyType <String>]
        [-KeyNotExportable]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not accept any input.
outputs:
- name: <xref href="Microsoft.Azure.Commands.KeyVault.Models.KeyVaultCertificatePolicy" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a certificate policy'
  description: |-
    ```
    PS C:\>New-AzKeyVaultCertificatePolicy -SecretContentType "application/x-pkcs12" -SubjectName "CN=contoso.com" -IssuerName "Self" -ValidityInMonths 6 -ReuseKeyOnRenewal
    ```

    This command creates a certificate policy that is valid for six months and reuses the key to renew the certificate.
