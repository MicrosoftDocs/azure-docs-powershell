### YamlMime:PowerShellCmdlet1
uid: Az.KeyVault.Get-AzKeyVaultCertificateIssuer
name: Get-AzKeyVaultCertificateIssuer
module: Az.KeyVault
isPreview: false
summary: |-
  Gets a certificate issuer for a key vault.
description: |-
  The **Get-AzKeyVaultCertificateIssuer** cmdlet gets a specified certificate issuer or all certificate issuers for a key vault in Azure Key Vault.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the certificate issuer to get.
    aliases:
    - IssuerName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VaultName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a key vault.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKeyVaultCertificateIssuer
        [-VaultName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByVaultName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzKeyVaultCertificateIssuer
        [-VaultName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not accept any input.
outputs:
- name: <xref href="List<Microsoft.Azure.Commands.KeyVault.Models.CertificateIssuerIdentityItem>, Microsoft.Azure.Commands.KeyVault.Models.KeyVaultCertificateIssuer" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a certificate issuer'
  description: |-
    ```
    PS C:\>Get-AzKeyVaultCertificateIssuer -VaultName "Contosokv01" -Name "TestIssuer01"
    Name                : TestIssuer01
    IssuerProvider      : Test
    AccountId           : 555
    ApiKey              :
    OrganizationDetails : Microsoft.Azure.Commands.KeyVault.Models.KeyVaultCertificateOrganizationDetails
    ```

    This command gets the certificate issuer named TestIssuer01.
