    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Undo-AzKeyVaultRemoval
        [-VaultName] <String>
        [-ResourceGroupName] <String>
        [-Location] <String>
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    System.Collections.Hashtable
outputs:
- name: <xref href="Microsoft.Azure.Commands.KeyVault.Models.PSVault" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Undo-AzKeyVaultRemoval -VaultName 'MyKeyVault' -ResourceGroupName 'MyResourceGroup' -Location 'eastus2' -Tag @{"x"= "y"}
    ```

    This command will recover the key vault 'MyKeyVault' that was previously deleted from eastus2
    region and 'MyResourceGroup' resource group, into an active and usable state. It also replaces the
    tags with new tag.
