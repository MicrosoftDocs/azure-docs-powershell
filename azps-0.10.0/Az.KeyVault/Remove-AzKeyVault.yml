syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzKeyVault
        [-VaultName] <String>
        [[-ResourceGroupName] <String>]
        [[-Location] <String>]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByAvailableVault
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzKeyVault
        [-VaultName] <String>
        [-Location] <String>
        [-Force]
        [-InRemovedState]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByDeletedVault
  isDefault: false
