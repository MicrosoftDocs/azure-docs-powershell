### YamlMime:PowerShellCmdlet1
uid: Az.KeyVault.Update-AzKeyVaultManagedStorageAccount
name: Update-AzKeyVaultManagedStorageAccount
module: Az.KeyVault
isPreview: false
summary: |-
  Update editable attributes of a Key Vault managed Azure Storage Account.
description: |-
  Update the editable attributes of a Key Vault managed Azure Storage Account.
parameters:
