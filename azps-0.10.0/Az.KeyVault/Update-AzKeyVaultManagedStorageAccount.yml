syntaxes:
- syntax: |-
    ```Syntax
    Update-AzKeyVaultManagedStorageAccount
        [-VaultName] <String>
        [-AccountName] <String>
        [-ActiveKeyName <String>]
        [-AutoRegenerateKey <Boolean>]
        [-RegenerationPeriod <TimeSpan>]
        [-Enable <Boolean>]
        [-Tag <Hashtable>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not accept any input.
outputs:
- name: <xref href="Microsoft.Azure.Commands.KeyVault.Models.ManagedStorageAccount" data-throw-if-not-resolved="False" />
examples:
- title: Example 1:Update the active key to 'key2' on a Key Vault managed Azure Storage Account.
  description: |-
    ```
    PS C:\> Update-AzKeyVaultManagedStorageAccount -VaultName 'myvault' -AccountName 'mystorageaccount' -ActiveKeyName 'key2'
    ```

    Updates the Key Vault managed Azure Storage Account active key to 'key2'. 'key2' will be used to
    generate SAS tokens after this update.
