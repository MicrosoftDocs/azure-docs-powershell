syntaxes:
- syntax: |-
    ```Syntax
    Backup-AzKeyVaultKey
        [-VaultName] <String>
        [-Name] <String>
        [[-OutputFile] <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByKeyName
  isDefault: true
