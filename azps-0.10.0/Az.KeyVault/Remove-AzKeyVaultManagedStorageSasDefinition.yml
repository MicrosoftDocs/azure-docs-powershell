syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzKeyVaultManagedStorageSasDefinition
        [-VaultName] <String>
        [-AccountName] <String>
        [-Name] <String>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
