syntaxes:
- syntax: |-
    ```Syntax
    Add-AzKeyVaultKey
        [-VaultName] <String>
        [-Name] <String>
        -Destination <String>
        [-Disable]
        [-KeyOps <String[]>]
        [-Expires <DateTime>]
        [-NotBefore <DateTime>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Create
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzKeyVaultKey
        [-VaultName] <String>
        [-Name] <String>
        -KeyFilePath <String>
        [-KeyFilePassword <SecureString>]
        [-Destination <String>]
        [-Disable]
        [-KeyOps <String[]>]
        [-Expires <DateTime>]
        [-NotBefore <DateTime>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Import
  isDefault: false
