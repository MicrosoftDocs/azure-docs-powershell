### YamlMime:PowerShellCmdlet1
uid: Az.KeyVault.Get-AzKeyVaultCertificate
name: Get-AzKeyVaultCertificate
module: Az.KeyVault
isPreview: false
summary: |-
  Gets a certificate from a key vault.
description: |-
  The **Get-AzKeyVaultCertificate** cmdlet gets the specified certificate or the versions of a certificate from a key vault in Azure Key Vault.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeVersions
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation gets all versions of the certificate.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByCertificateVersions
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InRemovedState
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to include previously deleted certificates in the output
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByDeletedCertificates
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the certificate to get.
    aliases:
    - CertificateName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByCertificateName
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: ByCertificateVersions
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VaultName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a key vault.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Version
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the version of a certificate.
    aliases:
    - CertificateVersion
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByCertificateName
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKeyVaultCertificate
        [-VaultName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByVaultName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        [[-Version] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByCertificateName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        [-IncludeVersions]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByCertificateVersions
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzKeyVaultCertificate
        [-VaultName] <String>
        [[-Name] <String>]
        [-InRemovedState]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByDeletedCertificates
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not accept any input.
outputs:
- name: <xref href="System.Collections.Generic.List`1" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.KeyVault.Models.KeyVaultCertificate" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a certificate'
  description: |-
    ```
    PS C:\>Get-AzKeyVaultCertificate -VaultName "ContosoKV01" -Name "TestCert01"
    Name        : testCert01
    Certificate : [Subject]
                    CN=contoso.com

                  [Issuer]
                    CN=contoso.com

                  [Serial Number]
                    05979C5A2F0741D5A3B6F97673E8A118

                  [Not Before]
                    2/8/2016 3:11:45 PM

                  [Not After]
                    8/8/2016 4:21:45 PM

                  [Thumbprint]
                    3E9B6848AD1834284157D68B060F748037F663C8

    Thumbprint  : 3E9B6848AD1834284157D68B060F748037F663C8
    Tags        :
    Enabled     : True
    Created     : 2/8/2016 11:21:45 PM
    Updated     : 2/8/2016 11:21:45 PM
    ```

    This command gets the certificate named TestCert01 from the key vault named ContosoKV01.
- title: 'Example 2: Get all the certificates that have been deleted but not purged for this key vault.'
  description: |-
    ```
    PS C:\>Get-AzKeyVaultCertificate -VaultName 'Contoso' -InRemovedState
    ```

    This command gets all the certificates that have been previously deleted, but not purged, in the key vault named Contoso.
- title: 'Example 3: Gets the certificate MyCert that has been deleted but not purged for this key vault.'
  description: |-
    ```
    PS C:\>Get-AzKeyVaultCertificate -VaultName 'Contoso' -Name 'MyCert' -InRemovedState
    ```

    This command gets the certificate named 'MyCert' that has been previously deleted, but not purged, in the key vault named Contoso.
    This command will return metadata such as the deletion date, and the scheduled purging date of this deleted certificate.
