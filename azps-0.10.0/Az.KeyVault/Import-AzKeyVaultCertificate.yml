    ```
  parameterSetName: ImportWithPrivateKeyFromString
  isDefault: false
- syntax: |-
    ```Syntax
    Import-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        -CertificateCollection <X509Certificate2Collection>
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
