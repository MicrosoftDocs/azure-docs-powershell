syntaxes:
- syntax: |-
    ```Syntax
    Import-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        -FilePath <String>
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ImportCertificateFromFile
  isDefault: true
- syntax: |-
    ```Syntax
    Import-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        -FilePath <String>
        [-Password <SecureString>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ImportWithPrivateKeyFromFile
  isDefault: false
- syntax: |-
