syntaxes:
- syntax: |-
    ```Syntax
    New-AzKeyVault
        [-VaultName] <String>
        [-ResourceGroupName] <String>
        [-Location] <String>
        [-EnabledForDeployment]
        [-EnabledForTemplateDeployment]
        [-EnabledForDiskEncryption]
        [-EnableSoftDelete]
        [-Sku <SkuName>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
