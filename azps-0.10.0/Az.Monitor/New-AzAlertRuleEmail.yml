### YamlMime:PowerShellCmdlet1
uid: Az.Monitor.New-AzAlertRuleEmail
name: New-AzAlertRuleEmail
module: Az.Monitor
isPreview: false
summary: |-
  Creates an email action for an alert rule.
description: |-
  The **New-AzAlertRuleEmail** cmdlet creates an e-mail action for an alert rule.
parameters:
  cmdletParameters:
  - name: CustomEmail
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies a list of comma-separated e-mail addresses.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SendToServiceOwner
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation sends an e-mail to the service owners when the rule fires.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzAlertRuleEmail
        [[-CustomEmail] <String[]>]
        [-SendToServiceOwner]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Management.Monitor.Management.Models.RuleEmailAction" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an alert rule email action for service owners'
  description: |-
    ```
    PS C:\>New-AzAlertRuleEmail -SendToServiceOwners
    ```

    This command creates an alert rule email action to send for its service owners when an alert rule is fired.
- title: 'Example 2: Create an alert rule email action for non-service owners'
  description: |-
    ```
    PS C:\>New-AzAlertRuleEmail -CustomEmail pattif@contoso.com,davidchew@contoso.net
    ```

    This command creates an alert rule email action for the specified email addresses, but not for the service owners.
- title: 'Example 3: Create an alert rule email action for service owners and non-service owners'
  description: |-
    ```
    PS C:\>New-AzAlertRuleEmail -CustomEmail pattif@contoso.net -SendToServiceOwners
    ```

    This command creates an alert rule email action for the specified address and for its service owners.
