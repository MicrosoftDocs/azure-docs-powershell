uid: Az.Monitor.New-AzAutoscaleNotification
name: New-AzAutoscaleNotification
module: Az.Monitor
isPreview: false
summary: |-
  Creates an Autoscale email notification.
description: |-
  The **New-AzAutoscaleNotification** cmdlet creates an email notification for Autoscale.
