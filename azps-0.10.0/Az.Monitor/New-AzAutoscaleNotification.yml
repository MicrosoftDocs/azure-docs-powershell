- name: <xref href="Microsoft.Azure.Management.Monitor.Management.Models.AutoscaleNotification" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an Autoscale email notification'
  description: |-
    ```
    PS C:\>New-AzAutoscaleNotification -CustomEmail "pattif@contoso.com, davidchew@contoso.net"
    ```

    This command creates an Autosacale email notification for two specified addresses.
- title: 'Example 2: Create an Autoscale email notification for the subscription administrator'
  description: |-
    ```
    PS C:\>New-AzAutoscaleNotification -SendEmailToSubscriptionAdministrator
    ```

    This command creates an Autosacale email notification for the subscription administrator.
