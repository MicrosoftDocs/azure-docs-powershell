syntaxes:
- syntax: |-
    ```Syntax
    New-AzAutoscaleNotification
        [[-Webhook] <WebhookNotification[]>]
        [[-CustomEmail] <String[]>]
        [-SendEmailToSubscriptionAdministrator]
        [-SendEmailToSubscriptionCoAdministrator]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
