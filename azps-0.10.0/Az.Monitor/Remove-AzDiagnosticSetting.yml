syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDiagnosticSetting
        -ResourceId <String>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
