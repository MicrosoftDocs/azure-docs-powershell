syntaxes:
- syntax: |-
    ```Syntax
    Get-AzActivityLogAlert
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByNameAndResourceGroup
  isDefault: false
- syntax: |-
    ```Syntax
