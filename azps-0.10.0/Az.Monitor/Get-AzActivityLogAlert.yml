uid: Az.Monitor.Get-AzActivityLogAlert
name: Get-AzActivityLogAlert
module: Az.Monitor
isPreview: false
summary: |-
  Gets one or more activity log alert resources.
description: |-
  The **Get-AzActivityLogAlert** cmdlet gets one or more activity log alert resources.
