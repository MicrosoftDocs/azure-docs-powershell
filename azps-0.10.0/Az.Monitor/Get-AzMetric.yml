syntaxes:
- syntax: |-
    ```Syntax
    Get-AzMetric
        [-ResourceId] <String>
        [[-MetricName] <String[]>]
        [-TimeGrain <TimeSpan>]
        [-StartTime <DateTime>]
        [-EndTime <DateTime>]
        [-DetailedOutput]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetWithDefaultParameters
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzMetric
        [-ResourceId] <String>
        [-MetricName] <String[]>
        [-TimeGrain <TimeSpan>]
        [-AggregationType <AggregationType>]
        [-StartTime <DateTime>]
        [-EndTime <DateTime>]
        [-Top <Int32>]
        [-OrderBy <String>]
        [-MetricNamespace <String>]
        [-ResultType <ResultType>]
        [-MetricFilter <String>]
        [-DetailedOutput]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetWithFullParameters
  isDefault: false
