### YamlMime:PowerShellCmdlet1
uid: Az.Monitor.Get-AzMetric
name: Get-AzMetric
module: Az.Monitor
isPreview: false
summary: |-
  Gets the metric values of a resource.
description: |-
  The **Get-AzMetric** cmdlet gets the metric values for a specified resource.
notes: |-
  More information about the supported metrics may be found at:
  https://learn.microsoft.com/en-us/azure/azure-monitor/platform/metrics-supported
