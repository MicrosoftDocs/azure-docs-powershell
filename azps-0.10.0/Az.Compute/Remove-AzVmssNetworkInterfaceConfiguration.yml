syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzVmssNetworkInterfaceConfiguration
        [-VirtualMachineScaleSet] <PSVirtualMachineScaleSet>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzVmssNetworkInterfaceConfiguration
        [-VirtualMachineScaleSet] <PSVirtualMachineScaleSet>
