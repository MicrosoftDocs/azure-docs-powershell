syntaxes:
- syntax: |-
    ```Syntax
    Set-AzVmssOsProfile
        [-VirtualMachineScaleSet] <PSVirtualMachineScaleSet>
        [[-ComputerNamePrefix] <String>]
        [[-AdminUsername] <String>]
        [[-AdminPassword] <String>]
        [[-CustomData] <String>]
        [[-WindowsConfigurationProvisionVMAgent] <Boolean>]
        [[-WindowsConfigurationEnableAutomaticUpdate] <Boolean>]
        [[-TimeZone] <String>]
        [[-AdditionalUnattendContent] <AdditionalUnattendContent[]>]
        [[-Listener] <WinRMListener[]>]
        [[-LinuxConfigurationDisablePasswordAuthentication] <Boolean>]
        [[-PublicKey] <SshPublicKey[]>]
        [[-Secret] <VaultSecretGroup[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="VirtualMachineScaleSet" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'VirtualMachineScaleSet' accepts value of type 'VirtualMachineScaleSet' from the pipeline
outputs:
- name: <xref href="This cmdlet does not generate any output." data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set the operating system profile properties for a VMSS'
  description: |-
    ```
    PS C:\> Set-AzVmssOSProfile -VirtualMachineScaleSet "ContosoVMSS" -ComputerNamePrefix "Test" -AdminUsername $AdminUsername -AdminPassword $AdminPassword
    ```

    This command sets operating system profile properties for the virtual machines that belong to the VMSS named ContosoVMSS.
    The command sets the computer name prefix for all the virtual machine instances in the VMSS to Test and supplies the administrator username and password.
