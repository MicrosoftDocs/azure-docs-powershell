    ```Syntax
    Get-AzVmssVM
        [[-ResourceGroupName] <String>]
        [[-VMScaleSetName] <String>]
        [[-InstanceId] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
