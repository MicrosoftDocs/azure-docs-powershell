syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzContainerServiceAgentPoolProfile
        [-ContainerService] <PSContainerService>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
