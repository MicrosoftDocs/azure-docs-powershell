syntaxes:
- syntax: |-
    ```Syntax
    Grant-AzSnapshotAccess
        [-ResourceGroupName] <String>
        [-SnapshotName] <String>
        [-Access] <AccessLevel>
        [[-DurationInSecond] <Int32>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
