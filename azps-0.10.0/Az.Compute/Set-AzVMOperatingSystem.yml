syntaxes:
- syntax: |-
    ```Syntax
    Set-AzVMOperatingSystem
        [-VM] <PSVirtualMachine>
        [-ComputerName] <String>
        [-Credential] <PSCredential>
        [[-CustomData] <String>]
        [[-TimeZone] <String>]
        [-Windows]
        [-ProvisionVMAgent]
        [-EnableAutoUpdate]
        [-WinRMHttp]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Windows
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzVMOperatingSystem
        [-VM] <PSVirtualMachine>
        [-ComputerName] <String>
        [-Credential] <PSCredential>
        [[-CustomData] <String>]
        [[-TimeZone] <String>]
        [-WinRMCertificateUrl] <Uri>
        [-Windows]
        [-ProvisionVMAgent]
        [-EnableAutoUpdate]
        [-WinRMHttp]
        [-WinRMHttps]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: WindowsWinRmHttps
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzVMOperatingSystem
        [-VM] <PSVirtualMachine>
        [-ComputerName] <String>
        [-Credential] <PSCredential>
        [[-CustomData] <String>]
        [-Linux]
        [-DisablePasswordAuthentication]
        [-DefaultProfile <IAzureContextContainer>]
