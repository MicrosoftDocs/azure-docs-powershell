syntaxes:
- syntax: |-
    ```Syntax
    Set-AzVMCustomScriptExtension
        [-ResourceGroupName] <String>
        [-VMName] <String>
        -ContainerName <String>
        -FileName <String[]>
        [-StorageAccountName <String>]
        [-StorageEndpointSuffix <String>]
        [-StorageAccountKey <String>]
        [-Run <String>]
        [-Argument <String>]
        [-SecureExecution]
        [-Name <String>]
        [-TypeHandlerVersion <String>]
        [-Location <String>]
        [-DisableAutoUpgradeMinorVersion]
        [-ForceRerun <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetCustomScriptExtensionByContainerAndFileNames
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzVMCustomScriptExtension
        [-ResourceGroupName] <String>
        [-VMName] <String>
        [-FileUri <String[]>]
        [-Run <String>]
        [-Argument <String>]
        [-SecureExecution]
        [-Name <String>]
        [-TypeHandlerVersion <String>]
        [-Location <String>]
        [-DisableAutoUpgradeMinorVersion]
        [-ForceRerun <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetCustomScriptExtensionByUriLinks
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not accept any input.
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Models.PSAzureOperationResponse" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add a custom script'
  description: |-
    ```
    PS C:\> Set-AzVMCustomScriptExtension -ResourceGroupName "ResourceGroup11" -Location "Central US" -VMName "VirtualMachine07" -Name "ContosoTest" -TypeHandlerVersion "1.1" -StorageAccountName "Contoso" -StorageAccountKey <StorageKey> -FileName "ContosoScript.exe" -ContainerName "Scripts"
    ```

    This command adds a custom script to the virtual machine named VirtualMachine07.
    The script file is contososcript.exe.
