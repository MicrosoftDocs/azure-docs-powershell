syntaxes:
- syntax: |-
    ```Syntax
    Start-AzVM
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
