syntaxes:
- syntax: |-
    ```Syntax
    Set-AzVmssBootDiagnostic
        [-VirtualMachineScaleSet] <PSVirtualMachineScaleSet>
        [[-Enabled] <Boolean>]
        [[-StorageUri] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
