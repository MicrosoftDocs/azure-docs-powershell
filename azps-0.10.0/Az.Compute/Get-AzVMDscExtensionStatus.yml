    ```Syntax
    Get-AzVMDscExtensionStatus
        [-ResourceGroupName] <String>
        [-VMName] <String>
        [[-Name] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
