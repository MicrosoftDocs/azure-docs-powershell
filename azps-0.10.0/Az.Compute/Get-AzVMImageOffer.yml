### YamlMime:PowerShellCmdlet1
uid: Az.Compute.Get-AzVMImageOffer
name: Get-AzVMImageOffer
module: Az.Compute
isPreview: false
summary: |-
  Gets VMImage offer types.
description: |-
  The **Get-AzVMImageOffer** cmdlet gets the VMImage offer types.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the location of the VMImage.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PublisherName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a publisher of a VMImage.
      To obtain a publisher, use the Get-AzVMImagePublisher cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVMImageOffer
        -Location <String>
        -PublisherName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not accept any input.
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Models.PSVirtualMachineImageOffer" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get offer types for a publisher'
  description: |-
    ```
    PS C:\> Get-AzVMImageOffer -Location "Central US" -PublisherName "Fabrikam"
    ```

    This command gets the offer types for the specified publisher in the Central US region.
