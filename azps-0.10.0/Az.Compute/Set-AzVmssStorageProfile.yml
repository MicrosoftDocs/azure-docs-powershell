syntaxes:
- syntax: |-
    ```Syntax
    Set-AzVmssStorageProfile
        [-VirtualMachineScaleSet] <PSVirtualMachineScaleSet>
        [[-ImageReferencePublisher] <String>]
        [[-ImageReferenceOffer] <String>]
        [[-ImageReferenceSku] <String>]
        [[-ImageReferenceVersion] <String>]
        [[-OsDiskName] <String>]
        [[-OsDiskCaching] <CachingTypes>]
        [[-OsDiskCreateOption] <DiskCreateOptionTypes>]
        [[-OsDiskOsType] <OperatingSystemTypes>]
        [[-Image] <String>]
        [[-VhdContainer] <String[]>]
        [-ImageReferenceId <String>]
        [-OsDiskWriteAccelerator]
        [-ManagedDisk <StorageAccountTypes>]
        [-DataDisk <VirtualMachineScaleSetDataDisk[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not generate any output.
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Automation.Models.PSVirtualMachineScaleSet" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set the storage profile properties for the VMSS'
  description: |-
    ```
    PS C:\> Set-AzVmssStorageProfile -VirtualMachineScaleSet "ContosoVMSS" -Name "Test" -OsDiskCreateOption "FromImage" -OsDiskCaching "None" `
                -ImageReferenceOffer $ImgRef.Offer -ImageReferenceSku $ImgRef.Skus -ImageReferenceVersion $ImgRef.Version `
                -ImageReferencePublisher $ImgRef.PublisherName -VhdContainer $VhdContainer
    ```

    This command sets the storage profile properties for the VMSS named ContosoVMSS.
