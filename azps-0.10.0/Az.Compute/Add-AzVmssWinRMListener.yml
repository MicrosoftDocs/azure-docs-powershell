  cmdletParameters:
  - name: CertificateUrl
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a link, as a URL, of the certificate with which new virtual machines are provisioned.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
