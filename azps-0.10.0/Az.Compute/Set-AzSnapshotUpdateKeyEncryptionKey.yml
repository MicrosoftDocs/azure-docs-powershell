syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSnapshotUpdateKeyEncryptionKey
        [-SnapshotUpdate] <PSSnapshotUpdate>
        [[-KeyUrl] <String>]
        [[-SourceVaultId] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
