      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a resource group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SnapshotName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a snapshot.
    aliases:
    - Name
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSnapshot
        [[-ResourceGroupName] <String>]
        [[-SnapshotName] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Automation.Models.PSSnapshot" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-AzSnapshot
    ```

    This command gets the properties of all snapshots of the subscription.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-AzSnapshot -ResourceGroupName "ResourceGroupName1"
    ```

    This command gets the properties of all snapshots in the resource group named "ResourceGroupName1"
- title: Example 3
  description: |-
    ```
    PS C:\> Get-AzSnapshot -ResourceGroupName "ResourceGroupName1" -SnapshotName "SnapshotName1"
    ```

    This command gets the properties of the snapshot named "SnapshotName1" in the resource group named "ResourceGroupName1"
