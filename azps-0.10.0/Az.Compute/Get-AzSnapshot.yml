### YamlMime:PowerShellCmdlet1
uid: Az.Compute.Get-AzSnapshot
name: Get-AzSnapshot
module: Az.Compute
isPreview: false
summary: |-
  Gets the properties of a snapshot
description: |-
  The **Get-AzSnapshot** cmdlet gets the properties of a snapshot.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
