syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzVmss
        [-ResourceGroupName] <String>
        [-VMScaleSetName] <String>
        [[-InstanceId] <String[]>]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
