syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDiskImageReference
        [-Disk] <PSDisk>
        [[-Id] <String>]
        [[-Lun] <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
