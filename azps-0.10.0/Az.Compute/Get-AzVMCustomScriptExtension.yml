    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVMCustomScriptExtension
        [-ResourceGroupName] <String>
        [-VMName] <String>
        [-Name] <String>
        [-Status]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not accept any input.
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Models.VirtualMachineCustomScriptExtensionContext" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a custom script extension'
  description: |-
    ```
    PS C:\> $VMCustomScriptExtension = Get-AzVMCustomScriptExtension -ResourceGroupName "ResourceGroup11" -VMName "VirtualMachine07" -Name "ContosoCustomScript"
    ```

    This command gets the custom script extension named ContosoCustomScript for the virtual machine named VirtualMachine07.
- title: 'Example 2: Get the instance view of a custom script extension'
  description: |-
    ```
    PS C:\> $VMCustomScriptExtension = Get-AzVMCustomScriptExtension -ResourceGroupName "ResourceGroup11" -VMName "VirtualMachine07" -Name "ContosoCustomScript" -Status
    ```

    This command gets the instance view of the custom script extension named ContosoCustomScript for the virtual machine named VirtualMachine07.
