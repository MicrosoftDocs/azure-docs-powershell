syntaxes:
- syntax: |-
    ```Syntax
    Update-AzVM
        [-ResourceGroupName] <String>
        -VM <PSVirtualMachine>
        [-Tag <Hashtable>]
        [-OsDiskWriteAccelerator <Boolean>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceGroupNameParameterSetName
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzVM
        [-ResourceGroupName] <String>
        -VM <PSVirtualMachine>
        [-Tag <Hashtable>]
        [-AssignIdentity]
        [-OsDiskWriteAccelerator <Boolean>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AssignIdentityParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Update-AzVM
        [-ResourceGroupName] <String>
        -VM <PSVirtualMachine>
        -IdentityType <ResourceIdentityType>
        [-Tag <Hashtable>]
        [-IdentityId <String[]>]
        [-OsDiskWriteAccelerator <Boolean>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ExplicitIdentityParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Update-AzVM
        [-Id] <String>
        -VM <PSVirtualMachine>
        [-Tag <Hashtable>]
        [-OsDiskWriteAccelerator <Boolean>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IdParameterSetName
  isDefault: false
inputs:
- name: <xref href="PSVirtualMachine" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'VM' accepts value of type 'PSVirtualMachine' from the pipeline
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Models.PSAzureOperationResponse" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Update a virtual machine'
  description: |-
    ```
    PS C:\> Update-AzVM -ResourceGroupName "ResourceGroup11" -VM $VirtualMachine
    ```

    This command updates the virtual machine, $VirtualMachine, in ResourceGroup11.
    The command updates it by using the virtual machine object stored in the $VirtualMachine variable.
    To obtain a virtual machine object, use the **Get-AzVM** cmdlet.
