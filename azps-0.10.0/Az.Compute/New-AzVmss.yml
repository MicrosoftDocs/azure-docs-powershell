### YamlMime:PowerShellCmdlet1
uid: Az.Compute.New-AzVmss
name: New-AzVmss
module: Az.Compute
isPreview: false
summary: |-
  Creates a VMSS.
description: |-
  The **New-AzVmss** cmdlet creates a Virtual Machine Scale Set (VMSS) in Azure.
  This cmdlet takes a **VirtualMachineScaleSet** object as input.
