syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzVMRunCommand
        [-ResourceGroupName] <String>
        [-VMName] <String>
        -CommandId <String>
        [-ScriptPath <String>]
        [-Parameter <Hashtable>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultParameter
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzVMRunCommand
        [-VM] <PSVirtualMachine>
        -CommandId <String>
        [-ScriptPath <String>]
        [-Parameter <Hashtable>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VMParameter
  isDefault: false
