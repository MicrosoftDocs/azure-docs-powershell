      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Resource ID of the virtual machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
