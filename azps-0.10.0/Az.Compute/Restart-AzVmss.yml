syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzVmss
        [-ResourceGroupName] <String>
        [-VMScaleSetName] <String>
        [[-InstanceId] <String[]>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not accept any input.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not generate any output.
examples:
- title: 'Example 1: Restart the VMSS'
  description: |-
    ```
    PS C:\> Restart-AzVmss -ResourceGroupName "Group001" -VMScaleSetName "VMSS001";
    ```

    This command restarts the VMSS named VMSS001 that belongs to the resource group named Group001.
- title: 'Example 2: Restart a specific virtual machine within the VMSS'
  description: |-
    ```
    PS C:\> Restart-AzVmss -ResourceGroupName "Group004" -VMScaleSetName "VMSS001" -InstanceId "1"
    ```

    This command restarts a virtual machine that has the instance ID of 1 in the VMSS named VMSS001 that belongs to the resource group named Group001.
