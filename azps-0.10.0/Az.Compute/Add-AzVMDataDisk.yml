### YamlMime:PowerShellCmdlet1
uid: Az.Compute.Add-AzVMDataDisk
name: Add-AzVMDataDisk
module: Az.Compute
isPreview: false
summary: |-
  Adds a data disk to a virtual machine.
description: |-
  The **Add-AzVMDataDisk** cmdlet adds a data disk to a virtual machine.
  You can add a data disk when you create a virtual machine, or you can add a data disk to an existing virtual machine.
parameters:
  cmdletParameters:
  - name: Caching
    type: <xref href="CachingTypes" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the caching mode of the disk.
      The acceptable values for this parameter are:

      - ReadOnly
      - ReadWrite
      - None

      The default value is ReadWrite.
      Changing this value causes the virtual machine to restart.

      This setting affects the consistency and performance of the disk.
    acceptedValues:
    - None
    - ReadOnly
    - ReadWrite
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CreateOption
    type: <xref href="DiskCreateOptionTypes" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether this cmdlet creates a disk in the virtual machine from a platform or user image, creates an empty disk, or attaches an existing disk.
      The acceptable values for this parameter are:

      - Attach.
      Specify this option to create a virtual machine from a specialized disk.
      When you specify this option, do not specify the *SourceImageUri* parameter.
      The *VhdUri* is all that is needed in order to tell the Azure platform the location of the virtual hard disk (VHD) to attach as a data disk to the virtual machine.
      - Empty.
      Specify this to create an empty data disk.
      - FromImage.
      Specify this option to create a virtual machine from a generalized image or disk.
      When you specify this option, you must specify the *SourceImageUri* parameter also in order to tell the Azure platform the location of the VHD to attach as a data disk.
      The *VhdUri* parameter is used as the location identifying where the data disk VHD will be stored when it is used by the virtual machine.
    acceptedValues:
    - FromImage
    - Empty
    - Attach
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "6"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DiskSizeInGB
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the size, in gigabytes, of an empty disk to attach to a virtual machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Lun
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the logical unit number (LUN) for a data disk.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "5"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ManagedDiskId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of a managed disk.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "8"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the data disk to add.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceImageUri
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the source URI of the disk that this cmdlet attaches.
    aliases:
    - SourceImage
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "7"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StorageAccountType
    type: <xref href="StorageAccountTypes" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the storage account type of managed disk.
    acceptedValues:
    - StandardLRS
    - PremiumLRS
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "9"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VhdUri
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Uniform Resource Identifier (URI) for the virtual hard disk (VHD) file to create when a platform image or user image is used.
      This cmdlet copies the image binary large object (blob) to this location.
      This is the location from which to start the virtual machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VM
    type: <xref href="PSVirtualMachine" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the local virtual machine object to which to add a data disk.
      You can use the **Get-AzVM** cmdlet to obtain a virtual machine object.
      You can use the **New-AzVMConfig** cmdlet to create a virtual machine object.
    aliases:
    - VMProfile
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WriteAccelerator
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether WriteAccelerator should be enabled or disabled on the data disk.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
