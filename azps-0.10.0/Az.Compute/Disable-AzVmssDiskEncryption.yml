syntaxes:
- syntax: |-
    ```Syntax
    Disable-AzVmssDiskEncryption
        [-ResourceGroupName] <String>
        [-VMScaleSetName] <String>
        [[-ExtensionName] <String>]
        [-VolumeType <String>]
        [-ForceUpdate]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
