examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Disable-AzVmssDiskEncryption -ResourceGroupName "Group001" -VMScaleSetName "VMSS001"
    ```

    Disables disk encryption on the VM scale set named VMSS001 that belongs to the resource group named Group001.
