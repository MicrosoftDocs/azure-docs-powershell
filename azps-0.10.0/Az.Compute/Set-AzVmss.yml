syntaxes:
- syntax: |-
    ```Syntax
    Set-AzVmss
        [-ResourceGroupName] <String>
        [-VMScaleSetName] <String>
        [[-InstanceId] <String[]>]
        [-Reimage]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultParameter
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzVmss
        [-ResourceGroupName] <String>
        [-VMScaleSetName] <String>
        [[-InstanceId] <String[]>]
        [-ReimageAll]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FriendMethod
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
