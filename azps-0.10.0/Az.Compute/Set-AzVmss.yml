uid: Az.Compute.Set-AzVmss
name: Set-AzVmss
module: Az.Compute
isPreview: false
summary: |-
  Sets specific actions on a specified VMSS.
description: |-
  The **Set-AzVmss** cmdlet sets specific actions on the Virtual Machine Scale Set (VMSS).
  The only action this cmdlet supports is Reimage.
