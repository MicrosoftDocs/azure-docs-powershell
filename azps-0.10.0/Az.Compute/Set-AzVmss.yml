outputs:
- name: <xref href="This cmdlet does not generate any output." data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Reimage a VMSS'
  description: |-
    ```
    PS C:\> Set-AzVmss -Reimage -ResourceGroupName "ContosoGroup" -VMScaleSetName "ContosoVMSS"
    ```

    This command reimages the VMSS named ContosoVMSS that belongs to the resource group named ContosoGroup.
