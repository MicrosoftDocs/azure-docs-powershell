syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVmss
        [[-ResourceGroupName] <String>]
        [[-VMScaleSetName] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultParameter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzVmss
        [[-ResourceGroupName] <String>]
        [[-VMScaleSetName] <String>]
        [-InstanceView]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: FriendMethod
  isDefault: false
