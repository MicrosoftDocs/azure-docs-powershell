syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDiskDiskEncryptionKey
        [-Disk] <PSDisk>
        [[-SecretUrl] <String>]
        [[-SourceVaultId] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
