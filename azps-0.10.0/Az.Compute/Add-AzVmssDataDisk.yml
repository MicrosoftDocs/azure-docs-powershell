uid: Az.Compute.Add-AzVmssDataDisk
name: Add-AzVmssDataDisk
module: Az.Compute
isPreview: false
summary: |-
  Adds a data disk to the VMSS.
description: |-
  The **Add-AzVmssDataDisk** cmdlet adds a data disk to the Virtual Machine Scale Set (VMSS) instance.
