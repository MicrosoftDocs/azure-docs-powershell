### YamlMime:PowerShellCmdlet1
uid: Az.Compute.Add-AzVMNetworkInterface
name: Add-AzVMNetworkInterface
module: Az.Compute
isPreview: false
summary: |-
  Adds a network interface to a virtual machine.
description: |-
  The **Add-AzVMNetworkInterface** cmdlet adds a network interface to a virtual machine.
  You can add an interface when you create a virtual machine or add one to an existing virtual machine.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of a network interface to add to a virtual machine.
      You can use the [Get-AzNetworkInterface](/powershell/module/az.network/get-aznetworkinterface) cmdlet to obtain a network interface.
    aliases:
    - NicId
    - NetworkInterfaceId
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetNicFromNicId
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NetworkInterface
    type: <xref href="System.Collections.Generic.List`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="Microsoft.Azure.Management.Internal.Network.Common.INetworkInterfaceReference" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the network interface.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetNicFromNicObject
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Primary
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet adds the network interface as the primary interface.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetNicFromNicId
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VM
    type: <xref href="PSVirtualMachine" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a local virtual machine object to which to add a network interface.
      To create a virtual machine, use the **New-AzVMConfig** cmdlet.
      To obtain an existing virtual machine, use the **Get-AzVM** cmdlet.
    aliases:
    - VMProfile
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-AzVMNetworkInterface
        [-VM] <PSVirtualMachine>
        [-Id] <String>
        [-Primary]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetNicFromNicId
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzVMNetworkInterface
        [-VM] <PSVirtualMachine>
        [-NetworkInterface] <System.Collections.Generic.List`1[Microsoft.Azure.Management.Internal.Network.Common.INetworkInterfaceReference]>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetNicFromNicObject
  isDefault: false
inputs:
- name: <xref href="System.Collections.Generic.List`1" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'NetworkInterface' accepts value of type 'System.Collections.Generic.List`1[Microsoft.Azure.Commands.Network.Models.PSNetworkInterface]' from the pipeline
- name: <xref href="PSVirtualMachine" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'VM' accepts value of type 'PSVirtualMachine' from the pipeline
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Models.PSVirtualMachine" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add a network interface to a new virtual machine'
  description: |-
    ```
    PS C:\> $VirtualMachine = New-AzVMConfig -VMName "VirtualMachine07" -VMSize "Standard_A1"
    PS C:\> Add-AzVMNetworkInterface -VM $VirtualMachine -Id "/subscriptions/46fc8ea4-2de6-4179-8ab1-365da4121af4/resourceGroups/contoso/providers/Microsoft.Network/networkInterfaces/sshNIC"
    ```

    The first command creates a virtual machine object, and then stores it in the $VirtualMachine variable.
    The command assigns a name and size to the virtual machine.

    The second command adds a network interface to the virtual machine stored in $VirtualMachine.
- title: 'Example 2: Add a network interface to an existing virtual machine'
  description: |-
    ```
    PS C:\> $VirtualMachine = Get-AzVM -ResourceGroupName "ResourceGroup11" -Name "VirtualMachine07"
    PS C:\> Add-AzVMNetworkInterface -VM $VirtualMachine -Id "/subscriptions/46fc8ea4-2de6-4179-8ab1-365da4121af4/resourceGroups/contoso/providers/Microsoft.Network/networkInterfaces/sshNIC"
    PS C:\> Update-AzVM -ResourceGroupName "ResourceGroup11" -VM $VirtualMachine
    ```

    The first command gets the virtual machine named VirtualMachine07 by using the **Get-AzVM** cmdlet.
    The command stores the virtual machine in the $VirtualMachine variable.

    The second command adds a network interface to the virtual machine stored in $VirtualMachine.

    The final command updates the state of the virtual machine stored in $VirtualMachine in ResourceGroup11.
