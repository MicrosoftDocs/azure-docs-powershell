syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVMChefExtension
        [-ResourceGroupName] <String>
        [-VMName] <String>
        [[-Name] <String>]
        [-Status]
        [-Linux]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Linux
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzVMChefExtension
        [-ResourceGroupName] <String>
        [-VMName] <String>
