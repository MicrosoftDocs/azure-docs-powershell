syntaxes:
- syntax: |-
    ```Syntax
    Add-AzVhd
        [[-ResourceGroupName] <String>]
        [-Destination] <Uri>
        [-LocalFilePath] <FileInfo>
        [[-NumberOfUploaderThreads] <Int32>]
        [[-BaseImageUriToPatch] <Uri>]
        [-OverWrite]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
