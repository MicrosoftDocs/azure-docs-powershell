syntaxes:
- syntax: |-
    ```Syntax
    New-AzContainerService
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-ContainerService] <PSContainerService>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
