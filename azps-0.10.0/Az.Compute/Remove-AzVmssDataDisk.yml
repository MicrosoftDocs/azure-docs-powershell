syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzVmssDataDisk
        [-VirtualMachineScaleSet] <PSVirtualMachineScaleSet>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
