### YamlMime:PowerShellCmdlet1
uid: Az.Compute.Set-AzVMBootDiagnostic
name: Set-AzVMBootDiagnostic
module: Az.Compute
isPreview: false
summary: |-
  Modifies boot diagnostics properties of a virtual machine.
description: |-
  The **Set-AzVMBootDiagnostic** cmdlet modifies boot diagnostics properties of a virtual machine.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Disable
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet disables the boot diagnostics for the virtual machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DisableBootDiagnostics
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Enable
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet enables the boot diagnostics for the virtual machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableBootDiagnostics
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the resource group of the virtual machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableBootDiagnostics
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StorageAccountName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the storage account in which to save boot diagnostics data.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableBootDiagnostics
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VM
    type: <xref href="PSVirtualMachine" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the virtual machine for which this cmdlet changes boot diagnostics.
      To obtain a virtual machine object, use the Get-AzVM cmdlet.
    aliases:
    - VMProfile
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzVMBootDiagnostic
        [-VM] <PSVirtualMachine>
        [-ResourceGroupName] <String>
        [[-StorageAccountName] <String>]
        [-Enable]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: EnableBootDiagnostics
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzVMBootDiagnostic
        [-VM] <PSVirtualMachine>
        [-Disable]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: DisableBootDiagnostics
  isDefault: false
inputs:
- name: <xref href="PSVirtualMachine" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'VM' accepts value of type 'PSVirtualMachine' from the pipeline
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Models.PSVirtualMachine" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Enable boot diagnostics'
  description: |-
    ```
    PS C:\> $VM = Get-AzVM -ResourceGroupName "ResourceGroup11" -Name "ContosoVM07"
    PS C:\> Set-AzVMBootDiagnostic -VM $VM -Enable -ResourceGroupName "ResourceGroup11" -StorageAccountName "DiagnosticStorage"
    ```

    The first command gets the virtual machine named ContosoVM07 by using **Get-AzVM**.
    The command stores it in the $VM variable.

    The second command enables boot diagnostics for the virtual machine in $VM.
    Diagnostics data is stored in the specified account.
