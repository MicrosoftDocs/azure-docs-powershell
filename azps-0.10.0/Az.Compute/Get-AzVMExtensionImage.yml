syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVMExtensionImage
        -Location <String>
        -PublisherName <String>
        -Type <String>
        [-FilterExpression <String>]
        [-Version <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
