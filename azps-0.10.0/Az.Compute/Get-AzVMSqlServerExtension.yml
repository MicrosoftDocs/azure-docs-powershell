syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVMSqlServerExtension
        [-ResourceGroupName] <String>
        [-VMName] <String>
        [[-Name] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
