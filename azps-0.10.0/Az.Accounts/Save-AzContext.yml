syntaxes:
- syntax: |-
    ```Syntax
    Save-AzContext
        [[-Profile] <AzureRmProfile>]
        [-Path] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.Common.Authentication.Models.AzureRmProfile" data-throw-if-not-resolved="False" />
