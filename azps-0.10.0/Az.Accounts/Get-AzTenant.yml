### YamlMime:PowerShellCmdlet1
uid: Az.Accounts.Get-AzTenant
name: Get-AzTenant
module: Az.Accounts
isPreview: false
summary: |-
  Gets tenants that are authorized for the current user.
description: |-
  The Get-AzTenant cmdlet gets tenants authorized for the current user.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, tenant and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TenantId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of the tenant that this cmdlet gets.
    aliases:
    - Domain
    - Tenant
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzTenant
        [[-TenantId] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Profile.Models.PSAzureTenant" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Getting all tenants'
  description: |-
    ```
    PS C:\> Connect-AzAccount
    PS C:\> Get-AzTenant

    Id                                   Directory
    --                                   ---------
    xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx microsoft.com
    yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy microsoft.com
    ```

    This example shows how to get all of the authorized tenants of an Azure account.
- title: 'Example 2: Getting a specific tenant'
  description: |-
    ```
    PS C:\> Connect-AzAccount
    PS C:\> Get-AzTenant -TenantId xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx

    Id                                   Directory
    --                                   ---------
    xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx microsoft.com
    ```

    This example shows how to get a specific authorized tenant of an Azure account.
