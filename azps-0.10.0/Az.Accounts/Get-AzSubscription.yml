    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSubscription
        [-SubscriptionId <String>]
        [-TenantId <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListByIdInTenant
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSubscription
        [-SubscriptionName <String>]
        [-TenantId <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListByNameInTenant
  isDefault: false
