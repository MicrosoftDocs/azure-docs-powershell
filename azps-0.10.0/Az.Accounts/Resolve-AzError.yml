### YamlMime:PowerShellCmdlet1
uid: Az.Accounts.Resolve-AzError
name: Resolve-AzError
module: Az.Accounts
isPreview: false
summary: |-
  Display detailed information about PowerShell errors, with extended details for Azure PowerShell errors.
description: |-
  Resolves and displays detailed information about errors in the current PowerShell session, including where the error
  occurred in script, stack trace, and all inner and aggregate exceptions. For Azure PowerShell errors provides
  additional detail in debugging service issues, including complete detail about the request and server response
  that caused the error.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, tenant and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Error
    type: <xref href="System.Management.Automation.ErrorRecord" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      One or more error records to resolve.  If no parameters are specified, all errors in the session are resolved.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: AnyErrorParameterSet
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Last
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Resolve only the last error that occurred in the session.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: LastErrorParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Resolve-AzError
        [[-Error] <ErrorRecord[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AnyErrorParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Resolve-AzError
        [-Last]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: LastErrorParameterSet
  isDefault: false
inputs:
- name: <xref href="System.Management.Automation.ErrorRecord" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Profile.Errors.AzureErrorRecord" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Profile.Errors.AzureExceptionRecord" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Profile.Errors.AzureRestExceptionRecord" data-throw-if-not-resolved="False" />
