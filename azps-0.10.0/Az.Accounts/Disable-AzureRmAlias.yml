syntaxes:
- syntax: |-
    ```Syntax
    Disable-AzureRmAlias
        [-Scope <String>]
        [-Module <String[]>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
