### YamlMime:PowerShellCmdlet1
uid: Az.Accounts.Get-AzContextAutosaveSetting
name: Get-AzContextAutosaveSetting
module: Az.Accounts
isPreview: false
summary: |-
  Display metadata about the context autosave feature, including whether the context is
  automatically saved, and where saved context and credential information can be found.
description: |-
  Display metadata about the context autosave feature, including whether the context is
  automatically saved, and where saved context and credential information can be found.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="Microsoft.Azure.Commands.Profile.Common.ContextModificationScope" data-throw-if-not-resolved="False" />
    description: |-
      Determines the scope of context changes, for example, whether changes apply only to the current process, or to all sessions started by this user.
    acceptedValues:
    - Process
    - CurrentUser
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
