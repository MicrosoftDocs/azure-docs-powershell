syntaxes:
- syntax: |-
    ```Syntax
    Import-AzContext
        [-Path] <String>
        [-Scope <ContextModificationScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ProfileFromDisk
  isDefault: true
- syntax: |-
    ```Syntax
    Import-AzContext
        [-AzureContext] <AzureRmProfile>
        [-Scope <ContextModificationScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InMemoryProfile
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Common.Authentication.Models.AzureRmProfile" data-throw-if-not-resolved="False" />
