uid: Az.Websites.Get-AzWebAppPublishingProfile
name: Get-AzWebAppPublishingProfile
module: Az.Websites
isPreview: false
summary: |-
  Gets an Azure Web App publishing profile.
description: |-
  The **Get-AzWebAppPublishingProfile** cmdlet gets an Azure Web App publishing profile.
