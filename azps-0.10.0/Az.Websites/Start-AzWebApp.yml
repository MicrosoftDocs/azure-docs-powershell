uid: Az.Websites.Start-AzWebApp
name: Start-AzWebApp
module: Az.Websites
isPreview: false
summary: |-
  Starts an Azure Web App.
description: |-
  The **Start-AzWebApp** cmdlet starts an Azure Web App.
