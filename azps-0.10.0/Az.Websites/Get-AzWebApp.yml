uid: Az.Websites.Get-AzWebApp
name: Get-AzWebApp
module: Az.Websites
isPreview: false
summary: |-
  Gets Azure Web Apps in the specified resource group.
description: |-
  The **Get-AzWebApp** cmdlet gets information about an Azure Web App.
