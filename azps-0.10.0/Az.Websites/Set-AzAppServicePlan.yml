syntaxes:
- syntax: |-
    ```Syntax
    Set-AzAppServicePlan
        [[-AdminSiteName] <String>]
        [[-Tier] <String>]
        [[-NumberofWorkers] <Int32>]
        [[-WorkerSize] <String>]
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-PerSiteScaling <Boolean>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S1
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzAppServicePlan
        [-AppServicePlan] <AppServicePlan>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S2
  isDefault: false
inputs:
- name: <xref href="ServerFarmWithRichSku" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'AppServicePlan' accepts value of type 'ServerFarmWithRichSku' from the pipeline
outputs:
- name: <xref href="Microsoft.Azure.Management.WebSites.Models.ServerFarmWithRichSku" data-throw-if-not-resolved="False" />
examples:
- title: '1: Modify an App Service plan'
  description: |-
    ```
    PS C:\>Set-AzAppServicePlan -ResourceGroupName "Default-Web-WestUS" -Name "ContosoASP" -PerSiteScaling $true
    ```

    This command sets the PerSiteScaling option to true on the App Service plan named ContosoASP
        that belongs to the resource group named Default-Web-WestUS.
