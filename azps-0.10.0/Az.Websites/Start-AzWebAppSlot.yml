syntaxes:
- syntax: |-
    ```Syntax
    Start-AzWebAppSlot
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Slot] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S1
  isDefault: false
- syntax: |-
    ```Syntax
    Start-AzWebAppSlot
        [-WebApp] <Site>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S2
  isDefault: false
inputs:
- name: <xref href="Site" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'WebApp' accepts value of type 'Site' from the pipeline
examples:
- title: Example 1
  description: |-
    ```
    PS C:\>Start-AzWebAppSlot -ResourceGroupName "Default-Web-WestUS" -Name "ContosoWebApp" -Slot "Slot001"
    ```

    This command starts the Slot named Slot001 pertaining to the Web App named ContosoWebApp that belongs to the resource group named Default-Web-WestUS.
