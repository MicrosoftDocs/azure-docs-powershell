uid: Az.Websites.Start-AzWebAppSlot
name: Start-AzWebAppSlot
module: Az.Websites
isPreview: false
summary: |-
  Starts an Azure Web App slot.
description: |-
  The **Start-AzWebAppSlot** cmdlet starts an Azure Web App Slot.
