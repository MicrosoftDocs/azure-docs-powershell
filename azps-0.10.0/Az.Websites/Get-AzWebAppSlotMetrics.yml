syntaxes:
- syntax: |-
    ```Syntax
    Get-AzWebAppSlotMetrics
        [-Metrics] <String[]>
        [-StartTime] <DateTime>
        [[-EndTime] <DateTime>]
        [-Granularity] <String>
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Slot] <String>
        [-InstanceDetails]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S1
  isDefault: false
- syntax: |-
