syntaxes:
- syntax: |-
    ```Syntax
    Switch-AzWebAppSlot
        [-SourceSlotName] <String>
        [[-DestinationSlotName] <String>]
        [[-SwapWithPreviewAction] <SwapWithPreviewAction>]
        [[-PreserveVnet] <Boolean>]
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: S1
  isDefault: false
- syntax: |-
    ```Syntax
    Switch-AzWebAppSlot
        [-SourceSlotName] <String>
        [[-DestinationSlotName] <String>]
        [[-SwapWithPreviewAction] <SwapWithPreviewAction>]
        [[-PreserveVnet] <Boolean>]
        [-WebApp] <Site>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: S2
  isDefault: false
inputs:
- name: <xref href="Site" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'WebApp' accepts value of type 'Site' from the pipeline
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Switch-AzWebAppSlot -SourceSlotName "sourceslot" -DestinationSlotName "destinationslot" -ResourceGroupName "Default-Web-WestUS" -Name "ContosoWebApp"
    ```

    This command will switch slot "sourceslot" slot with "destinationslot" for for Web App ContosoWebApp associated with the resource group Default-Web-WestUS
