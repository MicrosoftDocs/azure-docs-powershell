syntaxes:
- syntax: |-
    ```Syntax
    Get-AzAppServicePlanMetrics
        [-Metrics] <String[]>
        [-StartTime] <DateTime>
        [[-EndTime] <DateTime>]
        [-Granularity] <String>
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-InstanceDetails]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S1
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzAppServicePlanMetrics
        [-Metrics] <String[]>
        [-StartTime] <DateTime>
        [[-EndTime] <DateTime>]
        [-Granularity] <String>
        [-AppServicePlan] <AppServicePlan>
        [-InstanceDetails]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S2
