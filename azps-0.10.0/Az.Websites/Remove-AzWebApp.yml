syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzWebApp
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: S1
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzWebApp
        [-WebApp] <Site>
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: S2
  isDefault: false
