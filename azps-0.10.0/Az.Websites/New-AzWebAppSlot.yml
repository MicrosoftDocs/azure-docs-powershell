syntaxes:
- syntax: |-
    ```Syntax
    New-AzWebAppSlot
        [-ResourceGroupName] <String>
        [-Name] <String>
        [[-Slot] <String>]
        [[-AppServicePlan] <String>]
        [[-SourceWebApp] <Site>]
        [-IgnoreSourceControl]
        [-IgnoreCustomHostNames]
        [[-AppSettingsOverrides] <Hashtable>]
        [[-AseName] <String>]
        [[-AseResourceGroupName] <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Site" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'SourceWebApp' accepts value of type 'Site' from the pipeline
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> New-AzWebAppSlot -ResourceGroupName Default-Web-WestUS -Name "ContosoSite" -AppServicePlan "ContosoServicePlan" -Slot "Slot001"
    ```

    This command creates a Slot named Slot001 under an existing Web App names ContosoSite in the existing resource group named Default-Web-WestUS in data center West US.
    The command uses an existing App Service plan named ContosoServicePlan.
