uid: Az.Websites.Get-AzWebAppSlot
name: Get-AzWebAppSlot
module: Az.Websites
isPreview: false
summary: |-
  Gets an Azure Web App slot.
description: |-
  The **Get-AzWebAppSlot** cmdlet gets information about an Azure Web App Slot.
