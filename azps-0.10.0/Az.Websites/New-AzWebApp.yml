syntaxes:
- syntax: |-
    ```Syntax
    New-AzWebApp
        [[-ResourceGroupName] <String>]
        [-Name] <String>
        [[-Location] <String>]
        [[-AppServicePlan] <String>]
        [-AsJob]
        [-GitRepositoryPath <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SimpleParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzWebApp
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        [[-AppServicePlan] <String>]
        [-SourceWebApp] <Site>
        [[-TrafficManagerProfile] <String>]
        [[-AppSettingsOverrides] <Hashtable>]
        [[-AseName] <String>]
        [[-AseResourceGroupName] <String>]
        [-IgnoreSourceControl]
        [-IgnoreCustomHostNames]
        [-IncludeSourceWebAppSlots]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WebAppParameterSet
  isDefault: false
