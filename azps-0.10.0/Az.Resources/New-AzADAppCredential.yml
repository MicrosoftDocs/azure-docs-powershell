examples:
- title: Example 1 - Create a new application credential using a password
  description: |-
    ```
    PS C:\> $SecureStringPassword = ConvertTo-SecureString -String "password" -AsPlainText -Force
    PS C:\> New-AzADAppCredential -ObjectId aaaaaaaa-0000-1111-2222-bbbbbbbbbbbb -Password $SecureStringPassword
    ```

    A new password credential is added to the existing appplication with object id 'aaaaaaaa-0000-1111-2222-bbbbbbbbbbbb'.
- title: Example 2 - Create a new application credential using a certificate
  description: |-
    ```
    PS C:\> $cer = New-Object System.Security.Cryptography.X509Certificates.X509Certificate
    PS C:\> $cer.Import("C:\myapp.cer")
    PS C:\> $binCert = $cer.GetRawCertData()
    PS C:\> $credValue = [System.Convert]::ToBase64String($binCert)
    PS C:\> New-AzADAppCredential -ApplicationId 00001111-aaaa-2222-bbbb-3333cccc4444 -CertValue $credValue -StartDate $cer.GetEffectiveDateString() -EndDate $cer.GetExpirationDateString()
    ```

    The supplied base64 encoded public X509 certificate ("myapp.cer") is added to the existing application with application id '00001111-aaaa-2222-bbbb-3333cccc4444'.
- title: Example 3 - Create a new application credential using piping
  description: |-
    ```
    PS C:\> $SecureStringPassword = ConvertTo-SecureString -String "password" -AsPlainText -Force
    PS C:\> Get-AzADApplication -ObjectId aaaaaaaa-0000-1111-2222-bbbbbbbbbbbb | New-AzADAppCredential -Password $SecureStringPassword
    ```

    Gets the application with object id 'aaaaaaaa-0000-1111-2222-bbbbbbbbbbbb' and pipes that to the New-AzADAppCredential to create a new application credential for that application with the given password.
