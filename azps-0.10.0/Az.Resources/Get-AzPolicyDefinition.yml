examples:
- title: 'Example 1: Get all policy definitions'
  description: |-
    ```
    PS C:\> Get-AzPolicyDefinition
    ```

    This command gets all the policy definitions.
- title: 'Example 2: Get policy definition from current subscription by name'
  description: |-
    ```
    PS C:\> Get-AzPolicyDefinition -Name 'VMPolicyDefinition'
    ```

    This command gets the policy definition named VMPolicyDefinition from the current default subscription.
- title: 'Example 3: Get policy definition from management group by name'
  description: |-
    ```
    PS C:\> Get-AzPolicyDefinition -Name 'VMPolicyDefinition' -ManagementGroupName 'Dept42'
    ```

    This command gets the policy definition named VMPolicyDefinition from the management group named Dept42.
- title: 'Example 4: Get all built-in policy definitions from subscription'
  description: |-
    ```
    PS C:\> Get-AzPolicyDefinition -SubscriptionId 'aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e' -Builtin
    ```

    This command gets all built-in policy definitions from the subscription with ID aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e.
