syntaxes:
- syntax: |-
    ```Syntax
    New-AzManagedApplication
        -Name <String>
        -ResourceGroupName <String>
        -ManagedResourceGroupName <String>
        [-ManagedApplicationDefinitionId <String>]
        -Location <String>
        [-Parameter <String>]
        -Kind <ApplicationKind>
        [-Plan <Hashtable>]
        [-Tag <Hashtable>]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
