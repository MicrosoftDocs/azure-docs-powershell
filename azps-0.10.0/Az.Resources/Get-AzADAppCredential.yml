      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ApplicationObject
    type: <xref href="Microsoft.Azure.Graph.RBAC.Version1_6.ActiveDirectory.PSADApplication" data-throw-if-not-resolved="False" />
    description: |-
      The application object to retrieve credentials from.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ApplicationObjectParameterSet
      position: Named
