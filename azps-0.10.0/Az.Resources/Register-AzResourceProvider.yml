uid: Az.Resources.Register-AzResourceProvider
name: Register-AzResourceProvider
module: Az.Resources
isPreview: false
summary: |-
  Registers a resource provider.
description: |-
  The **Register-AzResourceProvider** cmdlet registers an Azure resource provider.
