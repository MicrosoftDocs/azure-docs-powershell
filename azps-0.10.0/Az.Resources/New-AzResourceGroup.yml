    ```Syntax
    New-AzResourceGroup
        -Name <String>
        -Location <String>
        [-Tag <Hashtable>]
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
