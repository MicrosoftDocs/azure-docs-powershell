syntaxes:
- syntax: |-
    ```Syntax
    Set-AzManagedApplication
        -Name <String>
        -ResourceGroupName <String>
        [-ManagedResourceGroupName <String>]
        [-ManagedApplicationDefinitionId <String>]
        [-Parameter <String>]
        [-Kind <String>]
        [-Plan <Hashtable>]
        [-Tag <Hashtable>]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByNameAndResourceGroup
  isDefault: true
- syntax: |-
