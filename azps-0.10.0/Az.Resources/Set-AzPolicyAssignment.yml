    Set-AzPolicyAssignment
        -Name <String>
        -Scope <String>
        [-NotScope <String[]>]
        [-DisplayName <String>]
        [-Description <String>]
        [-Metadata <String>]
        [-Sku <Hashtable>]
        [-AssignIdentity]
        [-Location <String>]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: NameParameterSet
  isDefault: true
