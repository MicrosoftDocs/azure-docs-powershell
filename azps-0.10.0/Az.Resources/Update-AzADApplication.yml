        [-AvailableToOtherTenants <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ApplicationObjectIdWithUpdateParamsParameterSet
  isDefault: true
- syntax: |-
