### YamlMime:PowerShellCmdlet1
uid: Az.Resources.Get-AzRoleDefinition
name: Get-AzRoleDefinition
module: Az.Resources
isPreview: false
summary: |-
  Lists all Azure RBAC roles that are available for assignment.
description: |-
  Use the Get-AzRoleDefinition command with a particular role name to view its details.
  To inspect individual operations that a role grants access to, review the Actions and NotActions properties of the role.
notes: |-
  Keywords: azure, Az, arm, resource, management, manager, resource, group, template, deployment
