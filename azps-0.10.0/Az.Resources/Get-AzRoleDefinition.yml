examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-AzRoleDefinition -Name Reader
    ```

    Get the Reader role definition
- title: Example 2
  description: |-
    ```
    PS C:\> Get-AzRoleDefinition
    ```

    Lists all RBAC role definitions
