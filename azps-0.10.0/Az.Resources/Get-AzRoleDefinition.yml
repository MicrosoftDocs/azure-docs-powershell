syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRoleDefinition
        [[-Name] <String>]
        [-Scope <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: RoleDefinitionNameParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRoleDefinition
        -Id <Guid>
        [-Scope <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
