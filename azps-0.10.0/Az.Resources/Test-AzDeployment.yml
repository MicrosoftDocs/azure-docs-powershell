uid: Az.Resources.Test-AzDeployment
name: Test-AzDeployment
module: Az.Resources
isPreview: false
summary: |-
  Validates a deployment.
description: |-
  The **Test-AzDeployment** cmdlet determines whether a deployment template and its parameter values are valid.
