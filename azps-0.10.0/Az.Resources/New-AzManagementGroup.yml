syntaxes:
- syntax: |-
    ```Syntax
    New-AzManagementGroup
        [-GroupName] <String>
        [-DisplayName <String>]
        [-ParentId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: GroupOperations
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzManagementGroup
        [-GroupName] <String>
        -ParentObject <PSManagementGroup>
        [-DisplayName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
