syntaxes:
- syntax: |-
    ```Syntax
    Update-AzADUser
        -UPNOrObjectId <String>
        [-DisplayName <String>]
        [-EnableAccount <Boolean>]
        [-Password <SecureString>]
        [-ForceChangePasswordNextLogin]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UPNOrObjectIdParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzADUser
        -UserPrincipalName <String>
        [-DisplayName <String>]
        [-EnableAccount <Boolean>]
        [-Password <SecureString>]
        [-ForceChangePasswordNextLogin]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UPNParameterSet
  isDefault: false
- syntax: |-
