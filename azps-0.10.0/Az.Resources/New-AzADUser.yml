syntaxes:
- syntax: |-
    ```Syntax
    New-AzADUser
        -DisplayName <String>
        -UserPrincipalName <String>
        -Password <SecureString>
        [-ImmutableId <String>]
        [-MailNickname <String>]
        [-ForceChangePasswordNextLogin]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
