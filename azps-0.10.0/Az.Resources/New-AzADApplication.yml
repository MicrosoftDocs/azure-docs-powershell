syntaxes:
- syntax: |-
    ```Syntax
    New-AzADApplication
        -DisplayName <String>
        -IdentifierUris <String[]>
        [-HomePage <String>]
        [-ReplyUrls <String[]>]
        [-AvailableToOtherTenants <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ApplicationWithoutCredentialParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzADApplication
        -DisplayName <String>
        -IdentifierUris <String[]>
        -Password <SecureString>
        [-HomePage <String>]
        [-ReplyUrls <String[]>]
        [-AvailableToOtherTenants <Boolean>]
        [-StartDate <DateTime>]
        [-EndDate <DateTime>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ApplicationWithPasswordPlainParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzADApplication
        -DisplayName <String>
        -IdentifierUris <String[]>
        -PasswordCredentials <PSADPasswordCredential[]>
        [-HomePage <String>]
        [-ReplyUrls <String[]>]
        [-AvailableToOtherTenants <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ApplicationWithPasswordCredentialParameterSet
  isDefault: false
- syntax: |-
