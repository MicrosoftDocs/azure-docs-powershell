examples:
- title: Example 1 - Create new Microsoft Entra application.
  description: |-
    ```
    PS C:\> New-AzADApplication -DisplayName "NewApplication" -HomePage "http://www.microsoft.com" -IdentifierUris "http://NewApplication"
    ```

    Creates a new Microsoft Entra application without any credentials.
- title: Example 2 - Create new Microsoft Entra application with password.
  description: |-
    ```
    PS C:\> $SecureStringPassword = ConvertTo-SecureString -String "password" -AsPlainText -Force
    PS C:\> New-AzADApplication -DisplayName "NewApplication" -HomePage "http://www.microsoft.com" -IdentifierUris "http:
    //NewApplication" -Password $SecureStringPassword
    ```

    Creates a new Microsoft Entra application and associates password credentials with it.
