- syntax: |-
    ```Syntax
    Get-AzManagementGroup
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ListOperation
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzManagementGroup
        [-GroupName] <String>
