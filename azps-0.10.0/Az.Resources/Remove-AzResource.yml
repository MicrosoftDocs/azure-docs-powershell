syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzResource
        -ResourceId <String>
        [-AsJob]
        [-ODataQuery <String>]
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceId
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzResource
        -ResourceName <String>
        -ResourceType <String>
        [-AsJob]
        [-ExtensionResourceName <String>]
        [-ExtensionResourceType <String>]
        [-ODataQuery <String>]
        [-ResourceGroupName <String>]
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BySubscriptionLevel
  isDefault: false
- syntax: |-
