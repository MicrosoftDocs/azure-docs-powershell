syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDeployment
        [-Name] <String>
        [-AsJob]
        [-PassThru]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByDeploymentName
  isDefault: true
