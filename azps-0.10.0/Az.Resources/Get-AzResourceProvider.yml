syntaxes:
- syntax: |-
    ```Syntax
    Get-AzResourceProvider
        [-Location <String>]
        [-ListAvailable]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListAvailable
  isDefault: true
- syntax: |-
