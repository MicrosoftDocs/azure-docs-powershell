### YamlMime:PowerShellCmdlet1
uid: Az.Storage.New-AzStorageAccount
name: New-AzStorageAccount
module: Az.Storage
isPreview: false
summary: |-
  Creates a Storage account.
description: |-
  The **New-AzStorageAccount** cmdlet creates an Azure Storage account.
parameters:
  cmdletParameters:
  - name: AccessTier
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the access tier of the Storage account that this cmdlet creates.
      The acceptable values for this parameter are: Hot and Cool.
      If you specify a value of BlobStorage for the *Kind* parameter, you must specify a value for the
      *AccessTier* parameter. If you specify a value of Storage for this *Kind* parameter, do not specify
      the *AccessTier* parameter.
    acceptedValues:
    - Hot
    - Cool
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AsJob
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Run cmdlet in the background
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AssignIdentity
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Generate and assign a new Storage account Identity for this Storage account for use with key management services like Azure KeyVault.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CustomDomainName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the custom domain of the Storage account.
      The default value is Storage.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
