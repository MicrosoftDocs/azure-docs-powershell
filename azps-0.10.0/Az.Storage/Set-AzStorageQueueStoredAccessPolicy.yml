syntaxes:
- syntax: |-
    ```Syntax
    Set-AzStorageQueueStoredAccessPolicy
        [-Queue] <String>
        [-Policy] <String>
        [-Permission <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-NoStartTime]
        [-NoExpiryTime]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
