uid: Az.Storage.Remove-AzStorageContainer
name: Remove-AzStorageContainer
module: Az.Storage
isPreview: false
summary: |-
  Removes the specified storage container.
description: |-
  The **Remove-AzStorageContainer** cmdlet removes the specified storage container in Azure.
