syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStorageFileContent
        [-ShareName] <String>
        [-Path] <String>
        [[-Destination] <String>]
        [-CheckMd5]
        [-PassThru]
        [-Force]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ShareName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzStorageFileContent
        [-Share] <CloudFileShare>
        [-Path] <String>
        [[-Destination] <String>]
        [-CheckMd5]
        [-PassThru]
        [-Force]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Share
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzStorageFileContent
        [-Directory] <CloudFileDirectory>
        [-Path] <String>
        [[-Destination] <String>]
        [-CheckMd5]
        [-PassThru]
        [-Force]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Directory
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzStorageFileContent
        [-File] <CloudFile>
        [[-Destination] <String>]
        [-CheckMd5]
        [-PassThru]
        [-Force]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: File
  isDefault: false
