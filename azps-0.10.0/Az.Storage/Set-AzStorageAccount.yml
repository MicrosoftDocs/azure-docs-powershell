syntaxes:
- syntax: |-
    ```Syntax
    Set-AzStorageAccount
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Force]
        [-SkuName <String>]
        [-AccessTier <String>]
        [-CustomDomainName <String>]
        [-UseSubDomain <Boolean>]
        [-Tag <Hashtable>]
        [-EnableHttpsTrafficOnly <Boolean>]
        [-StorageEncryption]
        [-AssignIdentity]
        [-NetworkRuleSet <PSNetworkRuleSet>]
        [-UpgradeToStorageV2]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StorageEncryption
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzStorageAccount
        [-ResourceGroupName] <String>
        [-Name] <String>
        -KeyName <String>
        -KeyVersion <String>
        -KeyVaultUri <String>
        [-Force]
        [-SkuName <String>]
        [-AccessTier <String>]
        [-CustomDomainName <String>]
        [-UseSubDomain <Boolean>]
        [-Tag <Hashtable>]
        [-EnableHttpsTrafficOnly <Boolean>]
        [-KeyvaultEncryption]
        [-AssignIdentity]
        [-NetworkRuleSet <PSNetworkRuleSet>]
        [-UpgradeToStorageV2]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: KeyvaultEncryption
  isDefault: false
