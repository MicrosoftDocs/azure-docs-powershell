      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="Microsoft.WindowsAz.Storage.SharedAccessProtocol" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the protocol permitted for a request.
      The acceptable values for this parameter are:
      * HttpsOnly
      * HttpsOrHttp
