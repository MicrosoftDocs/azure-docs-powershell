syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageContainerSASToken
        [-Name] <String>
        -Policy <String>
        [-Protocol <SharedAccessProtocol>]
        [-IPAddressOrRange <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-FullUri]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SasPolicy
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzStorageContainerSASToken
        [-Name] <String>
        [-Permission <String>]
        [-Protocol <SharedAccessProtocol>]
        [-IPAddressOrRange <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-FullUri]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SasPermission
  isDefault: false
