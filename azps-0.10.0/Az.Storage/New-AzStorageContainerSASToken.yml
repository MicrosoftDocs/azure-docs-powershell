### YamlMime:PowerShellCmdlet1
uid: Az.Storage.New-AzStorageContainerSASToken
name: New-AzStorageContainerSASToken
module: Az.Storage
isPreview: false
summary: |-
  Generates an SAS token for an Azure storage container.
description: |-
  The **New-AzStorageContainerSASToken** cmdlet generates a Shared Access Signature (SAS) token for an Azure storage container.
parameters:
  cmdletParameters:
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure storage context.
      You can create it by using the New-AzStorageContext cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExpiryTime
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.DateTime" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the time at which the shared access signature becomes invalid.
      If the user sets the start time but not the expiry time, the expiry time is set to the start time plus one hour.
      If neither the start time nor the expiry time is specified, the expiry time is set to the current time plus one hour.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FullUri
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet return the full blob URI and the shared access signature token.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IPAddressOrRange
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address or range of IP addresses from which to accept requests, such as 168.1.5.65 or 168.1.5.60-168.1.5.70.
      The range is inclusive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
