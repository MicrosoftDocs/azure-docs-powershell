- syntax: |-
    ```Syntax
    New-AzStorageTableStoredAccessPolicy
        [-Table] <String>
        [-Policy] <String>
        [-Permission <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
