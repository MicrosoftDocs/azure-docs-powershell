### YamlMime:PowerShellCmdlet1
uid: Az.Storage.New-AzStorageAccountSASToken
name: New-AzStorageAccountSASToken
module: Az.Storage
isPreview: false
summary: |-
  Creates an account-level SAS token.
description: |-
  The **New-AzStorageSASToken** cmdlet creates an account-level shared access signature (SAS) token for an Azure Storage account.
  You can use the SAS token to delegate permissions for multiple services, or to delegate permissions for services not available with an object-level SAS token.
parameters:
  cmdletParameters:
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure storage context.
      You can use the New-AzStorageContext cmdlet to get an **AzureStorageContext** object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExpiryTime
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.DateTime" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the time at which the shared access signature becomes invalid.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IPAddressOrRange
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address or range of IP addresses from which to accept requests, such as 168.1.5.65 or 168.1.5.60-168.1.5.70.
      The range is inclusive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Permission
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the permissions for Storage account.
      Permissions are valid only if they match the specified resource type.
      It is important to note that this is a string, like `rwd` (for Read, Write and Delete).
      For more information about acceptable permission values, see Constructing an Account SAS http://go.microsoft.com/fwlink/?LinkId=799514
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="Microsoft.WindowsAz.Storage.SharedAccessProtocol" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the protocol permitted for a request made with the account SAS.
      The acceptable values for this parameter are:
      - HttpsOnly
      - HttpsOrHttp
      The default value is HttpsOrHttp.
    acceptedValues:
    - HttpsOnly
    - HttpsOrHttp
    defaultValue: None
