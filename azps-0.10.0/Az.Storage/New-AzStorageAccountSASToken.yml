    supportsWildcards: false
  - name: Service
    type: <xref href="Microsoft.WindowsAz.Storage.SharedAccessAccountServices" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the service.
      The acceptable values for this parameter are:
      - None
