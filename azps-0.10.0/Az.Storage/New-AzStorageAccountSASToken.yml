      - File
      - Queue
      - Table
    acceptedValues:
    - None
    - Blob
    - File
    - Queue
    - Table
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
