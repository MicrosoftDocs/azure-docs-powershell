### YamlMime:PowerShellCmdlet1
uid: Az.Storage.Get-AzStorageContainer
name: Get-AzStorageContainer
module: Az.Storage
isPreview: false
summary: |-
  Lists the storage containers.
description: |-
  The **Get-AzStorageContainer** cmdlet lists the storage containers associated with the storage account in Azure.
parameters:
  cmdletParameters:
  - name: ClientTimeoutPerRequest
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the client-side time-out interval, in seconds, for one service request.
      If the previous call fails in the specified interval, this cmdlet retries the request.
      If this cmdlet does not receive a successful response before the interval elapses, this cmdlet returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentTaskCount
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the maximum concurrent network calls.
      You can use this parameter to limit the concurrency to throttle local CPU and bandwidth usage by specifying the maximum number of concurrent network calls.
      The specified value is an absolute count and is not multiplied by the core count.
      This parameter can help reduce network connection problems in low bandwidth environments, such as 100 kilobits per second.
      The default value is 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the storage context.
      To create it, you can use the New-AzStorageContext cmdlet.
      The cmdlet will fail when you use a storage context created from SAS Token because the cmdlet will query for container permissions which require Storage account key permission.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ContinuationToken
    type: <xref href="Microsoft.WindowsAz.Storage.Blob.BlobContinuationToken" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a continuation token for the blob list.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxCount
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the maximum number of objects that this cmdlet returns.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the container name.
      If container name is empty, the cmdlet lists all the containers.
      Otherwise, it lists all containers that match the specified name or the regular name pattern.
    aliases:
    - N
    - Container
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ContainerName
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Prefix
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a prefix used in the name of the container or containers you want to get.
      You can use this to find all containers that start with the same string, such as "my" or "test".
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ContainerPrefix
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerTimeoutPerRequest
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the service side time-out interval, in seconds, for a request.
      If the specified interval elapses before the service processes the request, the storage service returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStorageContainer
        [[-Name] <String>]
        [-MaxCount <Int32>]
        [-ContinuationToken <BlobContinuationToken>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: ContainerName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzStorageContainer
        -Prefix <String>
        [-MaxCount <Int32>]
        [-ContinuationToken <BlobContinuationToken>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: ContainerPrefix
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IStorageContext" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.Common.Storage.ResourceModel.AzureStorageContainer" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get Azure Storage blob by name'
  description: |-
    ```
    PS C:\>Get-AzStorageContainer -Name container*
    ```

    This example uses a wildcard character to return a list of all containers with a name that starts with container.
- title: 'Example 2: Get Azure Storage container by container name prefix'
  description: |-
    ```
    PS C:\>Get-AzStorageContainer -Prefix "container"
    ```

    This example uses the *Prefix* parameter to return a list of all containers with a name that starts with container.
