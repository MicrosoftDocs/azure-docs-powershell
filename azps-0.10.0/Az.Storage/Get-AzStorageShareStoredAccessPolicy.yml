outputs:
- name: <xref href="Microsoft.WindowsAz.Storage.File.SharedAccessFilePolicy" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a stored access policy in a share'
  description: |-
    ```
    PS C:\>Get-AzStorageShareStoredAccessPolicy -ShareName "ContosoShare" -Policy "GeneralPolicy"
    ```

    This command gets a stored access policy named GeneralPolicy in ContosoShare.
- title: 'Example 2: Get all the stored access policies in share'
  description: |-
    ```
    PS C:\>Get-AzStorageShareStoredAccessPolicy -ShareName "ContosoShare"
    ```

    This command gets all stored access policies in ContosoShare.
