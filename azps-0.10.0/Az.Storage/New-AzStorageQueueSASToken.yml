syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageQueueSASToken
        [-Name] <String>
        -Policy <String>
        [-Protocol <SharedAccessProtocol>]
        [-IPAddressOrRange <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-FullUri]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SasPolicy
  isDefault: false
