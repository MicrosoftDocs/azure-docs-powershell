    Remove-AzStorageAccountNetworkRule
        [-ResourceGroupName] <String>
        [-Name] <String>
        -IPAddressOrRange <String[]>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
