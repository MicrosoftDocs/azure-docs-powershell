syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzStorageAccountNetworkRule
        [-ResourceGroupName] <String>
        [-Name] <String>
        -VirtualNetworkResourceId <String[]>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NetWorkRuleString
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzStorageAccountNetworkRule
        [-ResourceGroupName] <String>
        [-Name] <String>
        -IPRule <PSIpRule[]>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IpRuleObject
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzStorageAccountNetworkRule
        [-ResourceGroupName] <String>
        [-Name] <String>
        -VirtualNetworkRule <PSVirtualNetworkRule[]>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NetworkRuleObject
  isDefault: false
- syntax: |-
