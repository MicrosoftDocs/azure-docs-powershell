syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzStorageBlob
        [-Blob] <String>
        [-Container] <String>
        [-DeleteSnapshot]
        [-Force]
        [-PassThru]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NamePipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzStorageBlob
        -CloudBlob <CloudBlob>
        [-DeleteSnapshot]
        [-Force]
        [-PassThru]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BlobPipeline
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzStorageBlob
        [-Blob] <String>
        -CloudBlobContainer <CloudBlobContainer>
        [-DeleteSnapshot]
        [-Force]
        [-PassThru]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ContainerPipeline
  isDefault: false
