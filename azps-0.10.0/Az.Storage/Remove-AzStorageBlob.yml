### YamlMime:PowerShellCmdlet1
uid: Az.Storage.Remove-AzStorageBlob
name: Remove-AzStorageBlob
module: Az.Storage
isPreview: false
summary: |-
  Removes the specified storage blob.
description: |-
  The **Remove-AzStorageBlob** cmdlet removes the specified blob from a storage account in Azure.
