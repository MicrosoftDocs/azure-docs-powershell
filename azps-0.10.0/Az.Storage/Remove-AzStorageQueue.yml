examples:
- title: 'Example 1: Remove a storage queue by name'
  description: |-
    ```
    PS C:\>Remove-AzStorageQueue "ContosoQueue01"
    ```

    This command removes a queue named ContosoQueue01.
- title: 'Example 2: Remove multiple storage queues'
  description: |-
    ```
    PS C:\>Get-AzStorageQueue "Contoso*" | Remove-AzStorageQueue
    ```

    This command removes all queues with names that start with Contoso.
