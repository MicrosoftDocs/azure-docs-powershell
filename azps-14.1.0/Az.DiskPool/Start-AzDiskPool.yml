syntaxes:
- syntax: |-
    ```Syntax
    Start-AzDiskPool
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Start
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzDiskPool
        -InputObject <IDiskPoolIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StartViaIdentity
  isDefault: false
