syntaxes:
- syntax: |-
    ```Syntax
    New-AzDiskPool
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        -SkuName <String>
        -SubnetId <String>
        [-SubscriptionId <String>]
        [-AdditionalCapability <String[]>]
        [-AvailabilityZone <String[]>]
        [-DiskId <String[]>]
        [-ManagedBy <String>]
        [-ManagedByExtended <String[]>]
        [-SkuTier <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
