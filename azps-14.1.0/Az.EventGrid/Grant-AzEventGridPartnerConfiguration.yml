    Grant-AzEventGridPartnerConfiguration
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AuthorizationExpirationTimeInUtc <DateTime>]
        [-PartnerName <String>]
        [-PartnerRegistrationImmutableId <String>]
