uid: Az.Network.New-AzApplicationGatewayFirewallCondition
name: New-AzApplicationGatewayFirewallCondition
module: Az.Network
isPreview: false
summary: |-
  Creates a match condition for custom rule
description: |-
  The **New-AzApplicationGatewayFirewallCondition** creates a match condition for firewall custom rule.
