uid: Az.Network.Update-AzRouteServer
name: Update-AzRouteServer
module: Az.Network
isPreview: false
summary: |-
  Update an Azure RouteServer.
description: |-
  The **Update-AzRouteServer** cmdlet switches the branch-to-branch traffic to an Azure RouteServer.
