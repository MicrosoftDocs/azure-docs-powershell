### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzVpnConnection
name: New-AzVpnConnection
module: Az.Network
isPreview: false
summary: |-
  Creates a IPSec connection that connects a VpnGateway to a remote customer branch represented in RM as a VpnSite.
description: |-
