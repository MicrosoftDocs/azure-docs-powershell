    		ProvisioningState	        : null
    		ResourceGroupName	        : "TestRg"
    		ResourceGuid	            : null
    		RuleCollectionGroups	    : null
    		Sku
    			Tier	                : "Standard"
    		Snat
    			AutoLearnPrivateRanges	: null
    			PrivateRanges	        : null
    		SqlSetting	                : null
