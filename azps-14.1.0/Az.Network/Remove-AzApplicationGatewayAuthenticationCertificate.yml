syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzApplicationGatewayAuthenticationCertificate
        -Name <String>
        -ApplicationGateway <PSApplicationGateway>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
