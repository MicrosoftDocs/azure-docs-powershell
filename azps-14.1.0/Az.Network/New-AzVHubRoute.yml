syntaxes:
- syntax: |-
    ```Syntax
    New-AzVHubRoute
        -Destination <String[]>
        -DestinationType <String>
        -NextHop <String>
        -Name <String>
        -NextHopType <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
