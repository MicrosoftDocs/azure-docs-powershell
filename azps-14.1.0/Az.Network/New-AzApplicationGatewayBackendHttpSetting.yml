uid: Az.Network.New-AzApplicationGatewayBackendHttpSetting
name: New-AzApplicationGatewayBackendHttpSetting
module: Az.Network
isPreview: false
summary: |-
  Creates back-end HTTP setting for an application gateway.
description: |-
  The New-AzApplicationGatewayBackendHttpSetting cmdlet creates back-end HTTP settings for an application gateway.
  Back-end HTTP settings are applied to all back-end servers in a pool.
