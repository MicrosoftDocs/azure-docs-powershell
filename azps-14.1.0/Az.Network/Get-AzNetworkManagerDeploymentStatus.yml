syntaxes:
- syntax: |-
    ```Syntax
    Get-AzNetworkManagerDeploymentStatus
        -NetworkManagerName <String>
        -ResourceGroupName <String>
        [-Region <String[]>]
        [-DeploymentType <String[]>]
        [-SkipToken <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
