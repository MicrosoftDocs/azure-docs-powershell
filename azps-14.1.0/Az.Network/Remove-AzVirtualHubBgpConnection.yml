syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzVirtualHubBgpConnection
        -ResourceGroupName <String>
        -VirtualHubName <String>
        -Name <String>
        [-AsJob]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByVirtualHubName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzVirtualHubBgpConnection
        -Name <String>
        -VirtualHub <PSVirtualHub>
        [-AsJob]
