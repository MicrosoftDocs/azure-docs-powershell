- syntax: |-
    ```Syntax
    Remove-AzLoadBalancerFrontendIpConfig
        -LoadBalancer <PSLoadBalancer>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
