syntaxes:
- syntax: |-
    ```Syntax
    Set-AzApplicationGatewayCustomError
        -ApplicationGateway <PSApplicationGateway>
        -StatusCode <String>
        -CustomErrorPageUrl <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
