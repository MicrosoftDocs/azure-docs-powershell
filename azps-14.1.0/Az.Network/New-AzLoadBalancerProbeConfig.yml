syntaxes:
- syntax: |-
    ```Syntax
    New-AzLoadBalancerProbeConfig
        -Name <String>
        [-Protocol <String>]
        -Port <Int32>
        -IntervalInSeconds <Int32>
        -ProbeCount <Int32>
        [-ProbeThreshold <Int32>]
        [-RequestPath <String>]
        [-NoHealthyBackendsBehavior <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
