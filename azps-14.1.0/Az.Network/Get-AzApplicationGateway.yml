### YamlMime:PowerShellCmdlet1
uid: Az.Network.Get-AzApplicationGateway
name: Get-AzApplicationGateway
module: Az.Network
isPreview: false
summary: |-
  Gets an application gateway.
description: |-
  The **Get-AzApplicationGateway** cmdlet gets an application gateway.
