syntaxes:
- syntax: |-
    ```Syntax
    New-AzRouteTable
        -ResourceGroupName <String>
        -Name <String>
        [-DisableBgpRoutePropagation]
        -Location <String>
        [-Tag <Hashtable>]
        [-Route <PSRoute[]>]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
