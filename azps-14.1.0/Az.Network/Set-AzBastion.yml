                               "PrivateIpAllocationMethod": "Dynamic",
                               "Name": "IpConf",
                               "Etag": "W/\"000\"",
                               "Id": "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyRg/providers/Microsoft.Network/bastionHosts/MyBastion/bastionHostIpConfigurations/IpConf"
