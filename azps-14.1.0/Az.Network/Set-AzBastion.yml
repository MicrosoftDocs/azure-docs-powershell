### YamlMime:PowerShellCmdlet1
uid: Az.Network.Set-AzBastion
name: Set-AzBastion
module: Az.Network
isPreview: false
summary: |-
  Updates the Bastion Resource.
description: |-
  The **Set-AzBastion** cmdlet can be used to update the Sku, Scale Units or Tags of an existing BastionHost resource.
