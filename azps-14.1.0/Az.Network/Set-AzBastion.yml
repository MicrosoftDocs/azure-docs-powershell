examples:
- title: Example 1
  description: |-
    ```powershell
    Set-AzBastion -InputObject $bastionObj -Sku "Standard" -ScaleUnit 10 -Force
    ```

    ```output
    Name                 : MyBastion
    Id                   : /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/MyRg/providers/Microsoft.Network/bastionHosts/MyBastion
