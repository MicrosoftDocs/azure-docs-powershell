syntaxes:
- syntax: |-
    ```Syntax
    Add-AzRouteFilterRuleConfig
        -RouteFilter <PSRouteFilter>
        [-Force]
        -Name <String>
        -Access <String>
        -RouteFilterRuleType <String>
        -CommunityList <String[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
