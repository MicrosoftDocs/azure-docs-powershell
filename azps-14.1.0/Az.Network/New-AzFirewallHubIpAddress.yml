      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PrivateIPAddress
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The private Ip Address of the Firewall attached to a Hub
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
