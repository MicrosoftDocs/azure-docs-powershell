syntaxes:
- syntax: |-
    ```Syntax
    New-AzFirewallApplicationRule
        -Name <String>
        -TargetFqdn <String[]>
        -Protocol <String[]>
        [-Description <String>]
        [-SourceAddress <String[]>]
        [-SourceIpGroup <String[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TargetFqdn
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzFirewallApplicationRule
        -Name <String>
        -FqdnTag <String[]>
        [-Description <String>]
        [-SourceAddress <String[]>]
        [-SourceIpGroup <String[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FqdnTag
  isDefault: false
