### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzFirewallApplicationRule
name: New-AzFirewallApplicationRule
module: Az.Network
isPreview: false
summary: |-
  Creates a Firewall Application Rule.
description: |-
  The **New-AzFirewallApplicationRule** cmdlet creates an application rule for Azure Firewall.
