syntaxes:
- syntax: |-
    ```Syntax
    Add-AzApplicationGatewayHttpListenerCustomError
        -HttpListener <PSApplicationGatewayHttpListener>
        -StatusCode <String>
        -CustomErrorPageUrl <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
