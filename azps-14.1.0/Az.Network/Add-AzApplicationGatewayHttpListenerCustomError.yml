uid: Az.Network.Add-AzApplicationGatewayHttpListenerCustomError
name: Add-AzApplicationGatewayHttpListenerCustomError
module: Az.Network
isPreview: false
summary: |-
  Adds a custom error to a http listener of an application gateway.
description: |-
  The **Add-AzApplicationGatewayCustomError** cmdlet adds a custom error to a http listener of an application gateway.
