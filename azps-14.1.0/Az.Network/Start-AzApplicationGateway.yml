syntaxes:
- syntax: |-
    ```Syntax
    Start-AzApplicationGateway
        -ApplicationGateway <PSApplicationGateway>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGateway" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGateway" data-throw-if-not-resolved="False" />
examples:
- title: 'Example1: Start an application gateway'
  description: |-
    ```powershell
    $AppGw = Get-AzApplicationGateway -Name Test -ResourceGroupName Appgwtest
    Start-AzApplicationGateway -ApplicationGateway $AppGw
    ```

    This command starts the application gateway stored in the $AppGw variable.
