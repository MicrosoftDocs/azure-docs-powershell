uid: Az.Network.Start-AzApplicationGateway
name: Start-AzApplicationGateway
module: Az.Network
isPreview: false
summary: |-
  Starts an application gateway.
description: |-
  The **Start-AzApplicationGateway** cmdlet starts an Azure application gateway
