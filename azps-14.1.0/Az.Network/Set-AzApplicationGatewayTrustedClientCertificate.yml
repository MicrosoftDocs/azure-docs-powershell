uid: Az.Network.Set-AzApplicationGatewayTrustedClientCertificate
name: Set-AzApplicationGatewayTrustedClientCertificate
module: Az.Network
isPreview: false
summary: |-
  Modifies the trusted client CA certificate chain of an application gateway.
description: |-
  The **Set-AzApplicationGatewayTrustedClientCertificate** cmdlet modifies the trusted client CA certificate chain of an application gateway.
