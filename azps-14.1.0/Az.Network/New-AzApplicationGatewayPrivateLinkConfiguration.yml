syntaxes:
- syntax: |-
    ```Syntax
    New-AzApplicationGatewayPrivateLinkConfiguration
        -Name <String>
        -IpConfiguration <PSApplicationGatewayPrivateLinkIpConfiguration[]>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
