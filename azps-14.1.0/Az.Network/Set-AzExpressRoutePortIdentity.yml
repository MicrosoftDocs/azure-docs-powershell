### YamlMime:PowerShellCmdlet1
uid: Az.Network.Set-AzExpressRoutePortIdentity
name: Set-AzExpressRoutePortIdentity
module: Az.Network
isPreview: false
summary: |-
  Updates a identity assigned to an ExpressRoutePort.
description: |-
  The **Set-AzExpressRoutePortIdentity** cmdlet updates a local Azure ExpressRoutePort object. Use **Set-AzExpressRoutePort** to assign it to ExpressRoutePort.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExpressRoutePort
    type: <xref href="Microsoft.Azure.Commands.Network.Models.PSExpressRoutePort" data-throw-if-not-resolved="False" />
    description: |-
      The ExpressRoutePort
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UserAssignedIdentityId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      ResourceId of the user assigned identity to be assigned to ExpressRoutePort.
    aliases:
    - UserAssignedIdentity
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzExpressRoutePortIdentity
        -ExpressRoutePort <PSExpressRoutePort>
        -UserAssignedIdentityId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSExpressRoutePort" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSExpressRoutePort" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $exrport = Get-AzExpressRoutePort -Name $portName -ResourceGroupName $rgName
    $identity = New-AzUserAssignedIdentity -Name $identityName -ResourceGroupName $rgName -Location $location
    $exrPortIdentity = Set-AzExpressRoutePortIdentity -UserAssignedIdentity $identity.Id -ExpressRoutePort $exrPort
    $updatedExrPort = Set-AzExpressRoutePort -ExpressRoutePort $exrPort
    ```
