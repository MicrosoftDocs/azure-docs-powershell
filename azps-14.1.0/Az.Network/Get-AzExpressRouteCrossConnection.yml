examples:
- title: 'Example 1: Get the ExpressRoute cross connection'
  description: |-
    ```powershell
    Get-AzExpressRouteCrossConnection -Name $CrossConnectionName -ResourceGroupName $rg
    ```
- title: 'Example 2: List the ExpressRoute cross connections using a filter'
  description: |-
    ```powershell
    Get-AzExpressRouteCrossConnection -Name test*
    ```

    This cmdlet will list all ExpressRoute cross connections that begin with "test"
