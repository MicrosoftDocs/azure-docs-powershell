syntaxes:
- syntax: |-
    ```Syntax
    Update-AzVirtualRouterPeer
        -ResourceGroupName <String>
        -VirtualRouterName <String>
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
