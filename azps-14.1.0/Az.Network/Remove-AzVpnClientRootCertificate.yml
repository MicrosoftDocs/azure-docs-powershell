syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzVpnClientRootCertificate
        -VpnClientRootCertificateName <String>
        -VirtualNetworkGatewayName <String>
        -ResourceGroupName <String>
        -PublicCertData <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
