syntaxes:
- syntax: |-
    ```Syntax
    New-AzVirtualApplianceInboundSecurityRulesProperty
        -Name <String>
        -Protocol <String>
        -SourceAddressPrefix <String>
        [-DestinationPortRange <Int32>]
        [-DestinationPortRangeList <String[]>]
        -AppliesOn <String[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
