syntaxes:
- syntax: |-
    ```Syntax
    Get-AzNetworkVirtualApplianceConnection
        -ResourceGroupName <String>
        -VirtualApplianceName <String>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceNameParameterSet
