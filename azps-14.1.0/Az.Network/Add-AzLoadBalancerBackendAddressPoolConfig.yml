syntaxes:
- syntax: |-
    ```Syntax
    Add-AzLoadBalancerBackendAddressPoolConfig
        -LoadBalancer <PSLoadBalancer>
        -Name <String>
        [-TunnelInterface <PSTunnelInterface[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
