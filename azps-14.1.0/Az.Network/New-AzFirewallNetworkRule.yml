        [-SourceAddress <String[]>]
        [-SourceIpGroup <String[]>]
        [-DestinationAddress <String[]>]
        [-DestinationIpGroup <String[]>]
        [-DestinationFqdn <String[]>]
        -DestinationPort <String[]>
