examples:
- title: 'Example 1: Add Prefix validation config for IPv4 prefix'
  description: |-
    ```powershell
    $ckt = Get-AzExpressRouteCircuit -Name "ExpressRouteARMCircuit" -ResourceGroupName "ExpressRouteResourceGroup"
    Add-AzExpressRouteCircuitMicrosoftPeeringPrefixConfig -ExpressRouteCircuit $ckt -PeerAddressType IPv4 -Prefix "123.1.0.0/24" -ValidationId "Azure-SKEY|7c44c70b-9c62-4a89-a6b2-d281b6ce7a49|123.1.0.0/24|ASN-23" -Signature ""
    Set-AzExpressRouteCircuit -ExpressRouteCircuit $ckt
    ```
- title: 'Example 2: Add Prefix validation config for IPv6 prefix'
