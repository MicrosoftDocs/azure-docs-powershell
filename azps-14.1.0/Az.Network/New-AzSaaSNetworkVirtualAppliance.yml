syntaxes:
- syntax: |-
    ```Syntax
    New-AzSaaSNetworkVirtualAppliance
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        -VirtualHubId <String>
        -DelegatedServiceName <String>
        [-Tag <Hashtable>]
