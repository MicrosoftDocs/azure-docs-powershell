        [-GatewayType <String>]
        [-ExtendedLocation <String>]
        [-VNetExtendedLocationResourceId <String>]
        [-VpnType <String>]
        [-EnableBgp <Boolean>]
        [-DisableIPsecProtection <Boolean>]
        [-EnableActiveActiveFeature]
        [-EnableAdvancedConnectivityFeature]
        [-EnablePrivateIpAddress]
        [-GatewaySku <String>]
