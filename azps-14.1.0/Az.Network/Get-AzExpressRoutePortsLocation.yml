syntaxes:
- syntax: |-
    ```Syntax
    Get-AzExpressRoutePortsLocation
        [-LocationName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSExpressRoutePortsLocation" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzExpressRoutePortsLocation
    ```

    Lists the locations at which ExpressRoutePort resources are available.
- title: Example 2
  description: |-
    ```powershell
    Get-AzExpressRoutePortsLocation -LocationName $loc
    ```

    Lists the ExpressRoutePort bandwidths available at location $loc.
