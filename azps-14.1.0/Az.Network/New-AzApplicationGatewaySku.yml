### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzApplicationGatewaySku
name: New-AzApplicationGatewaySku
module: Az.Network
isPreview: false
summary: |-
  Creates a SKU for an application gateway.
description: |-
  The **New-AzApplicationGatewaySku** cmdlet creates a stock keeping unit (SKU) for an Azure application gateway.
parameters:
  cmdletParameters:
  - name: Capacity
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the number of instances of an application gateway.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the SKU.
      The acceptable values for this parameter are:
      - Standard_Small
      - Standard_Medium
      - Standard_Large
      - WAF_Medium
      - WAF_Large
      - Standard_v2
      - WAF_v2
      - Basic
    acceptedValues:
    - Standard_Small
    - Standard_Medium
    - Standard_Large
    - WAF_Medium
    - WAF_Large
    - Standard_v2
    - WAF_v2
    - Basic
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Tier
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the tier of the SKU.
      The acceptable values for this parameter are:
      - Standard
      - WAF
      - Standard_v2
      - WAF_v2
      - Basic
    acceptedValues:
    - Standard
    - WAF
    - Standard_v2
    - WAF_v2
    - Basic
    defaultValue: None
    dontShow: false
