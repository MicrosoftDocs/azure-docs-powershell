uid: Az.Network.Get-AzPrivateDnsZoneGroup
name: Get-AzPrivateDnsZoneGroup
module: Az.Network
isPreview: false
summary: |-
  Gets private DNS zone group
description: |-
  The **Get-AzPrivateDnsZoneGroup** cmdlet gets one or more private DNS zone groups.
