syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetworkManagerConnectivityGroupItem
        -NetworkGroupId <String>
        [-UseHubGateway]
        [-GroupConnectivity <String>]
        [-IsGlobal]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
