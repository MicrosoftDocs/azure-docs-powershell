### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzNetworkSecurityRuleConfig
name: New-AzNetworkSecurityRuleConfig
module: Az.Network
isPreview: false
summary: |-
  Creates a network security rule configuration.
description: |-
  The **New-AzNetworkSecurityRuleConfig** cmdlet creates an Azure network security rule configuration for a network security group.
parameters:
  cmdletParameters:
  - name: Access
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether network traffic is allowed or denied.
      The acceptable values for this parameter are: Allow and Deny.
    acceptedValues:
    - Allow
    - Deny
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Description
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a description of the network security rule configuration to create.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationAddressPrefix
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies a destination address prefix.
      The acceptable values for this parameter are:
      - A Classless Interdomain Routing (CIDR) address
      - A destination IP address range
      - A wildcard character (*) to match any IP address
      You can use tags such as VirtualNetwork, AzureLoadBalancer, and Internet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationApplicationSecurityGroup
