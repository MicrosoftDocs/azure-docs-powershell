syntaxes:
- syntax: |-
    ```Syntax
    New-AzFirewallPolicyExplicitProxy
        [-EnableExplicitProxy]
        [-HttpPort <Int32>]
        [-HttpsPort <Int32>]
        [-EnablePacFile]
        [-PacFilePort <Int32>]
        [-PacFile <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
