uid: Az.Network.Get-AzVirtualNetwork
name: Get-AzVirtualNetwork
module: Az.Network
isPreview: false
summary: |-
  Gets a virtual network in a resource group.
description: |-
  The **Get-AzVirtualNetwork** cmdlet gets one or more virtual networks in a resource group.
