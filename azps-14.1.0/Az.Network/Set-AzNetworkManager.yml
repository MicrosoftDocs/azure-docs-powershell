examples:
- title: Example 1
  description: |-
    ```powershell
    $networkManager = Get-AzNetworkManager -ResourceGroupName "psResourceGroup" -Name "psNetworkManager"
    $networkManager.Description = "updated description"
    Set-AzNetworkManager -InputObject $networkManager
    ```

