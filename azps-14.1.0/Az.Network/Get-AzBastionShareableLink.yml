syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBastionShareableLink
        -ResourceGroupName <String>
        -Name <String>
        [-TargetVmId <System.Collections.Generic.List`1[System.String]>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceGroupNameByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzBastionShareableLink
        -ResourceId <String>
        [-TargetVmId <System.Collections.Generic.List`1[System.String]>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceId
  isDefault: false
