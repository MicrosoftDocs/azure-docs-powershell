syntaxes:
- syntax: |-
    ```Syntax
    New-AzVpnClientIpsecParameter
        [-SALifeTime <Int32>]
        [-SADataSize <Int32>]
        [-IpsecEncryption <String>]
        [-IpsecIntegrity <String>]
        [-IkeEncryption <String>]
        [-IkeIntegrity <String>]
        [-DhGroup <String>]
        [-PfsGroup <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
