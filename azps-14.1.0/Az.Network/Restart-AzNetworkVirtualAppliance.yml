syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzNetworkVirtualAppliance
        -ResourceGroupName <String>
        -Name <String>
        [-InstanceId <String[]>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceNameParameterSet
  isDefault: true
- syntax: |-
