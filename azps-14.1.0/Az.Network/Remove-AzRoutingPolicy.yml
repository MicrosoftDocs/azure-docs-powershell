### YamlMime:PowerShellCmdlet1
uid: Az.Network.Remove-AzRoutingPolicy
name: Remove-AzRoutingPolicy
module: Az.Network
isPreview: false
summary: |-
  Removes the specified routing policy from a routing intent resource associated with a VirtualHub.
description: |-
  Removes the specified routing Policy that is associated with the specified routing intent object and returns an in-memory routing intent object which can be piped to [Set-AzRoutingIntent](./Set-AzRoutingIntent.yml) to update the actual routing intent resource.
