syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRedisEnterpriseCacheSku
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
