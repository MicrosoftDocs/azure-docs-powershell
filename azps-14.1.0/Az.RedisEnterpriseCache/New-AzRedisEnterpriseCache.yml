uid: Az.RedisEnterpriseCache.New-AzRedisEnterpriseCache
name: New-AzRedisEnterpriseCache
module: Az.RedisEnterpriseCache
isPreview: false
summary: |-
  Creates a Redis Enterprise cache.
description: |-
  Creates or updates an existing (overwrite/recreate, with potential downtime) cache cluster with an associated database.
