uid: Az.RedisEnterpriseCache.Get-AzRedisEnterpriseCacheAccessPolicyAssignment
name: Get-AzRedisEnterpriseCacheAccessPolicyAssignment
module: Az.RedisEnterpriseCache
isPreview: false
summary: |-
  Gets information about access policy assignment for database.
description: |-
  Gets information about access policy assignment for database.
