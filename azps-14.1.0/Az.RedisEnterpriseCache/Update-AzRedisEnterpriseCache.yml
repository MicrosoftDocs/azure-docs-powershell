syntaxes:
- syntax: |-
    ```Syntax
    Update-AzRedisEnterpriseCache
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Capacity <Int32>]
        [-CustomerManagedKeyEncryptionKeyUrl <String>]
        [-HighAvailability <HighAvailability>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-KeyEncryptionKeyIdentityType <CmkIdentityType>]
        [-KeyEncryptionKeyIdentityUserAssignedIdentityResourceId <String>]
        [-MinimumTlsVersion <TlsVersion>]
        [-Sku <SkuName>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzRedisEnterpriseCache
        -InputObject <IRedisEnterpriseCacheIdentity>
        [-Capacity <Int32>]
        [-CustomerManagedKeyEncryptionKeyUrl <String>]
        [-HighAvailability <HighAvailability>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-KeyEncryptionKeyIdentityType <CmkIdentityType>]
        [-KeyEncryptionKeyIdentityUserAssignedIdentityResourceId <String>]
        [-MinimumTlsVersion <TlsVersion>]
        [-Sku <SkuName>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.RedisEnterpriseCache.Models.IRedisEnterpriseCacheIdentity" data-throw-if-not-resolved="False" />
outputs:
