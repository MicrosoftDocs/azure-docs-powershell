uid: Az.Automation.Start-AzAutomationRunbook
name: Start-AzAutomationRunbook
module: Az.Automation
isPreview: false
summary: |-
  Starts a runbook job.
description: |-
  The **Start-AzAutomationRunbook** cmdlet starts an Azure Automation runbook job.
  Specify the ID or name of a runbook.
