syntaxes:
- syntax: |-
    ```Syntax
    Start-AzAutomationRunbook
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-Parameters <IDictionary>]
        [-RunOn <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByAsynchronousReturnJob
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzAutomationRunbook
        [-Name] <String>
        [-ResourceGroupName] <String>
