    Get-AzAutomationDscOnboardingMetaconfig
        [-OutputFolder <String>]
        [-ComputerName <String[]>]
        [-Force]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
