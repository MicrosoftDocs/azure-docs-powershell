syntaxes:
- syntax: |-
    ```Syntax
    Set-AzAutomationAccount
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Plan <String>]
        [-Tags <IDictionary>]
        [-AssignSystemIdentity]
        [-AssignUserIdentity <String[]>]
        [-AutomationServicesEncryption]
        [-DisablePublicNetworkAccess]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AutomationServicesEncryption
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzAutomationAccount
        [-ResourceGroupName] <String>
        [-Name] <String>
        -KeyName <String>
        -KeyVersion <String>
        -KeyVaultUri <String>
        [-Plan <String>]
        [-Tags <IDictionary>]
        [-AssignSystemIdentity]
        [-AssignUserIdentity <String[]>]
        [-KeyVaultEncryption]
        [-UserIdentityEncryption <String>]
        [-DisablePublicNetworkAccess]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: KeyVaultEncryption
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
