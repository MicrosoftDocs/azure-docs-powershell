syntaxes:
- syntax: |-
    ```Syntax
    Unregister-AzAutomationScheduledRunbook
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        -JobScheduleId <Guid>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByJobScheduleId
  isDefault: true
- syntax: |-
    ```Syntax
    Unregister-AzAutomationScheduledRunbook
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        -RunbookName <String>
        -ScheduleName <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByRunbookNameAndScheduleName
  isDefault: false
