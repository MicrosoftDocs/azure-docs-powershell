syntaxes:
- syntax: |-
    ```Syntax
    Publish-AzAutomationRunbook
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Automation.Model.Runbook" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Publish a runbook'
  description: |-
    ```powershell
    Publish-AzAutomationRunbook -AutomationAccountName "Contoso17" -Name "Runbk01" -ResourceGroupName "ResourceGroup01"
    ```

    This command publishes the runbook named Runbk01 in the Azure Automation account named Contoso17.
