    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzAutomationDscCompilationJobOutput
        [-Id] <Guid>
        [-Stream <CompilationJobStreamType>]
        [-StartTime <DateTimeOffset>]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.Guid" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Automation.Common.CompilationJobStreamType" data-throw-if-not-resolved="False" />
- name: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Automation.Model.JobStream" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the logs for a DSC compilation job'
  description: |-
    ```powershell
    $Jobs = Get-AzAutomationDscCompilationJob -ResourceGroupName "ResourceGroup01" -AutomationAccountName "Contoso17"
    $Jobs[0] | Get-AzAutomationDscCompilationJobOutput -Stream "Any"
    ```

    The first command gets the compilation jobs in the Automation account named Contoso17 by using the Get-AzAutomationDscCompilationJob cmdlet.
    The command stores those objects in the $Jobs variable.
    The second command gets the compilation job output for any stream for the first member of the $Jobs array.
