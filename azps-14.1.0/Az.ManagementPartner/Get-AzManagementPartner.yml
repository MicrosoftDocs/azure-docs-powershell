uid: Az.ManagementPartner.Get-AzManagementPartner
name: Get-AzManagementPartner
module: Az.ManagementPartner
isPreview: false
summary: |-
  Gets the Microsoft Partner Network(MPN) ID of the current authenticated user or service principal.
description: |-
  Gets the Microsoft Partner Network(MPN) ID of the current authenticated user or service principal.
