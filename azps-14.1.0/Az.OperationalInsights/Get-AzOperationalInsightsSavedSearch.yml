syntaxes:
- syntax: |-
    ```Syntax
    Get-AzOperationalInsightsSavedSearch
        [-ResourceGroupName] <String>
        [-WorkspaceName] <String>
        [[-SavedSearchId] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
