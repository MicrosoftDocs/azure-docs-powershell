syntaxes:
- syntax: |-
    ```Syntax
    New-AzOperationalInsightsSavedSearch
        [-ResourceGroupName] <String>
        [-WorkspaceName] <String>
        [-SavedSearchId] <String>
        [-DisplayName] <String>
        [-Category] <String>
        [-Query] <String>
        [[-Tag] <Hashtable>]
        [[-Version] <Int64>]
        [[-FunctionAlias] <String>]
        [[-FunctionParameter] <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
