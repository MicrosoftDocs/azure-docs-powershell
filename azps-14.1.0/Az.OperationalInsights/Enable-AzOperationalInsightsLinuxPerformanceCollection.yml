syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzOperationalInsightsLinuxPerformanceCollection
        [-ResourceGroupName] <String>
        [-WorkspaceName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
