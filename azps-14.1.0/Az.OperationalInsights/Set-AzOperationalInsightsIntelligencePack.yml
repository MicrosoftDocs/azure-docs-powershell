syntaxes:
- syntax: |-
    ```Syntax
    Set-AzOperationalInsightsIntelligencePack
        [-ResourceGroupName] <String>
        [-WorkspaceName] <String>
        [-IntelligencePackName] <String>
        [-Enabled] <Boolean>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
