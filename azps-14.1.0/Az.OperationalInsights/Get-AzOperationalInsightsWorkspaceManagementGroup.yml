uid: Az.OperationalInsights.Get-AzOperationalInsightsWorkspaceManagementGroup
name: Get-AzOperationalInsightsWorkspaceManagementGroup
module: Az.OperationalInsights
isPreview: false
summary: |-
  Gets details of management groups connected to a workspace.
description: |-
  The **Get-AzOperationalInsightsWorkspaceManagementGroup** cmdlet lists the management groups that are connected to a workspace.
