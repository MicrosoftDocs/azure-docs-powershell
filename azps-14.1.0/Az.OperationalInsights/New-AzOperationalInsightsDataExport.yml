syntaxes:
- syntax: |-
    ```Syntax
    New-AzOperationalInsightsDataExport
        [-ResourceGroupName] <String>
        [-WorkspaceName] <String>
        [[-DataExportName] <String>]
        [[-TableName] <String[]>]
        [-ResourceId <String>]
        [-EventHubName <String>]
        [-Enable <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
