syntaxes:
- syntax: |-
    ```Syntax
    Update-AzResourceGraphQuery
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Description <String>]
        [-Query <String>]
        [-File <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzResourceGraphQuery
        -InputObject <IResourceGraphIdentity>
        [-Description <String>]
        [-Query <String>]
        [-File <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
