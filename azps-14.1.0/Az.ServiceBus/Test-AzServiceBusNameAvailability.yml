syntaxes:
- syntax: |-
    ```Syntax
    Test-AzServiceBusNameAvailability
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [-Name] <String>
        [-Queue]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: QueueCheckNameAvailabilitySet
  isDefault: true
- syntax: |-
    ```Syntax
    Test-AzServiceBusNameAvailability
        [-ResourceGroupName] <String>
        [-Namespace] <String>
        [-Name] <String>
        [-Topic]
