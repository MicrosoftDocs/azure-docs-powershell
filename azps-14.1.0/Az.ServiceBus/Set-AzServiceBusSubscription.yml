syntaxes:
- syntax: |-
    ```Syntax
    Set-AzServiceBusSubscription
        -Name <String>
        -TopicName <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AutoDeleteOnIdle <TimeSpan>]
        [-DefaultMessageTimeToLive <TimeSpan>]
        [-DuplicateDetectionHistoryTimeWindow <TimeSpan>]
        [-LockDuration <TimeSpan>]
        [-EnableBatchedOperations]
        [-Status <String>]
        [-ForwardTo <String>]
        [-ForwardDeadLetteredMessagesTo <String>]
        [-MaxDeliveryCount <Int32>]
        [-DeadLetteringOnFilterEvaluationException]
        [-DeadLetteringOnMessageExpiration]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzServiceBusSubscription
        -InputObject <IServiceBusIdentity>
        [-AutoDeleteOnIdle <TimeSpan>]
        [-DefaultMessageTimeToLive <TimeSpan>]
        [-DuplicateDetectionHistoryTimeWindow <TimeSpan>]
        [-LockDuration <TimeSpan>]
        [-EnableBatchedOperations]
        [-Status <String>]
        [-ForwardTo <String>]
        [-ForwardDeadLetteredMessagesTo <String>]
        [-MaxDeliveryCount <Int32>]
        [-DeadLetteringOnFilterEvaluationException]
        [-DeadLetteringOnMessageExpiration]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetViaIdentityExpanded
  isDefault: false
