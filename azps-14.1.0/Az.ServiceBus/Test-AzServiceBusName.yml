syntaxes:
- syntax: |-
    ```Syntax
    Test-AzServiceBusName
        -NamespaceName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [<CommonParameters>]
    ```
  parameterSetName: NamespaceAvailability
  isDefault: true
- syntax: |-
    ```Syntax
    Test-AzServiceBusName
        -NamespaceName <String>
        -AliasName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
