syntaxes:
- syntax: |-
    ```Syntax
    New-AzServiceLinkerSecretAuthInfoObject
        [-Name <String>]
        [-SecretValue <String>]
        [-SecretKeyVaultUri <String>]
        [-SecretNameInKeyVault <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ServiceLinker.Models.SecretAuthInfo" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create Secret Auth info with raw value'
  description: |-
    ```powershell
    New-AzServiceLinkerSecretAuthInfoObject -Name user -SecretValue password
    ```

    ```output
    AuthType Name
    -------- ----
    secret   user
    ```

    Create Secret Auth info with raw value
- title: 'Example 2: Create Secret Auth info with keyvault secret uri'
  description: |-
    ```powershell
    New-AzServiceLinkerSecretAuthInfoObject -Name user -SecretKeyVaultUri "https://servicelinker-kv-ref.vault.azure.net/secrets/test-secret/cc5d8095a54f4755b342f4e7884b5c84"
    ```

    ```output
    AuthType Name
    -------- ----
    secret   user
    ```

    Create Secret Auth info with keyvault secret uri
- title: "Example 3: Create Secret Auth info with keyvault secret reference(It's for AKS only and `-SecretStoreVaultId` must be set at the same time when creating linker)"
  description: |-
    ```powershell
    New-AzServiceLinkerSecretAuthInfoObject -Name user -SecretNameInKeyVault test-secret
    ```

    ```output
    AuthType Name
    -------- ----
    secret   user
    ```

    Create Secret Auth info with keyvault secret reference
    It's for AKS only and `-SecretStoreVaultId` must be set at the same time when creating linker
