uid: Az.ServiceLinker.New-AzServiceLinkerSecretAuthInfoObject
name: New-AzServiceLinkerSecretAuthInfoObject
module: Az.ServiceLinker
isPreview: false
summary: |-
  Create an in-memory object for SecretAuthInfo.
description: |-
  Create an in-memory object for SecretAuthInfo.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Username or account name for secret auth.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SecretKeyVaultUri
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The Key Vault Uri of secret.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SecretNameInKeyVault
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of secret in keyvault refenced by -SecretStoreKeyVaultId.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SecretValue
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Raw value of secret.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
