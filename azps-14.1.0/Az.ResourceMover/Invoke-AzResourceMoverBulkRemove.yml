syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzResourceMoverBulkRemove
        -MoveCollectionName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-MoveResource <String[]>]
        [-MoveResourceInputType <MoveResourceInputType>]
        [-ValidateOnly]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
