syntaxes:
- syntax: |-
    ```Syntax
    New-AzBotService
        -ResourceGroupName <String>
        -ApplicationId <String>
        -Sku <String>
        [-Name <String>]
        [-DisplayName <String>]
        [-Endpoint <String>]
        [-Description <String>]
        [-Registration]
        [-Location <String>]
        [-ServerFarmLocation <String>]
        [-Language <String>]
        [-BotTemplateType <String>]
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Registration
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzBotService
        -ResourceGroupName <String>
        -ApplicationId <String>
        -ApplicationSecret <SecureString>
        -Sku <String>
        [-Name <String>]
        [-Description <String>]
        [-Location <String>]
        [-ServerFarmLocation <String>]
        [-Language <String>]
        [-BotTemplateType <String>]
        [-SubscriptionId <String[]>]
        [-Webapp]
        [-ExistingServerFarmId <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: WebApp
  isDefault: false
