syntaxes:
- syntax: |-
    ```Syntax
    Get-AzAksArcClusterAdminKubeconfig
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-FilePath <String>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
