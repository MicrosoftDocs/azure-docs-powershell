syntaxes:
- syntax: |-
    ```Syntax
    Find-AzCustomLocationTargetResourceGroup
        -CustomLocationName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Label <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FindExpanded
  isDefault: true
- syntax: |-
