uid: Az.FrontDoor.New-AzFrontDoorBackendPoolsSettingObject
name: New-AzFrontDoorBackendPoolsSettingObject
module: Az.FrontDoor
isPreview: false
summary: |-
  Create a PSBackendPoolsSetting object for Front Door creation.
description: |-
  The **New-AzFrontDoorBackendPoolsSettingObject** cmdlet creates a new PSBackendPoolsSettings object for Front Door creation.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EnforceCertificateNameCheck
    type: <xref href="Microsoft.Azure.Commands.FrontDoor.Models.PSEnabledState" data-throw-if-not-resolved="False" />
    description: |-
      Whether to enforce certificate name check on HTTPS requests to all backend pools.
      No effect on non-HTTPS requests.
    acceptedValues:
    - Enabled
    - Disabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SendRecvTimeoutInSeconds
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Send and receive timeout on forwarding request to the backend. When timeout is reached, the request fails and returns.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzFrontDoorBackendPoolsSettingObject
        [-EnforceCertificateNameCheck <PSEnabledState>]
        [-SendRecvTimeoutInSeconds <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.FrontDoor.Models.PSBackendPoolsSetting" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create BackendPoolsSettings object using defaults'
  description: |-
    ```powershell
    New-AzFrontDoorBackendPoolsSettingObject
    ```

    ```output
    EnforceCertificateNameCheck : Enabled
    SendRecvTimeoutInSeconds      : 30
    Id                          :
    Name                        :
    Type                        :
    ```
- title: 'Example 2: Create BackendPoolsSettings object with user specified values'
  description: |-
    ```powershell
    New-AzFrontDoorBackendPoolsSettingObject -SendRecvTimeoutInSeconds 60 -EnforceCertificateNameCheck Enabled
    ```

    ```output
    EnforceCertificateNameCheck : Enabled
    SendRecvTimeoutInSeconds      : 60
    Id                          :
    Name                        :
    Type                        :
    ```
