uid: Az.FrontDoor.Disable-AzFrontDoorCustomDomainHttps
name: Disable-AzFrontDoorCustomDomainHttps
module: Az.FrontDoor
isPreview: false
summary: |-
  Disable HTTPS for a custom domain
description: |-
  The **Disable-AzFrontDoorCustomDomainHttps** disables HTTPS for a custom domain.
