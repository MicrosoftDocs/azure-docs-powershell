### YamlMime:PowerShellCmdlet1
uid: Az.FrontDoor.New-AzFrontDoorRulesEngineRuleObject
name: New-AzFrontDoorRulesEngineRuleObject
module: Az.FrontDoor
isPreview: false
summary: |-
  Create a PSRulesEngineRule object for Rules Engine creation.
description: |-
  Create a PSRulesEngineRule object for Rules Engine creation.

  Use cmdlet "New-AzFrontDoorRulesEngineActionObject" to create PSRulesEngineAction object to pass into the "-Action" parameter.
  Use cmdlet "New-AzFrontDoorRulesEngineMatchConditionObject" to create PSRulesEngineMatchCondition object to pass into the "-MatchCondition" parameter.
parameters:
  cmdletParameters:
  - name: Action
    type: <xref href="Microsoft.Azure.Commands.FrontDoor.Models.PSRulesEngineAction" data-throw-if-not-resolved="False" />
    description: |-
      Actions to perform on the request and response if all of the match conditions are met.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MatchCondition
    type: <xref href="Microsoft.Azure.Commands.FrontDoor.Models.PSRulesEngineMatchCondition" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      A list of match conditions that must meet in order for the actions of this rule to run. Having no match conditions means the actions will always run.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MatchProcessingBehavior
    type: <xref href="Microsoft.Azure.Commands.FrontDoor.Models.PSMatchProcessingBehavior" data-throw-if-not-resolved="False" />
    description: |-
      If this rule is a match should the rules engine continue running the remaining rules or stop.
      Possible values are Continue and Stop.
      If not present, defaults to Continue.
    acceptedValues:
    - Continue
    - Stop
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      A name to refer to this specific rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Priority
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      A priority assigned to this rule.
      Cannot be negative.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzFrontDoorRulesEngineRuleObject
        -Name <String>
        -Priority <Int32>
        -Action <PSRulesEngineAction>
        [-MatchProcessingBehavior <PSMatchProcessingBehavior>]
        [-MatchCondition <PSRulesEngineMatchCondition[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.FrontDoor.Models.PSRulesEngineRule" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    <!-- Skip: Output cannot be splitted from code -->
    ```powershell
    New-AzFrontDoorRulesEngineRuleObject -Name rules1 -Priority 0 -Action $rulesEngineAction -MatchProcessingBehavior Stop -MatchCondition $rulesEngineMatchCondition

    Name                    : rules1
    Priority                : 0
    MatchProcessingBehavior : Stop
    MatchCondition          : {Microsoft.Azure.Commands.FrontDoor.Models.PSRulesEngineMatchCondition}
    Action                  : Microsoft.Azure.Commands.FrontDoor.Models.PSRulesEngineAction


    $rulesEngineRule1.Action

    RequestHeaderActions           ResponseHeaderActions RouteConfigurationOverride
    --------------------           --------------------- --------------------------
    {headeraction1, headeraction2} {}                    Microsoft.Azure.Commands.FrontDoor.Models.PSForwardingConfiguration

    $rulesEngineRule1.MatchCondition[0]

    RulesEngineMatchVariable : RequestHeader
    RulesEngineMatchValue    : {allowoverride}
    Selector                 : Rules-Engine-Route-Forward
    RulesEngineOperator      : Equal
    NegateCondition          : False
    Transforms               : {Lowercase, Uppercase}
    ```

    Create new PSRulesEngineRule object and demonstrate how to see the subfields.
- title: Example 2
  description: |-
    ```powershell
    New-AzFrontDoorRulesEngineRuleObject -Name rules1 -Priority -1
    ```

    ```output
    New-AzFrontDoorRulesEngineRuleObject : Cannot validate argument on parameter 'Priority'. The -1 argument is less than the minimum allowed range of 0. Supply an argument that is greater than or equal to 0 and then try the command again.
    At line:1 char:81
    + ... ule1 = New-AzFrontDoorRulesEngineRuleObject -Name rules1 -Priority -1
    +                                                                        ~~
    + CategoryInfo          : InvalidData: (:) [New-AzFrontDoorRulesEngineRuleObject], ParameterBindingValidationException
    + FullyQualifiedErrorId : ParameterArgumentValidationError,Microsoft.Azure.Commands.FrontDoor.Cmdlets.NewFrontDoorRulesEngineRuleObject
    ```

    Expect output when passing in invalid priority value.
