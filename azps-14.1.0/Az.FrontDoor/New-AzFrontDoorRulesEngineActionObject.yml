    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DynamicCompression
    type: <xref href="Microsoft.Azure.Commands.FrontDoor.Models.PSEnabledState" data-throw-if-not-resolved="False" />
    description: |-
      Whether to enable dynamic compression for cached content.
      Default value is Enabled
    acceptedValues:
    - Enabled
    - Disabled
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFieldsWithForwardingParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EnableCaching
