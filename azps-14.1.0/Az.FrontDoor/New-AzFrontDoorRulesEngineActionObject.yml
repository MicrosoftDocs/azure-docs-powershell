### YamlMime:PowerShellCmdlet1
uid: Az.FrontDoor.New-AzFrontDoorRulesEngineActionObject
name: New-AzFrontDoorRulesEngineActionObject
module: Az.FrontDoor
isPreview: false
summary: |-
  Create a PSRulesEngineAction object for creating a rules engine rule.
description: |-
  Create a PSRulesEngineAction object for creating a rules engine rule.

  Use cmdlet "New-AzFrontDoorHeaderActionObject" to create PSHeaderObjects to pass into the parameters "-RequestHeaderActions" and "-ResponseHeaderActions".
parameters:
  cmdletParameters:
  - name: BackendPoolName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the BackendPool which this rule routes to
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFieldsWithForwardingParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CustomForwardingPath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The custom path used to rewrite resource paths matched by this rule.
      Leave empty to use incoming path.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFieldsWithForwardingParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CustomFragment
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Fragment to add to the redirect URL.
      Fragment is the part of the URL that comes after #.
      Do not include the #.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFieldsWithRedirectParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CustomHost
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Host to redirect.
      Leave empty to use the incoming host as the destination host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFieldsWithRedirectParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CustomPath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The full path to redirect.
      Path cannot be empty and must start with /.
      Leave empty to use the incoming path as destination path.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFieldsWithRedirectParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CustomQueryString
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The set of query strings to be placed in the redirect URL.
      Setting this value would replace any existing query string; leave empty to preserve the incoming query string.
      Query string must be in \<key\>=\<value\> format.
      The first ?
      and & will be added automatically so do not include them in the front, but do separate multiple query strings with &.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFieldsWithRedirectParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
