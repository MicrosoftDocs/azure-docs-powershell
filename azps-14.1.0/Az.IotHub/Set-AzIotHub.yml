syntaxes:
- syntax: |-
    ```Syntax
    Set-AzIotHub
        -ResourceGroupName <String>
        -Name <String>
        -SkuName <PSIotHubSku>
        [-Units <Int64>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
