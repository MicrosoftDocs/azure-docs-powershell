syntaxes:
- syntax: |-
    ```Syntax
    New-AzAcatReport
        -Name <String>
        -Resource <IResourceMetadata[]>
        [-TimeZone <String>]
        [-TriggerTime <DateTime>]
        [-OfferGuid <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzAcatReport
        -Name <String>
        -Parameter <IReportResource>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Create
  isDefault: false
