        [-TriggerMode <String>]
        [-Event <String[]>]
        [-PayloadUrl <String>]
        [-ContentType <String>]
        [-Secret <SecureString>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
