syntaxes:
- syntax: |-
    ```Syntax
    New-AzAcatReportResourceObject
        [-Resource <IResourceMetadata[]>]
        [-TimeZone <String>]
        [-TriggerTime <DateTime>]
        [-OfferGuid <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
