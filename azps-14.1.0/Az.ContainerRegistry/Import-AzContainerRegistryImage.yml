syntaxes:
- syntax: |-
    ```Syntax
    Import-AzContainerRegistryImage
        -RegistryName <String>
        -ResourceGroupName <String>
        -SourceImage <String>
        [-SubscriptionId <String>]
        [-Mode <ImportMode>]
        [-Password <String>]
        [-SourceRegistryUri <String>]
        [-SourceResourceId <String>]
        [-TargetTag <String[]>]
        [-UntaggedTargetRepository <String[]>]
        [-Username <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ImportExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Import-AzContainerRegistryImage
        -RegistryName <String>
        -ResourceGroupName <String>
        -Parameter <IImportImageParameters>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Import
  isDefault: false
