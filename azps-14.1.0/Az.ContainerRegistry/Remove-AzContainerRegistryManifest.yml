syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzContainerRegistryManifest
        -RepositoryName <String>
        -Manifest <String>
        -RegistryName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByManifestParameterSet
  isDefault: true
