uid: Az.ContainerRegistry.Remove-AzContainerRegistryManifest
name: Remove-AzContainerRegistryManifest
module: Az.ContainerRegistry
isPreview: false
summary: |-
  Delete ACR manifest.
description: |-
  Delete ACR manifest.
  To use this cmdlet please run
  `Update-AzContainerRegistryRepository -RegistryName XXX -Repository XXX -DeleteEnable $true`
  first.
