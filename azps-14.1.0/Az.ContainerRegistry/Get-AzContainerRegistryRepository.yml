- name: <xref href="Microsoft.Azure.Commands.ContainerRegistry.Models.PSRepositoryAttribute" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzContainerRegistryRepository -RegistryName registry
    ```

    ```output
    alpine
    test/busybox0
    test/busybox1
    test/busybox10
    ```

    List all repositories in registry.
- title: Example 2
  description: |-
    ```powershell
    Get-AzContainerRegistryRepository -RegistryName registry -First 3
    ```

    ```output
    alpine
    test/busybox0
    test/busybox1
    ```

    List first 3 repositories in registry.
- title: Example 3
  description: |-
    ```powershell
    Get-AzContainerRegistryRepository -RegistryName registry -Name alpine
    ```

    ```output
    Registry             : registry.azurecr.io
    ImageName            : alpine
    CreatedTime          : 2020-10-13T05:45:25.5896115Z
    LastUpdateTime       : 2021-01-04T08:31:46.2406505Z
    ManifestCount        : 7
    TagCount             : 1
    ChangeableAttributes : Microsoft.Azure.Commands.ContainerRegistry.Models.PSChangeableAttribute
    ```

    Get repository alpine under registry.
