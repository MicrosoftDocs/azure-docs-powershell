syntaxes:
- syntax: |-
    ```Syntax
    Get-AzContainerRegistryRepository
        -RegistryName <String>
        [-First <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListParameterSet
