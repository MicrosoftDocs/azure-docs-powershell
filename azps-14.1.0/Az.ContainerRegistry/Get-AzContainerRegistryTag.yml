    Get-AzContainerRegistryTag
        -RepositoryName <String>
        -Name <String>
        -RegistryName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetParameterSet
