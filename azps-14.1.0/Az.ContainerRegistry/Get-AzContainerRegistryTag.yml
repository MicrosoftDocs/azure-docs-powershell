uid: Az.ContainerRegistry.Get-AzContainerRegistryTag
name: Get-AzContainerRegistryTag
module: Az.ContainerRegistry
isPreview: false
summary: |-
  Get or list ACR tag.
description: |-
  Get or list ACR tag.
  To use this cmdlet please run
  `Update-AzContainerRegistryRepository -RegistryName XXX -Repository XXX -ReadEnable $true -ListEnable $true`
  first.
