syntaxes:
- syntax: |-
    ```Syntax
    Get-AzContainerRegistryTag
        -RepositoryName <String>
        -RegistryName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListParameterSet
  isDefault: true
- syntax: |-
