syntaxes:
- syntax: |-
    ```Syntax
    New-AzMongoDBOrganization
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        [-SubscriptionId <String>]
        [-EnableSystemAssignedIdentity]
        [-MarketplaceSubscriptionId <String>]
        [-OfferDetailOfferId <String>]
        [-OfferDetailPlanId <String>]
        [-OfferDetailPlanName <String>]
        [-OfferDetailPublisherId <String>]
        [-OfferDetailTermId <String>]
        [-OfferDetailTermUnit <String>]
        [-PartnerPropertyOrganizationId <String>]
        [-PartnerPropertyOrganizationName <String>]
        [-PartnerPropertyRedirectUrl <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-UserCompanyName <String>]
        [-UserEmailAddress <String>]
        [-UserFirstName <String>]
        [-UserLastName <String>]
        [-UserPhoneNumber <String>]
        [-UserUpn <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
