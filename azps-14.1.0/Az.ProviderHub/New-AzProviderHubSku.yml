syntaxes:
- syntax: |-
    ```Syntax
    New-AzProviderHubSku
        -ProviderNamespace <String>
        -ResourceType <String>
        -Sku <String>
        [-SubscriptionId <String>]
        -SkuSetting <ISkuSetting[]>
        [-ProvisioningState <ProvisioningState>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
