syntaxes:
- syntax: |-
    ```Syntax
    Assert-AzSqlVMEntraAuth
        -Name <String>
        -ResourceGroupName <String>
        -IdentityType <String>
        [-SubscriptionId <String>]
        [-ManagedIdentityClientId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AssertExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Assert-AzSqlVMEntraAuth
        -InputObject <ISqlVirtualMachineIdentity>
        -IdentityType <String>
        [-ManagedIdentityClientId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AssertViaIdentity
  isDefault: false
