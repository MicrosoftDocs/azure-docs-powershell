examples:
- title: 'Example 1: Modify an integration account'
  description: |-
    ```powershell
    Set-AzIntegrationAccount -ResourceGroupName "ResourceGroup11" -Name "IntegrationAccount31" -Sku "Free"
    ```

    ```output
    Id          : /subscriptions/<SubscriptionId>/resourceGroups/ResourceGroup11/providers/Microsoft.Logic/integrationAccounts/IntegrationAccount31
    Name        : IntegrationAccount31
    Type        : Microsoft.Logic/integrationAccounts
    Location    : brazilsouth
    Sku         :
    CreatedTime : 3/26/2016 4:26:07 PM
    ChangedTime : 3/26/2016 4:26:07 PM
    ```

    This command modifies an integration account named IntegrationAccount31 in the specified resource group.
