syntaxes:
- syntax: |-
    ```Syntax
    Set-AzIntegrationAccount
        -ResourceGroupName <String>
        -Name <String>
        [-Location <String>]
        [-Sku <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
