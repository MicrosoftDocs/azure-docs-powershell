syntaxes:
- syntax: |-
    ```Syntax
    New-AzIntegrationAccount
        -ResourceGroupName <String>
        -Name <String>
        -Location <String>
        [-Sku <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
