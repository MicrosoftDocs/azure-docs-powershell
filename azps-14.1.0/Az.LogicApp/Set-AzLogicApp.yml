syntaxes:
- syntax: |-
    ```Syntax
    Set-AzLogicApp
        -ResourceGroupName <String>
        -Name <String>
        [-UseConsumptionModel]
        [-State <String>]
        [-Definition <Object>]
        [-DefinitionFilePath <String>]
        [-IntegrationAccountId <String>]
        [-Parameters <Object>]
        [-ParameterFilePath <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Consumption
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzLogicApp
        -ResourceGroupName <String>
        -Name <String>
        [-AppServicePlan <String>]
        [-State <String>]
        [-Definition <Object>]
        [-DefinitionFilePath <String>]
        [-IntegrationAccountId <String>]
        [-Parameters <Object>]
