syntaxes:
- syntax: |-
    ```Syntax
    Get-AzLogicAppRunHistory
        -ResourceGroupName <String>
        -Name <String>
        [-RunName <String>]
        [-FollowNextPageLink]
        [-MaximumFollowNextPageLink <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
