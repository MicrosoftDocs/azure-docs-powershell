syntaxes:
- syntax: |-
    ```Syntax
    Get-AzLogicApp
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListWorkflows
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzLogicApp
        -ResourceGroupName <String>
        -Name <String>
        -Version <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByVersion
  isDefault: false
