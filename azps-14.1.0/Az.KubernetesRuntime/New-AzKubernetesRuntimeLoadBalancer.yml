syntaxes:
- syntax: |-
    ```Syntax
    New-AzKubernetesRuntimeLoadBalancer
        -ArcConnectedClusterId <String>
        -Name <String>
        [-Address <String[]>]
        [-AdvertiseMode <String>]
        [-BgpPeer <String[]>]
        [-ServiceSelector <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzKubernetesRuntimeLoadBalancer
        -ArcConnectedClusterId <String>
        -Name <String>
        -JsonFilePath <String>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaJsonFilePath
  isDefault: false
- syntax: |-
