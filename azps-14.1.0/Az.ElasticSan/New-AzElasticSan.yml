syntaxes:
- syntax: |-
    ```Syntax
    New-AzElasticSan
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        -SkuName <String>
        [-SubscriptionId <String>]
        [-AvailabilityZone <String[]>]
        [-BaseSizeTiB <Int64>]
        [-ExtendedCapacitySizeTiB <Int64>]
        [-PublicNetworkAccess <String>]
        [-SkuTier <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzElasticSan
        -InputObject <IElasticSanIdentity>
        -Location <String>
        -SkuName <String>
        [-AvailabilityZone <String[]>]
        [-BaseSizeTiB <Int64>]
        [-ExtendedCapacitySizeTiB <Int64>]
        [-PublicNetworkAccess <String>]
        [-SkuTier <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
