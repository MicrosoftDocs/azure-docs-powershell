uid: Az.ElasticSan.Get-AzElasticSan
name: Get-AzElasticSan
module: Az.ElasticSan
isPreview: false
summary: |-
  Get either a list of Elastic SANs from a subscription or a resource group, or get a single Elastic SAN.
