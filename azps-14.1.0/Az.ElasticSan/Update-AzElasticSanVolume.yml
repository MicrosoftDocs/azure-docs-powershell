- title: 'Example 1: Update an Elastic SAN volume'
  description: |-
    ```powershell
    $volume = Update-AzElasticSanVolume -ResourceGroupName myresourcegroup -ElasticSanName myelasticsan -VolumeGroupName myvolumegroup -Name myvolume -SizeGib 120
    ```

