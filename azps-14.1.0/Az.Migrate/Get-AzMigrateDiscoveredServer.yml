uid: Az.Migrate.Get-AzMigrateDiscoveredServer
name: Get-AzMigrateDiscoveredServer
module: Az.Migrate
isPreview: false
summary: |-
  Get All discovered servers in a migrate project.
description: |-
  Get Azure migrate server commandlet fetches all servers in a migrate project.
