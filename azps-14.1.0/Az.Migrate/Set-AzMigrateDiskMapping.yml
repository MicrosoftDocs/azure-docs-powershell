### YamlMime:PowerShellCmdlet1
uid: Az.Migrate.Set-AzMigrateDiskMapping
name: Set-AzMigrateDiskMapping
module: Az.Migrate
isPreview: false
summary: |-
  Updates disk mapping
description: |-
  The Set-AzMigrateDiskMapping cmdlet updates a mapping of the source disk attached to the server to be migrated
parameters:
  cmdletParameters:
  - name: DiskID
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the disk ID of the disk attached to the discovered server to be migrated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DiskName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the managed disk to be created.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IsOSDisk
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether the disk contains the Operating System for the source server to be migrated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzMigrateDiskMapping
        -DiskID <String>
        [-DiskName <String>]
        [-IsOSDisk <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Migrate.Models.Api202401.IVMwareCbtUpdateDiskInput" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Make disks'
  description: |-
    ```powershell
    Set-AzMigrateDiskMapping -DiskID "6000C294-1217-dec3-bc18-81f117220424" -DiskName "ContosoDisk_1" -IsOSDisk "True"
    ```

    ```output
    DiskId                               IsOSDisk TargetDiskName
    ------                               -------- --------------
    6000C294-1217-dec3-bc18-81f117220424 True     ContosoDisk_1
    ```

    Get disks object to provide input for Set-AzMigrateServerReplication
