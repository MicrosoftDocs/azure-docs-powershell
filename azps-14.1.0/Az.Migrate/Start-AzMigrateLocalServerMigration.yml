    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Migrate.Models.IMigrateIdentity" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the replicating server for which migration needs to be initiated.
      The server object can be retrieved using the Get-AzMigrateLocalServerReplication cmdlet.
      To construct, see NOTES section for INPUTOBJECT properties and create a hash table.
    defaultValue: None
    dontShow: false
    isDynamic: false
