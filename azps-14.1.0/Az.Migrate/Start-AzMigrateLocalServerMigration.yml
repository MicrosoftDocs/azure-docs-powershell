### YamlMime:PowerShellCmdlet1
uid: Az.Migrate.Start-AzMigrateLocalServerMigration
name: Start-AzMigrateLocalServerMigration
module: Az.Migrate
isPreview: false
summary: |-
  Starts the migration for the replicating server.
description: |-
  Starts the migration for the replicating server.
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
