syntaxes:
- syntax: |-
    ```Syntax
    Start-AzMigrateLocalServerMigration
        -TargetObjectID <String>
        [-TurnOffSourceServer]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByID
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzMigrateLocalServerMigration
        -InputObject <IMigrateIdentity>
        [-TurnOffSourceServer]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInputObject
  isDefault: false
