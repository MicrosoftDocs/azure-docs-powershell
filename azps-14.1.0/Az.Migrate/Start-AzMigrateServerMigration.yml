syntaxes:
- syntax: |-
    ```Syntax
    Start-AzMigrateServerMigration
        -TargetObjectID <String>
        [-OsUpgradeVersion <String>]
        [-TurnOffSourceServer]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: ByIDVMwareCbt
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzMigrateServerMigration
        -InputObject <IMigrationItem>
        [-OsUpgradeVersion <String>]
        [-TurnOffSourceServer]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: ByInputObjectVMwareCbt
  isDefault: false
