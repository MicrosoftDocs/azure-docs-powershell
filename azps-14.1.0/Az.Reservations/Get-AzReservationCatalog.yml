uid: Az.Reservations.Get-AzReservationCatalog
name: Get-AzReservationCatalog
module: Az.Reservations
isPreview: false
summary: |-
  Get the regions and skus that are available for RI purchase for the specified Azure subscription.
description: |-
  Get the regions and skus that are available for RI purchase for the specified Azure subscription.
