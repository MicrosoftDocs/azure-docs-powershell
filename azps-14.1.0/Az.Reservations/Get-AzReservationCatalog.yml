syntaxes:
- syntax: |-
    ```Syntax
    Get-AzReservationCatalog
        [-SubscriptionId <String[]>]
        [-Filter <String>]
        [-Location <String>]
        [-OfferId <String>]
        [-PlanId <String>]
        [-PublisherId <String>]
        [-ReservedResourceType <String>]
        [-Skip <Single>]
        [-Take <Single>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzReservationCatalog
        -InputObject <IReservationsIdentity>
        [-Filter <String>]
        [-Location <String>]
        [-OfferId <String>]
        [-PlanId <String>]
        [-PublisherId <String>]
        [-ReservedResourceType <String>]
        [-Skip <Single>]
        [-Take <Single>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
