syntaxes:
- syntax: |-
    ```Syntax
    Split-AzReservation
        -OrderId <String>
        -ReservationId <String>
        -Quantity <Int32[]>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
