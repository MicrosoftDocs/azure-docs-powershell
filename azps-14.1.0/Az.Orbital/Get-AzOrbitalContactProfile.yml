    ```powershell
    Get-AzOrbitalContactProfile
    ```

    ```output
    Name                        Location ProvisioningState ResourceGroupName
    ----                        -------- ----------------- -----------------
    azps-orbital-contactprofile westus2  succeeded         azpstest-gp
    ```

