examples:
- title: 'Example 1: Get the specified contact in a specified Name.'
  description: |-
    ```powershell
    Get-AzOrbitalSpacecraftContact -Name contact-05-09-2023-07:09:41 -ResourceGroupName azpstest-gp -SpacecraftName SwedenAQUASpacecraft
    ```

