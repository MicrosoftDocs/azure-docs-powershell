syntaxes:
- syntax: |-
    ```Syntax
    New-AzOrbitalSpacecraft
        -Name <String>
        -ResourceGroupName <String>
        -Link <ISpacecraftLink[]>
        -Location <String>
        -TitleLine <String>
        -TleLine1 <String>
        -TleLine2 <String>
        [-SubscriptionId <String>]
        [-NoradId <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
