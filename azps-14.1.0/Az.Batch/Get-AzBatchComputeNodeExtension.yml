syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBatchComputeNodeExtension
        [-PoolId] <String>
        [-ComputeNodeId] <String>
        [[-Name] <String>]
        -BatchContext <BatchAccountContext>
        [-Select <String>]
        [-MaxCount <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzBatchComputeNodeExtension
        [-Pool] <PSCloudPool>
        [-ComputeNodeId] <String>
        [[-Name] <String>]
        -BatchContext <BatchAccountContext>
        [-Select <String>]
        [-MaxCount <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
