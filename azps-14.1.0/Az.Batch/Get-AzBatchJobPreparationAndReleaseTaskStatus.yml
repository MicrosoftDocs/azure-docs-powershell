syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBatchJobPreparationAndReleaseTaskStatus
        [-Id] <String>
        -BatchContext <BatchAccountContext>
        [-Filter <String>]
        [-MaxCount <Int32>]
        [-Select <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzBatchJobPreparationAndReleaseTaskStatus
        [-InputObject] <PSCloudJob>
        -BatchContext <BatchAccountContext>
        [-Filter <String>]
        [-MaxCount <Int32>]
        [-Select <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
