    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBatchJob
        -BatchContext <BatchAccountContext>
        [-JobScheduleId <String>]
        [-Filter <String>]
        [-MaxCount <Int32>]
        [-Select <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ODataFilter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzBatchJob
        [[-Id] <String>]
        -BatchContext <BatchAccountContext>
        [-Select <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzBatchJob
        [[-JobSchedule] <PSCloudJobSchedule>]
        -BatchContext <BatchAccountContext>
        [-Filter <String>]
        [-MaxCount <Int32>]
        [-Select <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ParentObject
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Batch.Models.PSCloudJobSchedule" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.Models.PSCloudJob" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a Batch job by ID'
  description: |-
    ```powershell
    Get-AzBatchJob -Id "Job01" -BatchContext $Context
    ```

    ```output
    CommonEnvironmentSettings   :
    Constraints                 : Microsoft.Azure.Commands.Batch.Models.PSJobConstraints
    CreationTime                : 7/25/2015 9:12:07 PM
    DisplayName                 :
    ETag                        : 0x8D29535B2941439
    ExecutionInformation        : Microsoft.Azure.Commands.Batch.Models.PSJobExecutionInformation
    Id                          : Job01
    JobManagerTask              :
    JobPreparationTask          :
    JobReleaseTask              :
    LastModified                : 7/25/2015 9:12:07 PM
    Metadata                    :
    PoolInformation             : Microsoft.Azure.Commands.Batch.Models.PSPoolInformation
    PreviousState               :
    PreviousStateTransitionTime :
    Priority                    : 0
    State                       : Active
    StateTransitionTime         : 7/25/2015 9:12:07 PM
    Statistics                  :
    Url                         : https://pfuller.westus.batch.azure.com/jobs/Job01
    ```

    This command gets the job that has the ID Job01.
    Use the Get-AzBatchAccountKey cmdlet to assign a context to the $Context variable.
- title: 'Example 2: Get all active jobs for a job schedule'
  description: |-
    ```powershell
    Get-AzBatchJob -JobScheduleId "JobSchedule27" -Filter "state eq 'active'" -BatchContext $Context
    ```

    ```output
    CommonEnvironmentSettings   :
    Constraints                 : Microsoft.Azure.Commands.Batch.Models.PSJobConstraints
    CreationTime                : 7/25/2015 9:15:44 PM
    DisplayName                 :
    ETag                        : 0x8D2953633DD13E1
    ExecutionInformation        : Microsoft.Azure.Commands.Batch.Models.PSJobExecutionInformation
    Id                          : JobSchedule27:job-1
    JobManagerTask              :
    JobPreparationTask          :
    JobReleaseTask              :
    LastModified                : 7/25/2015 9:15:44 PM
    Metadata                    :
    PoolInformation             : Microsoft.Azure.Commands.Batch.Models.PSPoolInformation
    PreviousState               :
    PreviousStateTransitionTime :
    Priority                    : 0
    State                       : Active
    StateTransitionTime         : 7/25/2015 9:15:44 PM
    Statistics                  :
    Url                         : https://pfuller.westus.batch.azure.com/jobs/JobSchedule27:job-1
    ```

    This command gets the active jobs for the job schedule that has the ID JobSchedule27.
- title: 'Example 3: Gets all jobs under a job schedule by using the pipeline'
  description: |-
    ```powershell
    Get-AzBatchJobSchedule -Id "JobSchedule27" -BatchContext $Context | Get-AzBatchJob -BatchContext $Context
    ```

    ```output
    CommonEnvironmentSettings   :
    Constraints                 : Microsoft.Azure.Commands.Batch.Models.PSJobConstraints
    CreationTime                : 7/25/2015 9:15:44 PM
    DisplayName                 :
    ETag                        : 0x8D2953633DD13E1
    ExecutionInformation        : Microsoft.Azure.Commands.Batch.Models.PSJobExecutionInformation
    Id                          : JobSchedule27:job-1
    JobManagerTask              :
    JobPreparationTask          :
    JobReleaseTask              :
    LastModified                : 7/25/2015 9:15:44 PM
    Metadata                    :
    PoolInformation             : Microsoft.Azure.Commands.Batch.Models.PSPoolInformation
    PreviousState               :
    PreviousStateTransitionTime :
    Priority                    : 0
    State                       : Active
    StateTransitionTime         : 7/25/2015 9:15:44 PM
    Statistics                  :
    Url                         : https://pfuller.westus.batch.azure.com/jobs/JobSchedule27:job-1
    ```

    This command gets the job schedule that has the ID JobSchedule27 by using the Get-AzBatchJobSchedule cmdlet.
    The command passes that job schedule to the current cmdlet by using the pipeline operator.
    The command gets all jobs for that job schedule.
