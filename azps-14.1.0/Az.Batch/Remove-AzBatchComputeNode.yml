### YamlMime:PowerShellCmdlet1
uid: Az.Batch.Remove-AzBatchComputeNode
name: Remove-AzBatchComputeNode
module: Az.Batch
isPreview: false
summary: |-
  Removes compute nodes from a pool.
description: |-
  The **Remove-AzBatchComputeNode** cmdlet removes Azure Batch compute nodes from a pool.
