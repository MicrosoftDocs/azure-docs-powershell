examples:
- title: 'Example 1: Create a job schedule'
  description: |-
    ```powershell
    $Schedule = New-Object -TypeName "Microsoft.Azure.Commands.Batch.Models.PSSchedule"
    $Schedule.RecurrenceInterval = [TimeSpan]::FromDays(1)
    $JobSpecification = New-Object -TypeName "Microsoft.Azure.Commands.Batch.Models.PSJobSpecification"
    $JobSpecification.PoolInformation = New-Object -TypeName "Microsoft.Azure.Commands.Batch.Models.PSPoolInformation"
    $JobSpecification.PoolInformation.PoolId = "ContosoPool06"
    New-AzBatchJobSchedule -Id "JobSchedule17" -Schedule $Schedule -JobSpecification $JobSpecification -BatchContext $Context
    ```

    This example creates a job schedule.
    The first five commands create and modify **PSSchedule**, **PSJobSpecification**, and **PSPoolInformation** objects.
    The commands use the New-Object cmdlet and standard Azure PowerShell syntax.
    The commands store these objects in the $Schedule and $JobSpecification variables.
    The final command creates a job schedule that has the ID JobSchedule17.
    This schedule creates jobs with a recurrence interval of one day.
    The jobs run on the pool that has the ID ContosoPool06, as specified in the fifth command.
    Use the **Get-AzBatchAccountKey** cmdlet to assign a context to the $Context variable.
