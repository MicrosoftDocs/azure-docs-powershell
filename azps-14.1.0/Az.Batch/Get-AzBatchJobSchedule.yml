### YamlMime:PowerShellCmdlet1
uid: Az.Batch.Get-AzBatchJobSchedule
name: Get-AzBatchJobSchedule
module: Az.Batch
isPreview: false
summary: |-
  Gets Batch job schedules.
description: |-
  The **Get-AzBatchJobSchedule** cmdlet gets Azure Batch job schedules for the Batch account specified by the *BatchContext* parameter.
  Specify an ID to get a single job schedule.
  Specify the *Filter* parameter to get the job schedules that match an Open Data Protocol (OData) filter.
parameters:
  cmdletParameters:
  - name: BatchContext
    type: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **BatchAccountContext** instance that this cmdlet uses to interact with the Batch service.
      If you use the Get-AzBatchAccount cmdlet to get your BatchAccountContext, then Microsoft Entra authentication will be used when interacting with the Batch service. To use shared key authentication instead, use the Get-AzBatchAccountKey cmdlet to get a BatchAccountContext object with its access keys populated. When using shared key authentication, the primary access key is used by default. To change the key to use, set the BatchAccountContext.KeyInUse property.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Expand
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Open Data Protocol (OData) expand clause.
      Specify a value for this parameter to get associated entities of the main entity that you get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an OData filter clause.
      This cmdlet returns job schedules that match the filter that this parameter specifies.
      If you do not specify a filter, this cmdlet returns all job schedules for the Batch context.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ODataFilter
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of the job schedule that this cmdlet gets.
      You cannot specify wildcard characters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Id
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxCount
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of job schedules to return.
      If you specify a value of zero (0) or less, the cmdlet does not use an upper limit.
      The default value is 1000.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ODataFilter
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Select
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an OData select clause.
      Specify a value for this parameter to get specific properties rather than all object properties.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBatchJobSchedule
        -BatchContext <BatchAccountContext>
        [-Filter <String>]
        [-MaxCount <Int32>]
        [-Select <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ODataFilter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzBatchJobSchedule
        [[-Id] <String>]
        -BatchContext <BatchAccountContext>
        [-Select <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.Models.PSCloudJobSchedule" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a job schedule by specifying an ID'
  description: |-
    ```powershell
    Get-AzBatchJobSchedule -Id "JobSchedule23" -BatchContext $Context
    ```

    ```output
