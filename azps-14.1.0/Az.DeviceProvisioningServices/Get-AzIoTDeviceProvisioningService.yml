### YamlMime:PowerShellCmdlet1
uid: Az.DeviceProvisioningServices.Get-AzIoTDeviceProvisioningService
name: Get-AzIoTDeviceProvisioningService
module: Az.DeviceProvisioningServices
isPreview: false
summary: |-
  List all or show details of Azure IoT Hub device provisioning services.
description: |-
  For an introduction to Azure IoT Hub Device Provisioning Service, see https://learn.microsoft.com/azure/iot-dps/about-iot-dps.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of the IoT Device Provisioning Service
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetIotDpsByName
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of the Resource Group
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListIotDpsByResourceGroup
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzIoTDeviceProvisioningService
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListIotDpsByResourceGroup
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzIoTDeviceProvisioningService
        [-Name] <String>
        -ResourceGroupName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetIotDpsByName
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Management.DeviceProvisioningServices.Models.PSProvisioningServiceDescription" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzIoTDeviceProvisioningService
    ```

    ```output
    ResourceGroupName	Name		Location	ServiceOperationsHostName					IotHubs	AllocationPolicy	Tags	State
    -----------------	----		--------	-------------------------					------- ----------------	----	-----
    myresourcegroup0	myiotdps0	eastus		myiotdps0.azure-devices-provisioning.net	0       Static				0		Active
    myresourcegroup1    myiotdps1	eastus		myiotdps1.azure-devices-provisioning.net	4       Hashed				0		Active
    myresourcegroup1    myiotdps2	westus		myiotdps2.azure-devices-provisioning.net	4       GeoLatency			0		Active
    ```

    List all Azure IoT Hub device provisioning services in a subscription.
- title: Example 2
  description: |-
    ```powershell
    Get-AzIoTDeviceProvisioningService -ResourceGroupName "myresourcegroup"
    ```

    ```output
    ResourceGroupName	Name		Location	ServiceOperationsHostName					IotHubs	AllocationPolicy	Tags	State
    -----------------	----		--------	-------------------------					------- ----------------	----	-----
    myresourcegroup		myiotdps1	eastus		myiotdps1.azure-devices-provisioning.net	1       Hashed				0		Active
    myresourcegroup     myiotdps2	westus		myiotdps2.azure-devices-provisioning.net	4       GeoLatency			0		Active
    ```

    List all Azure IoT Hub device provisioning services in the resource group 'myresourcegroup'.
- title: Example 3
  description: |-
    ```powershell
    Get-AzIoTDeviceProvisioningService -ResourceGroupName "myresourcegroup" -Name "myiotdps"
    ```

    ```output
    ResourceGroupName			: myresourcegroup
    Name						: myiotdps
    Location					: eastus
    Type						: Microsoft.Devices/provisioningServices
    ServiceOperationsHostName	: myiotdps.azure-devices-provisioning.net
    IotHubs						: 0
    State						: Active
    AllocationPolicy			: Hashed
    Tags						: {}
    SkuName						: S1
    SkuTier						: Standard
    Etag						: AAAAAAAT52k=
    ```

    Show details of an Azure IoT Hub device provisioning service 'myiotdps'.
