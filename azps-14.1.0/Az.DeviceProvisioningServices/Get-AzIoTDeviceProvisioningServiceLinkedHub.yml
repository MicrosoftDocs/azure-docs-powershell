syntaxes:
- syntax: |-
    ```Syntax
    Get-AzIoTDeviceProvisioningServiceLinkedHub
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-LinkedHubName <String>]
        [-DefaultProfile <IAzureContextContainer>]
