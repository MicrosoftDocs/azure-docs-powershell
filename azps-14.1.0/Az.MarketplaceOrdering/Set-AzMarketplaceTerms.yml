    Set-AzMarketplaceTerms
        -Product <String>
        -Name <String>
        -Publisher <String>
        [-SubscriptionId <String>]
        [-Accept]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TermsAccept
  isDefault: true
- syntax: |-
