- title: 'Example 1: list all asset endpoint profiles from a specified subscription.'
  description: |-
    ```powershell
    Get-AzDeviceRegistryAssetEndpointProfile -SubscriptionId xxxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxx
    ```

