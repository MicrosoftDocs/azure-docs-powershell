examples:
- title: 'Example 1: Remove a budget with a budget name at subscription level'
  description: |-
    ```powershell
    Remove-AzConsumptionBudget -Name PSBudget -PassThru
    ```

    ```output
    True
    ```
- title: 'Example 2: Remove a budget with a budget name at resource group level'
  description: |-
    ```powershell
    Remove-AzConsumptionBudget -ResourceGroupName RGBudgets -Name PSBudgetRG -PassThru
    ```

    ```output
    True
    ```
- title: 'Example 3: Remove a budget through piping at subscription level'
  description: |-
    ```powershell
    Get-AzConsumptionBudget -Name PSBudget | Remove-AzConsumptionBudget -PassThru
    ```

    ```output
    True
    ```
