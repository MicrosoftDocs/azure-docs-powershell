- syntax: |-
    ```Syntax
    Get-AzConsumptionReservationDetail
        -StartDate <DateTime>
        -EndDate <DateTime>
        -ReservationOrderId <String>
        [-ReservationId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
