syntaxes:
- syntax: |-
    ```Syntax
    Update-AzPortalDashboard
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Lens <IDashboardLens[]>]
        [-Metadata <Hashtable>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
