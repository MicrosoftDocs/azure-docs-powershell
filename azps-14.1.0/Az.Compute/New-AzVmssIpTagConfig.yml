syntaxes:
- syntax: |-
    ```Syntax
    New-AzVmssIpTagConfig
        [-IpTagType] <String>
        [-Tag <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
