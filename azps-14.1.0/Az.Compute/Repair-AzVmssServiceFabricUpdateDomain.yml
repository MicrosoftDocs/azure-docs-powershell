    Repair-AzVmssServiceFabricUpdateDomain
        [-ResourceGroupName] <String>
        [-VMScaleSetName] <String>
        [-PlatformUpdateDomain] <Int32>
        [-Zone <String>]
        [-PlacementGroupId <String>]
