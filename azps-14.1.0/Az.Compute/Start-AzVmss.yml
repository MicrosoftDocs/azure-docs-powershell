syntaxes:
- syntax: |-
    ```Syntax
    Start-AzVmss
        [-ResourceGroupName] <String>
        [-VMScaleSetName] <String>
        [[-InstanceId] <String[]>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
