      Name               : ESv3-Type1
    Id                   : /subscriptions/e37510d7-33b6-4676-886f-ee75bcc01871/resourceGroups/rgname/providers/Microsoft.Compute/hostGroups/rgnameHostGroup/hosts/rgnameHost
    Name                 : rgnameHost
    Type                 : Microsoft.Compute/hostGroups/hosts
    Location             : eastus
    Tags                 : {}
    ```
