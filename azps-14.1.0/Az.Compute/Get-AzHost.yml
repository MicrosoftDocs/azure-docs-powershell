### YamlMime:PowerShellCmdlet1
uid: Az.Compute.Get-AzHost
name: Get-AzHost
module: Az.Compute
isPreview: false
summary: |-
  Get or list hosts.
description: |-
  This cmdlet will get a host in a host group.
  This cmdlet also lists all hosts in a host group if a host name is not given.
