uid: Az.Compute.Get-AzRemoteDesktopFile
name: Get-AzRemoteDesktopFile
module: Az.Compute
isPreview: false
summary: |-
  Gets an .rdp file.
description: |-
  The **Get-AzRemoteDesktopFile** cmdlet gets a Remote Desktop Protocol (.rdp) file.
