syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRemoteDesktopFile
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-LocalPath] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Download
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRemoteDesktopFile
        [-ResourceGroupName] <String>
        [-Name] <String>
        [[-LocalPath] <String>]
        [-Launch]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Launch
  isDefault: false
