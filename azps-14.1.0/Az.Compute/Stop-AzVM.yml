syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzVM
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Force]
        [-StayProvisioned]
        [-NoWait]
        [-SkipShutdown]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceGroupNameParameterSetName
  isDefault: true
- syntax: |-
