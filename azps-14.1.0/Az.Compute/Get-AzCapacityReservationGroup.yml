examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzCapacityReservationGroup -ResourceGroupName $rgname -Name "CRGroup1" -InstanceView
    ```

    This will retrieve the Capacity Reservation Group named "CRGroup1" with its instance view information.
- title: Example 2
