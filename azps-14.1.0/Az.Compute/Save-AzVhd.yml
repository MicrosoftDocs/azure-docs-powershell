syntaxes:
- syntax: |-
    ```Syntax
    Save-AzVhd
        [-ResourceGroupName] <String>
        [-SourceUri] <Uri>
        [-LocalFilePath] <FileInfo>
        [[-NumberOfThreads] <Int32>]
        [-OverWrite]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceGroupParameterSetName
  isDefault: false
- syntax: |-
    ```Syntax
    Save-AzVhd
        [-StorageKey] <String>
        [-SourceUri] <Uri>
        [-LocalFilePath] <FileInfo>
        [[-NumberOfThreads] <Int32>]
        [-OverWrite]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: StorageKeyParameterSetName
  isDefault: false
