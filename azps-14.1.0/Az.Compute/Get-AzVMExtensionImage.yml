### YamlMime:PowerShellCmdlet1
uid: Az.Compute.Get-AzVMExtensionImage
name: Get-AzVMExtensionImage
module: Az.Compute
isPreview: false
summary: |-
  Gets all versions for an Azure extension.
description: |-
  The **Get-AzVMExtensionImage** cmdlet gets all versions for an Azure extension.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FilterExpression
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a filter expression.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the location of an extension.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PublisherName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an extension publisher.
      To obtain an extension publisher, use the Get-AzVMImagePublisher cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Type
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of the extension.
      To obtain an extension type, use the Get-AzVMExtensionImageType cmdlet.
