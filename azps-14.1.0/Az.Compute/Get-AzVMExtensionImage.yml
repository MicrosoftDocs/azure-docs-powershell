    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVMExtensionImage
        -Location <String>
        -PublisherName <String>
        -Type <String>
        [-FilterExpression <String>]
        [-Version <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
