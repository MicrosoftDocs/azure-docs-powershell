syntaxes:
- syntax: |-
    ```Syntax
    Set-AzVMUefi
        [-VM] <PSVirtualMachine>
        [-EnableVtpm <Boolean>]
        [-EnableSecureBoot <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
