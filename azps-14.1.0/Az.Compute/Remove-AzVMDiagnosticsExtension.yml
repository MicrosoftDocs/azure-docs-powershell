syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzVMDiagnosticsExtension
        [-ResourceGroupName] <String>
        [-VMName] <String>
        [[-Name] <String>]
        [-NoWait]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
