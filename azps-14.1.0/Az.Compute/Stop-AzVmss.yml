syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzVmss
        [-ResourceGroupName] <String>
        [-VMScaleSetName] <String>
        [[-InstanceId] <String[]>]
        [-Force]
        [-AsJob]
        [-Hibernate]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultParameter
  isDefault: true
- syntax: |-
