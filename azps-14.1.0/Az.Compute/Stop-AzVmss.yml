        [-ResourceGroupName] <String>
        [-VMScaleSetName] <String>
        [[-InstanceId] <String[]>]
        [-Force]
        [-StayProvisioned]
        [-SkipShutdown]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
