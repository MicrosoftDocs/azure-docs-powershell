### YamlMime:PowerShellCmdlet1
uid: Az.Compute.Set-AzVMADDomainExtension
name: Set-AzVMADDomainExtension
module: Az.Compute
isPreview: false
summary: |-
  Adds an AD domain extension to a virtual machine.
description: |-
  The **Set-AzVMADDomainExtension** cmdlet adds a Microsoft Entra ID virtual machine extension to a virtual machine.
  This extension lets your virtual machine join a domain.
