syntaxes:
- syntax: |-
    ```Syntax
    Set-AzVMADDomainExtension
        -DomainName <String>
        [-OUPath <String>]
        [-JoinOption <UInt32>]
        [-Credential <PSCredential>]
        [-Restart]
        [-ResourceGroupName] <String>
        [-VMName] <String>
        -Name <String>
        [-TypeHandlerVersion <String>]
        [-Location <String>]
        [-DisableAutoUpgradeMinorVersion]
        [-ForceRerun <String>]
        [-NoWait]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
