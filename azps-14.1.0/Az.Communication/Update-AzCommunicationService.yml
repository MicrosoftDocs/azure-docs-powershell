syntaxes:
- syntax: |-
    ```Syntax
    Update-AzCommunicationService
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-EnableSystemAssignedIdentity <Boolean>]
        [-LinkedDomain <String[]>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzCommunicationService
        -InputObject <ICommunicationIdentity>
        [-EnableSystemAssignedIdentity <Boolean>]
        [-LinkedDomain <String[]>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
