        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Location <String>]
        [-DataLocation <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
