syntaxes:
- syntax: |-
    ```Syntax
    New-AzKeyVaultCertificatePolicy
        [-IssuerName] <String>
        [-SubjectName] <String>
        [-RenewAtNumberOfDaysBeforeExpiry <Int32>]
        [-RenewAtPercentageLifetime <Int32>]
        [-SecretContentType <String>]
        [-ReuseKeyOnRenewal]
        [-Disabled]
        [-KeyUsage <System.Collections.Generic.List`1[System.Security.Cryptography.X509Certificates.X509KeyUsageFlags]>]
        [-Ekus <System.Collections.Generic.List`1[System.String]>]
        [-ValidityInMonths <Int32>]
        [-CertificateType <String>]
        [-EmailAtNumberOfDaysBeforeExpiry <Int32>]
        [-EmailAtPercentageLifetime <Int32>]
        [-KeyType <String>]
        [-KeySize <Int32>]
        [-KeyNotExportable]
        [-CertificateTransparency <Boolean>]
        [-Curve <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SubjectName
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzKeyVaultCertificatePolicy
        [-IssuerName] <String>
        [[-SubjectName] <String>]
        [-DnsName] <System.Collections.Generic.List`1[System.String]>
        [-RenewAtNumberOfDaysBeforeExpiry <Int32>]
        [-RenewAtPercentageLifetime <Int32>]
        [-SecretContentType <String>]
        [-ReuseKeyOnRenewal]
        [-Disabled]
        [-KeyUsage <System.Collections.Generic.List`1[System.Security.Cryptography.X509Certificates.X509KeyUsageFlags]>]
        [-Ekus <System.Collections.Generic.List`1[System.String]>]
        [-ValidityInMonths <Int32>]
        [-CertificateType <String>]
        [-EmailAtNumberOfDaysBeforeExpiry <Int32>]
        [-EmailAtPercentageLifetime <Int32>]
        [-KeyType <String>]
        [-KeySize <Int32>]
        [-KeyNotExportable]
        [-CertificateTransparency <Boolean>]
        [-Curve <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DNSNames
  isDefault: false
