examples:
- title: 'Example 1: Create a certificate policy'
  description: |-
    ```powershell
    New-AzKeyVaultCertificatePolicy -SecretContentType "application/x-pkcs12" -SubjectName "CN=contoso.com" -IssuerName "Self" -ValidityInMonths 6 -ReuseKeyOnRenewal
    ```

    ```output
    SecretContentType               : application/x-pkcs12
    Kty                             :
    KeySize                         : 2048
    Curve                           :
    Exportable                      :
    ReuseKeyOnRenewal               : True
    SubjectName                     : CN=contoso.com
    DnsNames                        :
    KeyUsage                        :
    Ekus                            :
    ValidityInMonths                : 6
    IssuerName                      : Self
    CertificateType                 :
    RenewAtNumberOfDaysBeforeExpiry :
    RenewAtPercentageLifetime       :
    EmailAtNumberOfDaysBeforeExpiry :
    EmailAtPercentageLifetime       :
    CertificateTransparency         :
    Enabled                         : True
    Created                         :
    Updated                         :
    ```

    This command creates a certificate policy that is valid for six months and reuses the key to renew the certificate.
- title: Example 2
  description: |-
    Creates an in-memory certificate policy object. (autogenerated)

    <!-- Aladdin Generated Example -->


    ```powershell
    New-AzKeyVaultCertificatePolicy -IssuerName 'Self' -KeyType RSA -RenewAtNumberOfDaysBeforeExpiry <Int32> -SecretContentType application/x-pkcs12 -SubjectName 'CN=contoso.com' -ValidityInMonths 6
    ```
- title: 'Example 3: Create a Subject Alternate Name (or SAN) certificate'
  description: |-
    ```powershell
    New-AzKeyVaultCertificatePolicy -SecretContentType "application/x-pkcs12" -SubjectName "CN=contoso.com" -DnsName "contoso.com","support.contoso.com","docs.contoso.com" -IssuerName "Self"
    ```

    ```output
    SecretContentType               : application/x-pkcs12
    Kty                             : RSA
    KeySize                         : 2048
    Curve                           :
    Exportable                      :
    ReuseKeyOnRenewal               : False
    SubjectName                     : CN=contoso.com
    DnsNames                        : {contoso.com, support.contoso.com, docs.contoso.com}
    KeyUsage                        :
    Ekus                            :
    ValidityInMonths                :
    IssuerName                      : Self
    CertificateType                 :
    RenewAtNumberOfDaysBeforeExpiry :
    RenewAtPercentageLifetime       :
    EmailAtNumberOfDaysBeforeExpiry :
    EmailAtPercentageLifetime       :
    CertificateTransparency         :
    Enabled                         : True
    Created                         :
    Updated                         :
    ```

    This example creates a SAN certificate with 3 DNS names.
