syntaxes:
- syntax: |-
    ```Syntax
    Import-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        -FilePath <String>
        [-Password <SecureString>]
        [-PolicyPath <String>]
        [-PolicyObject <PSKeyVaultCertificatePolicy>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ImportCertificateFromFile
  isDefault: true
- syntax: |-
    ```Syntax
    Import-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        -CertificateString <String>
        [-ContentType <String>]
        [-Password <SecureString>]
        [-PolicyPath <String>]
        [-PolicyObject <PSKeyVaultCertificatePolicy>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ImportWithPrivateKeyFromString
  isDefault: false
- syntax: |-
    ```Syntax
    Import-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        [-CertificateCollection] <X509Certificate2Collection>
        [-PolicyPath <String>]
        [-PolicyObject <PSKeyVaultCertificatePolicy>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ImportWithPrivateKeyFromCollection
  isDefault: false
