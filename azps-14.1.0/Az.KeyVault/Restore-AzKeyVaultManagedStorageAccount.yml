examples:
- title: 'Example 1: Restore a backed-up managed storage account'
  description: |-
    ```powershell
    Restore-AzKeyVaultManagedStorageAccount -VaultName 'MyKeyVault' -InputFile "C:\Backup.blob"
    ```

    ```output
    Id                  : https://mykeyvault.vault.azure.net:443/storage/mystorageaccount
    Vault Name          : MyKeyVault
    AccountName         : mystorageaccount
    Account Resource Id : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxxx/resourceGroups/myrg/providers/Microsoft.St
                          orage/storageAccounts/mystorageaccount
    Active Key Name     : key1
    Auto Regenerate Key : True
    Regeneration Period : 90.00:00:00
    Enabled             : True
    Created             : 5/21/2018 11:55:58 PM
    Updated             : 5/21/2018 11:55:58 PM
    Tags                :
    ```

    This command restores a managed storage account, including all of its versions, from the backup file named Backup.blob into the key vault named MyKeyVault.
