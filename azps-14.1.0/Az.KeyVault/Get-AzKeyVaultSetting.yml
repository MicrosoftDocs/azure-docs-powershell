### YamlMime:PowerShellCmdlet1
uid: Az.KeyVault.Get-AzKeyVaultSetting
name: Get-AzKeyVaultSetting
module: Az.KeyVault
isPreview: false
summary: |-
  Retrieves a specified key vault account setting or all available key vault account settings that can be configured.
description: |-
  The **Get-AzKeyVaultSetting** cmdlet gets key vault account settings.
  This cmdlet gets a specific key vault account setting or all key vault account settings.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HsmId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Hsm Resource Id.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetSettingViaHsmId
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HsmName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of the HSM.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetSettingViaFlattenParameters
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HsmObject
    type: <xref href="Microsoft.Azure.Commands.KeyVault.Models.PSManagedHsm" data-throw-if-not-resolved="False" />
    description: |-
      Hsm Object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetSettingViaHsmObject
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of the setting.
    defaultValue: None
    dontShow: false
