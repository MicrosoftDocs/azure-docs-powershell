uid: Az.KeyVault.Backup-AzKeyVault
name: Backup-AzKeyVault
module: Az.KeyVault
isPreview: false
summary: |-
  Fully backup a managed HSM.
description: |-
  Fully backup a managed HSM to a storage account.
  Use `Restore-AzKeyVault` to restore the backup.
