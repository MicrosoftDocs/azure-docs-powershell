uid: Az.KeyVault.Restore-AzKeyVault
name: Restore-AzKeyVault
module: Az.KeyVault
isPreview: false
summary: |-
  Fully restores a managed HSM from backup.
description: |-
  Fully restores a managed HSM from a backup stored in a storage account.
  Use `Backup-AzKeyVault` to backup.
