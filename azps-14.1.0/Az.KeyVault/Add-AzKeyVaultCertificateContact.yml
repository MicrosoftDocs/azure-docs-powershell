examples:
- title: 'Example 1: Add a key vault certificate contact'
  description: |-
    ```powershell
    Add-AzKeyVaultCertificateContact -VaultName "ContosoKV01" -EmailAddress "patti.fuller@contoso.com" -PassThru
    ```

    ```output
    Email                    VaultName
    -----                    ---------
    patti.fuller@contoso.com ContosoKV01
    ```

    This command adds Patti Fuller as a certificate contact for the ContosoKV01 key vault and returns the list of contacts for the "ContosoKV01" vault.
