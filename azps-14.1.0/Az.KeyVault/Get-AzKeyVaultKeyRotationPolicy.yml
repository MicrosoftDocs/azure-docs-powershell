examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzKeyVaultKeyRotationPolicy -VaultName test-kv -Name test-key
    ```

    ```output
    Id              :
    VaultName       : test-kv
    KeyName         : test-key
    LifetimeActions : {[Action: Notify, TimeAfterCreate: , TimeBeforeExpiry: P30D]}
    ExpiresIn       :
    CreatedOn       :
    UpdatedOn       :
    ```

    This cmdlet gets the key rotation policy for test-kv.
