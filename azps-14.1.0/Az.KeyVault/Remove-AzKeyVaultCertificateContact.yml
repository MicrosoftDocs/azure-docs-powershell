examples:
- title: 'Example 1: Remove a certificate contact'
  description: |-
    ```powershell
    Remove-AzKeyVaultCertificateContact -VaultName "Contoso01" -EmailAddress "patti.fuller@contoso.com" -PassThru
    ```

    ```output
    Email               VaultName
    -----               ---------
    user1@microsoft.com mvault2
    user2@microsoft.com mvault2
    user3@microsoft.com mvault2
    user4@microsoft.com mvault2
    ```

    This command removes Patti Fuller as a certificate contact for the Contoso01 key vault.  If PassThru is specified, the cmdlet returns the list of remaining certificate contacts.
