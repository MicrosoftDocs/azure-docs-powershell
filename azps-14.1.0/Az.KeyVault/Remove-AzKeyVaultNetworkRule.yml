    Remove-AzKeyVaultNetworkRule
        [-VaultName] <String>
        [[-ResourceGroupName] <String>]
        [-IpAddressRange <String[]>]
        [-VirtualNetworkResourceId <String[]>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [-SubscriptionId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ByVaultName
  isDefault: true
- syntax: |-
