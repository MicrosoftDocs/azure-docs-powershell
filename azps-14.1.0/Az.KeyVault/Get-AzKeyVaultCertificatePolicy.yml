syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKeyVaultCertificatePolicy
        [-VaultName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: VaultAndCertName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzKeyVaultCertificatePolicy
        [-InputObject] <PSKeyVaultCertificateIdentityItem>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
