### YamlMime:PowerShellCmdlet1
uid: Az.KeyVault.Get-AzKeyVaultCertificatePolicy
name: Get-AzKeyVaultCertificatePolicy
module: Az.KeyVault
isPreview: false
summary: |-
  Gets the policy for a certificate in a key vault.
description: |-
  The **Get-AzKeyVaultCertificatePolicy** cmdlet gets the policy for a certificate in a key vault in Azure Key Vault.
