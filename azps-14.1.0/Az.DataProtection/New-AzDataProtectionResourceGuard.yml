syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataProtectionResourceGuard
        -ResourceGroupName <String>
        -Name <String>
        -Location <String>
        [-SubscriptionId <String>]
        [-ETag <String>]
        [-IdentityType <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
