syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataProtectionRetentionLifeCycleClientObject
        -SourceDataStore <DataStoreType>
        -SourceRetentionDurationType <DurationType>
        -SourceRetentionDurationCount <Int32>
        [-TargetDataStore <DataStoreType>]
