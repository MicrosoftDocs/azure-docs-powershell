syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDataProtectionResourceGuard
        -ResourceGroupName <String>
        -Name <String>
        [-SubscriptionId <String>]
        [-ETag <String>]
        [-IdentityType <String>]
        [-Tag <Hashtable>]
        [-CriticalOperationExclusionList <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
