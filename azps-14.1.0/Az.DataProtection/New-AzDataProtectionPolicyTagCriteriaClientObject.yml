syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataProtectionPolicyTagCriteriaClientObject
        [-DaysOfWeek <DaysOfWeek[]>]
        [-WeeksOfMonth <WeeksOfMonth[]>]
        [-MonthsOfYear <MonthsOfYear[]>]
        [-ScheduleTimes <DateTime[]>]
        [<CommonParameters>]
    ```
  parameterSetName: ScheduleCriteria
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDataProtectionPolicyTagCriteriaClientObject
        -AbsoluteCriteria <AbsoluteTagCriteria>
        [<CommonParameters>]
    ```
  parameterSetName: AbsoluteCriteria
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzDataProtectionPolicyTagCriteriaClientObject
        -DaysOfMonth <String[]>
        [-MonthsOfYear <MonthsOfYear[]>]
        [-ScheduleTimes <DateTime[]>]
