syntaxes:
- syntax: |-
    ```Syntax
    Search-AzDataProtectionBackupInstanceInAzGraph
        -Subscription <String[]>
        -DatasourceType <DatasourceTypes>
        [-ResourceGroup <String[]>]
        [-Vault <String[]>]
        [-ProtectionStatus <ProtectionStatus[]>]
