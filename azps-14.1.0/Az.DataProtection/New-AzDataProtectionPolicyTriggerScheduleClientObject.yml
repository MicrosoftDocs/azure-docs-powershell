### YamlMime:PowerShellCmdlet1
uid: Az.DataProtection.New-AzDataProtectionPolicyTriggerScheduleClientObject
name: New-AzDataProtectionPolicyTriggerScheduleClientObject
module: Az.DataProtection
isPreview: false
summary: |-
  Creates new Schedule object
description: |-
  Creates new Schedule object
parameters:
  cmdletParameters:
  - name: IntervalCount
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Frequency of the backup.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IntervalType
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.DataProtection.Support.BackupFrequency" data-throw-if-not-resolved="False" />
    description: |-
      Freuquency of the backup.
    acceptedValues:
    - Daily
    - Weekly
    - Hourly
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ScheduleDays
    type: <xref href="System.DateTime" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Days with which backup will be scheduled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataProtectionPolicyTriggerScheduleClientObject
        -ScheduleDays <DateTime[]>
        -IntervalType <BackupFrequency>
        -IntervalCount <Int32>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a daily schedule object'
  description: |-
    ```powershell
    $date = Get-Date
    New-AzDataProtectionPolicyTriggerScheduleClientObject -ScheduleDays $date -IntervalType Daily -IntervalCount 1
    ```

    ```output
    R/2021-03-03T12:49:55+05:30/P1D
    ```

    This command creates a daily schedule for Azure Backup Rule
- title: 'Example 2: Create an hourly schedule object'
  description: |-
    ```powershell
    $date = Get-Date
    New-AzDataProtectionPolicyTriggerScheduleClientObject -ScheduleDays $date -IntervalType Hourly -IntervalCount 4
    ```

    ```output
    R/2021-03-03T12:49:55+05:30/PT4H
    ```

    This command creates an hourly scheudle for Azure Backup Rule.
