syntaxes:
- syntax: |-
    ```Syntax
    Sync-AzDataProtectionBackupInstance
        -Name <String>
        -ResourceGroupName <String>
        -VaultName <String>
        [-SubscriptionId <String>]
        [-SyncType <SyncType>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
