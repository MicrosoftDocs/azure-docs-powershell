syntaxes:
- syntax: |-
    ```Syntax
    Search-AzDataProtectionJobInAzGraph
        -Subscription <String[]>
        -DatasourceType <DatasourceTypes>
        [-ResourceGroup <String[]>]
        [-Vault <String[]>]
        [-StartTime <DateTime>]
        [-EndTime <DateTime>]
        [-Operation <JobOperation[]>]
        [-Status <JobStatus[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
