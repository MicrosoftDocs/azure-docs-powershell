syntaxes:
- syntax: |-
    ```Syntax
    Update-AzStreamAnalyticsInput
        -File <String>
        -JobName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Update
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzStreamAnalyticsInput
        -File <String>
        -InputObject <IStreamAnalyticsIdentity>
        [-IfMatch <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentity
  isDefault: false
