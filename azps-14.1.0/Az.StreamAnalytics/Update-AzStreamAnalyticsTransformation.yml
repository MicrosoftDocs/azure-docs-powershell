syntaxes:
- syntax: |-
    ```Syntax
    Update-AzStreamAnalyticsTransformation
        -JobName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-Query <String>]
        [-StreamingUnit <Int32>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzStreamAnalyticsTransformation
        -InputObject <IStreamAnalyticsIdentity>
        [-IfMatch <String>]
        [-Query <String>]
        [-StreamingUnit <Int32>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
