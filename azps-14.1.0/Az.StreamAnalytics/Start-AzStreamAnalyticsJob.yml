uid: Az.StreamAnalytics.Start-AzStreamAnalyticsJob
name: Start-AzStreamAnalyticsJob
module: Az.StreamAnalytics
isPreview: false
summary: |-
  Starts a streaming job.
  Once a job is started it will start processing input events and produce output.
