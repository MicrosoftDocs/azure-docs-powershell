syntaxes:
- syntax: |-
    ```Syntax
    Start-AzStreamAnalyticsJob
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-OutputStartMode <OutputStartMode>]
        [-OutputStartTime <DateTime>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StartExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzStreamAnalyticsJob
        -InputObject <IStreamAnalyticsIdentity>
        [-OutputStartMode <OutputStartMode>]
        [-OutputStartTime <DateTime>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StartViaIdentityExpanded
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.StreamAnalytics.Models.IStreamAnalyticsIdentity" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Start a Stream Analytics job'
  description: |-
    ```powershell
    Start-AzStreamAnalyticsJob -ResourceGroupName azure-rg-test -Name sajob-01-portal
    ```

    This command starts the job StreamingJob.
- title: 'Example 2: Start a Stream Analytics job by pipeline'
  description: |-
    ```powershell
    Get-AzStreamAnalyticsJob -ResourceGroupName azure-rg-test -Name sajob-01-portal | Start-AzStreamAnalyticsJob
    ```

    This command starts the job StreamingJob by pipeline.
