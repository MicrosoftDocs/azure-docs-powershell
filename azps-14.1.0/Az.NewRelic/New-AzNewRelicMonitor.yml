        [-OrgCreationSource <String>]
        [-OrganizationInfoOrganizationId <String>]
        [-PlanDataBillingCycle <String>]
        [-PlanDataEffectiveDate <DateTime>]
        [-PlanDataPlanDetail <String>]
        [-PlanDataUsageType <String>]
        [-SaaSAzureSubscriptionStatus <String>]
        [-SingleSignOnPropertyEnterpriseAppId <String>]
        [-SingleSignOnPropertyProvisioningState <String>]
        [-SingleSignOnPropertySingleSignOnState <String>]
        [-SingleSignOnPropertySingleSignOnUrl <String>]
        [-SubscriptionState <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-UserInfoCountry <String>]
        [-UserInfoEmailAddress <String>]
        [-UserInfoFirstName <String>]
        [-UserInfoLastName <String>]
        [-UserInfoPhoneNumber <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
