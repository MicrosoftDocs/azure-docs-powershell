syntaxes:
- syntax: |-
    ```Syntax
    New-AzNewRelicMonitor
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        [-SubscriptionId <String>]
        [-AccountCreationSource <String>]
        [-AccountInfoAccountId <String>]
        [-AccountInfoIngestionKey <SecureString>]
        [-AccountInfoRegion <String>]
        [-EnableSystemAssignedIdentity]
