syntaxes:
- syntax: |-
    ```Syntax
    New-AzDigitalTwinsPrivateEndpointConnection
        -Name <String>
        -ResourceGroupName <String>
        -ResourceName <String>
        [-SubscriptionId <String>]
        [-GroupId <String[]>]
        [-PrivateLinkServiceConnectionStateActionsRequired <String>]
        [-PrivateLinkServiceConnectionStateDescription <String>]
        [-PrivateLinkServiceConnectionStateStatus <PrivateLinkServiceConnectionStatus>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDigitalTwinsPrivateEndpointConnection
        -InputObject <IDigitalTwinsIdentity>
        [-GroupId <String[]>]
        [-PrivateLinkServiceConnectionStateActionsRequired <String>]
        [-PrivateLinkServiceConnectionStateDescription <String>]
        [-PrivateLinkServiceConnectionStateStatus <PrivateLinkServiceConnectionStatus>]
        [-DefaultProfile <PSObject>]
