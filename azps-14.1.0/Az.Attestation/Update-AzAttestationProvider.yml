syntaxes:
- syntax: |-
    ```Syntax
    Update-AzAttestationProvider
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzAttestationProvider
        -InputObject <IAttestationIdentity>
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
