### YamlMime:PowerShellCmdlet1
uid: Az.Attestation.Get-AzAttestationPolicy
name: Get-AzAttestationPolicy
module: Az.Attestation
isPreview: false
summary: |-
  Gets the policy from a tenant in Azure Attestation.
description: |-
  The Get-AzAttestationPolicy cmdlet gets the policy from a tenant in Azure Attestation.
