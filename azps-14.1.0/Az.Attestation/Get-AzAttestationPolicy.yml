syntaxes:
- syntax: |-
    ```Syntax
    Get-AzAttestationPolicy
        [-Name] <String>
        [-ResourceGroupName] <String>
        -Tee <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzAttestationPolicy
        [-ResourceId] <String>
        -Tee <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceIdParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzAttestationPolicy
        [-Location] <String>
        -Tee <String>
        [-DefaultProvider]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
