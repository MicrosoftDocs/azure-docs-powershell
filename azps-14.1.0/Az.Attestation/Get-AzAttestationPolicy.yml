examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzAttestationPolicy -Name pshtest -ResourceGroupName psh-test-rg -Tee SgxEnclave
    ```

    ```output
    Text       : version= 1.0;
                 authorizationrules{
                     c:[type=="$is-debuggable"] => permit();
                 };
                 issuancerules{
                     c:[type=="$is-debuggable"] => issue(type="is-debuggable", value=c.value);
                     c:[type=="$sgx-mrsigner"] => issue(type="sgx-mrsigner", value=c.value);
                     c:[type=="$sgx-mrenclave"] => issue(type="sgx-mrenclave", value=c.value);
                     c:[type=="$product-id"] => issue(type="product-id", value=c.value);
                     c:[type=="$svn"] => issue(type="svn", value=c.value);
                     c:[type=="$tee"] => issue(type="tee", value=c.value);
                     c:[type=="$tee-future"] => issue(type="tee-future", value=c.value);
                 };

    TextLength : 604
    Jwt        : eyJhbGciOiJub25lIn0..
    JwtLength  : 1129
    Algorithm  : none
    ```

    Gets the policy for Attestation Provider *pshtest* for Tee type *SgxEnclave*.
