syntaxes:
- syntax: |-
    ```Syntax
    Rename-AzContext
        [-TargetName] <String>
        -InputObject <PSAzureContext>
        [-Force]
        [-PassThru]
        [-Scope <ContextModificationScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RenameByInputObject
  isDefault: true
- syntax: |-
    ```Syntax
    Rename-AzContext
        [-SourceName] <String>
        [-TargetName] <String>
        [-Force]
        [-PassThru]
        [-Scope <ContextModificationScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
