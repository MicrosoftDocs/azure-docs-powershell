### YamlMime:PowerShellCmdlet1
uid: Az.Accounts.Get-AzAccessToken
name: Get-AzAccessToken
module: Az.Accounts
isPreview: false
summary: |-
  Get secure access token. When using -ResourceUrl, please make sure the value does match current Azure environment. You may refer to the value of `(Get-AzContext).Environment`.

  > [!NOTE]
  > For security purposes, the default output type has been changed from a plain text `String` to `SecureString`. For more information, see [Protect secrets in Azure PowerShell](https://go.microsoft.com/fwlink/?linkid=2258844).
description: |-
  Get secure access token
parameters:
  cmdletParameters:
  - name: AsSecureString
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      The parameter is no longer used but kept for backward compatibility. No matter `AsSecureString` is specified, the output token is a `SecureString`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceTypeName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Optional resource type name, supported values: AadGraph, AnalysisServices, AppConfiguration, Arm, Attestation, Batch, CommunicationEmail, DataLake, KeyVault, MSGraph, OperationalInsights, ResourceManager, Storage, Synapse. Default value is Arm if not specified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: KnownResourceTypeName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceUrl
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Resource url for that you're requesting token, e.g. 'https://graph.microsoft.com/'.
    aliases:
    - Resource
    - ResourceUri
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ResourceUrl
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TenantId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Optional Tenant Id. Use tenant id of default context if not specified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzAccessToken
        [-ResourceTypeName <String>]
        [-TenantId <String>]
        [-AsSecureString]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: KnownResourceTypeName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzAccessToken
        -ResourceUrl <String>
        [-TenantId <String>]
        [-AsSecureString]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceUrl
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Profile.Models.PSSecureAccessToken" data-throw-if-not-resolved="False" />
examples:
- title: Example 1 Get the access token for ARM endpoint
  description: |-
    ```powershell
    Get-AzAccessToken -AsSecureString
    ```

    Get access token of current account for ResourceManager endpoint
- title: Example 2 Get the access token for Microsoft Graph endpoint
  description: |-
    ```powershell
    Get-AzAccessToken -AsSecureString -ResourceTypeName MSGraph
    ```

    Get access token of Microsoft Graph endpoint for current account
- title: Example 3 Get the access token for Microsoft Graph endpoint
  description: |-
    ```powershell
    Get-AzAccessToken -AsSecureString -ResourceUrl "https://graph.microsoft.com/"
    ```

    Get access token of Microsoft Graph endpoint for current account
