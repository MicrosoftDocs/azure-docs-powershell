syntaxes:
- syntax: |-
    ```Syntax
    Set-AzContext
        [-Context] <PSAzureContext>
        [-ExtendedProperty <System.Collections.Generic.IDictionary`2[System.String,System.String]>]
        [-Name <String>]
        [-Force]
        [-Scope <ContextModificationScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Context
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzContext
        [-TenantObject] <PSAzureTenant>
        [-ExtendedProperty <System.Collections.Generic.IDictionary`2[System.String,System.String]>]
        [-Name <String>]
        [-Force]
        [-Scope <ContextModificationScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TenantObject
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzContext
        [-SubscriptionObject] <PSAzureSubscription>
        [-ExtendedProperty <System.Collections.Generic.IDictionary`2[System.String,System.String]>]
        [-Name <String>]
        [-Force]
        [-Scope <ContextModificationScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SubscriptionObject
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzContext
        [-Subscription] <String>
        [-Tenant <String>]
        [-ExtendedProperty <System.Collections.Generic.IDictionary`2[System.String,System.String]>]
        [-Name <String>]
        [-Force]
        [-Scope <ContextModificationScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Subscription
  isDefault: false
- syntax: |-
