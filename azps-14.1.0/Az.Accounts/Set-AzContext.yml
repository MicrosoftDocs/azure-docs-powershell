    Set-AzContext
        -Tenant <String>
        [-ExtendedProperty <System.Collections.Generic.IDictionary`2[System.String,System.String]>]
        [-Name <String>]
        [-Force]
        [-Scope <ContextModificationScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TenantNameOnly
  isDefault: false
