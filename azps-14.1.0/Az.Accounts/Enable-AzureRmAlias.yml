syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzureRmAlias
        [-Scope <String>]
        [-Module <String[]>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
