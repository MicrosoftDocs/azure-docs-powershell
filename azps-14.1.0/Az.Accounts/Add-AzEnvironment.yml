syntaxes:
- syntax: |-
    ```Syntax
    Add-AzEnvironment
        [-Name] <String>
        [[-PublishSettingsFileUrl] <String>]
        [[-ServiceEndpoint] <String>]
        [[-ManagementPortalUrl] <String>]
        [[-StorageEndpoint] <String>]
        [[-ActiveDirectoryEndpoint] <String>]
