syntaxes:
- syntax: |-
    ```Syntax
    New-AzOracleCloudExadataInfrastructure
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        -Zone <String[]>
        [-SubscriptionId <String>]
        [-ComputeCount <Int32>]
        [-CustomerContact <ICustomerContact[]>]
        [-DisplayName <String>]
        [-MaintenanceWindowCustomActionTimeoutInMin <Int32>]
        [-MaintenanceWindowDaysOfWeek <IDayOfWeek[]>]
        [-MaintenanceWindowHoursOfDay <Int32[]>]
        [-MaintenanceWindowIsCustomActionTimeoutEnabled]
        [-MaintenanceWindowIsMonthlyPatchingEnabled]
        [-MaintenanceWindowLeadTimeInWeek <Int32>]
        [-MaintenanceWindowMonth <IMonth[]>]
        [-MaintenanceWindowPatchingMode <String>]
        [-MaintenanceWindowPreference <String>]
        [-MaintenanceWindowWeeksOfMonth <Int32[]>]
        [-Shape <String>]
        [-StorageCount <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
