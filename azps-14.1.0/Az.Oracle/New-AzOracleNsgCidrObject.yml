uid: Az.Oracle.New-AzOracleNsgCidrObject
name: New-AzOracleNsgCidrObject
module: Az.Oracle
isPreview: false
summary: |-
  Create an in-memory object for NsgCidr.
description: |-
  Create an in-memory object for NsgCidr.
parameters:
  cmdletParameters:
  - name: DestinationPortRangeMax
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      The maximum port number, which must not be less than the minimum port number.
      To specify a single port number, set both the min and max to the same value.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
