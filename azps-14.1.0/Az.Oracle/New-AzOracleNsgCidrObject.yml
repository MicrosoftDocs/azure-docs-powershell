syntaxes:
- syntax: |-
    ```Syntax
    New-AzOracleNsgCidrObject
        -Source <String>
        [-DestinationPortRangeMax <Int32>]
        [-DestinationPortRangeMin <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
