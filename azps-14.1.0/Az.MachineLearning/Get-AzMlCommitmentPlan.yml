examples:
- title: 'Example 1: Get a specific commitment plan'
  description: |-
    ```powershell
    Get-AzMlCommitmentPlan -ResourceGroupName "MyResourceGroup" -Name "MyCommitmentPlanName"
    ```
- title: 'Example 2: Get all commitment plan resources in current subscription'
  description: |-
    ```powershell
    Get-AzMlCommitmentPlan
    ```
- title: 'Example 3: Get all commitment plans in the current subscription and given resource group'
  description: |-
    ```powershell
    Get-AzMlCommitmentPlan -ResourceGroupName "MyResourceGroup"
    ```
