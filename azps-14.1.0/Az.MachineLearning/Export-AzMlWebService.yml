uid: Az.MachineLearning.Export-AzMlWebService
name: Export-AzMlWebService
module: Az.MachineLearning
isPreview: false
summary: |-
  Exports the web service definition object as a JSON formatted string.
description: |-
  Exports the definition object for the specified web service as a JSON formatted string.
  You can return the string immediately or save it to a file.
