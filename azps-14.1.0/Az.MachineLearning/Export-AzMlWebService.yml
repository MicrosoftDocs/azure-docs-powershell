syntaxes:
- syntax: |-
    ```Syntax
    Export-AzMlWebService
        -WebService <WebService>
        -OutputFile <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ExportToFile
  isDefault: false
- syntax: |-
    ```Syntax
    Export-AzMlWebService
        -WebService <WebService>
        [-ToJsonString]
        [-Force]
