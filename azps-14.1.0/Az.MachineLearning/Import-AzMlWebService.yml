### YamlMime:PowerShellCmdlet1
uid: Az.MachineLearning.Import-AzMlWebService
name: Import-AzMlWebService
module: Az.MachineLearning
isPreview: false
summary: |-
  Imports a JSON object into a web service definition.
description: |-
  The Import-AzMlWebService cmdlet imports , specified either directly or in a referenced file, and creates a web service definition object that can be passed to the New-AzMlWebService cmdlet.
notes: |-
  Keywords: azure, azurerm, arm, resource, management, manager, machine, machine learning, azureml
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputFile
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The path to the file containing the web service definition to import.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ImportFromJSONFile
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: JsonString
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The JSON formatted string containing the web service definition to import.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ImportFromJSONString.
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Import-AzMlWebService
        -InputFile <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ImportFromJSONFile
  isDefault: false
- syntax: |-
    ```Syntax
    Import-AzMlWebService
        -JsonString <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ImportFromJSONString.
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Management.MachineLearning.WebServices.Models.WebService" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Import from string'
  description: |-
    ```powershell
    Import-AzMlWebService -JsonString $jsonDefinition
    ```
- title: 'Example 2: Import from file path'
  description: |-
    ```powershell
    Import-AzMlWebService -InputFile "C:\mlservice.json"
    ```
