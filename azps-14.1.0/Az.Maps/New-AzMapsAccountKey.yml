uid: Az.Maps.New-AzMapsAccountKey
name: New-AzMapsAccountKey
module: Az.Maps
isPreview: false
summary: |-
  Regenerate either the primary or secondary key for use with the Maps APIs.
  The old key will stop working immediately.
