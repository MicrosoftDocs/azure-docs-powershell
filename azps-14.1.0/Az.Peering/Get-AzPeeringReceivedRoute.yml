syntaxes:
- syntax: |-
    ```Syntax
    Get-AzPeeringReceivedRoute
        -PeeringName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-AsPath <String>]
        [-OriginAsValidationState <String>]
        [-Prefix <String>]
        [-RpkiValidationState <String>]
        [-SkipToken <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
