examples:
- title: Example 1
  description: |-
    ```powershell
    $VectorEmbedding = New-AzCosmosDBSqlVectorEmbedding -Path "/vector1" -DataType "float32" -DistanceFunction "dotproduct" -Dimensions 200
    New-AzCosmosDBSqlVectorEmbeddingPolicy -VectorEmbedding $VectorEmbedding
    ```

