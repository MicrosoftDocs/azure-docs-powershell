### YamlMime:PowerShellCmdlet1
uid: Az.CosmosDB.New-AzCosmosDBGremlinDatabaseToRestore
name: New-AzCosmosDBGremlinDatabaseToRestore
module: Az.CosmosDB
isPreview: false
summary: |-
  Creates a new CosmosDB Gremlin Database to Restore object(PSGremlinDatabaseToRestore)
description: |-
  Creates a new CosmosDB GremlinDatabaseToRestore object(PSGremlinDatabaseToRestore). This returned object can be uses to speficy the subset of databases and graphs to restore.
parameters:
  cmdletParameters:
  - name: DatabaseName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the gremlin database to restore
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GraphNames
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The names of the graphs to be restored.
      (If not provided, all the graphs will be restored)
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzCosmosDBGremlinDatabaseToRestore
        -DatabaseName <String>
        [-GraphNames <String[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.CosmosDB.Models.PSGremlinDatabaseToRestore" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    New-AzCosmosDBGremlinDatabaseToRestore -DatabaseName database1 -GraphName graph1,graph2,graph3
    ```

    ```output
    DatabaseName GraphNames
    ------------ ---------------
    database1    {graph1, graph2, graph3}
    ```

    Creates a new GremlinDatabaseToRestore object with the name database1 and graphs with names graph1, graph2 and graph3.
