syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzCosmosDBMongoDBCollectionThroughputMigration
        -DatabaseName <String>
        -ResourceGroupName <String>
        -AccountName <String>
        -ThroughputType <String>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
