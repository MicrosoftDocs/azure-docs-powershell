syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCosmosDBTableRoleAssignment
        -ResourceGroupName <String>
        -AccountName <String>
        [-Id <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
