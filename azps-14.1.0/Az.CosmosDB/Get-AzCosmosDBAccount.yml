syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCosmosDBAccount
        -ResourceGroupName <String>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameParameterSet
  isDefault: true
