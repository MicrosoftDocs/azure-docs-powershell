- name: <xref href="Microsoft.Azure.Commands.CosmosDB.Models.PSDatabaseAccountGetResults" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzCosmosDBAccount -ResourceGroupName "resourceGroupName" -Name "databaseAccountName"
    ```

    ```output
    Id                            : /subscriptions/{subscriptionid}/resourceGroups/{resourceGroupName}/providers/Microsoft.DocumentDB/databaseAccounts/{databaseAccountName}
    Name                          : {databaseAccountName}
    FailoverPolicies              : {databaseAccountName-region1}
    ReadLocations                 : {databaseAccountName-region1}
    WriteLocations                : {databaseAccountName-region1}
    Capabilities                  : {}
    ConsistencyPolicy             : Microsoft.Azure.Management.CosmosDB.Models.ConsistencyPolicy
    EnableAutomaticFailover       : False
    IsVirtualNetworkFilterEnabled : False
    IpRangeFilter                 :
    DatabaseAccountOfferType      : Standard
    DocumentEndpoint              : https://databaseAccountName.documents.azure.com:443/
    ProvisioningState             : Succeeded
    Kind                          : GlobalDocumentDB
    VirtualNetworkRules           : {}
    EnableMultipleWriteLocations  : False
    NetworkAclBypass              : None
    NetworkAclBypassResourceIds   : {}
    ```

    Get CosmosDB database account with name databaseAccountName in ResourceGroup resourceGroupName.
