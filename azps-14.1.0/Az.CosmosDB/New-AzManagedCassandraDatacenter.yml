### YamlMime:PowerShellCmdlet1
uid: Az.CosmosDB.New-AzManagedCassandraDatacenter
name: New-AzManagedCassandraDatacenter
module: Az.CosmosDB
isPreview: false
summary: |-
  Create a new Azure Managed Instances for Apache Cassandra data center.
description: |-
  The **New-AzManagedCassandraDataCenter** cmdlet creates a new managed Cassandra data center.
parameters:
  cmdletParameters:
  - name: BackupStorageCustomerKeyUri
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      URI to a KeyVault key used to encrypt backups of the cluster. If omitted, Azure's own keys will be used.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Base64EncodedCassandraYamlFragment
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Fragment of configuration to include in `cassandra.yaml` on nodes of this data center, Base64 encoded.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClusterName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of the managed Cassandra cluster.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByNameParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DatacenterName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Managed Cassandra Datacenter Name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByNameParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DelegatedSubnetId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The resource id of the virtual network subnet where managed Cassandra should attach network interfaces.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DiskCapacity
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      The number of data disks to connect to each node in the cluster.
    defaultValue: "4"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The location to create the managed Cassandra cluster in.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ManagedDiskCustomerKeyUri
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      URI of a KeyVault key used to encrypt data at rest in the cluster. If omitted, Azure's own keys will be used.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NodeCount
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      The number of nodes to create in this data center.
    defaultValue: "3"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ParentObject
    type: <xref href="Microsoft.Azure.Commands.CosmosDB.Models.PSClusterResource" data-throw-if-not-resolved="False" />
    description: |-
      Cassandra cluster object to create a data center in.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByParentObjectParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of resource group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByNameParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Sku
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of the virtual machine sku to use for nodes in this data center. See the [documentation](https://learn.microsoft.com/en-us/azure/managed-instance-apache-cassandra/create-cluster-cli) for supported skus.
    defaultValue: Standard_DS14_v2
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UseAvailabilityZone
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      If set, allocate nodes in this data center using availability zones if they are supported in the region.
    defaultValue: "True"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzManagedCassandraDatacenter
        -Location <String>
        -DelegatedSubnetId <String>
        -ResourceGroupName <String>
        -ClusterName <String>
        -DatacenterName <String>
        [-Sku <String>]
        [-DiskCapacity <Int32>]
        [-ManagedDiskCustomerKeyUri <String>]
        [-UseAvailabilityZone]
        [-NodeCount <Int32>]
        [-Base64EncodedCassandraYamlFragment <String>]
        [-BackupStorageCustomerKeyUri <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzManagedCassandraDatacenter
        -Location <String>
        -DelegatedSubnetId <String>
        -ParentObject <PSClusterResource>
        [-Sku <String>]
        [-DiskCapacity <Int32>]
        [-ManagedDiskCustomerKeyUri <String>]
        [-UseAvailabilityZone]
        [-NodeCount <Int32>]
        [-Base64EncodedCassandraYamlFragment <String>]
        [-BackupStorageCustomerKeyUri <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByParentObjectParameterSet
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.CosmosDB.Models.PSClusterResource" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.CosmosDB.Models.PSDataCenterResource" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    New-AzManagedCassandraDataCenter `
     -ResourceGroupName "resourceGroupName" `
     -ClusterName "clusterName" `
     -DataCenterName "dataCenterName" `
     -DelegatedSubnetId "resourceId" `
     -Location "location" `
     -NodeCount 3
    ```
