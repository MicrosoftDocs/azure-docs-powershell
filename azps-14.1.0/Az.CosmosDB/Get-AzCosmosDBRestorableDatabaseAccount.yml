syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCosmosDBRestorableDatabaseAccount
        [-Location <String>]
        [-DatabaseAccountInstanceId <String>]
        [-DatabaseAccountName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
