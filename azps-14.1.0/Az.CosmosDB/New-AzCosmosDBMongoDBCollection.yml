syntaxes:
- syntax: |-
    ```Syntax
    New-AzCosmosDBMongoDBCollection
        -ResourceGroupName <String>
        -AccountName <String>
        -DatabaseName <String>
        -Name <String>
        [-Throughput <Int32>]
        [-AutoscaleMaxThroughput <Int32>]
        [-Shard <String>]
        [-AnalyticalStorageTtl <Int32>]
        [-Index <PSMongoIndex[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzCosmosDBMongoDBCollection
        -Name <String>
        -ParentObject <PSMongoDBDatabaseGetResults>
        [-Throughput <Int32>]
        [-AutoscaleMaxThroughput <Int32>]
        [-Shard <String>]
        [-AnalyticalStorageTtl <Int32>]
        [-Index <PSMongoIndex[]>]
