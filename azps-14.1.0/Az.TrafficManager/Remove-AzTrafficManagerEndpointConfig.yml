syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzTrafficManagerEndpointConfig
        -EndpointName <String>
        -TrafficManagerProfile <TrafficManagerProfile>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
