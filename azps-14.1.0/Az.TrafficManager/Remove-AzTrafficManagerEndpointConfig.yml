      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EndpointName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Traffic Manager endpoint that this cmdlet removes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
