    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzTrafficManagerProfile
        -Name <String>
        -ResourceGroupName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Fields
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-AzTrafficManagerProfile
        -TrafficManagerProfile <TrafficManagerProfile>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Object
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.TrafficManager.Models.TrafficManagerProfile" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Enable a profile specified by name'
  description: |-
    ```powershell
    Enable-AzTrafficManagerProfile -Name "ContosoProfile" -ResourceGroupName "ResourceGroup11"
    ```

    This command enables the profile named ContosoProfile in ResourceGroup11.
- title: 'Example 2: Enable a profile by using the pipeline'
  description: |-
    ```powershell
    Get-AzTrafficManagerProfile -Name "ContosoProfile" -ResourceGroupName "ResourceGroup11" | Enable-AzTrafficManagerProfile
    ```

    This command gets the profile named ContosoProfile in ResourceGroup11.
    The command then passes that profile to the **Enable-AzTrafficManagerProfile** cmdlet by using the pipeline operator.
    That cmdlet enables that profile.
