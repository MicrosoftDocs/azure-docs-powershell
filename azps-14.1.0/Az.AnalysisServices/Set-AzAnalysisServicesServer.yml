    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzAnalysisServicesServer
        [-Name] <String>
        [[-ResourceGroupName] <String>]
        [[-Sku] <String>]
        [[-Tag] <Hashtable>]
        [[-Administrator] <String>]
        [[-BackupBlobContainerUri] <String>]
        [-PassThru]
        [-ReadonlyReplicaCount <Int32>]
        [-DefaultConnectionMode <String>]
        [-FirewallConfig <PsAzureAnalysisServicesFirewallConfig>]
        [-GatewayResourceId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzAnalysisServicesServer
        [-Name] <String>
        [[-ResourceGroupName] <String>]
        [[-Sku] <String>]
        [[-Tag] <Hashtable>]
        [[-Administrator] <String>]
        [-PassThru]
        [-DisableBackup]
        [-ReadonlyReplicaCount <Int32>]
        [-DefaultConnectionMode <String>]
        [-FirewallConfig <PsAzureAnalysisServicesFirewallConfig>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DisableBackup
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzAnalysisServicesServer
        [-Name] <String>
        [[-ResourceGroupName] <String>]
        [[-Sku] <String>]
        [[-Tag] <Hashtable>]
        [[-Administrator] <String>]
        [-PassThru]
        [-ReadonlyReplicaCount <Int32>]
        [-DefaultConnectionMode <String>]
        [-FirewallConfig <PsAzureAnalysisServicesFirewallConfig>]
        [-DisassociateGateway]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DisassociateGateway
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
- name: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
- name: <xref href="System.Int32" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.AnalysisServices.Models.PsAzureAnalysisServicesFirewallConfig" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.AnalysisServices.Models.AzureAnalysisServicesServer" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Set-AzAnalysisServicesServer -Name "testserver" -ResourceGroupName "testgroup" -Tag @{key1 = "value1"; key2 ="value2"} -Administrator "testuser1@contoso.com"
    ```

    Modifies the server named testserver in resourcegroup testgroup to set the tags as key1:value1 and key2:value2 and administrator to testuser1@contoso.com
