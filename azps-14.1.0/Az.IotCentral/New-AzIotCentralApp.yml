syntaxes:
- syntax: |-
    ```Syntax
    New-AzIotCentralApp
        [-Subdomain] <String>
        [-DisplayName <String>]
        [-Template <String>]
        [-Sku <String>]
        [-Location <String>]
        [-Tag <Hashtable>]
        [-AsJob]
        [-Identity <String>]
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
