syntaxes:
- syntax: |-
    ```Syntax
    Start-AzCloudService
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Start
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzCloudService
        -InputObject <ICloudServiceIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StartViaIdentity
  isDefault: false
