syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzCloudService
        -Name <String>
        -ResourceGroupName <String>
        -RoleInstance <String[]>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RestartExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Restart-AzCloudService
        -InputObject <ICloudServiceIdentity>
        -RoleInstance <String[]>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RestartViaIdentityExpanded
  isDefault: false
