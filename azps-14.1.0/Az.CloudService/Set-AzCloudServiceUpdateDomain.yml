syntaxes:
- syntax: |-
    ```Syntax
    Set-AzCloudServiceUpdateDomain
        -CloudServiceName <String>
        -ResourceGroupName <String>
        -UpdateDomain <Int32>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
