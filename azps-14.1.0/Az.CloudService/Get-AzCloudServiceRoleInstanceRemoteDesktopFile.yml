syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCloudServiceRoleInstanceRemoteDesktopFile
        -CloudServiceName <String>
        -ResourceGroupName <String>
        -RoleInstanceName <String>
        [-SubscriptionId <String[]>]
        -OutFile <String>
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
