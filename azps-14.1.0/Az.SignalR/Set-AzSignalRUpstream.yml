syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSignalRUpstream
        [-Name] <String>
        [-ResourceGroupName <String>]
        [-AsJob]
        [-Template <PSUpstreamTemplate[]>]
        [-Clear]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceGroupParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSignalRUpstream
        -ResourceId <String>
        [-AsJob]
        [-Template <PSUpstreamTemplate[]>]
        [-Clear]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceIdParameterSet
  isDefault: false
- syntax: |-
