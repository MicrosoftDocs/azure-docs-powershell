examples:
- title: 'Example 1: Restart a Web PubSub resource'
  description: |-
    ```powershell
    Restart-AzWebPubSub -ResourceGroupName psdemo -Name psdemo-wps
    ```
- title: 'Example 2: Restart a Web PubSub resource with identity'
  description: |-
    ```powershell
    $identity = @{ResourceGroupName = 'psdemo'
    ResourceName = 'psdemo-wps'
    SubscriptionId = $(Get-AzContext).Subscription.Id }

    $identity | Restart-AzWebPubSub
    ```
