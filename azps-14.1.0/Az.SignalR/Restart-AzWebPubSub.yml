syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzWebPubSub
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Restart
  isDefault: true
- syntax: |-
    ```Syntax
    Restart-AzWebPubSub
        -InputObject <IWebPubSubIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RestartViaIdentity
  isDefault: false
