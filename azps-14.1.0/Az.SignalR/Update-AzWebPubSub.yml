syntaxes:
- syntax: |-
    ```Syntax
    Update-AzWebPubSub
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DisableAadAuth]
        [-DisableLocalAuth]
        [-EnableTlsClientCert]
        [-IdentityType <ManagedIdentityType>]
        [-LiveTraceCategory <ILiveTraceCategory[]>]
        [-LiveTraceEnabled <String>]
        [-NetworkAcLDefaultAction <AclAction>]
        [-PrivateEndpointAcl <IPrivateEndpointAcl[]>]
        [-PublicNetworkAccess <String>]
        [-PublicNetworkAllow <WebPubSubRequestType[]>]
        [-PublicNetworkDeny <WebPubSubRequestType[]>]
        [-ResourceLogCategory <IResourceLogCategory[]>]
        [-SkuCapacity <Int32>]
        [-SkuName <String>]
        [-SkuTier <WebPubSubSkuTier>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzWebPubSub
        -InputObject <IWebPubSubIdentity>
        [-DisableAadAuth]
        [-DisableLocalAuth]
        [-EnableTlsClientCert]
        [-IdentityType <ManagedIdentityType>]
        [-LiveTraceCategory <ILiveTraceCategory[]>]
        [-LiveTraceEnabled <String>]
        [-NetworkAcLDefaultAction <AclAction>]
        [-PrivateEndpointAcl <IPrivateEndpointAcl[]>]
        [-PublicNetworkAccess <String>]
        [-PublicNetworkAllow <WebPubSubRequestType[]>]
        [-PublicNetworkDeny <WebPubSubRequestType[]>]
        [-ResourceLogCategory <IResourceLogCategory[]>]
        [-SkuCapacity <Int32>]
        [-SkuName <String>]
        [-SkuTier <WebPubSubSkuTier>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
