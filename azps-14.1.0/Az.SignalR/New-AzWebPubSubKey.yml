uid: Az.SignalR.New-AzWebPubSubKey
name: New-AzWebPubSubKey
module: Az.SignalR
isPreview: false
summary: |-
  Regenerate the access key for the resource.
  PrimaryKey and SecondaryKey cannot be regenerated at the same time.
