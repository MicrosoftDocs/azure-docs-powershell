examples:
- title: 'Example 1: List hub settings of a Web PubSub resource.'
  description: |-
    ```powershell
    Get-AzWebPubSubHub -ResourceGroupName psdemo -ResourceName psdemo-wps
    ```

    ```output
    Name     AnonymousConnectPolicy
    ----     ----------------------
    testHub  deny
    testHub2 deny
    ```
- title: 'Example 2: Get a Web PubSub hub setting.'
  description: |-
    ```powershell
    Get-AzWebPubSubHub -Name testHub -ResourceGroupName psdemo -ResourceName psdemo-wps
    ```

    ```output
    Name    AnonymousConnectPolicy
    ----    ----------------------
    testHub deny
    ```
- title: 'Example 3: Get a Web PubSub hub setting via identity.'
  description: |-
    ```powershell
    $hubIdentity = @{ ResourceGroupName = 'psdemo'
    ResourceName = 'psdemo-wps'
    SubscriptionId = $(Get-AzContext).Subscription.Id
    HubName = 'testHub' }
    $hubIdentity | Get-AzWebPubSubHub
    ```

    ```output
    Name    AnonymousConnectPolicy
    ----    ----------------------
    testHub deny
    ```
