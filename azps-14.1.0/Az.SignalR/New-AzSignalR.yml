syntaxes:
- syntax: |-
    ```Syntax
    New-AzSignalR
        [-ResourceGroupName <String>]
        [-Name] <String>
        [-Location <String>]
        [-Sku <String>]
        [-UnitCount <Int32>]
        [-Tag <System.Collections.Generic.IDictionary`2[System.String,System.String]>]
        [-ServiceMode <String>]
        [-AllowedOrigin <String[]>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
