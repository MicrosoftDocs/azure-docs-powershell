syntaxes:
- syntax: |-
    ```Syntax
    New-AzCostManagementExport
        -Name <String>
        -Scope <String>
        [-ConfigurationColumn <String[]>]
        [-DataSetGranularity <String>]
        [-DefinitionTimeframe <String>]
        [-DefinitionType <String>]
        [-DestinationContainer <String>]
        [-DestinationResourceId <String>]
        [-DestinationRootFolderPath <String>]
        [-DestinationSasToken <String>]
        [-DestinationStorageAccount <String>]
        [-ETag <String>]
        [-Format <String>]
        [-PartitionData]
        [-RecurrencePeriodFrom <DateTime>]
        [-RecurrencePeriodTo <DateTime>]
        [-ScheduleRecurrence <String>]
        [-ScheduleStatus <String>]
        [-TimePeriodFrom <DateTime>]
        [-TimePeriodTo <DateTime>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzCostManagementExport
        -Name <String>
        -Scope <String>
        -JsonFilePath <String>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaJsonFilePath
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzCostManagementExport
        -Name <String>
        -Scope <String>
        -JsonString <String>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaJsonString
  isDefault: false
