### YamlMime:PowerShellCmdlet1
uid: Az.TrustedSigning.Get-AzTrustedSigningCertificateRoot
name: Get-AzTrustedSigningCertificateRoot
module: Az.TrustedSigning
isPreview: false
summary: |-
  Retrieve Azure.TrustedSigning Root Cert
description: |-
  The **Get-AzTrustedSigningCertificateRoot** cmdlet retrieves Azure TrustedSigning Root Cert.
  Use this cmdlet to retrieve Azure TrustedSigning Root Cert.
  There are two sets of parameters. One set uses AccountName, ProfileName, and EndpointUrl.
  Another set uses MetadataFilePath.
  Destination is the downloaded root cert file path, which incldues the file name and extension .cer.
parameters:
  cmdletParameters:
  - name: AccountName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure TrustedSigning AccountName used to sign CI policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAccountProfileNameParameterSet
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Destination
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the downloaed root cert file path.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EndpointUrl
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure TrustedSigning Endpoint used to sign CI policy. It's an Url, format is `https://xxx.trustedsigning.azure.net`
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAccountProfileNameParameterSet
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MetadataFilePath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure TrustedSigning Metadata file path used to sign CI policy. It's a file path, and the metadata content is below. File content example:
      {
        "Endpoint": "https://xxx.trustedsigning.azure.net/",
        "TrustedSigningAccountName": "acstest",
        "CertificateProfileName": "acstestCert1"
      }
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByMetadataFileParameterSet
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProfileName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure TrustedSigning ProfileName used to sign CI policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAccountProfileNameParameterSet
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzTrustedSigningCertificateRoot
        [-AccountName] <String>
        [-ProfileName] <String>
        [-EndpointUrl] <String>
        [-Destination] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByAccountProfileNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzTrustedSigningCertificateRoot
        [-MetadataFilePath] <String>
        [-Destination] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByMetadataFileParameterSet
  isDefault: false
inputs:
- name: <xref href="Azure TrustedSigning AccountName" data-throw-if-not-resolved="False" />
- name: <xref href="Azure TrustedSigning Profile Name" data-throw-if-not-resolved="False" />
- name: <xref href="Azure TrustedSigning Signing EndpointUrl" data-throw-if-not-resolved="False" />
- name: <xref href="Azure TrustedSigning UnSigned CI Policy File Path" data-throw-if-not-resolved="False" />
- name: <xref href="Azure TrustedSigning Signed CI Policy File Path Destination" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Signed CI Policy file" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Retrieve a root cert by account and profile name'
  description: |-
    ```powershell
    Get-AzTrustedSigningCertificateRoot -AccountName 'contoso' -ProfileName 'contososigning' -EndpointUrl 'https://wus.trustedsigning.azure.net' -Destination 'c:\acs\certificateroot.cer'
    ```

    ```output
    Thumbprint                               Subject
    ----------                               -------
    3A7B1F8C2E9D5A0B4F6E2C1D9F4B8A3E         CN=Microsoft Identity Verification Root Certificate Authority 2020, O=Microsoft
    ```

    This command retrieves a root certificate that is currently in use for signing by the account and profile.
- title: 'Example 2: Retrieve a root cert using the metadata file path configuration'
  description: |-
    ```powershell
    Get-AzTrustedSigningCertificateRoot -MetadataFilePath 'c:\cisigning\metadata_input.json' -Destination 'c:\acs\certificateroot.cer'
    ```

    ```output
    Thumbprint                               Subject
    ----------                               -------
    3A7B1F8C2E9D5A0B4F6E2C1D9F4B8A3E         CN=Microsoft Identity Verification Root Certificate Authority 2020, O=Microsoft
    ```

    This command retrieves a root certificate that is currently in use for signing by the metadata configuration.
