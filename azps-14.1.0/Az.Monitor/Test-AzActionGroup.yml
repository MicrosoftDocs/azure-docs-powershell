syntaxes:
- syntax: |-
    ```Syntax
    Test-AzActionGroup
        -ActionGroupName <String>
        -ResourceGroupName <String>
        -AlertType <String>
        -Receiver <IActionGroupReceiver[]>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Test-AzActionGroup
        -InputObject <IActionGroupIdentity>
        -AlertType <String>
        -Receiver <IActionGroupReceiver[]>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
