syntaxes:
- syntax: |-
    ```Syntax
    Update-AzAutoscaleSetting
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Enabled <Boolean>]
        [-Notification <IAutoscaleNotification[]>]
        [-PredictiveAutoscalePolicyScaleLookAheadTime <TimeSpan>]
        [-PredictiveAutoscalePolicyScaleMode <PredictiveAutoscalePolicyScaleMode>]
        [-Profile <IAutoscaleProfile[]>]
        [-Tag <Hashtable>]
        [-TargetResourceLocation <String>]
        [-TargetResourceUri <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzAutoscaleSetting
        -InputObject <IAutoscaleIdentity>
        [-Enabled <Boolean>]
        [-Notification <IAutoscaleNotification[]>]
        [-PredictiveAutoscalePolicyScaleLookAheadTime <TimeSpan>]
        [-PredictiveAutoscalePolicyScaleMode <PredictiveAutoscalePolicyScaleMode>]
        [-Profile <IAutoscaleProfile[]>]
        [-Tag <Hashtable>]
        [-TargetResourceLocation <String>]
        [-TargetResourceUri <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
