### YamlMime:PowerShellCmdlet1
uid: Az.Monitor.New-AzDiagnosticSettingLogSettingsObject
name: New-AzDiagnosticSettingLogSettingsObject
module: Az.Monitor
isPreview: false
summary: |-
  Create an in-memory object for LogSettings.
description: |-
  Create an in-memory object for LogSettings.
parameters:
  cmdletParameters:
  - name: Category
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of a Diagnostic Log category for a resource type this setting is applied to.
      To obtain the list of Diagnostic Log categories for a resource, first perform a GET diagnostic settings operation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CategoryGroup
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of a Diagnostic Log category group for a resource type this setting is applied to.
      To obtain the list of Diagnostic Log categories for a resource, first perform a GET diagnostic settings operation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Enabled
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      a value indicating whether this log is enabled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RetentionPolicyDay
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      the number of days for the retention in days.
      A value of 0 will retain the events indefinitely.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RetentionPolicyEnabled
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      a value indicating whether the retention policy is enabled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzDiagnosticSettingLogSettingsObject
        -Enabled <Boolean>
        [-Category <String>]
        [-CategoryGroup <String>]
        [-RetentionPolicyDay <Int32>]
        [-RetentionPolicyEnabled <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Monitor.DiagnosticSetting.Models.Api20210501Preview.LogSettings" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create log setting object'
  description: |-
    ```powershell
    New-AzDiagnosticSettingLogSettingsObject -Enabled $true -Category ContainerEventLogs -RetentionPolicyDay 7 -RetentionPolicyEnabled $true
    ```

    Create log setting object, to get supported categories for resource, please see `Get-AzDiagnosticSettingCategory`
