uid: Az.Monitor.New-AzPlatformTelemetryDataSourceObject
name: New-AzPlatformTelemetryDataSourceObject
module: Az.Monitor
isPreview: false
summary: |-
  Create an in-memory object for PlatformTelemetryDataSource.
description: |-
  Create an in-memory object for PlatformTelemetryDataSource.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      A friendly name for the data source.
              This name should be unique across all data sources (regardless of type) within the data collection rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Stream
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of platform telemetry streams to collect.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzPlatformTelemetryDataSourceObject
        -Stream <String[]>
        [-Name <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Monitor.DataCollection.Models.PlatformTelemetryDataSource" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create platform telemetry data source object'
  description: |-
    ```powershell
    New-AzPlatformTelemetryDataSourceObject -Stream "Microsoft.Insights/autoscalesettings:Logs-AutoscaleEvaluations","Microsoft.Insights/autoscalesettings:Logs-AutoscaleScaleActions" -Name "myAutoScalePlatformTelemetryLogs"
    ```

    ```output
    Name                             Stream
    ----                             ------
    myAutoScalePlatformTelemetryLogs {Microsoft.Insights/autoscalesettings:Logs-AutoscaleEvaluations, Microsoft.Insights/autoscalesettings:Logs-AutoscaleScaleActions}
    ```

    This command creates a platform telemetry data source object with XPathQuery.
