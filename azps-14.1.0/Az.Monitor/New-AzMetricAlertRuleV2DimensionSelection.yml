    New-AzMetricAlertRuleV2DimensionSelection
        -DimensionName <String>
        -ValuesToInclude <String[]>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: IncludeParameterSet
  isDefault: true
