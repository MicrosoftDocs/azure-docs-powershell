uid: Az.Monitor.New-AzEventHubDestinationObject
name: New-AzEventHubDestinationObject
module: Az.Monitor
isPreview: false
summary: |-
  Create an in-memory object for EventHubDestination.
description: |-
  Create an in-memory object for EventHubDestination.
parameters:
  cmdletParameters:
  - name: EventHubResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The resource ID of the event hub.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      A friendly name for the destination.
              This name should be unique across all destinations (regardless of type) within the data collection rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzEventHubDestinationObject
        [-EventHubResourceId <String>]
        [-Name <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Monitor.DataCollection.Models.EventHubDestination" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create event hub destination object'
  description: |-
    ```powershell
    New-AzEventHubDestinationObject -EventHubResourceId /subscriptions/9e223dbe-3399-4e19-88eb-0975f02ac87f/resourceGroups/AMCS-TEST/providers/Microsoft.EventHub/namespaces/amcseastushub -Name testHub
    ```

    ```output
    EventHubResourceId                                                                                                                 Name
    ------------------                                                                                                                 ----
    /subscriptions/9e223dbe-3399-4e19-88eb-0975f02ac87f/resourceGroups/AMCS-TEST/providers/Microsoft.EventHub/namespaces/amcseastushub testHub
    ```

    This command creates event hub destination object.
