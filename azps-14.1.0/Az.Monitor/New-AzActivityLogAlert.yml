syntaxes:
- syntax: |-
    ```Syntax
    New-AzActivityLogAlert
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Action <IActionGroup[]>
        -Condition <IAlertRuleAnyOfOrLeafCondition[]>
        -Location <String>
        -Scope <String[]>
        [-Description <String>]
        [-Enabled <Boolean>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
