syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataLakeStoreAccount
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        [[-DefaultGroup] <String>]
        [[-Tag] <Hashtable>]
        [[-Encryption] <EncryptionConfigType>]
        [[-KeyVaultId] <String>]
        [[-KeyName] <String>]
        [[-KeyVersion] <String>]
        [-Tier <TierType>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: UserOrSystemAssignedEncryption
  isDefault: true
- syntax: |-
