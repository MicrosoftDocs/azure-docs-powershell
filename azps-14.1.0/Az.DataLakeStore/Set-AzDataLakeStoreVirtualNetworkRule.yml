syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDataLakeStoreVirtualNetworkRule
        [-Account] <String>
        [-Name] <String>
        [-SubnetId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
