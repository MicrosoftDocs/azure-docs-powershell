syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataLakeStoreTrustedIdProvider
        [-Account] <String>
        [[-Name] <String>]
        [[-ResourceGroupName] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
