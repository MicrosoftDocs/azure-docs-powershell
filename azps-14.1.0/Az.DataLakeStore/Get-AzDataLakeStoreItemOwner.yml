examples:
- title: 'Example 1: Get the owner for a directory'
  description: |-
    ```powershell
    Get-AzDataLakeStoreItemOwner -AccountName "ContosoADL" -Path / -Type User
    ```

    This command gets the user owner for the root directory of the ContosoADL account.
