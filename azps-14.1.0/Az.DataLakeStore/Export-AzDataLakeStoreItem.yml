uid: Az.DataLakeStore.Export-AzDataLakeStoreItem
name: Export-AzDataLakeStoreItem
module: Az.DataLakeStore
isPreview: false
summary: |-
  Downloads a file from Data Lake Store.
description: |-
  The **Export-AzDataLakeStoreItem** cmdlet downloads a file from Data Lake Store.
