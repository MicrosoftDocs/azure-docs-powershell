syntaxes:
- syntax: |-
    ```Syntax
    Export-AzDataLakeStoreItem
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [-Destination] <String>
        [-Recurse]
        [-Resume]
        [-Force]
        [-Concurrency <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NoDiagnosticLogging
  isDefault: true
- syntax: |-
    ```Syntax
    Export-AzDataLakeStoreItem
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [-Destination] <String>
        -DiagnosticLogPath <String>
        [-Recurse]
        [-Resume]
        [-Force]
        [-Concurrency <Int32>]
        [-DiagnosticLogLevel <LogLevel>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IncludeDiagnosticLogging
  isDefault: false
