uid: Az.ServiceFabric.Remove-AzServiceFabricManagedClusterService
name: Remove-AzServiceFabricManagedClusterService
module: Az.ServiceFabric
isPreview: false
summary: |-
  Remove a managed service from the cluster. Only supports ARM deployed services.
description: |-
  This cmdlet removes a managed service form the cluster.
