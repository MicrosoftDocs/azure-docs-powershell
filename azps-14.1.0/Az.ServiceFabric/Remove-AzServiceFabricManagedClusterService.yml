syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzServiceFabricManagedClusterService
        [-ResourceGroupName] <String>
        [-ClusterName] <String>
        [-ApplicationName] <String>
        [-Name] <String>
        [-PassThru]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceGroup
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzServiceFabricManagedClusterService
        -ResourceId <String>
        [-PassThru]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceId
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzServiceFabricManagedClusterService
        -InputObject <PSManagedService>
        [-PassThru]
