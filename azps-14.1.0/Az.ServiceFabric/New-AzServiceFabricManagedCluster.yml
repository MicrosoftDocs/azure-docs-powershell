syntaxes:
- syntax: |-
    ```Syntax
    New-AzServiceFabricManagedCluster
        [-ResourceGroupName] <String>
        [-Name] <String>
        -Location <String>
        -ClientCertThumbprint <String>
        -AdminPassword <SecureString>
        [-UpgradeMode <ClusterUpgradeMode>]
        [-CodeVersion <String>]
        [-UpgradeCadence <PSClusterUpgradeCadence>]
        [-ClientCertIsAdmin]
        [-AdminUserName <String>]
        [-HttpGatewayConnectionPort <Int32>]
        [-ClientConnectionPort <Int32>]
        [-DnsName <String>]
        [-Sku <ManagedClusterSku>]
        [-UseTestExtension]
        [-ZonalResiliency]
        [-AsJob]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClientCertByTp
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzServiceFabricManagedCluster
        [-ResourceGroupName] <String>
        [-Name] <String>
        -Location <String>
        -ClientCertCommonName <String>
        -AdminPassword <SecureString>
        [-UpgradeMode <ClusterUpgradeMode>]
        [-CodeVersion <String>]
        [-UpgradeCadence <PSClusterUpgradeCadence>]
        [-ClientCertIsAdmin]
        [-ClientCertIssuerThumbprint <String[]>]
        [-AdminUserName <String>]
        [-HttpGatewayConnectionPort <Int32>]
        [-ClientConnectionPort <Int32>]
        [-DnsName <String>]
        [-Sku <ManagedClusterSku>]
        [-UseTestExtension]
        [-ZonalResiliency]
        [-AsJob]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClientCertByCn
  isDefault: false
