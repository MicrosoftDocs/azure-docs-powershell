uid: Az.ServiceFabric.Remove-AzServiceFabricManagedNodeType
name: Remove-AzServiceFabricManagedNodeType
module: Az.ServiceFabric
isPreview: false
summary: |-
  Remove the node type or specific nodes within the node type.
description: |-
  Remove the node type or specific nodes within the node type. If the paremter -NodeName is used then only nodes specified will be removed.
