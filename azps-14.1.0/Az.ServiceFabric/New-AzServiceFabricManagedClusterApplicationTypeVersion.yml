syntaxes:
- syntax: |-
    ```Syntax
    New-AzServiceFabricManagedClusterApplicationTypeVersion
        [-ResourceGroupName] <String>
        [-ClusterName] <String>
        [-Name] <String>
        [-Version] <String>
        -PackageUrl <String>
        [-Tag <Hashtable>]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
