uid: Az.ServiceFabric.Get-AzServiceFabricApplicationType
name: Get-AzServiceFabricApplicationType
module: Az.ServiceFabric
isPreview: false
summary: |-
  Get Service Fabric application type details. Only supports ARM deployed application types.
description: |-
  Use this cmdlet to get the application type details in the specified resource group and cluster.
