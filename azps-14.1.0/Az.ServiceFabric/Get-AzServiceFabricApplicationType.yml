syntaxes:
- syntax: |-
    ```Syntax
    Get-AzServiceFabricApplicationType
        [-ResourceGroupName] <String>
        [-ClusterName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceGroupAndCluster
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzServiceFabricApplicationType
        [-ResourceGroupName] <String>
        [-ClusterName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzServiceFabricApplicationType
        -ResourceId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceId
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.ServiceFabric.Models.PSApplicationType" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $resourceGroupName = "testRG"
    $clusterName = "testCluster"
    $appTypeName = "testAppType"
    Get-AzServiceFabricApplicationType -ResourceGroupName $resourceGroupName -ClusterName $clusterName -Name $appTypeName
    ```

    This example will get the application type details with the parameters specified, if it doesn't find the resource it will throw an exception.
- title: Example 2
  description: |-
    ```powershell
    $resourceGroupName = "testRG"
    $clusterName = "testCluster"
    Get-AzServiceFabricApplicationType -ResourceGroupName $resourceGroupName -ClusterName $clusterName
    ```

    This example will get a list of the application types defined under the specified cluster.
