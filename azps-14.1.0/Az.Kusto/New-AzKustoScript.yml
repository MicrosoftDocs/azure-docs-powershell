syntaxes:
- syntax: |-
    ```Syntax
    New-AzKustoScript
        -ClusterName <String>
        -DatabaseName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ContinueOnError]
        [-ForceUpdateTag <String>]
        [-PrincipalPermissionsAction <PrincipalPermissionsAction>]
        [-ScriptContent <String>]
        [-ScriptLevel <ScriptLevel>]
        [-ScriptUrl <String>]
        [-ScriptUrlSasToken <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzKustoScript
        -ClusterName <String>
        -DatabaseName <String>
        -Name <String>
        -ResourceGroupName <String>
        -Parameter <IScript>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Create
  isDefault: false
