    Get-AzBlueprintArtifact
        [-Name <String>]
        -Blueprint <PSBlueprintBase>
        [-BlueprintVersion <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
