### YamlMime:PowerShellCmdlet1
uid: Az.Blueprint.Get-AzBlueprintArtifact
name: Get-AzBlueprintArtifact
module: Az.Blueprint
isPreview: false
summary: |-
  Retrieve artifacts from a blueprint definition.
description: |-
  Retrieve artifacts from a blueprint definition. If a blueprint definition version is not specified, the draft version is retrieved. In the case where there is no draft version, the latest published blueprint definition is returned.
parameters:
  cmdletParameters:
  - name: Blueprint
    type: <xref href="Microsoft.Azure.Commands.Blueprint.Models.PSBlueprintBase" data-throw-if-not-resolved="False" />
