syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataBoxEdgeUser
        [-ResourceGroupName] <String>
        [-DeviceName] <String>
        [-Name] <String>
        -Password <SecureString>
        -EncryptionKey <SecureString>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [[-Type] <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
