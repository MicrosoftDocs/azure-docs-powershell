syntaxes:
- syntax: |-
    ```Syntax
    Send-AzLabServicesUserInvite
        -ResourceId <String>
        [-SubscriptionId <String>]
        [-Text <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceId
  isDefault: true
- syntax: |-
    ```Syntax
    Send-AzLabServicesUserInvite
        -LabName <String>
        -ResourceGroupName <String>
        -UserName <String>
        [-SubscriptionId <String>]
        [-Text <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InviteExpanded
  isDefault: false
- syntax: |-
    ```Syntax
    Send-AzLabServicesUserInvite
        -User <User>
        [-SubscriptionId <String>]
        [-Text <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Users
  isDefault: false
