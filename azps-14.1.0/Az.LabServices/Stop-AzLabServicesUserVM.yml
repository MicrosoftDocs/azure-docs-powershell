syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzLabServicesUserVM
        -ResourceGroupName <String>
        -LabName <String>
        -Email <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Stop
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzLabServicesUserVM
        -User <User>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
