syntaxes:
- syntax: |-
    ```Syntax
    Save-AzLabServicesLabPlanImage
        -LabPlanName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-LabVirtualMachineId <String>]
        [-Name <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
