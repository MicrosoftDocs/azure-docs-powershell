        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-EnterpriseAppId <String>]
        [-SingleSignOnState <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
