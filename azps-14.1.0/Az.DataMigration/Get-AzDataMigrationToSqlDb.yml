syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataMigrationToSqlDb
        -ResourceGroupName <String>
        -SqlDbInstanceName <String>
        -TargetDbName <String>
        [-SubscriptionId <String[]>]
        [-Expand <String>]
        [-MigrationOperationId <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDataMigrationToSqlDb
        -InputObject <IDataMigrationIdentity>
        [-Expand <String>]
