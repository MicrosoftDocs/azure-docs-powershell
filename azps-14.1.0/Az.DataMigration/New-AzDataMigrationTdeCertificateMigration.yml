syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataMigrationTdeCertificateMigration
        -SourceSqlConnectionString <SecureString>
        -TargetSubscriptionId <String>
        -TargetResourceGroupName <String>
        -TargetManagedInstanceName <String>
        -NetworkSharePath <String>
        -NetworkShareDomain <String>
        -DatabaseName <String[]>
        [-NetworkShareUserName <String>]
        [-NetworkSharePassword <SecureString>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
