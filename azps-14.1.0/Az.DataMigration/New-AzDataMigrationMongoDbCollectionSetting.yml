syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataMigrationMongoDbCollectionSetting
        [-TargetRequestUnit <Int32>]
        [-CanDelete]
        [-UniqueShard]
        [-ShardKey <String>]
        [-DefaultProfile <IAzureContextContainer>]
        -Name <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
