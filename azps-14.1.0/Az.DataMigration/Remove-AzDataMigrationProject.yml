syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataMigrationProject
        -ResourceGroupName <String>
        -ServiceName <String>
        -Name <String>
        [-Force]
        [-DeleteRunningTask]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ComponentNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDataMigrationProject
        [-InputObject] <PSProject>
        [-Force]
        [-DeleteRunningTask]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ComponentObjectParameterSet
