syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataMigrationTask
        -TaskType <TaskTypeEnum>
        -ResourceGroupName <String>
        -ServiceName <String>
        -ProjectName <String>
        -Name <String>
        [-Wait]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ComponentNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDataMigrationTask
        [-InputObject] <PSProject>
        -TaskType <TaskTypeEnum>
        -Name <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ComponentObjectParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzDataMigrationTask
        [-ResourceId] <String>
        -TaskType <TaskTypeEnum>
