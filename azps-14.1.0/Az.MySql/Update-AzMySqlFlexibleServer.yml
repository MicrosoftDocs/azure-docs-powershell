syntaxes:
- syntax: |-
    ```Syntax
    Update-AzMySqlFlexibleServer
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AdministratorLoginPassword <SecureString>]
        [-ReplicationRole <String>]
        [-Sku <String>]
        [-SkuTier <SkuTier>]
        [-HighAvailability <String>]
        [-BackupRetentionDay <Int32>]
        [-StorageAutogrow <StorageAutogrow>]
        [-StorageInMb <Int32>]
        [-Tag <Hashtable>]
        [-MaintenanceWindow <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzMySqlFlexibleServer
        -InputObject <IMySqlIdentity>
        [-AdministratorLoginPassword <SecureString>]
        [-ReplicationRole <String>]
        [-Sku <String>]
        [-SkuTier <SkuTier>]
        [-HighAvailability <String>]
        [-BackupRetentionDay <Int32>]
        [-StorageAutogrow <StorageAutogrow>]
        [-StorageInMb <Int32>]
        [-Tag <Hashtable>]
        [-MaintenanceWindow <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
