syntaxes:
- syntax: |-
    ```Syntax
    Update-AzMySqlConfiguration
        -Name <String>
        -ResourceGroupName <String>
        -ServerName <String>
        [-SubscriptionId <String>]
        [-Source <String>]
        [-Value <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzMySqlConfiguration
        -InputObject <IMySqlIdentity>
        [-Source <String>]
        [-Value <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
