syntaxes:
- syntax: |-
    ```Syntax
    New-AzPurviewAccount
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -IdentityType <Type>
        -Location <String>
        -SkuCapacity <Int32>
        -SkuName <Name>
        [-ManagedResourceGroupName <String>]
        [-PublicNetworkAccess <PublicNetworkAccess>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
