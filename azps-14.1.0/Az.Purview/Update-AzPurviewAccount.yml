syntaxes:
- syntax: |-
    ```Syntax
    Update-AzPurviewAccount
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ManagedResourceGroupName <String>]
        [-PublicNetworkAccess <PublicNetworkAccess>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzPurviewAccount
        -InputObject <IPurviewIdentity>
        [-ManagedResourceGroupName <String>]
        [-PublicNetworkAccess <PublicNetworkAccess>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
