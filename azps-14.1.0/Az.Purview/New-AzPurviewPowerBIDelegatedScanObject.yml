        [-AuthenticationType <String>]
        [-ClientId <String>]
        [-CollectionReferenceName <String>]
        [-CollectionType <String>]
        [-ConnectedViaReferenceName <String>]
        [-IncludePersonalWorkspace <Boolean>]
        [-Password <String>]
        [-ScanRulesetName <String>]
        [-ScanRulesetType <ScanRulesetType>]
