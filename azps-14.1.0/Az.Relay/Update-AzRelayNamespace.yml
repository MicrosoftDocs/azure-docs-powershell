uid: Az.Relay.Update-AzRelayNamespace
name: Update-AzRelayNamespace
module: Az.Relay
isPreview: false
summary: |-
  Creates or updates a namespace.
  Once created, this namespace's resource manifest is immutable.
  This operation is idempotent.
