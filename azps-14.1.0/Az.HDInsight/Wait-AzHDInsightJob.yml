syntaxes:
- syntax: |-
    ```Syntax
    Wait-AzHDInsightJob
        [-ClusterName] <String>
        [-JobId] <String>
        [-HttpCredential] <PSCredential>
        [-ResourceGroupName <String>]
        [-TimeoutInSeconds <Int32>]
        [-WaitIntervalInSeconds <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
