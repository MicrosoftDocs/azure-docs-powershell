syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzHDInsightHost
        [[-ResourceGroupName] <String>]
        [-ClusterName] <String>
        [-Name] <String[]>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Restart-AzHDInsightHost
        [[-ResourceGroupName] <String>]
        [-ClusterName] <String>
        [-AzureHDInsightHostInfo] <AzureHDInsightHostInfo[]>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
