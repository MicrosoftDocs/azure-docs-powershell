syntaxes:
- syntax: |-
    ```Syntax
    Get-AzHDInsightScriptActionHistory
        [-ClusterName] <String>
        [[-ScriptExecutionId] <Int64>]
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
