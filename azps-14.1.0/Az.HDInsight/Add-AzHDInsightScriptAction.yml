examples:
- title: 'Example 1: Add a script action to the cluster configuration object'
  description: |-
    ```powershell
    # Primary storage account info
    $storageAccountResourceGroupName = "Group"
    $storageAccountResourceId = "yourstorageaccountresourceid"
    $storageAccountName = "yourstorageacct001"
    $storageAccountKey = (Get-AzStorageAccountKey -ResourceGroupName $storageAccountResourceGroupName -Name $storageAccountName)[0].value


    $storageContainer = "container001"

    # Script action info
    $scriptActionName = "<script action name>"
    $scriptActionURI = "<script action URI>"
    $scriptActionParameters = "<script action parameters>"

    # Cluster configuration info
    $location = "East US 2"
    $clusterResourceGroupName = "Group"
    $clusterName = "your-hadoop-001"
    $clusterCreds = Get-Credential

    # If the cluster's resource group doesn't exist yet, run:
    #   New-AzResourceGroup -Name $clusterResourceGroupName -Location $location

    # Create the cluster
    New-AzHDInsightClusterConfig  `
                | Add-AzHDInsightScriptAction `
                    -Name $scriptActionName `
                    -Uri $scriptActionURI `
                    -Parameters $scriptActionParameters `
                    -NodeType Worker `
                | Add-AzHDInsightScriptAction `
                    -Name $scriptActionName `
                    -Uri $scriptActionURI `
                    -Parameters $scriptActionParameters `
                    -NodeType Head `
                | New-AzHDInsightCluster `
                    -ClusterType Hadoop `
                    -OSType Windows `
                    -ClusterSizeInNodes 4 `
                    -ResourceGroupName $clusterResourceGroupName `
                    -ClusterName $clusterName `
                    -HttpCredential $clusterCreds `
                    -Location $location `
                    -StorageAccountResourceId $storageAccountResourceId `
                    -StorageAccountKey $storageAccountKey `
                    -StorageContainer $storageContainer
    ```

    This command adds a script action for the Head and Worker nodes of the your-hadoop-001 cluster, to be run at the end of cluster creation.
