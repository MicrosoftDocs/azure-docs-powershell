- syntax: |-
    ```Syntax
    Add-AzHDInsightStorage
        [-Config] <AzureHDInsightConfig>
        [-StorageAccountName] <String>
        [-StorageAccountKey] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
