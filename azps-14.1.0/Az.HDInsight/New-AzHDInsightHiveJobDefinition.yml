      Specifies Hadoop configuration values to set for when the job runs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: File
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to a file that contains the query to run.
      The file must be available on the storage account associated with the cluster.
      You can use this parameter instead of the *Query* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Files
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
