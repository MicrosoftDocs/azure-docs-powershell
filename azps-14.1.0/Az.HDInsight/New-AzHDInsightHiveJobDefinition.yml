syntaxes:
- syntax: |-
    ```Syntax
    New-AzHDInsightHiveJobDefinition
        [-Arguments <String[]>]
        [-Files <String[]>]
        [-StatusFolder <String>]
        [-Defines <Hashtable>]
        [-File <String>]
        [-JobName <String>]
        [-Query <String>]
        [-RunAsFileJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.HDInsight.Models.AzureHDInsightHiveJobDefinition" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a Hive job definition'
  description: |-
    ```powershell
    # Cluster info
    $clusterName = "your-hadoop-001"
    $clusterCreds = Get-Credential

    # Hive job details
    $statusFolder = "<status folder>"
    $query = "SHOW TABLES"

    New-AzHDInsightHiveJobDefinition -StatusFolder $statusFolder `
                -Query $query `
            | Start-AzHDInsightJob `
                -ClusterName $clusterName `
                -ClusterCredential $clusterCreds
    ```

    This command creates a Hive job definition.
