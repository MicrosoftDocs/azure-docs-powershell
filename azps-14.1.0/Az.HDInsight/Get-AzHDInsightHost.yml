syntaxes:
- syntax: |-
    ```Syntax
    Get-AzHDInsightHost
        [[-ResourceGroupName] <String>]
        [-ClusterName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
