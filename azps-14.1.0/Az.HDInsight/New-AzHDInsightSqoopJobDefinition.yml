### YamlMime:PowerShellCmdlet1
uid: Az.HDInsight.New-AzHDInsightSqoopJobDefinition
name: New-AzHDInsightSqoopJobDefinition
module: Az.HDInsight
isPreview: false
summary: |-
  Creates a Sqoop job object.
description: |-
  The **New-AzHDInsightSqoopJobDefinition** cmdlet defines a Sqoop job object for use with an Azure HDInsight cluster.
parameters:
  cmdletParameters:
  - name: Command
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Sqoop command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: File
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to a file that contains the query to run.
      The file must be available on the Storage account associated with the cluster.
      You can use this parameter instead of the *Query* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Files
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies a collection of files that are associated with a Hive job.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LibDir
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the library directory for the Sqoop job.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StatusFolder
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the location of the folder that contains standard outputs and error outputs for a job.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzHDInsightSqoopJobDefinition
        [-Files <String[]>]
        [-StatusFolder <String>]
        [-File <String>]
        [-Command <String>]
        [-LibDir <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.HDInsight.Models.AzureHDInsightSqoopJobDefinition" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a Sqoop job definition'
  description: |-
    ```powershell
    # Cluster info
    $clusterName = "your-hadoop-001"
    $clusterCreds = Get-Credential

    New-AzHDInsightSqoopJobDefinition -StatusFolder $statusFolder `
                -Command $sqoopCommand `
            | Start-AzHDInsightJob -ClusterName $clusterName `
                -ClusterCredential $clusterCreds
    ```

    This command creates a Sqoop job definition.
