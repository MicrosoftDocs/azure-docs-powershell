uid: Az.Terraform.New-AzTerraformExportResourceObject
name: New-AzTerraformExportResourceObject
module: Az.Terraform
isPreview: false
summary: |-
  Create an in-memory object for ExportResource.
description: |-
  Create an in-memory object for ExportResource.
