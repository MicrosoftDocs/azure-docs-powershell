syntaxes:
- syntax: |-
    ```Syntax
    New-AzTerraformExportResourceObject
        -ResourceId <String[]>
        [-NamePattern <String>]
        [-ResourceName <String>]
        [-ResourceType <String>]
        [-FullProperty <Boolean>]
        [-MaskSensitive <Boolean>]
        [-TargetProvider <String>]
        [<CommonParameters>]
    ```
