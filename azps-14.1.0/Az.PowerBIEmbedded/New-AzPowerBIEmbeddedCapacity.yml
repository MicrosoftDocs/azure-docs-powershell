syntaxes:
- syntax: |-
    ```Syntax
    New-AzPowerBIEmbeddedCapacity
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        [-Sku] <String>
        [-Administrator] <String[]>
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
