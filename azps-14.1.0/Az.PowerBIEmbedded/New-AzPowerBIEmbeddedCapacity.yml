outputs:
- name: <xref href="Microsoft.Azure.Commands.PowerBI.Models.PSPowerBIEmbeddedCapacity" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    New-AzPowerBIEmbeddedCapacity -ResourceGroupName "testRG" -Name "testcapacity" -Location "West Central US" -Sku "A1" -Administrator admin@microsoft.com
    ```

    ```output
    Type                   : Microsoft.PowerBIDedicated/capacities
    Id                     : /subscriptions/78e47976-.../resourceGroups/testRG/providers/Microsoft.PowerBIDedicated/capacities/testcapacity
    ResourceGroup          : testRG
    Name                   : testcapacity
    Location               : West Central US
    State                  : Succeeded
    Administrator          : {admin@microsoft.com}
    Sku                    : A1
    Tier                   : PBIE_Azure
    Tag                    : {}
    ```

    Creates a capacity named testcapacity in the Azure region West Central US and in resource group testRG. The sku level for the capacity will be A1.
