examples:
- title: 'Example 1: Create a dataset'
  description: |-
    ```powershell
    New-AzDataFactoryDataset -ResourceGroupName "ADF" -DataFactoryName "WikiADF" -Name "DAWikipediaClickEvents" -File "C:\\samples\\WikiSample\\DA_WikipediaClickEvents.json"
    ```

    ```output
    DatasetName         : DAWikipediaClickEvents
    ResourceGroupName : ADF
    DataFactoryName   : WikiADF
    Availability      : Microsoft.DataFactories.Availability
    Location          : Microsoft.DataFactories.AzureBlobLocation
    Policy            : Microsoft.DataFactories.Policy
    Structure         : {}
    ```

    This command creates a dataset named DA_WikipediaClickEvents in the data factory named WikiADF.
    The command bases the dataset on information in the DAWikipediaClickEvents.json file.
- title: 'Example 2: View availability for a new dataset'
  description: |-
    ```powershell
    $Dataset = New-AzDataFactoryDataset -ResourceGroupName "ADF" -DataFactoryName "WikiADF" -Name "DAWikipediaClickEvents" -File "C:\\samples\\WikiSample\\DA_WikipediaClickEvents.json"
    $Dataset.Availability
    ```

    ```output
    AnchorDateTime :
    Frequency      : Hour
    Interval       : 1
    Offset         :
    WaitOnExternal : Microsoft.DataFactories.WaitOnExternal
    ```

    The first command creates a dataset named DA_WikipediaClickEvents, as in a previous example, and then assigns that dataset to the $Dataset variable.
    The second command uses standard dot notation to display details about the Availability property of the dataset.
- title: 'Example 3: View location for a new dataset'
  description: |-
    ```powershell
    $Dataset = New-AzDataFactoryDataset -ResourceGroupName "ADF" -DataFactoryName "WikiADF" -Name "DAWikipediaClickEvents" -File "C:\\samples\\WikiSample\\DA_WikipediaClickEvents.json"
    $Dataset.Location
    ```

    ```output
    BlobPath          : wikidatagateway/wikisampledatain/
    FilenamePrefix    :
    Format            :
    LinkedServiceName : LinkedServiceWikipediaClickEvents
    PartitionBy       : {}
    ```

    The first command creates a dataset named DA_WikipediaClickEvents, as in a previous example, and then assigns that dataset to the $Dataset variable.
    The second command displays details about the Location property of the dataset.
- title: 'Example 4: View validation rules for a new dataset'
  description: |-
    ```powershell
    $Dataset = New-AzDataFactoryDataset -ResourceGroupName "ADF" -DataFactoryName "WikiADF" -Name "DAWikipediaClickEvents" -File "C:\\samples\\WikiSample\\DA_WikipediaClickEvents.json"
    $Dataset.Policy.Validation | Format-List $dataset.Location
    ```

    ```output
    BlobPath          : wikidatagateway/wikisampledatain/
    FilenamePrefix    :
    Format            :
    LinkedServiceName : LinkedServiceWikipediaClickEvents
    PartitionBy       : {}

    MinimumRows   :
    MinimumSizeMB : 1
    ```

    The first command creates a dataset named DA_WikipediaClickEvents, as in a previous example, and then assigns that dataset to the $Dataset variable.
    The second command gets details about the validation rules for the dataset, and then passes them to the Format-List cmdlet by using the pipeline operator.
    That Windows PowerShell cmdlet formats the results.
    For more information, type `Get-Help Format-List`.
