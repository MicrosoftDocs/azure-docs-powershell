syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataFactory
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDataFactory
        [-DataFactory] <PSDataFactory>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryObject
  isDefault: false
