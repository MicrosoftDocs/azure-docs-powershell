examples:
- title: Example 1
  description: |-
    ```powershell
    Add-AzDataFactoryV2TriggerSubscription -ResourceGroupName ADF -DataFactoryName WikiADF -Name Trigger1
    ```

    ```output
    TriggerName Status
    ----------- ------
    Trigger1    Provisioning
    ```

    This command will subscribe BlobEnetTrigger1 trigger to the specified events from the trigger defintion.
