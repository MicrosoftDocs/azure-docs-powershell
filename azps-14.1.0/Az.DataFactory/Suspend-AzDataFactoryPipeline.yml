syntaxes:
- syntax: |-
    ```Syntax
    Suspend-AzDataFactoryPipeline
        [-Name] <String>
        [-DataFactoryName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    Suspend-AzDataFactoryPipeline
        [-Name] <String>
        [-DataFactory] <PSDataFactory>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryObject
  isDefault: false
