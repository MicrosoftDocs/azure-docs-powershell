examples:
- title: 'Example 1: Suspend a pipeline'
  description: |-
    ```powershell
    Suspend-AzDataFactoryPipeline -ResourceGroupName "ADF" -Name "DPWikiSample" -DataFactoryName "WikiADF"
    ```

    ```output
    Confirm
    Are you sure you want to suspend pipeline 'DPWikisample' in data factory 'WikiADF'?
    [Y] Yes  [N] No  [S] Suspend  [?] Help (default is "Y"): Y
    True
    ```

    This command suspends the pipeline named DPWikiSample in the data factory named WikiADF.
    The command returns a value of $True.
