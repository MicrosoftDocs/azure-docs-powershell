syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDataFactoryV2IntegrationRuntime
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-DataFactoryName] <String>
        [-AutoUpdate <String>]
        [-AutoUpdateDelayOffset <TimeSpan>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByIntegrationRuntimeName
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDataFactoryV2IntegrationRuntime
        [-ResourceId] <String>
        [-AutoUpdate <String>]
        [-AutoUpdateDelayOffset <TimeSpan>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceId
  isDefault: false
- syntax: |-
    ```Syntax
    Update-AzDataFactoryV2IntegrationRuntime
        [-InputObject] <PSIntegrationRuntime>
        [-AutoUpdate <String>]
        [-AutoUpdateDelayOffset <TimeSpan>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByIntegrationRuntimeObject
  isDefault: false
