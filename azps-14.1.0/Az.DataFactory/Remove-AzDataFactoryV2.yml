examples:
- title: 'Example 1: Remove a data factory'
  description: |-
    ```powershell
    Remove-AzDataFactoryV2 -Name "WikiADF" -ResourceGroupName "ADF"
    ```

    ```output
    Confirm
              Are you sure you want to remove data factory 'WikiADF' in resource group 'ADF'?
              [Y] Yes  [N] No  [S] Suspend  [?] Help (default is "Y"): Y
              True
    ```

    This command removes the data factory named WikiADF from the resource group named ADF.
    This command returns a value of $True.
