examples:
- title: 'Example 1: Get integration runtime keys'
  description: |-
    ```powershell
    Get-AzDataFactoryV2IntegrationRuntimeKey -ResourceGroupName 'rg-test-dfv2' -DataFactoryName 'test-df-eu2' -Name 'test-selfhost-ir'
    ```

    ```output
    AuthKey1                                                 AuthKey2
    --------                                                 --------
    IR@89895504-f647-48fd-8dd3-42fa556d67e3******            IR@89895504-f647-48fd-8dd3-42fa556d67e3****
    ```

    The cmdlet retrieves keys for an integration runtime named 'test-selfhost-ir'.
