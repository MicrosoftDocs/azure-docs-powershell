syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataFactoryHub
        [[-Name] <String>]
        [-DataFactoryName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDataFactoryHub
        [[-Name] <String>]
        [-DataFactory] <PSDataFactory>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryObject
  isDefault: false
