syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDataFactoryV2Trigger
        [-Name] <String>
        [-DefinitionFile] <String>
        [-ResourceGroupName] <String>
        [-DataFactoryName] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
