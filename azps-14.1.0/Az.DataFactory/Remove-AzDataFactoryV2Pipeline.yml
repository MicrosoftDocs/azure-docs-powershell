examples:
- title: 'Example 1: Remove a pipeline'
  description: |-
    ```powershell
    Remove-AzDataFactoryV2Pipeline -ResourceGroupName "ADF" -Name "DPWikisample" -DataFactoryName "WikiADF"
    ```

    ```output
    Confirm
              Are you sure you want to remove pipeline 'DPWikisample' in data factory 'WikiADF'?
              [Y] Yes  [N] No  [S] Suspend  [?] Help (default is "Y"): Y
              True
    ```

    This cmdlet removes the pipeline named DPWikisample from the data factory named WikiADF.
    The command returns a value of $True.
