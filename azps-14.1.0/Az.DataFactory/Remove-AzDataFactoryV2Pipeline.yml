syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataFactoryV2Pipeline
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-DataFactoryName] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
