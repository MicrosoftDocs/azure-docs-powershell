examples:
- title: 'Example 1: Set the description for a gateway'
  description: |-
    ```powershell
    Set-AzDataFactoryGateway -ResourceGroupName "ADF" -Name "ContosoGateway" -DataFactoryName "WikiADF" -Description "my gateway"
    ```

    ```output
    Name            : ContosoGateway
    Description     : my gateway
    Version         : 1.3.5338.1
    Status          : Online
    VersionStatus   : UpToDate
    CreateTime      : 8/22/2014 1:31:09 AM
    RegisterTime    : 8/22/2014 1:31:37 AM
    LastConnectTime : 8/22/2014 1:41:41 AM
    ExpiryTime      :
    ```

    This command sets the description for the gateway named ContosoGateway in the data factory named WikiADF.
    The Description parameter specifies the new description.
