syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataShare
        -ResourceGroupName <String>
        -AccountName <String>
        -Name <String>
        [-Description <String>]
        [-TermsOfUse <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
