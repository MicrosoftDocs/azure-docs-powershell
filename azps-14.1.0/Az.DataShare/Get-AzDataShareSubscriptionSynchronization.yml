examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzDataShareSubscriptionSynchronization -ResourceGroupName "ADS" -AccountName "WikiAds"  -ShareSubscriptionName "AdsShareSubscription"
    ```

    ```output
    durationMs        : 83660
    endTime           : 7/10/2019 9:01:23 AM
    message           :
    startTime         : 7/10/2019 9:00:04 AM
    status            : Succeeded
    synchronizationId : b087e1a5-9144-4e1d-86d1-2a4adcf551d4
    ```

    This command provides information about all the synchronization runs for a share subscription AdsShareSubscription under data share account WikiAds.
