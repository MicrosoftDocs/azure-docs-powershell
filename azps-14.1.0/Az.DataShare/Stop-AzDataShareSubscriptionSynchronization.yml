uid: Az.DataShare.Stop-AzDataShareSubscriptionSynchronization
name: Stop-AzDataShareSubscriptionSynchronization
module: Az.DataShare
isPreview: false
summary: |-
  Stops ongoing synchronization for a share subscription. A share subscription can be specified through its resource id or its name.
description: |-
