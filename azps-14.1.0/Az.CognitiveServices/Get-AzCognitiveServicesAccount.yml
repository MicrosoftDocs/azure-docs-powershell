    ```Syntax
    Get-AzCognitiveServicesAccount
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        [-InRemovedState]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetDeletedAccountParameterSet
