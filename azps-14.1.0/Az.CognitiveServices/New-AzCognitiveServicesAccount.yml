### YamlMime:PowerShellCmdlet1
uid: Az.CognitiveServices.New-AzCognitiveServicesAccount
name: New-AzCognitiveServicesAccount
module: Az.CognitiveServices
isPreview: false
summary: |-
  Creates a Cognitive Services account.
description: |-
  The **New-AzCognitiveServicesAccount** cmdlet creates a Cognitive Services account with the
  specified type and SKU.
