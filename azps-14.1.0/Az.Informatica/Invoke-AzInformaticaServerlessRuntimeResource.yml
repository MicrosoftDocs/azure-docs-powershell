syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzInformaticaServerlessRuntimeResource
        -OrganizationName <String>
        -ResourceGroupName <String>
        -ServerlessRuntimeName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Serverless
  isDefault: true
- syntax: |-
