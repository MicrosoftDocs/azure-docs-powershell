syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzEventHubAuthorizationRule
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveExpandedNamespace
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzEventHubAuthorizationRule
        -NamespaceName <String>
        -ResourceGroupName <String>
        -EventHubName <String>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveExpandedEntity
  isDefault: false
