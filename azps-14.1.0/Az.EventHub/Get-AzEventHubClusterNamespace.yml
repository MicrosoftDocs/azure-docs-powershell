syntaxes:
- syntax: |-
    ```Syntax
    Get-AzEventHubClusterNamespace
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
