syntaxes:
- syntax: |-
    ```Syntax
    Set-AzEventHub
        -Name <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-CaptureEnabled]
        [-Encoding <String>]
        [-IntervalInSeconds <Int32>]
        [-SizeLimitInBytes <Int32>]
        [-SkipEmptyArchive]
        [-RetentionTimeInHour <Int64>]
        [-TombstoneRetentionTimeInHour <Int32>]
        [-Status <String>]
        [-UserMetadata <String>]
        [-MinCompactionLagInMin <Int64>]
        [-TimestampType <String>]
        [-DestinationName <String>]
        [-IdentityType <String>]
        [-UserAssignedIdentityId <String>]
        [-PartitionCount <Int64>]
        [-StorageAccountResourceId <String>]
        [-ArchiveNameFormat <String>]
        [-BlobContainer <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzEventHub
        -InputObject <IEventHubIdentity>
        [-CaptureEnabled]
        [-Encoding <String>]
        [-IntervalInSeconds <Int32>]
        [-SizeLimitInBytes <Int32>]
        [-SkipEmptyArchive]
        [-RetentionTimeInHour <Int64>]
        [-TombstoneRetentionTimeInHour <Int32>]
        [-Status <String>]
        [-UserMetadata <String>]
        [-MinCompactionLagInMin <Int64>]
        [-TimestampType <String>]
        [-DestinationName <String>]
        [-IdentityType <String>]
        [-UserAssignedIdentityId <String>]
        [-PartitionCount <Int64>]
        [-StorageAccountResourceId <String>]
        [-ArchiveNameFormat <String>]
        [-BlobContainer <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetViaIdentityExpanded
  isDefault: false
