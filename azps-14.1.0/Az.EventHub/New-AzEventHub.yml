syntaxes:
- syntax: |-
    ```Syntax
    New-AzEventHub
        -Name <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ArchiveNameFormat <String>]
        [-BlobContainer <String>]
        [-CaptureEnabled]
        [-CleanupPolicy <String>]
        [-DestinationName <String>]
        [-Encoding <String>]
        [-IdentityType <String>]
        [-IntervalInSeconds <Int32>]
        [-MinCompactionLagInMin <Int64>]
        [-PartitionCount <Int64>]
        [-RetentionTimeInHour <Int64>]
        [-SizeLimitInBytes <Int32>]
        [-SkipEmptyArchive]
        [-Status <String>]
        [-StorageAccountResourceId <String>]
        [-TimestampType <String>]
        [-TombstoneRetentionTimeInHour <Int32>]
        [-UserAssignedIdentityId <String>]
        [-UserMetadata <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzEventHub
        -Name <String>
        -NamespaceInputObject <IEventHubIdentity>
        [-ArchiveNameFormat <String>]
        [-BlobContainer <String>]
        [-CaptureEnabled]
        [-CleanupPolicy <String>]
        [-DestinationName <String>]
        [-Encoding <String>]
        [-IdentityType <String>]
        [-IntervalInSeconds <Int32>]
        [-MinCompactionLagInMin <Int64>]
        [-PartitionCount <Int64>]
        [-RetentionTimeInHour <Int64>]
        [-SizeLimitInBytes <Int32>]
        [-SkipEmptyArchive]
        [-Status <String>]
        [-StorageAccountResourceId <String>]
        [-TimestampType <String>]
        [-TombstoneRetentionTimeInHour <Int32>]
        [-UserAssignedIdentityId <String>]
        [-UserMetadata <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityNamespaceExpanded
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzEventHub
        -Name <String>
        -NamespaceInputObject <IEventHubIdentity>
        -Parameter <IEventhub>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityNamespace
  isDefault: false
