syntaxes:
- syntax: |-
    ```Syntax
    Start-AzRecoveryServicesAsrUnplannedFailoverJob
        -ReplicationProtectedItem <ASRReplicationProtectedItem>
        -Direction <String>
        [-PerformSourceSideAction]
        [-DataEncryptionPrimaryCertFile <String>]
        [-DataEncryptionSecondaryCertFile <String>]
        [-RecoveryPoint <ASRRecoveryPoint>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByRPIObject
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzRecoveryServicesAsrUnplannedFailoverJob
        -RecoveryPlan <ASRRecoveryPlan>
        -Direction <String>
        [-PerformSourceSideAction]
        [-DataEncryptionPrimaryCertFile <String>]
        [-DataEncryptionSecondaryCertFile <String>]
        [-RecoveryTag <String>]
        [-MultiVmSyncPoint <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByRPObject
  isDefault: false
- syntax: |-
    ```Syntax
    Start-AzRecoveryServicesAsrUnplannedFailoverJob
        -ReplicationProtectedItem <ASRReplicationProtectedItem>
        -Direction <String>
        -RecoveryTag <String>
        [-PerformSourceSideAction]
        [-DataEncryptionPrimaryCertFile <String>]
        [-DataEncryptionSecondaryCertFile <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByRPIObjectWithRecoveryTag
  isDefault: false
