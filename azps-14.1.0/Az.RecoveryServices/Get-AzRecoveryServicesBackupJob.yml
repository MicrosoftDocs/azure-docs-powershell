syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesBackupJob
        [[-Status] <JobStatus>]
        [[-Operation] <JobOperation>]
        [[-From] <DateTime>]
        [[-To] <DateTime>]
        [[-JobId] <String>]
        [[-Job] <JobBase>]
        [-BackupManagementType <BackupManagementType>]
        [-UseSecondaryRegion]
        [-VaultLocation <String>]
        [-VaultId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
