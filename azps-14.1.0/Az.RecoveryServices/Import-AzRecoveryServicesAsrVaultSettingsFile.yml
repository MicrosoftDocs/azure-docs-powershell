    ```Syntax
    Import-AzRecoveryServicesAsrVaultSettingsFile
        [-Path] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
