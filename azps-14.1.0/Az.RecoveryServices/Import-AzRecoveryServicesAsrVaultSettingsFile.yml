examples:
- title: Example 1
  description: |-
    ```powershell
    $VaultSettings = Import-AzRecoveryServicesAsrVaultSettingsFile -Path $FilePath
    ```

    Imports the specified Recovery Services vault settings file and returns settings of the imported vault.
