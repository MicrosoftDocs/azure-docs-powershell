syntaxes:
- syntax: |-
    ```Syntax
    Start-AzRecoveryServicesAsrClusterCommitFailoverJob

        -ReplicationProtectionCluster <ASRReplicationProtectionCluster>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
