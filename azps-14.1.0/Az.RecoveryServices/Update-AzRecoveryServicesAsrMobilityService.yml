syntaxes:
- syntax: |-
    ```Syntax
    Update-AzRecoveryServicesAsrMobilityService
        [-Account <ASRRunAsAccount>]
        -ReplicationProtectedItem <ASRReplicationProtectedItem>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
