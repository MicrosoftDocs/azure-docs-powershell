examples:
- title: Example 1
  description: |-
    ```powershell
    Update-AzRecoveryServicesAsrMobilityService -ReplicationProtectedItem $rpi -Account $fabric.fabricSpecificDetails.RunAsAccounts[0]
    ```

    Job to track Update Replication Protected Item's Mobility Service Agent.
