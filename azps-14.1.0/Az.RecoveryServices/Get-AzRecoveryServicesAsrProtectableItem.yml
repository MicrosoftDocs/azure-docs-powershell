    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrProtectableItem
        -ProtectionContainer <ASRProtectionContainer>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByObject
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrProtectableItem
        -Name <String>
        -ProtectionContainer <ASRProtectionContainer>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByObjectWithName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrProtectableItem
        -FriendlyName <String>
        -ProtectionContainer <ASRProtectionContainer>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByObjectWithFriendlyName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrProtectableItem
        -FriendlyName <String>
        -SiteId <String>
