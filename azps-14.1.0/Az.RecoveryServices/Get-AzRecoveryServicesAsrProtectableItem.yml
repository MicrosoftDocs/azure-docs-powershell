### YamlMime:PowerShellCmdlet1
uid: Az.RecoveryServices.Get-AzRecoveryServicesAsrProtectableItem
name: Get-AzRecoveryServicesAsrProtectableItem
module: Az.RecoveryServices
isPreview: false
summary: |-
  Get the protectable items in an ASR protection container.
description: |-
  The **Get-AzRecoveryServicesAsrProtectableItem** cmdlet gets the protectable items in an Azure Site Recovery Protection Container.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FriendlyName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the friendly name of the ASR protectable item.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByObjectWithFriendlyName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ByObjectWithSiteIdAndFriendlyName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the ASR protectable item.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByObjectWithName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProtectionContainer
    type: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRProtectionContainer" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure Site Recovery Protection Container object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SiteId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the VMware site Id where the protectable item was discovered (Applicable only for VMware to Azure replication scenario).
      Use site Id from fabric specific details in the ASR fabric to specify one.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByObjectWithSiteIdAndFriendlyName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ByObjectWithSiteId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
