syntaxes:
- syntax: |-
    ```Syntax
    Update-AzRecoveryServicesAsrRecoveryPlan
        -InputObject <ASRRecoveryPlan>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByRPObject
  isDefault: true
