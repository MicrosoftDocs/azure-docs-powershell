syntaxes:
- syntax: |-
    ```Syntax
    Start-AzRecoveryServicesAsrPlannedFailoverJob
        -ReplicationProtectedItem <ASRReplicationProtectedItem>
        -Direction <String>
        [-Optimize <String>]
        [-CreateVmIfNotFound <String>]
        [-ServicesProvider <ASRRecoveryServicesProvider>]
        [-DataEncryptionPrimaryCertFile <String>]
        [-DataEncryptionSecondaryCertFile <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByRPIObject
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzRecoveryServicesAsrPlannedFailoverJob
        -RecoveryPlan <ASRRecoveryPlan>
        -Direction <String>
        [-Optimize <String>]
        [-CreateVmIfNotFound <String>]
        [-DataEncryptionPrimaryCertFile <String>]
        [-DataEncryptionSecondaryCertFile <String>]
        [-MultiVmSyncPoint <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByRPObject
  isDefault: false
- syntax: |-
    ```Syntax
    Start-AzRecoveryServicesAsrPlannedFailoverJob
        -ReplicationProtectedItem <ASRReplicationProtectedItem>
        -Direction <String>
        -RecoveryTag <String>
        [-Optimize <String>]
        [-CreateVmIfNotFound <String>]
        [-DataEncryptionPrimaryCertFile <String>]
        [-DataEncryptionSecondaryCertFile <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByRPIObjectWithRecoveryTag
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRRecoveryPlan" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRReplicationProtectedItem" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRJob" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $currentJob = Start-AzRecoveryServicesAsrPlannedFailoverJob -RecoveryPlan $RP -Direction PrimaryToRecovery
    ```

    Starts the planned failover for the specified ASR recovery plan and returns the ASR job used to track the operation.
