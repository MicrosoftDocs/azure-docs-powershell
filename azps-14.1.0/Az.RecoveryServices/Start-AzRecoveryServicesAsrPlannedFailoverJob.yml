### YamlMime:PowerShellCmdlet1
uid: Az.RecoveryServices.Start-AzRecoveryServicesAsrPlannedFailoverJob
name: Start-AzRecoveryServicesAsrPlannedFailoverJob
module: Az.RecoveryServices
isPreview: false
summary: |-
  Starts a planned failover operation.
description: |-
  The **Start-AzRecoveryServicesAsrPlannedFailoverJob** cmdlet starts a planned failover for an Azure Site Recovery replication protected item or recovery plan.
  You can check whether the job succeeds by using the Get-AzRecoveryServicesAsrJob cmdlet.
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CreateVmIfNotFound
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Create the virtual machine if not found while failing back to the primary region (used in alternate location recovery.) The acceptable values for this parameter are:

      - Yes
      - No
    acceptedValues:
    - Yes
    - No
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DataEncryptionPrimaryCertFile
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the primary certificate file.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DataEncryptionSecondaryCertFile
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the secondary certificate file.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Direction
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the direction of the failover.
      The acceptable values for this parameter are:

      - PrimaryToRecovery
      - RecoveryToPrimary
    acceptedValues:
    - PrimaryToRecovery
    - RecoveryToPrimary
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MultiVmSyncPoint
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to enable multi VM sync points for failover of multi VM sync enabled VMs (Applicable only for VMware to Azure replication scenario).
    acceptedValues:
    - Enable
    - Disable
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByRPObject
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Optimize
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies what to optimize for.
      This parameter applies when failover is done from an Azure site to an on-premise site which requires substantial data synchronization.
      Valid values are:

      - ForDowntime
      - ForSynchronization

      When **ForDowntime** is specified, this indicates that data is synchronized before failover to minimize downtime.
      Synchronization is performed without shutting down the virtual machine.
      After synchronization is complete, the job is suspended.
      Resume the job to do an additional synchronization operation that shuts down the virtual machine.

      When **ForSynchronization** is specified, this indicates that data is synchronized during failover only so data synchronization is minimized.
      With this setting enabled, the virtual machine is shut down immediately.
      Synchronization starts after shutdown to complete the failover operation.
    acceptedValues:
    - ForDownTime
    - ForSynchronization
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RecoveryPlan
    type: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRRecoveryPlan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ASR Recovery plan object corresponding to the recovery plan to be failed over.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByRPObject
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RecoveryTag
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the recovery tag: RecoveryTagApplicationConsistent, RecoveryTagCrashConsistent (Applicable only for VMware to Azure replication scenario).
    acceptedValues:
    - RecoveryTagApplicationConsistent
    - RecoveryTagCrashConsistent
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
