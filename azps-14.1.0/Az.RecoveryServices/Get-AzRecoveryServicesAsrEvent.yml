syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrEvent
        [-AffectedObjectFriendlyName <String>]
        [-Fabric <ASRFabric>]
        [-Severity <String>]
        [-StartTime <DateTime>]
        [-EndTime <DateTime>]
        [-EventType <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByParam
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrEvent
        -ResourceId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrEvent
        -FabricId <String>
        [-AffectedObjectFriendlyName <String>]
        [-Severity <String>]
        [-StartTime <DateTime>]
        [-EndTime <DateTime>]
        [-EventType <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFabricId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrEvent
