uid: Az.RecoveryServices.New-AzRecoveryServicesVault
name: New-AzRecoveryServicesVault
module: Az.RecoveryServices
isPreview: false
summary: |-
  Creates a new Recovery Services vault.
description: |-
  The **New-AzRecoveryServicesVault** cmdlet creates a new Recovery Services vault.
