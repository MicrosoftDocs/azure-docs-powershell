### YamlMime:PowerShellCmdlet1
uid: Az.RecoveryServices.Get-AzRecoveryServicesAsrPolicy
name: Get-AzRecoveryServicesAsrPolicy
module: Az.RecoveryServices
isPreview: false
summary: |-
  Gets ASR replication policies.
description: |-
  The **Get-AzRecoveryServicesAsrPolicy** cmdlet gets the list of configured Azure Site Recovery replication policies or a specific replication policy by name.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FriendlyName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the friendly name of the ASR replication policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFriendlyName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the ASR replication policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrPolicy
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrPolicy
        -Name <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrPolicy
        -FriendlyName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFriendlyName
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRPolicy" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $Policy = Get-AzRecoveryServicesAsrPolicy
    ```

    Returns the list of replication policies
- title: Example 2
  description: |-
    ```powershell
    Get-AzRecoveryServicesAsrPolicy -Name abc
    ```

    ```output
    FriendlyName                : abc
    Name                        : abc
    ID                          : /Subscriptions/xxxxxxxxxxxx/resourceGroups/xxxxxxxxxxxx/providers/Microsoft.RecoveryServices/vaults/xxxxxxxxxxxx/replicationPolicies/abc
    Type                        : Microsoft.RecoveryServices/vaults/replicationPolicies
    ReplicationProvider         : HyperVReplicaAzure
    ReplicationProviderSettings : Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRHyperVReplicaAzurePolicyDetails
    ```

    Returns replication policy with name.
- title: Example 3
  description: |-
    ```powershell
    Get-AzRecoveryServicesAsrPolicy -FriendlyName abc
    ```

    ```output
    FriendlyName                : abc
    Name                        : abc
    ID                          : /Subscriptions/xxxxxxxxxxxx/resourceGroups/xxxxxxxxxxxx/providers/Microsoft.RecoveryServices/vaults/xxxxxxxxxxxx/replicationPolicies/abc
    Type                        : Microsoft.RecoveryServices/vaults/replicationPolicies
    ReplicationProvider         : HyperVReplicaAzure
    ReplicationProviderSettings : Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRHyperVReplicaAzurePolicyDetails
    ```

    Returns the replication policy with the specified friendly name.
