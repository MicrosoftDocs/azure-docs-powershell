syntaxes:
- syntax: |-
    ```Syntax
    New-AzRecoveryServicesAsrReplicationProtectionCluster
        [-AzureToAzure]
        -Name <String>
        -ProtectionContainerMapping <ASRProtectionContainerMapping>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
