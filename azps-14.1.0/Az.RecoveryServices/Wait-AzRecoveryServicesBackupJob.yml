    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Wait-AzRecoveryServicesBackupJob
        [-Job] <Object>
        [[-Timeout] <Int64>]
        [-VaultId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.Backup.Cmdlets.Models.JobBase" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Wait for a job to finish'
  description: |-
    ```powershell
    $vault = Get-AzRecoveryServicesVault -ResourceGroupName "resourceGroup" -Name "vaultName"
    $Jobs = Get-AzRecoveryServicesBackupJob -Status InProgress -VaultId $vault.ID
    Wait-AzRecoveryServicesBackupJob -Job $Jobs[0] -VaultId $vault.ID -Timeout 3600
    ```

    This script polls the first job that is currently in progress until the job has completed or timeout period of 1 hour expired.
