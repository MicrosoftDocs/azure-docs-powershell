uid: Az.RecoveryServices.Get-AzRecoveryServicesVaultSettingsFile
name: Get-AzRecoveryServicesVaultSettingsFile
module: Az.RecoveryServices
isPreview: false
summary: |-
  Gets the Azure Site Recovery vault settings file.
description: |-
  The **Get-AzRecoveryServicesVaultSettingsFile** cmdlet gets the settings file for an Azure Site Recovery vault.
