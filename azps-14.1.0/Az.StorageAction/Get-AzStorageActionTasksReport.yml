uid: Az.StorageAction.Get-AzStorageActionTasksReport
name: Get-AzStorageActionTasksReport
module: Az.StorageAction
isPreview: false
summary: |-
  Fetch the storage tasks run report summary for each assignment.
description: |-
  Fetch the storage tasks run report summary for each assignment.
