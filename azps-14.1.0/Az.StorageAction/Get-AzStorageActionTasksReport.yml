syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStorageActionTasksReport
        -ResourceGroupName <String>
        -StorageTaskName <String>
        [-SubscriptionId <String[]>]
        [-Filter <String>]
        [-Maxpagesize <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
