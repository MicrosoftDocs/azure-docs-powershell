examples:
- title: 'Example 1: Lists all batch inference deployment under a batch endpoint'
  description: |-
    ```powershell
    Get-AzMLWorkspaceBatchDeployment -ResourceGroupName ml-rg-test -WorkspaceName mlworkspace-cli01 -EndpointName batch-cli02
    ```

    ```output
