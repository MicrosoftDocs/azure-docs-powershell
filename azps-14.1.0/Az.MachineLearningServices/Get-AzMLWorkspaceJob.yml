syntaxes:
- syntax: |-
    ```Syntax
    Get-AzMLWorkspaceJob
        -ResourceGroupName <String>
        -WorkspaceName <String>
        [-SubscriptionId <String[]>]
        [-Job <String>]
        [-JobType <String>]
        [-ListViewType <ListViewType>]
        [-Skip <String>]
        [-Tag <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
- syntax: |-
