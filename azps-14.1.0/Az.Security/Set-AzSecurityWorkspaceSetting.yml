syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSecurityWorkspaceSetting
        -Name <String>
        -Scope <String>
        -WorkspaceId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
