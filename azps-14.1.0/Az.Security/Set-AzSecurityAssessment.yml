syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSecurityAssessment
        -Name <String>
        -StatusCode <String>
        [-StatusCause <String>]
        [-StatusDescription <String>]
        [-AdditionalData <System.Collections.Generic.Dictionary`2[System.String,System.String]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SubscriptionLevelResource
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSecurityAssessment
        -Name <String>
        -AssessedResourceId <String>
        -StatusCode <String>
        [-StatusCause <String>]
        [-StatusDescription <String>]
        [-AdditionalData <System.Collections.Generic.Dictionary`2[System.String,System.String]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
