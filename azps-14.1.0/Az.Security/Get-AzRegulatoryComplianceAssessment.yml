    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRegulatoryComplianceAssessment
        -StandardName <String>
        -ControlName <String>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SubscriptionLevelResource
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzRegulatoryComplianceAssessment
        -ResourceId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceId
  isDefault: false
