### YamlMime:PowerShellCmdlet1
uid: Az.Security.Get-AzRegulatoryComplianceAssessment
name: Get-AzRegulatoryComplianceAssessment
module: Az.Security
isPreview: false
summary: |-
  Gets regulatory compliance assessments
description: |-
  Get a spcific assessment details or list all the assessments under specific control and regulatory compliance standard.
parameters:
  cmdletParameters:
  - name: ControlName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Control Name.
    defaultValue: None
    dontShow: false
    isDynamic: false
