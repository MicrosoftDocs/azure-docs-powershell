    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SubscriptionLevelResource
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      ID of the security resource that you want to invoke the command on.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ResourceId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StandardName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Standard Name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SubscriptionLevelResource
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
