    TopologyResources:	/subscriptions/3eeab341-f466-499c-a8be-85427e154baf7612f869/resourceGroups/myService1/providers/Microsoft.Compute/virtualMachines/myvm
    ```

    View all security topologies in a subscription
- title: Example 2
  description: |-
