examples:
- title: 'Example 1: Get discovered GitLab group by name'
  description: |-
    ```powershell
    Get-AzSecurityConnectorGitLabGroup -ResourceGroupName dfdtest-sdk -SecurityConnectorName dfdsdktests-gl-01 -GroupFqName dfdsdktests
    ```

    ```output
