    ```
- title: 'Example 2: List discovered GitLab groups'
  description: |-
    ```powershell
    Get-AzSecurityConnectorGitLabGroup -ResourceGroupName dfdtest-sdk -SecurityConnectorName dfdsdktests-gl-01
