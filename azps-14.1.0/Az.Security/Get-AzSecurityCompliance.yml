- syntax: |-
    ```Syntax
    Get-AzSecurityCompliance
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SubscriptionScope
  isDefault: true
- syntax: |-
