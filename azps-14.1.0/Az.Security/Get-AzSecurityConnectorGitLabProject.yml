- title: 'Example 2: List discovered GitLab projects'
  description: |-
    ```powershell
    Get-AzSecurityConnectorGitLabProject -ResourceGroupName dfdtest-sdk -SecurityConnectorName dfdsdktests-gl-01 -GroupFqName dfdsdktests
    ```

