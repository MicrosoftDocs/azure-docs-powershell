### YamlMime:PowerShellCmdlet1
uid: Az.Security.Get-AzSecuritySetting
name: Get-AzSecuritySetting
module: Az.Security
isPreview: false
summary: |-
  Get security settings in Azure Security Center
description: |-
  The Get-AzSecuritySetting cmdlet get security settings in Azure Security Center.
parameters:
  cmdletParameters:
