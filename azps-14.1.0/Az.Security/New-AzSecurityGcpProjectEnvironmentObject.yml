syntaxes:
- syntax: |-
    ```Syntax
    New-AzSecurityGcpProjectEnvironmentObject
        [-OrganizationalData <IGcpOrganizationalData>]
        [-ProjectDetailProjectId <String>]
        [-ProjectDetailProjectNumber <String>]
        [-ScanInterval <Int64>]
        [<CommonParameters>]
    ```
