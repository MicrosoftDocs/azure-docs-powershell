    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Test-AzVMwareLocationTrialAvailability
        -Location <String>
        [-SubscriptionId <String>]
        [-Capacity <Int32>]
        [-Family <String>]
        [-Name <String>]
        [-Size <String>]
        [-Tier <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.VMware.Models.ITrial" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Check trial availability'
  description: |-
    ```powershell
    Test-AzVMwareLocationTrialAvailability -Location westcentralus -Name av36
    ```

    ```output
    AvailableHost Status
    ------------- ------
    0             TrialDisabled
    ```

    Check trial availability
