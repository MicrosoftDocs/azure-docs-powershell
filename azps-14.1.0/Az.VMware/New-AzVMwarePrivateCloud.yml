syntaxes:
- syntax: |-
    ```Syntax
    New-AzVMwarePrivateCloud
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -NetworkBlock <String>
        -Sku <String>
        -Location <String>
        -ManagementClusterSize <Int32>
        [-AvailabilitySecondaryZone <Int32>]
        [-AvailabilityStrategy <String>]
        [-AvailabilityZone <Int32>]
        [-EncryptionStatus <String>]
        [-ExtendedNetworkBlock <String[]>]
        [-IdentitySource <IIdentitySource[]>]
        [-IdentityType <String>]
        [-Internet <String>]
        [-KeyVaultPropertyKeyName <String>]
        [-KeyVaultPropertyKeyVaultUrl <String>]
        [-KeyVaultPropertyKeyVersion <String>]
        [-ManagementClusterHost <String[]>]
        [-NsxtPassword <String>]
        [-Tag <Hashtable>]
        [-VcenterPassword <String>]
        [-AcceptEULA]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
