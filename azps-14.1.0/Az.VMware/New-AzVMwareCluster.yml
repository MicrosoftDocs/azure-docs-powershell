syntaxes:
- syntax: |-
    ```Syntax
    New-AzVMwareCluster
        -Name <String>
        -PrivateCloudName <String>
        -ResourceGroupName <String>
        -SkuName <String>
        [-SubscriptionId <String>]
        [-ClusterSize <Int32>]
        [-PropertiesHost <String[]>]
        [-SkuCapacity <Int32>]
        [-SkuFamily <String>]
        [-SkuSize <String>]
        [-SkuTier <String>]
        [-VsanDatastoreName <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzVMwareCluster
        -Name <String>
        -PrivateCloudInputObject <IVMwareIdentity>
        -SkuName <String>
        [-ClusterSize <Int32>]
        [-PropertiesHost <String[]>]
        [-SkuCapacity <Int32>]
        [-SkuFamily <String>]
        [-SkuSize <String>]
        [-SkuTier <String>]
        [-VsanDatastoreName <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityPrivateCloudExpanded
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzVMwareCluster
        -InputObject <IVMwareIdentity>
        -SkuName <String>
        [-ClusterSize <Int32>]
        [-PropertiesHost <String[]>]
        [-SkuCapacity <Int32>]
        [-SkuFamily <String>]
        [-SkuSize <String>]
        [-SkuTier <String>]
        [-VsanDatastoreName <String>]
        [-DefaultProfile <PSObject>]
