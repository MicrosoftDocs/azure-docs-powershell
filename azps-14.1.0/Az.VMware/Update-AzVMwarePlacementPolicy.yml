examples:
- title: 'Example 1: Update a placement policy in a private cloud cluster'
  description: |-
    ```powershell
    Update-AzVMwarePlacementPolicy -ClusterName cluster1 -Name policy1 -PrivateCloudName cloud1 -ResourceGroupName group1 -State 'Enabled'
    ```

