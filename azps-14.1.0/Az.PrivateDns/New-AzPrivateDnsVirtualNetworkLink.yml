syntaxes:
- syntax: |-
    ```Syntax
    New-AzPrivateDnsVirtualNetworkLink
        -ResourceGroupName <String>
        -ZoneName <String>
        -Name <String>
        -VirtualNetworkId <String>
        [-EnableRegistration]
        [-ResolutionPolicy <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VirtualNetworkId
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzPrivateDnsVirtualNetworkLink
        -ResourceGroupName <String>
        -ZoneName <String>
        -Name <String>
        -VirtualNetwork <VirtualNetwork>
        [-EnableRegistration]
        [-ResolutionPolicy <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VirtualNetworkObject
  isDefault: false
