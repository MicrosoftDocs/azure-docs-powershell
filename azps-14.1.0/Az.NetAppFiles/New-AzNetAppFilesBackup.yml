syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetAppFilesBackup
        -ResourceGroupName <String>
        -AccountName <String>
        -BackupVaultName <String>
        -Name <String>
        -VolumeResourceId <String>
        [-Label <String>]
        [-UseExistingSnapshot]
        [-SnapshotName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzNetAppFilesBackup
        -Name <String>
        -VolumeResourceId <String>
        -BackupVaultObject <PSNetAppFilesBackupVault>
        [-Label <String>]
        [-UseExistingSnapshot]
        [-SnapshotName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByParentObjectParameterSet
  isDefault: false
