syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNetAppFilesNetworkSiblingSet
        -Location <String>
        -SubnetId <String>
        -NetworkSiblingSetId <String>
        -NetworkSiblingSetStateId <String>
        -NetworkFeature <String>
