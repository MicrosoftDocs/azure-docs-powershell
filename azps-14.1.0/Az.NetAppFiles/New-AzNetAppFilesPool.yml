syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetAppFilesPool
        -ResourceGroupName <String>
        -Location <String>
        -AccountName <String>
        -Name <String>
        -PoolSize <Int64>
        -ServiceLevel <String>
        [-QosType <String>]
        [-CoolAccess]
        [-EncryptionType <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzNetAppFilesPool
        -Name <String>
        -PoolSize <Int64>
        -ServiceLevel <String>
        -AccountObject <PSNetAppFilesAccount>
        [-QosType <String>]
        [-CoolAccess]
        [-EncryptionType <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByParentObjectParameterSet
  isDefault: false
