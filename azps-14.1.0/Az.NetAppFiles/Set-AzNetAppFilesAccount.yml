syntaxes:
- syntax: |-
    ```Syntax
    Set-AzNetAppFilesAccount
        -ResourceGroupName <String>
        -Location <String>
        -Name <String>
        [-NfsV4IdDomain <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzNetAppFilesAccount
        -Location <String>
        -Name <String>
        [-ActiveDirectory <PSNetAppFilesActiveDirectory[]>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByResourceActiveDirectory
  isDefault: false
- syntax: |-
