syntaxes:
- syntax: |-
    ```Syntax
    New-AzPostgreSqlFlexibleServer
        [-Name <String>]
        [-ResourceGroupName <String>]
        [-SubscriptionId <String>]
        [-Zone <String>]
        [-Location <String>]
        [-AdministratorUserName <String>]
        [-AdministratorLoginPassword <SecureString>]
        [-Sku <String>]
        [-SkuTier <String>]
        [-BackupRetentionDay <Int32>]
        [-StorageInMb <Int32>]
        [-HaEnabled <String>]
        [-Tag <Hashtable>]
        [-Version <ServerVersion>]
        [-PrivateDnsZone <String>]
        [-SubnetPrefix <String>]
        [-Subnet <String>]
        [-VnetPrefix <String>]
        [-Vnet <String>]
        [-PublicAccess <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
