syntaxes:
- syntax: |-
    ```Syntax
    Restore-AzPostgreSqlServer
        -Name <String>
        -ResourceGroupName <String>
        -InputObject <IServer>
        [-SubscriptionId <String>]
        [-UseGeoRestore]
        [-Location <String>]
        [-Sku <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: GeoRestore
  isDefault: true
- syntax: |-
    ```Syntax
    Restore-AzPostgreSqlServer
        -Name <String>
        -ResourceGroupName <String>
        -InputObject <IServer>
        -RestorePointInTime <DateTime>
        [-SubscriptionId <String>]
        [-Location <String>]
        [-Sku <String>]
        [-Tag <Hashtable>]
        [-UsePointInTimeRestore]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PointInTimeRestore
  isDefault: false
