syntaxes:
- syntax: |-
    ```Syntax
    Update-AzPostgreSqlServer
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AdministratorLoginPassword <SecureString>]
        [-ReplicationRole <String>]
        [-SkuCapacity <Int32>]
        [-SkuFamily <String>]
        [-Sku <String>]
        [-SkuTier <SkuTier>]
        [-SslEnforcement <SslEnforcementEnum>]
        [-MinimalTlsVersion <MinimalTlsVersionEnum>]
        [-BackupRetentionDay <Int32>]
        [-StorageAutogrow <StorageAutogrow>]
        [-StorageInMb <Int32>]
        [-Tag <Hashtable>]
        [-PublicNetworkAccess <PublicNetworkAccessEnum>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzPostgreSqlServer
        -InputObject <IPostgreSqlIdentity>
        [-AdministratorLoginPassword <SecureString>]
        [-ReplicationRole <String>]
        [-SkuCapacity <Int32>]
        [-SkuFamily <String>]
        [-Sku <String>]
        [-SkuTier <SkuTier>]
        [-SslEnforcement <SslEnforcementEnum>]
        [-MinimalTlsVersion <MinimalTlsVersionEnum>]
        [-BackupRetentionDay <Int32>]
        [-StorageAutogrow <StorageAutogrow>]
        [-StorageInMb <Int32>]
        [-Tag <Hashtable>]
        [-PublicNetworkAccess <PublicNetworkAccessEnum>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.PostgreSql.Models.IPostgreSqlIdentity" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.PostgreSql.Models.Api20171201.IServer" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Update PostgreSql server by resource group and server name'
  description: |-
    ```powershell
    Update-AzPostgreSqlServer -ResourceGroupName PostgreSqlTestRG -ServerName PostgreSqlTestServer -SslEnforcement Disabled
    ```

    ```output
    Name                 Location AdministratorLogin Version StorageProfileStorageMb SkuName   SkuTier        SslEnforcement
    ----                 -------- ------------------ ------- ----------------------- -------   -------        --------------
    postgresqltestserver eastus   pwsh               9.6     5120                    GP_Gen5_4 GeneralPurpose Disabled
    ```

    This cmdlet updates PostgreSql server by resource group and server name.
- title: 'Example 2: Update PostgreSql server by identity.'
  description: |-
    ```powershell
    Get-AzPostgreSqlServer -ResourceGroupName PostgreSqlTestRG -ServerName PostgreSqlTestServer | Update-AzPostgreSqlServer -BackupRetentionDay 23
    ```

    ```output
    Name                 Location AdministratorLogin Version StorageProfileStorageMb SkuName   SkuTier        SslEnforcement
    ----                 -------- ------------------ ------- ----------------------- -------   -------        --------------
    postgresqltestserver eastus   pwsh               9.6     5120                    GP_Gen5_4 GeneralPurpose Disabled
    ```

    This cmdlet updates PostgreSql server by identity.
