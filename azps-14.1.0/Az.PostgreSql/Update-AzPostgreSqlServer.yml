### YamlMime:PowerShellCmdlet1
uid: Az.PostgreSql.Update-AzPostgreSqlServer
name: Update-AzPostgreSqlServer
module: Az.PostgreSql
isPreview: false
summary: |-
  Updates an existing server.
  The request body can contain one to many of the properties present in the normal server definition.
  Use Update-AzPostSqlConfiguration instead if you want update server parameters such as wait_timeout or net_retry_count.
description: |-
