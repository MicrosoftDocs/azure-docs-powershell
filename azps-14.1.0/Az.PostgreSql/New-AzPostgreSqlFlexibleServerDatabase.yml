syntaxes:
- syntax: |-
    ```Syntax
    New-AzPostgreSqlFlexibleServerDatabase
        -Name <String>
        -ResourceGroupName <String>
        -ServerName <String>
        [-SubscriptionId <String>]
        [-Charset <String>]
        [-Collation <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzPostgreSqlFlexibleServerDatabase
        -InputObject <IPostgreSqlIdentity>
        [-Charset <String>]
        [-Collation <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityExpanded
  isDefault: false
