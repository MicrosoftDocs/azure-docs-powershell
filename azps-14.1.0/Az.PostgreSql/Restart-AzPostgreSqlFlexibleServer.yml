syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzPostgreSqlFlexibleServer
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-FailoverMode <String>]
        [-RestartWithFailover]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RestartExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Restart-AzPostgreSqlFlexibleServer
        -Name <String>
        -ResourceGroupName <String>
        -Parameter <IRestartParameter>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Restart
  isDefault: false
- syntax: |-
    ```Syntax
    Restart-AzPostgreSqlFlexibleServer
        -InputObject <IPostgreSqlIdentity>
        [-FailoverMode <String>]
        [-RestartWithFailover]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RestartViaIdentityExpanded
  isDefault: false
