syntaxes:
- syntax: |-
    ```Syntax
    New-AzPostgreSqlFirewallRule
        -ResourceGroupName <String>
        -ServerName <String>
        -EndIPAddress <String>
        -StartIPAddress <String>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzPostgreSqlFirewallRule
        -ResourceGroupName <String>
        -ServerName <String>
        -ClientIPAddress <String>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClientIPAddress
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzPostgreSqlFirewallRule
        -ResourceGroupName <String>
        -ServerName <String>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-AllowAll]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AllowAll
  isDefault: false
