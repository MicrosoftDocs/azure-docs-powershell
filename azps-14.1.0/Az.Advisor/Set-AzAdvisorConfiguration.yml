syntaxes:
- syntax: |-
    ```Syntax
    Set-AzAdvisorConfiguration
        [-SubscriptionId <String>]
        [-Exclude]
        [-LowCpuThreshold <CpuThreshold>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByLCT
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzAdvisorConfiguration
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Exclude]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByRG
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzAdvisorConfiguration
        -InputObject <IAdvisorIdentity>
        [-Exclude]
        [-LowCpuThreshold <CpuThreshold>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByInputObject
  isDefault: false
