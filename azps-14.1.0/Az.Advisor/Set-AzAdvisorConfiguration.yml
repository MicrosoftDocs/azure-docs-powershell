examples:
- title: 'Example 1: Set advisor configuration by subscription id'
  description: |-
    ```powershell
    Set-AzAdvisorConfiguration -Exclude -LowCpuThreshold 20
    ```

    ```output
    Name    Exclude LowCpuThreshold
    ----    ------- ---------------
    default True    20
    ```

    Set advisor configuration by subscription id
- title: 'Example 2:  Set advisor configuration by resource group name'
  description: |-
    ```powershell
    Set-AzAdvisorConfiguration -Exclude
    ```

    ```output
    Name    Exclude LowCpuThreshold
    ----    ------- ---------------
    default True
    ```

    Set advisor configuration by resource group name
