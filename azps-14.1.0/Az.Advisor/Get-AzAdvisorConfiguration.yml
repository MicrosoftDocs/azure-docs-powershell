syntaxes:
- syntax: |-
    ```Syntax
    Get-AzAdvisorConfiguration
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
- syntax: |-
