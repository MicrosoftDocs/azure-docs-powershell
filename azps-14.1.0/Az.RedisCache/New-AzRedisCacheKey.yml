syntaxes:
- syntax: |-
    ```Syntax
    New-AzRedisCacheKey
        [-ResourceGroupName <String>]
        -Name <String>
        -KeyType <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
