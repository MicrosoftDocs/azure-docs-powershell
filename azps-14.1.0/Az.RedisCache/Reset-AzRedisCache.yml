- syntax: |-
    ```Syntax
    Reset-AzRedisCache
        [-ResourceGroupName <String>]
        -Name <String>
        -RebootType <String>
        [-ShardId <Int32>]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
