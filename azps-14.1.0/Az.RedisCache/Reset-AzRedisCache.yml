examples:
- title: 'Example 1: Restart both nodes'
  description: |-
    ```powershell
    Reset-AzRedisCache -ResourceGroupName "ResourceGroup13" -Name "RedisCache06" -RebootType "AllNodes" -Force
    ```

    This command restarts both nodes for the cache named RedisCache06.
