syntaxes:
- syntax: |-
    ```Syntax
    Import-AzRedisCache
        [-ResourceGroupName <String>]
        -Name <String>
        -Files <String[]>
        [-Format <String>]
        [-PreferredDataArchiveAuthMethod <String>]
        [-StorageSubscriptionId <String>]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
