### YamlMime:PowerShellCmdlet1
uid: Az.RedisCache.New-AzRedisCacheScheduleEntry
name: New-AzRedisCacheScheduleEntry
module: Az.RedisCache
isPreview: false
summary: |-
  Creates a schedule entry.
description: |-
  The **New-AzRedisCacheScheduleEntry** cmdlet creates a **PSScheduleEntry** object.
  Azure Redis Cache patch schedule cmdlets, such as the New-AzRedisCachePatchSchedule cmdlet, require schedule entry objects.
notes: |-
  * Keywords: azure, azurerm, arm, resource, management, manager, redis, cache, web, webapp, website
parameters:
  cmdletParameters:
  - name: DayOfWeek
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the day of the week for the schedule entry.
      The acceptable values for this parameter are:
      - Everyday
      - Weekend
      - Monday
      - Tuesday
      - Wednesday
      - Thursday
      - Friday
      - Saturday
      - Sunday
    acceptedValues:
    - Everyday
    - Weekend
    - Monday
    - Tuesday
    - Wednesday
    - Thursday
    - Friday
    - Saturday
    - Sunday
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaintenanceWindow
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.TimeSpan" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the amount of time window allowed for updates.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StartHourUtc
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an hour of the day when the schedule starts.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
