syntaxes:
- syntax: |-
    ```Syntax
    New-AzRedisCacheScheduleEntry
        -DayOfWeek <String>
        -StartHourUtc <Int32>
        [-MaintenanceWindow <TimeSpan>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
