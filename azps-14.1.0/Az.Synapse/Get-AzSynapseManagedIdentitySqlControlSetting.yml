syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSynapseManagedIdentitySqlControlSetting
        -WorkspaceName <String>
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSynapseManagedIdentitySqlControlSetting
        -WorkspaceObject <PSSynapseWorkspace>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
