syntaxes:
- syntax: |-
    ```Syntax
    New-AzSynapseKustoPoolDatabase
        -DatabaseName <String>
        -KustoPoolName <String>
        -ResourceGroupName <String>
        -WorkspaceName <String>
        [-SubscriptionId <String>]
        -Kind <Kind>
        [-Location <String>]
        [-HotCachePeriod <TimeSpan>]
        [-SoftDeletePeriod <TimeSpan>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-Break]
        [-HttpPipelineAppend <SendAsyncStep[]>]
        [-HttpPipelinePrepend <SendAsyncStep[]>]
        [-NoWait]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-ProxyUseDefaultCredentials]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Synapse.Models.Api20210601Preview.IDatabase" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Creates or updates a new kusto database in a workspace'
  description: |-
    ```powershell
    New-AzSynapseKustoPoolDatabase -ResourceGroupName "testrg" -WorkspaceName "testws" -KustoPoolName "testkustopool" -DatabaseName "mykustodatabase" -Kind "ReadWrite" -Location "East US 2"
    ```

    ```output
    Kind      Location  Name
    ----      --------  ----
    ReadWrite East US 2 testws/testkustopool/mykustodatabase
    ```

    Creates or updates a kusto database "mykustodatabase" in Kusto Pool "testkustopool" in the workspace "testws" found in the resource group "testrg".
