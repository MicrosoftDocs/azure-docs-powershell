syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSynapseTrigger
        -WorkspaceName <String>
        -Name <String>
        -DefinitionFile <String>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSynapseTrigger
        -WorkspaceObject <PSSynapseWorkspace>
