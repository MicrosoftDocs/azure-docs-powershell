syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzSynapsePipelineRun
        -WorkspaceName <String>
        -PipelineRunId <String>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByName
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzSynapsePipelineRun
        -WorkspaceObject <PSSynapseWorkspace>
        -PipelineRunId <String>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByObject
  isDefault: false
- syntax: |-
    ```Syntax
    Stop-AzSynapsePipelineRun
        -InputObject <PSPipelineRun>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByInputObject
  isDefault: false
