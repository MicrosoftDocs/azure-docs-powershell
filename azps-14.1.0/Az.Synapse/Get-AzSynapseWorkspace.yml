uid: Az.Synapse.Get-AzSynapseWorkspace
name: Get-AzSynapseWorkspace
module: Az.Synapse
isPreview: false
summary: |-
  Gets a Synapse Analytics workspace.
description: |-
  The **Get-AzSynapseWorkspace** cmdlet gets information about an Azure Synapse Analytics workspace.
