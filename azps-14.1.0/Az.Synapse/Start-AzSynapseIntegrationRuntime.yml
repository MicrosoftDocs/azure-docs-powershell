syntaxes:
- syntax: |-
    ```Syntax
    Start-AzSynapseIntegrationRuntime
        -WorkspaceName <String>
        -Name <String>
        [-ResourceGroupName <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StartByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzSynapseIntegrationRuntime
        -Name <String>
        -WorkspaceObject <PSSynapseWorkspace>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StartByParentObjectParameterSet
  isDefault: false
- syntax: |-
