syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSynapseFirewallRule
        -WorkspaceName <String>
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSynapseFirewallRule
        -WorkspaceObject <PSSynapseWorkspace>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByParentObjectParameterSet
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSSynapseWorkspace" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSSynapseIpFirewallRule" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzSynapseFirewallRule -ResourceGroupName ContosoResourceGroup -WorkspaceName ContosoWorkspace
    ```

    This command gets all firewall rules under a workspace.
- title: Example 2
  description: |-
    ```powershell
    Get-AzSynapseFirewallRule -ResourceGroupName ContosoResourceGroup -WorkspaceName ContosoWorkspace -Name ContosoFirewallRule
    ```

    This command gets the firewall rule under workspace ContosoWorkspace with name ContosoFirewallRule.
- title: Example 3
  description: |-
    ```powershell
    $ws = Get-AzSynapseWorkspace -Name ContosoWorkspace
    $ws | Get-AzSynapseFirewallRule
    ```

    This command gets all firewall rules under a workspace through pipeline.
