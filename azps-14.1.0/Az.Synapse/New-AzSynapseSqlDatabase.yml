syntaxes:
- syntax: |-
    ```Syntax
    New-AzSynapseSqlDatabase
        -WorkspaceName <String>
        -Name <String>
        [-ResourceGroupName <String>]
        [-Tag <Hashtable>]
        [-Collation <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByNameParameterSet
  isDefault: true
