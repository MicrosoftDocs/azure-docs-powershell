syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzSynapseWorkspaceKey
        -WorkspaceName <String>
        -Name <String>
        [-ResourceGroupName <String>]
        [-PassThru]
        [-AsJob]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzSynapseWorkspaceKey
        -Name <String>
        -WorkspaceObject <PSSynapseWorkspace>
        [-PassThru]
        [-AsJob]
