### YamlMime:PowerShellCmdlet1
uid: Az.Synapse.New-AzSynapseSqlPool
name: New-AzSynapseSqlPool
module: Az.Synapse
isPreview: false
summary: |-
  Creates a Synapse Analytics SQL pool.
description: |-
  The **New-AzSynapseSqlPool** cmdlet creates an Azure Synapse Analytics SQL pool.
