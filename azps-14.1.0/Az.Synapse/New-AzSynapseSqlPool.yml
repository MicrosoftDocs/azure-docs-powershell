syntaxes:
- syntax: |-
    ```Syntax
    New-AzSynapseSqlPool
        -WorkspaceName <String>
        -Name <String>
        -PerformanceLevel <String>
        [-ResourceGroupName <String>]
        [-Version <Int32>]
        [-Tag <Hashtable>]
        [-Collation <String>]
        [-StorageAccountType <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzSynapseSqlPool
        -WorkspaceObject <PSSynapseWorkspace>
        -Name <String>
        -PerformanceLevel <String>
        [-Version <Int32>]
        [-Tag <Hashtable>]
        [-Collation <String>]
        [-StorageAccountType <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByParentObjectParameterSet
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSSynapseWorkspace" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSSynapseSqlPool" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    New-AzSynapseSqlPool -WorkspaceName ContosoWorkspace -Name ContosoSqlPool -PerformanceLevel DW200c
    ```

    This command creates an Azure Synapse Analytics SQL pool.
- title: Example 2
  description: |-
    ```powershell
    New-AzSynapseSqlPool -WorkspaceName ContosoWorkspace -Name ContosoSqlPool -PerformanceLevel DW200c -StorageAccountType LRS
    ```

    This command creates an Azure Synapse Analytics SQL pool with specified storage account type.
