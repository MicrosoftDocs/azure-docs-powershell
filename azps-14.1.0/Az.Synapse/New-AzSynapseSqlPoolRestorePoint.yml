uid: Az.Synapse.New-AzSynapseSqlPoolRestorePoint
name: New-AzSynapseSqlPoolRestorePoint
module: Az.Synapse
isPreview: false
summary: |-
  Creates a new restore point in an Azure Synapse Analytics SQL pool.
description: |-
  The **New-AzSynapseSqlPoolRestorePoint** cmdlet creates a new restore point that an Azure Synapse Analytics SQL pool can be restored from.
