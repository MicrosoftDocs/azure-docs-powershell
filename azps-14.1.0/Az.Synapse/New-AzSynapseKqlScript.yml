syntaxes:
- syntax: |-
    ```Syntax
    New-AzSynapseKqlScript
        -WorkspaceName <String>
        -DefinitionFile <String>
        [-Name <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByName
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzSynapseKqlScript
        -WorkspaceName <String>
        -KustoPoolName <String>
        -KustoPoolDatabaseName <String>
        -DefinitionFile <String>
        [-Name <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByNameAndKustoPoolDatabase
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzSynapseKqlScript
        -WorkspaceObject <PSSynapseWorkspace>
