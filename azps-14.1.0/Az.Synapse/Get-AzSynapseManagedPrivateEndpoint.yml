syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSynapseManagedPrivateEndpoint
        -WorkspaceName <String>
        [-Name <String>]
        [-VirtualNetworkName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSynapseManagedPrivateEndpoint
        -WorkspaceObject <PSSynapseWorkspace>
        [-Name <String>]
        [-VirtualNetworkName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSSynapseWorkspace" data-throw-if-not-resolved="False" />
