syntaxes:
- syntax: |-
    ```Syntax
    Update-AzSynapseFirewallRule
        -WorkspaceName <String>
        -Name <String>
        [-ResourceGroupName <String>]
        [-StartIpAddress <String>]
        [-EndIpAddress <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzSynapseFirewallRule
        -WorkspaceObject <PSSynapseWorkspace>
        -Name <String>
        [-StartIpAddress <String>]
        [-EndIpAddress <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateByParentObjectParameterSet
  isDefault: false
