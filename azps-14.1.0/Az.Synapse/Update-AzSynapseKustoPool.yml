syntaxes:
- syntax: |-
    ```Syntax
    Update-AzSynapseKustoPool
        -Name <String>
        -ResourceGroupName <String>
        -WorkspaceName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-EnablePurge]
        [-EnableStreamingIngest]
        [-OptimizedAutoscaleIsEnabled]
        [-OptimizedAutoscaleMaximum <Int32>]
        [-OptimizedAutoscaleMinimum <Int32>]
        [-OptimizedAutoscaleVersion <Int32>]
        [-SkuCapacity <Int32>]
        [-SkuName <SkuName>]
        [-SkuSize <SkuSize>]
        [-Tag <Hashtable>]
        [-WorkspaceUid <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-Break]
        [-HttpPipelineAppend <SendAsyncStep[]>]
        [-HttpPipelinePrepend <SendAsyncStep[]>]
        [-NoWait]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-ProxyUseDefaultCredentials]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzSynapseKustoPool
        -InputObject <ISynapseIdentity>
        [-IfMatch <String>]
        [-EnablePurge]
        [-EnableStreamingIngest]
        [-OptimizedAutoscaleIsEnabled]
        [-OptimizedAutoscaleMaximum <Int32>]
        [-OptimizedAutoscaleMinimum <Int32>]
        [-OptimizedAutoscaleVersion <Int32>]
        [-SkuCapacity <Int32>]
        [-SkuName <SkuName>]
        [-SkuSize <SkuSize>]
        [-Tag <Hashtable>]
        [-WorkspaceUid <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-Break]
        [-HttpPipelineAppend <SendAsyncStep[]>]
        [-HttpPipelinePrepend <SendAsyncStep[]>]
        [-NoWait]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-ProxyUseDefaultCredentials]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
