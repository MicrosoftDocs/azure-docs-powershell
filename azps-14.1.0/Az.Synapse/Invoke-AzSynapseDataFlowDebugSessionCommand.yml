        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InvokeByName
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzSynapseDataFlowDebugSessionCommand
        -WorkspaceObject <PSSynapseWorkspace>
        -SessionId <String>
        -Command <String>
        -StreamName <String>
        [-RowLimit <Int32>]
        [-Expression <String>]
