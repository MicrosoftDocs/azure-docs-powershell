syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzSynapseSqlAdvancedDataSecurity
        -WorkspaceName <String>
        [-ResourceGroupName <String>]
        [-DoNotConfigureVulnerabilityAssessment]
        [-DeploymentName <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnableByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Enable-AzSynapseSqlAdvancedDataSecurity
        -InputObject <PSSynapseWorkspace>
        [-DoNotConfigureVulnerabilityAssessment]
        [-DeploymentName <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnableByInputObjectParameterSet
  isDefault: false
- syntax: |-
