### YamlMime:PowerShellCmdlet1
uid: Az.DataLakeAnalytics.Test-AzDataLakeAnalyticsCatalogItem
name: Test-AzDataLakeAnalyticsCatalogItem
module: Az.DataLakeAnalytics
isPreview: false
summary: |-
  Checks for the existence of a catalog item.
description: |-
  The **Test-AzDataLakeAnalyticsCatalogItem** cmdlet checks for the existence of an Azure Data Lake Analytics catalog item.
parameters:
  cmdletParameters:
  - name: Account
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Data Lake Analytics account name.
    aliases:
    - AccountName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ItemType
    type: <xref href="Microsoft.Azure.Commands.DataLakeAnalytics.Models.DataLakeAnalyticsEnums+CatalogItemType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the catalog item type of the item to check.
      The acceptable values for this parameter are:
      - Database
      - Schema
      - Assembly
      - Table
      - TablePartition
      - TableValuedFunction
      - TableStatistics
      - ExternalDataSource
      - View
      - Procedure
      - Secret
      - Credential
      - Types
    acceptedValues:
    - Database
    - Schema
    - Assembly
    - Table
    - TablePartition
    - TableValuedFunction
    - TableStatistics
    - ExternalDataSource
    - View
    - Procedure
    - Secret
    - Credential
    - Types
    - Package
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="Microsoft.Azure.Commands.DataLakeAnalytics.Models.CatalogPathInstance" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to the item to fetch, or the path to the parent item of the items to list.
