syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataLakeAnalyticsCatalogCredential
        [-Account] <String>
        [-DatabaseName] <String>
        [-CredentialName] <String>
        [-Credential] <PSCredential>
        [-Uri] <Uri>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByHostNameAndPort
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDataLakeAnalyticsCatalogCredential
        [-Account] <String>
        [-DatabaseName] <String>
        [-CredentialName] <String>
        [-Credential] <PSCredential>
        [-DatabaseHost] <String>
        [-Port] <Int32>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
