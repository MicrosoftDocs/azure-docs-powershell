### YamlMime:PowerShellCmdlet1
uid: Az.Storage.New-AzStorageBlobInventoryPolicyRule
name: New-AzStorageBlobInventoryPolicyRule
module: Az.Storage
isPreview: false
summary: |-
  Creates a blob inventory policy rule object, which can be used in Set-AzStorageBlobInventoryPolicy.
description: |-
  The **New-AzStorageBlobInventoryPolicyRule** cmdlet creates a blob inventory policy rule object, which can be used in Set-AzStorageBlobInventoryPolicy.
parameters:
  cmdletParameters:
  - name: BlobSchemaField
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the fields and properties of the Blob object to be included in the inventory. Valid values include: Name, Creation-Time, Last-Modified, Content-Length, Content-MD5, BlobType, AccessTier, AccessTierChangeTime, Expiry-Time, hdi_isfolder, Owner, Group, Permissions, Acl, Metadata, LastAccessTime, AccessTierInferred, Tags.
      'Name' is a required schemafield. Schema field values 'Expiry-Time, hdi_isfolder, Owner, Group, Permissions, Acl' are valid only for HierarchicalNamespace enabled accounts.'Tags' field is only valid for non HierarchicalNamespace accounts.
      If specify '-IncludeSnapshot', will include 'Snapshot'  in the inventory.  If specify '-IncludeBlobVersion', will include 'VersionId, 'IsCurrentVersion' in the inventory.
    acceptedValues:
    - Name
    - Creation-Time
    - Last-Modified
    - Content-Length
    - Content-MD5
    - BlobType
    - AccessTier
    - AccessTierChangeTime
    - Expiry-Time
    - hdi_isfolder
    - Owner
    - Group
    - Permissions
    - Acl
    - Metadata
    - LastAccessTime
    - AccessTierInferred
    - Tags
    - Etag
    - Content-Type
    - Content-Encoding
    - Content-Language
    - Content-CRC64
    - Cache-Control
    - Content-Disposition
    - LeaseStatus
    - LeaseState
    - LeaseDuration
    - ServerEncrypted
    - Deleted
    - RemainingRetentionDays
    - ImmutabilityPolicyUntilDate
    - ImmutabilityPolicyMode
    - LegalHold
    - CopyId
    - CopyStatus
    - CopySource
    - CopyProgress
    - CopyCompletionTime
    - CopyStatusDescription
    - CustomerProvidedKeySha256
    - RehydratePriority
    - ArchiveStatus
    - x-ms-blob-sequence-number
    - EncryptionScope
    - IncrementalCopy
    - DeletionId
    - DeletedTime
    - TagCount
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BlobRuleParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BlobType
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Sets the blob types for the blob inventory policy rule.
      Valid values include blockBlob, appendBlob, pageBlob.
      Hns accounts does not support pageBlobs.
    acceptedValues:
    - blockBlob
    - pageBlob
    - appendBlob
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BlobRuleParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ContainerSchemaField
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the fields and properties of the container object to be included in the inventory. Valid values include: Name, Last-Modified, Metadata, LeaseStatus, LeaseState, LeaseDuration, PublicAccess, HasImmutabilityPolicy, HasLegalHold. 'Name' is a required schemafield.
    acceptedValues:
    - Name
    - Last-Modified
    - Metadata
    - LeaseStatus
    - LeaseState
    - LeaseDuration
    - PublicAccess
    - HasImmutabilityPolicy
    - HasLegalHold
    - Etag
    - DefaultEncryptionScope
    - DenyEncryptionScopeOverride
    - ImmutableStorageWithVersioningEnabled
    - Deleted
    - Version
    - DeletedTime
    - RemainingRetentionDays
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ContainerRuleParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CreationTimeLastNDay
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Filter the objects which has creation time in last N days. The valid value is between 1 to 36500. Inventory schema 'Creation-Time' is mandatory with this filter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BlobRuleParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Destination
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The container name where blob inventory files are stored. Must be pre-created.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Disabled
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      The rule is disabled if set it.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExcludePrefix
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Sets an array of strings with maximum 10 blob prefixes to be excluded from the inventory.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Format
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the format for the inventory files. Possible values include: 'Csv', 'Parquet'
    acceptedValues:
    - Csv
    - Parquet
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeBlobVersion
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      The rule is disabled if set it.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BlobRuleParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeDeleted
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Includes deleted blob in blob inventory. When include delete blob, for ContainerSchemaFields, must include 'Deleted, Version, DeletedTime and RemainingRetentionDays'. For BlobSchemaFields, on HNS enabled storage accounts, must include 'DeletionId, Deleted, DeletedTime and RemainingRetentionDays', and on Hns disabled accounts must include 'Deleted and RemainingRetentionDays', else they must be excluded.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BlobRuleParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeSnapshot
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      The rule is disabled if set it.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BlobRuleParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      A rule name can contain any combination of alpha numeric characters.
      Rule name is case-sensitive.
      It must be unique within a policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PrefixMatch
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Sets an array of strings for blob prefixes to be matched..
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Schedule
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      This field is used to schedule an inventory formation. Possible values include: 'Daily', 'Weekly'
    acceptedValues:
    - Daily
    - Weekly
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
