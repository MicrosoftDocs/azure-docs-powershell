syntaxes:
- syntax: |-
    ```Syntax
    Start-AzStorageBlobIncrementalCopy
        -CloudBlobContainer <CloudBlobContainer>
        -SrcBlob <String>
        -SrcBlobSnapshotTime <DateTimeOffset>
        -DestContainer <String>
        [-DestBlob <String>]
        [-Context <IStorageContext>]
        [-DestContext <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ContainerInstance
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzStorageBlobIncrementalCopy
        -CloudBlob <CloudPageBlob>
        -DestContainer <String>
        [-DestBlob <String>]
        [-Context <IStorageContext>]
        [-DestContext <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BlobInstance
  isDefault: false
- syntax: |-
    ```Syntax
    Start-AzStorageBlobIncrementalCopy
        -CloudBlob <CloudPageBlob>
        -DestCloudBlob <CloudPageBlob>
        [-Context <IStorageContext>]
        [-DestContext <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BlobInstanceToBlobInstance
  isDefault: false
- syntax: |-
    ```Syntax
    Start-AzStorageBlobIncrementalCopy
        -SrcBlob <String>
