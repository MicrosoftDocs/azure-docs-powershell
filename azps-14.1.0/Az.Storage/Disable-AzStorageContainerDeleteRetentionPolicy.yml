examples:
- title: 'Example 1: Disable delete retention policy for blob containers'
  description: |-
    ```powershell
    Disable-AzStorageContainerDeleteRetentionPolicy -ResourceGroupName "myresourcegroup" -AccountName "mystorageaccount" -PassThru
