syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStorageFileHandle
        [-ShareName] <String>
        [[-Path] <String>]
        [-Recursive]
        [-DisAllowTrailingDot]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-IncludeTotalCount]
        [-Skip <UInt64>]
        [-First <UInt64>]
        [<CommonParameters>]
    ```
  parameterSetName: ShareName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzStorageFileHandle
        [-ShareClient] <ShareClient>
        [[-Path] <String>]
        [-Recursive]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-IncludeTotalCount]
        [-Skip <UInt64>]
        [-First <UInt64>]
        [<CommonParameters>]
    ```
  parameterSetName: Share
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzStorageFileHandle
        [-ShareDirectoryClient] <ShareDirectoryClient>
        [[-Path] <String>]
        [-Recursive]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-IncludeTotalCount]
        [-Skip <UInt64>]
        [-First <UInt64>]
        [<CommonParameters>]
    ```
  parameterSetName: Directory
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzStorageFileHandle
        [-ShareFileClient <ShareFileClient>]
        [-Recursive]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-IncludeTotalCount]
        [-Skip <UInt64>]
        [-First <UInt64>]
        [<CommonParameters>]
    ```
  parameterSetName: File
  isDefault: false
