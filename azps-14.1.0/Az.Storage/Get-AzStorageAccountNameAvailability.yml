### YamlMime:PowerShellCmdlet1
uid: Az.Storage.Get-AzStorageAccountNameAvailability
name: Get-AzStorageAccountNameAvailability
module: Az.Storage
isPreview: false
summary: |-
  Checks the availability of a Storage account name.
description: |-
  The **Get-AzStorageAccountNameAvailability** cmdlet checks whether the name of an Azure Storage account is valid and available to use.
