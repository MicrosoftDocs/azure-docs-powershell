syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRmStorageContainer
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        [-Name <String>]
        [-IncludeDeleted]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AccountName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzRmStorageContainer
        -StorageAccount <PSStorageAccount>
        [-Name <String>]
        [-IncludeDeleted]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AccountObject
  isDefault: false
