### YamlMime:PowerShellCmdlet1
uid: Az.Storage.Get-AzStorageServiceProperty
name: Get-AzStorageServiceProperty
module: Az.Storage
isPreview: false
summary: |-
  Gets properties for Azure Storage services.
description: |-
  The **Get-AzStorageServiceProperty** cmdlet gets the properties for Azure Storage services.
parameters:
  cmdletParameters:
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure storage context.
      To obtain a storage context, use the New-AzStorageContext cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServiceType
    type: <xref href="Microsoft.WindowsAzure.Commands.Storage.Common.StorageServiceType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the storage service type.
      This cmdlet gets the logging properties for the service type that this parameter specifies.
      The acceptable values for this parameter are:
      - Blob
      - Table
      - Queue
      - File
    acceptedValues:
    - Blob
    - Table
    - Queue
    - File
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStorageServiceProperty
        [-ServiceType] <StorageServiceType>
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IStorageContext" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.Storage.Model.ResourceModel.PSSeriviceProperties" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get  Azure Storage services property of the Blob service'
  description: |-
    ```powershell
    Get-AzStorageServiceProperty -ServiceType Blob
    ```

    ```output
    Logging.Version                     : 1.0
    Logging.LoggingOperations           : None
    Logging.RetentionDays               :
    HourMetrics.Version                 : 1.0
    HourMetrics.MetricsLevel            : ServiceAndApi
    HourMetrics.RetentionDays           : 7
    MinuteMetrics.Version               : 1.0
    MinuteMetrics.MetricsLevel          : None
    MinuteMetrics.RetentionDays         :
    DeleteRetentionPolicy.Enabled       : True
    DeleteRetentionPolicy.RetentionDays : 70
    Cors                                :
    DefaultServiceVersion               : 2017-07-29
    ```

    This command gets DefaultServiceVersion property of the Blob service.
