syntaxes:
- syntax: |-
    ```Syntax
    Update-AzStorageFileServiceProperty
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        [-EnableShareDeleteRetentionPolicy <Boolean>]
        [-ShareRetentionDays <Int32>]
        [-EnableSmbMultichannel <Boolean>]
        [-SmbProtocolVersion <String[]>]
        [-SmbAuthenticationMethod <String[]>]
        [-SmbChannelEncryption <String[]>]
        [-SmbKerberosTicketEncryption <String[]>]
        [-CorsRule <PSCorsRule[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountName
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzStorageFileServiceProperty
        -StorageAccount <PSStorageAccount>
        [-EnableShareDeleteRetentionPolicy <Boolean>]
        [-ShareRetentionDays <Int32>]
        [-EnableSmbMultichannel <Boolean>]
        [-SmbProtocolVersion <String[]>]
        [-SmbAuthenticationMethod <String[]>]
        [-SmbChannelEncryption <String[]>]
        [-SmbKerberosTicketEncryption <String[]>]
        [-CorsRule <PSCorsRule[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountObject
  isDefault: false
- syntax: |-
    ```Syntax
    Update-AzStorageFileServiceProperty
        [-ResourceId] <String>
        [-EnableShareDeleteRetentionPolicy <Boolean>]
        [-ShareRetentionDays <Int32>]
        [-EnableSmbMultichannel <Boolean>]
        [-SmbProtocolVersion <String[]>]
        [-SmbAuthenticationMethod <String[]>]
        [-SmbChannelEncryption <String[]>]
        [-SmbKerberosTicketEncryption <String[]>]
        [-CorsRule <PSCorsRule[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FileServicePropertiesResourceId
  isDefault: false
inputs:
