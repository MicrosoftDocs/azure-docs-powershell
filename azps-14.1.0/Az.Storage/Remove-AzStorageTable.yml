syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzStorageTable
        [-Name] <String>
        [-Force]
        [-PassThru]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
