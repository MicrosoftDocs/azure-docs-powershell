### YamlMime:PowerShellCmdlet1
uid: Az.Storage.New-AzStorageBlobRangeToRestore
name: New-AzStorageBlobRangeToRestore
module: Az.Storage
isPreview: false
summary: |-
  Creates a Blob Range object to restores a Storage account.
description: |-
  The **New-AzStorageBlobRangeToRestore** cmdlet creates a Blob range object, which can be used in Restore-AzStorageBlobRange.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EndRange
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specify the blob restore End range.
      End range will be excluded in restore blobs.
      Set it as empty strng to restore to the end.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StartRange
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specify the blob restore start range.
      Start range will be included in restore blobs.
      Set it as empty string to restore from begining.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageBlobRangeToRestore
        [-StartRange <String>]
        [-EndRange <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Management.Storage.Models.PSBlobRestoreRange" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Creates a blob range to restore'
  description: |-
    ```powershell
    $range = New-AzStorageBlobRangeToRestore -StartRange container1/blob1 -EndRange container2/blob2
    ```

    This command creates a blob range to restore, which starts at container1/blob1 (include), and ends at container2/blob2 (exclude).
- title: 'Example 2: Creates a blob range which will restore from first blob in alphabetical order, to a specific blob (exclude)'
  description: |-
    ```powershell
    $range = New-AzStorageBlobRangeToRestore -StartRange "" -EndRange container2/blob2
    ```

    This command creates a blob range which will restore from first blob of alphabetical order, to a specific blob container2/blob2 (exclude)
- title: 'Example 3: Creates a blob range which will restore from a specific blob (include), to the last blob in alphabetical order'
  description: |-
    ```powershell
    $range = New-AzStorageBlobRangeToRestore -StartRange container1/blob1 -EndRange ""
    ```

    This command creates a blob range which will restore from a specific blob container1/blob1 (include), to the last blob in alphabetical order.
- title: 'Example 4: Creates a blob range which will restore all blobs'
  description: |-
    ```powershell
    $range = New-AzStorageBlobRangeToRestore -StartRange "" -EndRange ""
    ```

    This command creates a blob range which will restore all blobs.
