syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageAccountManagementPolicyFilter
        [-PrefixMatch <String[]>]
        [-BlobType <String[]>]
        [-BlobIndexMatch <PSTagFilter[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
