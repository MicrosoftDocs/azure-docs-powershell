syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzStorageContainerDeleteRetentionPolicy
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        -RetentionDays <Int32>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountName
  isDefault: true
- syntax: |-
    ```Syntax
    Enable-AzStorageContainerDeleteRetentionPolicy
        -StorageAccount <PSStorageAccount>
        -RetentionDays <Int32>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountObject
  isDefault: false
- syntax: |-
