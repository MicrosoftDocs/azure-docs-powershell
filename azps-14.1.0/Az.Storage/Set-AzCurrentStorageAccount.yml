### YamlMime:PowerShellCmdlet1
uid: Az.Storage.Set-AzCurrentStorageAccount
name: Set-AzCurrentStorageAccount
module: Az.Storage
isPreview: false
summary: |-
  Modifies the current Storage account of the specified subscription.
description: |-
  The **Set-AzCurrentStorageAccount** cmdlet modifies the current Azure Storage account of the specified Azure subscription in Azure PowerShell.
  The current Storage account is used as the default when you access Storage without specifying a Storage account name.
parameters:
  cmdletParameters:
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an **AzureStorageContext** object for the current Storage account.
      To obtain a storage context object, use the New-AzStorageContext cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UsingStorageContext
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Storage account that this cmdlet modifies.
    aliases:
    - StorageAccountName
    - AccountName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UsingResourceGroupAndNameParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the resource group that contains the Storage account to modify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UsingResourceGroupAndNameParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzCurrentStorageAccount
        -ResourceGroupName <String>
        -Name <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: UsingResourceGroupAndNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzCurrentStorageAccount
        -Context <IStorageContext>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: UsingStorageContext
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IStorageContext" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set the current Storage account'
  description: |-
    ```powershell
    Set-AzCurrentStorageAccount -ResourceGroupName "RG01" -Name "mystorageaccount"
    ```

    This command sets the default Storage account for the specified subscription.
