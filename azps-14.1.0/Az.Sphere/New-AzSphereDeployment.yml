syntaxes:
- syntax: |-
    ```Syntax
    New-AzSphereDeployment
        -CatalogName <String>
        -DeviceGroupName <String>
        -Name <String>
        -ProductName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DeployedImage <IImage[]>]
        [-DeploymentId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
