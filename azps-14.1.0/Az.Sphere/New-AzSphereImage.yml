syntaxes:
- syntax: |-
    ```Syntax
    New-AzSphereImage
        -CatalogName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Image <String>]
        [-ImageId <String>]
        [-RegionalDataBoundary <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
