        [-AllowCrashDumpsCollection <String>]
        [-Description <String>]
        [-OSFeedType <String>]
        [-RegionalDataBoundary <String>]
        [-UpdatePolicy <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
