    Update-AzWindowsIotServicesDevice
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-AdminDomainName <String>]
        [-BillingDomainName <String>]
        [-Etag <String>]
        [-Note <String>]
        [-Quantity <Int64>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
