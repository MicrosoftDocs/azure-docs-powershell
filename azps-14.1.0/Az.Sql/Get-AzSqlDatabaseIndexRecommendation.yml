syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlDatabaseIndexRecommendation
        -ServerName <String>
        [-DatabaseName <String>]
        [-TableName <String>]
        [-IndexRecommendationName <String>]
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
