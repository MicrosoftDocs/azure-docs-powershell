- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.DataSync.Model.AzureSqlSyncAgentModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all instances of Azure SQL Sync Agent assigned to an Azure SQL Server'
  description: |-
    ```powershell
    Get-AzSqlSyncAgent -ResourceGroupName "ResourceGroup01" -ServerName "Server01" | Format-List
    ```

    ```output
    ResourceId                  : subscriptions/{subscriptionId}/resourceGroups/{ResourceGroup01}/servers/{Server01}/syncAgents/{SyncAgent01}
    ResourceGroupName           : ResourceGroup01
    ServerName                  : Server01
    DatabaseName                : Database01
    SyncAgentName               : SyncAgent01
    SyncDatabaseId              : subscriptions/{subscriptionId}/resourceGroups/{syncDatabaseResourceGroup01}/servers/{syncDatabaseServer01}/databases/{syncDatabaseName01}
    LastAliveTime:              : 6/1/2017 5:08:48 AM
    Version                     : 4.3.6348.1
    IsUpToDate                  : False
    ExpiryTime                  :
    State                       : Online

    ResourceId                  : subscriptions/{subscriptionId}/resourceGroups/{ResourceGroup01}/servers/{Server01}/syncAgents/{SyncAgent02}
    ResourceGroupName           : ResourceGroup01
    ServerName                  : Server01
    DatabaseName                : Database01
    SyncAgentName               : SyncAgent02
    SyncDatabaseId              : subscriptions/{subscriptionId}/resourceGroups/{syncDatabaseResourceGroup01}/servers/{syncDatabaseServer01}/databases/{syncDatabaseName01}
    LastAliveTime:              : 6/1/2017 5:08:48 AM
    Version                     : 4.3.6348.1
    IsUpToDate                  : False
    ExpiryTime                  :
    State                       : Online
    ```

    This command gets information about all the Azure SQL Sync Agents assigned to an Azure SQL Server.
- title: 'Example 2: Get information about an Azure SQL Sync Agent'
  description: |-
    ```powershell
    Get-AzSqlSyncAgent -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -Name "SyncAgent01" | Format-List
    ```

    ```output
    ResourceId                  : subscriptions/{subscriptionId}/resourceGroups/{ResourceGroup01}/servers/{Server01}/syncAgents/{SyncAgent01}
    ResourceGroupName           : ResourceGroup01
    ServerName                  : Server01
    DatabaseName                : Database01
    SyncAgentName               : SyncAgent01
    SyncDatabaseId              : subscriptions/{subscriptionId}/resourceGroups/{syncDatabaseResourceGroup01}/servers/{syncDatabaseServer01}/databases/{syncDatabaseName01}
    LastAliveTime:              : 6/1/2017 5:08:48 AM
    Version                     : 4.3.6348.1
    IsUpToDate                  : False
    ExpiryTime                  :
    State                       : Online
    ```

    This command gets information about the Azure SQL Database Sync Agent with name "SyncAgent01"
- title: 'Example 3: Get all instances of Azure SQL Sync Agent assigned to an Azure SQL Server using filtering'
  description: |-
    ```powershell
    Get-AzSqlSyncAgent -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -Name SyncAgent* | Format-List
    ```

    ```output
    ResourceId                  : subscriptions/{subscriptionId}/resourceGroups/{ResourceGroup01}/servers/{Server01}/syncAgents/{SyncAgent01}
    ResourceGroupName           : ResourceGroup01
    ServerName                  : Server01
    DatabaseName                : Database01
    SyncAgentName               : SyncAgent01
    SyncDatabaseId              : subscriptions/{subscriptionId}/resourceGroups/{syncDatabaseResourceGroup01}/servers/{syncDatabaseServer01}/databases/{syncDatabaseName01}
    LastAliveTime:              : 6/1/2017 5:08:48 AM
    Version                     : 4.3.6348.1
    IsUpToDate                  : False
    ExpiryTime                  :
    State                       : Online

    ResourceId                  : subscriptions/{subscriptionId}/resourceGroups/{ResourceGroup01}/servers/{Server01}/syncAgents/{SyncAgent02}
    ResourceGroupName           : ResourceGroup01
    ServerName                  : Server01
    DatabaseName                : Database01
    SyncAgentName               : SyncAgent02
    SyncDatabaseId              : subscriptions/{subscriptionId}/resourceGroups/{syncDatabaseResourceGroup01}/servers/{syncDatabaseServer01}/databases/{syncDatabaseName01}
    LastAliveTime:              : 6/1/2017 5:08:48 AM
    Version                     : 4.3.6348.1
    IsUpToDate                  : False
    ExpiryTime                  :
    State                       : Online
    ```

    This command gets information about all the Azure SQL Sync Agents assigned to an Azure SQL Server that start with "SyncAgent".
