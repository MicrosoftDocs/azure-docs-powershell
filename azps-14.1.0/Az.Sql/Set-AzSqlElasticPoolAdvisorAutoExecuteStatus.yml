syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlElasticPoolAdvisorAutoExecuteStatus
        -AdvisorName <String>
        -AutoExecuteStatus <AdvisorAutoExecuteStatus>
        -ServerName <String>
        -ElasticPoolName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
