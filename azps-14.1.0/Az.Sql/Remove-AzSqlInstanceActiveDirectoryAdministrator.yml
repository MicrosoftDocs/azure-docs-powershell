syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzSqlInstanceActiveDirectoryAdministrator
        [-ResourceGroupName] <String>
        [-InstanceName] <String>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
