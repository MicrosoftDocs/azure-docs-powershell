    Get-AzSqlDatabaseImportExportStatus
        [-OperationStatusLink] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
