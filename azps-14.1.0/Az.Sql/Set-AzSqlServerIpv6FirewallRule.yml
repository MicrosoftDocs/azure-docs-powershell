syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlServerIpv6FirewallRule
        [-Ipv6FirewallRuleName] <String>
        -StartIpv6Address <String>
        -EndIpv6Address <String>
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
