syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlDatabase
        [[-DatabaseName] <String>]
        [-ExpandKeyList]
        [-KeysFilter <String>]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
