### YamlMime:PowerShellCmdlet1
uid: Az.Sql.Get-AzSqlInstanceDatabaseBackupShortTermRetentionPolicy
name: Get-AzSqlInstanceDatabaseBackupShortTermRetentionPolicy
module: Az.Sql
isPreview: false
summary: |-
  Gets a backup short term retention policy.
description: |-
  The **Get-AzSqlInstanceDatabaseBackupShortTermRetentionPolicy** cmdlet gets the short term retention policy registered to this database.
  The policy is the retention period, in days, for point-in-time restore backups.
parameters:
  cmdletParameters:
  - name: DatabaseName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the Azure SQL Instance Database to retrieve backups for.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PolicyByResourceInstanceDatabaseSet
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DeletionDate
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.DateTime" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      The deletion date of the Azure SQL Instance Database to retrieve backups for, with millisecond precision (e.g.
      2016-02-23T00:21:22.847Z)
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PolicyByResourceInstanceDatabaseSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="Microsoft.Azure.Commands.Sql.ManagedDatabase.Model.AzureSqlManagedDatabaseBaseModel" data-throw-if-not-resolved="False" />
    description: |-
      The live or deleted database object to get/set the policy for.
    aliases:
    - AzureSqlInstanceDatabase
    - AzureInstanceDatabaseObject
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PolicyByInputObjectSet
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InstanceName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the Azure SQL Managed Instance the database is in.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PolicyByResourceInstanceDatabaseSet
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the resource group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PolicyByResourceInstanceDatabaseSet
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The short term retention policy resource Id.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PolicyByResourceIdSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlInstanceDatabaseBackupShortTermRetentionPolicy
        [-ResourceGroupName] <String>
        [-InstanceName] <String>
        [-DatabaseName] <String>
        [-DeletionDate <DateTime>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: PolicyByResourceInstanceDatabaseSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSqlInstanceDatabaseBackupShortTermRetentionPolicy
        -InputObject <AzureSqlManagedDatabaseBaseModel>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: PolicyByInputObjectSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzSqlInstanceDatabaseBackupShortTermRetentionPolicy
        -ResourceId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: PolicyByResourceIdSet
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.ManagedDatabase.Model.AzureSqlManagedDatabaseBaseModel" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.ManagedDatabaseBackup.Model.AzureSqlManagedDatabaseBackupShortTermRetentionPolicyModel" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzSqlInstanceDatabaseBackupShortTermRetentionPolicy -ResourceGroupName resourcegroup01 -InstanceName instance01 -DatabaseName database01
    ```

    ```output
    ResourceGroupName : resourcegroup01
    InstanceName      : instance01
    DatabaseName      : database01
    DeletionDate      :
    RetentionDays     : 7
    ```

    This command gets the short term retention policy for database01.
- title: Example 2
  description: |-
    ```powershell
    Get-AzSqlInstanceDatabase -ResourceGroupName resourcegroup01 -InstanceName instance01 -Name database01 | Get-AzSqlInstanceDatabaseBackupShortTermRetentionPolicy
    ```

    ```output
    ResourceGroupName : resourcegroup01
    InstanceName      : instance01
    DatabaseName      : database01
    DeletionDate      :
    RetentionDays     : 7
    ```

    This command gets the short term retention policy for database01 via piping in a database object.
- title: Example 3
  description: |-
    ```powershell
    Get-AzSqlDeletedInstanceDatabaseBackup -ResourceGroupName "ContosoResourceGroup" -InstanceName "ContosoServer" -DatabaseName "DB1" | Get-AzSqlInstanceDatabaseBackupShortTermRetentionPolicy
    ```

    ```output
    ResourceGroupName : resourcegroup01
    InstanceName      : instance01
    DatabaseName      : database01
    DeletionDate      : 2019-03-03 12:00:17 AM
    RetentionDays     : 7

    ResourceGroupName : resourcegroup01
    InstanceName      : instance01
    DatabaseName      : database01
    DeletionDate      : 2019-03-02 11:00:16 PM
    RetentionDays     : 7
    ```

    This command gets the short term retention policy for all deleted databases named database01 via piping in a deleted database object.
