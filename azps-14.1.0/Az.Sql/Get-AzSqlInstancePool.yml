### YamlMime:PowerShellCmdlet1
uid: Az.Sql.Get-AzSqlInstancePool
name: Get-AzSqlInstancePool
module: Az.Sql
isPreview: false
summary: |-
  Returns information about the Azure SQL Instance pool.
description: |-
  The **Get-AzSqlInstancePool** cmdlet returns information about one or more Azure SQL Instance pool.
  Specify the name of an instance pool to see information for only that instance pool.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The instance pool name.
    aliases:
    - InstancePoolName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListByInstancePoolDefaultsParameterSet
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The resource group name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListBySubOrResourceGroupParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The instance pool resource identifier.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetInstancePoolByInstancePoolResourceIdentifierParameterSet
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlInstancePool
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListBySubOrResourceGroupParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSqlInstancePool
        [-Name] <String>
        -ResourceGroupName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListByInstancePoolDefaultsParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzSqlInstancePool
        [-ResourceId] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetInstancePoolByInstancePoolResourceIdentifierParameterSet
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.Instance_Pools.Model.AzureSqlInstancePoolModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all instance pools across a customer subscription'
  description: |-
    ```powershell
    Get-AzSqlInstancePool
    ```

    ```output
    ResourceGroupName          : resourcegroup01
    Type                       : Microsoft.Sql/instancePools
    Id                         : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancePool0
    InstancePoolName           : instancePool0
    SubnetId                   : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Network/virtualNetworks/vnet_name/subnets/subnet_name
    VCores                     : 8
    ComputeGeneration          : Gen5
    Edition                    : GeneralPurpose
    Tags                       :
    Sku                        : Microsoft.Azure.Management.Sql.Models.Sku
    Location                   : canadacentral
    LicenseType                : LicenseIncluded
    MaintenanceConfigurationId : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/providers/Microsoft.Maintenance/publicMaintenanceConfigurations/SQL_canadacentral_MI_1

    ResourceGroupName          : resourcegroup02
    Type                       : Microsoft.Sql/instancePools
    Id                         : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup02/providers/Microsoft.Sql/instancePools/ps-instancepool-1
    InstancePoolName           : instancePool0
    SubnetId                   : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup02/providers/Microsoft.Network/virtualNetworks/vnet_name/subnets/subnet_name
    VCores                     : 8
    ComputeGeneration          : Gen5
    Edition                    : GeneralPurpose
    Tags                       :
    Sku                        : Microsoft.Azure.Management.Sql.Models.Sku
    Location                   : canadacentral
    LicenseType                : LicenseIncluded
    MaintenanceConfigurationId : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/providers/Microsoft.Maintenance/publicMaintenanceConfigurations/SQL_canadacentral_MI_1
    ```

    This command gets information about all instance pools within the customer subscription.
- title: 'Example 2: Get all instance pools across a resource group'
  description: |-
    ```powershell
    Get-AzSqlInstancePool -ResourceGroupName resourcegroup01
    ```

    ```output
    ResourceGroupName          : resourcegroup01
    Type                       : Microsoft.Sql/instancePools
    Id                         : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancePool0
    InstancePoolName           : instancePool0
    SubnetId                   : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Network/virtualNetworks/vnet_name/subnets/subnet_name
    VCores                     : 8
    ComputeGeneration          : Gen5
    Edition                    : GeneralPurpose
    Tags                       :
    Sku                        : Microsoft.Azure.Management.Sql.Models.Sku
    Location                   : canadacentral
    LicenseType                : LicenseIncluded
    DnsZone                    : 1234567890
    MaintenanceConfigurationId : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/providers/Microsoft.Maintenance/publicMaintenanceConfigurations/SQL_canadacentral_MI_1
    ```

    This command gets information about all instance pools within the resource group resourcegroup01.
- title: 'Example 3: Get information about an instance pool'
  description: |-
    ```powershell
    Get-AzSqlInstancePool -ResourceGroupName resourcegroup01 -Name instancePool0
    ```

    ```output
    ResourceGroupName          : resourcegroup01
    Type                       : Microsoft.Sql/instancePools
    Id                         : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancePool0
    InstancePoolName           : instancePool0
    SubnetId                   : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Network/virtualNetworks/vnet_name/subnets/subnet_name
    VCores                     : 8
    ComputeGeneration          : Gen5
    Edition                    : GeneralPurpose
    Tags                       :
    Sku                        : Microsoft.Azure.Management.Sql.Models.Sku
    Location                   : canadacentral
    LicenseType                : LicenseIncluded
    DnsZone                    : 1234567890
    MaintenanceConfigurationId : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/providers/Microsoft.Maintenance/publicMaintenanceConfigurations/SQL_canadacentral_MI_1
    ```

    This command gets information about the instance pool instancePool0.
- title: 'Example 4: Get information about an instance pool using instance pool resource id'
  description: |-
    ```powershell
    Get-AzSqlInstancePool -ResourceId "/subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancePool0"
    ```

    ```output
    ResourceGroupName          : resourcegroup01
    Type                       : Microsoft.Sql/instancePools
    Id                         : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancePool0
    InstancePoolName           : instancePool0
    SubnetId                   : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Network/virtualNetworks/vnet_name/subnets/subnet_name
    VCores                     : 8
    ComputeGeneration          : Gen5
    Edition                    : GeneralPurpose
    Tags                       :
    Sku                        : Microsoft.Azure.Management.Sql.Models.Sku
    Location                   : canadacentral
    LicenseType                : LicenseIncluded
    DnsZone                    : 1234567890
    MaintenanceConfigurationId : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/providers/Microsoft.Maintenance/publicMaintenanceConfigurations/SQL_canadacentral_MI_1
    ```

    This command gets information about the instance pool with its resource identifier.
