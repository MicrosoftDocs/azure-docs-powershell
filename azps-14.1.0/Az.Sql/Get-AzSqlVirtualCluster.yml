  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the virtual cluster.
    aliases:
    - VirtualClusterName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetVirtualClusterByNameAndResourceGroup
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the resource group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetVirtualClusterByResourceGroup
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The resource id of instance object to get
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetVirtualClusterByResourceId
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlVirtualCluster
        [[-ResourceGroupName] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetVirtualClusterByResourceGroup
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSqlVirtualCluster
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetVirtualClusterByNameAndResourceGroup
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzSqlVirtualCluster
        [-ResourceId] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetVirtualClusterByResourceId
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.VirtualCluster.Model.AzureSqlVirtualClusterModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all virtual clusters assigned to a resource group'
  description: |-
    ```powershell
    Get-AzSqlVirtualCluster -ResourceGroupName ResourceGroup01
    ```

    ```output
    Location           : eastus
    Id                 : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup01/providers/Microsoft.Sql/virtualClusters/VirtualCluster1
    ResourceGroupName  : ResourceGroup01
    VirtualClusterName : VirtualCluster1
    Tags               :
    SubnetId           : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup01/providers/Microsoft.Network/virtualNetworks/vnet_name/subnets/subnet_name1

    Location           : eastus
    Id                 : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup01/providers/Microsoft.Sql/virtualClusters/VirtualCluster2
    ResourceGroupName  : ResourceGroup01
    VirtualClusterName : VirtualCluster2
    Tags               :
    SubnetId           : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup01/providers/Microsoft.Network/virtualNetworks/vnet_name/subnets/subnet_name2

    Location           : eastus
    Id                 : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup01/providers/Microsoft.Sql/virtualClusters/VirtualCluster3
    ResourceGroupName  : ResourceGroup01
    VirtualClusterName : VirtualCluster3
    Tags               :
    SubnetId           : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup01/providers/Microsoft.Network/virtualNetworks/vnet_name/subnets/subnet_name3
    ```

    This command gets information about all Virtual Clusters assigned to the resource group ResourceGroup01.
- title: 'Example 2: Get information about specific virtual cluster'
  description: |-
    ```powershell
    Get-AzSqlVirtualCluster -Name VirtualCluster1 -ResourceGroupName ResourceGroup01
    ```

    ```output
    Location           : eastus
    Id                 : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup01/providers/Microsoft.Sql/virtualClusters/VirtualCluster1
    ResourceGroupName  : ResourceGroup01
    VirtualClusterName : VirtualCluster1
    Tags               :
    SubnetId           : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup01/providers/Microsoft.Network/virtualNetworks/vnet_name/subnets/subnet_name1
    ```

    This command gets information about the virtual cluster VirtualCluster1 in resource group ResourceGroup01.
