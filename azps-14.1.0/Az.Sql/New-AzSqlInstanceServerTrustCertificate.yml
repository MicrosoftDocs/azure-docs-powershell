examples:
- title: 'Example 1: Create a new server trust certificate'
  description: |-
    ```powershell
    $publicKey = ""
    New-AzSqlInstanceServerTrustCertificate -ResourceGroupName "ResourceGroup01" -InstanceName "ManagedInstance01" -Name "Certificate01" -PublicKey $publicKey
    ```

    ```output
    ResourceGroupName : ResourceGroup01
    InstanceName      : ManagedInstance01
    Id                : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup01/providers/Microsoft.Sql/managedInstances/ManagedInstance01/serverTrustCertificates/Certificate01
    Type              : Microsoft.Sql/managedInstances/serverTrustCertificates
    Name              : Certificate01
    Thumbprint        : 0x7D989DF34BD0FD0D2F9F6B3B6A7096856F5AB004
    PublicKey         : 
    ```

    This command creates a server trust certificate with given name and public key.
- title: 'Example 2: Create a new server trust certificate on a managed instance using an instance object'
  description: |-
    ```powershell
    $publicKey = ""
    $instance = Get-AzSqlInstance -ResourceGroupName "ResourceGroup01" -Name "ManagedInstance01"
    New-AzSqlInstanceServerTrustCertificate -InstanceObject $instance -Name "Certificate01" -PublicKey $publicKey
    ```

    ```output
    ResourceGroupName : ResourceGroup01
    InstanceName      : ManagedInstance01
    Id                : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup01/providers/Microsoft.Sql/managedInstances/ManagedInstance01/serverTrustCertificates/Certificate01
    Type              : Microsoft.Sql/managedInstances/serverTrustCertificates
    Name              : Certificate01
    Thumbprint        : 0x7D989DF34BD0FD0D2F9F6B3B6A7096856F5AB004
    PublicKey         : 
    ```

    This command creates a server trust certificate using a parent instance object.
- title: 'Example 3: Create a new server trust certificate by piping an instance object'
  description: |-
    ```powershell
    $instance = Get-AzSqlInstance -ResourceGroupName "ResourceGroup01" -Name "ManagedInstance01"
    $publicKey = ""
    $instance | New-AzSqlInstanceServerTrustCertificate -Name "Certificate01" -PublicKey $publicKey
    ```

    ```output
    ResourceGroupName : ResourceGroup01
    InstanceName      : ManagedInstance01
    Id                : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/ResourceGroup01/providers/Microsoft.Sql/managedInstances/ManagedInstance01/serverTrustCertificates/Certificate01
    Type              : Microsoft.Sql/managedInstances/serverTrustCertificates
    Name              : Certificate01
    Thumbprint        : 0x7D989DF34BD0FD0D2F9F6B3B6A7096856F5AB004
    PublicKey         : 
    ```

    This command creates a server trust certificate by piping a parent instance object.
