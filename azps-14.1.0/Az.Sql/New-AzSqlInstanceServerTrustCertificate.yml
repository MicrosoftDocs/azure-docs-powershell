uid: Az.Sql.New-AzSqlInstanceServerTrustCertificate
name: New-AzSqlInstanceServerTrustCertificate
module: Az.Sql
isPreview: false
summary: |-
  Creates a new server trust certificate.
description: |-
  **New-AzSqlInstanceServerTrustCertificate** cmdlet creates a server trust certificate on an Azure SQL Managed Instance.
