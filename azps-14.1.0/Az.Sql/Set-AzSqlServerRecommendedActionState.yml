syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlServerRecommendedActionState
        -RecommendedActionName <String>
        -State <RecommendedActionState>
        -ServerName <String>
        -AdvisorName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
