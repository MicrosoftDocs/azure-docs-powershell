syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlElasticPoolDatabase
        [-ElasticPoolName] <String>
        [-DatabaseName <String>]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
