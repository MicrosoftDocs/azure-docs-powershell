### YamlMime:PowerShellCmdlet1
uid: Az.Sql.Get-AzSqlElasticPool
name: Get-AzSqlElasticPool
module: Az.Sql
isPreview: false
summary: |-
  Gets elastic pools and their property values in an Azure SQL Database.
description: |-
  The **Get-AzSqlElasticPool** cmdlet gets elastic pools and their property values.
  Specify the name of an existing elastic pool to see the property values for only that pool.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ElasticPoolName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the elastic pool that this cmdlet gets.
    aliases:
    - Name
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: true
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the resource group that contains the elastic pool that this cmdlet gets.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the server that contains the elastic pool that this cmdlet gets.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlElasticPool
        [[-ElasticPoolName] <String>]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.ElasticPool.Model.AzureSqlElasticPoolModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all elastic pools'
  description: |-
    ```powershell
    Get-AzSqlElasticPool -ResourceGroupName "ResourceGroup01" -ServerName "Server01"
    ```

    ```output
    ResourceId        : /subscriptions/00000000-0000-0000-0000-000000000001/resourceGroups/resourcegroup01/providers/Microsoft.Sql/servers/server01/elasticPools/elasticpool01
    ResourceGroupName : resourcegroup01
    ServerName        : server01
    ElasticPoolName   : elasticpool01
    Location          : Central US
    CreationDate      : 8/26/2015 10:00:17 PM
    State             : Ready
    Edition           : Standard
    Dtu               : 400
    DatabaseDtuMax    : 100
    DatabaseDtuMin    : 10
    StorageMB         : 409600
    Tags              :

    ResourceId        : /subscriptions/00000000-0000-0000-0000-000000000001/resourceGroups/resourcegroup01/providers/Microsoft.Sql/servers/server01/elasticPools/elasticpool02
    ResourceGroupName : resourcegroup01
    ServerName        : server01
    ElasticPoolName   : elasticpool02
    Location          : Central US
    CreationDate      : 8/26/2015 11:00:17 PM
    State             : Ready
    Edition           : Standard
    Dtu               : 400
    DatabaseDtuMax    : 100
    DatabaseDtuMin    : 10
    StorageMB         : 409600
    Tags              :
    ```

    This command gets all of the elastic pools on the server named Server01.
- title: 'Example 2: Get a specific elastic pool'
  description: |-
    ```powershell
    Get-AzSqlElasticPool -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -ElasticPoolName "ElasticPool27"
    ```

    ```output
    ResourceId        : /subscriptions/00000000-0000-0000-0000-000000000001/resourceGroups/resourcegroup01/providers/Microsoft.Sql/servers/server01/elasticPools/elasticpool01
    ResourceGroupName : resourcegroup01
    ServerName        : server01
    ElasticPoolName   : elasticpool01
    Location          : Central US
    CreationDate      : 8/26/2015 10:00:17 PM
    State             : Ready
    Edition           : Standard
    Dtu               : 400
    DatabaseDtuMax    : 100
    DatabaseDtuMin    : 10
    StorageMB         : 409600
    Tags              :
    ```

    This command gets the elastic pool named ElasticPool0127 on the server named Server01.
- title: 'Example 3: Get metrics for a Azure SQL Elastic Database Pool'
