syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlServerFirewallRule
        [[-FirewallRuleName] <String>]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
