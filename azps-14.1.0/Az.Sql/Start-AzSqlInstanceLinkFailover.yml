syntaxes:
- syntax: |-
    ```Syntax
    Start-AzSqlInstanceLinkFailover
        [-ResourceGroupName] <String>
        [-InstanceName] <String>
        [-Name] <String>
        -FailoverType <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
