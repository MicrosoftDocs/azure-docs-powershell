examples:
- title: 'Example 1: Set existing instance using new values for -AdministratorPassword, -LicenseType, -StorageSizeInGB, -VCore and -Edition'
  description: |-
    ```powershell
    $SecureString = ConvertTo-SecureString -String "****" -AsPlainText -Force
    Set-AzSqlInstance -Name "managedinstance1" -ResourceGroupName "ResourceGroup01" -AdministratorPassword $SecureString -LicenseType LicenseIncluded -StorageSizeInGB 1024 -VCore 16 -Edition BusinessCritical
    ```

    ```output
    Location                 : westcentralus
    Id                       : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/managedInstances/managedInstance1
    ResourceGroupName        : resourcegroup01
    ManagedInstanceName      : managedInstance1
    Tags                     :
    Identity                 : Microsoft.Azure.Management.Sql.Models.ResourceIdentity
    Sku                      : Microsoft.Azure.Management.Internal.Resources.Models.Sku
    IsGeneralPurposeV2       :
    FullyQualifiedDomainName : managedInstance1.wcusxxxxxxxxxxxxx.database.windows.net
    AdministratorLogin       : adminLogin1
    AdministratorPassword    :
    SubnetId                 : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Network/virtualNetworks/vnet_name/subnets/subnet_name
    LicenseType              : LicenseIncluded
    VCores                   : 16
    StorageSizeInGB          : 1024
    StorageIOps              :
    InstancePoolName         :
    ```
- title: 'Example 2: Change existing instance hardware generation using new value for -ComputeGeneration'
  description: |-
    ```powershell
    Set-AzSqlInstance -Name "managedinstance1" -ResourceGroupName "ResourceGroup01" -ComputeGeneration Gen5
    ```

    ```output
    Location                 : westcentralus
    Id                       : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/managedInstances/managedInstance1
    ResourceGroupName        : resourcegroup01
    ManagedInstanceName      : managedInstance1
    Tags                     :
    Identity                 : Microsoft.Azure.Management.Sql.Models.ResourceIdentity
    Sku                      : Microsoft.Azure.Management.Internal.Resources.Models.Sku
    IsGeneralPurposeV2       :
    FullyQualifiedDomainName : managedInstance1.wcusxxxxxxxxxxxxx.database.windows.net
    AdministratorLogin       : adminLogin1
    AdministratorPassword    :
    SubnetId                 : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Network/virtualNetworks/vnet_name/subnets/subnet_name
    LicenseType              : LicenseIncluded
    VCores                   : 16
    StorageSizeInGB          : 1024
    StorageIOps              :
    InstancePoolName         :
    ```

    This command sets existing instance using new values for -AdministratorPassword, -LicenseType, -StorageSizeInGB and -VCore
- title: 'Example 3: Change existing instance to GPv2 by setting new values for -Edition, -ComputeGeneration, -IsGeneralPurposeV2. Also set new values for -VCore, StorageSizeInGB, StorageIOps'
  description: |-
    ```powershell
