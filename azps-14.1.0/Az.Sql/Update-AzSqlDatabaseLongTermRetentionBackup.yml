syntaxes:
- syntax: |-
    ```Syntax
    Update-AzSqlDatabaseLongTermRetentionBackup
        [-Location] <String>
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-BackupName] <String>
        [-ResourceGroupName <String>]
        [-BackupStorageRedundancy <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateBackupDefault
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzSqlDatabaseLongTermRetentionBackup
        [-ResourceId] <String>
        [-BackupStorageRedundancy <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateBackupByResourceId
  isDefault: false
- syntax: |-
