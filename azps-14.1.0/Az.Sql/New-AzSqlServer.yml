### YamlMime:PowerShellCmdlet1
uid: Az.Sql.New-AzSqlServer
name: New-AzSqlServer
module: Az.Sql
isPreview: false
summary: |-
  Creates a SQL Database server.
description: |-
  The **New-AzSqlServer** cmdlet creates an Azure SQL Database server.
