syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzSqlDatabaseRestorePoint
        -RestorePointCreationDate <DateTime>
        [-PassThru]
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
