syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlInstanceDatabaseBackupLongTermRetentionPolicy
        [-InstanceName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        -WeeklyRetention <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
