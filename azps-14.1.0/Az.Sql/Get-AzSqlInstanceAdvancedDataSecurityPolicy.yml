uid: Az.Sql.Get-AzSqlInstanceAdvancedDataSecurityPolicy
name: Get-AzSqlInstanceAdvancedDataSecurityPolicy
module: Az.Sql
isPreview: false
summary: |-
  Gets Advanced Data Security policy of a managed instance.
description: |-
  The **Get-AzSqlInstanceAdvancedDataSecurityPolicy** cmdlet retrieves the Advanced Data Security policy of a managed instance.
