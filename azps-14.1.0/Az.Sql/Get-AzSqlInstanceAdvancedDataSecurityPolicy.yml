- syntax: |-
    ```Syntax
    Get-AzSqlInstanceAdvancedDataSecurityPolicy
        [-InputObject <AzureSqlManagedInstanceModel>]
        -InstanceName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
