    Switch-AzSqlDatabaseFailoverGroup
        [-ServerName] <String>
        [[-FailoverGroupName] <String>]
        [-AllowDataLoss]
        [-TryPlannedBeforeForcedFailover]
        [-AsJob]
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
