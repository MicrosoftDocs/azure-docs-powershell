syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlServerAdvancedThreatProtectionSetting
        -ServerName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
