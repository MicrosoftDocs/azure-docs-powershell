uid: Az.Sql.Get-AzSqlServerDnsAlias
name: Get-AzSqlServerDnsAlias
module: Az.Sql
isPreview: false
summary: |-
  Gets or lists Azure SQL Server DNS Alias.
description: |-
  Get the specific Azure SQL Server DNS Alias or lists all Server DNS Aliases for the server
