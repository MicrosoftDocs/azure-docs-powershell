syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlServerFirewallRule
        [-FirewallRuleName] <String>
        -StartIpAddress <String>
        -EndIpAddress <String>
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
