        [-SubscriptionId <String>]
        [-EnableSystemAssignedIdentity <Boolean>]
        [-MarketplaceSubscriptionId <String>]
        [-OfferDetailOfferId <String>]
        [-OfferDetailPlanId <String>]
        [-OfferDetailPlanName <String>]
        [-OfferDetailPublisherId <String>]
        [-OfferDetailTermId <String>]
        [-OfferDetailTermUnit <String>]
        [-PartnerPropertyLicensesSubscribed <Int32>]
        [-SingleSignOnPropertyAadDomain <String[]>]
        [-SingleSignOnPropertyEnterpriseAppId <String>]
        [-SingleSignOnPropertyState <String>]
        [-SingleSignOnPropertyType <String>]
        [-SingleSignOnPropertyUrl <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-UserEmailAddress <String>]
        [-UserFirstName <String>]
        [-UserLastName <String>]
        [-UserPhoneNumber <String>]
        [-UserUpn <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
