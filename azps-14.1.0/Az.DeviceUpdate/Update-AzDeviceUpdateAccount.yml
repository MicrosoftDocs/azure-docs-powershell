syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDeviceUpdateAccount
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-EnableSystemAssignedIdentity <Boolean>]
        [-PrivateEndpointConnection <IPrivateEndpointConnection[]>]
        [-PublicNetworkAccess <String>]
        [-Sku <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDeviceUpdateAccount
        -InputObject <IDeviceUpdateIdentity>
        [-EnableSystemAssignedIdentity <Boolean>]
        [-PrivateEndpointConnection <IPrivateEndpointConnection[]>]
        [-PublicNetworkAccess <String>]
        [-Sku <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
