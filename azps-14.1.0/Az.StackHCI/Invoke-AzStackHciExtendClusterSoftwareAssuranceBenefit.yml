syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzStackHciExtendClusterSoftwareAssuranceBenefit
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-SoftwareAssuranceIntent <SoftwareAssuranceIntent>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ExtendExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzStackHciExtendClusterSoftwareAssuranceBenefit
        -ClusterName <String>
        -ResourceGroupName <String>
        -SoftwareAssuranceChangeRequest <ISoftwareAssuranceChangeRequest>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Extend
  isDefault: false
- syntax: |-
    ```Syntax
    Invoke-AzStackHciExtendClusterSoftwareAssuranceBenefit
        -InputObject <IStackHciIdentity>
        [-SoftwareAssuranceIntent <SoftwareAssuranceIntent>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ExtendViaIdentityExpanded
  isDefault: false
- syntax: |-
