syntaxes:
- syntax: |-
    ```Syntax
    Save-AzDeploymentScriptLog
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-OutputPath] <String>
        [[-Tail] <Int32>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SaveDeploymentScriptLogByName
  isDefault: true
- syntax: |-
    ```Syntax
    Save-AzDeploymentScriptLog
        [-DeploymentScriptResourceId] <String>
        [-OutputPath] <String>
        [[-Tail] <Int32>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SaveDeploymentScriptLogByResourceId
  isDefault: false
- syntax: |-
    ```Syntax
    Save-AzDeploymentScriptLog
        [-DeploymentScriptObject] <PsDeploymentScript>
        [-OutputPath] <String>
        [[-Tail] <Int32>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
