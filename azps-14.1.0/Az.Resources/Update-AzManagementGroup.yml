uid: Az.Resources.Update-AzManagementGroup
name: Update-AzManagementGroup
module: Az.Resources
isPreview: false
summary: |-
  Updates a Management Group
description: |-
  The **Update-AzManagementGroup** cmdlet updates the **ParentId** or **DisplayName** for a Management Group.
