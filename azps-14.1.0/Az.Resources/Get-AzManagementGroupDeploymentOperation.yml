syntaxes:
- syntax: |-
    ```Syntax
    Get-AzManagementGroupDeploymentOperation
        -ManagementGroupId <String>
        -DeploymentName <String>
        [-OperationId <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByDeploymentName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzManagementGroupDeploymentOperation
        -DeploymentObject <PSDeployment>
