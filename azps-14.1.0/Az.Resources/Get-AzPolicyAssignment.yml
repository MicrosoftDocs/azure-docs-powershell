    ```Syntax
    Get-AzPolicyAssignment
        [-BackwardCompatible]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzPolicyAssignment
        -Name <String>
        [-Scope <String>]
        [-BackwardCompatible]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: false
- syntax: |-
