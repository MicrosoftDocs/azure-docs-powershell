    Get-AzPolicyAssignment
        -Scope <String>
        [-BackwardCompatible]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Scope
  isDefault: false
- syntax: |-
    ```Syntax
