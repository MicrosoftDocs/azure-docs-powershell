syntaxes:
- syntax: |-
    ```Syntax
    Publish-AzBicepModule
        -FilePath <String>
        -Target <String>
        [-DocumentationUri <String>]
        [-WithSource]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
