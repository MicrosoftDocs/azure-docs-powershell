syntaxes:
- syntax: |-
    ```Syntax
    Export-AzTemplateSpec
        [-ResourceGroupName] <String>
        [-Name] <String>
        -Version <String>
        -OutputFolder <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ExportByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Export-AzTemplateSpec
        [-ResourceId] <String>
        -Version <String>
        -OutputFolder <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ExportByIdParameterSet
  isDefault: false
