uid: Az.Resources.Export-AzTemplateSpec
name: Export-AzTemplateSpec
module: Az.Resources
isPreview: false
summary: |-
  Exports a Template Spec to the local filesystem
description: |-
  Exports a specific Template Spec version to the local filesystem.
