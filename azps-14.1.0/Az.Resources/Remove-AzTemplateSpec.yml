syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzTemplateSpec
        [-ResourceGroupName] <String>
        [-Name] <String>
        [[-Version] <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzTemplateSpec
        [[-Version] <String>]
        [-ResourceId] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByIdParameterSet
