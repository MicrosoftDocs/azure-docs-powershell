uid: Az.Resources.Get-AzRoleEligibleChildResource
name: Get-AzRoleEligibleChildResource
module: Az.Resources
isPreview: false
summary: |-
  Get the child resources of a resource on which user has eligible access
description: |-
  Get the child resources of a resource on which user has eligible access
