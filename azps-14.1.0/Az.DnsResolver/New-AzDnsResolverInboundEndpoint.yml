syntaxes:
- syntax: |-
    ```Syntax
    New-AzDnsResolverInboundEndpoint
        -DnsResolverName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-IfNoneMatch <String>]
        -IPConfiguration <IIPConfiguration[]>
        -Location <String>
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
