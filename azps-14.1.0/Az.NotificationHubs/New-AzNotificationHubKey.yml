syntaxes:
- syntax: |-
    ```Syntax
    New-AzNotificationHubKey
        [-ResourceGroup] <String>
        [-Namespace] <String>
        [-NotificationHub] <String>
        [[-AuthorizationRule] <String>]
        [-PolicyKey] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
