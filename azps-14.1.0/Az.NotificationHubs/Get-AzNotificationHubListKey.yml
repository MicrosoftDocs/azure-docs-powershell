syntaxes:
- syntax: |-
    ```Syntax
    Get-AzNotificationHubListKey
        [-ResourceGroup] <String>
        [-Namespace] <String>
        [-NotificationHub] <String>
        [-AuthorizationRule] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
