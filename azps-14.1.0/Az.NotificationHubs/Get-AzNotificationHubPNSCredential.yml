### YamlMime:PowerShellCmdlet1
uid: Az.NotificationHubs.Get-AzNotificationHubPNSCredential
name: Get-AzNotificationHubPNSCredential
module: Az.NotificationHubs
isPreview: false
summary: |-
  Gets the PNS credentials for a notification hub.
description: |-
  The **Get-AzNotificationHubPNSCredential** cmdlet gets the platform notification service (PNS) credentials for a notification hub.
  Each notification hub has a single set of PNS credentials.
  These credentials are applied to individual push notification services such as, but not limited to; the iOS push notification service, the Android push notification service, and Windows Phone 8.
