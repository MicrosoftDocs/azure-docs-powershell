syntaxes:
- syntax: |-
    ```Syntax
    Get-AzNotificationHubPNSCredential
        [-ResourceGroup] <String>
        [-Namespace] <String>
        [-NotificationHub] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.NotificationHubs.Models.NotificationHubAttributes" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get PNS credentials for a specific notification hub'
  description: |-
    ```powershell
    Get-AzNotificationHubPNSCredential -Namespace "ContosoNamespace" -ResourceGroup "ContosoNotificationsGroup" -NotificationHub "ContosoInternalHub"
    ```

    This command gets the PNS credentials for the notification hub named ContosoInternalHub that belongs to the resource group named ContosoNotificationsGroup.
