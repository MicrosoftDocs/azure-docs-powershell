    New-AzNotificationHubsNamespace
        [-ResourceGroup] <String>
        [-Namespace] <String>
        [-Location] <String>
        [[-Tag] <Hashtable>]
        [[-SkuTier] <String>]
        [-DefaultProfile <IAzureContextContainer>]
