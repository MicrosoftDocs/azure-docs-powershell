examples:
- title: 'Example 1: Get List of chat transcripts at subscription level'
  description: |-
    ```powershell
    Get-AzSupportChatTranscript -SupportTicketName "58cf91d7-bedfb285-617ecf73-d627-4bfd-9298-5950da2170b7"
    ```

    ```output
