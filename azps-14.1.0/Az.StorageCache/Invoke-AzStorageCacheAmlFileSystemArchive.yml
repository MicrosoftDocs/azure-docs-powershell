syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzStorageCacheAmlFileSystemArchive
        -AmlFilesystemName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-FilesystemPath <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ArchiveExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzStorageCacheAmlFileSystemArchive
        -AmlFilesystemName <String>
        -ResourceGroupName <String>
        -JsonString <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ArchiveViaJsonString
  isDefault: false
- syntax: |-
    ```Syntax
    Invoke-AzStorageCacheAmlFileSystemArchive
        -AmlFilesystemName <String>
        -ResourceGroupName <String>
        -JsonFilePath <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ArchiveViaJsonFilePath
  isDefault: false
- syntax: |-
    ```Syntax
    Invoke-AzStorageCacheAmlFileSystemArchive
        -InputObject <IStorageCacheIdentity>
        [-FilesystemPath <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ArchiveViaIdentityExpanded
  isDefault: false
