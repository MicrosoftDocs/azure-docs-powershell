syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzNetworkFabricProvision
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Provision
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzNetworkFabricProvision
        -InputObject <IManagedNetworkFabricIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ProvisionViaIdentity
  isDefault: false
