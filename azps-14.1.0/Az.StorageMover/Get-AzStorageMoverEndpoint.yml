- title: 'Example 2: Get a specific endpoint'
  description: |-
    ```powershell
    Get-AzStorageMoverEndpoint -ResourceGroupName myResourceGroupName -StorageMoverName myStorageMoverName -Name myEndpoint
    ```

    ```output
