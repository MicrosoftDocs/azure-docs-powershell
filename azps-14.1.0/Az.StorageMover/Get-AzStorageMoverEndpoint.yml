examples:
- title: 'Example 1: Get all endpoints in a Storage mover'
  description: |-
    ```powershell
    Get-AzStorageMoverEndpoint -ResourceGroupName myResourceGroup -StorageMoverName myStorageMover
    ```

    ```output
