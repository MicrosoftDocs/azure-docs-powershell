    Invoke-AzAksRunCommand
        -InputObject <PSKubernetesCluster>
        -Command <String>
        [-CommandContextAttachment <String[]>]
        [-CommandContextAttachmentZip <String>]
        [-AsJob]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
