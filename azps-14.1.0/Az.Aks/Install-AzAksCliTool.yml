examples:
- title: 'Example 1: Install the lateset version of kubectl and kubelogin'
  description: |-
    ```powershell
    Install-AzAksCliTool
    ```
- title: 'Example 2: Install the special version of kubectl and kubelogin into custom folder'
  description: |-
    ```powershell
    Install-AzAksCliTool -KubectlInstallVersion "v1.25.0" -KubectlInstallDestination "~/bin/" -KubeloginInstallVersion "v0.0.20" -KubeloginInstallDestination "~/bin"
    ```
