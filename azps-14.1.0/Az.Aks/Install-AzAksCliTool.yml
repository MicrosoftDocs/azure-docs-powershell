syntaxes:
- syntax: |-
    ```Syntax
    Install-AzAksCliTool
        [-Destination <String>]
        [-Version <String>]
        [-DownloadFromMirror]
        [-KubeloginInstallDestination <String>]
        [-KubeloginInstallVersion <String>]
        [-KubeloginDownloadFromMirror]
        [-PassThru]
        [-AsJob]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
