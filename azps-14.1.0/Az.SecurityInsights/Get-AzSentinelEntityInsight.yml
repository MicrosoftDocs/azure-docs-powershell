syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSentinelEntityInsight
        -EntityId <String>
        -ResourceGroupName <String>
        -WorkspaceName <String>
        [-SubscriptionId <String[]>]
        -EndTime <DateTime>
        -StartTime <DateTime>
        [-AddDefaultExtendedTimeRange]
        [-InsightQueryId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
