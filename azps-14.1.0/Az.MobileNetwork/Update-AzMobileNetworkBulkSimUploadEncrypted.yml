uid: Az.MobileNetwork.Update-AzMobileNetworkBulkSimUploadEncrypted
name: Update-AzMobileNetworkBulkSimUploadEncrypted
module: Az.MobileNetwork
isPreview: false
summary: |-
  Bulk upload SIMs in encrypted form to a SIM group.
  The SIM credentials must be encrypted.
