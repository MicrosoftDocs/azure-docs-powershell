syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzConnectedNetworkDevice
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzConnectedNetworkDevice
        -InputObject <IConnectedNetworkIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteViaIdentity
  isDefault: false
