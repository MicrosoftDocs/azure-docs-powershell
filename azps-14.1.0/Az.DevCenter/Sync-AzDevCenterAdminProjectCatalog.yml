syntaxes:
- syntax: |-
    ```Syntax
    Sync-AzDevCenterAdminProjectCatalog
        -CatalogName <String>
        -ProjectName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Sync
  isDefault: true
- syntax: |-
    ```Syntax
    Sync-AzDevCenterAdminProjectCatalog
        -InputObject <IDevCenterIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
