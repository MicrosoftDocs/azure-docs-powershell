syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDevCenterAdminSchedule
        -PoolName <String>
        -ProjectName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-State <ScheduleEnableStatus>]
        [-Tag <Hashtable>]
        [-Time <String>]
        [-TimeZone <String>]
        [-Type <ScheduledType>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDevCenterAdminSchedule
        -InputObject <IDevCenterIdentity>
        [-State <ScheduleEnableStatus>]
        [-Tag <Hashtable>]
        [-Time <String>]
        [-TimeZone <String>]
        [-Type <ScheduledType>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
