syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDevCenterUserEnvironment
        -Endpoint <String>
        -Name <String>
        -ProjectName <String>
        [-UserId <String>]
        [-ExpirationDate <DateTime>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PatchExpanded
  isDefault: true
- syntax: |-
