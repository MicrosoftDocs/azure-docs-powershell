syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDevCenterAdminProjectEnvironmentDefinitionErrorDetail
        -CatalogName <String>
        -EnvironmentDefinitionName <String>
        -ProjectName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDevCenterAdminProjectEnvironmentDefinitionErrorDetail
        -InputObject <IDevCenterIdentity>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: GetViaIdentity
