syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDevCenterAdminSchedule
        -PoolName <String>
        -ProjectName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
