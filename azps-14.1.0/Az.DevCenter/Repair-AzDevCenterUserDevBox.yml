syntaxes:
- syntax: |-
    ```Syntax
    Repair-AzDevCenterUserDevBox
        -Endpoint <String>
        -Name <String>
        -ProjectName <String>
        [-UserId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Repair
  isDefault: true
- syntax: |-
    ```Syntax
    Repair-AzDevCenterUserDevBox
        -Endpoint <String>
        -InputObject <IDevCenterdataIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RepairViaIdentity
  isDefault: false
