uid: Az.DevCenter.Repair-AzDevCenterUserDevBox
name: Repair-AzDevCenterUserDevBox
module: Az.DevCenter
isPreview: false
summary: |-
  Attempts automated repair steps to resolve common problems on a Dev Box.
  The Dev Box may restart during this operation.
