uid: Az.ContainerInstance.New-AzContainerInstanceEnvironmentVariableObject
name: New-AzContainerInstanceEnvironmentVariableObject
module: Az.ContainerInstance
isPreview: false
summary: |-
  Create a in-memory object for EnvironmentVariable
description: |-
  Create a in-memory object for EnvironmentVariable
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the environment variable.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SecureValue
    type: <xref href="System.Security.SecureString" data-throw-if-not-resolved="False" />
    description: |-
      The value of the secure environment variable.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Value
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The value of the environment variable.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
