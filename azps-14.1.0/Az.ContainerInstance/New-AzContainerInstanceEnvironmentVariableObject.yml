    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzContainerInstanceEnvironmentVariableObject
        -Name <String>
        [-SecureValue <SecureString>]
        [-Value <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ContainerInstance.Models.Api20240501Preview.EnvironmentVariable" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an environment variable within a container instance'
  description: |-
    ```powershell
    New-AzContainerInstanceEnvironmentVariableObject -Name "env1" -Value "value1"
    ```

    ```output
    Name SecureValue Value
    ---- ----------- -----
    env1             value1
    ```

    This command creates an environment variable within a container instance.
- title: 'Example 2: Create a secure environment variable within a container instance'
  description: |-
    ```powershell
    $pwd = ConvertTo-SecureString -String "****" -AsPlainText -Force
    New-AzContainerInstanceEnvironmentVariableObject -Name "env2" -SecureValue $pwd
    ```

    ```output
    Name SecureValue Value
    ---- ----------- -----
    env2 ******
    ```

    This command creates a secure environment variable within a container instance
