    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AzureFileStorageAccountName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the storage account that contains the Azure File share.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EmptyDir
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ContainerInstance.Models.Api20240501Preview.IVolumeEmptyDir" data-throw-if-not-resolved="False" />
    description: |-
      The empty directory volume.
      To construct, see NOTES section for EMPTYDIR properties and create a hash table.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GitRepoDirectoryName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Target directory name.
      Must not contain or start with '..'.
      If '.' is supplied, the volume directory will be the git repository.
      Otherwise, if specified, the volume will contain the git repository in the subdirectory with the given name.
