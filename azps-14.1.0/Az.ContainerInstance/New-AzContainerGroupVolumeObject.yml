uid: Az.ContainerInstance.New-AzContainerGroupVolumeObject
name: New-AzContainerGroupVolumeObject
module: Az.ContainerInstance
isPreview: false
summary: |-
  Create an in-memory object for Volume.
description: |-
  Create an in-memory object for Volume.
parameters:
  cmdletParameters:
  - name: AzureFileReadOnly
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      The flag indicating whether the Azure File shared mounted as a volume is read-only.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AzureFileShareName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the Azure File share to be mounted as a volume.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AzureFileStorageAccountKey
    type: <xref href="System.Security.SecureString" data-throw-if-not-resolved="False" />
