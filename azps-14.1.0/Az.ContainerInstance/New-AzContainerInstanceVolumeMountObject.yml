examples:
- title: 'Example 1: Specify a volume mount available to a container instance'
  description: |-
    ```powershell
    New-AzContainerInstanceVolumeMountObject -Name "mnt" -MountPath "/mnt/azfile" -ReadOnly $true
    ```

    ```output
    MountPath   Name ReadOnly
    ---------   ---- --------
    /mnt/azfile mnt  True
    ```

