syntaxes:
- syntax: |-
    ```Syntax
    New-AzElasticMonitor
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-CompanyInfoBusiness <String>]
        [-CompanyInfoCountry <String>]
        [-CompanyInfoDomain <String>]
        [-CompanyInfoEmployeesNumber <String>]
        [-CompanyInfoState <String>]
        [-EnableSystemAssignedIdentity]
        [-GenerateApiKey]
        [-Location <String>]
        [-MonitoringStatus <String>]
        [-PlanDetailOfferId <String>]
        [-PlanDetailPlanId <String>]
        [-PlanDetailPlanName <String>]
        [-PlanDetailPublisherId <String>]
        [-PlanDetailTermId <String>]
        [-SaaSAzureSubscriptionStatus <String>]
        [-Sku <String>]
        [-SourceCampaignId <String>]
        [-SourceCampaignName <String>]
        [-SubscriptionState <String>]
        [-Tag <Hashtable>]
        [-UserInfoCompanyName <String>]
        [-UserInfoEmailAddress <String>]
        [-UserInfoFirstName <String>]
        [-UserInfoLastName <String>]
        [-Version <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
