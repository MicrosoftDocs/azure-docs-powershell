syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzImportExport
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AcceptLanguage <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzImportExport
        -InputObject <IImportExportIdentity>
        [-AcceptLanguage <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteViaIdentity
  isDefault: false
