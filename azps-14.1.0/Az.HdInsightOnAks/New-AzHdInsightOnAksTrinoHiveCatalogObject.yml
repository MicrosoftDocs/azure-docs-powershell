### YamlMime:PowerShellCmdlet1
uid: Az.HdInsightOnAks.New-AzHdInsightOnAksTrinoHiveCatalogObject
name: New-AzHdInsightOnAksTrinoHiveCatalogObject
module: Az.HdInsightOnAks
isPreview: false
summary: |-
  Create an in-memory object for HiveCatalogOption.
description: |-
  Create an in-memory object for HiveCatalogOption.
parameters:
  cmdletParameters:
  - name: CatalogName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of trino catalog which should use specified hive metastore.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MetastoreDbConnectionAuthenticationMode
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The authentication mode to connect to your Hive metastore database.
      More details: https://learn.microsoft.com/en-us/azure/azure-sql/database/logins-create-manage?view=azuresql#authentication-and-authorization.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MetastoreDbConnectionPasswordSecret
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Secret reference name from secretsProfile.secrets containing password for database connection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MetastoreDbConnectionUrl
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Connection string for hive metastore database.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MetastoreDbConnectionUserName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      User name for database connection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MetastoreWarehouseDir
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Metastore root directory URI, format: abfs[s]://\<container\>@\<account_name\>.dfs.core.windows.net/\<path\>.
      More details: https://docs.microsoft.com/en-us/azure/storage/blobs/data-lake-storage-introduction-abfs-uri.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzHdInsightOnAksTrinoHiveCatalogObject
        -CatalogName <String>
        -MetastoreDbConnectionUrl <String>
        -MetastoreWarehouseDir <String>
        [-MetastoreDbConnectionAuthenticationMode <String>]
        [-MetastoreDbConnectionPasswordSecret <String>]
        [-MetastoreDbConnectionUserName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.HdInsightOnAks.Models.HiveCatalogOption" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a hive catalog configured as a Trino cluster.'
  description: |-
    ```powershell
    $catalogName="{your catalog name}"
    $metastoreDbConnectionURL="jdbc:sqlserver://{your sql server url};database={your db name};encrypt=truetrustServerCertificate=true;loginTimeout=30;"
    $metastoreDbUserName="{your db user name}"
    $metastoreDbPasswordSecret="{secretName}"
    $metastoreWarehouseDir="abfs://{your container name}@{your adls gen2 endpoint}/{your path}"

    New-AzHdInsightOnAksTrinoHiveCatalogObject -CatalogName $catalogName -MetastoreDbConnectionUrl $metastoreDbConnectionURL -MetastoreDbConnectionUserName $metastoreDbUserName -MetastoreDbConnectionPasswordSecret $metastoreDbPasswordSecret -MetastoreWarehouseDir $metastoreWarehouseDir
    ```

    ```output
    CatalogName                             : {your catalog name}
    MetastoreDbConnectionAuthenticationMode :
    MetastoreDbConnectionPasswordSecret     : {secretName}
    MetastoreDbConnectionUrl                : jdbc:sqlserver://{your sql server url};database={your db name};encrypt=truetrustServerCertificate=true;loginTimeout=30;
    MetastoreDbConnectionUserName           : {your db user name}
    MetastoreWarehouseDir                   : abfs://{your container name}@{your adls gen2 endpoint}/{your path}
    ```

    Create a hive catalog configured as a Trino cluster.
