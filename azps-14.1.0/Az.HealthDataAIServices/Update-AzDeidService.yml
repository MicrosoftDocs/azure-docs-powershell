syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDeidService
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-EnableSystemAssignedIdentity <Boolean>]
        [-PublicNetworkAccess <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDeidService
        -InputObject <IHealthDataAiServicesIdentity>
        [-EnableSystemAssignedIdentity <Boolean>]
        [-PublicNetworkAccess <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
