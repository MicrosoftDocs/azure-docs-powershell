- title: 'Example 1: Update a De-identification service to create a System Assigned Managed Identity'
  description: |-
    ```powershell
    Update-AzDeidService -Name myHealthDeidService -ResourceGroupName azpwsh-test-rg -EnableSystemAssignedIdentity $true
    ```

