uid: Az.ConnectedMachine.Connect-AzConnectedMachine
name: Connect-AzConnectedMachine
module: Az.ConnectedMachine
isPreview: false
summary: |-
  API to register a new machine and thereby create a tracked resource in ARM
description: |-
  API to register a new machine and thereby create a tracked resource in ARM
