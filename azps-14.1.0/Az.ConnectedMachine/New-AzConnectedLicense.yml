        [-LicenseDetailProcessor <Int32>]
        [-LicenseDetailState <String>]
        [-LicenseDetailTarget <String>]
        [-LicenseDetailType <String>]
        [-LicenseDetailVolumeLicenseDetail <IVolumeLicenseDetails[]>]
        [-LicenseType <String>]
        [-Tag <Hashtable>]
        [-TenantId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
