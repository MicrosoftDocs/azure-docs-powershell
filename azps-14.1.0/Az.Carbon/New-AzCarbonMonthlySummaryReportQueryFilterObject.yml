### YamlMime:PowerShellCmdlet1
uid: Az.Carbon.New-AzCarbonMonthlySummaryReportQueryFilterObject
name: New-AzCarbonMonthlySummaryReportQueryFilterObject
module: Az.Carbon
isPreview: false
summary: |-
  Create an in-memory object for MonthlySummaryReportQueryFilterObject.
description: |-
  Create an in-memory object for MonthlySummaryReportQueryFilterObject.
parameters:
  cmdletParameters:
  - name: CarbonScopeList
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of carbon emission scopes.
      Required.
      Accepts one or more values from - Scope1, Scope2, Scope3 in list form.
      The output will include the total emissions for the specified scopes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DateRangeEnd
    type: <xref href="System.DateTime" data-throw-if-not-resolved="False" />
    description: |-
      End date parameter in yyyy-MM-01 format.
      Only the first day of each month is accepted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DateRangeStart
    type: <xref href="System.DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Start date parameter in yyyy-MM-01 format.
      Only the first day of each month is accepted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocationList
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of locations(Azure Region Display Name) for carbon emissions data, with each location specified in lowercase (e.g., 'east us').
      Optional.
      You can use the command 'az account list-locations -o table' to find Azure Region Display Names.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupUrlList
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of resource group URLs for carbon emissions data.
      Optional.
      Each URL must follow the format '/subscriptions/{subscriptionId}/resourcegroups/{resourceGroup}', and should be in all lowercase.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceTypeList
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of resource types for carbon emissions data.
      Optional.
      Each resource type should be specified in lowercase, following the format 'microsoft.{service}/{resourceType}', e.g., 'microsoft.storage/storageaccounts'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubscriptionList
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of subscription IDs for which carbon emissions data is requested.
      Required.
      Each subscription ID should be in lowercase format.
      The max length of list is 100.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzCarbonMonthlySummaryReportQueryFilterObject
        -CarbonScopeList <String[]>
        -DateRangeEnd <DateTime>
        -DateRangeStart <DateTime>
        -SubscriptionList <String[]>
        [-LocationList <String[]>]
        [-ResourceGroupUrlList <String[]>]
        [-ResourceTypeList <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Carbon.Models.MonthlySummaryReportQueryFilterObject" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create new MonthlySummaryReportQueryFilterObject object'
  description: |-
    ```powershell
    New-AzCarbonMonthlySummaryReportQueryFilterObject -CarbonScopeList ('Scope1', 'Scope2', 'Scope3') -DateRangeEnd 2025-03-01 -DateRangeStart 2024-03-01 -SubscriptionList ('00000000-0000-0000-0000-000000000000','00000000-0000-0000-0000-000000000001')
    ```

    ```output
    CarbonScopeList      : {Scope1, Scope2, Scope3}
    DateRangeEnd         : 3/1/2025 12:00:00 AM
    DateRangeStart       : 3/1/2024 12:00:00 AM
    LocationList         :
    ReportType           : MonthlySummaryReport
    ResourceGroupUrlList :
    ResourceTypeList     :
    SubscriptionList     : {00000000-0000-0000-0000-000000000000, 00000000-0000-0000-0000-000000000001}
    ```
