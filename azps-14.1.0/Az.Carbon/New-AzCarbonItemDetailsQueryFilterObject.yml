### YamlMime:PowerShellCmdlet1
uid: Az.Carbon.New-AzCarbonItemDetailsQueryFilterObject
name: New-AzCarbonItemDetailsQueryFilterObject
module: Az.Carbon
isPreview: false
summary: |-
  Create an in-memory object for ItemDetailsQueryFilterObject.
description: |-
  Create an in-memory object for ItemDetailsQueryFilterObject.
parameters:
  cmdletParameters:
  - name: CarbonScopeList
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of carbon emission scopes.
      Required.
      Accepts one or more values from - Scope1, Scope2, Scope3.
      The output will include the total emissions for the specified scopes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CategoryType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the category type for detailed emissions data.
      Accepts values - Resource, ResourceGroup, ResourceType, Location, Subscription.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DateRangeEnd
    type: <xref href="System.DateTime" data-throw-if-not-resolved="False" />
    description: |-
      End date parameter in yyyy-MM-01 format.
      Only the first day of each month is accepted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DateRangeStart
    type: <xref href="System.DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Start date parameter in yyyy-MM-01 format.
      Only the first day of each month is accepted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocationList
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of locations(Azure Region Display Name) for carbon emissions data, with each location specified in lowercase (e.g., 'east us').
      Optional.
      You can use the command 'az account list-locations -o table' to find Azure Region Display Names.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OrderBy
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The column name to order the results by.
      Accepts values - ItemName, LatestMonthEmissions, MonthOverMonthEmissionsChangeRatio, MonthlyEmissionsChangeValue, PreviousMonthEmissions, ResourceGroup
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PageSize
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Number of items to return in one request, max value is 5000.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupUrlList
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of resource group URLs for carbon emissions data.
      Optional.
      Each URL must follow the format '/subscriptions/{subscriptionId}/resourcegroups/{resourceGroup}', and should be in all lowercase.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceTypeList
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of resource types for carbon emissions data.
      Optional.
      Each resource type should be specified in lowercase, following the format 'microsoft.{service}/{resourceType}', e.g., 'microsoft.storage/storageaccounts'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SkipToken
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Pagination token for fetching the next page of data.
      This token is nullable and will be returned in the previous response if additional data pages are available.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SortDirection
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Direction for sorting results.
      Accepts values - Asc, Desc.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubscriptionList
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of subscription IDs for which carbon emissions data is requested.
      Required.
      Each subscription ID should be in lowercase format.
      The max length of list is 100.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzCarbonItemDetailsQueryFilterObject
        -CategoryType <String>
        -OrderBy <String>
        -PageSize <Int32>
        -SortDirection <String>
        -CarbonScopeList <String[]>
        -DateRangeEnd <DateTime>
        -DateRangeStart <DateTime>
        -SubscriptionList <String[]>
        [-SkipToken <String>]
        [-LocationList <String[]>]
        [-ResourceGroupUrlList <String[]>]
        [-ResourceTypeList <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Carbon.Models.ItemDetailsQueryFilterObject" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create new ItemDetailsQueryFilterObject object'
  description: |-
    ```powershell
    New-AzCarbonItemDetailsQueryFilterObject -CarbonScopeList ('Scope1', 'Scope2', 'Scope3') -CategoryType 'Resource' -DateRangeEnd 2025-03-01 -DateRangeStart 2025-03-01 -OrderBy 'ItemName' -PageSize 100 -SortDirection 'Desc' -SubscriptionList ('00000000-0000-0000-0000-000000000000','00000000-0000-0000-0000-000000000001')
    ```

    ```output
    CarbonScopeList      : {Scope1, Scope2, Scope3}
    CategoryType         : Resource
    DateRangeEnd         : 3/1/2025 12:00:00 AM
    DateRangeStart       : 3/1/2025 12:00:00 AM
    LocationList         :
    OrderBy              : ItemName
    PageSize             : 100
    ReportType           : ItemDetailsReport
    ResourceGroupUrlList :
    ResourceTypeList     :
    SkipToken            :
    SortDirection        : Desc
    SubscriptionList     : {00000000-0000-0000-0000-000000000000, 00000000-0000-0000-0000-000000000001}
    ```
