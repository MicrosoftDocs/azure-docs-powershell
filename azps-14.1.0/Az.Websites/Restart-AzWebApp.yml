    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzWebApp
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-SoftRestart]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S1
  isDefault: false
- syntax: |-
    ```Syntax
    Restart-AzWebApp
        [-WebApp] <PSSite>
        [-SoftRestart]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S2
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.WebApps.Models.PSSite" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.WebApps.Models.PSSite" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Restart a Web App'
  description: |-
    ```powershell
    Restart-AzWebApp -ResourceGroupName "Default-Web-WestUS" -Name "ContosoSite"
    ```

    This command stops the Azure Web App named ContosoSite that belongs to the resource group named Default-Web-WestUS and then restarts it.
