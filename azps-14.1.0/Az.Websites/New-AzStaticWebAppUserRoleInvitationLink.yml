syntaxes:
- syntax: |-
    ```Syntax
    New-AzStaticWebAppUserRoleInvitationLink
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Domain <String>]
        [-Kind <String>]
        [-NumHoursToExpiration <Int32>]
        [-Provider <String>]
        [-Role <String>]
        [-UserDetail <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzStaticWebAppUserRoleInvitationLink
        -InputObject <IWebsitesIdentity>
        [-Domain <String>]
        [-Kind <String>]
        [-NumHoursToExpiration <Int32>]
        [-Provider <String>]
        [-Role <String>]
        [-UserDetail <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityExpanded
  isDefault: false
