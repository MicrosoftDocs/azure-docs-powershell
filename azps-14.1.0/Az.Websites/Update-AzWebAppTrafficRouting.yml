syntaxes:
- syntax: |-
    ```Syntax
    Update-AzWebAppTrafficRouting
        -ResourceGroupName <String>
        -WebAppName <String>
        -RoutingRule <Hashtable>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
