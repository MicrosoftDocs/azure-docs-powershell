syntaxes:
- syntax: |-
    ```Syntax
    Reset-AzStaticWebAppApiKey
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Kind <String>]
        [-RepositoryToken <String>]
        [-ShouldUpdateRepository]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResetExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Reset-AzStaticWebAppApiKey
        -InputObject <IWebsitesIdentity>
        [-Kind <String>]
        [-RepositoryToken <String>]
        [-ShouldUpdateRepository]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
