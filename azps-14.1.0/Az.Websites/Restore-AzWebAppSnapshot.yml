syntaxes:
- syntax: |-
    ```Syntax
    Restore-AzWebAppSnapshot
        [-ResourceGroupName] <String>
        [-Name] <String>
        [[-Slot] <String>]
        [-InputObject] <AzureWebAppSnapshot>
        [-RecoverConfiguration]
        [-UseDisasterRecovery]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FromResourceName
  isDefault: false
- syntax: |-
    ```Syntax
    Restore-AzWebAppSnapshot
        [-WebApp] <PSSite>
        [-InputObject] <AzureWebAppSnapshot>
        [-RecoverConfiguration]
        [-UseDisasterRecovery]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FromWebApp
  isDefault: false
