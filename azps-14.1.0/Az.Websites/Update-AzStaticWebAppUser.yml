syntaxes:
- syntax: |-
    ```Syntax
    Update-AzStaticWebAppUser
        -AuthProvider <String>
        -Name <String>
        -ResourceGroupName <String>
        -UserId <String>
        [-SubscriptionId <String>]
        [-Kind <String>]
        [-Role <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzStaticWebAppUser
        -InputObject <IWebsitesIdentity>
        [-Kind <String>]
        [-Role <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
