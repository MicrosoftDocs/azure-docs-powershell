syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzConnectedKubernetes
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-KubeConfig <String>]
        [-KubeContext <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
