    Remove-AzConnectedKubernetes
        -InputObject <IConnectedKubernetesIdentity>
        [-KubeConfig <String>]
        [-KubeContext <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
