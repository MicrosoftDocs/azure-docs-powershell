syntaxes:
- syntax: |-
    ```Syntax
    Restore-AzMariaDbServer
        -Name <String>
        [-ServerName <String>]
        [-InputObject <IServer>]
        [-ResourceGroupName <String>]
        [-SubscriptionId <String>]
        -RestorePointInTime <DateTime>
        [-Location <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
