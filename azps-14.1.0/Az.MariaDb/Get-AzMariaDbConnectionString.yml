syntaxes:
- syntax: |-
    ```Syntax
    Get-AzMariaDbConnectionString
        -Client <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
