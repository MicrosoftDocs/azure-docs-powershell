uid: Az.MariaDb.New-AzMariaDbFirewallRule
name: New-AzMariaDbFirewallRule
module: Az.MariaDb
isPreview: false
summary: |-
  Creates a new firewall rule or updates an existing firewall rule.
description: |-
  Creates a new firewall rule or updates an existing firewall rule.
