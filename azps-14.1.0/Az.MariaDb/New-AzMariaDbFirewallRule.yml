syntaxes:
- syntax: |-
    ```Syntax
    New-AzMariaDbFirewallRule
        -ResourceGroupName <String>
        -ServerName <String>
        -EndIPAddress <String>
        -StartIPAddress <String>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzMariaDbFirewallRule
        -ResourceGroupName <String>
        -ServerName <String>
        -ClientIPAddress <String>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClientIPAddress
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzMariaDbFirewallRule
        -ResourceGroupName <String>
        -ServerName <String>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-AllowAll]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AllowAll
  isDefault: false
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.MariaDb.Models.Api20180601Preview.IFirewallRule" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a firewall rule under a MariaDB'
  description: |-
    ```powershell
    New-AzMariaDbFirewallRule -Name firewall-101 -ResourceGroupName mariadb-test-qu5ov0 -ServerName mariadb-asd-01 -EndIPAddress 0.0.2.255 -StartIPAddress 0.0.2.1
    ```

    ```output
    Name         StartIPAddress EndIPAddress
    ----         -------------- ------------
    firewall-101 0.0.2.1        0.0.2.255
    ```

    This command creates a firewall rule under a MariaDB.
- title: 'Example 2: Create a new MariaDB Firewall Rule using -ClientIPAddress.'
  description: |-
    ```powershell
    New-AzMariaDbFirewallRule -ResourceGroupName mariadb-test-qu5ov0 -ServerName mariadb-asd-01 -ClientIPAddress 0.0.0.1
    ```

    ```output
    Name                                StartIPAddress EndIPAddress
    ----                                -------------- ------------
    ClientIPAddress_2020-08-11_18-19-27 0.0.0.1        0.0.0.1
    ```

    This cmdlets create a MariaDB Firewall Rule using -ClientIPAddress.
- title: 'Example 3: Create a new MariaDB Firewall Rule to allow all IPs'
  description: |-
    ```powershell
    New-AzMariaDbFirewallRule -ResourceGroupName mariadb-test-qu5ov0 -ServerName mariadb-asd-01 -AllowAll
    ```

    ```output
    Name                         StartIPAddress EndIPAddress
    ----                         -------------- ------------
    AllowAll_2020-08-11_18-19-27 0.0.0.0        255.255.255.255
    ```

    This cmdlets create a new MariaDB Firewall Rule to allow all IPs.
