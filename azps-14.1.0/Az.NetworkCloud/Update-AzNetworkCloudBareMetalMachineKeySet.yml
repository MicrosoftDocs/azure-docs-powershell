syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudBareMetalMachineKeySet
        -ClusterName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Expiration <DateTime>]
        [-JumpHostsAllowed <String[]>]
        [-Tag <Hashtable>]
        [-UserList <IKeySetUser[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
