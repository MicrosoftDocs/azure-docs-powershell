uid: Az.NetworkCloud.Invoke-AzNetworkCloudScanClusterRuntime
name: Invoke-AzNetworkCloudScanClusterRuntime
module: Az.NetworkCloud
isPreview: false
summary: |-
  Triggers the execution of a runtime protection scan to detect and remediate detected issues, in accordance with the cluster configuration.
