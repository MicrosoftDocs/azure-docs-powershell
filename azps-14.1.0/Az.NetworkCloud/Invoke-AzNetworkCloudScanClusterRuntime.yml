syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzNetworkCloudScanClusterRuntime
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ScanActivity <ClusterScanRuntimeParametersScanActivity>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ScanExpanded
  isDefault: true
