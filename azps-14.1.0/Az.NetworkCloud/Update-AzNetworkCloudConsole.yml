### YamlMime:PowerShellCmdlet1
uid: Az.NetworkCloud.Update-AzNetworkCloudConsole
name: Update-AzNetworkCloudConsole
module: Az.NetworkCloud
isPreview: false
summary: |-
  Patch the properties of the provided virtual machine console, or update the tags associated with the virtual machine console.
  Properties and tag updates can be done independently.
description: |-
  Patch the properties of the provided virtual machine console, or update the tags associated with the virtual machine console.
  Properties and tag updates can be done independently.
