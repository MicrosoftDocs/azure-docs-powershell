syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudConsole
        -Name <String>
        -ResourceGroupName <String>
        -VirtualMachineName <String>
        [-SubscriptionId <String>]
        [-Enabled <ConsoleEnabled>]
        [-Expiration <DateTime>]
        [-SshPublicKeyData <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudConsole
        -InputObject <INetworkCloudIdentity>
        [-Enabled <ConsoleEnabled>]
        [-Expiration <DateTime>]
        [-SshPublicKeyData <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
