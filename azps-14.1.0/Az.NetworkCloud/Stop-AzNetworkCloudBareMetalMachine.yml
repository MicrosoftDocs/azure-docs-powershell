syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzNetworkCloudBareMetalMachine
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-SkipShutdown <BareMetalMachineSkipShutdown>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PowerOffExpanded
  isDefault: true
