syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzNetworkCloudBareMetalMachineReplace
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-BmcCredentialsPassword <SecureString>]
        [-BmcCredentialsUsername <String>]
        [-BmcMacAddress <String>]
        [-BootMacAddress <String>]
        [-MachineName <String>]
        [-SerialNumber <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ReplaceExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzNetworkCloudBareMetalMachineReplace
        -InputObject <INetworkCloudIdentity>
        [-BmcCredentialsPassword <SecureString>]
        [-BmcCredentialsUsername <String>]
        [-BmcMacAddress <String>]
        [-BootMacAddress <String>]
        [-MachineName <String>]
        [-SerialNumber <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ReplaceViaIdentityExpanded
  isDefault: false
