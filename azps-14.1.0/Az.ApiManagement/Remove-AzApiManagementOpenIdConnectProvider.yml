syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzApiManagementOpenIdConnectProvider
        -Context <PsApiManagementContext>
        -OpenIdConnectProviderId <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
