- title: 'Example 1: Delete a user'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Remove-AzApiManagementUser -Context $apimContext -UserId "0123456789"
    ```

