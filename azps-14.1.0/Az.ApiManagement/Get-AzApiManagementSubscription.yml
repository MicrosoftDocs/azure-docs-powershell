syntaxes:
- syntax: |-
    ```Syntax
    Get-AzApiManagementSubscription
        -Context <PsApiManagementContext>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetAllSubscriptions
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzApiManagementSubscription
        -Context <PsApiManagementContext>
        [-SubscriptionId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetBySubscriptionId
  isDefault: false
