### YamlMime:PowerShellCmdlet1
uid: Az.ApiManagement.Get-AzApiManagementSubscription
name: Get-AzApiManagementSubscription
module: Az.ApiManagement
isPreview: false
summary: |-
  Gets subscriptions.
description: |-
  The **Get-AzApiManagementSubscription** cmdlet gets a specified subscription, or all subscriptions, if no subscription is specified.
  Keys will not be included into result details. To get keys, use **Get-AzApiManagementSubscriptionKey**.
parameters:
  cmdletParameters:
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **PsApiManagementContext** object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProductId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a product identifier.
      If specified, this cmdlet finds all subscriptions by the product identifier.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByProductIdAndUser
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Scope identifier. The Scope of the Subscription, whether it is Api Scope /apis/{apiId} or Product Scope /products/{productId} or Global API Scope /apis or Global scope /.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByScope
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubscriptionId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a subscription identifier.
      If specified, this cmdlet finds subscription by the identifier.
    defaultValue: None
