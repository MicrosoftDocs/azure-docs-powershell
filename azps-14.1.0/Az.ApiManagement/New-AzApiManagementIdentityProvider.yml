examples:
- title: 'Example 1: Configures Facebook as an identity Provider for Developer Portal Logins'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    New-AzApiManagementIdentityProvider -Context $apimContext -Type 'Facebook' -ClientId 'sdfsfwerwerw' -ClientSecret 'sdgsdfgfst43tewfewrf'
    ```

    This command configures Facebook Identity as a accepted Identity Provider on the Developer Portal of the ApiManagement service.
    This takes as input the ClientId and ClientSecret of the Facebook app.
- title: 'Example 2: Configures adB2C as an identity Provider for Developer Portal Logins'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    New-AzApiManagementIdentityProvider -Context $context -Type AadB2C -ClientId 00001111-aaaa-2222-bbbb-3333cccc4444 -ClientSecret "foobar" -AllowedTenants 'samirtestbc.onmicrosoft.com' -SignupPolicyName B2C_1_signup-policy
    ```

    ```output
    Type                     : AadB2C
    ClientId                 : 00001111-aaaa-2222-bbbb-3333cccc4444
    ClientSecret             : foobar
    AllowedTenants           : {samirtestbc.onmicrosoft.com}
    Authority                : login.microsoftonline.com
    SignupPolicyName         : B2C_1_signup-policy
    SigninPolicyName         :
    ProfileEditingPolicyName :
    PasswordResetPolicyName  :
    Id                       : /subscriptions/subid/resourceGroups/Api-Default-WestUS/providers/Microsoft.ApiManagement/service/contoso/identityProviders/AadB2C
    ResourceGroupName        : Api-Default-WestUS
    ServiceName              : contoso
    ```

    This command configures Facebook Identity as a accepted Identity Provider on the Developer Portal of the ApiManagement service.
    This takes as input the ClientId and ClientSecret of the Facebook app.
