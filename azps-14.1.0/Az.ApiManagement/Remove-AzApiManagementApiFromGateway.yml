examples:
- title: 'Example 1: Remove an API from a gateway'
  description: |-
    ```powershell
    $ApiMgmtContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Remove-AzApiManagementApiFromGateway -Context $ApiMgmtContext -GatewayId "0123456789" -ApiId "0001" -PassThru
    ```

    This command removes the specified API from a gateway.
- title: 'Example 2: Remove an API from a managed gateway'
  description: |-
    ```powershell
    $ApiMgmtContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Remove-AzApiManagementApiFromGateway -Context $ApiMgmtContext -GatewayId "managed" -ApiId "0001" -PassThru
    ```

    This command removes the specified API from the managed gateway.
