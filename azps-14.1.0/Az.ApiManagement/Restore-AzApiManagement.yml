### YamlMime:PowerShellCmdlet1
uid: Az.ApiManagement.Restore-AzApiManagement
name: Restore-AzApiManagement
module: Az.ApiManagement
isPreview: false
summary: |-
  Restores an API Management Service from the specified Azure Storage blob.
description: |-
  The **Restore-AzApiManagement** cmdlet restores an API Management Service from the specified backup residing in an Azure Storage blob.
