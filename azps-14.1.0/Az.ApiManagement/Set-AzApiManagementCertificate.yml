### YamlMime:PowerShellCmdlet1
uid: Az.ApiManagement.Set-AzApiManagementCertificate
name: Set-AzApiManagementCertificate
module: Az.ApiManagement
isPreview: false
summary: |-
  Modifies an API Management certificate which is configured for mutual authentication with backend.
description: |-
  The **Set-AzApiManagementCertificate** cmdlet modifies an Azure API Management certificate.
parameters:
  cmdletParameters:
  - name: CertificateId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of the certificate to modify.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **PsApiManagementContext** object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: KeyVault
    type: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementKeyVaultEntity" data-throw-if-not-resolved="False" />
    description: |-
      KeyVault used to fetch certificate data.This parameter is required if -PfxFilePath not specified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      passthru
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PfxBytes
    type: <xref href="System.Byte" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of bytes of the certificate file in .pfx format.
      This parameter is required if you do not specify the *PfxFilePath* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Raw
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PfxFilePath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to the certificate file in .pfx format to create and upload.
      This parameter is required if you do not specify the *PfxBytes* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: LoadFromFile
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PfxPassword
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the password for the certificate.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzApiManagementCertificate
        -Context <PsApiManagementContext>
        -CertificateId <String>
        [-PfxFilePath <String>]
        [-PfxPassword <String>]
        [-PassThru]
        [-KeyVault <PsApiManagementKeyVaultEntity>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: LoadFromFile
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzApiManagementCertificate
        -Context <PsApiManagementContext>
        -CertificateId <String>
        [-PfxBytes <Byte[]>]
        [-PfxPassword <String>]
        [-PassThru]
        [-KeyVault <PsApiManagementKeyVaultEntity>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Raw
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementContext" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Byte" data-throw-if-not-resolved="False" />
- name: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementCertificate" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Modify a certificate'
  description: |-
    ```powershell
    $ApiMgmtContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Set-AzApiManagementCertificate -Context $ApiMgmtContext -CertificateId "0123456789" -PfxFilePath "C:\contoso\certificates\apimanagementnew.pfx" -PfxPassword "2222"
    ```

    This command modifies the specified API Management certificate.
