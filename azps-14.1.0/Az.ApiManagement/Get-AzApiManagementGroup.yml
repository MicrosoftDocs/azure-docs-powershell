uid: Az.ApiManagement.Get-AzApiManagementGroup
name: Get-AzApiManagementGroup
module: Az.ApiManagement
isPreview: false
summary: |-
  Gets all or specific API management groups.
description: |-
  The **Get-AzApiManagementGroup** cmdlet gets all or specific API management groups.
