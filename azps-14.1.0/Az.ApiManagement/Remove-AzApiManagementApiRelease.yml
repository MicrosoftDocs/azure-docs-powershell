syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzApiManagementApiRelease
        -Context <PsApiManagementContext>
        -ApiId <String>
        -ReleaseId <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByApiReleaseId
  isDefault: true
