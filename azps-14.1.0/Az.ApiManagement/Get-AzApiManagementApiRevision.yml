uid: Az.ApiManagement.Get-AzApiManagementApiRevision
name: Get-AzApiManagementApiRevision
module: Az.ApiManagement
isPreview: false
summary: |-
  Gets details of all the API Revisions of an API
description: |-
  The **Get-AzApiManagementApiRevision** cmdlet gets the details of all revisions of an API
parameters:
  cmdletParameters:
  - name: ApiId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      API identifier whose revisions we want to list.
      This parameter is required.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ApiRevision
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Revision Identifier of the particular Api revision. This parameter is optional.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementContext" data-throw-if-not-resolved="False" />
    description: |-
      Instance of PsApiManagementContext.
      This parameter is required.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
