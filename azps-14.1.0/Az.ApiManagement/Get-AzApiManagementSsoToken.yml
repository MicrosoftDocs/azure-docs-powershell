### YamlMime:PowerShellCmdlet1
uid: Az.ApiManagement.Get-AzApiManagementSsoToken
name: Get-AzApiManagementSsoToken
module: Az.ApiManagement
isPreview: false
summary: |-
  Gets a link with an SSO token to a deployed management portal of an API Management service.
description: |-
  The **Get-AzApiManagementSsoToken** cmdlet returns a link (URL) containing a single sign-on (SSO) token to a deployed management portal of an API Management service.
