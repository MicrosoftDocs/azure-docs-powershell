syntaxes:
- syntax: |-
    ```Syntax
    Get-AzApiManagementAuthorizationServerClientSecret
        -Context <PsApiManagementContext>
        [-ServerId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ContextParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzApiManagementAuthorizationServerClientSecret
        -ResourceId <String>
        [-ServerId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceIdParameterSet
  isDefault: false
