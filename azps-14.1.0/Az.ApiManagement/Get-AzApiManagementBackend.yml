- name: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementBackend" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all Backends'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Get-AzApiManagementBackend -Context $apimContext
    ```

    Gets a list of all the Backends configured in the Api Management service.
- title: 'Example 2: Get the Backend specified by the Identifier 123'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Get-AzApiManagementBackend -Context $apimContext -backendId 123
    ```

    Get the details of the specified Backend identified by the Identifier '123'
