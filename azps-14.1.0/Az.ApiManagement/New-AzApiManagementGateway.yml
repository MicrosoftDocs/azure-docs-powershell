syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementGateway
        -Context <PsApiManagementContext>
        [-GatewayId <String>]
        [-Description <String>]
        -LocationData <PsApiManagementResourceLocation>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
