syntaxes:
- syntax: |-
    ```Syntax
    Get-AzApiManagementOpenIdConnectProvider
        -Context <PsApiManagementContext>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetAllOpenIdConnectProviders
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzApiManagementOpenIdConnectProvider
        -Context <PsApiManagementContext>
        [-OpenIdConnectProviderId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByOpenIdConnectProviderId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzApiManagementOpenIdConnectProvider
        -Context <PsApiManagementContext>
        [-Name <String>]
