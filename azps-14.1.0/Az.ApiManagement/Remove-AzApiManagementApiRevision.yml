examples:
- title: 'Example 1: Remove an API Revision'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Remove-AzApiManagementApiRevision -Context $apimContext -ApiId "echo-api" -ApiRevision "2"
    ```

    This command removes the `2` revision of the API `echo-api` from API Management service.
