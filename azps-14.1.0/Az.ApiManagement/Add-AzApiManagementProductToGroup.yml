syntaxes:
- syntax: |-
    ```Syntax
    Add-AzApiManagementProductToGroup
        -Context <PsApiManagementContext>
        -GroupId <String>
        -ProductId <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
