uid: Az.ApiManagement.New-AzApiManagementSubscription
name: New-AzApiManagementSubscription
module: Az.ApiManagement
isPreview: false
summary: |-
  Creates a subscription.
description: |-
  The **New-AzApiManagementSubscription** cmdlet creates a subscription.
