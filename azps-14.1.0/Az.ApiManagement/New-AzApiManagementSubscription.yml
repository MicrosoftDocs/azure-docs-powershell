- name: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementSubscription" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Subscribe a user to a product'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    New-AzApiManagementSubscription -Context $apimContext -UserId "777" -ProductId "999"
    ```

    This command subscribes an existing user to a product.
- title: 'Example 2: Create a subscription for all Api Scope'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    New-AzApiManagementSubscription -Context $apimContext -Scope "/apis" -Name "GlobalApiScope"
    ```
- title: 'Example 3: Create a subscription for Product Scope'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    New-AzApiManagementSubscription -Context $apimContext -Scope "/products/starter" -Name "UnlimitedProductSub"
    ```
