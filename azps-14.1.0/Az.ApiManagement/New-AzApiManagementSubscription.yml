syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementSubscription
        -Context <PsApiManagementContext>
        -Name <String>
        -UserId <String>
        -ProductId <String>
        [-SubscriptionId <String>]
        [-PrimaryKey <String>]
        [-SecondaryKey <String>]
        [-AllowTracing]
        [-State <PsApiManagementSubscriptionState>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: OldSubscriptionModel
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzApiManagementSubscription
        -Context <PsApiManagementContext>
        -Name <String>
        -Scope <String>
        [-SubscriptionId <String>]
        [-UserId <String>]
        [-PrimaryKey <String>]
        [-SecondaryKey <String>]
        [-AllowTracing]
        [-State <PsApiManagementSubscriptionState>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: NewSubscriptionModel
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementContext" data-throw-if-not-resolved="False" />
