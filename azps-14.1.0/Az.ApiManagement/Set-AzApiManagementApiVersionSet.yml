        [-Scheme <PsApiManagementVersioningScheme>]
        [-HeaderName <String>]
        [-QueryName <String>]
        [-Description <String>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
