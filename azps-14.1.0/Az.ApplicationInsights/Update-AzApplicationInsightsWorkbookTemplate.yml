syntaxes:
- syntax: |-
    ```Syntax
    Update-AzApplicationInsightsWorkbookTemplate
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Author <String>]
        [-Gallery <IWorkbookTemplateGallery[]>]
        [-Localized <Hashtable>]
        [-Priority <Int32>]
        [-Tag <Hashtable>]
        [-TemplateData <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzApplicationInsightsWorkbookTemplate
        -InputObject <IApplicationInsightsIdentity>
        [-Author <String>]
        [-Gallery <IWorkbookTemplateGallery[]>]
        [-Localized <Hashtable>]
        [-Priority <Int32>]
        [-Tag <Hashtable>]
        [-TemplateData <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
