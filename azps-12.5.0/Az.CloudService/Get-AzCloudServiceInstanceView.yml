syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCloudServiceInstanceView
        -CloudServiceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
