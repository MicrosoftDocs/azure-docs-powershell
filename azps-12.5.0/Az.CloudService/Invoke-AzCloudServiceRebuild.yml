syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzCloudServiceRebuild
        -CloudServiceName <String>
        -ResourceGroupName <String>
        -RoleInstance <String[]>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RebuildExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzCloudServiceRebuild
        -InputObject <ICloudServiceIdentity>
        -RoleInstance <String[]>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
