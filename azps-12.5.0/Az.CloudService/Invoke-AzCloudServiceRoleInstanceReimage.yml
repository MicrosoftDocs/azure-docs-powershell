syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzCloudServiceRoleInstanceReimage
        -CloudServiceName <String>
        -ResourceGroupName <String>
        -RoleInstanceName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Reimage
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzCloudServiceRoleInstanceReimage
        -InputObject <ICloudServiceIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ReimageViaIdentity
  isDefault: false
