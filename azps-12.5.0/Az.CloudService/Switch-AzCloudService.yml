syntaxes:
- syntax: |-
    ```Syntax
    Switch-AzCloudService
        -ResourceGroupName <String>
        -CloudServiceName <String>
        [-SubscriptionId <String>]
        [-Async]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CloudServiceName
  isDefault: true
- syntax: |-
    ```Syntax
    Switch-AzCloudService
        -CloudService <CloudService>
        [-SubscriptionId <String>]
        [-Async]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CloudService
  isDefault: false
