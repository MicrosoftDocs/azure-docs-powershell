outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.CloudService.Models.Api20220904.CloudServiceVaultSecretGroup" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create vault secret group object'
  description: |-
    ```powershell
    $keyVault = Get-AzKeyVault -VaultName 'ContosoKeyVault'
    $certificate = Get-AzKeyVaultCertificate -VaultName 'ContosoKeyVault' -Name 'ContosoCert'
    $secretGroup = New-AzCloudServiceVaultSecretGroupObject -Id $keyVault.ResourceId -CertificateUrl $certificate.SecretId
    ```

    This command creates vault secret group object which is used for creating or updating a cloud service.
    For more details see New-AzCloudService.
