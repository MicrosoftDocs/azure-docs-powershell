syntaxes:
- syntax: |-
    ```Syntax
    Update-AzEventGridSystemTopic
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-EnableSystemAssignedIdentity <Boolean>]
        [-IdentityPrincipalId <String>]
        [-IdentityTenantId <String>]
        [-Location <String>]
        [-Source <String>]
        [-Tag <Hashtable>]
        [-TopicType <String>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzEventGridSystemTopic
        -InputObject <IEventGridIdentity>
        [-EnableSystemAssignedIdentity <Boolean>]
        [-IdentityPrincipalId <String>]
        [-IdentityTenantId <String>]
        [-Location <String>]
        [-Source <String>]
        [-Tag <Hashtable>]
        [-TopicType <String>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
