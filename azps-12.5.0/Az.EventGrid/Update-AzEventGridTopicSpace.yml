syntaxes:
- syntax: |-
    ```Syntax
    Update-AzEventGridTopicSpace
        -Name <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Description <String>]
        [-TopicTemplate <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzEventGridTopicSpace
        -Name <String>
        -NamespaceInputObject <IEventGridIdentity>
        [-Description <String>]
        [-TopicTemplate <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityNamespaceExpanded
  isDefault: false
- syntax: |-
