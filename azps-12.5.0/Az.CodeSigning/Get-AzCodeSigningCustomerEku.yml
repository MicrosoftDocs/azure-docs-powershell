### YamlMime:PowerShellCmdlet1
uid: Az.CodeSigning.Get-AzCodeSigningCustomerEku
name: Get-AzCodeSigningCustomerEku
module: Az.CodeSigning
isPreview: false
summary: |-
  Retrieve Azure.CodeSigning customer Eku
description: |-
  The **Get-AzCodeSigningCustomerEku ** cmdlet retrieves customer Eku.
  Use this cmdlet to retrieve customer Eku.
  There are two sets of parameters. One set uses AccountName, ProfileName, and EndpointUrl.
  Another set uses MetadataFilePath.
parameters:
  cmdletParameters:
  - name: AccountName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure CodeSigning AccountName used to sign CI policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAccountProfileNameParameterSet
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EndpointUrl
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure CodeSigning Endpoint used to sign CI policy. It's an Url, format is `https://xxx.codesigning.azure.net`
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAccountProfileNameParameterSet
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ByMetadataFileParameterSet
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MetadataFilePath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure CodeSigning Metadata file path used to sign CI policy. It's a file path, and the metadata content is below. File content example:
      {
        "Endpoint": "https://xxx.codesigning.azure.net/",
        "CodeSigningAccountName": "acstest",
        "CertificateProfileName": "acstestCert1"
      }
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByMetadataFileParameterSet
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProfileName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure CodeSigning ProfileName used to sign CI policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAccountProfileNameParameterSet
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCodeSigningCustomerEku
        [-AccountName] <String>
        [-ProfileName] <String>
        -EndpointUrl <String>
        -MetadataFilePath <String>
        [<CommonParameters>]
    ```
  parameterSetName: InteractiveSubmit
  isDefault: true
inputs:
- name: <xref href="Azure CodeSigning AccountName" data-throw-if-not-resolved="False" />
- name: <xref href="Azure CodeSigning Profile Name" data-throw-if-not-resolved="False" />
- name: <xref href="Azure CodeSigning Signing EndpointUrl" data-throw-if-not-resolved="False" />
- name: <xref href="Azure CodeSigning UnSigned CI Policy File Path" data-throw-if-not-resolved="False" />
- name: <xref href="Azure CodeSigning Signed CI Policy File Path Destination" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Signed CI Policy file" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Retrieve customer Eku by account and profile name'
  description: |-
    ```powershell
    Get-AzCodeSigningCustomerEku -AccountName 'contoso' -ProfileName 'contososigning' -EndpointUrl 'https://wus.codesigning.azure.net'
    ```

    ```output
    1.3.6.1.5.5.7.3.0
    ```

    This command retrieves the customer eku by account and profile name.
- title: 'Example 2: Retrieve customer Eku by metadata file path'
  description: |-
    ```powershell
    Get-AzCodeSigningCustomerEku -MetadataFilePath 'c:\cisigning\metadata_input.json'
    ```

    ```output
    1.3.6.1.5.5.7.3.0
    ```

    This command retrieves the customer eku by the metadata file configuration.
