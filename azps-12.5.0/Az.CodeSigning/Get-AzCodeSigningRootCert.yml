### YamlMime:PowerShellCmdlet1
uid: Az.CodeSigning.Get-AzCodeSigningRootCert
name: Get-AzCodeSigningRootCert
module: Az.CodeSigning
isPreview: false
summary: |-
  Retrieve Azure.CodeSigning Root Cert
description: |-
  The **Get-AzCodeSigningRootCert** cmdlet retrieves Azure CodeSigning Root Cert.
  Use this cmdlet to retrieve Azure CodeSigning Root Cert.
  There are two sets of parameters. One set uses AccountName, ProfileName, and EndpointUrl.
  Another set uses MetadataFilePath.
parameters:
  cmdletParameters:
  - name: AccountName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure CodeSigning AccountName used to sign CI policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAccountProfileNameParameterSet
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Destination
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the download root cert file path.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAccountProfileNameParameterSet
      position: "5"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ByMetadataFileParameterSet
      position: "5"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EndpointUrl
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure CodeSigning Endpoint used to sign CI policy. It's an Url, format is `https://xxx.codesigning.azure.net`
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAccountProfileNameParameterSet
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ByMetadataFileParameterSet
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MetadataFilePath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure CodeSigning Metadata file path used to sign CI policy. It's a file path, and the metadata content is below. File content example:
      {
        "Endpoint": "https://xxx.codesigning.azure.net/",
        "CodeSigningAccountName": "acstest",
        "CertificateProfileName": "acstestCert1"
      }
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByMetadataFileParameterSet
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProfileName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Azure CodeSigning ProfileName used to sign CI policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByAccountProfileNameParameterSet
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCodeSigningRootCert
        [-AccountName] <String>
        [-ProfileName] <String>
        -EndpointUrl <String>
        -MetadataFilePath <String>
        [<CommonParameters>]
    ```
  parameterSetName: InteractiveSubmit
  isDefault: true
inputs:
- name: <xref href="Azure CodeSigning AccountName" data-throw-if-not-resolved="False" />
- name: <xref href="Azure CodeSigning Profile Name" data-throw-if-not-resolved="False" />
- name: <xref href="Azure CodeSigning Signing EndpointUrl" data-throw-if-not-resolved="False" />
- name: <xref href="Azure CodeSigning UnSigned CI Policy File Path" data-throw-if-not-resolved="False" />
- name: <xref href="Azure CodeSigning Signed CI Policy File Path Destination" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Signed CI Policy file" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Retrieve a root cert by account and profile name'
  description: |-
    ```powershell
    Get-AzCodeSigningRootCert -AccountName 'contoso' -ProfileName 'contososigning' -EndpointUrl 'https://wus.codesigning.azure.net' -Destination 'c:\acs\rootcert.cer'
    ```

    ```output
    Thumbprint                               Subject
    ----------                               -------
    3A7B1F8C2E9D5A0B4F6E2C1D9F4B8A3E         CN=Microsoft Identity Verification Root Certificate Authority 2020, O=Microsoft
    ```

    This command retrieves a root certificate that is currently in use for signing by the account and profile.
- title: 'Example 2: Retrieve a root cert using the metadata file path configuration'
  description: |-
    ```powershell
    Get-AzCodeSigningRootCert -MetadataFilePath 'c:\cisigning\metadata_input.json' -Destination 'c:\acs\rootcert.cer'
    ```

    ```output
    Thumbprint                               Subject
    ----------                               -------
    3A7B1F8C2E9D5A0B4F6E2C1D9F4B8A3E         CN=Microsoft Identity Verification Root Certificate Authority 2020, O=Microsoft
    ```

    This command retrieves a root certificate that is currently in use for signing by the metadata configuration.
