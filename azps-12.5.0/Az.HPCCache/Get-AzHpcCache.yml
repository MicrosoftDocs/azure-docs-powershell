uid: Az.HPCCache.Get-AzHpcCache
name: Get-AzHpcCache
module: Az.HPCCache
isPreview: false
summary: |-
  Gets a cache(s).
description: |-
  The **Get-AzHpcCache** cmdlet gets a single cache, cache(s) in a specific resource group, or subscription wide list of caches.
