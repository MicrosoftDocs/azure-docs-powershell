uid: Az.AnalysisServices.Get-AzAnalysisServicesServer
name: Get-AzAnalysisServicesServer
module: Az.AnalysisServices
isPreview: false
summary: |-
  Gets the details of an Analysis Services server.
description: |-
  The Get-AzAnalysisServicesServer cmdlet gets the details of an Analysis Services server.
notes: |-
  Alias: Get-AzAs
