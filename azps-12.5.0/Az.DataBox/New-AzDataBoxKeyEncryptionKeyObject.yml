syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataBoxKeyEncryptionKeyObject
        -KekType <KekType>
        [-IdentityProperty <IIdentityProperties>]
        [-KekUrl <String>]
        [-KekVaultResourceId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
