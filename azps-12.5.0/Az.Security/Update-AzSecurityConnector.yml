syntaxes:
- syntax: |-
    ```Syntax
    Update-AzSecurityConnector
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-EnvironmentData <ISecurityConnectorEnvironment>]
        [-EnvironmentName <String>]
        [-Etag <String>]
        [-HierarchyIdentifier <String>]
        [-Kind <String>]
        [-Location <String>]
        [-Offering <ICloudOffering[]>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzSecurityConnector
        -InputObject <ISecurityIdentity>
        [-EnvironmentData <ISecurityConnectorEnvironment>]
        [-EnvironmentName <String>]
        [-Etag <String>]
        [-HierarchyIdentifier <String>]
        [-Kind <String>]
        [-Location <String>]
        [-Offering <ICloudOffering[]>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
