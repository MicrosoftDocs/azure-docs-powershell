examples:
- title: Example 1
  description: |-
    ```powershell
    New-AzDeviceSecurityGroupAllowlistCustomAlertRuleObject -Enabled $false -Type "LocalUserNotAllowed" -AllowlistValue @()
    ```

    ```output
    RuleType: "LocalUserNotAllowed"
    DisplayName: "Login by a local user that isn't allowed"
    Description: "Get an alert when a local user that isn't allowed logins to the device"
    IsEnabled: false
    ValueType: "String"
    AllowlistValues: []
    ```

    Create new allow list custom alert rule from type "LocalUserNotAllowed" with status set to disable
