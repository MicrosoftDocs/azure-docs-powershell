syntaxes:
- syntax: |-
    ```Syntax
    Add-AzSecurityAdaptiveNetworkHardening
        -AdaptiveNetworkHardeningResourceName <String>
        -ResourceGroupName <String>
        -ResourceName <String>
        -ResourceNamespace <String>
        -ResourceType <String>
        -SubscriptionId <String>
        -Rule <PSSecurityAdaptiveNetworkHardeningsRule[]>
        -NetworkSecurityGroup <System.Collections.Generic.List`1[System.String]>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
