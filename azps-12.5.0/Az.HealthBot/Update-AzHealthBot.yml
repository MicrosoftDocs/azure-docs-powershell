syntaxes:
- syntax: |-
    ```Syntax
    Update-AzHealthBot
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Sku <SkuName>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzHealthBot
        -InputObject <IHealthBotIdentity>
        [-Sku <SkuName>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
