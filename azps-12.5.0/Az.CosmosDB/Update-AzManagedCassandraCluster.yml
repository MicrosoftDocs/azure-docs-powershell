    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Update-AzManagedCassandraCluster
        -ResourceGroupName <String>
        -ClusterName <String>
        [-Tag <Hashtable>]
        [-ExternalGossipCertificate <String[]>]
        [-ClientCertificate <String[]>]
        [-RepairEnabled <Boolean>]
        [-TimeBetweenBackupInHours <Int32>]
        [-AuthenticationMethod <String>]
        [-CassandraVersion <String>]
        [-ExternalSeedNode <String[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzManagedCassandraCluster
        -ResourceId <String>
        [-Tag <Hashtable>]
        [-ExternalGossipCertificate <String[]>]
        [-ClientCertificate <String[]>]
        [-RepairEnabled <Boolean>]
        [-TimeBetweenBackupInHours <Int32>]
        [-AuthenticationMethod <String>]
        [-CassandraVersion <String>]
        [-ExternalSeedNode <String[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceIdParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Update-AzManagedCassandraCluster
        -InputObject <PSClusterResource>
        [-Tag <Hashtable>]
        [-ExternalGossipCertificate <String[]>]
        [-ClientCertificate <String[]>]
        [-RepairEnabled <Boolean>]
        [-TimeBetweenBackupInHours <Int32>]
        [-AuthenticationMethod <String>]
        [-CassandraVersion <String>]
        [-ExternalSeedNode <String[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByObjectParameterSet
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.CosmosDB.Models.PSClusterResource" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.CosmosDB.Models.PSClusterResource" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Update-AzManagedCassandraCluster `
     -ResourceGroupName "resourceGroupName" `
     -ClusterName "clusterName" `
     -ExternalGossipCertificate "certificates" `
     -ClientCertificate "certificates" `
     -RepairEnabled $true
    ```
- title: Example 2
  description: |-
    ```powershell
    Update-AzManagedCassandraCluster `
     -ResourceId "clusterResourceId" `
     -ExternalGossipCertificate "certificates" `
     -ClientCertificate "certificates" `
     -RepairEnabled $true
    ```
- title: Example 3
  description: |-
    ```powershell
    $clusterResource | Update-AzManagedCassandraCluster `
     -ExternalGossipCertificate "certificates" `
     -ClientCertificate "certificates" `
     -RepairEnabled $true
    ```
