syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCosmosDBMongoDBUserDefinition
        -ResourceGroupName <String>
        -AccountName <String>
        [-Id <String>]
        [-DatabaseName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzCosmosDBMongoDBUserDefinition
        -DatabaseAccountObject <PSDatabaseAccountGetResults>
        [-Id <String>]
        [-DatabaseName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByParentObjectParameterSet
