### YamlMime:PowerShellCmdlet1
uid: Az.CosmosDB.New-AzCosmosDBSqlIncludedPathIndex
name: New-AzCosmosDBSqlIncludedPathIndex
module: Az.CosmosDB
isPreview: false
summary: |-
  Creates a new object of type PSIndexes. It can be passed as a parameter value for Set-AzCosmosDBSqlIncludedPath.
description: |-
  Object corresponding to Sql API's IncludedPath's Indexes.
parameters:
  cmdletParameters:
  - name: DataType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Datatype for which the indexing behavior is applied to.
      Possible values include: 'String', 'Number', 'Point', 'Polygon', 'LineString', 'MultiPolygon'
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Kind
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Indicates the type of index.
      Possible values include: 'Hash', 'Range', 'Spatial'
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Precision
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      The precision of the index.
      -1 is maximum precision.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzCosmosDBSqlIncludedPathIndex
        -DataType <String>
        [-Precision <Int32>]
        -Kind <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.CosmosDB.Models.PSIndexes" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    New-AzCosmosDBSqlIncludedPathIndex -DataType String -Precision -1 -Kind Hash
    ```

    ```output
    DataType Precision Kind
    -------- --------- ----
    String          -1 Hash
    ```
