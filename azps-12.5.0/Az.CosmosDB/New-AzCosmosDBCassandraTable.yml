syntaxes:
- syntax: |-
    ```Syntax
    New-AzCosmosDBCassandraTable
        -ResourceGroupName <String>
        -AccountName <String>
        -KeyspaceName <String>
        -Name <String>
        -Schema <PSCassandraSchema>
        [-Throughput <Int32>]
        [-AutoscaleMaxThroughput <Int32>]
        [-TtlInSeconds <Int32>]
        [-AnalyticalStorageTtl <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzCosmosDBCassandraTable
        -Name <String>
        -Schema <PSCassandraSchema>
        -ParentObject <PSCassandraKeyspaceGetResults>
        [-Throughput <Int32>]
        [-AutoscaleMaxThroughput <Int32>]
        [-TtlInSeconds <Int32>]
        [-AnalyticalStorageTtl <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByParentObjectParameterSet
  isDefault: false
