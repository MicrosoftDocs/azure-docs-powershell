examples:
- title: Example 1
  description: |-
    ```powershell
    $index1 = New-AzCosmosDBGremlinIncludedPathIndex -DataType String -Precision -1 -Kind Hash
    New-AzCosmosDBGremlinIncludedPath -Path "/*" -Index $index1
    ```

    ```output
    Path Indexes
    ---- -------
    /*   {Microsoft.Azure.Commands.CosmosDB.Models.PSIndexes}
    ```
