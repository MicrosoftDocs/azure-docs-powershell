syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCosmosDBMongoDBCollection
        -ResourceGroupName <String>
        -AccountName <String>
        -DatabaseName <String>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameParameterSet
  isDefault: true
- syntax: |-
