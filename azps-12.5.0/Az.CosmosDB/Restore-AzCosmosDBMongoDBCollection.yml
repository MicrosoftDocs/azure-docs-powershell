uid: Az.CosmosDB.Restore-AzCosmosDBMongoDBCollection
name: Restore-AzCosmosDBMongoDBCollection
module: Az.CosmosDB
isPreview: false
summary: |-
  Restore a deleted mongodb collection in a database to a given timestamp in the same account
description: |-
