uid: Az.SpringCloud.New-AzSpringCloudAppDeployment
name: New-AzSpringCloudAppDeployment
module: Az.SpringCloud
isPreview: false
summary: |-
  Create a new Deployment or update an exiting Deployment.
description: |-
  Create a new Deployment or update an exiting Deployment.
notes: |-
  ALIASES

  COMPLEX PARAMETER PROPERTIES

  To create the parameters described below, construct a hash table containing the appropriate properties. For information on hash tables, run Get-Help about_Hash_Tables.


  `SOURCE <IUserSourceInfo>`: Uploaded source information of the deployment.
    - `Type <String>`: Type of the source uploaded
    - `[Version <String>]`: Version of the source
