syntaxes:
- syntax: |-
    ```Syntax
    New-AzSpringCloudAppBinding
        -AppName <String>
        -Name <String>
        -ResourceGroupName <String>
        -ServiceName <String>
        [-SubscriptionId <String>]
        [-BindingParameter <Hashtable>]
        [-Key <String>]
        [-ResourceId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
