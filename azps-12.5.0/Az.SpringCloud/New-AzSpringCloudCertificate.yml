syntaxes:
- syntax: |-
    ```Syntax
    New-AzSpringCloudCertificate
        -Name <String>
        -ResourceGroupName <String>
        -ServiceName <String>
        [-SubscriptionId <String>]
        [-Property <ICertificateProperties>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
