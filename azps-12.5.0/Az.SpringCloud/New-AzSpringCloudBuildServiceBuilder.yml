syntaxes:
- syntax: |-
    ```Syntax
    New-AzSpringCloudBuildServiceBuilder
        -Name <String>
        -ResourceGroupName <String>
        -ServiceName <String>
        [-SubscriptionId <String>]
        [-BuildpackGroup <IBuildpacksGroupProperties[]>]
        [-StackId <String>]
        [-StackVersion <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
