syntaxes:
- syntax: |-
    ```Syntax
    New-AzQuantumWorkspace
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        [-IdentityType <ResourceIdentityType>]
        [-Provider <IProvider[]>]
        [-StorageAccount <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
