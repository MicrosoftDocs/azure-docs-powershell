syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataLakeAnalyticsComputePolicy
        [-ResourceGroupName <String>]
        [-Account] <String>
        [-Name] <String>
        [-ObjectId] <Guid>
        [-ObjectType] <String>
        [-MaxAnalyticsUnitsPerJob <Int32>]
        [-MinPriorityPerJob <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
