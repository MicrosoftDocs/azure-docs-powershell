syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataLakeAnalyticsJobPipeline
        [-Account] <String>
        [-SubmittedAfter <DateTimeOffset>]
        [-SubmittedBefore <DateTimeOffset>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetAllInAccount
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDataLakeAnalyticsJobPipeline
        [-Account] <String>
        [-PipelineId] <Guid>
        [-SubmittedAfter <DateTimeOffset>]
        [-SubmittedBefore <DateTimeOffset>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetBySpecificJobPipeline
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Guid" data-throw-if-not-resolved="False" />
- name: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.DataLakeAnalytics.Models.PSJobPipelineInformation" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a specified pipeline'
  description: |-
    ```powershell
    Get-AzDataLakeAnalyticsJobPipeline -Account "contosoadla" -PipelineId 83cb7ad2-3523-4b82-b909-d478b0d8aea3
    ```

    This command gets the specified pipeline with id '83cb7ad2-3523-4b82-b909-d478b0d8aea3' in account 'contosoadla'.
- title: 'Example 2: Get a list of all pipelines in the account'
  description: |-
    ```powershell
    Get-AzDataLakeAnalyticsJobPipeline -AccountName "contosoadla"
    ```

    This command gets a list of all pipelines in the account "contosoadla"
