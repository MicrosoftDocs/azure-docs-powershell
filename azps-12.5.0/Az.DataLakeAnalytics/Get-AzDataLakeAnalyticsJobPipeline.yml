uid: Az.DataLakeAnalytics.Get-AzDataLakeAnalyticsJobPipeline
name: Get-AzDataLakeAnalyticsJobPipeline
module: Az.DataLakeAnalytics
isPreview: false
summary: |-
  Gets a Data Lake Analytics Job pipeline or pipelines.
description: |-
  The **Get-AzDataLakeAnalyticsJobPipeline** gets a specified Azure Data Lake Analytics Job pipeline or a list of pipelines.
parameters:
  cmdletParameters:
  - name: Account
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of the Data Lake Analytics account name under which want to retrieve the job pipeline.
    aliases:
    - AccountName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PipelineId
    type: <xref href="System.Guid" data-throw-if-not-resolved="False" />
    description: |-
      ID of the specific job pipeline to return information for.
    aliases:
    - Id
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetBySpecificJobPipeline
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubmittedAfter
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.DateTimeOffset" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      An optional filter which returns job pipeline(s) only submitted after the specified time.
    defaultValue: None
    dontShow: false
    isDynamic: false
