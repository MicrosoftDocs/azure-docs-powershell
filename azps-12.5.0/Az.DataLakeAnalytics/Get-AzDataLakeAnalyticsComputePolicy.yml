syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataLakeAnalyticsComputePolicy
        [-ResourceGroupName <String>]
        [-Account] <String>
        [[-Name] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
