syntaxes:
- syntax: |-
    ```Syntax
    Wait-AzDataLakeAnalyticsJob
        [-Account] <String>
        [-JobId] <Guid>
        [[-WaitIntervalInSeconds] <Int32>]
        [[-TimeoutInSeconds] <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
