uid: Az.DataLakeAnalytics.Wait-AzDataLakeAnalyticsJob
name: Wait-AzDataLakeAnalyticsJob
module: Az.DataLakeAnalytics
isPreview: false
summary: |-
  Waits for a job to complete.
description: |-
  The **Wait-AzDataLakeAnalyticsJob** cmdlet waits for an Azure Data Lake Analytics job to complete.
parameters:
  cmdletParameters:
  - name: Account
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Data Lake Analytics account name.
    aliases:
    - AccountName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: JobId
    type: <xref href="System.Guid" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of the job for which to wait.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TimeoutInSeconds
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of seconds to wait before exiting the wait operation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WaitIntervalInSeconds
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
