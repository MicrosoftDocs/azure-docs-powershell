syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDataLakeAnalyticsCatalogCredential
        [-Account] <String>
        [-DatabaseName] <String>
        [-CredentialName] <String>
        [-Credential] <PSCredential>
        [-NewPassword] <PSCredential>
        [-Uri] <Uri>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByHostNameAndPort
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzDataLakeAnalyticsCatalogCredential
        [-Account] <String>
        [-DatabaseName] <String>
        [-CredentialName] <String>
        [-Credential] <PSCredential>
        [-NewPassword] <PSCredential>
        [-DatabaseHost] <String>
        [-Port] <Int32>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
