syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDataLakeAnalyticsDataSource
        [-Account] <String>
        [-Blob] <String>
        [-AccessKey] <String>
        [[-ResourceGroupName] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
