syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataLakeAnalyticsDataSource
        [-Account] <String>
        [-DataLakeStore] <String>
        [[-ResourceGroupName] <String>]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveDataLakeStorageAccount
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzDataLakeAnalyticsDataSource
        [-Account] <String>
        [-Blob] <String>
        [[-ResourceGroupName] <String>]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
