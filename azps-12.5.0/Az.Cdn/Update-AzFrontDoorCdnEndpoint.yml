syntaxes:
- syntax: |-
    ```Syntax
    Update-AzFrontDoorCdnEndpoint
        -EndpointName <String>
        -ProfileName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-EnabledState <EnabledState>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzFrontDoorCdnEndpoint
        -InputObject <ICdnIdentity>
        [-EnabledState <EnabledState>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
