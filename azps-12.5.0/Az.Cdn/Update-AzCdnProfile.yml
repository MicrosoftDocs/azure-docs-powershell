syntaxes:
- syntax: |-
    ```Syntax
    Update-AzCdnProfile
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-OriginResponseTimeoutSecond <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
