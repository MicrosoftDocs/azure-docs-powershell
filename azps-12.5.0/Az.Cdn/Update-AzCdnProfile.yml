    Update-AzCdnProfile
        -InputObject <ICdnIdentity>
        [-OriginResponseTimeoutSecond <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
