### YamlMime:PowerShellCmdlet1
uid: Az.Cdn.New-AzCdnUrlRedirectActionObject
name: New-AzCdnUrlRedirectActionObject
module: Az.Cdn
isPreview: false
summary: |-
  Create an in-memory object for UrlRedirectAction.
description: |-
  Create an in-memory object for UrlRedirectAction.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Cdn.Support.DeliveryRuleAction" data-throw-if-not-resolved="False" />
    description: |-
      The name of the action for the delivery rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ParameterCustomFragment
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Fragment to add to the redirect URL.
      Fragment is the part of the URL that comes after #.
      Do not include the #.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ParameterCustomHostname
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Host to redirect.
      Leave empty to use the incoming host as the destination host.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ParameterCustomPath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The full path to redirect.
      Path cannot be empty and must start with /.
      Leave empty to use the incoming path as destination path.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ParameterCustomQueryString
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The set of query strings to be placed in the redirect URL.
      Setting this value would replace any existing query string; leave empty to preserve the incoming query string.
      Query string must be in \<key\>=\<value\> format.
      ? and & will be added automatically so do not include them.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ParameterDestinationProtocol
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Cdn.Support.DestinationProtocol" data-throw-if-not-resolved="False" />
    description: |-
      Protocol to use for the redirect.
      The default value is MatchRequest.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ParameterRedirectType
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Cdn.Support.RedirectType" data-throw-if-not-resolved="False" />
    description: |-
      The redirect type the rule will use when redirecting traffic.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzCdnUrlRedirectActionObject
        -ParameterRedirectType <RedirectType>
        -Name <DeliveryRuleAction>
        [-ParameterCustomFragment <String>]
        [-ParameterCustomHostname <String>]
        [-ParameterCustomPath <String>]
        [-ParameterCustomQueryString <String>]
        [-ParameterDestinationProtocol <DestinationProtocol>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Cdn.Models.Api20240201.UrlRedirectAction" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an in-memory object for UrlRedirectAction'
  description: |-
    ```powershell
    New-AzCdnUrlRedirectActionObject -Name rule01 -ParameterRedirectType redirect
    ```

    ```output
    Name
    ----
    rule01
    ```

    Create an in-memory object for UrlRedirectAction
