uid: Az.Cdn.New-AzCdnDeliveryRuleObject
name: New-AzCdnDeliveryRuleObject
module: Az.Cdn
isPreview: false
summary: |-
  Create an in-memory object for DeliveryRule.
description: |-
  Create an in-memory object for DeliveryRule.
parameters:
  cmdletParameters:
  - name: Action
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Cdn.Models.Api20240201.IDeliveryRuleAction1" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      A list of actions that are executed when all the conditions of a rule are satisfied.
      To construct, see NOTES section for ACTION properties and create a hash table.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Condition
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Cdn.Models.Api20240201.IDeliveryRuleCondition" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      A list of conditions that must be matched for the actions to be executed.
      To construct, see NOTES section for CONDITION properties and create a hash table.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of the rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Order
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      The order in which the rules are applied for the endpoint.
      Possible values {0,1,2,3,………}.
      A rule with a lesser order will be applied before a rule with a greater order.
      Rule with order 0 is a special rule.
      It does not require any condition and actions listed in it will always be applied.
    defaultValue: None
