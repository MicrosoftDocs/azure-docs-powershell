syntaxes:
- syntax: |-
    ```Syntax
    New-AzCdnDeliveryRuleObject
        -Action <IDeliveryRuleAction1[]>
        -Order <Int32>
        [-Condition <IDeliveryRuleCondition[]>]
        [-Name <String>]
        [<CommonParameters>]
    ```
