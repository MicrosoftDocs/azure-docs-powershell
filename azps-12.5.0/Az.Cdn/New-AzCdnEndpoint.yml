### YamlMime:PowerShellCmdlet1
uid: Az.Cdn.New-AzCdnEndpoint
name: New-AzCdnEndpoint
module: Az.Cdn
isPreview: false
summary: |-
  Creates a new CDN endpoint with the specified endpoint name under the specified subscription, resource group and profile.
