syntaxes:
- syntax: |-
    ```Syntax
    Update-AzFrontDoorCdnProfile
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-LogScrubbingRule <IProfileScrubbingRules[]>]
        [-LogScrubbingState <ProfileScrubbingState>]
        [-OriginResponseTimeoutSecond <Int32>]
        [-Tag <Hashtable>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzFrontDoorCdnProfile
        -InputObject <ICdnIdentity>
        [-LogScrubbingRule <IProfileScrubbingRules[]>]
        [-LogScrubbingState <ProfileScrubbingState>]
        [-OriginResponseTimeoutSecond <Int32>]
        [-Tag <Hashtable>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
