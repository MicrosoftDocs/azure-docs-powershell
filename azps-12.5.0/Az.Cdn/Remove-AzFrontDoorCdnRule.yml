syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzFrontDoorCdnRule
        -Name <String>
        -ProfileName <String>
        -ResourceGroupName <String>
        -SetName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzFrontDoorCdnRule
        -InputObject <ICdnIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
