syntaxes:
- syntax: |-
    ```Syntax
    Update-AzCdnEndpoint
        -Name <String>
        -ProfileName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ContentTypesToCompress <String[]>]
        [-DefaultOriginGroupId <String>]
        [-DeliveryPolicyDescription <String>]
        [-DeliveryPolicyRule <IDeliveryRule[]>]
        [-GeoFilter <IGeoFilter[]>]
        [-IsCompressionEnabled]
        [-IsHttpAllowed]
        [-IsHttpsAllowed]
        [-OptimizationType <OptimizationType>]
        [-OriginHostHeader <String>]
        [-OriginPath <String>]
        [-ProbePath <String>]
        [-QueryStringCachingBehavior <QueryStringCachingBehavior>]
        [-Tag <Hashtable>]
        [-UrlSigningKey <IUrlSigningKey[]>]
        [-WebApplicationFirewallPolicyLinkId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded1
  isDefault: true
