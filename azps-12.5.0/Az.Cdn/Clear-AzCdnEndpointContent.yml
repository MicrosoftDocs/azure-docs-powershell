syntaxes:
- syntax: |-
    ```Syntax
    Clear-AzCdnEndpointContent
        -EndpointName <String>
        -ProfileName <String>
        -ResourceGroupName <String>
        -ContentPath <String[]>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PurgeExpanded1
  isDefault: true
