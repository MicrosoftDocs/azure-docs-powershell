syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzFrontDoorCdnEndpoint
        -EndpointName <String>
        -ProfileName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzFrontDoorCdnEndpoint
        -InputObject <ICdnIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteViaIdentity
  isDefault: false
