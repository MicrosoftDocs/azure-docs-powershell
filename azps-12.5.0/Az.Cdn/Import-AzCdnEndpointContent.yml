syntaxes:
- syntax: |-
    ```Syntax
    Import-AzCdnEndpointContent
        -EndpointName <String>
        -ProfileName <String>
        -ResourceGroupName <String>
        -ContentPath <String[]>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: LoadExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Import-AzCdnEndpointContent
        -EndpointName <String>
        -ProfileName <String>
        -ResourceGroupName <String>
        -ContentFilePath <ILoadParameters>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Load
  isDefault: false
