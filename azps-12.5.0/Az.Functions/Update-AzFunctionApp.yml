syntaxes:
- syntax: |-
    ```Syntax
    Update-AzFunctionApp
        -ResourceGroupName <String>
        -Name <String>
        [-SubscriptionId <String>]
        [-PlanName <String>]
        [-Force]
        [-ApplicationInsightsName <String>]
        [-ApplicationInsightsKey <String>]
        [-Tag <Hashtable>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityID <String[]>]
        [-DefaultProfile <PSObject>]
        [-NoWait]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzFunctionApp
        -InputObject <ISite>
        [-PlanName <String>]
        [-Force]
        [-ApplicationInsightsName <String>]
        [-ApplicationInsightsKey <String>]
        [-Tag <Hashtable>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityID <String[]>]
        [-DefaultProfile <PSObject>]
        [-NoWait]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByObjectInput
  isDefault: false
