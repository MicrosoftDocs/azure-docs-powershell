syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzFunctionAppPlan
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Force]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzFunctionAppPlan
        -InputObject <IAppServicePlan>
        [-Force]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByObjectInput
  isDefault: false
