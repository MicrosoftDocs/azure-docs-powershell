syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDiskPoolIscsiTarget
        -DiskPoolName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Lun <IIscsiLun[]>]
        [-ManagedBy <String>]
        [-ManagedByExtended <String[]>]
        [-StaticAcl <IAcl[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDiskPoolIscsiTarget
        -InputObject <IDiskPoolIdentity>
        [-Lun <IIscsiLun[]>]
        [-ManagedBy <String>]
        [-ManagedByExtended <String[]>]
        [-StaticAcl <IAcl[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
