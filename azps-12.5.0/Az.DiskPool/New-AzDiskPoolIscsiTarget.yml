syntaxes:
- syntax: |-
    ```Syntax
    New-AzDiskPoolIscsiTarget
        -DiskPoolName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -AclMode <IscsiTargetAclMode>
        [-Lun <IIscsiLun[]>]
        [-ManagedBy <String>]
        [-ManagedByExtended <String[]>]
        [-StaticAcl <IAcl[]>]
        [-TargetIqn <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
