syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDiskPool
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DiskId <String[]>]
        [-ManagedBy <String>]
        [-ManagedByExtended <String[]>]
        [-SkuName <String>]
        [-SkuTier <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDiskPool
        -InputObject <IDiskPoolIdentity>
        [-DiskId <String[]>]
        [-ManagedBy <String>]
        [-ManagedByExtended <String[]>]
        [-SkuName <String>]
        [-SkuTier <String>]
        [-Tag <Hashtable>]
