syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzDiskPool
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Deallocate
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzDiskPool
        -InputObject <IDiskPoolIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeallocateViaIdentity
  isDefault: false
