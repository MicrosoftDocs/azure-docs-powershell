syntaxes:
- syntax: |-
    ```Syntax
    Update-AzMySqlVirtualNetworkRule
        -Name <String>
        -ResourceGroupName <String>
        -ServerName <String>
        -SubnetId <String>
        [-SubscriptionId <String>]
        [-IgnoreMissingVnetServiceEndpoint]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzMySqlVirtualNetworkRule
        -InputObject <IMySqlIdentity>
        -SubnetId <String>
        [-IgnoreMissingVnetServiceEndpoint]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
