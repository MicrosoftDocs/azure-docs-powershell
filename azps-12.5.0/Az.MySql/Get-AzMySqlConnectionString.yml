syntaxes:
- syntax: |-
    ```Syntax
    Get-AzMySqlConnectionString
        -Client <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzMySqlConnectionString
        -Client <String>
        -InputObject <IServer>
        [-DefaultProfile <PSObject>]
