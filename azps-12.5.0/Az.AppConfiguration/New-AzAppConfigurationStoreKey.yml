syntaxes:
- syntax: |-
    ```Syntax
    New-AzAppConfigurationStoreKey
        -Name <String>
        -ResourceGroupName <String>
        -Id <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RegenerateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzAppConfigurationStoreKey
        -InputObject <IAppConfigurationIdentity>
        -Id <String>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RegenerateViaIdentityExpanded
  isDefault: false
