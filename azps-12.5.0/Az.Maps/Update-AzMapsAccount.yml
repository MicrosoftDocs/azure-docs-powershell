syntaxes:
- syntax: |-
    ```Syntax
    Update-AzMapsAccount
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DisableLocalAuth]
        [-Kind <Kind>]
        [-SkuName <Name>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzMapsAccount
        -InputObject <IMapsIdentity>
        [-DisableLocalAuth]
        [-Kind <Kind>]
        [-SkuName <Name>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
