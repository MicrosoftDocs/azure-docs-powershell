syntaxes:
- syntax: |-
    ```Syntax
    New-AzMapsAccount
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        -SkuName <Name>
        [-DisableLocalAuth]
        [-Kind <Kind>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
