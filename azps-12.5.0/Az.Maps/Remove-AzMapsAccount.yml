- title: 'Example 1: Delete a Maps Account'
  description: |-
    ```powershell
    Remove-AzMapsAccount -ResourceGroupName azure-rg-test -Name pwsh-mapsAccount01
    ```

    This command deletes a Maps Account.
- title: 'Example 2: Delete a Maps Account by pipeline'
