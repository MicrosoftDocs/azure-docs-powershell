syntaxes:
- syntax: |-
    ```Syntax
    Set-AzApplicationInsightsPricingPlan
        -ResourceGroupName <String>
        -Name <String>
        [-SubscriptionId <String>]
        [-PricingPlan <String>]
        [-DailyCapGB <Double>]
        [-DisableNotificationWhenHitCap]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
