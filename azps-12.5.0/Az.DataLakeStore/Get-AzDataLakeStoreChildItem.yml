examples:
- title: 'Example 1: Get the child items for a folder'
  description: |-
    ```powershell
    Get-AzDataLakeStoreChildItem -AccountName "ContosoADL" -Path "/MyFiles/"
    ```

    This command gets the child items for the MyFiles folder.
