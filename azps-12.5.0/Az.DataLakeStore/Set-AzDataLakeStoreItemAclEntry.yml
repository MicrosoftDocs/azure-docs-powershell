syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDataLakeStoreItemAclEntry
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [-Acl] <DataLakeStoreItemAce[]>
        [-PassThru]
        [-Recurse]
        [-Concurrency <Int32>]
        [-ShowProgress]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByACLObject
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzDataLakeStoreItemAclEntry
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [-AceType] <AceType>
        [[-Id] <Guid>]
        [-Permissions] <Permission>
        [-Default]
        [-PassThru]
        [-Recurse]
        [-Concurrency <Int32>]
        [-ShowProgress]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetSpecificACE
  isDefault: false
