syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataLakeStoreItemAclEntry
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [-Acl] <DataLakeStoreItemAce[]>
        [-PassThru]
        [-Recurse]
        [-Concurrency <Int32>]
        [-ShowProgress]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByACLObject
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDataLakeStoreItemAclEntry
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [-AceType] <AceType>
        [[-Id] <Guid>]
        [-Default]
        [-PassThru]
        [-Recurse]
        [-Concurrency <Int32>]
        [-ShowProgress]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
