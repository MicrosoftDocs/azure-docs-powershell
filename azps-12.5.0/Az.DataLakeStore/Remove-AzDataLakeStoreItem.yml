examples:
- title: 'Example 1: Remove multiple items'
  description: |-
    ```powershell
    Remove-AzDataLakeStoreItem -AccountName "ContosoADL" -Paths "/File01.txt","/MyFiles/File.csv"
    ```

    This command removes the files File01.txt and File.csv from the Data Lake Store.
