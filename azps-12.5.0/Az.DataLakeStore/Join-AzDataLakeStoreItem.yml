syntaxes:
- syntax: |-
    ```Syntax
    Join-AzDataLakeStoreItem
        [-Account] <String>
        [-Paths] <DataLakeStorePathInstance[]>
        [-Destination] <DataLakeStorePathInstance>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
