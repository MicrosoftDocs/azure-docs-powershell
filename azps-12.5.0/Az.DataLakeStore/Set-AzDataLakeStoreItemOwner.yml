syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDataLakeStoreItemOwner
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [-Type] <Owner>
        [-Id] <Guid>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
