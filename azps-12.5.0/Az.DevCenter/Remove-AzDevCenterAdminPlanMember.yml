syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDevCenterAdminPlanMember
        -MemberName <String>
        -PlanName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDevCenterAdminPlanMember
        -InputObject <IDevCenterIdentity>
        [-DefaultProfile <PSObject>]
