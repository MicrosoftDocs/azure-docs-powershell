syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDevCenterAdminProject
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-CatalogSettingCatalogItemSyncType <CatalogItemType[]>]
        [-Description <String>]
        [-DisplayName <String>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-MaxDevBoxesPerUser <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDevCenterAdminProject
        -InputObject <IDevCenterIdentity>
        [-CatalogSettingCatalogItemSyncType <CatalogItemType[]>]
        [-Description <String>]
        [-DisplayName <String>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-MaxDevBoxesPerUser <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
