syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzDevCenterUserDelayEnvironmentAction
        -Endpoint <String>
        -Name <String>
        -EnvironmentName <String>
        -ProjectName <String>
        -DelayTime <TimeSpan>
        [-UserId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delay
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzDevCenterUserDelayEnvironmentAction
        -DevCenterName <String>
