syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDevCenterAdminCatalog
        -DevCenterName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AdoGitBranch <String>]
        [-AdoGitPath <String>]
        [-AdoGitSecretIdentifier <String>]
        [-AdoGitUri <String>]
        [-GitHubBranch <String>]
        [-GitHubPath <String>]
        [-GitHubSecretIdentifier <String>]
        [-GitHubUri <String>]
        [-SyncType <CatalogSyncType>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDevCenterAdminCatalog
        -InputObject <IDevCenterIdentity>
        [-AdoGitBranch <String>]
