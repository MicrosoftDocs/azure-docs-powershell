uid: Az.DevCenter.Get-AzDevCenterAdminNetworkConnectionOutboundNetworkDependencyEndpoint
name: Get-AzDevCenterAdminNetworkConnectionOutboundNetworkDependencyEndpoint
module: Az.DevCenter
isPreview: false
summary: |-
  Lists the endpoints that agents may call as part of Dev Box service administration.
  These FQDNs should be allowed for outbound access in order for the Dev Box service to function.
