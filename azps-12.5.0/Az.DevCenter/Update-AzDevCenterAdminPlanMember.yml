syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDevCenterAdminPlanMember
        -MemberName <String>
        -PlanName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
