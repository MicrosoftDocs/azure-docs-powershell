syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDevCenterAdminDevBoxDefinition
        -DevCenterName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-HibernateSupport <HibernateSupport>]
        [-ImageReferenceId <String>]
        [-OSStorageType <String>]
        [-SkuCapacity <Int32>]
        [-SkuFamily <String>]
        [-SkuName <String>]
        [-SkuSize <String>]
        [-SkuTier <SkuTier>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
