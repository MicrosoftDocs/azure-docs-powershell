    Skip-AzDevCenterUserDevBoxAction
        -Endpoint <String>
        -Name <String>
        -DevBoxName <String>
        -ProjectName <String>
        [-UserId <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
