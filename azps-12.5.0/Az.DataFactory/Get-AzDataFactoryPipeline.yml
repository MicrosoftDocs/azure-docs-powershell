    type: <xref href="Microsoft.Azure.Commands.DataFactories.Models.PSDataFactory" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **PSDataFactory** object.
      This cmdlet gets pipelines that belong to the data factory that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFactoryObject
