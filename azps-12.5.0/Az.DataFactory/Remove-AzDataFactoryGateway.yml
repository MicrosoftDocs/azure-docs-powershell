examples:
- title: 'Example 1: Remove a gateway'
  description: |-
    ```powershell
    Remove-AzDataFactoryGateway -Name "ContosoGateway" -DataFactoryName "WikiADF" -ResourceGroupName "ADF"
    ```

    ```output
    Confirm
    Are you sure you want to remove gateway 'ContosoGateway' in data factory 'WikiADF'?
     [Y] Yes  [N] No  [S] Suspend  [?] Help (default is Y): Y
    True
    ```

    This command removes the gateway named ContosoGateway from the data factory named WikiADF.
