syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataFactoryGateway
        [-DataFactoryName] <String>
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDataFactoryGateway
        [-DataFactory] <PSDataFactory>
        [-Name] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryObject
  isDefault: false
