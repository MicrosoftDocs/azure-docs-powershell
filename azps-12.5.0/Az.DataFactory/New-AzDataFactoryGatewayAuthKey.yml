examples:
- title: 'Example 1: Creates a gateway auth key for Key1'
  description: |-
    ```powershell
    New-AzDataFactoryGatewayAuthKey -ResourceGroupName ADFResource -GatewayName 'MyGateway' -DataFactoryName MyADF -KeyName key1
    ```

    ```output
    Key1 : DMG@632e739e-1053-4070-9102-8591f067526e@41fcbc45-c594-4152-a8f1-fcbcd6452aea@wu@BH0EV9hu/o2IYGQzfYYD203XhdS6Tty
           fkYwYFbG6wBU=
    Key2 :
    ```

    This command creates a gateway auth key of Key1 for the data factory gateway named MyGateway.
