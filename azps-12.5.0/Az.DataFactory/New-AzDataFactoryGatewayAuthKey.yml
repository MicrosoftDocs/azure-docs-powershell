syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataFactoryGatewayAuthKey
        [-DataFactoryName] <String>
        [-GatewayName] <String>
        [-KeyName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
