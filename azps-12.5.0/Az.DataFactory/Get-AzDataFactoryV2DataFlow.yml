examples:
- title: 'Example 1: Get information about all data flows'
  description: |-
    ```powershell
    Get-AzDataFactoryV2DataFlow -ResourceGroupName "ADF" -DataFactoryName "WikiADF"
    ```

    ```output
    DataFlowName           DataFactoryName ResourceGroupName                                                    Properties
    ------------           --------------- -----------------                                                    ----------
    TaxiDemo1                      WikiADF               adf Microsoft.Azure.Management.DataFactory.Models.MappingDataFlow
    dataflow1                      WikiADF               adf Microsoft.Azure.Management.DataFactory.Models.MappingDataFlow
    dataflow3                      WikiADF               adf Microsoft.Azure.Management.DataFactory.Models.MappingDataFlow
    ```

    This command gets information about all data flows in the data factory named WikiADF.
- title: 'Example 2: Get information about a specific data flow'
  description: |-
    ```powershell
    Get-AzDataFactoryV2DataFlow -ResourceGroupName "ADF" -DataFactoryName "WikiADF" -Name "dataflow1"
    ```

    ```output
    DataFlowName           DataFactoryName ResourceGroupName                                                    Properties
    ------------           --------------- -----------------                                                    ----------
    TaxiDemo1                      WikiADF               adf Microsoft.Azure.Management.DataFactory.Models.MappingDataFlow
    ```

    This command gets information about the data flow named dataflow1 in the data factory named WikiADF.
