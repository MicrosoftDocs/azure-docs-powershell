syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataFactoryV2IntegrationRuntimeKey
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-DataFactoryName] <String>
        -KeyName <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByIntegrationRuntimeName
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDataFactoryV2IntegrationRuntimeKey
        [-ResourceId] <String>
        -KeyName <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceId
  isDefault: false
- syntax: |-
