examples:
- title: 'Example 1: Generate a new key for an integration runtime'
  description: |-
    ```powershell
    New-AzDataFactoryV2IntegrationRuntimeKey -ResourceGroupName 'rg-test-dfv2' -DataFactoryName 'test-df-eu2' -Name 'test-selfhost-ir' -KeyName authKey2
    ```

    ```output
    AuthKey1 AuthKey2
    -------- --------
             IR@89895504-f647-48fd-8dd3-42fa556d67e3@***
    ```

    The cmdlet regenerates key 'authKey2' for integration runtime named 'test-selfhost-ir'.
