syntaxes:
- syntax: |-
    ```Syntax
    Start-AzDataFactoryV2IntegrationRuntime
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-DataFactoryName] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByIntegrationRuntimeName
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzDataFactoryV2IntegrationRuntime
        [-ResourceId] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceId
  isDefault: false
- syntax: |-
    ```Syntax
    Start-AzDataFactoryV2IntegrationRuntime
        [-InputObject] <PSIntegrationRuntime>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByIntegrationRuntimeObject
  isDefault: false
