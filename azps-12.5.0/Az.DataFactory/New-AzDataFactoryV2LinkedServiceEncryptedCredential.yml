### YamlMime:PowerShellCmdlet1
uid: Az.DataFactory.New-AzDataFactoryV2LinkedServiceEncryptedCredential
name: New-AzDataFactoryV2LinkedServiceEncryptedCredential
module: Az.DataFactory
isPreview: false
summary: |-
  Encrypt credential in linked service with specified integration runtime.
description: |-
  The New-AzDataFactoryV2LinkedServiceEncryptedCredential cmdlet encrypt credential in linked service with specified integration runtime.

  Please ensure the following prerequisites are met:
  * **Remote access** option is enabled on the self-hosted integration runtime.
  * Powershell 7.0 or higher is used to execute the cmdlet.
