### YamlMime:PowerShellCmdlet1
uid: Az.DataFactory.Invoke-AzDataFactoryV2DataFlowDebugSessionCommand
name: Invoke-AzDataFactoryV2DataFlowDebugSessionCommand
module: Az.DataFactory
isPreview: false
summary: |-
  Invoke debug action in data flow debug session.
description: |-
  This command executes data preview/stats preview/expression preview for different stream of data flow in debug session.
  The PowerShell command sequence for data flow debug workflow should be:
  1. Start-AzDataFactoryV2DataFlowDebugSession
  1. Add-AzDataFactoryV2DataFlowDebugSessionPackage
  1. Invoke-AzDataFactoryV2DataFlowDebugSessionCommand (repeat this step for different commands/targets, or repeat step 2-3 in order to change the package file)
  1. Stop-AzDataFactoryV2DataFlowDebugSession
notes: |-
  Keywords: azure, azurerm, arm, resource, management, manager, data, factoriesKeywords: azure, azurerm, arm, resource, management, manager, data, factories
