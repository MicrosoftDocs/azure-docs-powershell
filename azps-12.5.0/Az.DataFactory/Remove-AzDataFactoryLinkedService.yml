syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataFactoryLinkedService
        [-DataFactoryName] <String>
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDataFactoryLinkedService
        [-DataFactory] <PSDataFactory>
        [-Name] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryObject
  isDefault: false
