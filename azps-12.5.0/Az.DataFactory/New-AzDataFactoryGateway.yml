uid: Az.DataFactory.New-AzDataFactoryGateway
name: New-AzDataFactoryGateway
module: Az.DataFactory
isPreview: false
summary: |-
  Creates a gateway for an Azure Data Factory.
description: |-
  The **New-AzDataFactoryGateway** cmdlet creates a gateway in Azure Data Factory.
notes: |-
  * Keywords: azure, azurerm, arm, resource, management, manager, data, factories
