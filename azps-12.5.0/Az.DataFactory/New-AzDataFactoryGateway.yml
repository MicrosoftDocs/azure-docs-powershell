syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataFactoryGateway
        [-DataFactoryName] <String>
        [-Name] <String>
        [[-Description] <String>]
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDataFactoryGateway
        [-DataFactory] <PSDataFactory>
        [-Name] <String>
        [[-Description] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryObject
  isDefault: false
