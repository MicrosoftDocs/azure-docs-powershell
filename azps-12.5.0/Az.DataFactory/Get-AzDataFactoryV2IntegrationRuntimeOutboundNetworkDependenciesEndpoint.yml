uid: Az.DataFactory.Get-AzDataFactoryV2IntegrationRuntimeOutboundNetworkDependenciesEndpoint
name: Get-AzDataFactoryV2IntegrationRuntimeOutboundNetworkDependenciesEndpoint
module: Az.DataFactory
isPreview: false
summary: |-
  Gets the list of outbound network dependencies for a given Azure-SSIS integration runtime.
description: |-
  The Get-AzDataFactoryV2IntegrationRuntimeOutboundNetworkDependenciesEndpoint cmdlet provides a list of outbound network dependencies for SSIS integration runtime in Azure Data Factory that joins a virtual network.
