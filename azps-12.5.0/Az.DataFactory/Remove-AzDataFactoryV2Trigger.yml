syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataFactoryV2Trigger
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-DataFactoryName] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDataFactoryV2Trigger
        [-InputObject] <PSTrigger>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInputObject
  isDefault: false
