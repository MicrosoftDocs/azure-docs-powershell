### YamlMime:PowerShellCmdlet1
uid: Az.DataFactory.Set-AzDataFactoryV2
name: Set-AzDataFactoryV2
module: Az.DataFactory
isPreview: false
summary: |-
  Creates a data factory.
description: |-
  The **Set-AzDataFactoryV2** cmdlet creates a data factory with the specified resource group name and location.
  Perform these operations in the following order:
          -- Create a data factory.
          -- Create linked services.
          -- Create datasets.
          -- Create a pipeline.
