examples:
- title: 'Example 1: Configure the active period'
  description: |-
    ```powershell
    Set-AzDataFactoryPipelineActivePeriod -ResourceGroupName "ADF" -PipelineName "DPWikisample" -DataFactoryName "WikiADF" -StartDateTime 2014-05-21T16:00:00Z -EndDateTime 2014-05-22T16:00:00Z
    ```

    ```output
    Confirm
    Are you sure you want to set pipeline 'DPWikisample' active period from '05/21/2014 16:00:00' to
    '05/22/2014 16:00:00'?
    [Y] Yes  [N] No  [S] Suspend  [?] Help (default is "Y"): y
    True
    ```

    This command configures the active period for the data slices that the pipeline named DPWikisample processes.
    The command provides beginning and end points for the data slices as values.
    The command returns a value of $True.
