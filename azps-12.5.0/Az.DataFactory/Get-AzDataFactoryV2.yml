### YamlMime:PowerShellCmdlet1
uid: Az.DataFactory.Get-AzDataFactoryV2
name: Get-AzDataFactoryV2
module: Az.DataFactory
isPreview: false
summary: |-
  Gets information about Data Factory.
description: |-
  The Get-AzDataFactoryV2 cmdlet gets information about data factories in an Azure resource group.
  If you specify the name of a data factory, this cmdlet gets information about that data factory.
  If you do not specify a name, this cmdlet gets information about all of the data factories in an Azure resource group.
notes: |-
  Keywords: azure, azurerm, arm, resource, management, manager, data, factories
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the data factory about which to get information.
    aliases:
    - DataFactoryName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFactoryName
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an Azure resource group.
      This cmdlet gets information about data factories that belong to the group this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFactoryName
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataFactoryV2
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: BySubscriptionId
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDataFactoryV2
        [-ResourceGroupName] <String>
        [[-Name] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.DataFactoryV2.Models.PSDataFactory" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all data factories'
  description: |-
    ```powershell
    Get-AzDataFactoryV2 -ResourceGroupName "ADF"
    ```

    ```output
    DataFactoryName   : WikiADF
        DataFactoryId     : /subscriptions/3e8e61b5-9a7d-4952-bfae-545ab997b9ea/resourceGroups/adf/providers/Microsoft.DataFactory/factories/wikiadf
        ResourceGroupName : ADF
        Location          : EastUS
        Tags              : {}
        Identity          : Microsoft.Azure.Management.DataFactory.Models.FactoryIdentity
        ProvisioningState : Succeeded

        DataFactoryName   : WikiADF2
        DataFactoryId     : /subscriptions/3e8e61b5-9a7d-4952-bfae-545ab997b9ea/resourceGroups/adf/providers/Microsoft.DataFactory/factories/wikiadf2
        ResourceGroupName : ADF
        Location          : EastUS
        Tags              : {}
        Identity          :
        ProvisioningState : Succeeded
    ```

    Displays information about all data factories in the Azure subscription.
- title: 'Example 2: Get a specific data factory'
  description: |-
    ```powershell
    $DataFactory = Get-AzDataFactoryV2 -ResourceGroupName "ADF" -Name "WikiADF"
    ```

    ```output
    DataFactoryName   : WikiADF
        DataFactoryId     : /subscriptions/3e8e61b5-9a7d-4952-bfae-545ab997b9ea/resourceGroups/adf/providers/Microsoft.DataF
                            actory/factories/wikiadf
        ResourceGroupName : ADF
        Location          : EastUS
        Tags              : {}
        Identity          : Microsoft.Azure.Management.DataFactory.Models.FactoryIdentity
        ProvisioningState : Succeeded
    ```

    This command displays information about the data factory named WikiADF in the subscription for the resource group named ADF, and then stores it in the $DataFactory variable.
    Specify the DataFactory parameter in subsequent cmdlets to use the data factory stored in $DataFactory.
