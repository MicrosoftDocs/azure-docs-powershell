        [[-Credential] <PSCredential>]
        [[-Type] <String>]
        [[-NonCredentialValue] <String>]
        [[-AuthenticationType] <String>]
        [[-Server] <String>]
        [[-Database] <String>]
        [-DefaultProfile <IAzureContextContainer>]
