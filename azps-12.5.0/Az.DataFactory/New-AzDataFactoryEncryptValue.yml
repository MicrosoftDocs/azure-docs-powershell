        [[-Type] <String>]
        [[-NonCredentialValue] <String>]
        [[-AuthenticationType] <String>]
        [[-Server] <String>]
        [[-Database] <String>]
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
