syntaxes:
- syntax: |-
    ```Syntax
    New-AzElasticTagRule
        -MonitorName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-LogRuleFilteringTag <IFilteringTag[]>]
        [-LogRuleSendAadLog]
        [-LogRuleSendActivityLog]
        [-LogRuleSendSubscriptionLog]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
