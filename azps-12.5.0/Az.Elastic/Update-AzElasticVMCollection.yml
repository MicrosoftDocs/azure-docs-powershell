syntaxes:
- syntax: |-
    ```Syntax
    Update-AzElasticVMCollection
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-OperationName <OperationName>]
        [-VMResourceId <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzElasticVMCollection
        -InputObject <IElasticIdentity>
        [-OperationName <OperationName>]
        [-VMResourceId <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
