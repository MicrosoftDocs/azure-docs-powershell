syntaxes:
- syntax: |-
    ```Syntax
    Update-AzRedisEnterpriseCacheDatabase
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AccessKeysAuthentication <AccessKeysAuthentication>]
        [-ClientProtocol <Protocol>]
        [-EvictionPolicy <EvictionPolicy>]
        [-AofPersistenceEnabled]
        [-AofPersistenceFrequency <AofFrequency>]
        [-RdbPersistenceEnabled]
        [-RdbPersistenceFrequency <RdbFrequency>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzRedisEnterpriseCacheDatabase
        -InputObject <IRedisEnterpriseCacheIdentity>
        [-AccessKeysAuthentication <AccessKeysAuthentication>]
        [-ClientProtocol <Protocol>]
        [-EvictionPolicy <EvictionPolicy>]
        [-AofPersistenceEnabled]
        [-AofPersistenceFrequency <AofFrequency>]
        [-RdbPersistenceEnabled]
        [-RdbPersistenceFrequency <RdbFrequency>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.RedisEnterpriseCache.Models.IRedisEnterpriseCacheIdentity" data-throw-if-not-resolved="False" />
