examples:
- title: 'Example 1: Add new access policy assignment.'
  description: |-
    ```powershell
    New-AzRedisEnterpriseCacheAccessPolicyAssignment -AccessPolicyAssignmentName "testAccessPolicyAssignmentName" -ClusterName "MyCache" -DatabaseName "default" -ResourceGroupName "MyGroup" -UserObjectId "aaaaaaaa-0000-1111-2222-bbbbbbbbbbbb" -AccessPolicyName "default"
    ```

    ```output
    Name
    ----
    testAccessPolicyAssignmentName
    ```

    This command creates access policy assignment (redis user) named testAccessPolicyAssignmentName on Redis enterprise cache named MyCache.
