syntaxes:
- syntax: |-
    ```Syntax
    New-AzRedisEnterpriseCacheKey
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -KeyType <AccessKeyType>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
