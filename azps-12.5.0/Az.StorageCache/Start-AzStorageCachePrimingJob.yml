uid: Az.StorageCache.Start-AzStorageCachePrimingJob
name: Start-AzStorageCachePrimingJob
module: Az.StorageCache
isPreview: false
summary: |-
  Create a priming job.
  This operation is only allowed when the cache is healthy.
