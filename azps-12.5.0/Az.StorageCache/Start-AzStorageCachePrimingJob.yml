syntaxes:
- syntax: |-
    ```Syntax
    Start-AzStorageCachePrimingJob
        -CacheName <String>
        -ResourceGroupName <String>
        -PrimingJobName <String>
        -PrimingManifestUrl <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StartExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzStorageCachePrimingJob
        -InputObject <IStorageCacheIdentity>
        -PrimingJobName <String>
        -PrimingManifestUrl <String>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StartViaIdentityExpanded
  isDefault: false
