syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageCacheAmlFileSystem
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        [-FilesystemSubnet <String>]
        [-IdentityType <AmlFilesystemIdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-KeyEncryptionKeyUrl <String>]
        [-MaintenanceWindowDayOfWeek <MaintenanceDayOfWeekType>]
        [-MaintenanceWindowTimeOfDayUtc <String>]
        [-SettingContainer <String>]
        [-SettingImportPrefix <String>]
        [-SettingLoggingContainer <String>]
        [-SkuName <String>]
        [-SourceVaultId <String>]
        [-StorageCapacityTiB <Single>]
        [-Tag <Hashtable>]
        [-Zone <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
