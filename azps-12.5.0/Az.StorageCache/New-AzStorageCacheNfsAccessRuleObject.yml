### YamlMime:PowerShellCmdlet1
uid: Az.StorageCache.New-AzStorageCacheNfsAccessRuleObject
name: New-AzStorageCacheNfsAccessRuleObject
module: Az.StorageCache
isPreview: false
summary: |-
  Create an in-memory object for NfsAccessRule.
description: |-
  Create an in-memory object for NfsAccessRule.
parameters:
  cmdletParameters:
  - name: Access
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.StorageCache.Support.NfsAccessRuleAccess" data-throw-if-not-resolved="False" />
    description: |-
      Access allowed by this rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AnonymousGid
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      GID value that replaces 0 when rootSquash is true.
      This will use the value of anonymousUID if not provided.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AnonymousUid
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      UID value that replaces 0 when rootSquash is true.
      65534 will be used if not provided.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Filter applied to the scope for this rule.
      The filter's format depends on its scope.
      'default' scope matches all clients and has no filter value.
      'network' scope takes a filter in CIDR format (for example, 10.99.1.0/24).
      'host' takes an IP address or fully qualified domain name as filter.
      If a client does not match any filter rule and there is no default rule, access is denied.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RootSquash
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Map root accesses to anonymousUID and anonymousGID.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.StorageCache.Support.NfsAccessRuleScope" data-throw-if-not-resolved="False" />
    description: |-
      Scope for this rule.
      The scope and filter determine which clients match the rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubmountAccess
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      For the default policy, allow access to subdirectories under the root export.
      If this is set to no, clients can only mount the path '/'.
      If set to yes, clients can mount a deeper path, like '/a/b'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Suid
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Allow SUID semantics.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageCacheNfsAccessRuleObject
        -Access <NfsAccessRuleAccess>
        -Scope <NfsAccessRuleScope>
        [-AnonymousGid <String>]
        [-AnonymousUid <String>]
        [-Filter <String>]
        [-RootSquash <Boolean>]
        [-SubmountAccess <Boolean>]
        [-Suid <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.StorageCache.Models.Api20230501.NfsAccessRule" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an in-memory object for NfsAccessRule.'
  description: |-
    ```powershell
    New-AzStorageCacheNfsAccessRuleObject -Access 'rw' -Scope 'network' -AnonymousUid "65534" -AnonymousGid "65534" -SubmountAccess:$True -RootSquash:$True -Suid:$False -Filter "10.99.1.0/24"
    ```

    ```output
    Access AnonymousGid AnonymousUid Filter       RootSquash Scope   SubmountAccess Suid
    ------ ------------ ------------ ------       ---------- -----   -------------- ----
    rw     65534        65534        10.99.1.0/24 True       network True           False
    ```

    Create an in-memory object for NfsAccessRule.
