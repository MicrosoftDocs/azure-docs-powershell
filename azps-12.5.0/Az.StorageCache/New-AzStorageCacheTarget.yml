syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageCacheTarget
        -CacheName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-BlobNfTarget <String>]
        [-BlobNfUsageModel <String>]
        [-BlobNfVerificationTimer <Int32>]
        [-BlobNfWriteBackTimer <Int32>]
        [-ClfTarget <String>]
        [-Junction <INamespaceJunction[]>]
        [-Nfs3Target <String>]
        [-Nfs3UsageModel <String>]
        [-Nfs3VerificationTimer <Int32>]
        [-Nfs3WriteBackTimer <Int32>]
        [-State <OperationalStateType>]
        [-TargetType <StorageTargetType>]
        [-UnknownAttribute <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
