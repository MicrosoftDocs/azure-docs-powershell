syntaxes:
- syntax: |-
    ```Syntax
    Resume-AzStorageCacheTarget
        -CacheName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Resume
  isDefault: true
- syntax: |-
    ```Syntax
    Resume-AzStorageCacheTarget
        -InputObject <IStorageCacheIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
