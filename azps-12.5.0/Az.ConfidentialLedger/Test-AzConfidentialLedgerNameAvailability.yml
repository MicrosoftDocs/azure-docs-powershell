syntaxes:
- syntax: |-
    ```Syntax
    Test-AzConfidentialLedgerNameAvailability
        [-SubscriptionId <String>]
        [-Name <String>]
        [-Type <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
