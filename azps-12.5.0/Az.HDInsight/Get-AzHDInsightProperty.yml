    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzHDInsightProperty
        [-Location] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Management.HDInsight.Models.AzureHDInsightCapabilities" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the properties of an Azure HDInsight cluster'
  description: |-
    ```powershell
    Get-AzHDInsightProperty -Location "East US 2"
    ```

    This command gets properties from an HDInsight service from location East US 2.
