- syntax: |-
    ```Syntax
    Disable-AzHDInsightMonitoring
        [-Name] <String>
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
