- syntax: |-
    ```Syntax
    Add-AzHDInsightSecurityProfile
        [-Config] <AzureHDInsightConfig>
        -DomainResourceId <String>
        -DomainUserCredential <PSCredential>
        [-OrganizationalUnitDN <String>]
        -LdapsUrls <String[]>
        [-ClusterUsersGroupDNs <String[]>]
