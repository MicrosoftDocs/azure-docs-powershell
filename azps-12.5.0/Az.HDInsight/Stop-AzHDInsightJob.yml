syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzHDInsightJob
        [-ClusterName] <String>
        [-JobId] <String>
        [-HttpCredential] <PSCredential>
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.HDInsight.Models.AzureHDInsightJob" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Stop a job on the specified cluster'
  description: |-
    ```powershell
    # Cluster info
    $clusterName = "your-hadoop-001"
    $clusterCreds = Get-Credential
    Stop-AzHDInsightJob `
                -ClusterName $clusterName `
                -ClusterCredential $clusterCreds `
                -JobId $jobId
    ```

    This command stops a job on the cluster named your-hadoop-001.
