syntaxes:
- syntax: |-
    ```Syntax
    New-AzArcResourceBridge
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        [-Distro <Distro>]
        [-IdentityType <ResourceIdentityType>]
        [-InfrastructureConfigProvider <Provider>]
        [-PublicKey <String>]
        [-Tag <Hashtable>]
        [-Version <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
