uid: Az.Databricks.New-AzDatabricksWorkspaceProviderAuthorizationObject
name: New-AzDatabricksWorkspaceProviderAuthorizationObject
module: Az.Databricks
isPreview: false
summary: |-
  Create an in-memory object for WorkspaceProviderAuthorization.
description: |-
  Create an in-memory object for WorkspaceProviderAuthorization.
parameters:
  cmdletParameters:
  - name: PrincipalId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The provider's principal identifier.
      This is the identity that the provider will use to call ARM to manage the workspace resources.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RoleDefinitionId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The provider's role definition identifier.
      This role will define all the permissions that the provider must have on the workspace's container resource group.
      This role definition cannot have permission to delete the resource group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzDatabricksWorkspaceProviderAuthorizationObject
        -PrincipalId <String>
        -RoleDefinitionId <String>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Databricks.Models.Api20240501.WorkspaceProviderAuthorization" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an in-memory object for WorkspaceProviderAuthorization.'
  description: |-
    ```powershell
    New-AzDatabricksWorkspaceProviderAuthorizationObject -PrincipalId aaaaaaaa-bbbb-cccc-1111-222222222222 -RoleDefinitionId bbbbbbbb-cccc-dddd-2222-333333333333
    ```

    ```output
    PrincipalId                          RoleDefinitionId
