uid: Az.Fabric.Get-AzFabricCapacitySku
name: Get-AzFabricCapacitySku
module: Az.Fabric
isPreview: false
summary: |-
  List eligible SKUs for Microsoft Fabric resource provider
description: |-
  List eligible SKUs for Microsoft Fabric resource provider
