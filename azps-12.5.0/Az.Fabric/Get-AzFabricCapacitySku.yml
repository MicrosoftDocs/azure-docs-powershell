- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Fabric.Models.IRpSkuDetailsForNewResource" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: List Skus For Capacity'
  description: |-
    ```powershell
    Get-AzFabricCapacitySku -ResourceGroupName "testrg" -CapacityName "azsdktest" | Format-List
    ```

    ```output
    ResourceType : Microsoft.Fabric/capacities
    SkuName      : F16
    SkuTier      : Fabric

    ResourceType : Microsoft.Fabric/capacities
    SkuName      : F8
    SkuTier      : Fabric

    ResourceType : Microsoft.Fabric/capacities
    SkuName      : F64
    SkuTier      : Fabric

    ResourceType : Microsoft.Fabric/capacities
    SkuName      : F1024
    SkuTier      : Fabric

    ResourceType : Microsoft.Fabric/capacities
    SkuName      : F128
    SkuTier      : Fabric

    ResourceType : Microsoft.Fabric/capacities
    SkuName      : F2
    SkuTier      : Fabric

    ResourceType : Microsoft.Fabric/capacities
    SkuName      : F256
    SkuTier      : Fabric

    ResourceType : Microsoft.Fabric/capacities
    SkuName      : F32
    SkuTier      : Fabric

    ResourceType : Microsoft.Fabric/capacities
    SkuName      : F4
    SkuTier      : Fabric

    ResourceType : Microsoft.Fabric/capacities
    SkuName      : F512
    SkuTier      : Fabric

    ResourceType : Microsoft.Fabric/capacities
    SkuName      : F2048
    SkuTier      : Fabric
    ```

    The above command lists all eligible SKUs for the Fabric capacity named 'azsdktest' within the resource group 'testrg'
