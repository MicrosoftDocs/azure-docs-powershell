syntaxes:
- syntax: |-
    ```Syntax
    New-AzFabricCapacity
        -CapacityName <String>
        -ResourceGroupName <String>
        -AdministrationMember <String[]>
        -Location <String>
        -SkuName <String>
        [-SubscriptionId <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzFabricCapacity
        -CapacityName <String>
