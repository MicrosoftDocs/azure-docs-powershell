### YamlMime:PowerShellCmdlet1
uid: Az.Migrate.New-AzMigrateServerReplication
name: New-AzMigrateServerReplication
module: Az.Migrate
isPreview: false
summary: |-
  Starts replication for the specified server.
description: |-
  The New-AzMigrateServerReplication cmdlet starts the replication for a particular discovered server in the Azure Migrate project.
