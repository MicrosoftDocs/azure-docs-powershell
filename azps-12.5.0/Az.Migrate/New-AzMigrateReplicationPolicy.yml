syntaxes:
- syntax: |-
    ```Syntax
    New-AzMigrateReplicationPolicy
        -PolicyName <String>
        -ResourceGroupName <String>
        -ResourceName <String>
        [-SubscriptionId <String>]
        [-ProviderSpecificInput <IPolicyProviderSpecificInput>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
