syntaxes:
- syntax: |-
    ```Syntax
    Initialize-AzMigrateReplicationInfrastructure
        -ResourceGroupName <String>
        -ProjectName <String>
        -Scenario <String>
        -TargetRegion <String>
        [-CacheStorageAccountId <String>]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
