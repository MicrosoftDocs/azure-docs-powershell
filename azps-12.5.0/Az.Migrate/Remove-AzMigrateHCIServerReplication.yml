syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzMigrateHCIServerReplication
        -TargetObjectID <String>
        [-SubscriptionId <String>]
        [-ForceRemove <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByID
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzMigrateHCIServerReplication
        -InputObject <IMigrateIdentity>
        [-SubscriptionId <String>]
        [-ForceRemove <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInputObject
  isDefault: false
