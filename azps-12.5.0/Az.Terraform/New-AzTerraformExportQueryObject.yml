syntaxes:
- syntax: |-
    ```Syntax
    New-AzTerraformExportQueryObject
        -Query <String>
        [-NamePattern <String>]
        [-Recursive <Boolean>]
        [-FullProperty <Boolean>]
        [-MaskSensitive <Boolean>]
        [-TargetProvider <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
