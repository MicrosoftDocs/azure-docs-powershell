uid: Az.Terraform.New-AzTerraformExportQueryObject
name: New-AzTerraformExportQueryObject
module: Az.Terraform
isPreview: false
summary: |-
  Create an in-memory object for ExportQuery.
description: |-
  Create an in-memory object for ExportQuery.
parameters:
  cmdletParameters:
  - name: FullProperty
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Whether to output all non-computed properties in the generated Terraform configuration? This probably needs manual modifications to make it valid.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
