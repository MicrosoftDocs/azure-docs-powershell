uid: Az.Resources.Save-AzDeploymentTemplate
name: Save-AzDeploymentTemplate
module: Az.Resources
isPreview: false
summary: |-
  Saves a deployment template to a file.
description: |-
  The **Save-AzDeploymentTemplate**  cmdlet saves a deployment template to a JSON file.
