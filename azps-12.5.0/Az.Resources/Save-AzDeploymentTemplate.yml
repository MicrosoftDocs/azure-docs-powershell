syntaxes:
- syntax: |-
    ```Syntax
    Save-AzDeploymentTemplate
        -DeploymentName <String>
        [-Path <String>]
        [-Force]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SaveByDeploymentName
  isDefault: true
- syntax: |-
    ```Syntax
    Save-AzDeploymentTemplate
        -DeploymentObject <PSDeployment>
        [-Path <String>]
        [-Force]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SaveByDeploymentObject
  isDefault: false
