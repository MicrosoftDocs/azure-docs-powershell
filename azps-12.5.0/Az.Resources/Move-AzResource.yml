syntaxes:
- syntax: |-
    ```Syntax
    Move-AzResource
        -DestinationResourceGroupName <String>
        [-DestinationSubscriptionId <Guid>]
        -ResourceId <String[]>
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
