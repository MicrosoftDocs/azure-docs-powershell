### YamlMime:PowerShellCmdlet1
uid: Az.Resources.New-AzManagementGroupHierarchySetting
name: New-AzManagementGroupHierarchySetting
module: Az.Resources
isPreview: false
summary: |-
  Creates Hierarchy Settings under the current tenant
description: |-
  The **New-AzManagementGroupHierarchySetting** cmdlet creates new hierarchy settings under the current tenant. Requiring **Authorization** and setting the **DefaultManagementGroup** that new groups get created under can be set.
parameters:
  cmdletParameters:
  - name: Authorization
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicate whether RBAC access is required upon group creation under the root Management Group. True means user will require Microsoft.Management/managementGroups/write action on the root Management Group. Default setting is false.
    aliases:
    - RequireAuthorizationForGroupCreation
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultManagementGroup
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Expand the output to list the children of the management group
    aliases:
    - DefaultMG
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GroupOperations
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Management Group Id
    aliases:
    - GroupId
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzManagementGroupHierarchySetting
        [-GroupName] <String>
        [-Authorization <Boolean>]
        [-DefaultManagementGroup <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: GroupOperations
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzManagementGroupHierarchySetting
        [-GroupName] <String>
        [-Authorization <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ParentGroupObject
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Resources.Models.ManagementGroups.PSHierarchySettings" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Resources.Models.ManagementGroups.PSHierarchySettings" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a Hierarchy Setting for an Authorization Requirement for Group Creation'
  description: |-
    ```powershell
    New-AzManagementGroupHierarchySetting -GroupName c7a87cda-9a66-4920-b0f8-869baa04efe0 -Authorization True
    ```

    ```output
    Id          : /providers/Microsoft.Management/managementGroups/c7a87cda-9a66-4920-b0f8-869baa04efe0/settings/default
    Type        : Microsoft.Management/managementGroups/settings
    Name        : default
    TenantId    : aaaabbbb-0000-cccc-1111-dddd2222eeee
    RequireAuthorizationForGroupCreation : true
    DefaultManagementGroup :
    ```
- title: 'Example 2: Create a Hierarchy Setting for the default Management Group new Groups get placed under'
  description: |-
    ```powershell
    New-AzManagementGroupHierarchySetting -GroupName c7a87cda-9a66-4920-b0f8-869baa04efe0 -DefaultManagementGroup TestGroup
    ```

    ```output
    Id          : /providers/Microsoft.Management/managementGroups/c7a87cda-9a66-4920-b0f8-869baa04efe0/settings/default
    Type        : Microsoft.Management/managementGroups/settings
    Name        : default
    TenantId    : aaaabbbb-0000-cccc-1111-dddd2222eeee
    RequireAuthorizationForGroupCreation : false
    DefaultManagementGroup : TestGroup
    ```
- title: 'Example 3: Create both Hierarchy Settings'
  description: |-
    ```powershell
    New-AzManagementGroupHierarchySetting -GroupName c7a87cda-9a66-4920-b0f8-869baa04efe0 -Authorization True -DefaultManagementGroup TestGroup
    ```

    ```output
    Id          : /providers/Microsoft.Management/managementGroups/c7a87cda-9a66-4920-b0f8-869baa04efe0/settings/default
    Type        : Microsoft.Management/managementGroups/settings
    Name        : default
    TenantId    : aaaabbbb-0000-cccc-1111-dddd2222eeee
    RequireAuthorizationForGroupCreation : true
    DefaultManagementGroup : TestGroup
    ```
