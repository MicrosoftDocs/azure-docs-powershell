examples:
- title: 'Example 1: Get the Name Availability for a Valid Name'
  description: |-
    ```powershell
    Get-AzManagementGroupNameAvailability -GroupName "testMG"
    ```

    ```output
    Message              :
    NameAvailable        : True
    Reason               :
    ```
- title: 'Example 2: Get the Name Availability for a name that is already taken'
  description: |-
    ```powershell
    Get-AzManagementGroupNameAvailability -GroupName "testMG3"
    ```

    ```output
    Message              : The group with the specified name already exists
    NameAvailable        : False
    Reason               : AlreadyExists
    ```
- title: 'Example 3: Get the Name Availability for a name that contains invalid characters'
  description: |-
    ```powershell
    Get-AzManagementGroupNameAvailability -GroupName "testMG!"
    ```

    ```output
    Message              : The provided management group name has invalid characters
    NameAvailable        : False
    Reason               : Invalid
    ```
