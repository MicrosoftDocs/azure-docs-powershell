syntaxes:
- syntax: |-
    ```Syntax
    Get-AzADGroup
        [-Count]
        [-Expand <String[]>]
        [-Select <String[]>]
        [-Filter <String>]
        [-Orderby <String[]>]
        [-Search <String>]
        [-ConsistencyLevel <String>]
        [-First <UInt64>]
        [-Skip <UInt64>]
        [-AppendSelected]
        [-DefaultProfile <PSObject>]
        [-CountVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: EmptyParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzADGroup
        -DisplayName <String>
        [-Expand <String[]>]
        [-Select <String[]>]
        [-ConsistencyLevel <String>]
        [-First <UInt64>]
        [-Skip <UInt64>]
        [-AppendSelected]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: DisplayNameParameterSet
  isDefault: false
