    ```

    ```output
    Id         : /providers/Microsoft.Management/managementGroups/aaaabbbb-0000-cccc-1111-dddd2222eeee/providers/Microsoft.
                 Authorization/privateLinkAssociations/1d7942d1-288b-48de-8d0f-2d2aa8e03ad4
