syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzManagementGroupDeployment
        [-ManagementGroupId] <String>
        [-Name] <String>
        [-AsJob]
        [-PassThru]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
