### YamlMime:PowerShellCmdlet1
uid: Az.Resources.Test-AzResourceGroupDeployment
name: Test-AzResourceGroupDeployment
module: Az.Resources
isPreview: false
summary: |-
  Validates a resource group deployment.
description: |-
  The **Test-AzResourceGroupDeployment** cmdlet determines whether an Azure resource group deployment template and its parameter values are valid.
