outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Resources.MSGraph.Models.ApiV10.IMicrosoftGraphUser" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get signin user'
  description: |-
    ```powershell
    Get-AzADUser -SignedIn
    ```

    Get signin user
- title: 'Example 2: List users'
  description: |-
    ```powershell
    Get-AzADUser -First 10 -Select 'City' -AppendSelected
    ```

    List first 10 users and append property 'City' after default properties: 'DisplayName', 'Id', 'DeletedDateTime', 'UserPrincipalName', 'UsageLocation', 'GivenName', 'SurName', 'AccountEnabled', 'MailNickName', 'Mail'
- title: 'Example 3: Get user by display name'
  description: |-
    ```powershell
    Get-AzADUser -DisplayName $name
    ```

    Get user by display name
- title: 'Example 4: Get user with filter'
  description: |-
    ```powershell
    Get-AzADUser -Filter "startsWith(DisplayName,'some-name')"
    ```

    Get user with filter
- title: 'Example 5: Assign OdataCount to a variable'
  description: |-
    ```powershell
    Get-AzADUser -First 10 -ConsistencyLevel eventual -Count -CountVariable 'result'
    $result
    ```

    Assign OdataCount to a variable
