syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzResourceGroupDeploymentStack
        [-Name] <String>
        [-ResourceGroupName] <String>
        -ActionOnUnmanage <PSActionOnUnmanage>
        [-PassThru]
        [-Force]
        [-BypassStackOutOfSyncError]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByNameAndResourceGroupName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzResourceGroupDeploymentStack
        -ResourceId <String>
        -ActionOnUnmanage <PSActionOnUnmanage>
        [-PassThru]
        [-Force]
        [-BypassStackOutOfSyncError]
        [-Pre]
