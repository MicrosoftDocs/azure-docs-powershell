    supportsWildcards: false
  - name: DeploymentScriptObject
    type: <xref href="Microsoft.Azure.Commands.ResourceManager.Cmdlets.SdkModels.PsDeploymentScript" data-throw-if-not-resolved="False" />
    description: |-
      The deployment script PowerShell object.
    aliases:
    - DeploymentScriptInputObject
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetDeploymentScriptLogByInputObject
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
