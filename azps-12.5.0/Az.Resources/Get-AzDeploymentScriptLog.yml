### YamlMime:PowerShellCmdlet1
uid: Az.Resources.Get-AzDeploymentScriptLog
name: Get-AzDeploymentScriptLog
module: Az.Resources
isPreview: false
summary: |-
  Gets the log of a deployment script execution.
description: |-
  The **Get-AzDeploymentScriptLog** cmdlet gets the log of a deployment script execution.
