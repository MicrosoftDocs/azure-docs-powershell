syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDeploymentScriptLog
        [-ResourceGroupName] <String>
        [-Name] <String>
        [[-Tail] <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetDeploymentScriptLogByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDeploymentScriptLog
        [-DeploymentScriptResourceId] <String>
        [[-Tail] <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetDeploymentScriptLogByResourceId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzDeploymentScriptLog
        [-DeploymentScriptObject] <PsDeploymentScript>
        [[-Tail] <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetDeploymentScriptLogByInputObject
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.ResourceManager.Cmdlets.SdkModels.PsDeploymentScript" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.ResourceManager.Cmdlets.SdkModels.PsDeploymentScriptLog" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzDeploymentScriptLog -Name MyDeploymentScript -ResourceGroupName DS-TestRg
    ```

    Gets the log of a deployment script with the name MyDeploymentScript in resource group DS-TestRG.
- title: Example 2
  description: |-
    ```powershell
    Get-AzDeploymentScriptLog -Name MyDeploymentScript -ResourceGroupName DS-TestRg -Tail 3
    ```

    Gets the last 3 lines of the log of a deployment script with the name MyDeploymentScript in resource group DS-TestRG.
- title: Example 3
  description: |-
    ```powershell
    $ds = Get-AzDeploymentScript -Name MyDeploymentScript -ResourceGroupName DS-TestRg
    Get-AzDeploymentScriptLog -DeploymentScriptInputObject $ds
    ```

    The first command gets a deployment script with the name MyDeploymentScript in resource group DS-TestRG.
    The second command gets the log of given deployment script.
