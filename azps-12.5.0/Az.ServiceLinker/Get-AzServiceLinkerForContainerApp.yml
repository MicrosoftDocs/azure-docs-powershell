examples:
- title: 'Example 1: List all linkers in a container app'
  description: |-
    ```powershell
    Get-AzServiceLinkerForContainerApp -ContainerApp servicelinker-app -ResourceGroupName servicelinker-test-group
    ```

    ```output
    Name
    ----
    appconfig_08b18
    postgresql_novnet
    postgresql_203ca
    eventhub_3ab5f
    ```

    List all linkers in the container app
