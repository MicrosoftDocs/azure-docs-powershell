syntaxes:
- syntax: |-
    ```Syntax
    Get-AzConsumptionUsageDetail
        [-BillingPeriodName <String>]
        [-Expand <String>]
        [-IncludeMeterDetails]
        [-IncludeAdditionalProperties]
        [-StartDate <DateTime>]
        [-EndDate <DateTime>]
        [-ResourceGroup <String>]
        [-InstanceName <String>]
        [-InstanceId <String>]
        [-Tag <String>]
        [-MaxCount <Int32>]
        [-Top <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
