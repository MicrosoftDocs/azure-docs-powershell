syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzRedeploySqlVM
        -ResourceGroupName <String>
        -SqlVirtualMachineName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Redeploy
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzRedeploySqlVM
        -InputObject <ISqlVirtualMachineIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
