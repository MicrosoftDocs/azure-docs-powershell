syntaxes:
- syntax: |-
    ```Syntax
    Update-AzSqlVMGroup
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ClusterBootstrapAccount <String>]
        [-ClusterOperatorAccount <String>]
        [-ClusterSubnetType <ClusterSubnetType>]
        [-DomainFqdn <String>]
        [-FileShareWitnessPath <String>]
        [-OuPath <String>]
        [-SqlServiceAccount <String>]
        [-StorageAccountPrimaryKey <SecureString>]
        [-StorageAccountUrl <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzSqlVMGroup
        -InputObject <ISqlVirtualMachineIdentity>
        [-ClusterBootstrapAccount <String>]
        [-ClusterOperatorAccount <String>]
        [-ClusterSubnetType <ClusterSubnetType>]
        [-DomainFqdn <String>]
        [-FileShareWitnessPath <String>]
        [-OuPath <String>]
        [-SqlServiceAccount <String>]
        [-StorageAccountPrimaryKey <SecureString>]
        [-StorageAccountUrl <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
