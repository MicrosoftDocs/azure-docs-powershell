syntaxes:
- syntax: |-
    ```Syntax
    Undo-AzKeyVaultCertificateRemoval
        [-VaultName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Undo-AzKeyVaultCertificateRemoval
        [-InputObject] <PSDeletedKeyVaultCertificateIdentityItem>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
