uid: Az.KeyVault.Update-AzKeyVaultKey
name: Update-AzKeyVaultKey
module: Az.KeyVault
isPreview: false
summary: |-
  Updates the attributes of a key in a key vault.
description: |-
  The **Update-AzKeyVaultKey** cmdlet updates the editable attributes of a key in a key vault.
