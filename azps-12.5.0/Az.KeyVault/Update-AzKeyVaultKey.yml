        [-Expires <DateTime>]
        [-NotBefore <DateTime>]
        [-KeyOps <String[]>]
        [-Tag <Hashtable>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
