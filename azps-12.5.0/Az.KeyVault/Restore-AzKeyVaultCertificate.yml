examples:
- title: 'Example 1: Restore a backed-up certificate'
  description: |-
    ```powershell
    Restore-AzKeyVaultCertificate -VaultName 'MyKeyVault' -InputFile "C:\Backup.blob"
    ```

    ```output
    Certificate   : [Subject]
                      CN=contoso.com

                    [Issuer]
