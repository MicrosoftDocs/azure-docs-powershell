syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzKeyVaultManagedStorageSasDefinition
        [-VaultName] <String>
        [-AccountName] <String>
        [-Name] <String>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByDefinitionName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzKeyVaultManagedStorageSasDefinition
        [-InputObject] <PSKeyVaultManagedStorageSasDefinitionIdentityItem>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInputObject
  isDefault: false
