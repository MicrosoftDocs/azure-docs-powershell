    Remove-AzKeyVaultRoleDefinition
        [-HsmName] <String>
        -RoleName <String>
        [-Scope <String>]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
