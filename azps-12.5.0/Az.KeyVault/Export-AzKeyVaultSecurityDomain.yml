syntaxes:
- syntax: |-
    ```Syntax
    Export-AzKeyVaultSecurityDomain
        -Name <String>
        -Certificates <String[]>
        -OutputPath <String>
        -Quorum <Int32>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [-SubscriptionId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Export-AzKeyVaultSecurityDomain
        -InputObject <PSKeyVaultIdentityItem>
        -Certificates <String[]>
        -OutputPath <String>
        -Quorum <Int32>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [-SubscriptionId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ByInputObject
  isDefault: false
