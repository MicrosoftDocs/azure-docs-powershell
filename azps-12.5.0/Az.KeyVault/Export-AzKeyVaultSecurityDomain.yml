uid: Az.KeyVault.Export-AzKeyVaultSecurityDomain
name: Export-AzKeyVaultSecurityDomain
module: Az.KeyVault
isPreview: false
summary: |-
  Exports the security domain data of a managed HSM.
description: |-
  Exports the security domain data of a managed HSM for importing on another HSM.
