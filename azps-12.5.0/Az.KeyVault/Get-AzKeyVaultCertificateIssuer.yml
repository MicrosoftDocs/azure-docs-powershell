examples:
- title: 'Example 1: Get a certificate issuer'
  description: |-
    ```powershell
    Get-AzKeyVaultCertificateIssuer -VaultName "Contosokv01" -Name "TestIssuer01"
    ```

    ```output
    AccountId           : 555
    ApiKey              :
    OrganizationDetails : Microsoft.Azure.Commands.KeyVault.Models.PSKeyVaultCertificateOrganizationDetails
    Name                : TestIssuer01
    IssuerProvider      : Test
    VaultName           : Contosokv01
    ```

    This command gets the certificate issuer named TestIssuer01.
- title: 'Example 2: List certificate issuers using filtering'
  description: |-
    ```powershell
    Get-AzKeyVaultCertificateIssuer -VaultName "Contosokv01" -Name "test*"
    ```

    ```output
    AccountId           : 555
    ApiKey              :
    OrganizationDetails : Microsoft.Azure.Commands.KeyVault.Models.PSKeyVaultCertificateOrganizationDetails
    Name                : TestIssuer01
    IssuerProvider      : Test
    VaultName           : Contosokv01

    AccountId           : 555
    ApiKey              :
    OrganizationDetails : Microsoft.Azure.Commands.KeyVault.Models.PSKeyVaultCertificateOrganizationDetails
    Name                : TestIssuer02
    IssuerProvider      : Test
    VaultName           : Contosokv01
    ```

    This command gets the certificate issuers that start with "test".
