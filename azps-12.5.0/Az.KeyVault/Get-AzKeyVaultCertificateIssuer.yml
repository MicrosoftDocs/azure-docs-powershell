syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKeyVaultCertificateIssuer
        [-VaultName] <String>
        [[-Name] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
