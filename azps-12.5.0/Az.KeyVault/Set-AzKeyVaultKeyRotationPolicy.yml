uid: Az.KeyVault.Set-AzKeyVaultKeyRotationPolicy
name: Set-AzKeyVaultKeyRotationPolicy
module: Az.KeyVault
isPreview: false
summary: |-
  Sets the key rotation policy for the specified key in Key Vault.
description: |-
