syntaxes:
- syntax: |-
    ```Syntax
    Undo-AzKeyVaultManagedStorageAccountRemoval
        [-VaultName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
