syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRmStorageShare
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        [-Name <String>]
        [-SnapshotTime <DateTime>]
        [-GetShareUsage]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AccountNameSingle
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzRmStorageShare
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        [-IncludeDeleted]
        [-IncludeSnapshot]
        [-Filter <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AccountName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRmStorageShare
        -StorageAccount <PSStorageAccount>
        -Name <String>
        [-SnapshotTime <DateTime>]
        [-GetShareUsage]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AccountObjectSingle
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRmStorageShare
        -StorageAccount <PSStorageAccount>
        [-IncludeDeleted]
        [-IncludeSnapshot]
        [-Filter <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AccountObject
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRmStorageShare
        [-ResourceId] <String>
        [-GetShareUsage]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ShareResourceId
  isDefault: false
inputs:
