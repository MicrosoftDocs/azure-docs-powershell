syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStorageObjectReplicationPolicy
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        [-PolicyId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
