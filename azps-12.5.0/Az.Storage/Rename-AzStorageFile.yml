syntaxes:
- syntax: |-
    ```Syntax
    Rename-AzStorageFile
        [-ShareName] <String>
        [-SourcePath] <String>
        [[-DestinationPath] <String>]
        [-ContentType <String>]
        [-Permission <String>]
        [-DisAllowSourceTrailingDot]
        [-DisAllowDestTrailingDot]
        [-Force]
        [-AsJob]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-IgnoreReadonly]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ShareName
  isDefault: true
- syntax: |-
    ```Syntax
    Rename-AzStorageFile
        [-ShareFileClient] <ShareFileClient>
        [[-DestinationPath] <String>]
        [-ContentType <String>]
        [-Permission <String>]
        [-Force]
        [-AsJob]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-IgnoreReadonly]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FileObject
  isDefault: false
- syntax: |-
    ```Syntax
    Rename-AzStorageFile
        [-ShareClient] <ShareClient>
        [-SourcePath] <String>
        [[-DestinationPath] <String>]
        [-ContentType <String>]
        [-Permission <String>]
        [-Force]
        [-AsJob]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-IgnoreReadonly]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ShareObject
  isDefault: false
- syntax: |-
