    Rename-AzStorageFile
        [-ShareDirectoryClient] <ShareDirectoryClient>
        [-SourcePath] <String>
        [[-DestinationPath] <String>]
        [-ContentType <String>]
        [-Permission <String>]
        [-Force]
        [-AsJob]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-IgnoreReadonly]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DirectoryObject
  isDefault: false
