### YamlMime:PowerShellCmdlet1
uid: Az.Storage.New-AzStorageDirectory
name: New-AzStorageDirectory
module: Az.Storage
isPreview: false
summary: |-
  Creates a directory.
description: |-
  The **New-AzStorageDirectory** cmdlet creates a directory.
  This cmdlet returns a **CloudFileDirectory** object.
parameters:
  cmdletParameters:
  - name: ClientTimeoutPerRequest
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the client-side time-out interval, in seconds, for one service request.
      If the previous call fails in the specified interval, this cmdlet retries the request.
      If this cmdlet does not receive a successful response before the interval elapses, this cmdlet returns an error.
    aliases:
    - ClientTimeoutPerRequestInSeconds
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentTaskCount
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the maximum concurrent network calls.
      You can use this parameter to limit the concurrency to throttle local CPU and bandwidth usage by specifying the maximum number of concurrent network calls.
      The specified value is an absolute count and is not multiplied by the core count.
      This parameter can help reduce network connection problems in low bandwidth environments, such as 100 kilobits per second.
      The default value is 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure storage context.
      To obtain a storage context, use the [New-AzStorageContext](./New-AzStorageContext.yml) cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Directory
    type: <xref href="Microsoft.Azure.Storage.File.CloudFileDirectory" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a folder as a **CloudFileDirectory** object.
      This cmdlet creates the folder in the location that this parameter specifies.
      To obtain a directory, use the New-AzStorageDirectory cmdlet.
      You can also use the Get-AzStorageFile cmdlet to obtain a directory.
    aliases:
    - CloudFileDirectory
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Directory
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisAllowTrailingDot
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Disallow trailing dot (.) to suffix directory and file names.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ShareName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of a folder.
      This cmdlet creates a folder for the path that this cmdlet specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerTimeoutPerRequest
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the length of the time-out period for the server part of a request.
    aliases:
    - ServerTimeoutPerRequestInSeconds
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Share
    type: <xref href="Microsoft.Azure.Storage.File.CloudFileShare" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **CloudFileShare** object.
      This cmdlet creates a folder in the file share that this parameter specifies.
      To obtain a **CloudFileShare** object, use the Get-AzStorageShare cmdlet.
      This object contains the storage context.
      If you specify this parameter, do not specify the *Context* parameter.
    aliases:
    - CloudFileShare
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Share
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ShareClient
    type: <xref href="Azure.Storage.Files.Shares.ShareClient" data-throw-if-not-resolved="False" />
    description: |-
      ShareClient object indicated the share where the files/directories would be listed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Share
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ShareDirectoryClient
    type: <xref href="Azure.Storage.Files.Shares.ShareDirectoryClient" data-throw-if-not-resolved="False" />
    description: |-
      ShareDirectoryClient object indicated the base folder where the files/directories would be listed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Directory
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ShareName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the file share.
      This cmdlet creates a folder in the file share that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ShareName
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageDirectory
        [-ShareName] <String>
        [-Path] <String>
        [-DisAllowTrailingDot]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: ShareName
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzStorageDirectory
        [-Share] <CloudFileShare>
        [-Path] <String>
        [-ShareClient <ShareClient>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Share
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzStorageDirectory
        [-Directory] <CloudFileDirectory>
        [-Path] <String>
        [-ShareDirectoryClient <ShareDirectoryClient>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Directory
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Storage.File.CloudFileShare" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Storage.File.CloudFileDirectory" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IStorageContext" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.Common.Storage.ResourceModel.AzureStorageFileDirectory" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a folder in a file share'
  description: |-
    ```powershell
    New-AzStorageDirectory -ShareName "ContosoShare06" -Path "ContosoWorkingFolder"
    ```

    This command creates a folder named ContosoWorkingFolder in the file share named ContosoShare06.
- title: 'Example 2: Create a folder in a file share specified in a file share object'
  description: |-
    ```powershell
    Get-AzStorageShare -Name "ContosoShare06" | New-AzStorageDirectory -Path "ContosoWorkingFolder"
    ```

    This command uses the **Get-AzStorageShare** cmdlet to get the file share named ContosoShare06, and then passes it to the current cmdlet by using the pipeline operator.
    The current cmdlet creates the folder named ContosoWorkingFolder in ContosoShare06.
