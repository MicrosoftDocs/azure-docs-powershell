syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStorageAccountMigration
        -AccountName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzStorageAccountMigration
        -InputObject <IStorageIdentity>
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: GetViaIdentity
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Storage.Models.IStorageIdentity" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Storage.Models.IStorageAccountMigration" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a Storage account migration'
  description: |-
    ```powershell
    Get-AzStorageAccountMigration -AccountName myaccount -ResourceGroupName myresourcegroup
    ```

    ```output
    DetailMigrationFailedDetailedReason :
    DetailMigrationFailedReason         :
    DetailMigrationStatus               : SubmittedForConversion
    DetailTargetSkuName                 : Standard_LRS
    Id                                  : /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myresroucegroup/providers/Microsoft.Storage/storageAccounts/myaccount/accountMigrations/default
    Name                                : default
    ResourceGroupName                   : myresroucegroup
    Type                                : Microsoft.Storage/storageAccounts/accountMigrations
    ```

    This command gets the migration status of the storage account myaccount under resource group myresourcegroup.
