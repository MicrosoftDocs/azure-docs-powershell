syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzStorageAccountHierarchicalNamespaceUpgrade
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Force]
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountName
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzStorageAccountHierarchicalNamespaceUpgrade
        -InputObject <PSStorageAccount>
        [-Force]
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountObject
  isDefault: false
