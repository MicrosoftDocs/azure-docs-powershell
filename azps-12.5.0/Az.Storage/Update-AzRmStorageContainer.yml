syntaxes:
- syntax: |-
    ```Syntax
    Update-AzRmStorageContainer
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        -Name <String>
        [-PublicAccess <PSPublicAccess>]
        [-Metadata <Hashtable>]
        [-RootSquash <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountName
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzRmStorageContainer
        -Name <String>
        -StorageAccount <PSStorageAccount>
        [-PublicAccess <PSPublicAccess>]
        [-Metadata <Hashtable>]
        [-RootSquash <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountObject
  isDefault: false
- syntax: |-
