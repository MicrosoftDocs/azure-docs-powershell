syntaxes:
- syntax: |-
    ```Syntax
    Restore-AzStorageContainer
        [-Name] <String>
        [-VersionId] <String>
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
