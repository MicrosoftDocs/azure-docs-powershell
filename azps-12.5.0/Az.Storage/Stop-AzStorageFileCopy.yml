### YamlMime:PowerShellCmdlet1
uid: Az.Storage.Stop-AzStorageFileCopy
name: Stop-AzStorageFileCopy
module: Az.Storage
isPreview: false
summary: |-
  Stops a copy operation to the specified destination file.
description: |-
  The **Stop-AzStorageFileCopy** cmdlet stops copying a file to a destination file.
parameters:
