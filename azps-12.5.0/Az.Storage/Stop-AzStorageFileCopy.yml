syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzStorageFileCopy
        [-ShareName] <String>
        [-FilePath] <String>
        [-CopyId <String>]
        [-Force]
        [-DisAllowTrailingDot]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ShareName
  isDefault: false
- syntax: |-
    ```Syntax
    Stop-AzStorageFileCopy
        [-File] <CloudFile>
        [-ShareFileClient <ShareFileClient>]
        [-CopyId <String>]
        [-Force]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: File
  isDefault: false
