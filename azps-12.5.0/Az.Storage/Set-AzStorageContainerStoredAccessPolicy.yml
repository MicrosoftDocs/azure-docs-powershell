### YamlMime:PowerShellCmdlet1
uid: Az.Storage.Set-AzStorageContainerStoredAccessPolicy
name: Set-AzStorageContainerStoredAccessPolicy
module: Az.Storage
isPreview: false
summary: |-
  Sets a stored access policy for an Azure storage container.
description: |-
  The **Set-AzStorageContainerStoredAccessPolicy** cmdlet sets a stored access policy for an Azure storage container.
