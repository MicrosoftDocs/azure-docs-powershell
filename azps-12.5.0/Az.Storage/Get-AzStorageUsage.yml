### YamlMime:PowerShellCmdlet1
uid: Az.Storage.Get-AzStorageUsage
name: Get-AzStorageUsage
module: Az.Storage
isPreview: false
summary: |-
  Gets the Storage resource usage of the current subscription.
description: |-
  The **Get-AzStorageUsage** cmdlet gets the resource usage for Azure Storage for the current subscription.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Indicate to get Storage resources usage on the specified location.
      If not specified, will get Storage resources usage on all locations under the subscription.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStorageUsage
        -Location <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Management.Storage.Models.PSUsage" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the storage resources usage of specified location'
  description: |-
    ```powershell
    Get-AzStorageUsage -Location 'West US'
    ```

    ```output
    LocalizedName : Storage Accounts
    Name          : StorageAccounts
    Unit          : Count
    CurrentValue  : 18
    Limit         : 250
    ```

    This command gets the Storage resources usage of specified location under the current subscription.
