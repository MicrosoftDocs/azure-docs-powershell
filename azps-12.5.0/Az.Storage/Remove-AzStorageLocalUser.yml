syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzStorageLocalUser
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        -UserName <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzStorageLocalUser
        -StorageAccount <PSStorageAccount>
        -UserName <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountObject
  isDefault: false
