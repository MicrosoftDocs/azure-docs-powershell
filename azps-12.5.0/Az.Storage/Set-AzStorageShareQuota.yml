outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.Common.Storage.ResourceModel.AzureStorageFileShare" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set the storage capacity of a share'
  description: |-
    ```powershell
    Set-AzStorageShareQuota -ShareName "ContosoShare01" -Quota 1024
    ```

    This command sets the storage capacity for a share named ContosoShare01 to 1024 GB.
