syntaxes:
- syntax: |-
    ```Syntax
    Set-AzStorageTableStoredAccessPolicy
        [-Table] <String>
        [-Policy] <String>
        [-Permission <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-NoStartTime]
        [-NoExpiryTime]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
