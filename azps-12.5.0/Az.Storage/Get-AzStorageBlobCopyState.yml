syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStorageBlobCopyState
        [-Blob] <String>
        [-Container] <String>
        [-WaitForComplete]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: NamePipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzStorageBlobCopyState
        -CloudBlob <CloudBlob>
        [-WaitForComplete]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
