syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzRmStorageContainer
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        -Name <String>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzRmStorageContainer
        -Name <String>
        -StorageAccount <PSStorageAccount>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountObject
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzRmStorageContainer
        -InputObject <PSContainer>
        [-Force]
        [-PassThru]
