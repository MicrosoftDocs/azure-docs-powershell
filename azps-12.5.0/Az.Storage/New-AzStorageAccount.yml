### YamlMime:PowerShellCmdlet1
uid: Az.Storage.New-AzStorageAccount
name: New-AzStorageAccount
module: Az.Storage
isPreview: false
summary: |-
  Creates a Storage account.
description: |-
  The **New-AzStorageAccount** cmdlet creates an Azure Storage account.
parameters:
