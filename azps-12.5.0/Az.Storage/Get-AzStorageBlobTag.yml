syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStorageBlobTag
        [-Blob] <String>
        [-Container] <String>
        [-TagCondition <String>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NamePipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzStorageBlobTag
        -BlobBaseClient <BlobBaseClient>
        [-TagCondition <String>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BlobPipeline
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzStorageBlobTag
        [-Blob] <String>
        -CloudBlobContainer <CloudBlobContainer>
        [-TagCondition <String>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ContainerPipeline
  isDefault: false
