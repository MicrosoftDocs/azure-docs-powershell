syntaxes:
- syntax: |-
    ```Syntax
    New-AzOperationalInsightsWindowsPerformanceCounterDataSource
        [-ResourceGroupName] <String>
        [-WorkspaceName] <String>
        [-Name] <String>
        [-ObjectName] <String>
        [-CounterName] <String>
        [-InstanceName <String>]
        [-IntervalSeconds <Int32>]
        [-UseLegacyCollector]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByWorkspaceName
  isDefault: true
- syntax: |-
