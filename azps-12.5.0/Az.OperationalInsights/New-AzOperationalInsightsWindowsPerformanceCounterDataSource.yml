uid: Az.OperationalInsights.New-AzOperationalInsightsWindowsPerformanceCounterDataSource
name: New-AzOperationalInsightsWindowsPerformanceCounterDataSource
module: Az.OperationalInsights
isPreview: false
summary: |-
  Adds Windows performance counter data source for connected computers that run the Windows operating system.
description: |-
