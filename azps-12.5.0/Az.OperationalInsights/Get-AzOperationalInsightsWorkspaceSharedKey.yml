uid: Az.OperationalInsights.Get-AzOperationalInsightsWorkspaceSharedKey
name: Get-AzOperationalInsightsWorkspaceSharedKey
module: Az.OperationalInsights
isPreview: false
summary: |-
  Gets the shared keys for a workspace.
description: |-
  The **Get-AzOperationalInsightsWorkspaceSharedKey** cmdlet lists the shared keys for a workspace.
  The keys are used to connect Operational Insights agents to the workspace.
