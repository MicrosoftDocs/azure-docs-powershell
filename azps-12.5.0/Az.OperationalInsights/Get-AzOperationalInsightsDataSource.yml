    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzOperationalInsightsDataSource
        [[-ResourceGroupName] <String>]
        [[-WorkspaceName] <String>]
        [-Kind] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByWorkspaceNameByKind
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzOperationalInsightsDataSource
        [-Workspace] <PSWorkspace>
        [[-Name] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByWorkspaceObjectByName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzOperationalInsightsDataSource
        [[-Workspace] <PSWorkspace>]
        [[-Kind] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
