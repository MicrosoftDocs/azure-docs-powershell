### YamlMime:PowerShellCmdlet1
uid: Az.OperationalInsights.Get-AzOperationalInsightsDataSource
name: Get-AzOperationalInsightsDataSource
module: Az.OperationalInsights
isPreview: false
summary: |-
  Get datasources under Azure Log Analytics workspace.
description: |-
  The **Get-AzOperationalInsightsDataSource** cmdlet gets data sources.
  You can specify a data source to get.
  You can filter the results based on the kind of data source.
notes: |-
  * Keywords: azure, azurerm, arm, resource, management, manager, operational, insights
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Kind
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the kind of data sources to get.
      The acceptable values for this parameter are:
      - AzureActivityLog
      - CustomLog
      - LinuxPerformanceObject
      - LinuxSyslog
      - WindowsEvent
      - WindowsPerformanceCounter
    acceptedValues:
    - AzureAuditLog
    - AzureActivityLog
    - CustomLog
    - LinuxPerformanceObject
    - LinuxSyslog
    - WindowsEvent
    - WindowsPerformanceCounter
    - ApplicationInsights
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByWorkspaceNameByKind
      position: "4"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a data source to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByWorkspaceObjectByName
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a resource group that contains data sources to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByWorkspaceNameByKind
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Workspace
    type: <xref href="Microsoft.Azure.Commands.OperationalInsights.Models.PSWorkspace" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a workspace in which this cmdlet operates.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByWorkspaceObjectByName
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WorkspaceName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a workspace in which this cmdlet operates.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByWorkspaceNameByKind
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
