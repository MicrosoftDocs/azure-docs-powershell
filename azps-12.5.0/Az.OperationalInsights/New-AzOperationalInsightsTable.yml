syntaxes:
- syntax: |-
    ```Syntax
    New-AzOperationalInsightsTable
        [-ResourceGroupName] <String>
        [-WorkspaceName] <String>
        [-TableName] <String>
        [[-RetentionInDays] <Int32>]
        [-TotalRetentionInDays <Int32>]
        [-Column <Hashtable>]
        [-Plan <String>]
        [-Description <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
