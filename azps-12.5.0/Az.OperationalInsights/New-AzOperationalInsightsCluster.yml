        [-ClusterName] <String>
        [-Location] <String>
        [-IdentityType <String>]
        [-SkuName <String>]
        -SkuCapacity <Int64>
        [-Tag <Hashtable>]
        [-KeyVaultUri <String>]
        [-KeyName <String>]
        [-KeyVersion <String>]
        [-IsAvailabilityZonesEnabled <Boolean>]
        [-IsDoubleEncryptionEnabled <Boolean>]
        [-BillingType <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
