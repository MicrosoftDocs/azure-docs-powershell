syntaxes:
- syntax: |-
    ```Syntax
    New-AzDigitalTwinsInstance
        -ResourceGroupName <String>
        -ResourceName <String>
        -Location <String>
        [-SubscriptionId <String>]
        [-IdentityType <DigitalTwinsIdentityType>]
        [-PrivateEndpointConnection <IPrivateEndpointConnection[]>]
        [-PublicNetworkAccess <PublicNetworkAccess>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDigitalTwinsInstance
        -InputObject <IDigitalTwinsIdentity>
        -Location <String>
        [-IdentityType <DigitalTwinsIdentityType>]
        [-PrivateEndpointConnection <IPrivateEndpointConnection[]>]
        [-PublicNetworkAccess <PublicNetworkAccess>]
        [-Tag <Hashtable>]
