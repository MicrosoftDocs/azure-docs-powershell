syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDigitalTwinsInstance
        -ResourceGroupName <String>
        -ResourceName <String>
        [-SubscriptionId <String>]
        [-IdentityType <DigitalTwinsIdentityType>]
        [-PublicNetworkAccess <PublicNetworkAccess>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDigitalTwinsInstance
        -InputObject <IDigitalTwinsIdentity>
        [-IdentityType <DigitalTwinsIdentityType>]
        [-PublicNetworkAccess <PublicNetworkAccess>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
