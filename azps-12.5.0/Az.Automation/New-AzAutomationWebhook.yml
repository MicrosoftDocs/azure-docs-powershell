syntaxes:
- syntax: |-
    ```Syntax
    New-AzAutomationWebhook
        [-Name] <String>
        [-RunbookName] <String>
        [-IsEnabled] <Boolean>
        [-ExpiryTime] <DateTimeOffset>
        [-Parameters <IDictionary>]
        [-Force]
        [-RunOn <String>]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
