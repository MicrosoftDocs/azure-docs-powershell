syntaxes:
- syntax: |-
    ```Syntax
    Get-AzAutomationJobOutput
        [-Id] <Guid>
        [-Stream <StreamType>]
        [-StartTime <DateTimeOffset>]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
