uid: Az.Automation.Get-AzAutomationJobOutput
name: Get-AzAutomationJobOutput
module: Az.Automation
isPreview: false
summary: |-
  Gets the output of an Automation job.
description: |-
  The **Get-AzAutomationJobOutput** cmdlet gets the output of an Azure Automation job.
