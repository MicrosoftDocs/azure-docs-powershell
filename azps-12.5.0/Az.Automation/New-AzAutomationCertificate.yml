syntaxes:
- syntax: |-
    ```Syntax
    New-AzAutomationCertificate
        [-Name] <String>
        [-Description <String>]
        [-Password <SecureString>]
        [-Path] <String>
        [-Exportable]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
