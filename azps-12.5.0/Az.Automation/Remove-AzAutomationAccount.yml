syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzAutomationAccount
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
