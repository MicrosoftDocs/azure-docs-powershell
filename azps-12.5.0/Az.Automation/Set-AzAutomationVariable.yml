syntaxes:
- syntax: |-
    ```Syntax
    Set-AzAutomationVariable
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        -Encrypted <Boolean>
        -Value <Object>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
