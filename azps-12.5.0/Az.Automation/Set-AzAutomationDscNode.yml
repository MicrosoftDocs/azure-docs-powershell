syntaxes:
- syntax: |-
    ```Syntax
    Set-AzAutomationDscNode
        -Id <Guid>
        -NodeConfigurationName <String>
        [-Force]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
