syntaxes:
- syntax: |-
    ```Syntax
    New-AzAutomationSourceControl
        -Name <String>
        -RepoUrl <Uri>
        -SourceType <String>
        -AccessToken <SecureString>
        -FolderPath <String>
        [-Branch <String>]
        [-Description <String>]
        [-EnableAutoSync]
        [-DoNotPublishRunbook]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
