### YamlMime:PowerShellCmdlet1
uid: Az.Automation.Get-AzAutomationDscNodeConfigurationDeploymentSchedule
name: Get-AzAutomationDscNodeConfigurationDeploymentSchedule
module: Az.Automation
isPreview: false
summary: |-
  Gets a DSC Node configuration deployment job schedule in Automation.
description: |-
  The **Get-AzAutomationDscNodeConfigurationDeployment** cmdlet deploys an APS Desired State Configuration (DSC) node configuration in Azure Automation.
parameters:
  cmdletParameters:
  - name: AutomationAccountName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Automation account that contains the DSC configuration that this cmdlet compiles.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: JobScheduleId
    type: <xref href="System.Guid" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Job Schedule id of an existing scheduled deployment job.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByJobScheduleId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a resource group in which this cmdlet compiles a configuration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzAutomationDscNodeConfigurationDeploymentSchedule
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByAll
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzAutomationDscNodeConfigurationDeploymentSchedule
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        -JobScheduleId <Guid>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByJobScheduleId
  isDefault: false
inputs:
- name: <xref href="System.Guid" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Automation.Model.NodeConfigurationDeploymentSchedule" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all the deployment schedules'
  description: |-
    ```powershell
    Get-AzAutomationDscNodeConfigurationDeploymentSchedule `
                -AutomationAccountName "Contoso01"  `
                -ResourceGroupName "ResourceGroup01"
    ```

    ```output
    ResourceGroupName     : ResourceGroup01
    AutomationAccountName : Contoso01
    JobScheduleId         : 2b1d7738-093d-4ff7-b87b-e4b2321319e5
    JobSchedule           : Microsoft.Azure.Commands.Automation.Model.JobSchedule
    RunbookName           : Deploy-NodeConfigurationToAutomationDscNodesV1

    ResourceGroupName     : ResourceGroup01
    AutomationAccountName : Contoso01
    JobScheduleId         : e347dfc4-62fe-4ed6-adfb-55518c57b558
    JobSchedule           : Microsoft.Azure.Commands.Automation.Model.JobSchedule
    RunbookName           : Deploy-NodeConfigurationToAutomationDscNodesV1
    ```
- title: 'Example 2: Get a deployment schedule'
  description: |-
    <!-- Skip: Output cannot be splitted from code -->


    ```powershell
    $js = Get-AzAutomationDscNodeConfigurationDeploymentSchedule `
                     -AutomationAccountName "Contoso01" `
                     -ResourceGroupName "ResourceGroup01" `
                     -JobScheduleId 2b1d7738-093d-4ff7-b87b-e4b2321319e5
    $js

    ResourceGroupName     : ResourceGroup01
    AutomationAccountName : Contoso01
    JobScheduleId         : 2b1d7738-093d-4ff7-b87b-e4b2321319e5
    JobSchedule           : Microsoft.Azure.Commands.Automation.Model.JobSche
    RunbookName           : Deploy-NodeConfigurationToAutomationDscNodesV1

    $js.JobSchedule

    ResourceGroupName     : ResourceGroup01
    RunOn                 :
    AutomationAccountName : Contoso01
    JobScheduleId         : 2b1d7738-093d-4ff7-b87b-e4b2321319e5
    RunbookName           : Deploy-NodeConfigurationToAutomationDscNodesV1
    ScheduleName          : TestScheduleName
    Parameters            : {AutomationAccountName, NodeConfigurationName, ResourceGroupName, ListOfNodeNames}
    HybridWorker          :
    ```

    The above command deploys the DSC node configuration named "Config01.Node1" to the given two-dimensional array of Node Names. The deployment happens in a staged manner.
