syntaxes:
- syntax: |-
    ```Syntax
    Set-AzAutomationModule
        [-Name] <String>
        [-ContentLinkUri <Uri>]
        [-ContentLinkVersion <String>]
        [-RuntimeVersion <String>]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
