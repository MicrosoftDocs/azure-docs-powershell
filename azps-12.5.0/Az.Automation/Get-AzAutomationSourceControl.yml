    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzAutomationSourceControl
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-SourceType <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByAll
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzAutomationSourceControl
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        -Name <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Automation.Model.SourceControl" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    This command gets an Automation source control named VSTSNative in the account named devAccount.


    ```powershell
    Get-AzAutomationSourceControl -ResourceGroupName "rg1" `
                                               -AutomationAccountName "devAccount" `
                                               -Name "VSTSNative"
    ```

    ```output
    Name            SourceType Branch FolderPath  AutoSync PublishRunbook RepoUrl
    ----            ---------- ------ ----------  -------- -------------- -------
    VSTSNative      VsoTfvc           /MyRunbooks False    True           https://contoso.visualstudio.com/_git/Fin...
    ```
