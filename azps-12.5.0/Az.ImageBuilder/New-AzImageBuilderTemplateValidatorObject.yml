syntaxes:
- syntax: |-
    ```Syntax
    New-AzImageBuilderTemplateValidatorObject
        [-PowerShellValidator]
        [-Inline <String[]>]
        [-RunAsSystem <Boolean>]
        [-RunElevated <Boolean>]
        [-ScriptUri <String>]
        [-Sha256Checksum <String>]
        [-ValidExitCode <Int32[]>]
        [-Name <String>]
        [<CommonParameters>]
    ```
  parameterSetName: PowerShellValidator
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzImageBuilderTemplateValidatorObject
        [-Inline <String[]>]
        [-ScriptUri <String>]
        [-Sha256Checksum <String>]
        [-Name <String>]
        [-ShellValidator]
        [<CommonParameters>]
    ```
  parameterSetName: ShellValidator
  isDefault: false
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ImageBuilder.Models.Api20220701.ImageTemplatePowerShellValidator" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ImageBuilder.Models.Api20220701.ImageTemplateShellValidator" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a PowerShell validator.'
  description: |-
    ```powershell
    New-AzImageBuilderTemplateValidatorObject -PowerShellValidator -Name PowerShellValidator -ScriptUri "https://example.com/path/to/script.sh"
    ```

    ```output
    Name                Inline RunAsSystem RunElevated ScriptUri                             Sha256Checksum ValidExitCode
    ----                ------ ----------- ----------- ---------                             -------------- -------------
    PowerShellValidator                                https://example.com/path/to/script.sh
    ```

    This command creates a powershell validator.
- title: 'Example 2: Create a Shell validator.'
  description: |-
    ```powershell
    New-AzImageBuilderTemplateValidatorObject -ShellValidator -Name ShellValidator -ScriptUri "https://example.com/path/to/script.sh"
    ```

    ```output
    Name           Inline ScriptUri                             Sha256Checksum
    ----           ------ ---------                             --------------
    ShellValidator        https://example.com/path/to/script.sh
    ```

    This command creates a shell validator.
