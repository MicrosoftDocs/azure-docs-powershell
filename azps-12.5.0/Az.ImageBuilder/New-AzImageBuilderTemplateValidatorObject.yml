uid: Az.ImageBuilder.New-AzImageBuilderTemplateValidatorObject
name: New-AzImageBuilderTemplateValidatorObject
module: Az.ImageBuilder
isPreview: false
summary: |-
  Create an in-memory object for ImageTemplateValidator.
description: |-
  Create an in-memory object for ImageTemplateValidator.
