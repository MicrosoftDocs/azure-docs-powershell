- title: 'Example 1: Update the tags for this Virtual Machine Image Template.'
  description: |-
    ```powershell
    Update-AzImageBuilderTemplate -Name azps-ibt-1 -ResourceGroupName azps_test_group_imagebuilder -Tag @{"123"="abc"}
    ```

