syntaxes:
- syntax: |-
    ```Syntax
    Update-AzImageBuilderTemplate
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IdentityType <ResourceIdentityType>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzImageBuilderTemplate
        -InputObject <IImageBuilderIdentity>
        [-IdentityType <ResourceIdentityType>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
