syntaxes:
- syntax: |-
    ```Syntax
    Set-AzBlueprint
        -Name <String>
        -BlueprintFile <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateBlueprintBySubscription
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzBlueprint
        -Name <String>
        -ManagementGroupId <String>
        -BlueprintFile <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
