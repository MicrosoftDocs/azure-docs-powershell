### YamlMime:PowerShellCmdlet1
uid: Az.Blueprint.Get-AzBlueprintAssignment
name: Get-AzBlueprintAssignment
module: Az.Blueprint
isPreview: false
summary: |-
  Get one or more blueprint assignments.
description: |-
  Get one or more blueprint assignments. Blueprint assignments exist at the subscription scope.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ManagementGroupId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The ID of the management group where the Blueprint assignment is saved.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByManagementGroupAndName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: ManagementGroupScope
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
