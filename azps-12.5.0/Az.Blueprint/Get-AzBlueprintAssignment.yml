syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBlueprintAssignment
        [-SubscriptionId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SubscriptionScope
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzBlueprintAssignment
        -Name <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: BySubscriptionAndName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzBlueprintAssignment
        -Name <String>
        -ManagementGroupId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByManagementGroupAndName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzBlueprintAssignment
        -ManagementGroupId <String>
        [-DefaultProfile <IAzureContextContainer>]
