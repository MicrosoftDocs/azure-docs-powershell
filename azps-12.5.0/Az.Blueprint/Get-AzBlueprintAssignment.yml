      Blueprint assignment name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BySubscriptionAndName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: ByManagementGroupAndName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubscriptionId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Subscription Id the blueprint assignment is deployed to.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SubscriptionScope
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: BySubscriptionAndName
