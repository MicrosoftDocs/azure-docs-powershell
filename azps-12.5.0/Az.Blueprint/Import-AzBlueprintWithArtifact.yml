syntaxes:
- syntax: |-
    ```Syntax
    Import-AzBlueprintWithArtifact
        -Name <String>
        [-SubscriptionId <String>]
        [-ManagementGroupId <String>]
        -InputPath <String>
        [-IncludeSubFolders]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
