uid: Az.Blueprint.Import-AzBlueprintWithArtifact
name: Import-AzBlueprintWithArtifact
module: Az.Blueprint
isPreview: false
summary: |-
  Import a blueprint file in JSON format to a blueprint object and save it within the specified subscription or management group.
description: |-
