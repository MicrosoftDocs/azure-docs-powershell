    Import-AzBlueprintWithArtifact -Name MySimpleBlueprint -SubscriptionId aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e -InputPath  C:\Blueprints\SimpleBlueprint
    ```

