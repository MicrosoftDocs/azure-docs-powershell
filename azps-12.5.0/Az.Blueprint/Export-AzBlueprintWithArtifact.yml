syntaxes:
- syntax: |-
    ```Syntax
    Export-AzBlueprintWithArtifact
        -Blueprint <PSBlueprintBase>
        -OutputPath <String>
        [-Version <String>]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
