examples:
- title: Example 1
  description: |-
    ```powershell
    $bp = Get-AzBlueprint -Name SimpleBlueprint
    Export-AzBlueprintWithArtifact -Blueprint $bp -Version 1.0 -OutputPath C:\Blueprints
    ```

    Export a blueprint definition with its artifacts and save to disk.
