        [-SubscriptionId <String>]
        -MoveResource <String[]>
        [-MoveResourceInputType <MoveResourceInputType>]
        [-ValidateOnly]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
