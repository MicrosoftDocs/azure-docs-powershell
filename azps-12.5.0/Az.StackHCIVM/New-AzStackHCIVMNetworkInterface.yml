syntaxes:
- syntax: |-
    ```Syntax
    New-AzStackHCIVMNetworkInterface
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        -CustomLocationId <String>
        [-DnsServer <String[]>]
        [-IpAddress <String>]
        [-MacAddress <String>]
        [-SubnetId <String>]
        [-SubnetName <String>]
        [-SubnetResourceGroup <String>]
        [-IpConfiguration <Hashtable[]>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
