syntaxes:
- syntax: |-
    ```Syntax
    New-AzStackHCIVMVirtualHardDisk
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        -CustomLocationId <String>
        [-BlockSizeByte <Int32>]
        [-StoragePathId <String>]
        [-StoragePathName <String>]
        [-StoragePathResourceGroup <String>]
        [-DiskFileFormat <Object>]
        [-SizeGb <Int64>]
        [-Dynamic]
        [-HyperVGeneration <Object>]
        [-LogicalSectorByte <Int32>]
        [-PhysicalSectorByte <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.StackHCIVM.Models.IVirtualHardDisks" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a Virtual Hard Disk'
  description: |-
    ```powershell
    New-AzStackHCIVMVirtualHardDisk -Name "testVhd" -ResourceGroupName "test-rg" -CustomLocationId "/subscriptions/{subscriptionID}/resourcegroups/{resourceGroupName}/providers/microsoft.extendedlocation/customlocations/{customLocationName}" -Location "eastus" -SizeGb 2
    ```

    ```output
    Name            ResourceGroupName
    ----            -----------------
    testVhd       test-rg
    ```

    This command creates a virtual hard disk in the specified resource group.
