- title: 'Example 1: Removes a Network Interface from a  Virtual Machine'
  description: |-
    ```powershell
    Remove-AzStackHCIVMVirtualMachineNetworkInterface  -Name "testVm" -ResourceGroupName "test-rg"  -NicName 'testNic'
    ```

