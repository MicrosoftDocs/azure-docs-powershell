    ```Syntax
    New-AzDataMigrationMongoDbDatabaseSetting
        -Name <String>
        [-TargetRequestUnit <Int32>]
        [-CollectionSetting <MongoDbCollectionSetting[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
