syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzDataMigrationCutoverToSqlVM
        -ResourceGroupName <String>
        -SqlVirtualMachineName <String>
        -TargetDbName <String>
        [-SubscriptionId <String>]
        -MigrationOperationId <String>
        [-DefaultProfile <PSObject>]
