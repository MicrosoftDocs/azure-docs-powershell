syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzDataMigrationCommand
        -CommandType <CommandTypeEnum>
        -ResourceGroupName <String>
        -ServiceName <String>
        -ProjectName <String>
        -TaskName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
