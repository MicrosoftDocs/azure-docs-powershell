uid: Az.DataMigration.Invoke-AzDataMigrationCommand
name: Invoke-AzDataMigrationCommand
module: Az.DataMigration
isPreview: false
summary: |-
  Creates a new command to be executed on an existing DMS (classic) task.
description: |-
  The Invoke-AzDataMigrationCommand cmdlet creates a new command task to be run on an existing migration task.
