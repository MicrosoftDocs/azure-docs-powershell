    type: <xref href="Microsoft.Azure.Management.DataMigration.Models.FileShare" data-throw-if-not-resolved="False" />
    description: |-
      File share where the source server database files for this database should be backed up.
      Use this setting to override file share information for each database.
      Use fully qualified domain name for the server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: MigrateSqlServerSqlDbMi
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
