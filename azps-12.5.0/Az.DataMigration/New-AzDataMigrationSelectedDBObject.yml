syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataMigrationSelectedDBObject
        -SourceDatabaseName <String>
        -TargetDatabaseName <String>
        [-MigrateSqlServerSqlDb]
        [-MakeSourceDbReadOnly]
        [-TableMap <System.Collections.Generic.IDictionary`2[System.String,System.String]>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: MigrateSqlServerSqlDb
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDataMigrationSelectedDBObject
        -SourceDatabaseName <String>
        -TargetDatabaseName <String>
        [-MigrateSqlServerSqlDbMi]
        [-BackupFileShare <FileShare>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: MigrateSqlServerSqlDbMi
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Management.DataMigration.Models.FileShare" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Management.DataMigration.Models.MigrateSqlServerSqlDbDatabaseInput" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    New-AzDataMigrationSelectedDBObject -MigrateSqlServerSqlDb -Name "HR" -TargetDatabaseName "HR_PSTEST" -TableMap $tableMap
    ```

    ```output
    Name TargetDatabaseName MakeSourceDbReadOnly TableMap
    ---- ------------------ -------------------- --------
    HR   HR_PSTEST                         False {[HR.COUNTRIES, HR.COUNTRIES]}
    ```
- title: Example 2
  description: |-
    ```powershell
    New-AzDataMigrationSelectedDBObject -MigrateSqlServerSqlDbMi -Name "HR" -TargetDatabaseName "HR_PSTEST" -BackupFileShare $backupFileShare
    ```

    ```output
    Name RestoreDatabaseName BackupFileShare
    ---- ------------------- ---------------
    HR   HRTest              Microsoft.Azure.Management.DataMigration.Models.FileShare
    ```
