### YamlMime:PowerShellCmdlet1
uid: Az.DataMigration.Get-AzDataMigrationPerformanceDataCollection
name: Get-AzDataMigrationPerformanceDataCollection
module: Az.DataMigration
isPreview: false
summary: |-
  Collect performance data for given SQL Server instance(s)
description: |-
  Collect performance data for given SQL Server instance(s)
parameters:
  cmdletParameters:
  - name: ConfigFilePath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Path of the ConfigFile
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ConfigFile
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NumberOfIterations
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Number of iterations of performance data collection to perform before persisting to file.
      For example, with default values, performance data will be persisted every 30 seconds * 20 iterations = 10 minutes.
      (Default: 20, Minimum: 2)
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CommandLine
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OutputFolder
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Folder which data and result reports will be written to/read from.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CommandLine
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PerfQueryInterval
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Interval at which to query performance data, in seconds.
      (Default: 30)
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CommandLine
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SqlConnectionStrings
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Sql Server Connection Strings
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CommandLine
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StaticQueryInterval
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Interval at which to query and persist static configuration data, in seconds.
      (Default: 3600)
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CommandLine
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Time
    type: <xref href="System.Int64" data-throw-if-not-resolved="False" />
    description: |-
      Duration of time in seconds for which you want to collect performance data
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataMigrationPerformanceDataCollection
        -SqlConnectionStrings <String[]>
        [-OutputFolder <String>]
        [-PerfQueryInterval <String>]
        [-StaticQueryInterval <String>]
        [-NumberOfIterations <String>]
        [-Time <Int64>]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: CommandLine
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDataMigrationPerformanceDataCollection
        -ConfigFilePath <String>
        [-Time <Int64>]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: ConfigFile
  isDefault: false
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Run Performance Data Collection on given SQL Server using connection string'
  description: |-
    ```powershell
    Get-AzDataMigrationPerformanceDataCollection -SqlConnectionStrings "Data Source=AALAB03-2K8.REDMOND.CORP.MICROSOFT.COM;Initial Catalog=master;Integrated Security=False;User Id=dummyUserId;Password=dummyPassword" -NumberOfIterations 2
    ```

    ```output
    Connecting to the SQL server(s)...
    Starting data collection...
    Press the Enter key to stop the data collection at any time...

    Security Warning: The negotiated TLS 1.0 is an insecure protocol and is supported for backward compatibility only. The recommended protocol version is TLS 1.2 and later.
    Security Warning: The negotiated TLS 1.0 is an insecure protocol and is supported for backward compatibility only. The recommended protocol version is TLS 1.2 and later.
    Security Warning: The negotiated TLS 1.0 is an insecure protocol and is supported for backward compatibility only. The recommended protocol version is TLS 1.2 and later.
    UTC 2022-02-03 07:04:50, Server AALAB03-2K8:
            Performance data query iteration: 1 of 2, collected 349 data points.
    UTC 2022-02-03 07:04:52, Server AALAB03-2K8:
            Collected static configuration data, and saved to C:\Users\vmanhas\AppData\Local\Microsoft\SqlAssessment.
    Security Warning: The negotiated TLS 1.0 is an insecure protocol and is supported for backward compatibility only. The recommended protocol version is TLS 1.2 and later.
    UTC 2022-02-03 07:05:44, Server AALAB03-2K8:
            Performance data query iteration: 2 of 2, collected 347 data points.
    UTC 2022-02-03 07:07:13, Server AALAB03-2K8:
            Aggregated 696 raw data points to 263 performance counters, and saved to C:\Users\vmanhas\AppData\Local\Microsoft\SqlAssessment.
    UTC 2022-02-03 07:07:16, Server AALAB03-2K8:
            Performance data query iteration: 1 of 2, collected 349 data points.

    Event and Error Logs Folder Path: C:\Users\vmanhas\AppData\Local\Microsoft\SqlAssessment\Logs
    ```

    This command runs Performance Data Collection on given SQL Server using the connection string.
