syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataMigrationLoginsMigration
        -ConfigFilePath <String>
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ConfigFile
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDataMigrationLoginsMigration
        -SourceSqlConnectionString <String[]>
        -TargetSqlConnectionString <String>
        [-CSVFilePath <String>]
        [-ListOfLogin <String[]>]
        [-OutputFolder <String>]
        [-AADDomainName <String>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CommandLine
  isDefault: false
