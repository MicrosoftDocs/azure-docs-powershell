syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataMigrationService
        -ResourceGroupName <String>
        -Name <String>
        [-Force]
        [-DeleteRunningTask]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
