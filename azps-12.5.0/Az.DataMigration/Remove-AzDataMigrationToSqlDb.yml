syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataMigrationToSqlDb
        -ResourceGroupName <String>
        -SqlDbInstanceName <String>
        -TargetDbName <String>
        [-SubscriptionId <String>]
        [-Force]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDataMigrationToSqlDb
        -InputObject <IDataMigrationIdentity>
        [-Force]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteViaIdentity
  isDefault: false
