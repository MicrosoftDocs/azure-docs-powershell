### YamlMime:PowerShellCmdlet1
uid: Az.DataMigration.New-AzDataMigrationSqlServerSchema
name: New-AzDataMigrationSqlServerSchema
module: Az.DataMigration
isPreview: false
summary: |-
  Migrate Sql Server Schema from the source Sql Servers to the target Azure Sql Servers.
description: |-
  Migrate Sql Server Schema from the source Sql Servers to the target Azure Sql Servers.
parameters:
  cmdletParameters:
  - name: Action
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Required.
      Select one schema migration action.
      The valid values are: MigrateSchema, GenerateScript, DeploySchema.
      MigrateSchema is to migrate the database objects to Azure SQL Database target.
      GenerateScript is to generate an editable TSQL schema script that can be used to run on the target to deploy the objects.
      DeploySchema is to run the TSQL script generated from -GenerateScript action on the target to deploy the objects.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CommandLine
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConfigFilePath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Path of the ConfigFile
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ConfigFile
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputScriptFilePath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Optional.
      Location of an editable TSQL schema script.
      Use this parameter only with DeploySchema Action.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CommandLine
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OutputFolder
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Optional.
      Default: %LocalAppData%/Microsoft/SqlSchemaMigrations) Folder where logs will be written and the generated TSQL schema script by GenerateScript Action.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CommandLine
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
