    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceConnectionString
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Required.
      Connection string for the source SQL instance, using the formal connection string format.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CommandLine
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TargetConnectionString
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Required.
      Connection string for the target SQL instance, using the formal connection string format.
