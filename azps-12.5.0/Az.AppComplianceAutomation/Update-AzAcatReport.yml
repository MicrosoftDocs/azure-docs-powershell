syntaxes:
- syntax: |-
    ```Syntax
    Update-AzAcatReport
        -Name <String>
        [-OfferGuid <String>]
        [-Resource <IResourceMetadata[]>]
        [-TimeZone <String>]
        [-TriggerTime <DateTime>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzAcatReport
        -Name <String>
        -Parameter <IReportResource>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Update
  isDefault: false
