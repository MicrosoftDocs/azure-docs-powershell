### YamlMime:PowerShellCmdlet1
uid: Az.StackHCI.Set-AzStackHCI
name: Set-AzStackHCI
module: Az.StackHCI
isPreview: false
summary: |-
  Set-AzStackHCI modifies resource properties of the Microsoft.AzureStackHCI cloud resource representing the on-premises cluster to enable or disable features.
description: |-
  Set-AzStackHCI modifies resource properties of the Microsoft.AzureStackHCI cloud resource representing the on-premises cluster to enable or disable features.
parameters:
  cmdletParameters:
  - name: AccountId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ARM access token.
      Specifying this along with ArmAccessToken will avoid Azure interactive logon.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ArmAccessToken
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ARM access token.
      Specifying this along with AccountId will avoid Azure interactive logon.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies one of the cluster node in on-premise cluster that is registered to Azure.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="System.Management.Automation.PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the credential for the ComputerName.
      Default is the current user executing the Cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DiagnosticLevel
    type: <xref href="DiagnosticLevel" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the diagnostic level for the cluster.
    acceptedValues:
    - Off
    - Basic
    - Enhanced
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EnableWSSubscription
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Specifies if Windows Server Subscription should be enabled or disabled.
      Enabling this feature starts billing through your Azure subscription for Windows Server guest licenses.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EnvironmentName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure Environment.
      Default is AzureCloud.
      Valid values are AzureCloud, AzureChinaCloud, AzurePPE, AzureCanary, AzureUSGovernment
