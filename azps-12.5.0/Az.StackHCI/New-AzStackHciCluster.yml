- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.StackHCI.Models.Api20240401.ICluster" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1:'
  description: |-
    ```powershell
    New-AzStackHciCluster -Name "myCluster" -ResourceGroupName "test-rg" -AadTenantId "00001111-aaaa-2222-bbbb-3333cccc4444" -AadClientId "24a6e53d-04e5-44d2-b7cc-1b732a847dfc" -Location "eastus"
    ```

    ```output
    Location Name      ResourceGroupName
    -------- ----      -----------------
    eastus   myCluster test-rg
    ```

    This command creates a Stack HCI cluster
- title: 'Example 2:'
  description: |-
    ```powershell
    New-AzStackHciCluster -Name "myCluster2" -ResourceGroupName "test-rg" -AadTenantId "00001111-aaaa-2222-bbbb-3333cccc4444" -AadClientId "24a6e53d-04e5-44d2-b7cc-1b732a847dfc" -Location "westeurope" -DesiredPropertyDiagnosticLevel "Off" -DesiredPropertyWindowsServerSubscription "Enabled"
    ```

    ```output
    Location    Name      Resource Group
    --------    ----      -----------------
    westeurope  myCluster test-rg
    ```

    This command creates a Stack HCI cluster with DiagnosticLevel = "Off" and WindowsServerSubscription = "Enabled".
    By default, these values are set to "Basic" and "Disabled" respectively.
