syntaxes:
- syntax: |-
    ```Syntax
    Disable-AzStackHCIAttestation
        [[-ComputerName] <String>]
        [-Credential <PSCredential>]
        [-RemoveVM]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
