examples:
- title: 'Example 1: List Resource Pools in current subscription'
  description: |-
    ```powershell
    Get-AzConnectedVMwareResourcePool -SubscriptionId "aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e"
    ```

    ```output
    Kind   Location      Name                                          ResourceGroupName
    ----   --------      ----                                          -----------------
           eastus        test-rp1                                      test-rg1
           eastus        test-rp2                                      test-rg2
           eastus        test-rp3                                      test-rg3
           eastus        test-rp4                                      test-rg4
           eastus        test-rp5                                      test-rg5
           eastus        test-rp6                                      test-rg6
           eastus        test-rp7                                      test-rg7
           eastus        test-rp8                                      test-rg8
    ```

    This command lists Resource Pools in current subscription.
- title: 'Example 2: List Resource Pools in a resource group'
  description: |-
    ```powershell
    Get-AzConnectedVMwareResourcePool -ResourceGroupName "test-rg" -SubscriptionId "aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e"
    ```

    ```output
    Kind   Location Name         ResourceGroupName
    ----   -------- ----         -----------------
           eastus   test-rp1     test-rg
           eastus   test-rp2     test-rg
    ```

    This command lists Resource Pools in a resource group named `test-rg`.
- title: 'Example 3: Get a specific Resource Pool'
  description: |-
    ```powershell
    Get-AzConnectedVMwareResourcePool -Name "test-rp" -ResourceGroupName "test-rg" -SubscriptionId "aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e"
    ```

