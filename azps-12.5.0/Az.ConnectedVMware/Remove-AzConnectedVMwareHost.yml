examples:
- title: 'Example 1: Delete Host'
  description: |-
    ```powershell
    Remove-AzConnectedVMwareHost -Name "test-host" -ResourceGroupName "test-rg" -SubscriptionId "aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e"
    ```

    This command delete a Host named `test-host` from a resource group named `test-rg`.
