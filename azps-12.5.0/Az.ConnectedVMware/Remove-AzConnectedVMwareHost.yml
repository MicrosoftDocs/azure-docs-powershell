syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzConnectedVMwareHost
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ForceDeletion]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzConnectedVMwareHost
        -InputObject <IConnectedVMwareIdentity>
        [-ForceDeletion]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteViaIdentity
  isDefault: false
