syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetworkAnalyticsDataProduct
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        [-CurrentMinorVersion <String>]
        [-CustomerEncryptionKeyName <String>]
        [-CustomerEncryptionKeyVaultUri <String>]
        [-CustomerEncryptionKeyVersion <String>]
        [-CustomerManagedKeyEncryptionEnabled <ControlState>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-MajorVersion <String>]
        [-ManagedResourceGroupConfigurationLocation <String>]
        [-ManagedResourceGroupConfigurationName <String>]
        [-NetworkaclAllowedQueryIPRangeList <String[]>]
        [-NetworkaclDefaultAction <DefaultAction>]
        [-NetworkaclIPRule <IIPRules[]>]
        [-NetworkaclVirtualNetworkRule <IVirtualNetworkRule[]>]
        [-Owner <String[]>]
        [-PrivateLinksEnabled <ControlState>]
        [-Product <String>]
        [-PublicNetworkAccess <ControlState>]
        [-Publisher <String>]
        [-PurviewAccount <String>]
        [-PurviewCollection <String>]
        [-Redundancy <ControlState>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
