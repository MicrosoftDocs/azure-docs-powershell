syntaxes:
- syntax: |-
    ```Syntax
    Update-AzCustomLocation
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AuthenticationType <String>]
        [-AuthenticationValue <String>]
        [-ClusterExtensionId <String[]>]
        [-DisplayName <String>]
        [-EnableSystemAssignedIdentity <Boolean>]
        [-HostResourceId <String>]
        [-Namespace <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzCustomLocation
        -InputObject <ICustomLocationIdentity>
        [-AuthenticationType <String>]
        [-AuthenticationValue <String>]
        [-ClusterExtensionId <String[]>]
        [-DisplayName <String>]
        [-EnableSystemAssignedIdentity <Boolean>]
        [-HostResourceId <String>]
        [-Namespace <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
