    Location      Name                ProviderName City
    --------      ----                ------------ ----
    westus2       Microsoft_Quincy    Microsoft    Quincy
    westus2       KSAT_Awarua         KSAT         Awarua
    westus2       KSAT_Hartebeesthoek KSAT         Hartebeesthoek
    westus2       KSAT_Athens         KSAT         Athens
