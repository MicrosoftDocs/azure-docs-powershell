syntaxes:
- syntax: |-
    ```Syntax
    New-AzOrbitalContactProfile
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Link <IContactProfileLink[]>
        -Location <String>
        -NetworkConfigurationSubnetId <String>
        [-AutoTrackingConfiguration <AutoTrackingConfiguration>]
        [-EventHubUri <String>]
        [-MinimumElevationDegree <Single>]
        [-MinimumViableContactDuration <String>]
        [-Tag <Hashtable>]
        [-ThirdPartyConfiguration <IContactProfileThirdPartyConfiguration[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
