syntaxes:
- syntax: |-
    ```Syntax
    Update-AzContainerRegistryManifest
        -RepositoryName <String>
        -Manifest <String>
        -RegistryName <String>
        [-DeleteEnabled <Boolean>]
        [-WriteEnabled <Boolean>]
        [-ListEnabled <Boolean>]
        [-ReadEnabled <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByManifestParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzContainerRegistryManifest
        -RepositoryName <String>
        -Tag <String>
        -RegistryName <String>
        [-DeleteEnabled <Boolean>]
        [-WriteEnabled <Boolean>]
        [-ListEnabled <Boolean>]
        [-ReadEnabled <Boolean>]
