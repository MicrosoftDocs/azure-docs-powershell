uid: Az.ContainerRegistry.Update-AzContainerRegistryManifest
name: Update-AzContainerRegistryManifest
module: Az.ContainerRegistry
isPreview: false
summary: |-
  Update ACR manifest.
description: |-
  Update ACR manifest.
  To use this cmdlet please run
  `Update-AzContainerRegistryRepository -RegistryName XXX -Repository XXX -WriteEnable $true`
  first.
