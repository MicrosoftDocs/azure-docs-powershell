syntaxes:
- syntax: |-
    ```Syntax
    Update-AzContainerRegistryCredential
        -RegistryName <String>
        -ResourceGroupName <String>
        -PasswordName <PasswordName>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RegenerateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzContainerRegistryCredential
        -RegistryName <String>
        -ResourceGroupName <String>
        -RegenerateCredentialParameter <IRegenerateCredentialParameters>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Regenerate
  isDefault: false
- syntax: |-
    ```Syntax
    Update-AzContainerRegistryCredential
        -InputObject <IContainerRegistryIdentity>
        -PasswordName <PasswordName>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RegenerateViaIdentityExpanded
  isDefault: false
- syntax: |-
    ```Syntax
    Update-AzContainerRegistryCredential
        -Registry <IRegistry>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RegenerateByRegistry
  isDefault: false
