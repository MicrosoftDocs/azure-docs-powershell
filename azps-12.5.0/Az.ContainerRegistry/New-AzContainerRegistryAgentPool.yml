syntaxes:
- syntax: |-
    ```Syntax
    New-AzContainerRegistryAgentPool
        -Name <String>
        -RegistryName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        [-Count <Int32>]
        [-OS <OS>]
        [-Tag <Hashtable>]
        [-Tier <String>]
        [-VirtualNetworkSubnetResourceId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
