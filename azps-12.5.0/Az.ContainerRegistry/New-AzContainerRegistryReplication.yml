syntaxes:
- syntax: |-
    ```Syntax
    New-AzContainerRegistryReplication
        -RegistryName <String>
        -ResourceGroupName <String>
        -Location <String>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-RegionEndpointEnabled]
        [-Tag <Hashtable>]
        [-ZoneRedundancy <ZoneRedundancy>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzContainerRegistryReplication
        -Registry <IRegistry>
        -Location <String>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-RegionEndpointEnabled]
        [-Tag <Hashtable>]
        [-ZoneRedundancy <ZoneRedundancy>]
        [-DefaultProfile <PSObject>]
