syntaxes:
- syntax: |-
    ```Syntax
    New-AzContainerRegistryCredentials
        -RegistryName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Expiry <DateTime>]
        [-Name <TokenPasswordName>]
        [-TokenId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: GenerateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzContainerRegistryCredentials
        -InputObject <IContainerRegistryIdentity>
        [-Expiry <DateTime>]
        [-Name <TokenPasswordName>]
        [-TokenId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: GenerateViaIdentityExpanded
  isDefault: false
