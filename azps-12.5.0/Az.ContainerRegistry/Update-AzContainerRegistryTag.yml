syntaxes:
- syntax: |-
    ```Syntax
    Update-AzContainerRegistryTag
        -RepositoryName <String>
        -Name <String>
        [-DeleteEnabled <Boolean>]
        [-WriteEnabled <Boolean>]
        [-ListEnabled <Boolean>]
        [-ReadEnabled <Boolean>]
        -RegistryName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
