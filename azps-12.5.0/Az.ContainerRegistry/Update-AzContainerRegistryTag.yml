uid: Az.ContainerRegistry.Update-AzContainerRegistryTag
name: Update-AzContainerRegistryTag
module: Az.ContainerRegistry
isPreview: false
summary: |-
  Update ACR tag.
description: |-
  Update attributes of a given ACR tag.

  Before using this cmdlet you must run `Update-AzContainerRegistryRepository -RegistryName XXX -Repository XXX -WriteEnable $true`
  first.
