uid: Az.ContainerRegistry.Get-AzContainerRegistryManifest
name: Get-AzContainerRegistryManifest
module: Az.ContainerRegistry
isPreview: false
summary: |-
  Get or list ACR manifest.
description: |-
  Get or list ACR manifest.
  To use this cmdlet please run
  `Update-AzContainerRegistryRepository -RegistryName XXX -Repository XXX -ReadEnable $true -ListEnable $true`
  first.
