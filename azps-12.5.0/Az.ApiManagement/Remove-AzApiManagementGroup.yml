syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzApiManagementGroup
        -Context <PsApiManagementContext>
        -GroupId <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
