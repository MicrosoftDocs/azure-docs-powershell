examples:
- title: 'Example 1: Get all API Management services'
  description: |-
    ```powershell
    Get-AzApiManagement
    ```

    This command gets all API Management services within a subscription.
- title: 'Example 2: Get an API Management services by a specific name'
  description: |-
    ```powershell
    Get-AzApiManagement -ResourceGroupName "contosogroup" -Name "contoso"
    ```

