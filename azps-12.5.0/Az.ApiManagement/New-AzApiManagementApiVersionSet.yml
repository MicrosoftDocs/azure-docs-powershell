name: New-AzApiManagementApiVersionSet
module: Az.ApiManagement
isPreview: false
summary: |-
  Creates an API Version Set.
description: |-
  The **New-AzApiManagementApiVersionSet** cmdlet creates an API Version set entity in the Azure API Management context.
