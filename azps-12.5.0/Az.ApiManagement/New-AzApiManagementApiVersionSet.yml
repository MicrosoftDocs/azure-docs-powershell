syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementApiVersionSet
        -Context <PsApiManagementContext>
        [-ApiVersionSetId <String>]
        -Name <String>
        -Scheme <PsApiManagementVersioningScheme>
        [-HeaderName <String>]
        [-QueryName <String>]
        [-Description <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
