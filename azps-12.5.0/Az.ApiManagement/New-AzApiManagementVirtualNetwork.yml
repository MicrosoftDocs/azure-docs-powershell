### YamlMime:PowerShellCmdlet1
uid: Az.ApiManagement.New-AzApiManagementVirtualNetwork
name: New-AzApiManagementVirtualNetwork
module: Az.ApiManagement
isPreview: false
summary: |-
  Creates an instance of PsApiManagementVirtualNetwork.
description: |-
  The **New-AzApiManagementVirtualNetwork** cmdlet is a helper command to create an instance of **PsApiManagementVirtualNetwork**.
  This command is used with **Set-AzApiManagement** and **New-AzApiManagement** cmdlet.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubnetResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the subnet resource ID of the virtual network.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
