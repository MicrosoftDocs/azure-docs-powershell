syntaxes:
- syntax: |-
    ```Syntax
    Set-AzApiManagementSubscription
        -InputObject <PsApiManagementSubscription>
        [-Scope <String>]
        [-UserId <String>]
        [-Name <String>]
        [-PrimaryKey <String>]
        [-SecondaryKey <String>]
        [-State <PsApiManagementSubscriptionState>]
        [-ExpiresOn <DateTime>]
        [-StateComment <String>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInputObject
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzApiManagementSubscription
        -Context <PsApiManagementContext>
        -SubscriptionId <String>
        [-Scope <String>]
        [-UserId <String>]
        [-Name <String>]
        [-PrimaryKey <String>]
