examples:
- title: 'Example 1: Create an empty API Revision for an API'
  description: |-
    ```powershell
    $ApiMgmtContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    New-AzApiManagementApiRevision -Context $context -ApiId "echo-api" -ApiRevision "5"


    New-AzApiManagementApiRevision -Context $context -ApiId "echo-api" -ApiRevision "5"
    ```

    This command creates an API Revision `5` of the `echo-api` API.
- title: 'Example 2: Create an API Revision from an Existing Api and copy All operations, tags and Policies'
  description: |-
    ```powershell
    $context = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    New-AzApiManagementApiRevision -Context $context -ApiId "echo-api" -ApiRevision "5" -SourceApiRevision "1" -ServiceUrl "https://echoapi.cloudapp.net/rev4"
    ```

    ```output
    ApiId                         : echo-api;rev=5
    Name                          : Echo API
    Description                   :
    ServiceUrl                    : http://echoapi.cloudapp.net/api
