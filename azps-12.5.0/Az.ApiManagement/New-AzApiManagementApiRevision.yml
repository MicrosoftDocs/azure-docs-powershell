syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementApiRevision
        -Context <PsApiManagementContext>
        -ApiId <String>
        -ApiRevision <String>
        [-ApiRevisionDescription <String>]
        [-SourceApiRevision <String>]
        [-ServiceUrl <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
