    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzApiManagementApiVersionSet
        -Context <PsApiManagementContext>
        [-ApiVersionSetId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ContextParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzApiManagementApiVersionSet
        -Context <PsApiManagementContext>
        -ResourceId <String>
        [-ApiVersionSetId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceIdParameterSet
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementContext" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementApiVersionSet" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all API Version Sets'
  description: |-
    ```powershell
    $ApiMgmtContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Get-AzApiManagementApiVersionSet -Context $ApiMgmtContext
    ```

    ```output
    ApiVersionSetId   : a93316c8-8b88-46cc-8260-380789a5d598
    Description       :
    VersionQueryName  :
    VersionHeaderName :
    DisplayName       : Echo API
    VersioningScheme  : Segment
    Id                : /subscriptions/subid/resourceGroups/Api-Default-WestUS/providers/Microsoft.ApiManagement/service/contoso/api-version-sets/a916c8-8b88-46cc-8260-380789a5d598
    ResourceGroupName : Api-Default-WestUS
    ServiceName       : contoso

    ApiVersionSetId   : 4cbdfa34-25f3-4a93-a9b6-76b6eade7562
    Description       :
    VersionQueryName  : api-version
    VersionHeaderName :
    DisplayName       : getproduct old
    VersioningScheme  : Query
    Id                : /subscriptions/subid/resourceGroups/Api-Default-WestUS/providers/Microsoft.ApiManagement/service/contoso/api-version-sets/4cbdfa34-25f3-4a93-a9b6-76b6eade7562
    ResourceGroupName : Api-Default-WestUS
    ServiceName       : contoso


    ApiVersionSetId   : 8c441e0e-a0cd-47d8-8d88-f944a83b41bd
    Description       :
    VersionQueryName  :
    VersionHeaderName : Api-Version
    DisplayName       : ordersapi
    VersioningScheme  : Header
    Id                : /subscriptions/subid/resourceGroups/Api-Default-WestUS/providers/Microsoft.ApiManagement/service/contoso/api-version-sets/8c441e0e-a0cd-47d8-8d88-f944a83b41bd
    ResourceGroupName : Api-Default-WestUS
    ServiceName       : contoso
    ```

    This command gets all of the API Version sets for the specified context.
- title: 'Example 2: Get a API Version Set by ID'
  description: |-
    ```powershell
    $ApiMgmtContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Get-AzApiManagementApiVersionSet -Context $ApiMgmtContext -ApiVersionSetId $ApiVersionSetId
    ```

    ```output
    ApiVersionSetId   : 8c441e0e-a0cd-47d8-8d88-f944a83b41bd
    Description       :
    VersionQueryName  :
    VersionHeaderName : Api-Version
    DisplayName       : ordersapi
    VersioningScheme  : Header
    Id                : /subscriptions/subid/resourceGroups/Api-Default-WestUS/providers/Microsoft.ApiManagement/service/contoso/api-version-sets/8c441e0e-a0cd-47d8-8d88-f944a83b41bd
    ResourceGroupName : Api-Default-WestUS
    ServiceName       : contoso
    ```

    This command gets the API Version Set with the specified ID.
