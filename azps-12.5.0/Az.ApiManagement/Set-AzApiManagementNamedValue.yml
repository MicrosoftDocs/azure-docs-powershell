examples:
- title: 'Example 1: Change the tags on the named value'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    $Tags = 'sdk', 'powershell'
    Set-AzApiManagementNamedValue -Context $apimContext -NamedValueId "Property11" -Tag $Tags -PassThru
    ```

    The first command assigns two values to the $Tags variable.
    The second command modifies the named value that has the ID Property11.
    The command assigns the strings in $Tags as tags on the named value.
- title: 'Example 2: Modify the named value to have a secret value'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Set-AzApiManagementNamedValue -Context $apimContext -NamedValueId "Property12" -Secret $True -PassThru
    ```

    This command changes the named value to be Encrypted.
- title: Example 3
  description: |-
    Modifies an API Management Named Value. (autogenerated)

    <!-- Aladdin Generated Example -->
    ```powershell
    Set-AzApiManagementNamedValue -Context <PsApiManagementContext> -Name 'ContosoApi' -NamedValueId 'Property11' -Secret $true -Tag <String[]> -Value 'Property Value'
    ```
