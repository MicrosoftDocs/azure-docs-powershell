syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementApiRelease
        -Context <PsApiManagementContext>
        -ApiId <String>
        -ApiRevision <String>
        [-ReleaseId <String>]
        [-Note <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
