### YamlMime:PowerShellCmdlet1
uid: Az.ApiManagement.Backup-AzApiManagement
name: Backup-AzApiManagement
module: Az.ApiManagement
isPreview: false
summary: |-
  Backs up an API Management service.
description: |-
  The **Backup-AzApiManagement** cmdlet backs up an instance of an Azure API Management service.
  This cmdlet stores the backup as an Azure Storage blob.
parameters:
  cmdletParameters:
  - name: AccessType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The type of access to be used for the storage account.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
