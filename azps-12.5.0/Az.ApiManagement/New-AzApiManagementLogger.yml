syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementLogger
        -Context <PsApiManagementContext>
        -Name <String>
        -ConnectionString <String>
        [-LoggerId <String>]
        [-Description <String>]
        [-IsBuffered <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: EventHubLoggerSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzApiManagementLogger
        -Context <PsApiManagementContext>
        -InstrumentationKey <String>
        [-LoggerId <String>]
        [-Description <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ApplicationInsightsLoggerSet
  isDefault: false
