uid: Az.ApiManagement.New-AzApiManagementLogger
name: New-AzApiManagementLogger
module: Az.ApiManagement
isPreview: false
summary: |-
  Creates an API Management Logger.
description: |-
  The **New-AzApiManagementLogger** cmdlet creates an Azure API Management **Logger**.
