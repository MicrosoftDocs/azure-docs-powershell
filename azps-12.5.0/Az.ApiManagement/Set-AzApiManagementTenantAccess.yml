uid: Az.ApiManagement.Set-AzApiManagementTenantAccess
name: Set-AzApiManagementTenantAccess
module: Az.ApiManagement
isPreview: false
summary: |-
  Enables or disables tenant access.
description: |-
  The **Set-AzApiManagementTenantAccess** cmdlet enables or disables tenant access.
parameters:
  cmdletParameters:
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementContext" data-throw-if-not-resolved="False" />
