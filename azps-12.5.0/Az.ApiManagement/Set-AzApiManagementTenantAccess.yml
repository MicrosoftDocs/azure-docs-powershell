syntaxes:
- syntax: |-
    ```Syntax
    Set-AzApiManagementTenantAccess
        -Context <PsApiManagementContext>
        -Enabled <Boolean>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
