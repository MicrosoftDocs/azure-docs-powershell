### YamlMime:PowerShellCmdlet1
uid: Az.ApiManagement.New-AzApiManagementSslSetting
name: New-AzApiManagementSslSetting
module: Az.ApiManagement
isPreview: false
summary: |-
  Creates an instance of PsApiManagementSslSetting
description: |-
  Helper command to create an instance of PsApiManagementSslSetting.
  This command is to be used with New-AzApiManagement command.
parameters:
  cmdletParameters:
  - name: BackendProtocol
    type: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Backend Security protocol settings. This parameter is optional.
      The valid Protocol Settings are
      `Tls11` - Tls 1.1
      `Tls10` - Tls 1.0
      `Ssl30` - SSL 3.0
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CipherSuite
    type: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Ssl cipher suites settings in the specified order. This parameter is optional.
      The valid Settings are
      `TripleDes168` - Enable / Disable Tripe Des 168
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FrontendProtocol
    type: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Frontend Security protocols settings. This parameter is optional.
      The valid Protocol Settings are
      `Tls11` - Tls 1.1
      `Tls10` - Tls 1.0
      `Ssl30` - SSL 3.0
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerProtocol
    type: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Server protocol settings like Http2. This parameter is optional.
      The valid Settings are
      `Http2` - Enable Http 2.0
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementSslSetting
        [-FrontendProtocol <Hashtable>]
        [-BackendProtocol <Hashtable>]
        [-CipherSuite <Hashtable>]
        [-ServerProtocol <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.ApiManagement.Models.PsApiManagementSslSettings" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an SSL Setting to enable TLS 1.0 on both Backend and Frontend'
  description: |-
    ```powershell
    $enableTls=@{"Tls10" = "True"}
    New-AzApiManagementSslSetting -FrontendProtocol $enableTls -BackendProtocol $enableTls
    ```

    ```output
    FrontendProtocols BackendProtocols CipherSuites ServerProtocols
    ----------------- ---------------- ------------ ---------------
    {Tls10}           {Tls10}
    ```

    Create an new instance of PsApiManagementSslSetting to Enable TLSv 1.0 in both Frontend (between client and APIM) and Backend (between APIM and Backend) of ApiManagement Gateway.
