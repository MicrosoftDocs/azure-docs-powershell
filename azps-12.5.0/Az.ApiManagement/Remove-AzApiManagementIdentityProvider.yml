syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzApiManagementIdentityProvider
        -Context <PsApiManagementContext>
        -Type <PsApiManagementIdentityProviderType>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
