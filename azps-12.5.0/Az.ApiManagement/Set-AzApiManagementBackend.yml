        [-Credential <PsApiManagementBackendCredential>]
        [-Proxy <PsApiManagementBackendProxy>]
        [-ServiceFabricCluster <PsApiManagementServiceFabric>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
