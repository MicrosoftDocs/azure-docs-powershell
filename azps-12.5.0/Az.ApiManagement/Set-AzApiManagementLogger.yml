syntaxes:
- syntax: |-
    ```Syntax
    Set-AzApiManagementLogger
        -Context <PsApiManagementContext>
        -LoggerId <String>
        [-Name <String>]
        [-ConnectionString <String>]
        [-Description <String>]
        [-IsBuffered]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EventHubLoggerSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzApiManagementLogger
        -Context <PsApiManagementContext>
        -LoggerId <String>
        [-InstrumentationKey <String>]
        [-Description <String>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
