syntaxes:
- syntax: |-
    ```Syntax
    New-AzPaloAltoNetworksFirewall
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        -MarketplaceDetailOfferId <String>
        -MarketplaceDetailPublisherId <String>
        -NetworkProfile <INetworkProfile>
        -PlanDataBillingCycle <String>
        -PlanDataPlanId <String>
        [-AssociatedRulestackId <String>]
        [-AssociatedRulestackLocation <String>]
        [-AssociatedRulestackResourceId <String>]
        [-DnsSettingDnsServer <IIPAddress[]>]
        [-DnsSettingEnableDnsProxy <String>]
        [-DnsSettingEnabledDnsType <String>]
        [-EnableSystemAssignedIdentity]
        [-FrontEndSetting <IFrontendSetting[]>]
        [-IsPanoramaManaged <String>]
        [-MarketplaceDetailMarketplaceSubscriptionStatus <String>]
        [-PanEtag <String>]
        [-PanoramaConfigString <String>]
        [-PlanDataUsageType <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
