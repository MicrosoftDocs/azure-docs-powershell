syntaxes:
- syntax: |-
    ```Syntax
    New-AzPaloAltoNetworksProfileObject
        -EnableEgressNat <String>
        -NetworkType <String>
        -PublicIP <IIPAddress[]>
        [-EgressNatIP <IIPAddress[]>]
        [-TrustedRange <String[]>]
        [-VHubAddressSpace <String>]
        [-VHubResourceId <String>]
        [-VnetAddressSpace <String>]
        [-VnetConfigurationIPOfTrustSubnetForUdrAddress <String>]
        [-VnetConfigurationIPOfTrustSubnetForUdrResourceId <String>]
        [-VnetConfigurationTrustSubnetAddressSpace <String>]
        [-VnetConfigurationTrustSubnetResourceId <String>]
        [-VnetConfigurationUnTrustSubnetAddressSpace <String>]
        [-VnetConfigurationUnTrustSubnetResourceId <String>]
        [-VnetResourceId <String>]
        [-VwanConfigurationIPOfTrustSubnetForUdrAddress <String>]
        [-VwanConfigurationIPOfTrustSubnetForUdrResourceId <String>]
        [-VwanConfigurationNetworkVirtualApplianceId <String>]
        [-VwanConfigurationTrustSubnetAddressSpace <String>]
        [-VwanConfigurationTrustSubnetResourceId <String>]
        [-VwanConfigurationUnTrustSubnetAddressSpace <String>]
        [-VwanConfigurationUnTrustSubnetResourceId <String>]
        [<CommonParameters>]
    ```
