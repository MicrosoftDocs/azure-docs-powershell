syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDefault
        [-ResourceGroupName <String>]
        [-Force]
        [-Scope <ContextModificationScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Profile.Models.PSResourceGroup" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Set-AzDefault -ResourceGroupName myResourceGroup
    ```

    ```Output
    Id         : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup
    Name       : myResourceGroup
    Properties : Microsoft.Azure.Management.Internal.Resources.Models.ResourceGroupProperties
    Location   : eastus
    ManagedBy  :
    Tags       :
    ```

    This command sets the default resource group to the resource group specified by the user.
