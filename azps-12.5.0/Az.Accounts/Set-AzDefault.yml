uid: Az.Accounts.Set-AzDefault
name: Set-AzDefault
module: Az.Accounts
isPreview: false
summary: |-
  Sets a default in the current context
description: |-
  The Set-AzDefault cmdlet adds or changes the defaults in the current context.
