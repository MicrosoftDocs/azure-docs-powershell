syntaxes:
- syntax: |-
    ```Syntax
    Clear-AzDefault
        [-ResourceGroup]
        [-PassThru]
        [-Force]
        [-Scope <ContextModificationScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
