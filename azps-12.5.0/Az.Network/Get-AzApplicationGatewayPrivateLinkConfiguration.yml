uid: Az.Network.Get-AzApplicationGatewayPrivateLinkConfiguration
name: Get-AzApplicationGatewayPrivateLinkConfiguration
module: Az.Network
isPreview: false
summary: |-
  Gets the private link configuration of an application gateway.
description: |-
  The **Get-AzApplicationGatewayPrivateLinkConfiguration** cmdlet gets the private link configuration of an application gateway.
