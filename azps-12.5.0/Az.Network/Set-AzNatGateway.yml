    ```powershell
    $nGateway = Get-AzNatGateway -ResourceGroupName "natgateway_test" -Name "ng1"
    $pipArray = $pip, $pip2
    $natUpdate = Set-AzNatGateway -InputObject $nGateway -IdleTimeoutInMinutes 5 -PublicIpAddress $pipArray
