uid: Az.Network.New-AzApplicationGatewayFirewallExclusionConfig
name: New-AzApplicationGatewayFirewallExclusionConfig
module: Az.Network
isPreview: false
summary: |-
  Creates a new exclusion rule list for application gateway waf
description: |-
  The **New-AzApplicationGatewayFirewallExclusionConfig** cmdlet a new exclusion rule list for application gateway waf.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
