### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzNetworkManagerAddressPrefixItem
name: New-AzNetworkManagerAddressPrefixItem
module: Az.Network
isPreview: false
summary: |-
  Creates a network manager address prefix item.
description: |-
  The **New-AzNetworkManagerAddressPrefixItem** cmdlet creates a network manager address prefix item.
parameters:
  cmdletParameters:
  - name: AddressPrefix
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      AddressPrefix
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AddressPrefixType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      AddressPrefix Type.
    acceptedValues:
    - IPPrefix
    - ServiceTag
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
