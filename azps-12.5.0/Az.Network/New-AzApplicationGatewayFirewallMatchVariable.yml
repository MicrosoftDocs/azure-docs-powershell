uid: Az.Network.New-AzApplicationGatewayFirewallMatchVariable
name: New-AzApplicationGatewayFirewallMatchVariable
module: Az.Network
isPreview: false
summary: |-
  Creates a match variable for firewall condition.
description: |-
  The **New-AzApplicationGatewayFirewallMatchVariable** creates a match variable for firewall condition.
