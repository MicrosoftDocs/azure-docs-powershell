syntaxes:
- syntax: |-
    ```Syntax
    New-AzApplicationGatewayIdentity
        -UserAssignedIdentityId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
