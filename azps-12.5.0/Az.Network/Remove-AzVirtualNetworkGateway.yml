- syntax: |-
    ```Syntax
    Remove-AzVirtualNetworkGateway
        -Name <String>
        -ResourceGroupName <String>
        [-Force]
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
