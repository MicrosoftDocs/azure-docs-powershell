syntaxes:
- syntax: |-
    ```Syntax
    New-AzFirewallPacketCaptureParameter
        -DurationInSeconds <UInt32>
        -NumberOfPacketsToCapture <UInt32>
        -SasUrl <String>
        -FileName <String>
        [-Protocol <String>]
        [-Flag <String[]>]
        -Filter <PSAzureFirewallPacketCaptureRule[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
