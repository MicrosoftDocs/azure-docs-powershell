uid: Az.Network.New-AzApplicationGatewayUrlPathMapConfig
name: New-AzApplicationGatewayUrlPathMapConfig
module: Az.Network
isPreview: false
summary: |-
  Creates an array of URL path mappings to a backend server pool.
