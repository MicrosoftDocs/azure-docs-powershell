syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzFirewall
        -Name <String>
        -ResourceGroupName <String>
        [-Force]
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
