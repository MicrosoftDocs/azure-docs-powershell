syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzExpressRouteCrossConnectionPeering
        -ExpressRouteCrossConnection <PSExpressRouteCrossConnection>
        [-Name <String>]
        [-PeerAddressType <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
