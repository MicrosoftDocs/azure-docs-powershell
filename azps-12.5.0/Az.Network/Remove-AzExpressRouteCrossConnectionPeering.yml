uid: Az.Network.Remove-AzExpressRouteCrossConnectionPeering
name: Remove-AzExpressRouteCrossConnectionPeering
module: Az.Network
isPreview: false
summary: |-
  Removes an ExpressRoute cross connection peering configuration.
