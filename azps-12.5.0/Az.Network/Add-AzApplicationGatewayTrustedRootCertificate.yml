syntaxes:
- syntax: |-
    ```Syntax
    Add-AzApplicationGatewayTrustedRootCertificate
        -ApplicationGateway <PSApplicationGateway>
        -Name <String>
        -CertificateFile <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
