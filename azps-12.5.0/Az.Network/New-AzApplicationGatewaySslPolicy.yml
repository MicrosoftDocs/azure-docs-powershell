syntaxes:
- syntax: |-
    ```Syntax
    New-AzApplicationGatewaySslPolicy
        [-DisabledSslProtocols <String[]>]
        [-PolicyType <String>]
        [-PolicyName <String>]
        [-CipherSuite <String[]>]
        [-MinProtocolVersion <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
