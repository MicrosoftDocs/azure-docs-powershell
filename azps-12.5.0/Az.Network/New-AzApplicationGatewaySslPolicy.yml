### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzApplicationGatewaySslPolicy
name: New-AzApplicationGatewaySslPolicy
module: Az.Network
isPreview: false
summary: |-
  Creates an SSL policy for an application gateway.
description: |-
  The **New-AzApplicationGatewaySslPolicy** cmdlet creates an SSL policy for an application gateway.
notes: |-
  * Keywords: azure, azurerm, arm, resource, management, manager, network, networking
