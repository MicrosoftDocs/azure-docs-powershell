- syntax: |-
    ```Syntax
    New-AzVirtualWan
        -ResourceGroupName <String>
        -Name <String>
        -Location <String>
        [-AllowVnetToVnetTraffic]
        [-AllowBranchToBranchTraffic]
        [-Tag <Hashtable>]
