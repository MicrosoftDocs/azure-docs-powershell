syntaxes:
- syntax: |-
    ```Syntax
    Update-AzVirtualWan
        -ResourceGroupName <String>
        -Name <String>
        [-AllowVnetToVnetTraffic <Boolean>]
        [-AllowBranchToBranchTraffic <Boolean>]
        [-Tag <Hashtable>]
        [-VirtualWANType <String>]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByVirtualWanName
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzVirtualWan
        -InputObject <PSVirtualWan>
        [-AllowVnetToVnetTraffic <Boolean>]
        [-AllowBranchToBranchTraffic <Boolean>]
        [-Tag <Hashtable>]
        [-VirtualWANType <String>]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
