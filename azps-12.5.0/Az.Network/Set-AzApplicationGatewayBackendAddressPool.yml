### YamlMime:PowerShellCmdlet1
uid: Az.Network.Set-AzApplicationGatewayBackendAddressPool
name: Set-AzApplicationGatewayBackendAddressPool
module: Az.Network
isPreview: false
summary: |-
  Updates a back-end address pool for an application gateway.
description: |-
  The **Set-AzApplicationGatewayBackendAddressPool** cmdlet updates a back-end address pool for an Azure application gateway.
  Back-end addresses can be specified as IP addresses or fully-qualified domain names (FQDN).
