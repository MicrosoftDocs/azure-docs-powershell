        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        [-Description <String>]
        [-Tag <Hashtable>]
        -NetworkManagerScope <PSNetworkManagerScopes>
        -NetworkManagerScopeAccess <NetworkManagerScopeAccessType[]>
        [-Force]
        [-AsJob]
