examples:
- title: Example 1
  description: |-
    Set configuration for an existing gateway


    ```powershell
    $lgw = Get-AzLocalNetworkGateway -Name myLocalGW -ResourceGroupName myRG
    Set-AzLocalNetworkGateway -LocalNetworkGateway $lgw
    ```

