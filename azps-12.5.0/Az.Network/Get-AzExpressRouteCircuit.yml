### YamlMime:PowerShellCmdlet1
uid: Az.Network.Get-AzExpressRouteCircuit
name: Get-AzExpressRouteCircuit
module: Az.Network
isPreview: false
summary: |-
  Gets an Azure ExpressRoute circuit from Azure.
description: |-
  The **Get-AzExpressRouteCircuit** cmdlet is used to retrieve an ExpressRoute circuit object
  from your subscription. The circuit object returned can be used as input to other cmdlets that
  operate on ExpressRoute circuits.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the ExpressRoute circuit.
    aliases:
    - ResourceName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: true
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the resource group that contains the ExpressRoute circuit.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: true
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzExpressRouteCircuit
        [-Name <String>]
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSExpressRouteCircuit" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the ExpressRoute circuit'
  description: |-
    ```powershell
    Get-AzExpressRouteCircuit -ResourceGroupName testrg -Name test
    ```

    ```output
    Name                             : test
    ResourceGroupName                : testrg
    Location                         : southcentralus
    Id                               : /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/testrg/pro
                                       viders/Microsoft.Network/expressRouteCircuits/test
    Etag                             : W/"00000000-0000-0000-0000-000000000000"
    ProvisioningState                : Succeeded
    Sku                              : {
                                         "Name": "Standard_UnlimitedData",
                                         "Tier": "Standard",
                                         "Family": "UnlimitedData"
                                       }
    CircuitProvisioningState         : Enabled
    ServiceProviderProvisioningState : NotProvisioned
    ServiceProviderNotes             :
    ServiceProviderProperties        : {
                                         "ServiceProviderName": "AT&T",
                                         "PeeringLocation": "Silicon Valley",
                                         "BandwidthInMbps": 50
                                       }
    ExpressRoutePort                 : null
    BandwidthInGbps                  :
    Stag                             :
    ServiceKey                       : 00000000-0000-0000-0000-000000000000
    Peerings                         : []
    Authorizations                   : []
    AllowClassicOperations           : False
    GatewayManagerEtag               :
    ```

    Get a specific ExpressRoute circuit with Name "testrg" and ResourceGroupName "test"
- title: 'Example 2: List the ExpressRoute circuits using filtering'
  description: |-
