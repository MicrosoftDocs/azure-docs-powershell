syntaxes:
- syntax: |-
    ```Syntax
    New-AzApplicationGatewayRewriteRuleCondition
        -Variable <String>
        [-Pattern <String>]
        [-IgnoreCase]
        [-Negate]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
