### YamlMime:PowerShellCmdlet1
uid: Az.Network.Get-AzLoadBalancer
name: Get-AzLoadBalancer
module: Az.Network
isPreview: false
summary: |-
  Gets a load balancer.
description: |-
  The **Get-AzLoadBalancer** cmdlet gets one or more Azure load balancers that are contained in a resource group.
