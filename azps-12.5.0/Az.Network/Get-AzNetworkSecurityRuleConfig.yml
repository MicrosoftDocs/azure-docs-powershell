uid: Az.Network.Get-AzNetworkSecurityRuleConfig
name: Get-AzNetworkSecurityRuleConfig
module: Az.Network
isPreview: false
summary: |-
  Get a network security rule configuration for a network security group.
description: |-
  The **Get-AzNetworkSecurityRuleConfig** cmdlet gets a network security rule configuration for an Azure network security group.
