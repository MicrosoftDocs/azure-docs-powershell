syntaxes:
- syntax: |-
    ```Syntax
    New-AzRoutingPolicy
        -Destination <String[]>
        -NextHop <String>
        -Name <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
