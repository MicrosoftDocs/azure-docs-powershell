### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzRoutingPolicy
name: New-AzRoutingPolicy
module: Az.Network
isPreview: false
summary: |-
  Returns an in-memory routing policy object.
description: |-
  The **New-AzRoutingPolicy** cmdlet creates a routing policy object. This can be passed in to [Add-AzRoutingPolicy](./Add-AzRoutingPolicy.yml) cmdlet to add to an existing routing intent resource or [New-AzRoutingIntent](./New-AzRoutingIntent.yml) cmdlet to create a new routing intent resource.
