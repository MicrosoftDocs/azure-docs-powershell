syntaxes:
- syntax: |-
    ```Syntax
    Add-AzExpressRouteCrossConnectionPeering
        -Name <String>
        -ExpressRouteCrossConnection <PSExpressRouteCrossConnection>
        [-Force]
        -PeeringType <String>
        -PeerASN <UInt32>
        -PrimaryPeerAddressPrefix <String>
        -SecondaryPeerAddressPrefix <String>
        -VlanId <Int32>
        [-SharedKey <String>]
        [-MicrosoftConfigAdvertisedPublicPrefix <String[]>]
        [-MicrosoftConfigCustomerAsn <Int32>]
        [-MicrosoftConfigRoutingRegistryName <String>]
        [-PeerAddressType <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="PSExpressRouteCrossConnection" data-throw-if-not-resolved="False" />
  description: |-
    Parameter 'ExpressRouteCrossConnection' accepts value of type 'PSExpressRouteCrossConnection' from the pipeline
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSExpressRouteCrossConnection" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add a peer to an existing ExpressRoute cross connection'
  description: |-
    ```powershell
    $cc = Get-AzExpressRouteCrossConnection -Name $CrossConnectionName -ResourceGroupName $rg
    $parameters = @{
        Name = 'AzurePrivatePeering'
        CrossConnection = $cc
        PeeringType = 'AzurePrivatePeering'
        PeerASN = 100
        PrimaryPeerAddressPrefix = '10.6.1.0/30'
        SecondaryPeerAddressPrefix = '10.6.2.0/30'
        VlanId  = 200
    }
    Add-AzExpressRouteCrossConnectionPeering @parameters
    Set-AzExpressRouteCrossConnection -ExpressRouteCrossConnection $cc
    ```
