      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MatchCondition
    type: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGatewayFirewallCondition" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of match conditions.
    defaultValue: None
    dontShow: false
    isDynamic: false
