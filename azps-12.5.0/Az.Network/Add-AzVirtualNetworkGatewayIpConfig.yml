syntaxes:
- syntax: |-
    ```Syntax
    Add-AzVirtualNetworkGatewayIpConfig
        -VirtualNetworkGateway <PSVirtualNetworkGateway>
        -Name <String>
        [-PrivateIpAddress <String>]
        [-SubnetId <String>]
        [-PublicIpAddressId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByResourceId
  isDefault: false
- syntax: |-
