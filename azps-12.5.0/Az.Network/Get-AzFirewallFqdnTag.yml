### YamlMime:PowerShellCmdlet1
uid: Az.Network.Get-AzFirewallFqdnTag
name: Get-AzFirewallFqdnTag
module: Az.Network
isPreview: false
summary: |-
  Gets the available Azure Firewall Fqdn Tags.
description: |-
  The **Get-AzFirewallFqdnTag** cmdlet gets the list of FQDN Tags which can be used for Azure Firewall Application Rules
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzFirewallFqdnTag
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSAzureFirewallFqdnTag" data-throw-if-not-resolved="False" />
- name: <xref href="System.Collections.Generic.IEnumerable`1" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1:  Retrieve all available FQDN Tags'
  description: |-
    ```powershell
    Get-AzFirewallFqdnTag
    ```

    This example retrieves all available FQDN Tags.
- title: 'Example 2:  Use first available FQDN Tag in an Application Rule'
  description: |-
    ```powershell
    $fqdnTags = Get-AzFirewallFqdnTag
    New-AzFirewallApplicationRule -Name AR -SourceAddress * -FqdnTag $fqdnTags[0].FqdnTagName
    ```

    This example creates a Firewall Application Rule using the first available FQDN Tag
