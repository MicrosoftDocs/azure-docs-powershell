module: Az.Network
isPreview: false
summary: |-
  Gets a Virtual Hub Route Table in a virtual hub or lists all route tables in a virtual hub. The cmdlet [Get-AzVHubRouteTable](./Get-AzVHubRouteTable.yml) is replacing this cmdlet.
