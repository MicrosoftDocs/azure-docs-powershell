syntaxes:
- syntax: |-
    ```Syntax
    New-AzVirtualApplianceNetworkInterfaceConfiguration
        -NicType <String>
        -IpConfiguration <PSVirtualApplianceIpConfiguration[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
