syntaxes:
- syntax: |-
    ```Syntax
    Update-AzVirtualRouter
        -ResourceGroupName <String>
        -RouterName <String>
        [-AllowBranchToBranchTraffic]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: VirtualRouterNameParameterSet
  isDefault: true
- syntax: |-
