syntaxes:
- syntax: |-
    ```Syntax
    New-AzExpressRouteCircuit
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        -ServiceProviderName <String>
        -PeeringLocation <String>
        -BandwidthInMbps <Int32>
        [-SkuTier <String>]
        [-SkuFamily <String>]
        [-Peering <PSPeering[]>]
        [-Authorization <PSExpressRouteCircuitAuthorization[]>]
        [-AllowClassicOperations <Boolean>]
        [-Tag <Hashtable>]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ServiceProvider
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzExpressRouteCircuit
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        -ExpressRoutePort <PSExpressRoutePort>
        -BandwidthInGbps <Double>
        [-SkuTier <String>]
        [-SkuFamily <String>]
        [-AuthorizationKey <String>]
        [-Peering <PSPeering[]>]
        [-Authorization <PSExpressRouteCircuitAuthorization[]>]
        [-AllowClassicOperations <Boolean>]
        [-Tag <Hashtable>]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ExpressRoutePort
  isDefault: false
