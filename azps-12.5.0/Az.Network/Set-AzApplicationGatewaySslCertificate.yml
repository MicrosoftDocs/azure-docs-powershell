  cmdletParameters:
  - name: ApplicationGateway
    type: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGateway" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the application gateway with which the Secure Socket Layer (SSL) certificate is associated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CertificateFile
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of the SSL certificate.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: KeyVaultSecretId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      SecretId (uri) of the KeyVault Secret. Use this option when a specific version of secret needs to be used.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the SSL certificate.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Password
    type: <xref href="System.Security.SecureString" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the password of the SSL certificate.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzApplicationGatewaySslCertificate
        -ApplicationGateway <PSApplicationGateway>
        -Name <String>
        [-CertificateFile <String>]
        [-Password <SecureString>]
        [-KeyVaultSecretId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGateway" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGateway" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Update an existing SSL certificate on Application Gateway'
  description: |-
    ```powershell
    $appGW = Get-AzApplicationGateway -Name "ApplicationGateway01" -ResourceGroupName "ResourceGroup01"
    $password = ConvertTo-SecureString -String "****" -AsPlainText -Force
    $cert = Set-AzApplicationGatewaySslCertificate -ApplicationGateway $AppGW -Name "Cert01" -CertificateFile "D:\cert01.pfx" -Password $password
    ```

    Update an existing SSL certificate for the application gateway named ApplicationGateway01.
- title: 'Example 2: Update an existing SSL certificate using KeyVault Secret (version-less secretId) on Application Gateway'
  description: |-
    ```powershell
    $secret = Get-AzKeyVaultSecret -VaultName "keyvault01" -Name "sslCert01"
    $secretId = $secret.Id.Replace($secret.Version, "") # https://<keyvaultname>.vault.azure.net/secrets/
    $cert = Set-AzApplicationGatewaySslCertificate -ApplicationGateway $AppGW -Name "Cert01" -KeyVaultSecretId $secretId
    ```

    Get the secret and update an existing SSL Certificate using `Set-AzApplicationGatewaySslCertificate`.
- title: 'Example 3: Update an existing SSL certificate using KeyVault Secret on Application Gateway'
  description: |-
    ```powershell
    $secret = Get-AzKeyVaultSecret -VaultName "keyvault01" -Name "sslCert01"
    $secretId = $secret.Id # https://<keyvaultname>.vault.azure.net/secrets/<hash>
    $cert = Set-AzApplicationGatewaySslCertificate -ApplicationGateway $AppGW -Name "Cert01" -KeyVaultSecretId $secretId
    ```

    Get the secret and update an existing SSL Certificate using `Set-AzApplicationGatewaySslCertificate`.
    Note: If it is required that Application Gateway syncs the certificate with the KeyVault, please provide the version-less secretId.
