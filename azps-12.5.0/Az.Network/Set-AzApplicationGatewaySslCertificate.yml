### YamlMime:PowerShellCmdlet1
uid: Az.Network.Set-AzApplicationGatewaySslCertificate
name: Set-AzApplicationGatewaySslCertificate
module: Az.Network
isPreview: false
summary: |-
  Updates an SSL certificate for an application gateway.
description: |-
  The **Set-AzApplicationGatewaySslCertificate** cmdlet updates an SSL certificate for an application gateway.
