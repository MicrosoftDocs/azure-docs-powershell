### YamlMime:PowerShellCmdlet1
uid: Az.Network.Get-AzNetworkWatcherConnectionMonitorReport
name: Get-AzNetworkWatcherConnectionMonitorReport
module: Az.Network
isPreview: false
summary: |-
  Query a snapshot of the most recent connection states.
description: |-
  The Get-AzNetworkWatcherConnectionMonitorReport cmdlet returns the report on the most recent connection states.
