syntaxes:
- syntax: |-
    ```Syntax
    New-AzApplicationGatewayRewriteRuleUrlConfiguration
        [-ModifiedPath <String>]
        [-ModifiedQueryString <String>]
        [-Reroute]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
