syntaxes:
- syntax: |-
    ```Syntax
    Add-AzVirtualHubRoute
        -Destination <String[]>
        -DestinationType <String>
        -NextHop <String[]>
        -NextHopType <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
