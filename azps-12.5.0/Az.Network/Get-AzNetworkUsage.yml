### YamlMime:PowerShellCmdlet1
uid: Az.Network.Get-AzNetworkUsage
name: Get-AzNetworkUsage
module: Az.Network
isPreview: false
summary: |-
  Lists network usages for a subscription
description: |-
  The Get-AzNetworkUsage cmdlet gets limits and current usage for Network resources.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The location where resource usage is queried.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzNetworkUsage
        -Location <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSUsage" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzNetworkUsage -Location westcentralus
    ```

    ```output
    ResourceType : Virtual Networks
    CurrentValue : 6
    Limit        : 50

    ResourceType : Static Public IP Addresses
    CurrentValue : 1
    Limit        : 20

    ResourceType : Network Security Groups
    CurrentValue : 2
    Limit        : 100

    ResourceType : Public IP Addresses
    CurrentValue : 6
    Limit        : 60

    ResourceType : Network Interfaces
    CurrentValue : 1
    Limit        : 300

    ResourceType : Load Balancers
    CurrentValue : 1
    Limit        : 100

    ResourceType : Application Gateways
    CurrentValue : 1
    Limit        : 50

    ResourceType : Route Tables
    CurrentValue : 0
    Limit        : 100

    ResourceType : Route Filters
    CurrentValue : 0
    Limit        : 1000

    ResourceType : Network Watchers
    CurrentValue : 1
    Limit        : 1

    ResourceType : Packet Captures
    CurrentValue : 0
    Limit        : 10
    ```

    Gets resources usage data in westcentralus region
