### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzApplicationGatewayFirewallPolicyLogScrubbingRule
name: New-AzApplicationGatewayFirewallPolicyLogScrubbingRule
module: Az.Network
isPreview: false
summary: |-
  Creates a log scrubbing rule for firewall policy
description: |-
  The **New-AzApplicationGatewayFirewallPolicyLogScrubbingRule** creates a log scrubbing rule for firewall policy.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MatchVariable
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The variable to be scrubbed from the logs.
    acceptedValues:
    - RequestHeaderNames
    - RequestCookieNames
    - RequestArgNames
    - RequestPostArgNames
    - RequestJSONArgNames
    - RequestIPAddress
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Selector
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      When matchVariable is a collection, operator used to specify which elements in the collection this rule applies to.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SelectorMatchOperator
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      When matchVariable is a collection, operate on the selector to specify which elements in the collection this rule applies to.
    acceptedValues:
    - Equals
    - EqualsAny
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: State
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Defines the state of log scrubbing rule. Default value is Enabled.
    acceptedValues:
    - Enabled
    - Disabled
    defaultValue: Enabled
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzApplicationGatewayFirewallPolicyLogScrubbingRule
        -State <String>
        -MatchVariable <String>
        -SelectorMatchOperator <String>
        [-Selector <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSApplicationGatewayFirewallPolicySettings" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $logScrubbingRuleConfig1 = New-AzApplicationGatewayFirewallPolicyLogScrubbingRule -State Enabled -MatchVariable RequestArgNames -SelectorMatchOperator Equals -Selector test
    ```

    The command creates a log scrubbing rule configuration with state as enable, MatchVariable as RequestArgNames, SelectorMatchOperator as Equals and Selector as test
    The new log scrubbing rule is stored to $logScrubbingRuleConfig1.
- title: Example 2
  description: |-
    ```powershell
    $logScrubbingRuleConfig2 = New-AzApplicationGatewayFirewallPolicyLogScrubbingRule -State Enabled -MatchVariable RequestIPAddress -SelectorMatchOperator EqualsAny
    ```

    The command creates a log scrubbing rule configuration with state as enable, MatchVariable as RequestIPAddress, SelectorMatchOperator as EqualsAny
    The new log scrubbing rule is stored to $logScrubbingRuleConfig2.
