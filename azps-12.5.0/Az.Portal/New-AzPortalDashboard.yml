syntaxes:
- syntax: |-
    ```Syntax
    New-AzPortalDashboard
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        [-SubscriptionId <String>]
        [-Lens <Hashtable>]
        [-Metadata <Hashtable>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzPortalDashboard
        -Name <String>
        -ResourceGroupName <String>
        -Dashboard <IDashboard>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
