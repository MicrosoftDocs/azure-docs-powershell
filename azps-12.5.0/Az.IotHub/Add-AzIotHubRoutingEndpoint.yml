syntaxes:
- syntax: |-
    ```Syntax
    Add-AzIotHubRoutingEndpoint
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-EndpointName] <String>
        -EndpointType <PSEndpointType>
        -EndpointResourceGroup <String>
        -EndpointSubscriptionId <String>
        -ConnectionString <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceSet
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzIotHubRoutingEndpoint
        [-InputObject] <PSIotHub>
        [-EndpointName] <String>
        -EndpointType <PSEndpointType>
        -EndpointResourceGroup <String>
        -EndpointSubscriptionId <String>
        -ConnectionString <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObjectSet
  isDefault: false
- syntax: |-
    ```Syntax
    Add-AzIotHubRoutingEndpoint
        [-ResourceId] <String>
        [-EndpointName] <String>
        -EndpointType <PSEndpointType>
        -EndpointResourceGroup <String>
        -EndpointSubscriptionId <String>
        -ConnectionString <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceIdSet
  isDefault: false
