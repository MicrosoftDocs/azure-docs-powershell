uid: Az.IotHub.Get-AzIotHubKey
name: Get-AzIotHubKey
module: Az.IotHub
isPreview: false
summary: |-
  Gets an IotHub Key.
description: |-
  Gets an IotHub Key.
  You can either list all Keys or filter the list by a specific Key Name.
