syntaxes:
- syntax: |-
    ```Syntax
    Get-AzIotHubKey
        [-ResourceGroupName] <String>
        [-Name] <String>
        [[-KeyName] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceSet
  isDefault: true
