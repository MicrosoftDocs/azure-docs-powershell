syntaxes:
- syntax: |-
    ```Syntax
    Add-AzIotHubKey
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-KeyName] <String>
        -Rights <PSAccessRights>
        [-PrimaryKey <String>]
        [-SecondaryKey <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceSet
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzIotHubKey
        [-HubId] <String>
        [-KeyName] <String>
        -Rights <PSAccessRights>
        [-PrimaryKey <String>]
        [-SecondaryKey <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceIdSet
  isDefault: false
