uid: Az.IotHub.Add-AzIotHubKey
name: Add-AzIotHubKey
module: Az.IotHub
isPreview: false
summary: |-
  Creates an IotHub Key.
description: |-
  Creates a Key for the provided IotHub.
  KeyNames are not unique and need to be managed carefully.
