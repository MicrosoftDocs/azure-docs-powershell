syntaxes:
- syntax: |-
    ```Syntax
    New-AzAppServicePlan
        [-Location] <String>
        [[-Tier] <String>]
        [[-NumberofWorkers] <Int32>]
        [[-WorkerSize] <String>]
        [[-AseName] <String>]
        [[-AseResourceGroupName] <String>]
        [[-AseResourceId] <String>]
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-PerSiteScaling <Boolean>]
        [-HyperV]
        [-AsJob]
        [-Tag <Hashtable>]
        [-Linux]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S1
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzAppServicePlan
        [-Location] <String>
        [[-Tier] <String>]
        [[-NumberofWorkers] <Int32>]
        [[-WorkerSize] <String>]
        [[-AseName] <String>]
        [[-AseResourceGroupName] <String>]
        [[-AseResourceId] <String>]
        [-AppServicePlan] <PSAppServicePlan>
        [-PerSiteScaling <Boolean>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S2
  isDefault: false
