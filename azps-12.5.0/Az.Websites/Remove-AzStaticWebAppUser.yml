syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzStaticWebAppUser
        -AuthProvider <String>
        -Name <String>
        -ResourceGroupName <String>
        -UserId <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
