syntaxes:
- syntax: |-
    ```Syntax
    Update-AzStaticWebApp
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AllowConfigFileUpdate]
        [-ApiBuildCommand <String>]
        [-ApiLocation <String>]
        [-AppArtifactLocation <String>]
        [-AppBuildCommand <String>]
        [-AppLocation <String>]
        [-Branch <String>]
        [-ForkRepositoryDescription <String>]
        [-ForkRepositoryIsPrivate]
        [-ForkRepositoryName <String>]
        [-ForkRepositoryOwner <String>]
        [-GithubActionSecretNameOverride <String>]
        [-Kind <String>]
        [-OutputLocation <String>]
        [-RepositoryToken <String>]
        [-RepositoryUrl <String>]
        [-SkipGithubActionWorkflowGeneration]
        [-StagingEnvironmentPolicy <StagingEnvironmentPolicy>]
        [-TemplateRepositoryUrl <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzStaticWebApp
        -InputObject <IWebsitesIdentity>
        [-AllowConfigFileUpdate]
        [-ApiBuildCommand <String>]
        [-ApiLocation <String>]
        [-AppArtifactLocation <String>]
        [-AppBuildCommand <String>]
        [-AppLocation <String>]
        [-Branch <String>]
        [-ForkRepositoryDescription <String>]
        [-ForkRepositoryIsPrivate]
