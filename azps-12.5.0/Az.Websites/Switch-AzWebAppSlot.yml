syntaxes:
- syntax: |-
    ```Syntax
    Switch-AzWebAppSlot
        [-SourceSlotName] <String>
        [[-DestinationSlotName] <String>]
        [[-SwapWithPreviewAction] <SwapWithPreviewAction>]
        [[-PreserveVnet] <Boolean>]
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: S1
  isDefault: false
- syntax: |-
