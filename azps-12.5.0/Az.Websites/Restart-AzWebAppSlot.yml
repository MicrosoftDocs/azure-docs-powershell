syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzWebAppSlot
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Slot] <String>
        [-SoftRestart]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S1
  isDefault: false
- syntax: |-
    ```Syntax
    Restart-AzWebAppSlot
        [-WebApp] <PSSite>
        [-SoftRestart]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: S2
  isDefault: false
