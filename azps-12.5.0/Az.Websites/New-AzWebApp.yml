uid: Az.Websites.New-AzWebApp
name: New-AzWebApp
module: Az.Websites
isPreview: false
summary: |-
  Creates an Azure Web App.
description: |-
  The **New-AzWebApp** cmdlet creates an Azure Web App in a given a resource group that uses the specified App Service plan and data center.
