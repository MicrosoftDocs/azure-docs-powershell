syntaxes:
- syntax: |-
    ```Syntax
    New-AzWebApp
        [[-ResourceGroupName] <String>]
        [-Name] <String>
        [[-Location] <String>]
        [[-AppServicePlan] <String>]
        [-ContainerImageName <String>]
        [-EnableContainerContinuousDeployment]
        [-AsJob]
        [-GitRepositoryPath <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SimpleParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzWebApp
        [-ResourceGroupName] <String>
        [-Name] <String>
        [[-Location] <String>]
        [[-AppServicePlan] <String>]
        -ContainerImageName <String>
        -ContainerRegistryUrl <String>
        -ContainerRegistryUser <String>
        -ContainerRegistryPassword <SecureString>
        [-EnableContainerContinuousDeployment]
        [-AsJob]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PrivateRegistry
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzWebApp
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        [[-AppServicePlan] <String>]
        [[-SourceWebApp] <PSSite>]
        [[-TrafficManagerProfile] <String>]
        [[-AppSettingsOverrides] <Hashtable>]
        [[-AseName] <String>]
        [[-AseResourceGroupName] <String>]
        [-EnableContainerContinuousDeployment]
        [-IgnoreSourceControl]
        [-IgnoreCustomHostNames]
        [-IncludeSourceWebAppSlots]
        [-AsJob]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WebAppParameterSet
  isDefault: false
