    Get-AzDeletedWebApp
        [[-ResourceGroupName] <String>]
        [[-Name] <String>]
        [[-Slot] <String>]
        [-Location <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
