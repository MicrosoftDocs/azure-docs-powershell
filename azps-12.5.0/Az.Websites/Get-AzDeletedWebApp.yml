examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzDeletedWebApp -ResourceGroupName "Default-Web-WestUS" -Name "ContosoSite"
    ```

    This command gets the deleted apps named ContosoSite belonging to the resource group Default-Web-WestUS.
