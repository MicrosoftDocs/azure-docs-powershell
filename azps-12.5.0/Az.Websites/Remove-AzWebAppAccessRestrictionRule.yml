syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzWebAppAccessRestrictionRule
        [-ResourceGroupName] <String>
        [-WebAppName] <String>
        [-Name <String>]
        [-Action <String>]
        [-SlotName <String>]
        [-TargetScmSite]
        [-IpAddress <String>]
        [-SubnetName <String>]
        [-VirtualNetworkName <String>]
        [-SubnetId <String>]
        [-ServiceTag <String>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
