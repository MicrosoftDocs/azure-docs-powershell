syntaxes:
- syntax: |-
    ```Syntax
    New-AzVoiceServicesCommunicationsGateway
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        [-ApiBridge <Hashtable>]
        [-Codec <TeamsCodecs[]>]
        [-DomainNameLabelScope <AutoGeneratedDomainNameLabelScope>]
        [-E911Type <E911Type>]
        [-EmergencyDialString <String[]>]
        [-OnPremMcpEnabled]
        [-Platform <CommunicationsPlatform[]>]
        [-ServiceLocation <IServiceRegionProperties[]>]
        [-Tag <Hashtable>]
        [-TeamsVoicemailPilotNumber <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
