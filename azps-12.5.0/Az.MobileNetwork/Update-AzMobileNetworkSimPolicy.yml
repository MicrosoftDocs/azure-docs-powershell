syntaxes:
- syntax: |-
    ```Syntax
    Update-AzMobileNetworkSimPolicy
        -MobileNetworkName <String>
        -SimPolicyName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultSliceId <String>]
        [-SliceConfiguration <ISliceConfiguration[]>]
        [-UeAmbrDownlink <String>]
        [-UeAmbrUplink <String>]
        [-RegistrationTimer <Int32>]
        [-RfspIndex <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
