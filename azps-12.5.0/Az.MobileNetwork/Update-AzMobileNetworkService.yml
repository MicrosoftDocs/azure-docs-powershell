syntaxes:
- syntax: |-
    ```Syntax
    Update-AzMobileNetworkService
        -MobileNetworkName <String>
        -ServiceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -ServicePrecedence <Int32>
        [-PccRule <IPccRuleConfiguration[]>]
        [-MaximumBitRateDownlink <String>]
        [-MaximumBitRateUplink <String>]
        [-ServiceQoPolicyAllocationAndRetentionPriorityLevel <Int32>]
        [-ServiceQoPolicyFiveQi <Int32>]
        [-ServiceQoPolicyPreemptionCapability <PreemptionCapability>]
        [-ServiceQoPolicyPreemptionVulnerability <PreemptionVulnerability>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
