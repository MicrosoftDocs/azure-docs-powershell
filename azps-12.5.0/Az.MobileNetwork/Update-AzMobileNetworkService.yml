  - name: ServiceName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the service.
      You must not use any of the following reserved strings - 'default', 'requested' or 'service'
    defaultValue: None
    dontShow: false
