syntaxes:
- syntax: |-
    ```Syntax
    Add-AzPurviewAccountRootCollectionAdmin
        -AccountName <String>
        -ResourceGroupName <String>
        -ObjectId <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AddExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzPurviewAccountRootCollectionAdmin
        -InputObject <IPurviewIdentity>
        -ObjectId <String>
        [-DefaultProfile <PSObject>]
