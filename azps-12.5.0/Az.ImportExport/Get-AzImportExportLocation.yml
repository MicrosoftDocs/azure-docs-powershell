### YamlMime:PowerShellCmdlet1
uid: Az.ImportExport.Get-AzImportExportLocation
name: Get-AzImportExportLocation
module: Az.ImportExport
isPreview: false
summary: |-
  Returns the details about a location to which you can ship the disks associated with an import or export job.
  A location is an Azure region.
description: |-
  Returns the details about a location to which you can ship the disks associated with an import or export job.
  A location is an Azure region.
