syntaxes:
- syntax: |-
    ```Syntax
    New-AzImportExportDriveListObject
        [-BitLockerKey <String>]
        [-BytesSucceeded <Int64>]
        [-CopyStatus <String>]
        [-DriveHeaderHash <String>]
        [-DriveId <String>]
        [-ErrorLogUri <String>]
        [-ManifestFile <String>]
        [-ManifestHash <String>]
        [-ManifestUri <String>]
        [-PercentComplete <Int32>]
        [-State <DriveState>]
        [-VerboseLogUri <String>]
        [<CommonParameters>]
    ```
