syntaxes:
- syntax: |-
    ```Syntax
    New-AzDnsForwardingRuleset
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-IfNoneMatch <String>]
        -DnsResolverOutboundEndpoint <ISubResource[]>
        -Location <String>
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
