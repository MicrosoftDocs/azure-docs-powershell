- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ConnectedKubernetes.Models.Api20240715Preview.IConnectedCluster" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Disable gateway feature of a connected kubernetes.'
  description: |-
    ```powershell
    Set-AzConnectedKubernetes -ClusterName azps_test_cluster -ResourceGroupName azps_test_group -Location eastus -DisableGateway
    ```

    ```output
    Location Name              ResourceGroupName
    -------- ----              -----------------
    eastus   azps_test_cluster azps_test_group
    ```

    This command disable gateway feature of a connected kubernetes.
- title: 'Example 2: Enable gateway feature of connected kubernetes.'
  description: |-
    ```powershell
    Set-AzConnectedKubernetes -ClusterName azps_test_cluster -ResourceGroupName azps_test_group -Location eastus -GatewayResourceId gatewayResourceId
    ```

    ```output
    Location Name              ResourceGroupName
    -------- ----              -----------------
    eastus   azps_test_cluster azps_test_group
    ```

    This command disable gateway feature of a connected kubernetes.
