uid: Az.ConnectedKubernetes.Get-AzConnectedKubernetes
name: Get-AzConnectedKubernetes
module: Az.ConnectedKubernetes
isPreview: false
summary: |-
  Returns the properties of the specified connected cluster, including name, identity, properties, and additional cluster details.
