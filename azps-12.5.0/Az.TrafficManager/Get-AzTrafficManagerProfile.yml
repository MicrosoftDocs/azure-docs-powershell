examples:
- title: 'Example 1: Get a profile'
  description: |-
    ```powershell
    Get-AzTrafficManagerProfile -Name "ContosoProfile" -ResourceGroupName "ResourceGroup11"
    ```

    This command gets the profile named ContosoProfile in ResourceGroup11.
