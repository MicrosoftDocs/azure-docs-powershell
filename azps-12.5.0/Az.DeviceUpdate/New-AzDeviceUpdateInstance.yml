syntaxes:
- syntax: |-
    ```Syntax
    New-AzDeviceUpdateInstance
        -AccountName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        [-DiagnosticStoragePropertyConnectionString <String>]
        [-DiagnosticStoragePropertyResourceId <String>]
        [-EnableDiagnostic]
        [-IotHubId <String[]>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
