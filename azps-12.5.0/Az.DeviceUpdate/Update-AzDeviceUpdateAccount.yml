syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDeviceUpdateAccount
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-Location <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDeviceUpdateAccount
        -InputObject <IDeviceUpdateIdentity>
        [-IdentityType <ManagedServiceIdentityType>]
        [-Location <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
