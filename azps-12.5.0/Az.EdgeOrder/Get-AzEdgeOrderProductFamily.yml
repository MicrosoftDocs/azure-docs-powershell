syntaxes:
- syntax: |-
    ```Syntax
    Get-AzEdgeOrderProductFamily
        [-SubscriptionId <String[]>]
        [-Expand <String>]
        -FilterableProperty <Hashtable>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
