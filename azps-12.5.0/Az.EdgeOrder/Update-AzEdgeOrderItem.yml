syntaxes:
- syntax: |-
    ```Syntax
    Update-AzEdgeOrderItem
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ForwardAddressContactDetail <IContactDetails>]
        [-ForwardAddressShippingAddress <IShippingAddress>]
        [-NotificationEmailList <String[]>]
        [-Preference <IPreferences>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
