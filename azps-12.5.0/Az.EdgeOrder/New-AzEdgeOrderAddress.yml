syntaxes:
- syntax: |-
    ```Syntax
    New-AzEdgeOrderAddress
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -ContactDetail <IContactDetails>
        -Location <String>
        [-ShippingAddress <IShippingAddress>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
