syntaxes:
- syntax: |-
    ```Syntax
    Get-AzConnectedMachineExtension
        -MachineName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-Expand <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
