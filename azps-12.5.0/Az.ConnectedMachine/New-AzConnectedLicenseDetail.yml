uid: Az.ConnectedMachine.New-AzConnectedLicenseDetail
name: New-AzConnectedLicenseDetail
module: Az.ConnectedMachine
isPreview: false
summary: |-
  Create an in-memory object for LicenseDetails.
description: |-
  Create an in-memory object for LicenseDetails.
