syntaxes:
- syntax: |-
    ```Syntax
    New-AzConnectedLicenseDetail
        [-Edition <String>]
        [-Processor <Int32>]
        [-State <String>]
        [-Target <String>]
        [-Type <String>]
        [-VolumeLicenseDetail <IVolumeLicenseDetails[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ConnectedMachine.Models.LicenseDetails" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: get the detail of an ESU license'
  description: |-
    ```powershell
    New-AzConnectedLicenseDetail -State 'Activated' -Target 'Windows Server 2012' -Edition 'Datacenter' -Type 'pCore' -Processor 16
    ```

    ```output
    AssignedLicense     :
    Edition             : Datacenter
    ImmutableId         :
    Processor           : 16
    State               : Activated
    Target              : Windows Server 2012
    Type                : pCore
    VolumeLicenseDetail :
    ```

    get the detail of an ESU license
