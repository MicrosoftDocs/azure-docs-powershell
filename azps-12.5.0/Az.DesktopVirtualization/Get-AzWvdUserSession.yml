syntaxes:
- syntax: |-
    ```Syntax
    Get-AzWvdUserSession
        -HostPoolName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-Filter <String>]
        [-InitialSkip <Int32>]
        [-IsDescending]
        [-PageSize <Int32>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzWvdUserSession
        -HostPoolName <String>
        -ResourceGroupName <String>
        -SessionHostName <String>
        [-SubscriptionId <String[]>]
        [-InitialSkip <Int32>]
        [-IsDescending]
        [-PageSize <Int32>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: List1
  isDefault: false
- syntax: |-
