syntaxes:
- syntax: |-
    ```Syntax
    Get-AzWvdApplication
        -GroupName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-InitialSkip <Int32>]
        [-IsDescending]
        [-PageSize <Int32>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: List
