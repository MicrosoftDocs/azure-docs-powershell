outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.DesktopVirtualization.Models.Api20230905.IApplication" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a Windows Virtual Desktop Application'
  description: |-
    ```powershell
    New-AzWvdApplication -ResourceGroupName ResourceGroupName `
                                 -GroupName ApplicationGroupName `
                                 -Name ApplicationName `
                                 -FilePath 'C:\windows\system32\mspaint.exe' `
                                 -FriendlyName 'Friendly name' `
                                 -Description 'Description' `
                                 -IconIndex 0 `
                                 -IconPath 'C:\windows\system32\mspaint.exe' `
                                 -CommandLineSetting 'Allow' `
                                 -ShowInPortal:$true
    ```

    ```output
    Name                                 Type
    ----                                 ----
    ApplicationGroupName/ApplicationName Microsoft.DesktopVirtualization/applicationgroups/applications
    ```

    This command creates a Windows Virtual Desktop Application in an application Group.
