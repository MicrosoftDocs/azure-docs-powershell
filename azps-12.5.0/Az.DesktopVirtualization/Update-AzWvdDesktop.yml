syntaxes:
- syntax: |-
    ```Syntax
    Update-AzWvdDesktop
        -ApplicationGroupName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Description <String>]
        [-FriendlyName <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzWvdDesktop
        -InputObject <IDesktopVirtualizationIdentity>
        [-Description <String>]
        [-FriendlyName <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
