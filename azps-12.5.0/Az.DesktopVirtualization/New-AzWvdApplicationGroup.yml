syntaxes:
- syntax: |-
    ```Syntax
    New-AzWvdApplicationGroup
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -ApplicationGroupType <ApplicationGroupType>
        -HostPoolArmPath <String>
        [-Description <String>]
        [-FriendlyName <String>]
        [-IdentityType <ResourceIdentityType>]
        [-Kind <String>]
        [-Location <String>]
        [-ManagedBy <String>]
        [-PlanName <String>]
        [-PlanProduct <String>]
        [-PlanPromotionCode <String>]
        [-PlanPublisher <String>]
        [-PlanVersion <String>]
        [-ShowInFeed]
        [-SkuCapacity <Int32>]
        [-SkuFamily <String>]
        [-SkuName <String>]
        [-SkuSize <String>]
        [-SkuTier <SkuTier>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
