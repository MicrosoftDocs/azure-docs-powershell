syntaxes:
- syntax: |-
    ```Syntax
    Update-AzWvdWorkspace
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ApplicationGroupReference <String[]>]
        [-Description <String>]
        [-FriendlyName <String>]
        [-PublicNetworkAccess <PublicNetworkAccess>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzWvdWorkspace
        -InputObject <IDesktopVirtualizationIdentity>
        [-ApplicationGroupReference <String[]>]
        [-Description <String>]
        [-FriendlyName <String>]
        [-PublicNetworkAccess <PublicNetworkAccess>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
