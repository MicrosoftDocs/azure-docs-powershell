examples:
- title: 'Example 1: Create a Windows Virtual Desktop Scaling Plan without a schedule'
  description: |-
    ```powershell
    New-AzWvdScalingPlan `
                -ResourceGroupName ResourceGroupName `
                -Name 'ScalingPlan1' `
                -Location 'westcentralus' `
                -Description 'Description' `
                -FriendlyName 'Friendly Name' `
                -HostPoolType 'Pooled' `
                -TimeZone 'Pacific Standard Time' `
                -Schedule @() `
                -HostPoolReference @(
                    @{
                        'HostPoolArmPath' = '/subscriptions/SubscriptionId/resourceGroups/ResourceGroupName/providers/Microsoft.DesktopVirtualization/hostPools/HostPoolName';
                        'ScalingPlanEnabled' = $false;
                    }
                )
    ```

    ```output
    Location      Name         Type
    --------      ----         ----
    westcentralus scalingPlan1 Microsoft.DesktopVirtualization/scalingplans
    ```

    This command creates a new Windows Virtual Desktop Scaling Plan in a Resource Group.
- title: 'Example 2: Create a Windows Virtual Desktop Scaling Plan with a pooled schedule (Only available for Pooled HostPools)'
  description: |-
    ```powershell
    New-AzWvdScalingPlan `
                -ResourceGroupName ResourceGroupName `
                -Name 'ScalingPlan1' `
                -Location 'westcentralus' `
                -Description 'Description' `
                -FriendlyName 'Friendly Name' `
                -HostPoolType 'Pooled' `
                -TimeZone 'Pacific Standard Time' `
                -Schedule @(
                    @{
                        'Name'                           = 'Work Week';
                        'DaysOfWeek'                     = @('Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday');
                        'RampUpStartTime'                = @{
                                                                'Hour' = 6
                                                                'Minute' = 0
                                                            };
                        'RampUpLoadBalancingAlgorithm'   = 'BreadthFirst';
                        'RampUpMinimumHostsPct'          = 20;
                        'RampUpCapacityThresholdPct'     = 20;

                        'PeakStartTime'                  = @{
                                                                'Hour' = 8
                                                                'Minute' = 30
                                                            };
                        'PeakLoadBalancingAlgorithm'     = 'DepthFirst';

                        'RampDownStartTime'              = @{
                                                                'Hour' = 16
                                                                'Minute' = 15
                                                            };
                        'RampDownLoadBalancingAlgorithm' = 'BreadthFirst';
                        'RampDownMinimumHostsPct'        = 20;
                        'RampDownCapacityThresholdPct'   = 20;
                        'RampDownForceLogoffUser'       = $true;
                        'RampDownWaitTimeMinute'        = 30;
                        'RampDownNotificationMessage'    = 'Log out now, please.';
                        'RampDownStopHostsWhen'          = 'ZeroSessions';

                        'OffPeakStartTime'               = @{
                                                                'Hour' = 18
                                                                'Minute' = 0
                                                            };
                        'OffPeakLoadBalancingAlgorithm'  = 'DepthFirst';
                    }
                ) `
                -HostPoolReference @(
                    @{
                        'HostPoolArmPath' = '/subscriptions/SubscriptionId/resourceGroups/ResourceGroupName/providers/Microsoft.DesktopVirtualization/hostPools/HostPoolName';
                        'ScalingPlanEnabled' = $false;
                    }
                )
    ```

    ```output
    Location      Name         Type
    --------      ----         ----
    westcentralus scalingPlan1 Microsoft.DesktopVirtualization/scalingplans
    ```

    This command creates a new Windows Virtual Desktop Scaling Plan in a Resource Group with a pooled schedule assigned at creation.
    This method is only available for pooled host pools.
    Please create a scaling plan, and then use New-AzWvdScalingPersonalSchedule or New-AzWvdScalingPooledSchedule to assign schedules after scaling plan creation.
