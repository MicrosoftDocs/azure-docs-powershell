        [-Description <String>]
        [-ExclusionTag <String>]
        [-FriendlyName <String>]
        [-HostPoolReference <IScalingHostPoolReference[]>]
        [-HostPoolType <ScalingHostPoolType>]
        [-IdentityType <ResourceIdentityType>]
        [-Kind <String>]
        [-Location <String>]
        [-ManagedBy <String>]
        [-PlanName <String>]
        [-PlanProduct <String>]
        [-PlanPromotionCode <String>]
        [-PlanPublisher <String>]
        [-PlanVersion <String>]
        [-Schedule <IScalingSchedule[]>]
        [-SkuCapacity <Int32>]
        [-SkuFamily <String>]
        [-SkuName <String>]
        [-SkuSize <String>]
        [-SkuTier <SkuTier>]
        [-Tag <Hashtable>]
