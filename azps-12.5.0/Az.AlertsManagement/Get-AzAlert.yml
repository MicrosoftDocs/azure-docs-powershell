syntaxes:
- syntax: |-
    ```Syntax
    Get-AzAlert
        [-TargetResourceType <String>]
        [-TargetResourceGroup <String>]
        [-MonitorService <String>]
        [-MonitorCondition <String>]
        [-Severity <String>]
        [-State <String>]
        [-AlertRuleId <String>]
        [-SmartGroupId <String>]
        [-IncludeContext <Boolean>]
        [-IncludeEgressConfig <Boolean>]
        [-PageCount <Int32>]
        [-SortBy <String>]
        [-SortOrder <String>]
        [-TimeRange <String>]
        [-CustomTimeRange <String>]
        [-Select <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AlertsListByFilter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzAlert
        -AlertId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
