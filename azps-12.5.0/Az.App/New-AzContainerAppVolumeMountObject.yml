### YamlMime:PowerShellCmdlet1
uid: Az.App.New-AzContainerAppVolumeMountObject
name: New-AzContainerAppVolumeMountObject
module: Az.App
isPreview: false
summary: |-
  Create an in-memory object for VolumeMount.
description: |-
  Create an in-memory object for VolumeMount.
parameters:
  cmdletParameters:
  - name: MountPath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Path within the container at which the volume should be mounted.Must not contain ':'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubPath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Path within the volume from which the container's volume should be mounted.
      Defaults to "" (volume's root).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VolumeName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      This must match the Name of a Volume.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzContainerAppVolumeMountObject
        [-MountPath <String>]
        [-SubPath <String>]
        [-VolumeName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.App.Models.VolumeMount" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a VolumeMount object for ContainerApp.'
  description: |-
    ```powershell
    New-AzContainerAppVolumeMountObject -MountPath "/mountPath" -VolumeName "VolumeName"
    ```

    ```output
    MountPath  SubPath VolumeName
    ---------  ------- ----------
    /mountPath         VolumeName
    ```

    Create a VolumeMount object for ContainerApp.
