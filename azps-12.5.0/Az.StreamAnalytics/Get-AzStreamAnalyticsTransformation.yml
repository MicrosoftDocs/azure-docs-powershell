syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStreamAnalyticsTransformation
        -JobName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: true
- syntax: |-
