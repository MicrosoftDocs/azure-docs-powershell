syntaxes:
- syntax: |-
    ```Syntax
    New-AzStreamAnalyticsTransformation
        -JobName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-IfNoneMatch <String>]
        [-Query <String>]
        [-StreamingUnit <Int32>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
