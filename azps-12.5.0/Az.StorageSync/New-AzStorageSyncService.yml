syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageSyncService
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        [[-IncomingTrafficPolicy] <String>]
        [-AssignIdentity]
        [-UserAssignedIdentityId <String>]
        [-IdentityType <String>]
        [-Tag <Hashtable>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
