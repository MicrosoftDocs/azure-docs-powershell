  description: |-
    ```powershell
    Get-AzSubscriptionAlias
    ```

    ```output
    AliasName          SubscriptionId                       ProvisioningState
    ---------          --------------                       -----------------
    test-subscription  XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX Succeeded
    test-subscription2 XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX Succeeded
