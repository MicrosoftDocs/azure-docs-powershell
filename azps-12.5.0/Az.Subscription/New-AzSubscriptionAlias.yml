syntaxes:
- syntax: |-
    ```Syntax
    New-AzSubscriptionAlias
        -AliasName <String>
        -SubscriptionId <String>
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzSubscriptionAlias
        -AliasName <String>
        -BillingScope <String>
        -SubscriptionName <String>
        -Workload <Workload>
        [-Tag <Hashtable>]
        [-ManagementGroupId <String>]
        [-ResellerId <String>]
        [-SubscriptionOwnerId <String>]
        [-SubscriptionTenantId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WorkloadCreateExpanded
  isDefault: false
