### YamlMime:PowerShellCmdlet1
uid: Az.ContainerInstance.Get-AzContainerInstanceCachedImage
name: Get-AzContainerInstanceCachedImage
module: Az.ContainerInstance
isPreview: false
summary: |-
  Get the list of cached images on specific OS type for a subscription in a region.
description: |-
  Get the list of cached images on specific OS type for a subscription in a region.
