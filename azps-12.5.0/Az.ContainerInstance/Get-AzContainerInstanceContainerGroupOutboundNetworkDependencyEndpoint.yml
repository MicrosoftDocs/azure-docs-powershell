uid: Az.ContainerInstance.Get-AzContainerInstanceContainerGroupOutboundNetworkDependencyEndpoint
name: Get-AzContainerInstanceContainerGroupOutboundNetworkDependencyEndpoint
module: Az.ContainerInstance
isPreview: false
summary: |-
  Gets all the network dependencies for this container group to allow complete control of network setting and configuration.
  For container groups, this will always be an empty list.
description: |-
