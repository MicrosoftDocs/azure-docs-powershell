### YamlMime:PowerShellCmdlet1
uid: Az.Fleet.New-AzFleetUpdateStageObject
name: New-AzFleetUpdateStageObject
module: Az.Fleet
isPreview: false
summary: |-
  Create an in-memory object for UpdateStage.
description: |-
  Create an in-memory object for UpdateStage.
parameters:
  cmdletParameters:
  - name: AfterStageWaitInSecond
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      The time in seconds to wait at the end of this stage before starting the next one.
      Defaults to 0 seconds if unspecified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Group
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Fleet.Models.IUpdateGroup" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Defines the groups to be executed in parallel in this stage.
      Duplicate groups are not allowed.
      Min size: 1.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the stage.
      Must be unique within the UpdateRun.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzFleetUpdateStageObject
        -Name <String>
        [-AfterStageWaitInSecond <Int32>]
        [-Group <IUpdateGroup[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Fleet.Models.UpdateStage" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: create fleet update stage object with group string array'
  description: |-
    ```powershell
    New-AzFleetUpdateStageObject -Name stag1 -Group @{name='group-a'} -AfterStageWaitInSecond 3600 | Format-List
    ```

    ```output
    AfterStageWaitInSecond : 3600
    Group                  : {{
                               "name": "group-a"
                             }}
    Name                   : stag1
    ```

    This command create a fleet update stage object and shows as list.
- title: 'Example 2: create fleet update stage object with update group object'
  description: |-
    ```powershell
    $a = New-AzFleetUpdateGroupObject -Name 'Group-a'
    $b = New-AzFleetUpdateGroupObject -Name 'Group-b'
    $c = New-AzFleetUpdateGroupObject -Name 'Group-c'
    New-AzFleetUpdateStageObject -Name stag1 -Group $a,$b,$c -AfterStageWaitInSecond 3600 | Format-List
    ```

    ```output
    AfterStageWaitInSecond : 3600
    Group                  : {{
                               "name": "Group-a"
                             }, {
                               "name": "Group-b"
                             }, {
                               "name": "Group-c"
                             }}
    Name                   : stag1
    ```

    This command create a fleet update stage object and shows as list.
