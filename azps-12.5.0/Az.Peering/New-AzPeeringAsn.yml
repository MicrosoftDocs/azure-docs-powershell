syntaxes:
- syntax: |-
    ```Syntax
    New-AzPeeringAsn
        -Name <String>
        [-SubscriptionId <String>]
        [-PeerAsn <Int32>]
        [-PeerContactDetail <IContactDetail[]>]
        [-PeerName <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
