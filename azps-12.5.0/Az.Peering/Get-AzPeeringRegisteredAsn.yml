uid: Az.Peering.Get-AzPeeringRegisteredAsn
name: Get-AzPeeringRegisteredAsn
module: Az.Peering
isPreview: false
summary: |-
  Gets an existing registered ASN with the specified name under the given subscription, resource group and peering.
