syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlServerAdvisorAutoExecuteStatus
        -AdvisorName <String>
        -AutoExecuteStatus <AdvisorAutoExecuteStatus>
        -ServerName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
