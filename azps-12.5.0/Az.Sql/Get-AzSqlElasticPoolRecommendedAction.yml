syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlElasticPoolRecommendedAction
        [-RecommendedActionName <String>]
        -ServerName <String>
        -ElasticPoolName <String>
        -AdvisorName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
