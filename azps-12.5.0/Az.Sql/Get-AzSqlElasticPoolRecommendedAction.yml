### YamlMime:PowerShellCmdlet1
uid: Az.Sql.Get-AzSqlElasticPoolRecommendedAction
name: Get-AzSqlElasticPoolRecommendedAction
module: Az.Sql
isPreview: false
summary: |-
  Gets one or more recommended actions for an Azure SQL Elastic Pool Advisor.
description: |-
  The **Get-AzSqlElasticPoolRecommendedAction** cmdlet gets one or more recommended actions for an Azure SQL Elastic Pool Advisor.
notes: |-
  * Keywords: azure, azurerm, arm, resource, management, manager, sql, elasticpool, mssql, advisor, recommendedaction
