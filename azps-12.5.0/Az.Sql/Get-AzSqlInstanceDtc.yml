uid: Az.Sql.Get-AzSqlInstanceDtc
name: Get-AzSqlInstanceDtc
module: Az.Sql
isPreview: false
summary: |-
  Gets an Azure SQL Managed Instance DTC.
description: |-
  The **Get-AzSqlInstanceDtc** cmdlet returns information about an Azure SQL Managed Instance DTC.
