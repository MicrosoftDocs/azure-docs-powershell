uid: Az.Sql.Stop-AzSqlDatabaseExecuteIndexRecommendation
name: Stop-AzSqlDatabaseExecuteIndexRecommendation
module: Az.Sql
isPreview: false
summary: |-
  Stops the workflow that runs a recommended index operation.
description: |-
  The **Stop-AzSqlDatabaseExecuteIndexRecommendation** cmdlet stops the workflow that runs a recommended index operation.
