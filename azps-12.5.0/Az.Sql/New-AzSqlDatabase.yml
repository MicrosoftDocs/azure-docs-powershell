examples:
- title: 'Example 1: Create a database on a specified server'
  description: |-
    ```powershell
    New-AzSqlDatabase -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -DatabaseName "Database01"
    ```

    ```output
    ResourceGroupName             : ResourceGroup01
    ServerName                    : Server01
    DatabaseName                  : Database01
    Location                      : Central US
    DatabaseId                    : a1e6bd1a-735a-4d48-8b98-afead5ef1218
    Edition                       : Standard
    CollationName                 : SQL_Latin1_General_CP1_CI_AS
    CatalogCollation              :
    MaxSizeBytes                  : 268435456000
    Status                        : Online
    CreationDate                  : 7/3/2015 7:33:37 AM
    CurrentServiceObjectiveId     : f1173c43-91bd-4aaa-973c-54e79e15235b
    CurrentServiceObjectiveName   : S0
    RequestedServiceObjectiveId   : f1173c43-91bd-4aaa-973c-54e79e15235b
    RequestedServiceObjectiveName :
    ElasticPoolName               :
    EarliestRestoreDate           :
    LicenseType                   :
    Tags                          :
    EnableLedger                  : False
    ```

    This command creates a database named Database01 on server Server01.
- title: 'Example 2: Create an elastic database on a specified server'
  description: |-
    ```powershell
    New-AzSqlDatabase -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -DatabaseName "Database02" -ElasticPoolName "ElasticPool01"
    ```

    ```output
    ResourceGroupName             : ResourceGroup01
    ServerName                    : Server01
    DatabaseName                  : Database02
    Location                      : Central US
    DatabaseId                    : 7bd9d561-42a7-484e-bf05-62ddef8015ab
    Edition                       : Standard
    CollationName                 : SQL_Latin1_General_CP1_CI_AS
    CatalogCollation              :
    MaxSizeBytes                  : 268435456000
    Status                        : Online
    CreationDate                  : 8/26/2015 10:04:29 PM
    CurrentServiceObjectiveId     : d1737d22-a8ea-4de7-9bd0-33395d2a7419
    CurrentServiceObjectiveName   : ElasticPool
    RequestedServiceObjectiveId   : d1737d22-a8ea-4de7-9bd0-33395d2a7419
    RequestedServiceObjectiveName :
    ElasticPoolName               : ElasticPool01
    EarliestRestoreDate           :
    LicenseType                   :
    Tags                          :
    EnableLedger                  : False
    ```

    This command creates a database named Database02 in the elastic pool named ElasticPool01 on server Server01.
