syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlServerTransparentDataEncryptionProtector
        [-Type] <EncryptionProtectorType>
        [[-KeyId] <String>]
        [-AutoRotationEnabled <Boolean>]
        [-Force]
        [-AsJob]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
