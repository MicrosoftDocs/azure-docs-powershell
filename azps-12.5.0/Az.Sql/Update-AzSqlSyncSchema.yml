syntaxes:
- syntax: |-
    ```Syntax
    Update-AzSqlSyncSchema
        [-SyncGroupName] <String>
        [-SyncMemberName <String>]
        [-PassThru]
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
