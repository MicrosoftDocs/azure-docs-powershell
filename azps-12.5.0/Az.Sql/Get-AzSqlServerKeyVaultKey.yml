syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlServerKeyVaultKey
        [[-KeyId] <String>]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
