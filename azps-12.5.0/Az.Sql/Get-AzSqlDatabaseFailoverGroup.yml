syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlDatabaseFailoverGroup
        [-ServerName] <String>
        [[-FailoverGroupName] <String>]
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
