- syntax: |-
    ```Syntax
    Get-AzSqlDatabaseAdvancedThreatProtectionSetting
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
