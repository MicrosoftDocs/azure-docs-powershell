syntaxes:
- syntax: |-
    ```Syntax
    New-AzSqlDatabaseDataMaskingRule
        -MaskingFunction <String>
        [-PrefixSize <UInt32>]
        [-ReplacementString <String>]
        [-SuffixSize <UInt32>]
        [-NumberFrom <Double>]
        [-NumberTo <Double>]
        [-PassThru]
        -SchemaName <String>
        -TableName <String>
        -ColumnName <String>
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
