syntaxes:
- syntax: |-
    ```Syntax
    Start-AzSqlElasticJob
        [-ResourceGroupName] <String>
        [-ServerName] <String>
        [-AgentName] <String>
        [-JobName] <String>
        [-Wait]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultSet
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzSqlElasticJob
        [-ParentObject] <AzureSqlElasticJobModel>
        [-Wait]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ObjectSet
  isDefault: false
- syntax: |-
