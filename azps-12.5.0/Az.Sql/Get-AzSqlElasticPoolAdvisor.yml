- title: 'Example 1: List all the advisors for the specified elastic pool'
  description: |-
    ```powershell
    Get-AzSqlElasticPoolAdvisor -ResourceGroupName "WIRunnersProd" -ServerName "wi-runner-australia-east" -ElasticPoolName "WIRunnerPool"
    ```

