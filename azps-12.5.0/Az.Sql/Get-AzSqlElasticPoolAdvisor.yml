syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlElasticPoolAdvisor
        [-AdvisorName <String>]
        [-ExpandRecommendedActions]
        -ServerName <String>
        -ElasticPoolName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
