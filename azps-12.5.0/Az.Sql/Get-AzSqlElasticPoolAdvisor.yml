### YamlMime:PowerShellCmdlet1
uid: Az.Sql.Get-AzSqlElasticPoolAdvisor
name: Get-AzSqlElasticPoolAdvisor
module: Az.Sql
isPreview: false
summary: |-
  Gets one or more Advisors for an Azure SQL Elastic Pool.
description: |-
  The **Get-AzSqlElasticPoolAdvisor** cmdlet gets one or more Azure SQL Elastic Pool Advisors for an Azure SQL Elastic Pool.
notes: |-
  * Keywords: azure, azurerm, arm, resource, management, manager, sql, elasticpool, mssql, advisor
