syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlServer
        [[-ResourceGroupName] <String>]
        [[-ServerName] <String>]
        [-ExpandActiveDirectoryAdministrator]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.Server.Model.AzureSqlServerModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all instances of SQL Server assigned to a resource group'
  description: |-
    ```powershell
    Get-AzSqlServer -ResourceGroupName "ResourceGroup01"
    ```

    ```output
    ResourceGroupName        : resourcegroup01
    ServerName               : server01
    Location                 : Central US
    SqlAdministratorLogin    : adminLogin
    SqlAdministratorPassword :
    ServerVersion            : 12.0
    Tags                     :
    Identity                 :
    FullyQualifiedDomainName : server01.database.windows.net

    ResourceGroupName        : resourcegroup01
    ServerName               : server02
    Location                 : West US
    SqlAdministratorLogin    : adminLogin
    SqlAdministratorPassword :
    ServerVersion            : 12.0
    Tags                     :
    Identity                 :
    FullyQualifiedDomainName : server02.database.windows.net
    ```

    This command gets information about all the Azure SQL Database servers assigned to the resource group ResourceGroup01.
- title: 'Example 2: Get information about an Azure SQL Database server'
  description: |-
    ```powershell
    Get-AzSqlServer -ResourceGroupName "ResourceGroup01" -ServerName "Server01"
    ```

    ```output
    ResourceGroupName        : resourcegroup01
    ServerName               : server01
    Location                 : Central US
    SqlAdministratorLogin    : adminLogin
    SqlAdministratorPassword :
    ServerVersion            : 12.0
    Tags                     :
    Identity                 :
    FullyQualifiedDomainName : server01.database.windows.net
    ```

    This command gets information about the Azure SQL Database server named Server01.
- title: 'Example 3: Get all instances of SQL Server in the subscription'
  description: |-
    ```powershell
    Get-AzResourceGroup | Get-AzSqlServer
    ```

    ```output
    ResourceGroupName        : resourcegroup01
    ServerName               : server01
    Location                 : Central US
    SqlAdministratorLogin    : adminLogin
    SqlAdministratorPassword :
    ServerVersion            : 12.0
    Tags                     :
    Identity                 :
    FullyQualifiedDomainName : server01.database.windows.net

    ResourceGroupName        : resourcegroup01
    ServerName               : server02
    Location                 : West US
    SqlAdministratorLogin    : adminLogin
    SqlAdministratorPassword :
    ServerVersion            : 12.0
    Tags                     :
    Identity                 :
    FullyQualifiedDomainName : server02.database.windows.net

    ResourceGroupName        : resourcegroup02
    ServerName               : server03
    Location                 : East US
    SqlAdministratorLogin    : adminLogin
    SqlAdministratorPassword :
    ServerVersion            : 12.0
    Tags                     :
    Identity                 :
    FullyQualifiedDomainName : server03.database.windows.net
    ```

    This command gets information about all the Azure SQL Database servers in the current subscription.
- title: 'Example 4: Get all instances of SQL Server assigned to a resource group using filtering'
  description: |-
    ```powershell
    Get-AzSqlServer -ResourceGroupName "ResourceGroup01" -ServerName "server*"
    ```

    ```output
    ResourceGroupName        : resourcegroup01
    ServerName               : server01
    Location                 : Central US
    SqlAdministratorLogin    : adminLogin
    SqlAdministratorPassword :
    ServerVersion            : 12.0
    Tags                     :
    Identity                 :
    FullyQualifiedDomainName : server01.database.windows.net

    ResourceGroupName        : resourcegroup01
    ServerName               : server02
    Location                 : West US
    SqlAdministratorLogin    : adminLogin
    SqlAdministratorPassword :
    ServerVersion            : 12.0
    Tags                     :
    Identity                 :
    FullyQualifiedDomainName : server02.database.windows.net
    ```

    This command gets information about all the Azure SQL Database servers assigned to the resource group ResourceGroup01 that start with "server".
