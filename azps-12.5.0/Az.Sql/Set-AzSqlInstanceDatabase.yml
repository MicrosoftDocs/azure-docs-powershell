    ```powershell
    Set-AzSqlInstanceDatabase -Name "name1" -InstanceName "instance1" -ResourceGroupName "rg1" -Tags @{tag1="value1"}

    Location                          : westcentralus
    Tags                              : {[tag1, value1]}
    Collation                         : SQL_Latin1_General_CP1_CI_AS
    Status                            : Online
    RestorePointInTime                :
    DefaultSecondaryLocation          : westus2
    CatalogCollation                  :
    CreateMode                        :
    StorageContainerUri               :
