syntaxes:
- syntax: |-
    ```Syntax
    Start-AzSqlInstanceDatabaseLogReplay
        [-Name] <String>
        [-InstanceName] <String>
        [-ResourceGroupName] <String>
        -StorageContainerUri <String>
        -StorageContainerSasToken <String>
        [-AutoCompleteRestore]
        [-LastBackupName <String>]
        [-Collation <String>]
        [-StorageContainerIdentity <String>]
        [-AsJob]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: LogReplayInstanceDatabaseFromInputParameters
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzSqlInstanceDatabaseLogReplay
        [-InputObject] <AzureSqlManagedDatabaseModel>
        -StorageContainerUri <String>
        -StorageContainerSasToken <String>
        [-AutoCompleteRestore]
        [-LastBackupName <String>]
        [-Collation <String>]
        [-StorageContainerIdentity <String>]
