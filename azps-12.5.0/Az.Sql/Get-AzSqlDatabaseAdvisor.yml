    supportsWildcards: true
  - name: DatabaseName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the database for which this cmdlet requests the Advisor.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
