syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlDatabaseAdvisor
        [-AdvisorName <String>]
        [-ExpandRecommendedActions]
        -ServerName <String>
        -DatabaseName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.Advisor.Model.AzureSqlDatabaseAdvisorModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: List all the advisors for the specified database'
  description: |-
    ```powershell
    Get-AzSqlDatabaseAdvisor -ResourceGroupName "WIRunnersProd" -ServerName "wi-runner-australia-east" -DatabaseName "WIRunner"
    ```

    ```output
    DatabaseName                   : WIRunner
    ResourceGroupName              : WIRunnersProd
    ServerName                     : wi-runner-australia-east
    AdvisorName                    : CreateIndex
    AdvisorStatus                  : GA
    AutoExecuteStatus              : Disabled
    AutoExecuteStatusInheritedFrom : Database
    LastChecked                    : 8/1/2016 2:36:47 PM
    RecommendationsStatus          : Ok
    RecommendedActions             : {}

