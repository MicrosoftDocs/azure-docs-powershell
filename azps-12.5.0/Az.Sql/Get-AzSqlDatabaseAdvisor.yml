### YamlMime:PowerShellCmdlet1
uid: Az.Sql.Get-AzSqlDatabaseAdvisor
name: Get-AzSqlDatabaseAdvisor
module: Az.Sql
isPreview: false
summary: |-
  Gets one or more Advisors for an Azure SQL Database.
description: |-
  The **Get-AzSqlDatabaseAdvisor** cmdlet gets one or more Azure SQL Database Advisors for an Azure SQL Database.
notes: |-
  * Keywords: azure, azurerm, arm, resource, management, manager, sql, database, mssql, advisor
parameters:
  cmdletParameters:
  - name: AdvisorName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the advisor that this cmdlet gets.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
