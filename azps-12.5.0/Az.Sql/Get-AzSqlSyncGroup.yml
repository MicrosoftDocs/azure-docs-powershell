### YamlMime:PowerShellCmdlet1
uid: Az.Sql.Get-AzSqlSyncGroup
name: Get-AzSqlSyncGroup
module: Az.Sql
isPreview: false
summary: |-
  Returns information about Azure SQL Database Sync Groups.
description: |-
  The **Get-AzSqlSyncGroup** cmdlet returns information about one or more Azure SQL Database Sync Groups.
  Specify the name of a sync group to see information for only that sync group.
parameters:
  cmdletParameters:
  - name: DatabaseName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the Azure SQL Database.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The sync group name.
