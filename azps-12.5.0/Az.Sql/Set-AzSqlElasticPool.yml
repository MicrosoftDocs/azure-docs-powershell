examples:
- title: 'Example 1: Modify properties for an elastic pool'
  description: |-
    ```powershell
    Set-AzSqlElasticPool -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -ElasticPoolName "ElasticPool01" -Dtu 1000 -DatabaseDtuMax 100 -DatabaseDtuMin 20
    ```

    ```output
    ResourceId        : /subscriptions/00000000-0000-0000-0000-000000000001/resourceGroups/resourcegroup01/providers/Microsoft.Sql/servers/Server01/elasticPools/ElasticPool01
    ResourceGroupName : ResourceGroup01
    ServerName        : Server01
    ElasticPoolName   : ElasticPool01
    Location          : Central US
    CreationDate      : 8/26/2015 10:00:17 PM
    State             : Ready
    Edition           : Standard
    Dtu               : 200
    DatabaseDtuMax    : 100
    DatabaseDtuMin    : 20
    StorageMB         : 204800
    Tags              :
    ```

    This command modifies properties for an elastic pool named elasticpool01. The command sets the
    number of DTUs for the elastic pool to 1000 and sets the minimum and maximum DTUs.
- title: 'Example 2: Modify the storage max size of an elastic pool'
  description: |-
    ```powershell
    Set-AzSqlElasticPool -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -ElasticPoolName "ElasticPool01" -StorageMB 2097152
    ```

    ```output
    ResourceId        : /subscriptions/00000000-0000-0000-0000-000000000001/resourceGroups/resourcegroup01/providers/Microsoft.Sql/servers/Server01/elasticPools/ElasticPool01
    ResourceGroupName : ResourceGroup01
    ServerName        : Server01
    ElasticPoolName   : ElasticPool01
    Location          : Central US
    CreationDate      : 8/26/2015 10:00:17 PM
    State             : Ready
    Edition           : Premium
    Dtu               : 200
    DatabaseDtuMax    : 100
    DatabaseDtuMin    : 20
    StorageMB         : 2097152
    Tags              :
    ```

    This command modifies properties for an elastic pool named elasticpool01. The command sets the max
    storage for an elastic pool to 2 TB.
- title: Example 3
  description: |-
    Modifies properties of an elastic database pool in Azure SQL Database. (autogenerated)

    <!-- Aladdin Generated Example -->


    ```powershell
    Set-AzSqlElasticPool -Dtu 1000 -Edition 'GeneralPurpose' -ElasticPoolName 'ElasticPool01' -ResourceGroupName 'ResourceGroup01' -ServerName 'Server01'
    ```
- title: 'Example 4: Modify the preferred enclave type of an elastic pool to VBS'
  description: |-
    ```powershell
    Set-AzSqlElasticPool -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -ElasticPoolName "ElasticPool01" -PreferredEnclaveType "VBS"
    ```

    ```output
    ResourceId            : /subscriptions/00000000-0000-0000-0000-000000000001/resourceGroups/resourcegroup01/providers/Microsoft.Sql/servers/Server01/elasticPools/ElasticPool01
    ResourceGroupName     : ResourceGroup01
    ServerName            : Server01
    ElasticPoolName       : ElasticPool01
    Location              : Central US
    CreationDate          : 8/26/2015 10:00:17 PM
    State                 : Ready
    Edition               : Premium
    Dtu                   : 200
    DatabaseDtuMax        : 100
    DatabaseDtuMin        : 20
    StorageMB             : 2097152
    PreferredEnclaveType  : VBS
    Tags                  :
    ```

    This command updates an elastic pool to configure VBS enclave on it
