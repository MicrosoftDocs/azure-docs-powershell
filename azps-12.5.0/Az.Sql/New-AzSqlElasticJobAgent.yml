syntaxes:
- syntax: |-
    ```Syntax
    New-AzSqlElasticJobAgent
        [-ResourceGroupName] <String>
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-Name] <String>
        [-Tag <Hashtable>]
        [-UserAssignedIdentityId <String[]>]
        [-IdentityType <String>]
        [-WorkerCount <Int32>]
        [-SkuName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzSqlElasticJobAgent
        [-DatabaseObject] <AzureSqlDatabaseModel>
        [-Name] <String>
        [-Tag <Hashtable>]
        [-UserAssignedIdentityId <String[]>]
        [-IdentityType <String>]
        [-WorkerCount <Int32>]
        [-SkuName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ObjectSet
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzSqlElasticJobAgent
        [-DatabaseResourceId] <String>
        [-Name] <String>
        [-Tag <Hashtable>]
        [-UserAssignedIdentityId <String[]>]
        [-IdentityType <String>]
        [-WorkerCount <Int32>]
        [-SkuName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceIdSet
  isDefault: false
