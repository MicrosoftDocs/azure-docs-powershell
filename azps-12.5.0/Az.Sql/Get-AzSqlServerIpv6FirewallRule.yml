syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlServerIpv6FirewallRule
        [[-Ipv6FirewallRuleName] <String>]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
