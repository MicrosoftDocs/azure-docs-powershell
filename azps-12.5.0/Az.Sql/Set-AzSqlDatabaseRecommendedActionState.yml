syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseRecommendedActionState
        -RecommendedActionName <String>
        -State <RecommendedActionState>
        -ServerName <String>
        -DatabaseName <String>
        -AdvisorName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
