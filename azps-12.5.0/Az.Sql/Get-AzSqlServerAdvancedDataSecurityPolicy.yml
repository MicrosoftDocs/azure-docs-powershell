examples:
- title: 'Example 1: Gets server Advanced Data Security'
  description: |-
    ```powershell
    Get-AzSqlServerAdvancedDataSecurityPolicy `
                -ResourceGroupName "ResourceGroup01" `
                -ServerName "Server01"
    ```

    ```output
    ResourceGroupName	         : ResourceGroup01
    ServerName		             : Server01
    IsEnabled		             : True
    ```
- title: 'Example 2: Gets server Advanced Data Security from server resource'
  description: |-
    ```powershell
    Get-AzSqlServer `
               -ResourceGroupName "ResourceGroup01" `
               -ServerName "Server01" `
               | Get-AzSqlServerAdvancedDataSecurityPolicy
    ```

    ```output
    ResourceGroupName	         : ResourceGroup01
    ServerName		             : Server01
    IsEnabled		             : True
    ```
