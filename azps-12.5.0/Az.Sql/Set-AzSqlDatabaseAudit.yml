### YamlMime:PowerShellCmdlet1
uid: Az.Sql.Set-AzSqlDatabaseAudit
name: Set-AzSqlDatabaseAudit
module: Az.Sql
isPreview: false
summary: |-
  Changes the auditing settings for an Azure SQL Database.
description: |-
  The **Set-AzSqlDatabaseAudit** cmdlet changes the auditing settings of an Azure SQL Database.
  To use the cmdlet, use the *ResourceGroupName*, *ServerName*, and *DatabaseName* parameters to identify the database.
  When blob storage is a destination for audit logs, specify the *StorageAccountResourceId* parameter to determine the storage account for the audit logs and the *StorageKeyType* parameter to define the storage keys. If using blob storage as destination, you can also define retention for the audit logs by setting the value of the *RetentionInDays* parameter to define the period for the audit logs.
parameters:
  cmdletParameters:
  - name: AuditAction
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The set of audit actions.
      The supported actions to audit are:
      SELECT
      UPDATE
      INSERT
      DELETE
      EXECUTE
      RECEIVE
      REFERENCES
      The general form for defining an action to be audited is:
      [action] ON [object] BY [principal]
      Note that [object] in the above format can refer to an object like a table, view, or stored procedure, or an entire database or schema. For the latter cases, the forms DATABASE::[dbname] and SCHEMA::[schemaname] are used, respectively.
      For example:
      SELECT on dbo.myTable by public
      SELECT on DATABASE::myDatabase by public
      SELECT on SCHEMA::mySchema by public
      For more information, see https://learn.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions#database-level-audit-actions.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AuditActionGroup
    type: <xref href="Microsoft.Azure.Commands.Sql.Auditing.Model.AuditActionGroups" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The recommended set of action groups to use is the following combination - this will audit all the queries and stored procedures executed against the database, as well as successful and failed logins:

      "BATCH_COMPLETED_GROUP",
      "SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP",
      "FAILED_DATABASE_AUTHENTICATION_GROUP"
      This above combination is also the set that is configured by default. These groups cover all SQL statements and stored procedures executed against the database, and should not be used in combination with other groups as this will result in duplicate audit logs.
      For more information, see https://learn.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions#database-level-audit-action-groups.
    acceptedValues:
    - BATCH_STARTED_GROUP
    - BATCH_COMPLETED_GROUP
    - APPLICATION_ROLE_CHANGE_PASSWORD_GROUP
    - BACKUP_RESTORE_GROUP
    - DATABASE_LOGOUT_GROUP
    - DATABASE_OBJECT_CHANGE_GROUP
    - DATABASE_OBJECT_OWNERSHIP_CHANGE_GROUP
    - DATABASE_OBJECT_PERMISSION_CHANGE_GROUP
    - DATABASE_OPERATION_GROUP
    - DATABASE_PERMISSION_CHANGE_GROUP
    - DATABASE_PRINCIPAL_CHANGE_GROUP
    - DATABASE_PRINCIPAL_IMPERSONATION_GROUP
    - DATABASE_ROLE_MEMBER_CHANGE_GROUP
    - FAILED_DATABASE_AUTHENTICATION_GROUP
    - SCHEMA_OBJECT_ACCESS_GROUP
    - SCHEMA_OBJECT_CHANGE_GROUP
    - SCHEMA_OBJECT_OWNERSHIP_CHANGE_GROUP
    - SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP
    - SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP
    - USER_CHANGE_PASSWORD_GROUP
    - LEDGER_OPERATION_GROUP
    - DBCC_GROUP
    - DATABASE_OWNERSHIP_CHANGE_GROUP
    - DATABASE_CHANGE_GROUP
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
