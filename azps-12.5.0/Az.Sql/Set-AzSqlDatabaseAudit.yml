syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseAudit
        [-ResourceGroupName] <String>
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-AuditActionGroup <AuditActionGroups[]>]
        [-AuditAction <String[]>]
        [-PredicateExpression <String>]
        [-BlobStorageTargetState <String>]
        [-StorageAccountResourceId <String>]
        [-StorageKeyType <String>]
        [-RetentionInDays <UInt32>]
        [-EventHubTargetState <String>]
        [-EventHubName <String>]
        [-EventHubAuthorizationRuleResourceId <String>]
        [-LogAnalyticsTargetState <String>]
        [-WorkspaceResourceId <String>]
        [-PassThru]
        [-UseIdentity <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DatabaseParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseAudit
        -DatabaseObject <AzureSqlDatabaseModel>
        [-AuditActionGroup <AuditActionGroups[]>]
        [-AuditAction <String[]>]
        [-PredicateExpression <String>]
        [-BlobStorageTargetState <String>]
        [-StorageAccountResourceId <String>]
        [-StorageKeyType <String>]
        [-RetentionInDays <UInt32>]
        [-EventHubTargetState <String>]
        [-EventHubName <String>]
        [-EventHubAuthorizationRuleResourceId <String>]
        [-LogAnalyticsTargetState <String>]
        [-WorkspaceResourceId <String>]
        [-PassThru]
        [-UseIdentity <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DatabaseObjectParameterSet
  isDefault: false
