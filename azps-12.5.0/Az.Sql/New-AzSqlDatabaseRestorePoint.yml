syntaxes:
- syntax: |-
    ```Syntax
    New-AzSqlDatabaseRestorePoint
        -RestorePointLabel <String>
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.Backup.Model.AzureSqlDatabaseRestorePointModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a restore point'
  description: |-
    ```powershell
    New-AzSqlDatabaseRestorePoint -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -DatabaseName "Database01" -RestorePointLabel "RestorePoint01"
    ```

    ```output
    ResourceGroupName        : resourcegroup01
    ServerName               : server01
    DatabaseName             : database01
    Location                 : Central US
    RestorePointType         : DISCRETE
    RestorePointCreationDate : 8/12/2015 12:00:00 AM
    EarliestRestoreDate      :
    RestorePointLabel        : RestorePoint01
    ```

    This command creates a restore point for Azure SQL Data Warehouse and returns the details of the restore point.
