examples:
- title: 'Example 1: Get TDE status for a database'
  description: |-
    ```powershell
    Get-AzSqlDatabaseTransparentDataEncryption -ServerName "server01" -ResourceGroupName "resourcegroup01" -DatabaseName "database01"
    ```

    ```output
    ResourceGroupName             ServerName                    DatabaseName                                          State
    -----------------             ----------                    ------------                                          -----
    resourcegroup01               server01                      database01                                            Disabled
    ```

    This command gets the status of TDE for the database named Database01 on the server named server01.
