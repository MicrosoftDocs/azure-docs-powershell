syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlCapability
        [-LocationName] <String>
        [-ServerVersionName <String>]
        [-EditionName <String>]
        [-ServiceObjectiveName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FilterResults
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSqlCapability
        [-LocationName] <String>
        [-Defaults]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultResults
  isDefault: false
