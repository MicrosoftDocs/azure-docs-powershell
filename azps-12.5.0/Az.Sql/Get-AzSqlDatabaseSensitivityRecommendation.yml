examples:
- title: 'Example 1: Get recommended information types and sensitivity labels of an Azure SQL database.'
  description: |-
    ```powershell
    Get-AzSqlDatabaseSensitivityRecommendation -ResourceGroupName resourceGroup -ServerName server -DatabaseName database
    ```

    ```output
    ResourceGroupName : resourceGroup
    ServerName        : server
    DatabaseName      : database
    SensitivityLabels : {{
                            SchemaName: dbo,
                            TableName: Report,
                            ColumnName: ReportEmailBody,
                            InformationType: Contact Info
                        }, {
                            SchemaName: dbo,
                            TableName: Report,
                            ColumnName: ReportEmailSubject,
                            SensitivityLabel: Confidential,
                            Rank: Medium
                        }, {
                            SchemaName: dbo,
                            TableName: EMailLog,
                            ColumnName: BounceEmailSubject,
                            SensitivityLabel: Confidential,
                            InformationType: Contact Info,
                            Rank: Medium
                        }}
    ```
- title: 'Example 2: Get recommended information types and sensitivity labels of an Azure SQL database using Piping.'
  description: |-
    ```powershell
    Get-AzSqlDatabase -ResourceGroupName resourceGroup -ServerName server -DatabaseName database | Get-AzSqlDatabaseSensitivityRecommendation
    ```

    ```output
    ResourceGroupName : resourceGroup
    ServerName        : server
    DatabaseName      : database
    SensitivityLabels : {{
                            SchemaName: dbo,
                            TableName: Report,
                            ColumnName: ReportEmailBody,
                            InformationType: Contact Info
                        }, {
                            SchemaName: dbo,
                            TableName: Report,
                            ColumnName: ReportEmailSubject,
                            SensitivityLabel: Confidential,
                            Rank: Medium
                        }, {
                            SchemaName: dbo,
                            TableName: EMailLog,
                            ColumnName: BounceEmailSubject,
                            SensitivityLabel: Confidential,
                            InformationType: Contact Info,
                            Rank: Medium
                        }}
    ```
