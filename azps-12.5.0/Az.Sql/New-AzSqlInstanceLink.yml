syntaxes:
- syntax: |-
    ```Syntax
    New-AzSqlInstanceLink
        [-ResourceGroupName] <String>
        [-InstanceName] <String>
        [-Name] <String>
        -PrimaryAvailabilityGroupName <String>
        -SecondaryAvailabilityGroupName <String>
        -TargetDatabase <String>
        -SourceEndpoint <String>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzSqlInstanceLink
        [-Name] <String>
        [-InstanceObject] <AzureSqlManagedInstanceModel>
        -PrimaryAvailabilityGroupName <String>
        -SecondaryAvailabilityGroupName <String>
        -TargetDatabase <String>
        -SourceEndpoint <String>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByParentObjectParameterSet
