    ```Syntax
    Get-AzSqlDatabaseAudit
        [-ResourceGroupName] <String>
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: DatabaseParameterSet
