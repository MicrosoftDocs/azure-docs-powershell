examples:
- title: 'Example 1: Get all instances of Azure SQL Sync Member assigned to a sync group'
  description: |-
    ```powershell
    Get-AzSqlSyncMember -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -DatabaseName "Database01" -SyncGroupName "SyncGroup01" | Format-List
    ```

    ```output
    ResourceId                  : subscriptions/{subscriptionId}/resourceGroups/{ResourceGroup01}/servers/{Server01}/databases/{Database01}/syncGroups/{SyncGroup01}/syncMembers/{SyncMember01}
    ResourceGroupName           : ResourceGroup01
    ServerName                  : Server01
    DatabaseName                : Database01
    SyncGroupName               : SyncGroup01
    SyncMemberName              : SyncMember01
    SyncDirection               : OneWayMemberToHub
    MemberDatabaseType:         : AzureSqlDatabase
    SyncAgentId                 :
    SqlServerDatabaseId         :
    MemberServerName            : memberServer01.full.dns.name
    MemberDatabaseName          : memberDatabase01
    MemberDatabaseUserName      : myAccount
    MemberDatabasePassword      :
    SyncState                   : Good

    ResourceId                  : subscriptions/{subscriptionId}/resourceGroups/{ResourceGroup01}/servers/{Server01}/databases/{Database01}/syncGroups/{SyncGroup01}/syncMembers/{SyncMember02}
    ResourceGroupName           : ResourceGroup01
    ServerName                  : Server01
    DatabaseName                : Database01
    SyncGroupName               : SyncGroup01
    SyncMemberName              : SyncMember02
    SyncDirection               : OneWayMemberToHub
    MemberDatabaseType:         : AzureSqlDatabase
    SyncAgentId                 :
    SqlServerDatabaseId         :
    MemberServerName            : memberServer01.full.dns.name
    MemberDatabaseName          : memberDatabase01
    MemberDatabaseUserName      : myAccount
    MemberDatabasePassword      :
    SyncState                   : Good
    ```

    This command gets information about all the Azure SQL Database Sync Member assigned to the sync group SyncGroup01.
- title: 'Example 2: Get information about an Azure SQL Database Sync Member'
  description: |-
    ```powershell
    Get-AzSqlSyncMember -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -DatabaseName "Database01" -SyncGroupName "SyncGroup01" -Name "SyncMember01" | Format-List
    ```

    ```output
    ResourceId                  : subscriptions/{subscriptionId}/resourceGroups/{ResourceGroup01}/servers/{Server01}/databases/{Database01}/syncGroups/{SyncGroup01}/syncMembers/{SyncMember01}
    ResourceGroupName           : ResourceGroup01
    ServerName                  : Server01
    DatabaseName                : Database01
    SyncGroupName               : SyncGroup01
    SyncMemberName              : SyncMember01
    SyncDirection               : OneWayMemberToHub
    MemberDatabaseType:         : AzureSqlDatabase
    SyncAgentId                 :
    SqlServerDatabaseId         :
    MemberServerName            : memberServer01.full.dns.name
    MemberDatabaseName          : memberDatabase01
    MemberDatabaseUserName      : myAccount
    MemberDatabasePassword      :
    SyncState                   : Good
    ```

    This command gets information about the Azure SQL Database Sync Member with name "SyncMember01"
- title: 'Example 3: Get all instances of Azure SQL Sync Member assigned to a sync group using filtering'
  description: |-
    ```powershell
    Get-AzSqlSyncMember -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -DatabaseName "Database01" -SyncGroupName "SyncGroup01" -Name "SyncMember*" | Format-List
    ```

    ```output
    ResourceId                  : subscriptions/{subscriptionId}/resourceGroups/{ResourceGroup01}/servers/{Server01}/databases/{Database01}/syncGroups/{SyncGroup01}/syncMembers/{SyncMember01}
    ResourceGroupName           : ResourceGroup01
    ServerName                  : Server01
    DatabaseName                : Database01
    SyncGroupName               : SyncGroup01
    SyncMemberName              : SyncMember01
    SyncDirection               : OneWayMemberToHub
    MemberDatabaseType:         : AzureSqlDatabase
    SyncAgentId                 :
    SqlServerDatabaseId         :
    MemberServerName            : memberServer01.full.dns.name
    MemberDatabaseName          : memberDatabase01
    MemberDatabaseUserName      : myAccount
    MemberDatabasePassword      :
    SyncState                   : Good

    ResourceId                  : subscriptions/{subscriptionId}/resourceGroups/{ResourceGroup01}/servers/{Server01}/databases/{Database01}/syncGroups/{SyncGroup01}/syncMembers/{SyncMember02}
    ResourceGroupName           : ResourceGroup01
    ServerName                  : Server01
    DatabaseName                : Database01
    SyncGroupName               : SyncGroup01
    SyncMemberName              : SyncMember02
    SyncDirection               : OneWayMemberToHub
    MemberDatabaseType:         : AzureSqlDatabase
    SyncAgentId                 :
    SqlServerDatabaseId         :
    MemberServerName            : memberServer01.full.dns.name
    MemberDatabaseName          : memberDatabase01
    MemberDatabaseUserName      : myAccount
    MemberDatabasePassword      :
    SyncState                   : Good
    ```

    This command gets information about all the Azure SQL Database Sync Member assigned to the sync group SyncGroup01 that start with "SyncMember".
