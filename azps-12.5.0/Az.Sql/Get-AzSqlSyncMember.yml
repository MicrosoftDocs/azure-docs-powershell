syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlSyncMember
        [-Name <String>]
        [-SyncGroupName] <String>
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
