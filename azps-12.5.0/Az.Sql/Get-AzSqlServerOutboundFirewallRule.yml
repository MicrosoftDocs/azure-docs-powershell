syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlServerOutboundFirewallRule
        [[-AllowedFQDN] <String>]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
