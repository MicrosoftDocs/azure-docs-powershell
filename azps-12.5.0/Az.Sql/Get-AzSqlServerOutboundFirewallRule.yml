    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the allowed fully qualified domain name (FQDN) in the list of outbound firewall rules.
    aliases:
    - Name
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
