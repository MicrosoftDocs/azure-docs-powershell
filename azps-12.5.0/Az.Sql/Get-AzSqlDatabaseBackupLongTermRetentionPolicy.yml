examples:
- title: 'Example 1: Get the current version of the long term retention policy'
  description: |-
    ```powershell
    Get-AzSqlDatabaseBackupLongTermRetentionPolicy -ResourceGroupName resourcegroup01 -ServerName server01 -DatabaseName database01
    ```

    ```output
    ResourceGroupName                      : resourcegroup01
    ServerName                             : server01
    DatabaseName                           : database01
    WeeklyRetention                        : P2W
    MonthlyRetention                       : PT0S
    YearlyRetention                        : PT0S
    WeekOfYear                             : 0
    State                                  :
    RecoveryServicesBackupPolicyResourceId :
    Location                               :
    ```

    This command gets the current version of the long term retention policy for database01
