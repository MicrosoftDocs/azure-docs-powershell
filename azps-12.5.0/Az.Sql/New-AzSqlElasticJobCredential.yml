- title: Example 1
  description: |-
    ```powershell
    $agent = Get-AzSqlElasticJobAgent -ResourceGroupName rg -ServerName elasticjobserver -Name agent
    $agent | New-AzSqlElasticJobCredential -Name cred1 -Credential (Get-Credential)
    ```

    ```output
    CredentialName UserName
    -------------- --------
    cred1          user1
    ```

