examples:
- title: 'Example 1: Get all restore points'
  description: |-
    ```powershell
    Get-AzSqlDatabaseRestorePoint -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -DatabaseName "Database01"
    ```

    ```output
    ResourceGroupName        : resourcegroup01
    ServerName               : server01
    DatabaseName             : database01
    Location                 : Central US
    RestorePointType         : CONTINUOUS
    RestorePointCreationDate :
    EarliestRestoreDate      : 8/12/2015 12:00:00 AM
    RestorePointLabel        : RestorePoint01
    ```

    This command returns all available restore points for the Azure SQL Database named Database01.
