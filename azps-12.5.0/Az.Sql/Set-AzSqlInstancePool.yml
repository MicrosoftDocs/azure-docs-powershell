syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlInstancePool
        [-ResourceGroupName] <String>
        [-Name] <String>
        -VCore <Int32>
        -Edition <String>
        -ComputeGeneration <String>
        -MaintenanceConfigurationId <String>
        [-LicenseType <String>]
        [-Tag <Hashtable>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultSetInstancePoolParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSqlInstancePool
        [-InputObject] <AzureSqlInstancePoolModel>
        -VCore <Int32>
        -Edition <String>
        -ComputeGeneration <String>
        -MaintenanceConfigurationId <String>
        [-LicenseType <String>]
        [-Tag <Hashtable>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObjectSetInstancePoolParameterSet
  isDefault: false
- syntax: |-
