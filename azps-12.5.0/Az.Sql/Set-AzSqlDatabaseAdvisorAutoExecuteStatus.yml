syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseAdvisorAutoExecuteStatus
        -AdvisorName <String>
        -AutoExecuteStatus <AdvisorAutoExecuteStatus>
        -ServerName <String>
        -DatabaseName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Sql.Advisor.Cmdlet.AdvisorAutoExecuteStatus" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.Advisor.Model.AzureSqlDatabaseAdvisorModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Enable auto execute for an advisor'
  description: |-
    ```powershell
    Set-AzSqlDatabaseAdvisorAutoExecuteStatus -ResourceGroupName "ContosoRunnersProd" -ServerName "runner-australia-east" -DatabaseName "ContosoRunner" -AdvisorName "CreateIndex" -AutoExecuteStatus Enabled
    ```

    ```output
    DatabaseName                   : ContosoRunner
    ResourceGroupName              : ContosoRunnersProd
    ServerName                     : runner-australia-east
    AdvisorName                    : CreateIndex
    AdvisorStatus                  : GA
    AutoExecuteStatus              : Enabled
    AutoExecuteStatusInheritedFrom : Database
    LastChecked                    : 8/1/2016 2:36:47 PM
    RecommendationsStatus          : Ok
    RecommendedActions             : {}
    ```

    This command changes the auto execute status of an advisor named CreateIndex to Enabled.
