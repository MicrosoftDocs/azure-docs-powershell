    Get-AzSqlServerServiceObjective
        [[-ServiceObjectiveName] <String>]
        -Location <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByLocation
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSqlServerServiceObjective
        [[-ServiceObjectiveName] <String>]
        [-ResourceGroupName] <String>
        [-ServerName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByServer
  isDefault: false
