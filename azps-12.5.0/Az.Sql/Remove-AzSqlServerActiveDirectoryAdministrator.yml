syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzSqlServerActiveDirectoryAdministrator
        [-Force]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
