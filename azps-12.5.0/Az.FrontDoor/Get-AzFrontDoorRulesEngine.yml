syntaxes:
- syntax: |-
    ```Syntax
    Get-AzFrontDoorRulesEngine
        -ResourceGroupName <String>
        -FrontDoorName <String>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
