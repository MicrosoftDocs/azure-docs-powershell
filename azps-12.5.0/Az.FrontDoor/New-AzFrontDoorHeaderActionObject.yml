uid: Az.FrontDoor.New-AzFrontDoorHeaderActionObject
name: New-AzFrontDoorHeaderActionObject
module: Az.FrontDoor
isPreview: false
summary: |-
  Create PSHeaderAction object.
description: |-
  Creates PSHeaderAction object for the creation of PSRulesEngineAction object.
