        [-DeveloperAppInsightsApplicationId <String>]
        [-DisableLocalAuth]
        [-DisplayName <String>]
        [-Endpoint <String>]
        [-Etag <String>]
        [-IconUrl <String>]
        [-IsCmekEnabled]
        [-IsStreamingSupported]
        [-Kind <Kind>]
        [-Location <String>]
        [-LuisAppId <String[]>]
        [-LuisKey <String>]
        [-ManifestUrl <String>]
        [-MsaAppId <String>]
        [-MsaAppMsiResourceId <String>]
        [-MsaAppTenantId <String>]
        [-MsaAppType <MsaAppType>]
        [-OpenWithHint <String>]
        [-Parameter <Hashtable>]
        [-PublicNetworkAccess <PublicNetworkAccess>]
        [-PublishingCredentials <String>]
