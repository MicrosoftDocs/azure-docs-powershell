syntaxes:
- syntax: |-
    ```Syntax
    Get-AzMetricDefinition
        [-ResourceId] <String>
        [-MetricName <String[]>]
        [-MetricNamespace <String>]
        [-DetailedOutput]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
