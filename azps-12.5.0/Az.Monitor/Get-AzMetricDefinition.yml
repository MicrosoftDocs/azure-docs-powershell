                                 Values    : 1.00:00:00
    Name                   : Requests
    Properties             :
    PrimaryAggregationType : Total
    ResourceUri            :
    Unit                   : Count
    ```

    This command gets the metric definitions for website2.
    The output is detailed.
- title: 'Example 3: Get metric definitions by name'
  description: |-
    ```powershell
    Get-AzMetricDefinition -ResourceId "/subscriptions/a0a0a0a0-bbbb-cccc-dddd-e1e1e1e1e1e1/resourceGroups/Default-Web-EastUS/providers/microsoft.web/sites/website2" -DetailedOutput -MetricName "BytesSent,CpuTime"
