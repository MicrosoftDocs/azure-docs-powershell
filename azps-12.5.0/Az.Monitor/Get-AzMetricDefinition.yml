examples:
- title: 'Example 1: Get metric definitions for a resource'
  description: |-
    ```powershell
    Get-AzMetricDefinition -ResourceId "/subscriptions/a0a0a0a0-bbbb-cccc-dddd-e1e1e1e1e1e1/resourceGroups/Default-Web-EastUS/providers/microsoft.web/sites/website2"
    ```

    ```output
    Name                   : CpuTime
    Dimensions             : {}
    MetricAvailabilities   : {Microsoft.Azure.Insights.Models.MetricAvailability,
                             Microsoft.Azure.Insights.Models.MetricAvailability,
                             Microsoft.Azure.Insights.Models.MetricAvailability}
    PrimaryAggregationType : Total
    Properties             : {}
    ResourceUri            :
    Unit                   : Seconds
    Name                   : Requests
    Dimensions             : {}
    MetricAvailabilities   : {Microsoft.Azure.Insights.Models.MetricAvailability,
                             Microsoft.Azure.Insights.Models.MetricAvailability,
                             Microsoft.Azure.Insights.Models.MetricAvailability}
    PrimaryAggregationType : Total
    Properties             : {}
    ResourceUri            :
    Unit                   : Count
    ```

    This command gets the metrics definitions for the specified resource.
- title: 'Example 2: Get metric definitions with detailed output'
  description: |-
    ```powershell
    Get-AzMetricDefinition -ResourceId "/subscriptions/a0a0a0a0-bbbb-cccc-dddd-e1e1e1e1e1e1/resourceGroups/Default-Web-EastUS/providers/microsoft.web/sites/website2" -DetailedOutput
    ```

    ```output
