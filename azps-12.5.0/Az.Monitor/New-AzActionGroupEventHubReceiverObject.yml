syntaxes:
- syntax: |-
    ```Syntax
    New-AzActionGroupEventHubReceiverObject
        -EventHubName <String>
        -EventHubNameSpace <String>
        -Name <String>
        -SubscriptionId <String>
        [-TenantId <String>]
        [-UseCommonAlertSchema <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
