syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataCollectionEndpoint
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        [-SubscriptionId <String>]
        [-Description <String>]
        [-IdentityType <String>]
        [-ImmutableId <String>]
        [-Kind <String>]
        [-NetworkAclsPublicNetworkAccess <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
