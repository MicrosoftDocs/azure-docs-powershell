syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzActionGroupReceiver
        -ActionGroupName <String>
        -ResourceGroupName <String>
        -ReceiverName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
