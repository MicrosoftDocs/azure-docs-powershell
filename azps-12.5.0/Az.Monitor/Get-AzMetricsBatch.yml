### YamlMime:PowerShellCmdlet1
uid: Az.Monitor.Get-AzMetricsBatch
name: Get-AzMetricsBatch
module: Az.Monitor
isPreview: false
summary: |-
  Lists the metric values for multiple resources.
description: |-
  Lists the metric values for multiple resources.
parameters:
  cmdletParameters:
  - name: Aggregation
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The list of aggregation types (comma separated) to retrieve.
      *Examples: average, minimum, maximum*
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="System.Management.Automation.PSObject" data-throw-if-not-resolved="False" />
    description: |-
      The DefaultProfile parameter is not functional.
      Use the SubscriptionId parameter when available if executing the cmdlet against a different subscription.
    aliases:
    - AzureRMContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Endpoint
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The regional endpoint to use, for example `https://eastus.metrics.monitor.azure.com`.
      The region should match the region of the requested resources.
      For global resources, the region should be 'global'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EndTime
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The end time of the query.
      It is a string in the format 'yyyy-MM-ddTHH:mm:ss.fffZ'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The filter is used to reduce the set of metric data returned.
      Example:
      Metric contains metadata A, B and C.
      - Return all time series of C where A = a1 and B = b1 or b2
      **filter=A eq 'a1' and B eq 'b1' or B eq 'b2' and C eq '*'**
      - Invalid variant:
      **filter=A eq 'a1' and B eq 'b1' and C eq '*' or B = 'b2'**
      This is invalid because the logical or operator cannot separate two different metadata names.
      - Return all time series where A = a1, B = b1 and C = c1:
      **filter=A eq 'a1' and B eq 'b1' and C eq 'c1'**
      - Return all time series where A = a1
      **filter=A eq 'a1' and B eq '*' and C eq '*'**.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Metric.Models.IMetricdataIdentity" data-throw-if-not-resolved="False" />
    description: |-
      Identity Parameter
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BatchViaIdentityExpanded
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Interval
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The interval (i.e.
      timegrain) of the query in ISO 8601 duration format.
      Defaults to PT1M.
      Special case for 'FULL' value that returns single datapoint for entire time span requested.
      *Examples: PT15M, PT1H, P1D, FULL*
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.Collections.Generic.List`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.String, System.Private.CoreLib, Version=8.0.0.0, Culture=neutral, PublicKeyToken=7cec85d7bea7798e" data-throw-if-not-resolved="False" /><span>]</span><span>]</span>
    description: |-
      The names of the metrics (comma separated) to retrieve.
    aliases:
    - MetricName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Namespace
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Metric namespace that contains the requested metric names.
    aliases:
    - MetricNamespace
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Orderby
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The aggregation to use for sorting results and the direction of the sort.
      Only one order can be specified.
      *Examples: sum asc*
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The list of resource IDs to query metrics for.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Rollupby
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Dimension name(s) to rollup results by.
      For example if you only want to see metric values with a filter like 'City eq Seattle or City eq Tacoma' but don't want to see separate values for each city, you can specify 'RollUpBy=City' to see the results for Seattle and Tacoma rolled up into one timeseries.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StartTime
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The start time of the query.
      It is a string in the format 'yyyy-MM-ddTHH:mm:ss.fffZ'.
      If you have specified the endtime parameter, then this parameter is required.
      If only starttime is specified, then endtime defaults to the current time.
      If no time interval is specified, the default is 1 hour.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubscriptionId
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The subscription identifier for the resources in this batch.
    defaultValue: (Get-AzContext).Subscription.Id
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BatchExpanded
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Top
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      The maximum number of records to retrieve per resource ID in the request.
      Valid only if filter is specified.
      Defaults to 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
