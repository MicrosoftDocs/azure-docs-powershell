syntaxes:
- syntax: |-
    ```Syntax
    Get-AzMetricsBatch
        -Endpoint <String>
        -Name <System.Collections.Generic.List`1[System.String]>
        -Namespace <String>
        [-SubscriptionId <String[]>]
        [-Aggregation <String>]
        [-EndTime <String>]
        [-Filter <String>]
        [-Interval <String>]
        [-Orderby <String>]
        [-Rollupby <String>]
        [-StartTime <String>]
        [-Top <Int32>]
        [-ResourceId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BatchExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzMetricsBatch
        -Endpoint <String>
        -InputObject <IMetricdataIdentity>
        -Name <System.Collections.Generic.List`1[System.String]>
        -Namespace <String>
        [-Aggregation <String>]
        [-EndTime <String>]
        [-Filter <String>]
        [-Interval <String>]
        [-Orderby <String>]
        [-Rollupby <String>]
        [-StartTime <String>]
        [-Top <Int32>]
        [-ResourceId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BatchViaIdentityExpanded
  isDefault: false
