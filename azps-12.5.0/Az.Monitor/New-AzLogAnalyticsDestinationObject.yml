    ```Syntax
    New-AzLogAnalyticsDestinationObject
        [-Name <String>]
        [-WorkspaceResourceId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Monitor.DataCollection.Models.LogAnalyticsDestination" data-throw-if-not-resolved="False" />
