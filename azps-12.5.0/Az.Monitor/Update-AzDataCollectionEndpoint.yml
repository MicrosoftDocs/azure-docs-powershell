syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDataCollectionEndpoint
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IdentityType <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDataCollectionEndpoint
        -InputObject <IDataCollectionRuleIdentity>
        [-IdentityType <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
