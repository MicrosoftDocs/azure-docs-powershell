syntaxes:
- syntax: |-
    ```Syntax
    New-AzManagedServicesAssignment
        -Name <String>
        [-Scope <String>]
        [-RegistrationDefinitionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
