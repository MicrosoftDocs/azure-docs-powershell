        [-AuthorizationKey <String>]
        [-ExpressRouteId <String>]
        [-PeerExpressRouteResourceId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
