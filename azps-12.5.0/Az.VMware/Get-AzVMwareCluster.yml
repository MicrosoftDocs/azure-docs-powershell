    Name              Type                                 ResourceGroupName
    ----              ----                                 -----------------
    azps_test_cluster Microsoft.AVS/privateClouds/clusters azps_test_group
    ```

    List clusters under resource group
- title: 'Example 2: Get cluster by name in a private cloud'
