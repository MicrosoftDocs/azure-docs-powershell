syntaxes:
- syntax: |-
    ```Syntax
    Set-AzCommunicationServiceNotificationHub
        -CommunicationServiceName <String>
        -ResourceGroupName <String>
        -ConnectionString <String>
        -NotificationHubResourceId <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: LinkExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzCommunicationServiceNotificationHub
        -CommunicationServiceName <String>
        -ResourceGroupName <String>
        -LinkNotificationHubParameter <ILinkNotificationHubParameters>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Link
  isDefault: false
