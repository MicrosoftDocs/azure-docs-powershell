syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzConnectedNetworkVendorSkuPreview
        -PreviewSubscription <String>
        -SkuName <String>
        -VendorName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
