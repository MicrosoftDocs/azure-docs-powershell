syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzConnectedNetworkVendorFunctionRoleInstance
        -LocationName <String>
        -Name <String>
        -ServiceKey <String>
        -VendorName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Stop
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzConnectedNetworkVendorFunctionRoleInstance
        -InputObject <IConnectedNetworkIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopViaIdentity
  isDefault: false
