examples:
- title: 'Example 1: List the Datadog single sign-on resource for the given Monitor'
  description: |-
    ```powershell
    Get-AzDatadogSingleSignOnConfiguration -ResourceGroupName azure-rg-Datadog -MonitorName Datadog
    ```

    ```output
    Name    Type
    ----    ----
    default microsoft.Datadog/monitors/singlesignonconfigurations
    ```

    This command lists the Datadog single sign-on resource for the given Monitor.
- title: 'Example 2: Gets the Datadog single sign-on resource for the given Monitor'
  description: |-
    ```powershell
    Get-AzDatadogSingleSignOnConfiguration -ResourceGroupName azure-rg-Datadog -MonitorName Datadog -Name 'default'
    ```

    ```output
    Name    Type
    ----    ----
    default microsoft.Datadog/monitors/singlesignonconfigurations
    ```

    This command gets the Datadog single sign-on resource for the given Monitor.
- title: 'Example 3: Gets the Datadog single sign-on resource for the given Monitor by pipeline'
  description: |-
    ```powershell
    New-AzDatadogSingleSignOnConfiguration -ResourceGroupName azure-rg-Datadog -MonitorName Datadog -Name 'default' -SingleSignOnState Enable -EnterpriseAppId 00001111-aaaa-2222-bbbb-3333cccc4444 | Get-AzDatadogSingleSignOnConfiguration
    ```

    ```output
    Name    Type
    ----    ----
    default microsoft.Datadog/monitors/singlesignonconfigurations
    ```

    This command gets the Datadog single sign-on resource for the given Monitor by pipeline.
