syntaxes:
- syntax: |-
    ```Syntax
    New-AzDatadogMonitor
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        [-IdentityType <ManagedIdentityTypes>]
        [-MonitoringStatus <MonitoringStatus>]
        [-OrganizationApiKey <String>]
        [-OrganizationApplicationKey <String>]
        [-OrganizationEnterpriseAppId <String>]
        [-OrganizationLinkingAuthCode <String>]
        [-OrganizationLinkingClientId <String>]
        [-OrganizationRedirectUri <String>]
        [-SkuName <String>]
        [-Tag <Hashtable>]
        [-UserInfoEmailAddress <String>]
        [-UserInfoName <String>]
        [-UserInfoPhoneNumber <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
