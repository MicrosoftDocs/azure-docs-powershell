examples:
- title: Example 1
  description: |-
    ```powershell
    Set-AzServiceFabricUpgradeType -ResourceGroupName 'Group1' -Name 'Contoso01SFCluster'  -UpgradeMode Automatic
    ```

    This command will set the cluster upgrade mode to automatic.
