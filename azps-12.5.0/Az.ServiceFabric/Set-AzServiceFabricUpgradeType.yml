syntaxes:
- syntax: |-
    ```Syntax
    Set-AzServiceFabricUpgradeType
        [-ResourceGroupName] <String>
        [-Name] <String>
        -UpgradeMode <ClusterUpgradeMode>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Automatic
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzServiceFabricUpgradeType
        [-ResourceGroupName] <String>
        [-Name] <String>
        -UpgradeMode <ClusterUpgradeMode>
        -Version <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Manual
