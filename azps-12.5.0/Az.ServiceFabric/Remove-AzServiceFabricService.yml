syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzServiceFabricService
        [-ResourceGroupName] <String>
        [-ClusterName] <String>
        [-ApplicationName] <String>
        [-Name] <String>
        [-PassThru]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceGroup
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzServiceFabricService
        -ResourceId <String>
        [-PassThru]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceId
  isDefault: false
- syntax: |-
