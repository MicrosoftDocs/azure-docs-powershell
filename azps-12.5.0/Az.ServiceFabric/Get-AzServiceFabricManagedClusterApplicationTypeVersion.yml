- syntax: |-
    ```Syntax
    Get-AzServiceFabricManagedClusterApplicationTypeVersion
        [-ResourceGroupName] <String>
        [-ClusterName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceGroupAndCluster
