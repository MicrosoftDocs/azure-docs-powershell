uid: Az.ServiceFabric.Remove-AzServiceFabricManagedNodeTypeVMExtension
name: Remove-AzServiceFabricManagedNodeTypeVMExtension
module: Az.ServiceFabric
isPreview: false
summary: |-
  Remove vm extension from the node type.
description: |-
  Remove vm extension from the node type by name. Use [Get-AzServiceFabricManagedNodeType](./Get-AzServiceFabricManagedNodeType.yml) and look at the VmExtensions property to see the current extension on the node type.
