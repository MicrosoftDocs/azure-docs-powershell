examples:
- title: Example 1
  description: |-
    ```powershell
    $rgName = "testRG"
    $clusterName = "testCluster"
    $NodeTypeName = "nt1"
    Remove-AzServiceFabricManagedNodeTypeVMExtension -ResourceGroupName $rgName -ClusterName $clusterName -NodeTypeName $NodeTypeName -Name MyExtensionName
    ```

    Remove extension from node type by name.
- title: Example 2
  description: |-
    ```powershell
    $rgName = "testRG"
    $clusterName = "testCluster"
    $NodeTypeName = "nt1"
    $nodeType = Get-AzServiceFabricManagedNodeType -ResourceGroupName $rgName -ClusterName $clusterName -Name $NodeTypeName

    $nodeType | Remove-AzServiceFabricManagedNodeTypeVMExtension -Name MyExtensionName
    ```

    Remove extension from node type by name, with piping.
