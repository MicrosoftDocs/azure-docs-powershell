syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzServiceFabricManagedNodeTypeVMExtension
        [-InputObject] <PSManagedNodeType>
        -Name <String>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByObj
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzServiceFabricManagedNodeTypeVMExtension
        [-ResourceGroupName] <String>
        [-ClusterName] <String>
        [-NodeTypeName] <String>
        -Name <String>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
