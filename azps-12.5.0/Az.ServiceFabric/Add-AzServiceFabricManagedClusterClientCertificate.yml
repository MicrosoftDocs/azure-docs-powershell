syntaxes:
- syntax: |-
    ```Syntax
    Add-AzServiceFabricManagedClusterClientCertificate
        [-InputObject] <PSManagedCluster>
        -Thumbprint <String>
        [-Admin]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClientCertByTpByObj
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzServiceFabricManagedClusterClientCertificate
        [-ResourceGroupName] <String>
        [-Name] <String>
        -Thumbprint <String>
        [-Admin]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClientCertByTpByName
  isDefault: false
- syntax: |-
    ```Syntax
    Add-AzServiceFabricManagedClusterClientCertificate
        [-ResourceGroupName] <String>
        [-Name] <String>
        -CommonName <String>
        [-Admin]
        [-IssuerThumbprint <String[]>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClientCertByCnByName
  isDefault: false
- syntax: |-
