syntaxes:
- syntax: |-
    ```Syntax
    Get-AzNotificationHubsNamespaceAuthorizationRule
        [-ResourceGroup] <String>
        [-Namespace] <String>
        [[-AuthorizationRule] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.NotificationHubs.Models.SharedAccessAuthorizationRuleAttributes" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get information about all authorization rules assigned to namespaces'
  description: |-
    ```powershell
    Get-AzNotificationHubsNamespaceAuthorizationRule -Namespace "ContosoNamespace" -ResourceGroup "ContosoNotificationsGroup"
    ```

    This command gets information about all the authorization rules assigned to both the namespace ContosoNamespace and the ContosoNotificationsGroup resource group.
- title: 'Example 2: Get information about an authorization rule'
  description: |-
    ```powershell
    Get-AzNotificationHubsNamespaceAuthorizationRule -Namespace "ContosoNamespace" -ResourceGroup "ContosoNotificationsGroup" -AuthorizationRule "ListenRule"
    ```

    This command gets information about a single namespace authorization rule named ListenRule.
    You must include the namespace and the resource group when you get information for a specific authorization rule.
