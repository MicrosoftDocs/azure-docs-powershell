### YamlMime:PowerShellCmdlet1
uid: Az.RecoveryServices.Get-AzRecoveryServicesBackupContainer
name: Get-AzRecoveryServicesBackupContainer
module: Az.RecoveryServices
isPreview: false
summary: |-
  Gets Backup containers.
description: |-
  The **Get-AzRecoveryServicesBackupContainer** cmdlet gets a backup container. A Backup container encapsulates data sources that are modelled as backup items.
  For Container type "Azure VM" , the output lists all the containers whose name exactly matches to the one passed  as the value for Friendly Name parameter.
  For other container types,  output gives a list of containers with name similar to the value passed for Friendly name parameter.
  Set the vault context by using the -VaultId parameter.
parameters:
  cmdletParameters:
  - name: BackupManagementType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The class of resources being protected. The acceptable values for this parameter are:

      - AzureVM
      - MAB
      - AzureWorkload
      - AzureStorage

      This parameter is used to differentiate Windows machines that are backed up using MARS agent or other backup engines.
    acceptedValues:
    - AzureVM
    - AzureStorage
    - AzureWorkload
    - MAB
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ContainerType
    type: <xref href="Microsoft.Azure.Commands.RecoveryServices.Backup.Cmdlets.Models.ContainerType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the backup container type.
      The acceptable values for this parameter are:

      - AzureVM
      - Windows
      - AzureStorage
      - AzureVMAppContainer
    acceptedValues:
    - AzureVM
    - Windows
    - AzureStorage
    - AzureVMAppContainer
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FriendlyName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the friendly name of the container to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the resource group.
      This parameter is for Azure virtual machines only.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VaultId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      ARM ID of the Recovery Services Vault.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
