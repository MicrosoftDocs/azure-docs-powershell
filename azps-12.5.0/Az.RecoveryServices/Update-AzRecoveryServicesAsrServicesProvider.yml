    ```Syntax
    Update-AzRecoveryServicesAsrServicesProvider
        -InputObject <ASRRecoveryServicesProvider>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
