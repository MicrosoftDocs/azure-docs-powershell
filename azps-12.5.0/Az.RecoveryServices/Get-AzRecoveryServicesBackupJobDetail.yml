syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesBackupJobDetail
        [-Job] <JobBase>
        [-UseSecondaryRegion]
        [-VaultLocation <String>]
        [-VaultId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: JobFilterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesBackupJobDetail
        [-JobId] <String>
        [-UseSecondaryRegion]
        [-VaultLocation <String>]
        [-VaultId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: IdFilterSet
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.Backup.Cmdlets.Models.JobBase" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get Backup job details for failed jobs'
  description: |-
    ```powershell
    $vault = Get-AzRecoveryServicesVault -ResourceGroupName "resourceGroup" -Name "vaultName"
    $Jobs = Get-AzRecoveryServicesBackupJob -Status Failed -VaultId $vault.ID
    $JobDetails = Get-AzRecoveryServicesBackupJobDetail -Job $Jobs[0] -VaultId $vault.ID
    $JobDetails.ErrorDetails
    ```

    The first command fetches the relevant vault. The second command gets an array of failed jobs in the vault, and then stores them in the $Jobs array.
    The third command gets the job details for the 1st failed job in $Jobs, and then stores them in the $JobDetails variable.
    The final command displays error details for the failed jobs.
