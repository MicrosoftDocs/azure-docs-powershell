syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzRecoveryServicesAsrReplicationProtectedItemDisk
        -InputObject <ASRReplicationProtectedItem>
        -VhdUri <String[]>
        [-WaitForCompletion]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AzureToAzure
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzRecoveryServicesAsrReplicationProtectedItemDisk
        -InputObject <ASRReplicationProtectedItem>
        -DiskId <String[]>
        [-WaitForCompletion]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
