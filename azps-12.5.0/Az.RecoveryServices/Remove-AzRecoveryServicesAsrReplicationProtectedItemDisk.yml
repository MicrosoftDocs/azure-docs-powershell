uid: Az.RecoveryServices.Remove-AzRecoveryServicesAsrReplicationProtectedItemDisk
name: Remove-AzRecoveryServicesAsrReplicationProtectedItemDisk
module: Az.RecoveryServices
isPreview: false
summary: |-
  Removes disks to replication protected item.
description: |-
  The **Remove-AzRecoveryServicesAsrReplicationProtectedItemDisk** cmdlet removes the disk from the ASR replication protected item.
