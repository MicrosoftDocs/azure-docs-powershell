syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzRecoveryServicesBackupJob
        [-Job] <JobBase>
        [-VaultId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: JobFilterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzRecoveryServicesBackupJob
        [-JobId] <String>
        [-VaultId <String>]
