syntaxes:
- syntax: |-
    ```Syntax
    New-AzRecoveryServicesAsrvCenter
        -Fabric <ASRFabric>
        -Name <String>
        -Account <ASRRunAsAccount>
        -Port <Int32>
        -IpOrHostName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
