syntaxes:
- syntax: |-
    ```Syntax
    Set-AzRecoveryServicesResourceGuardMapping
        [-VaultId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        -ResourceGuardId <String>
        [-Token <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
