### YamlMime:PowerShellCmdlet1
uid: Az.RecoveryServices.Get-AzRecoveryServicesVaultProperty
name: Get-AzRecoveryServicesVaultProperty
module: Az.RecoveryServices
isPreview: false
summary: |-
  Returns the properties of a Recovery Services Vault.
description: |-
  The **Get-AzRecoveryServicesVaultProperty** cmdlet returns the properties of a Recovery services vault.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VaultId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      ARM ID of the Recovery Services Vault.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesVaultProperty
        [-VaultId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Management.RecoveryServices.Backup.Models.BackupResourceVaultConfigResource" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get Properties of a vault'
  description: |-
    ```powershell
    $vault = Get-AzRecoveryServicesVault -ResourceGroupName "resourceGroup" -Name "vaultName"
    $vaultProperty = Get-AzRecoveryServicesVaultProperty -VaultId $vault.Id
    $vaultProperty.encryptionProperties
    ```

    The first command gets a Vault object and then stores it in the $vault variable.
    The second command Gets the Vault Properties. Next we access the encryptionProperties of the vault.
