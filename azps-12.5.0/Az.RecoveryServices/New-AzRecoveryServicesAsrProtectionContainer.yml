syntaxes:
- syntax: |-
    ```Syntax
    New-AzRecoveryServicesAsrProtectionContainer
        -Name <String>
        -InputObject <ASRFabric>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
