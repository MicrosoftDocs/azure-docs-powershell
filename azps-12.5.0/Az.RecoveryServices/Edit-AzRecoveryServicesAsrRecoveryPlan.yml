examples:
- title: Example 1
  description: |-
    ```powershell
    $RP = Edit-AzRecoveryServicesAsrRecoveryPlan -RecoveryPlan $RP -AppendGroup
    ```

    Appends a group to existing Azure Site Recovery plan and returns the in-memory updated recovery plan.
