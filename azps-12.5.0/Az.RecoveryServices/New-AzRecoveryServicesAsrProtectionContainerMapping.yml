      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Policy
    type: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRPolicy" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ASR replication policy object for the replication policy to be used in the mapping.
