syntaxes:
- syntax: |-
    ```Syntax
    New-AzRecoveryServicesAsrProtectionContainerMapping
        -Name <String>
        -Policy <ASRPolicy>
        -PrimaryProtectionContainer <ASRProtectionContainer>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnterpriseToAzure
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzRecoveryServicesAsrProtectionContainerMapping
        -Name <String>
        -Policy <ASRPolicy>
        -PrimaryProtectionContainer <ASRProtectionContainer>
        -RecoveryProtectionContainer <ASRProtectionContainer>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnterpriseToEnterprise
  isDefault: false
