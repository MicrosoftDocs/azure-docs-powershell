- syntax: |-
    ```Syntax
    Resume-AzRecoveryServicesAsrJob
        -InputObject <ASRJob>
        [-Comment <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
