syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrRecoveryPlan
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrRecoveryPlan
        [[-Path] <String>]
        -Name <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
- syntax: |-
