syntaxes:
- syntax: |-
    ```Syntax
    Register-AzRecoveryServicesBackupContainer
        [-ResourceId] <String>
        [-BackupManagementType] <BackupManagementType>
        [-WorkloadType] <WorkloadType>
        [-Force]
        [-VaultId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Register
  isDefault: true
- syntax: |-
    ```Syntax
    Register-AzRecoveryServicesBackupContainer
        [-Container] <ContainerBase>
        [-BackupManagementType] <BackupManagementType>
        [-WorkloadType] <WorkloadType>
        [-Force]
        [-VaultId <String>]
