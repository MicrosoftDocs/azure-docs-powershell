examples:
- title: 'Example 1: Remove a SQL Server extension'
  description: |-
    ```powershell
    Remove-AzVMSqlServerExtension -ResourceGroupName "ResourceGroup11" -VMName "ContosoVM22" -Name "SqlIaaSAgent"
    ```

