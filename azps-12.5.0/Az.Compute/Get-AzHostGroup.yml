    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzHostGroup
        [[-ResourceGroupName] <String>]
        [[-Name] <String>]
        [-InstanceView]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultParameter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzHostGroup
        [-ResourceId] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceIdParameter
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Automation.Models.PSHostGroup" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzHostGroup -ResourceGroupName $resourceGroupName -HostGroupName $hostGroupName
    ```

    ```output
    ResourceGroupName        : myrg01
    PlatformFaultDomainCount : 2
    Hosts                    : {/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myrg01/providers/Microsoft.Compute/hostGroups/myhostgroup01/hosts/myhost01}
    Zones                    : {1}
    Id                       : /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myrg01/providers/Microsoft.Compute/hostGroups/myhostgroup01
    Name                     : myhostgroup01
    Location                 : eastus
    Tags                     : {[key1, val1]}
    ```

    This command returns a host group.
- title: Example 2
  description: |-
    ```powershell
    Get-AzHostGroup -ResourceGroupName $resourceGroupName
    ```

    ```output
    ResourceGroupName                   Name Location           Tags FDCount
    -----------------                   ---- --------           ---- -------
    myrg01                     myhostgroup01   eastus {[key1, val1]}       1
    myrg01                     myhostgroup02   eastus {[key1, val1]}       2
    ```

    This command returns all host groups in the given resource group.
- title: Example 3
  description: |-
    ```powershell
    Get-AzHostGroup
    ```

    ```output
    ResourceGroupName                   Name Location           Tags FDCount
    -----------------                   ---- --------           ---- -------
    myrg01                     myhostgroup01   eastus {[key1, val1]}       1
    myrg01                     myhostgroup02   eastus {[key1, val1]}       2
    myrg02                     myhostgroup03   eastus {[key1, val1]}       2
    ```

    This command returns all host groups in the subscription.
