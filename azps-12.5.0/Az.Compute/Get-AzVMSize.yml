uid: Az.Compute.Get-AzVMSize
name: Get-AzVMSize
module: Az.Compute
isPreview: false
summary: |-
  Gets available virtual machine sizes.
description: |-
  The **Get-AzVMSize** cmdlet gets available virtual machine sizes.
