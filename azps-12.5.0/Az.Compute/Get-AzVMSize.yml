syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVMSize
        [-Location] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListVirtualMachineSizeParamSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzVMSize
        [-ResourceGroupName] <String>
        [-AvailabilitySetName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListAvailableSizesForAvailabilitySet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzVMSize
        [-ResourceGroupName] <String>
        [-VMName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListAvailableSizesForVirtualMachine
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Models.PSVirtualMachineSize" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get virtual machine sizes for a location'
  description: |-
    ```powershell
    Get-AzVMSize -Location "Central US"
    ```

    This command gets the available sizes for virtual machines in the specified location.
- title: 'Example 2: Get sizes for an availability set'
  description: |-
    ```powershell
    Get-AzVMSize -ResourceGroupName "ResourceGroup03" -AvailabilitySetName "AvailabilitySet17"
    ```

    This command gets available sizes for virtual machines that you can deploy in the availability set named AvailabilitySet17.
- title: 'Example 3: Get sizes for an existing virtual machine'
  description: |-
    ```powershell
    Get-AzVMSize -ResourceGroupName "ResourceGroup03" -VMName "VirtualMachine12"
    ```

    This command gets available sizes for the existing virtual machine named VirtualMachine12.
    You can resize this virtual machine to the sizes that this command gets.
