syntaxes:
- syntax: |-
    ```Syntax
    Add-AzVhd
        [-ResourceGroupName] <String>
        [-Destination] <Uri>
        [-LocalFilePath] <FileInfo>
        [[-NumberOfUploaderThreads] <Int32>]
        [[-BaseImageUriToPatch] <Uri>]
        [-OverWrite]
        [-SkipResizing]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: DefaultParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzVhd
        [-ResourceGroupName] <String>
        [-LocalFilePath] <FileInfo>
        [-Location] <String>
        [[-NumberOfUploaderThreads] <Int32>]
        -DiskName <String>
        [-DiskSku <String>]
        [-DiskZone <String[]>]
        [-DiskHyperVGeneration <String>]
        [-DiskOsType <OperatingSystemTypes>]
        [-DataAccessAuthMode <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: DirectUploadToManagedDiskSet
  isDefault: false
