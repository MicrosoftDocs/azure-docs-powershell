### YamlMime:PowerShellCmdlet1
uid: Az.Compute.Get-AzVMImage
name: Get-AzVMImage
module: Az.Compute
isPreview: false
summary: |-
  Gets all the versions of a VMImage.
description: |-
  The **Get-AzVMImage** cmdlet gets all the versions of a VMImage.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EdgeZone
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Set the extended location name for EdgeZone. If not set, VM Image will be queried from Azure main region. Otherwise it will be queried from the specified extended location
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the location of a VMImage.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Offer
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of VMImage offer.
      To obtain an image offer, use the Get-AzVMImageOffer cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OrderBy
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the order of the results returned. Formatted as an OData query.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListVMImage
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PublisherName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the publisher of a VMImage.
      To obtain an image publisher, use the Get-AzVMImagePublisher cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Skus
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a VMImage SKU.
      To obtain an SKU, use the Get-AzVMImageSku cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Top
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the maximum number of virtual machine images returned.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListVMImage
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Version
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the version of the VMImage.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetVMImageDetail
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: true
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVMImage
        -Location <String>
        -PublisherName <String>
        -Offer <String>
        -Skus <String>
        [-EdgeZone <String>]
        [-Top <Int32>]
        [-OrderBy <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListVMImage
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzVMImage
        -Location <String>
        -PublisherName <String>
        -Offer <String>
        -Skus <String>
        -Version <String>
        [-EdgeZone <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetVMImageDetail
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Models.PSVirtualMachineImage" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Compute.Models.PSVirtualMachineImageDetail" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get VMImage objects'
  description: |-
    ```powershell
    Get-AzVMImage -Location "Central US" -PublisherName "MicrosoftWindowsServer" -Offer "windowsserver" -Skus "2012-R2-Datacenter"
    ```

    ```output
    Version        Skus               Offer         PublisherName          Location  Id
    -------        ----               -----         -------------          --------  --
    4.127.20180315 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20180510 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20180815 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20180912 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20181010 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20181125 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20190104 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20190115 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20190204 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20190218 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    ```

    This command gets all the versions of VMImage that match the specified values.
- title: 'Example 2: Get VMImage object'
  description: |-
    ```powershell
    Get-AzVMImage -Location "Central US" -PublisherName "MicrosoftWindowsServer" -Offer "windowsserver" -Skus "2012-R2-Datacenter" -Version 4.127.20180315
    ```

    ```output
    Id               : /Subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/Providers/Microsoft.Compute/Locations/centralus/
                       Publishers/MicrosoftWindowsServer/ArtifactTypes/VMImage/Offers/windowsserver/Skus/2012-R2-Datacenter
                       /Versions/4.127.20180315
    Location         : centralus
    PublisherName    : MicrosoftWindowsServer
    Offer            : windowsserver
    Skus             : 2012-R2-Datacenter
    Version          : 4.127.20180315
    Name             : 4.127.20180315
    OSDiskImage      : {
                         "operatingSystem": "Windows"
                       }
    PurchasePlan     : null
    DataDiskImages   : []
    ```

    This command gets a specific version of VMImage that matches the specified values.
- title: 'Example 3: Get VMImage objects'
  description: |-
    ```powershell
    Get-AzVMImage -Location "Central US" -PublisherName "MicrosoftWindowsServer" -Offer "windowsserver" -Skus "2012-R2-Datacenter" -Version 4.127.2018*
    ```

    ```output
    Version        Skus               Offer         PublisherName          Location  Id
    -------        ----               -----         -------------          --------  --
    4.127.20180315 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20180510 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20180815 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20180912 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20181010 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    4.127.20181125 2012-R2-Datacenter windowsserver MicrosoftWindowsServer centralus /Subscriptions/9e2...
    ```

    This command gets all the versions of VMImage that match the specified values with filtering over version.
