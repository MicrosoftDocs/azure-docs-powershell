syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVmssVMRunCommand
        -ResourceGroupName <String>
        -VMScaleSetName <String>
        -InstanceId <String>
        [-RunCommandName <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
