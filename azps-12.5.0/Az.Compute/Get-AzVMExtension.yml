    ```Syntax
    Get-AzVMExtension
        [-ResourceGroupName] <String>
        [-VMName] <String>
        [[-Name] <String>]
        [-Status]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
