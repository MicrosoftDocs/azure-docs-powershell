    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an extension.
      This cmdlet gets properties for the extension that this parameter specifies.
    aliases:
    - ExtensionName
