syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVMRunCommand
        -ResourceGroupName <String>
        -VMName <String>
        [-RunCommandName <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
