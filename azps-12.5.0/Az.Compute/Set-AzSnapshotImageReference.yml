syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSnapshotImageReference
        [-Snapshot] <PSSnapshot>
        [[-Id] <String>]
        [[-Lun] <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
