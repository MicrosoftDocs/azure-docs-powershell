syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSentinelEntityTimeline
        -EntityId <String>
        -ResourceGroupName <String>
        -WorkspaceName <String>
        [-SubscriptionId <String[]>]
        -EndTime <DateTime>
        -StartTime <DateTime>
        [-Kind <EntityTimelineKind[]>]
        [-NumberOfBucket <Int32>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
