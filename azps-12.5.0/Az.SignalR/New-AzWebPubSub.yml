- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.WebPubSub.Models.Api20220801Preview.IWebPubSubResource" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a Web PubSub resource with minimal required parameters.'
  description: |-
    ```powershell
    New-AzWebPubSub -ResourceGroupName psdemo -Name psdemo-wps -Location eastus -SkuName Standard_S1
    ```

    ```output
    Name                Location      SkuName
    ----                --------      -------
    psdemo-wps          eastus        Standard_S1
    ```
- title: 'Example 2: Create a Web PubSub resource with more parameters and show the result'
  description: |-
    ```powershell
    $wps = New-AzWebPubSub -ResourceGroupName psdemo -Name psdemo-wps `
    -Location eastus -SkuName Standard_S1 -IdentityType SystemAssigned -LiveTraceEnabled true `
    -LiveTraceCategory @{ Name='ConnectivityLogs' ; Enabled = 'true' }, @{ Name='MessageLogs' ; Enabled = 'true' }
    ```

    ```output
    Name                Location      SkuName
    ----                --------      -------
    psdemo-wps          eastus        Standard_S1
    ```
