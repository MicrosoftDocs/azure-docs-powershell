syntaxes:
- syntax: |-
    ```Syntax
    New-AzWebPubSubHub
        -Name <String>
        -ResourceGroupName <String>
        -ResourceName <String>
        [-SubscriptionId <String>]
        [-AnonymousConnectPolicy <String>]
        [-EventHandler <IEventHandler[]>]
        [-EventListener <IEventListener[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
