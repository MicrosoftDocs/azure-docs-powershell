examples:
- title: 'Example 1: Get access keys of a specific SignalR service'
  description: |-
    ```powershell
    Get-AzSignalRKey -ResourceGroupName myResourceGroup -Name mysignalr1
    ```

    ```output
    Name                      : mysignalr1
    PrimaryKey                : v******Ds=
    PrimaryConnectionString   : Endpoint=https://mysignalr1.service.signalr.net;AccessKey=vmYRhoM62PMkNe/CSSPdMSxokn+WZEFmO
                                QNt77PovDs=;
    SecondaryKey              : 2******FQ=
    SecondaryConnectionString : Endpoint=https://mysignalr1.service.signalr.net;AccessKey=2+HkuxAA34xiZFFiDsVM0uDyzCsg6GKsd
                                XSjN4C/YFQ=;
    ```
- title: 'Example 2: Get access keys from a SignalR service object in pipe'
  description: |-
    ```powershell
    Get-AzSignalR -ResourceGroupName myResourceGroup -Name mysignalr1 | Get-AzSignalRKey
    ```

    ```output
    Name                      : mysignalr1
    PrimaryKey                : v******Ds=
    PrimaryConnectionString   : Endpoint=https://mysignalr1.service.signalr.net;AccessKey=vmYRhoM62PMkNe/CSSPdMSxokn+WZEFmO
                                QNt77PovDs=;
    SecondaryKey              : 2******FQ=
    SecondaryConnectionString : Endpoint=https://mysignalr1.service.signalr.net;AccessKey=2+HkuxAA34xiZFFiDsVM0uDyzCsg6GKsd
                                XSjN4C/YFQ=;
    ```
