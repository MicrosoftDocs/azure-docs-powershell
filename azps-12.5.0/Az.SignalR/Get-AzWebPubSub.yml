examples:
- title: 'Example 1: List all Web PubSub resources in a subscription'
  description: |-
    ```powershell
    Get-AzWebPubSub -SubscriptionId aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e
    ```

    ```output
    Name                Location      SkuName
    ----                --------      -------
    demo1               eastus        Standard_S1
    demo2               eastus        Free_F1
    ```
- title: 'Example 2: List all Web PubSub resources in a resource group'
  description: |-
    ```powershell
    Get-AzWebPubSub -ResourceGroupName psdemo
    ```

    ```output
    Name       Location SkuName
    ----       -------- -------
    psdemo-wps eastus   Standard_S1
    ```
- title: 'Example 3: Get a specific Web PubSub resource'
  description: |-
    ```powershell
    Get-AzWebPubSub -ResourceGroupName psdemo -Name psdemo-wps
    ```

    ```output
    Name       Location SkuName
    ----       -------- -------
    psdemo-wps eastus   Standard_S1
    ```
- title: 'Example 4: Get a specific Web PubSub resource via identity object'
  description: |-
    ```powershell
    $identity = @{ ResourceGroupName = 'psdemo'
    ResourceName = 'psdemo-wps'
    SubscriptionId = $(Get-AzContext).Subscription.Id }

    $identity | Get-AzWebPubSub
    ```

    ```output
    Name       Location SkuName
    ----       -------- -------
    psdemo-wps eastus   Standard_S1
    ```
