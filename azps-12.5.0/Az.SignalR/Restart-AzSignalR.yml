    Restart-AzSignalR
        -ResourceId <String>
        [-AsJob]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceIdParameterSet
  isDefault: false
