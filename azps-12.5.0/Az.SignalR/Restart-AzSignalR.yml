syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzSignalR
        [-Name] <String>
        [-ResourceGroupName <String>]
        [-AsJob]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceGroupParameterSet
  isDefault: true
- syntax: |-
