syntaxes:
- syntax: |-
    ```Syntax
    Start-AzPolicyComplianceScan
        [-ResourceGroupName <String>]
        [-AsJob]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
