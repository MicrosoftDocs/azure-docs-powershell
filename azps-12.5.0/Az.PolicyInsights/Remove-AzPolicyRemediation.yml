    ```Syntax
    Remove-AzPolicyRemediation
        -Name <String>
        [-Scope <String>]
        [-ManagementGroupName <String>]
        [-ResourceGroupName <String>]
        [-AllowStop]
        [-AsJob]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
