### YamlMime:PowerShellCmdlet1
uid: Az.PolicyInsights.Get-AzPolicyAttestation
name: Get-AzPolicyAttestation
module: Az.PolicyInsights
isPreview: false
summary: |-
  Gets policy attestations.
description: |-
  The **Get-AzPolicyAttestation** cmdlet gets all policy attestations in a scope or a particular attestation.
