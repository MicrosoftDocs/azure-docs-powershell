syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageMoverProject
        -Name <String>
        -ResourceGroupName <String>
        -StorageMoverName <String>
        [-SubscriptionId <String>]
        [-Description <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
