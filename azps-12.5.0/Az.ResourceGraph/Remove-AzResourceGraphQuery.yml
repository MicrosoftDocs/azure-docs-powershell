examples:
- title: 'Example 1: Remove a resource graph query by name'
  description: |-
    ```powershell
    Remove-AzResourceGraphQuery -ResourceGroupName azure-rg-test -Name query-t03
    ```

    This command removes a resource graph query by name.
- title: 'Example 2: Remove a resource graph query by object'
