syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudStorageAppliance
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-SerialNumber <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudStorageAppliance
        -InputObject <INetworkCloudIdentity>
        [-SerialNumber <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
