syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetworkCloudRackDefinitionObject
        -NetworkRackId <String>
        -RackSerialNumber <String>
        -RackSkuId <String>
        [-AvailabilityZone <String>]
        [-BareMetalMachineConfigurationData <IBareMetalMachineConfigurationData[]>]
        [-RackLocation <String>]
