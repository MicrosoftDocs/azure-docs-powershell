uid: Az.NetworkCloud.New-AzNetworkCloudRackDefinitionObject
name: New-AzNetworkCloudRackDefinitionObject
module: Az.NetworkCloud
isPreview: false
summary: |-
  Create an in-memory object for RackDefinition.
description: |-
  Create an in-memory object for RackDefinition.
