syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudServicesNetwork
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AdditionalEgressEndpoint <IEgressEndpoint[]>]
        [-EnableDefaultEgressEndpoint <CloudServicesNetworkEnableDefaultEgressEndpoints>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudServicesNetwork
        -InputObject <INetworkCloudIdentity>
        [-AdditionalEgressEndpoint <IEgressEndpoint[]>]
        [-EnableDefaultEgressEndpoint <CloudServicesNetworkEnableDefaultEgressEndpoints>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
