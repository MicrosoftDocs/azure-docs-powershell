uid: Az.NetworkCloud.Update-AzNetworkCloudServicesNetwork
name: Update-AzNetworkCloudServicesNetwork
module: Az.NetworkCloud
isPreview: false
summary: |-
  Update properties of the provided cloud services network, or update the tags associated with it.
  Properties and tag updates can be done independently.
