    Update-AzNetworkCloudClusterManager
        -InputObject <INetworkCloudIdentity>
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
