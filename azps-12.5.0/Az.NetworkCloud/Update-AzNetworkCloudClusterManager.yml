syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudClusterManager
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
