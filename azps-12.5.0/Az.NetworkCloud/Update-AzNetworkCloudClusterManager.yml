uid: Az.NetworkCloud.Update-AzNetworkCloudClusterManager
name: Update-AzNetworkCloudClusterManager
module: Az.NetworkCloud
isPreview: false
summary: |-
  Patch properties of the provided cluster manager, or update the tags assigned to the cluster manager.
  Properties and tag updates can be done independently.
