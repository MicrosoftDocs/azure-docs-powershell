examples:
- title: 'Example 1: Update cluster manager'
  description: |-
    ```powershell
    $tagUpdatedHash = @{
        tag1 = "tag1"
        tag2 = "tag1Update"
    }

    Update-AzNetworkCloudClusterManager -ResourceGroupName resourceGroupName -SubscriptionId subscriptionId -Name clusterManagerName -Tag $tagUpdatedHash
    ```

