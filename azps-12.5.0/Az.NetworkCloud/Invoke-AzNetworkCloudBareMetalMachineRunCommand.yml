syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzNetworkCloudBareMetalMachineRunCommand
        -BareMetalMachineName <String>
        -ResourceGroupName <String>
        -LimitTimeSecond <Int64>
        -Script <String>
        [-SubscriptionId <String>]
        [-Argument <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RunExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzNetworkCloudBareMetalMachineRunCommand
        -InputObject <INetworkCloudIdentity>
        -LimitTimeSecond <Int64>
        -Script <String>
        [-Argument <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
