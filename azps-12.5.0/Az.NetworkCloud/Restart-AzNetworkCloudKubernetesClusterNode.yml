syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzNetworkCloudKubernetesClusterNode
        -KubernetesClusterName <String>
        -ResourceGroupName <String>
        -NodeName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RestartExpanded
  isDefault: true
- syntax: |-
