uid: Az.NetworkCloud.Update-AzNetworkCloudBareMetalMachine
name: Update-AzNetworkCloudBareMetalMachine
module: Az.NetworkCloud
isPreview: false
summary: |-
  Patch properties of the provided bare metal machine, or update tags associated with the bare metal machine.
  Properties and tag updates can be done independently.
