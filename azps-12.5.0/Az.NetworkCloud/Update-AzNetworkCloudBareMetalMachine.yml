syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudBareMetalMachine
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-MachineDetail <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
