uid: Az.NetworkCloud.Update-AzNetworkCloudVirtualMachine
name: Update-AzNetworkCloudVirtualMachine
module: Az.NetworkCloud
isPreview: false
summary: |-
  Patch the properties of the provided virtual machine, or update the tags associated with the virtual machine.
  Properties and tag updates can be done independently.
