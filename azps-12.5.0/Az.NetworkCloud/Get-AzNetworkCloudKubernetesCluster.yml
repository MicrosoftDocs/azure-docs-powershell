- title: 'Example 2: Get Kubernetes cluster'
  description: |-
    ```powershell
    Get-AzNetworkCloudKubernetesCluster -KubernetesClusterName kubernetesClusterName -SubscriptionId subscriptionId -ResourceGroupName resourceGroupName
    ```

    ```output
