### YamlMime:PowerShellCmdlet1
uid: Az.Batch.Get-AzBatchSupportedImage
name: Get-AzBatchSupportedImage
module: Az.Batch
isPreview: false
summary: |-
  Gets Batch supported images for a Batch account.
description: |-
  The **Get-AzBatchSupportedImage** cmdlet gets supported virtual machine images that are available in an Azure Batch account.
  Specify the account by using the *BatchContext* parameter.
parameters:
  cmdletParameters:
  - name: BatchContext
    type: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
    description: |-
      The BatchAccountContext instance to use when interacting with the Batch service.
      If you use the Get-AzBatchAccount cmdlet to get your BatchAccountContext, then Microsoft Entra authentication will be used when interacting with the Batch service.
      To use shared key authentication instead, use the Get-AzBatchAccountKey cmdlet to get a BatchAccountContext object with its access keys populated.
      When using shared key authentication, the primary access key is used by default.
      To change the key to use, set the BatchAccountContext.KeyInUse property.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an OData filter clause for supported images.
      If you do not specify a filter, this cmdlet returns all images the Batch account supports.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxCount
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of supported images to return.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBatchSupportedImage
        [-Filter <String>]
        [-MaxCount <Int32>]
        -BatchContext <BatchAccountContext>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.Models.PSImageInformation" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all available supported images'
  description: |-
    ```powershell
    $Context = Get-AzBatchAccountKey -AccountName "ContosoBatchAccount"
    Get-AzBatchSupportedImage -BatchContext $Context
    ```

    ```output
    BatchSupportEndOfLife :
    Capabilities          :
    ImageReference        : canonical:ubuntuserver:16.04-lts:latest
    NodeAgentSkuId        : batch.node.ubuntu 16.04
    OSType                : Linux
    VerificationType      : Verified

    BatchSupportEndOfLife :
    Capabilities          :
    ImageReference        : canonical:ubuntuserver:18.04-lts:latest
    NodeAgentSkuId        : batch.node.ubuntu 18.04
    OSType                : Linux
    VerificationType      : Verified

    BatchSupportEndOfLife :
    Capabilities          :
    ImageReference        : credativ:debian:8:latest
    NodeAgentSkuId        : batch.node.debian 8
    OSType                : Linux
    VerificationType      : Verified

    BatchSupportEndOfLife :
    Capabilities          :
    ImageReference        : microsoftwindowsserver:windowsserver:2016-datacenter:latest
    NodeAgentSkuId        : batch.node.windows amd64
    OSType                : Windows
    VerificationType      : Verified

    ...
    ```

    The first command gets a Batch account context that contains access keys for your subscription by using **Get-AzBatchAccountKey**.
    The command stores the context in the $Context variable to use in the next command.
    The second command gets all available supported images for that Batch account.
