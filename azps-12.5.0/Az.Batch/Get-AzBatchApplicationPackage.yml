    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBatchApplicationPackage
        [-AccountName] <String>
        [-ResourceGroupName] <String>
        [-ApplicationName] <String>
        [[-ApplicationVersion] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.Models.PSApplicationPackage" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get details of an application package in a Batch account'
  description: |-
    ```powershell
    Get-AzBatchApplicationPackage -AccountName "ContosoBatch" -ResourceGroupName "ContosoBatchGroup" -ApplicationName "Litware" -ApplicationVersion "1.0"
    ```

    ```output
    Format             : zip
    State              : Active
    Version            : 1.0
    LastActivationTime : 13/05/2016 4:03:24 AM
    StorageUrl         : https://contosobatch.blob.core.windows.net/app-test
    StorageUrlExpiry   : 13/05/2016 8:04:44 AM
    Id                 : litware
    ```

    This command gets the details of version 1.0 of the Litware package.
