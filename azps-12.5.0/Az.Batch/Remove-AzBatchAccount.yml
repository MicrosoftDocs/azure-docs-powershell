syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzBatchAccount
        [-AccountName] <String>
        [[-ResourceGroupName] <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
