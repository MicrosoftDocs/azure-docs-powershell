### YamlMime:PowerShellCmdlet1
uid: Az.Batch.New-AzBatchAccountKey
name: New-AzBatchAccountKey
module: Az.Batch
isPreview: false
summary: |-
  Regenerates a key of a Batch account.
description: |-
  The **New-AzBatchAccountKey** cmdlet regenerates the primary or secondary key of an Azure Batch account.
  The cmdlet returns a **BatchAccountContext** object that has its current **PrimaryAccountKey** and **SecondaryAccountKey** properties.
parameters:
  cmdletParameters:
  - name: AccountName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Batch account for which this cmdlet regenerates a key.
    aliases:
    - Name
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: KeyType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of key that this cmdlet regenerates.
      Valid values are:
      - Primary
      - Secondary
    acceptedValues:
    - Primary
    - Secondary
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the resource group of the account for which this cmdlet regenerates a key.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzBatchAccountKey
        [-AccountName] <String>
        [-ResourceGroupName <String>]
        -KeyType <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Regenerate the primary account key on a Batch account'
  description: |-
    ```powershell
    New-AzBatchAccountKey -AccountName "pfuller" -KeyType "Primary"
    ```

    ```output
    AccountName                  : pfuller
    Location                     : westus
    ResourceGroupName            : CmdletExampleRG
    DedicatedCoreQuota           : 20
    LowPriorityCoreQuota         : 20
    PoolQuota                    : 20
    ActiveJobAndJobScheduleQuota : 20
    Tags                         :
    TaskTenantUrl                : https://cmdletexample.westus.batch.azure.com
    ```

    This command regenerates the primary account key on the Batch account named pfuller.
