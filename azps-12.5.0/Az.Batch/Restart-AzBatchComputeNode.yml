### YamlMime:PowerShellCmdlet1
uid: Az.Batch.Restart-AzBatchComputeNode
name: Restart-AzBatchComputeNode
module: Az.Batch
isPreview: false
summary: |-
  Reboots the specified compute node.
description: |-
  The **Restart-AzBatchComputeNode** cmdlet reboots the specified compute node.
parameters:
  cmdletParameters:
  - name: BatchContext
    type: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **BatchAccountContext** instance that this cmdlet uses to interact with the Batch service.
      If you use the Get-AzBatchAccount cmdlet to get your BatchAccountContext, then Microsoft Entra authentication will be used when interacting with the Batch service. To use shared key authentication instead, use the Get-AzBatchAccountKey cmdlet to get a BatchAccountContext object with its access keys populated. When using shared key authentication, the primary access key is used by default. To change the key to use, set the BatchAccountContext.KeyInUse property.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputeNode
    type: <xref href="Microsoft.Azure.Commands.Batch.Models.PSComputeNode" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **PSComputeNode** object that represents the compute node to reboot.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InputObject
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of the compute node to reboot.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Id
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PoolId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of the pool that contains the compute node.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Id
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RebootOption
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="Microsoft.Azure.Batch.Common.ComputeNodeRebootOption" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies when to reboot the node and what to do with currently running tasks.
      The default is Requeue.
    acceptedValues:
    - Requeue
    - Terminate
    - TaskCompletion
    - RetainedData
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzBatchComputeNode
        [-PoolId] <String>
        [-Id] <String>
        [[-RebootOption] <ComputeNodeRebootOption>]
        -BatchContext <BatchAccountContext>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: true
- syntax: |-
    ```Syntax
    Restart-AzBatchComputeNode
        [[-ComputeNode] <PSComputeNode>]
        [[-RebootOption] <ComputeNodeRebootOption>]
        -BatchContext <BatchAccountContext>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.Models.PSComputeNode" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Void" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Restart a compute node'
  description: |-
    ```powershell
    Restart-AzBatchComputeNode -PoolId "MyPool" -Id "tvm-3257026573_2-20150813t200938z" -BatchContext $Context
    ```

    This command reboots the compute node with the ID "tvm-3257026573_2-20150813t200938z" in the pool MyPool.
- title: 'Example 2: Restart every compute node in a pool'
  description: |-
    ```powershell
    Get-AzBatchComputeNode -PoolId "MyPool" -BatchContext $Context | Restart-AzBatchComputeNode -BatchContext $Context
    ```

    This command reboots every compute node in the pool MyPool.
