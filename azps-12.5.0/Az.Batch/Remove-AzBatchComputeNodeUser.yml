syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzBatchComputeNodeUser
        [-PoolId] <String>
        [-ComputeNodeId] <String>
        [-Name] <String>
        -BatchContext <BatchAccountContext>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
