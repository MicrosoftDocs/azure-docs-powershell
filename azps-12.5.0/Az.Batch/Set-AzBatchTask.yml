syntaxes:
- syntax: |-
    ```Syntax
    Set-AzBatchTask
        [-Task] <PSCloudTask>
        -BatchContext <BatchAccountContext>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.Models.PSCloudTask" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Void" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Update a task'
  description: |-
    ```powershell
    $Task = Get-AzBatchTask -JobId "Job16" -Id "Task22" -BatchContext $Context
    $Constraints = New-Object Microsoft.Azure.Commands.Batch.Models.PSTaskConstraints -ArgumentList @([TimeSpan]::FromDays(5), [TimeSpan]::FromDays(2), 3)
    $Task.Constraints = $Constraints
    Set-AzBatchTask -Task $Task -BatchContext $Context
    ```

    The first command gets a task by using **Get-AzBatchTask**, and then stores it in the $Task variable.
    The next two commands modify the constraints of the task in $Task.
    The final command updates the Batch service to match the local object in $Task.
