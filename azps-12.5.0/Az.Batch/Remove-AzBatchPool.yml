syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzBatchPool
        [-Id] <String>
        [-Force]
        -BatchContext <BatchAccountContext>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
