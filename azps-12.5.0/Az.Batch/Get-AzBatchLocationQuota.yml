### YamlMime:PowerShellCmdlet1
uid: Az.Batch.Get-AzBatchLocationQuota
name: Get-AzBatchLocationQuota
module: Az.Batch
isPreview: false
summary: |-
  Gets the Batch service quotas for your subscription at the given location.
description: |-
  Gets the Batch service quotas for the specified subscription at the given location.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the region for which this cmdlet checks the quotas.
      For more information, see Azure Regions (https://azure.microsoft.com/regions).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBatchLocationQuota
        [-Location] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.Models.PSBatchLocationQuotas" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the Batch service quotas for the subscription in the West US region'
  description: |-
    ```powershell
    Get-AzBatchLocationQuota -Location "westus"
    ```

    ```output
    AccountQuota Location
              ------------ --------
              1            westus
    ```

    This command gets the quotas for the current subscription in the West US region.
    The return value indicates that this subscription can create only one Batch account in that region.
