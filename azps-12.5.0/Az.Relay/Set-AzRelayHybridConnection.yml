syntaxes:
- syntax: |-
    ```Syntax
    Set-AzRelayHybridConnection
        -Name <String>
        -Namespace <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-UserMetadata <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
