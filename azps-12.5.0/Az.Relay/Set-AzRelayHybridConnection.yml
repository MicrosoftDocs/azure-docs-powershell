    Set-AzRelayHybridConnection
        -Name <String>
        -Namespace <String>
        -ResourceGroupName <String>
        -InputObject <IHybridConnection>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
