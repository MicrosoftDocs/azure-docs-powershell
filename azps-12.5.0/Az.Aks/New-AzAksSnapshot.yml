syntaxes:
- syntax: |-
    ```Syntax
    New-AzAksSnapshot
        -ResourceGroupName <String>
        -ResourceName <String>
        [-SubscriptionId <String>]
        -Location <String>
        [-CreationDataSourceResourceId <String>]
        [-SnapshotType <SnapshotType>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
