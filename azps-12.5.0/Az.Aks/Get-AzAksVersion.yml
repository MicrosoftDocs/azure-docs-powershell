examples:
- title: 'Example 1: List available version for creating managed Kubernetes cluster'
  description: |-
    ```powershell
    Get-AzAksVersion -location eastus
    ```

    ```output
    Default IsPreview OrchestratorType OrchestratorVersion
    ------- --------- ---------------- -------------------
                      Kubernetes       1.19.11
                      Kubernetes       1.19.13
                      Kubernetes       1.20.7
    True              Kubernetes       1.20.9
                      Kubernetes       1.21.1
                      Kubernetes       1.21.2
            True      Kubernetes       1.22.1
            True      Kubernetes       1.22.2
    ```

