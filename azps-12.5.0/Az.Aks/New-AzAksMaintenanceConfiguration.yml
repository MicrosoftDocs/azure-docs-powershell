syntaxes:
- syntax: |-
    ```Syntax
    New-AzAksMaintenanceConfiguration
        -ConfigName <String>
        -ResourceGroupName <String>
        -ResourceName <String>
        [-SubscriptionId <String>]
        [-NotAllowedTime <ITimeSpan[]>]
        [-TimeInWeek <ITimeInWeek[]>]
        [-DefaultProfile <PSObject>]
