syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzAksAbortManagedClusterLatestOperation
        -ResourceGroupName <String>
        -ResourceName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Abort
  isDefault: true
