examples:
- title: 'Example 1: Create new assembly using local file'
  description: |-
    ```powershell
    New-AzIntegrationAccountAssembly -ResourceGroupName "sampleResourceGroup" -IntegrationAccountName "sampleIntegrationAccount" -AssemblyName "sampleAssembly" -AssemblyFilePath $localAssemblyFilePath
    ```

    ```output
    Properties : Microsoft.Azure.Management.Logic.Models.AssemblyProperties
    Id         : /subscriptions/{SubscriptionId}/resourceGroups/sampleResourceGroup/providers/Microsoft.Logic/integrationAccounts/sampleIntegrationAccount/assemblies/sampleAssembly
    Name       : sampleAssembly
    Type       : Microsoft.Logic/integrationAccounts/assemblies
    Location   :
    Tags       :
    ```

    Creates a new assembly using the local file located at the file path contained in "$localAssemblyFilePath".
- title: 'Example 2: Create new assembly using byte data'
  description: |-
    ```powershell
    New-AzIntegrationAccountAssembly -ResourceGroupName "sampleResourceGroup" -IntegrationAccountName "sampleIntegrationAccount" -AssemblyName "sampleAssembly" -AssemblyData $assemblyContent
    ```

    ```output
    Properties : Microsoft.Azure.Management.Logic.Models.AssemblyProperties
    Id         : /subscriptions/{SubscriptionId}/resourceGroups/sampleResourceGroup/providers/Microsoft.Logic/integrationAccounts/sampleIntegrationAccount/assemblies/sampleAssembly
    Name       : sampleAssembly
    Type       : Microsoft.Logic/integrationAccounts/assemblies
    Location   :
    Tags       :
    ```

    Creates a new assembly using the a byte array contained in "$assemblyContent".
- title: 'Example 3: Create new assembly using a content link'
  description: |-
    ```powershell
    New-AzIntegrationAccountAssembly -ResourceGroupName "sampleResourceGroup" -IntegrationAccountName "sampleIntegrationAccount" -AssemblyName "sampleAssembly" -ContentLink $assemblyUrl
    ```

    ```output
    Properties : Microsoft.Azure.Management.Logic.Models.AssemblyProperties
    Id         : /subscriptions/{SubscriptionId}/resourceGroups/sampleResourceGroup/providers/Microsoft.Logic/integrationAccounts/sampleIntegrationAccount/assemblies/sampleAssembly
    Name       : sampleAssembly
    Type       : Microsoft.Logic/integrationAccounts/assemblies
    Location   :
    Tags       :
    ```

    Creates a new assembly using the a byte data located at the URL "$assemblyUrl". This is the suggested method for creating large sized assemblies.
