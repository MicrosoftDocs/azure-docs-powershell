syntaxes:
- syntax: |-
    ```Syntax
    New-AzIntegrationAccountPartner
        -ResourceGroupName <String>
        -Name <String>
        -PartnerName <String>
        [-PartnerType <String>]
        -BusinessIdentities <Object>
        [-Metadata <Object>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
