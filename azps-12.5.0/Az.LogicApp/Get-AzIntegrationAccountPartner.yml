syntaxes:
- syntax: |-
    ```Syntax
    Get-AzIntegrationAccountPartner
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-PartnerName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
