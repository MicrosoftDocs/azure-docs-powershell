syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzLogicAppRun
        -ResourceGroupName <String>
        -Name <String>
        -RunName <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
