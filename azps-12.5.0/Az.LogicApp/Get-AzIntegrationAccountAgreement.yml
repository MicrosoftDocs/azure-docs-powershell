syntaxes:
- syntax: |-
    ```Syntax
    Get-AzIntegrationAccountAgreement
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-AgreementName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
