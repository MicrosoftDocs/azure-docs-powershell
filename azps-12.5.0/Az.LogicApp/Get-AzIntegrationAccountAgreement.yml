                             ","Value":"ZZ"},"ProtocolSettings":{"MessageConnectionSettings":{"IgnoreCertificateNameMismatch":true,"SupportHttpStatusCodeCont
                             . . .
    ```

    This command gets an integration account agreement named IntegrationAccountAgreement06.
