syntaxes:
- syntax: |-
    ```Syntax
    Get-AzIntegrationAccountMap
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-MapName <String>]
        [-MapType <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
