examples:
- title: 'Example 1: Get an integration account map'
  description: |-
    ```powershell
    Get-AzIntegrationAccountMap -ResourceGroupName "ResourceGroup11" -Name "IntegrationAccount31" -MapName "IntegrationAccountMap47"
    ```

    ```output
