  cmdletParameters:
  - name: AgreementName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The integration account agreement name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AgreementType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The integration account agreement type.
    acceptedValues:
    - X12
    - Edifact
    aliases:
    - MessageType
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ControlNumberValue
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The integration account control number value.
    defaultValue: None
    dontShow: false
