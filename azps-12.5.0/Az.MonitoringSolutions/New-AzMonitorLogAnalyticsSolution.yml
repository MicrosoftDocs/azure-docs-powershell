syntaxes:
- syntax: |-
    ```Syntax
    New-AzMonitorLogAnalyticsSolution
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Type <String>
        -Location <String>
        -WorkspaceResourceId <String>
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
