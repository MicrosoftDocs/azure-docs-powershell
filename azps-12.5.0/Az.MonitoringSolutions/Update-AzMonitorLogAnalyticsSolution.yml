syntaxes:
- syntax: |-
    ```Syntax
    Update-AzMonitorLogAnalyticsSolution
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzMonitorLogAnalyticsSolution
        -InputObject <IMonitoringSolutionsIdentity>
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
