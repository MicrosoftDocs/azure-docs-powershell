syntaxes:
- syntax: |-
    ```Syntax
    Update-AzPostgreSqlConfiguration
        -Name <String>
        -ResourceGroupName <String>
        -ServerName <String>
        [-SubscriptionId <String>]
        [-Source <String>]
        [-Value <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzPostgreSqlConfiguration
        -InputObject <IPostgreSqlIdentity>
        [-Source <String>]
        [-Value <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
