syntaxes:
- syntax: |-
    ```Syntax
    Restore-AzPostgreSqlFlexibleServer
        -Name <String>
        -ResourceGroupName <String>
        -SourceServerName <String>
        [-SubscriptionId <String>]
        -RestorePointInTime <DateTime>
        [-Zone <String>]
        [-Subnet <String>]
        [-PrivateDnsZone <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
