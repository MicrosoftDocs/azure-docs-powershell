uid: Az.Marketplace.Set-AzMarketplacePrivateStoreOffer
name: Set-AzMarketplacePrivateStoreOffer
module: Az.Marketplace
isPreview: false
summary: |-
  Updates or creates offer for private store.
description: |-
  Updates or creates offer for private store that was created under tenant scope.
