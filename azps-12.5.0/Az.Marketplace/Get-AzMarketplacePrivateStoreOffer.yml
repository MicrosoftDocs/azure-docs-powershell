syntaxes:
- syntax: |-
    ```Syntax
    Get-AzMarketplacePrivateStoreOffer
        -PrivateStoreId <String>
        [-OfferId <String>]
        [-SubscriptionId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
