syntaxes:
- syntax: |-
    ```Syntax
    New-AzDynatraceMonitor
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        [-AccountId <String>]
        [-AccountRegionId <String>]
        [-EnvironmentId <String>]
        [-EnvironmentIngestionKey <String>]
        [-EnvironmentLandingUrl <String>]
        [-EnvironmentLogsIngestionEndpoint <String>]
        [-EnvironmentUserId <String>]
        [-IdentityType <ManagedIdentityType>]
        [-MarketplaceSubscriptionStatus <MarketplaceSubscriptionStatus>]
        [-MonitoringStatus <MonitoringStatus>]
        [-PlanBillingCycle <String>]
        [-PlanDetail <String>]
        [-PlanEffectiveDate <DateTime>]
        [-PlanUsageType <String>]
        [-SingleSignOnAadDomain <String[]>]
        [-SingleSignOnEnterpriseAppId <String>]
        [-SingleSignOnState <SingleSignOnStates>]
        [-SingleSignOnUrl <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
        [-UserCountry <String>]
        [-UserEmailAddress <String>]
        [-UserFirstName <String>]
        [-UserLastName <String>]
        [-UserPhoneNumber <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
