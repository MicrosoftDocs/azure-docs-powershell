syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDynatraceMonitorTagRule
        -MonitorName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-LogRuleFilteringTag <IFilteringTag[]>]
        [-LogRuleSendAadLog <SendAadLogsStatus>]
        [-LogRuleSendActivityLog <SendActivityLogsStatus>]
        [-LogRuleSendSubscriptionLog <SendSubscriptionLogsStatus>]
        [-MetricRuleFilteringTag <IFilteringTag[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDynatraceMonitorTagRule
        -InputObject <IDynatraceObservabilityIdentity>
        [-LogRuleFilteringTag <IFilteringTag[]>]
        [-LogRuleSendAadLog <SendAadLogsStatus>]
        [-LogRuleSendActivityLog <SendActivityLogsStatus>]
        [-LogRuleSendSubscriptionLog <SendSubscriptionLogsStatus>]
        [-MetricRuleFilteringTag <IFilteringTag[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
