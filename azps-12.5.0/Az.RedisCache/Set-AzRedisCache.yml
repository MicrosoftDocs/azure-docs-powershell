### YamlMime:PowerShellCmdlet1
uid: Az.RedisCache.Set-AzRedisCache
name: Set-AzRedisCache
module: Az.RedisCache
isPreview: false
summary: |-
  Modifies an Azure Cache for Redis.
description: |-
  The **Set-AzRedisCache** cmdlet modifies an Azure Cache for Redis.
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DisableAccessKeyAuthentication
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Optional: Authentication to Redis through access keys is disabled when set as true. Default value is false.
    defaultValue: "false"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EnableNonSslPort
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Boolean" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Indicates whether the non-SSL port is enabled.
      The default value is $False (the non-SSL port is disabled).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IdentityType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of identity used for the Azure Cache for Redis. Valid values: "SystemAssigned" or "UserAssigned" or "SystemAssignedUserAssigned" or "None"
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MinimumTlsVersion
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specify the TLS version required by clients to connect to cache.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Azure Cache for Redis to update.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RedisConfiguration
    type: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Specifies Redis configuration settings.
      The acceptable values for this parameter are:
      - rdb-backup-enabled.
      Specifies that Redis data persistence is enabled.
      Premium tier only.
      - rdb-storage-connection-string.
      Specifies the connection string to the Storage account for Redis data persistence.
      Premium tier only.
      - rdb-backup-frequency.
      Specifies the backup frequency for Redis data persistence.
      Premium tier only.
      - maxmemory-reserved.
      Configures the memory reserved for non-cache processes.
      Standard and Premium tiers.
      - maxmemory-policy.
      Configures the eviction policy for the cache.
      All pricing tiers.
      - notify-keyspace-events.
      Configures keyspace notifications.
      Standard and premium tiers.
      - hash-max-ziplist-entries.
      Configures memory optimization for small aggregate data types.
      Standard and Premium tiers.
      - hash-max-ziplist-value.
      Configures memory optimization for small aggregate data types.
      Standard and Premium tiers.
      - set-max-intset-entries.
      Configures memory optimization for small aggregate data types.
      Standard and Premium tiers.
      - zset-max-ziplist-entries.
      Configures memory optimization for small aggregate data types.
      Standard and Premium tiers.
      - zset-max-ziplist-value.
      Configures memory optimization for small aggregate data types.
      Standard and Premium tiers.
      - databases.
      Configures the number of databases.
      This property can be configured only at cache creation.
      Standard and Premium tiers.
      For more information, see [Manage Azure Redis Cache with Azure PowerShell](/azure/redis/how-to-manage-redis-cache-powershell).
      - preferred-data-archive-auth-method
      Preferred auth method to communicate to storage account used for data archive, specify SAS or ManagedIdentity, default value is SAS
      - preferred-data-persistence-auth-method
      Preferred auth method to communicate to storage account used for data persistence, specify SAS or ManagedIdentity, default value is SAS
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RedisVersion
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Redis version. This should be in the form 'major[.minor]' (only 'major' is required) or the value 'latest' which refers to the latest stable Redis version that is available. Supported versions: 4.0, 6.0 (latest). Default value is 'latest'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the resource group that contains the Redis Cache.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ShardCount
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the number of shards to create on a Premium cluster cache.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Size
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the size of the Redis Cache.
      Valid values are:
      - P1
      - P2
      - P3
      - P4
      - P5
      - C0
      - C1
      - C2
      - C3
      - C4
      - C5
      - C6
      - 250MB
      - 1GB
      - 2.5GB
      - 6GB
      - 13GB
      - 26GB
      - 53GB
      - 120GB
      The default value is 1GB or C1.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Sku
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the SKU of the Redis Cache to create.
      Valid values are:
      - Basic
      - Standard
      - Premium
      The default value is Standard.
    acceptedValues:
    - Basic
    - Standard
    - Premium
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Tag
    type: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      A hash table which represents tags.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TenantSettings
    type: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      This parameter has been deprecated.
    defaultValue: None
    dontShow: false
    isDynamic: false
