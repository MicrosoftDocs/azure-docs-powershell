examples:
- title: 'Example 1: Modify Azure Cache for Redis'
  description: |-
    ```powershell
    Set-AzRedisCache -ResourceGroupName "MyGroup" -Name "MyCache" -RedisConfiguration @{"maxmemory-policy" = "allkeys-random"}
    ```

    ```output
    PrimaryKey         : ******
              SecondaryKey       : ******
              ResourceGroupName  : mygroup
              Id                 : /subscriptions/a559b6fd-3a84-40bb-a450-b0db5ed37dfe/resourceGroups/mygroup/providers/Microsoft.Cache/Redis/myCache
              Location           : North Central US
              Name               : MyCache
              Type               : Microsoft.Cache/Redis
              HostName           : mycache.redis.cache.windows.net
              Port               : 6379
              ProvisioningState  : creating
              SslPort            : 6380
              RedisConfiguration : {[maxmemory-policy, allkeys-random]}
              EnableNonSslPort   : False
              RedisVersion       : 2.8
              Size               : 250MB
              Sku                : Standard
              Tag                : {}
              Zone               : []
    ```

    This command updates the maxmemory-policy for your Azure Cache fo Redis named *MyCache*.
- title: 'Example 2: Modify Azure Cache for Redis - If you want to Disable RDB or AOF Data Persistence.'
  description: |-
    ```powershell
    Set-AzRedisCache -Name "MyCache"  -RedisConfiguration @{"rdb-backup-enabled" = "false"}
    ```

    ```output
    PrimaryKey         : ******
              SecondaryKey       : ******
              ResourceGroupName  : MyGroup
              Id                 : /subscriptions/a559b6fd-3a84-40bb-a450-b0db5ed37dfe/resourceGroups/mygroup/providers/Microsoft.Cache/Redis/MyCache
              Location           : Central US
              Name               : mycache
              Type               : Microsoft.Cache/Redis
              HostName           : mycache.redis.cache.windows.net
              Port               : 6379
              ProvisioningState  : Succeeded
              SslPort            : 6380
              RedisConfiguration : {[maxmemory-policy, allkeys-random], [maxclients, 7500], [maxmemory-reserved, 200],
                                    [maxfragmentationmemory-reserved, 300], [rdb-backup-enabled, false]...}
              EnableNonSslPort   : False
              RedisVersion       : 4.0.14
              Size               : 6GB
              Sku                : Premium
              Tag                : {}
              Zone               : []
    ```



    This cmdlet disables RDB backup data persistence for Azure Cache for Redis. You can also disable AOF backup persistent cache.
- title: 'Example 3: Modify Azure Cache for Redis - If you want to add data persistence after azure redis cache created.'
  description: |-
    ```powershell
    Set-AzRedisCache -Name "MyCache" -RedisConfiguration @{"rdb-backup-enabled" = "true"; "rdb-storage-connection-string" = "DefaultEndpointsProtocol=https;AccountName=mystorageaccount;AccountKey=******;EndpointSuffix=mySuffix"; "rdb-backup-frequency" = "30"}
    ```

    ```output
    PrimaryKey         : ******
              SecondaryKey       : ******
              ResourceGroupName  : MyGroup
              Id                 : /subscriptions/a559b6fd-3a84-40bb-a450-b0db5ed37dfe/resourceGroups/mygroup/providers/Microsoft.Cache/Redis/MyCache
              Location           : Central US
              Name               : mycache
              Type               : Microsoft.Cache/Redis
              HostName           : mycache.redis.cache.windows.net
              Port               : 6379
              ProvisioningState  : Succeeded
              SslPort            : 6380
              RedisConfiguration : {[maxmemory-policy, allkeys-random], [maxclients, 7500], [maxmemory-reserved, 200],
                                    [maxfragmentationmemory-reserved, 300], [rdb-backup-enabled, true]....}
              EnableNonSslPort   : False
              RedisVersion       : 4.0.14
              Size               : 6GB
              Sku                : Premium
              Tag                : {}
              Zone               : []
    ```

    This cmdlet enables rdb-backup persistence on an already existing cache. You can also enable aof-backup persistence.
- title: 'Example 4: Modify Azure Cache for Redis - If you want to change rdb back up frequency.'
  description: |-
    For example - Currently you are taking RDB snapshot in every 30 minute, but you want to change to take snapshot 15 minutes.

    ```powershell
    Set-AzRedisCache -Name "MyCache" -RedisConfiguration @{"rdb-backup-frequency" = "15"}
    ```

    ```output
    PrimaryKey         : ******
              SecondaryKey       : ******
              ResourceGroupName  : MyGroup
              Id                 : /subscriptions/a559b6fd-3a84-40bb-a450-b0db5ed37dfe/resourceGroups/mygroup/providers/Microsoft.Cache/Redis/MyCache
              Location           : Central US
              Name               : mycache
              Type               : Microsoft.Cache/Redis
              HostName           : mycache.redis.cache.windows.net
              Port               : 6379
              ProvisioningState  : Succeeded
              SslPort            : 6380
              RedisConfiguration : {[maxmemory-policy, allkeys-random], [maxclients, 7500], [maxmemory-reserved, 200],
                                    [maxfragmentationmemory-reserved, 300], [rdb-backup-enabled, true]....}
              EnableNonSslPort   : False
              RedisVersion       : 4.0.14
              Size               : 6GB
              Sku                : Premium
              Tag                : {}
              Zone               : []
    ```
- title: 'Example 5: Modify Azure Cache for Redis - If you want to change AOF back up data persistence to RDB back up.'
  description: |-
    ```powershell
    Set-AzRedisCache -Name "MyCache"  -RedisConfiguration @{"aof-backup-enabled"= "false"; "rdb-backup-enabled" = "true"; "rdb-storage-connection-string" = "DefaultEndpointsProtocol=https;AccountName=mystorageaccount;AccountKey=******;EndpointSuffix=mySuffix"; "rdb-backup-frequency" = "30"}
    ```

    ```output
    PrimaryKey         : ******
              SecondaryKey       : ******
              ResourceGroupName  : MyGroup
              Id                 : /subscriptions/a559b6fd-3a84-40bb-a450-b0db5ed37dfe/resourceGroups/mygroup/providers/Microsoft.Cache/Redis/MyCache
              Location           : Central US
              Name               : mycache
              Type               : Microsoft.Cache/Redis
              HostName           : mycache.redis.cache.windows.net
              Port               : 6379
              ProvisioningState  : Succeeded
              SslPort            : 6380
              RedisConfiguration : {[maxmemory-policy, allkeys-random], [maxclients, 7500], [maxmemory-reserved, 200],
                                    [maxfragmentationmemory-reserved, 300], [rdb-backup-enabled, true]....}
              EnableNonSslPort   : False
              RedisVersion       : 4.0.14
              Size               : 6GB
              Sku                : Premium
              Tag                : {}
              Zone               : []
    ```


    This cmdlet helps in changing persistence method.
- title: 'Example 6: Scale an Azure Cache for Redis Instance - Update to different size.'
  description: |-
    ```powershell
    Set-AzRedisCache -Name "MyCache" -Size "P2" -Sku "Premium"
    ```

    ```output
    PrimaryKey         : ******
              SecondaryKey       : ******
              ResourceGroupName  : MyGroup
              Id                 : /subscriptions/a559b6fd-3a84-40bb-a450-b0db5ed37dfe/resourceGroups/mygroup/providers/Microsoft.Cache/Redis/MyCache
              Location           : Central US
              Name               : mycache
              Type               : Microsoft.Cache/Redis
              HostName           : mycache.redis.cache.windows.net
              Port               : 6379
              ProvisioningState  : Scaling
              SslPort            : 6380
              RedisConfiguration : {[maxmemory-policy, allkeys-random], [maxclients, 7500], [maxmemory-reserved, 200],
                                    [maxfragmentationmemory-reserved, 300]....}
              EnableNonSslPort   : False
              RedisVersion       : 4.0.14
              Size               : 6GB
              Sku                : Premium
              Tag                : {}
              Zone               : []
    ```

    This command increases or decreases the memory size of your instance.
- title: 'Example 7: Scale an Azure Cache for Redis Instance - Update to different tier.'
  description: |-
    ```powershell
    Set-AzRedisCache -Name "MyCache" -Size "P1" -Sku "Premium"
    ```

    ```output
    PrimaryKey         : ******
              SecondaryKey       : ******
              ResourceGroupName  : MyGroup
              Id                 : /subscriptions/a559b6fd-3a84-40bb-a450-b0db5ed37dfe/resourceGroups/mygroup/providers/Microsoft.Cache/Redis/MyCache
              Location           : Central US
              Name               : mycache
              Type               : Microsoft.Cache/Redis
              HostName           : mycache.redis.cache.windows.net
              Port               : 6379
              ProvisioningState  : Scaling
              SslPort            : 6380
              RedisConfiguration : {[maxmemory-policy, allkeys-random], [maxclients, 7500], [maxmemory-reserved, 200],
                                    [maxfragmentationmemory-reserved, 300]....}
              EnableNonSslPort   : False
              RedisVersion       : 4.0.14
              Size               : 1GB
              Sku                : Standard
              Tag                : {}
              Zone               : []
    ```

    This command helps you change the tier of your cache. You can change from Basic to Standard, or Standard to Premium.
- title: 'Example 8: Scale an Azure Cache for Redis Instance - Enable Redis Clustering.'
  description: |-
    ```powershell
    Set-AzRedisCache -Name "MyCache" -ShardCount 1
    ```

    ```output
    PrimaryKey         : ******
              SecondaryKey       : ******
              ResourceGroupName  : MyGroup
              Id                 : /subscriptions/a559b6fd-3a84-40bb-a450-b0db5ed37dfe/resourceGroups/mygroup/providers/Microsoft.Cache/Redis/MyCache
              Location           : Central US
              Name               : mycache
              Type               : Microsoft.Cache/Redis
              HostName           : mycache.redis.cache.windows.net
              Port               : 6379
              ProvisioningState  : Scaling
              SslPort            : 6380
              RedisConfiguration : {[maxmemory-policy, allkeys-random], [maxclients, 7500], [maxmemory-reserved, 200],
                                    [maxfragmentationmemory-reserved, 300]....}
              EnableNonSslPort   : False
              RedisVersion       : 4.0.14
              Size               : 6GB
              Sku                : Premium
              ShardCount         :
              Tag                : {}
              Zone               : []
    ```

    This cmdlet helps you in enable clustering for your Azure Cache for Redis instance. For increasing the shard count, must enable clustering first.
- title: 'Example 9: Scale an Azure Cache for Redis Instance - Use Redis Cluster to scale in/out.'
  description: |-
    ```powershell
    Set-AzRedisCache -Name "MyCache" -ShardCount 2
    ```

    ```output
    PrimaryKey         : ******
              SecondaryKey       : ******
              ResourceGroupName  : MyGroup
              Id                 : /subscriptions/a559b6fd-3a84-40bb-a450-b0db5ed37dfe/resourceGroups/mygroup/providers/Microsoft.Cache/Redis/MyCache
              Location           : Central US
              Name               : mycache
              Type               : Microsoft.Cache/Redis
              HostName           : mycache.redis.cache.windows.net
              Port               : 6379
              ProvisioningState  : Scaling
              SslPort            : 6380
              RedisConfiguration : {[maxmemory-policy, allkeys-random], [maxclients, 7500], [maxmemory-reserved, 200],
                                    [maxfragmentationmemory-reserved, 300]....}
              EnableNonSslPort   : False
              RedisVersion       : 4.0.14
              Size               : 6GB
              Sku                : Premium
              ShardCount         : 1
              Tag                : {}
              Zone               : []
    ```

    This command increases or decreases the cluster size.
