    supportsWildcards: false
  - name: RuleName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of firewall rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
