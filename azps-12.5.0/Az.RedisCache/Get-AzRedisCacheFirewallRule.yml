syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRedisCacheFirewallRule
        [-ResourceGroupName <String>]
        -Name <String>
        [-RuleName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
