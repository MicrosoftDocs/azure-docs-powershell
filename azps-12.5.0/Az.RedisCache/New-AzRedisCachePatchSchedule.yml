syntaxes:
- syntax: |-
    ```Syntax
    New-AzRedisCachePatchSchedule
        [-ResourceGroupName <String>]
        -Name <String>
        -Entries <PSScheduleEntry[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
