### YamlMime:PowerShellCmdlet1
uid: Az.RedisCache.Get-AzRedisCache
name: Get-AzRedisCache
module: Az.RedisCache
isPreview: false
summary: |-
  Gets a Redis Cache.
description: |-
  The **Get-AzRedisCache** cmdlet gets the specified Azure Redis Cache.
  If you specify no parameters, this operation gets every Redis Cache for the current subscription.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Redis Cache to get.
      Use with the *ResourceGroupName* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the resource group that contains the Redis Cache to get.
      If you specify only the *ResourceGroupName* parameter, this operation gets every Redis Cache in the specified resource group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRedisCache
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.RedisCache.Models.RedisCacheAttributes" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a Redis Cache by name'
  description: |-
    ```powershell
    Get-AzRedisCache -Name "myexists"
    ```

    ```output
    ResourceGroupName  : myGroup
            Id                 : /subscriptions/a559b6fd-3a84-40bb-a450-b0db5ed37dfe/resourceGroups/myGroup/providers/Microsoft.Cache/Redis/myexists
            Location           : North Central US
            Name               : myexists
            Type               : Microsoft.Cache/Redis
            HostName           : myexists.redis.cache.windows.net
            Port               : 6379
            ProvisioningState  : succeeded
            SslPort            : 6380
            RedisConfiguration : {}
            EnableNonSslPort   : False
            RedisVersion       : 2.8
            Size               : 1GB
            Sku                : Basic
            Tag                : {}
            Zone               : []
    ```

    This command gets the Redis Cache named myexists.
- title: 'Example 2: Get every Redis Cache in a resource group'
  description: |-
    ```powershell
    Get-AzRedisCache -ResourceGroupName "myGroup"
    ```

    ```output
