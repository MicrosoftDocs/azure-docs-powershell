syntaxes:
- syntax: |-
    ```Syntax
    Set-AzRedisCacheDiagnostic
        [-ResourceGroupName <String>]
        -Name <String>
        -StorageAccountId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
