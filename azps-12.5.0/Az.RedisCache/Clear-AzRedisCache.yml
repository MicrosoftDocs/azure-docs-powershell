syntaxes:
- syntax: |-
    ```Syntax
    Clear-AzRedisCache
        -Name <String>
        [-ResourceGroupName <String>]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
