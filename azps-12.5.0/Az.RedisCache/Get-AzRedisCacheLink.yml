### YamlMime:PowerShellCmdlet1
uid: Az.RedisCache.Get-AzRedisCacheLink
name: Get-AzRedisCacheLink
module: Az.RedisCache
isPreview: false
summary: |-
  Get geo replication link for Redis Cache.
description: |-
  There are four different ways to get geo-replication link detail. Either provide parameter Name or PrimaryServerName and/or SecondaryServerName. Name is given then all link where cache exists will be returned. If only PrimaryServerName is given then all links where cache is primary will be returned. If only SecondaryServerName is given then all links where cache is secondary will be returned. If PrimaryServerName and SecondaryServerName both are given then specific link with correct role will be returned.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of redis cache.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: AllLinksForCache
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PrimaryServerName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of primary redis cache in link.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: AllLinksForPrimaryCache
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: SingleLink
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SecondaryServerName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of secondary redis cache in link.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SingleLink
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: AllLinksForSecondaryCache
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRedisCacheLink
        -Name <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AllLinksForCache
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzRedisCacheLink
        -PrimaryServerName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AllLinksForPrimaryCache
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRedisCacheLink
        -PrimaryServerName <String>
        -SecondaryServerName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SingleLink
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzRedisCacheLink
        -SecondaryServerName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AllLinksForSecondaryCache
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.RedisCache.Models.PSRedisLinkedServer" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get using parameter set AllLinksForCache'
  description: |-
    ```powershell
    Get-AzRedisCacheLink -Name "mycache1"
    ```

    ```output
    PrimaryServerName            : mycache1
            SecondaryServerName          : mycache2
            ProvisioningState            : Succeeded
            LinkedRedisCacheLocation     : East US
            ServerRole                   : Secondary
            PrimaryHostName              : mycache1.redis.cache.windows.net
            GeoReplicatedPrimaryHostName : mycache2.geo.redis.cache.windows.net
    ```

    This command gets all geo-replication links for Redis Cache named mycache1.
- title: 'Example 2: Get using parameter set AllLinksForPrimaryCache'
  description: |-
    ```powershell
    Get-AzRedisCacheLink -PrimaryServerName "mycache1"
    ```

    ```output
    PrimaryServerName            : mycache1
            SecondaryServerName          : mycache2
            ProvisioningState            : Succeeded
            LinkedRedisCacheLocation     : East US
            ServerRole                   : Secondary
            PrimaryHostName              : mycache1.redis.cache.windows.net
            GeoReplicatedPrimaryHostName : mycache2.geo.redis.cache.windows.net
    ```

    This command gets geo-replication links where Redis Cache named mycache1 is primary.
- title: 'Example 3: Get using parameter set AllLinksForSecondaryCache'
  description: |-
    ```powershell
    Get-AzRedisCacheLink -SecondaryServerName "mycache2"
    ```

    ```output
    PrimaryServerName            : mycache1
            SecondaryServerName          : mycache2
            ProvisioningState            : Succeeded
            LinkedRedisCacheLocation     : East US
            ServerRole                   : Secondary
            PrimaryHostName              : mycache1.redis.cache.windows.net
            GeoReplicatedPrimaryHostName : mycache2.geo.redis.cache.windows.net
    ```

    This command gets geo-replication links where Redis Cache named mycache2 is secondary.
- title: 'Example 4: Get using parameter set SingleLink'
  description: |-
    ```powershell
    Get-AzRedisCacheLink -PrimaryServerName "mycache1" -SecondaryServerName "mycache2"
    ```

    ```output
    PrimaryServerName            : mycache1
            SecondaryServerName          : mycache2
            ProvisioningState            : Succeeded
            LinkedRedisCacheLocation     : East US
            ServerRole                   : Secondary
            PrimaryHostName              : mycache1.redis.cache.windows.net
            GeoReplicatedPrimaryHostName : mycache2.geo.redis.cache.windows.net
    ```

    This command gets a single geo-replication links where Redis Cache named mycache1 is primary and Redis Cache named mycache2 is secondary.
