syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzRedisCache
        [-ResourceGroupName <String>]
        -Name <String>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
