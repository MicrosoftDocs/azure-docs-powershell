examples:
- title: 'Example 1: Remove a Redis Cache and return the result'
  description: |-
    ```powershell
    Remove-AzRedisCache -ResourceGroupName "ResourceGroup03" -Name "myCache" -Force -PassThru
    ```

    ```output
    True
    ```

    This command removes a Redis Cache and displays whether the operation is successful.
- title: 'Example 2: Remove a Redis Cache and do not display the result'
  description: |-
    ```powershell
    Remove-AzRedisCache -ResourceGroupName "ResourceGroup03" -Name "myCache" -Force
    ```

    This command removes a Redis Cache.
    Because the *PassThru* parameter is not specified, the result of the operation is not displayed.
