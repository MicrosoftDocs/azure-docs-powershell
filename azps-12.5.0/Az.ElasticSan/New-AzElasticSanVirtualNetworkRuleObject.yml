uid: Az.ElasticSan.New-AzElasticSanVirtualNetworkRuleObject
name: New-AzElasticSanVirtualNetworkRuleObject
module: Az.ElasticSan
isPreview: false
summary: |-
  Create an in-memory object for VirtualNetworkRule.
description: |-
  Create an in-memory object for VirtualNetworkRule.
parameters:
  cmdletParameters:
  - name: Action
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The action of virtual network rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VirtualNetworkResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Resource ID of a subnet, for example: /subscriptions/{subscriptionId}/resourceGroups/{groupName}/providers/Microsoft.Network/virtualNetworks/{vnetName}/subnets/{subnetName}.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
