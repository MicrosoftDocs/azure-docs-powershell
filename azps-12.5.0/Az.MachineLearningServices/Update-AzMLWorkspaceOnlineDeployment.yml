        -ResourceGroupName <String>
        -WorkspaceName <String>
        [-SubscriptionId <String>]
        [-SkuCapacity <Int32>]
        [-SkuFamily <String>]
        [-SkuName <String>]
        [-SkuSize <String>]
        [-SkuTier <SkuTier>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
