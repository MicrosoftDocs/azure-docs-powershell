syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzMLWorkspaceDiagnose
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ApplicationInsightId <Hashtable>]
        [-ContainerRegistryId <Hashtable>]
        [-DnsResolution <Hashtable>]
        [-KeyVaultId <Hashtable>]
        [-Nsg <Hashtable>]
        [-Other <Hashtable>]
        [-ResourceLock <Hashtable>]
        [-StorageAccount <Hashtable>]
        [-Udr <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DiagnoseExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzMLWorkspaceDiagnose
        -InputObject <IMachineLearningServicesIdentity>
        [-ApplicationInsightId <Hashtable>]
        [-ContainerRegistryId <Hashtable>]
        [-DnsResolution <Hashtable>]
        [-KeyVaultId <Hashtable>]
        [-Nsg <Hashtable>]
        [-Other <Hashtable>]
        [-ResourceLock <Hashtable>]
        [-StorageAccount <Hashtable>]
        [-Udr <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DiagnoseViaIdentityExpanded
  isDefault: false
