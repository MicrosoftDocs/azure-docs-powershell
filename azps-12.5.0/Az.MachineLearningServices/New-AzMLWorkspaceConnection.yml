syntaxes:
- syntax: |-
    ```Syntax
    New-AzMLWorkspaceConnection
        -Name <String>
        -ResourceGroupName <String>
        -WorkspaceName <String>
        -AuthType <ConnectionAuthType>
        [-SubscriptionId <String>]
        [-Category <ConnectionCategory>]
        [-ExpiryTime <DateTime>]
        [-IsSharedToAll]
        [-Metadata <Hashtable>]
        [-SharedUserList <String[]>]
        [-Target <String>]
        [-Value <String>]
        [-ValueFormat <ValueFormat>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzMLWorkspaceConnection
        -Name <String>
        -ResourceGroupName <String>
        -WorkspaceName <String>
        -Property <IWorkspaceConnectionPropertiesV2>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateWithProperty
  isDefault: false
