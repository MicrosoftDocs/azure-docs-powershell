- title: 'Example 1: Lists all online deployments under a online endpoint'
  description: |-
    ```powershell
    Get-AzMLWorkspaceOnlineDeployment -ResourceGroupName ml-rg-test -WorkspaceName mlworkspace-cli01 -EndpointName online-cli01
    ```

