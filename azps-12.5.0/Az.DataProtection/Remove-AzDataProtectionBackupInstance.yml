syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataProtectionBackupInstance
        -Name <String>
        -ResourceGroupName <String>
        -VaultName <String>
        [-SubscriptionId <String>]
        [-Token <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDataProtectionBackupInstance
        -InputObject <IDataProtectionIdentity>
        [-Token <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteViaIdentity
  isDefault: false
