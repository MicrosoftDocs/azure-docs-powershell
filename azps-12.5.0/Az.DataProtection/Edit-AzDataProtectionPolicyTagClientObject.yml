### YamlMime:PowerShellCmdlet1
uid: Az.DataProtection.Edit-AzDataProtectionPolicyTagClientObject
name: Edit-AzDataProtectionPolicyTagClientObject
module: Az.DataProtection
isPreview: false
summary: |-
  Adds or removes schedule tag in an existing backup policy.
description: |-
  Adds or removes schedule tag in an existing backup policy.
parameters:
  cmdletParameters:
  - name: Criteria
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.DataProtection.Models.Api20240401.IScheduleBasedBackupCriteria" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Criterias to be associated with the schedule tag.
      To construct, see NOTES section for CRITERIA properties and create a hash table.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: updateTag
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.DataProtection.Support.TagName" data-throw-if-not-resolved="False" />
    description: |-
      Name of the Schedule tag.
    acceptedValues:
    - Daily
    - Weekly
    - Monthly
    - Yearly
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Policy
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.DataProtection.Models.Api20240401.IBackupPolicy" data-throw-if-not-resolved="False" />
    description: |-
      Backup Policy Object.
      To construct, see NOTES section for POLICY properties and create a hash table.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RemoveRule
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specify whether to remove the tag from the given policy object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RemoveTag
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Edit-AzDataProtectionPolicyTagClientObject
        -Policy <IBackupPolicy>
        -Name <TagName>
        [-RemoveRule]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveTag
  isDefault: true
- syntax: |-
    ```Syntax
    Edit-AzDataProtectionPolicyTagClientObject
        -Policy <IBackupPolicy>
        -Name <TagName>
        -Criteria <IScheduleBasedBackupCriteria[]>
        [<CommonParameters>]
    ```
  parameterSetName: updateTag
  isDefault: false
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.DataProtection.Models.Api20240401.IBackupPolicy" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add Weekly tag to Backup Policy'
  description: |-
    ```powershell
    $criteria = New-AzDataProtectionPolicyTagCriteriaClientObject -AbsoluteCriteria FirstOfWeek
    Edit-AzDataProtectionPolicyTagClientObject -Policy $pol -Name Weekly -Criteria $criteria
    ```

    ```output
    DatasourceType            ObjectType
    --------------            ----------
    {Microsoft.Compute/disks} BackupPolicy
    ```

    This command adds a weekly tag to given backup policy
- title: 'Example 2: Remove Weekly tag from Backup Policy'
  description: |-
    ```powershell
    Edit-AzDataProtectionPolicyTagClientObject -Policy $pol -Name Weekly -RemoveRule
    ```

    ```output
    DatasourceType            ObjectType
    --------------            ----------
    {Microsoft.Compute/disks} BackupPolicy
    ```

    This command removes Weekly tag from backup policy.
