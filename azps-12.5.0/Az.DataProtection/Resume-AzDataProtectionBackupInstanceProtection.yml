syntaxes:
- syntax: |-
    ```Syntax
    Resume-AzDataProtectionBackupInstanceProtection
        -BackupInstanceName <String>
        -ResourceGroupName <String>
        -VaultName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Resume
  isDefault: true
- syntax: |-
    ```Syntax
    Resume-AzDataProtectionBackupInstanceProtection
        -InputObject <IDataProtectionIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResumeViaIdentity
  isDefault: false
