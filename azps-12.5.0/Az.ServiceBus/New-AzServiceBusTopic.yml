syntaxes:
- syntax: |-
    ```Syntax
    New-AzServiceBusTopic
        -Name <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AutoDeleteOnIdle <TimeSpan>]
        [-DefaultMessageTimeToLive <TimeSpan>]
        [-DuplicateDetectionHistoryTimeWindow <TimeSpan>]
        [-EnableBatchedOperations]
        [-EnableExpress]
        [-EnablePartitioning]
        [-MaxMessageSizeInKilobytes <Int64>]
        [-MaxSizeInMegabytes <Int32>]
        [-RequiresDuplicateDetection]
        [-Status <String>]
        [-SupportOrdering]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzServiceBusTopic
        -Name <String>
        -NamespaceInputObject <IServiceBusIdentity>
        [-AutoDeleteOnIdle <TimeSpan>]
        [-DefaultMessageTimeToLive <TimeSpan>]
        [-DuplicateDetectionHistoryTimeWindow <TimeSpan>]
        [-EnableBatchedOperations]
        [-EnableExpress]
        [-EnablePartitioning]
        [-MaxMessageSizeInKilobytes <Int64>]
        [-MaxSizeInMegabytes <Int32>]
        [-RequiresDuplicateDetection]
        [-Status <String>]
        [-SupportOrdering]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityNamespaceExpanded
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzServiceBusTopic
        -Name <String>
        -NamespaceInputObject <IServiceBusIdentity>
        -Parameter <ISbTopic>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityNamespace
  isDefault: false
