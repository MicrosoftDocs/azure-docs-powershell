syntaxes:
- syntax: |-
    ```Syntax
    Start-AzServiceBusMigration
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-PostMigrationName <String>]
        [-TargetNamespace <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
