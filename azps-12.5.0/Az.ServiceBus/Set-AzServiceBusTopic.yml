syntaxes:
- syntax: |-
    ```Syntax
    Set-AzServiceBusTopic
        -Name <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AutoDeleteOnIdle <TimeSpan>]
        [-DefaultMessageTimeToLive <TimeSpan>]
        [-DuplicateDetectionHistoryTimeWindow <TimeSpan>]
        [-EnableBatchedOperations]
        [-EnableExpress]
        [-SupportOrdering]
        [-MaxSizeInMegabytes <Int32>]
        [-MaxMessageSizeInKilobytes <Int64>]
        [-Status <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzServiceBusTopic
        -InputObject <IServiceBusIdentity>
        [-AutoDeleteOnIdle <TimeSpan>]
        [-DefaultMessageTimeToLive <TimeSpan>]
        [-DuplicateDetectionHistoryTimeWindow <TimeSpan>]
        [-EnableBatchedOperations]
        [-EnableExpress]
        [-SupportOrdering]
        [-MaxSizeInMegabytes <Int32>]
        [-MaxMessageSizeInKilobytes <Int64>]
        [-Status <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetViaIdentityExpanded
  isDefault: false
