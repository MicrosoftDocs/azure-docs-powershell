syntaxes:
- syntax: |-
    ```Syntax
    Set-AzServiceBusRule
        -Name <String>
        -TopicName <String>
        -SubscriptionName <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-SqlExpression <String>]
        [-SqlFilterRequiresPreprocessing]
        [-ContentType <String>]
        [-CorrelationId <String>]
        [-Label <String>]
        [-MessageId <String>]
        [-CorrelationFilterProperty <Hashtable>]
        [-ReplyTo <String>]
        [-ReplyToSessionId <String>]
        [-CorrelationFilterRequiresPreprocessing]
        [-SessionId <String>]
        [-To <String>]
        [-FilterType <String>]
        [-ActionRequiresPreprocessing]
        [-ActionSqlExpression <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzServiceBusRule
        -InputObject <IServiceBusIdentity>
        [-SqlExpression <String>]
        [-SqlFilterRequiresPreprocessing]
        [-ContentType <String>]
        [-CorrelationId <String>]
        [-Label <String>]
        [-MessageId <String>]
        [-CorrelationFilterProperty <Hashtable>]
        [-ReplyTo <String>]
        [-ReplyToSessionId <String>]
        [-CorrelationFilterRequiresPreprocessing]
        [-SessionId <String>]
        [-To <String>]
        [-FilterType <String>]
        [-ActionRequiresPreprocessing]
        [-ActionSqlExpression <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetViaIdentityExpanded
  isDefault: false
