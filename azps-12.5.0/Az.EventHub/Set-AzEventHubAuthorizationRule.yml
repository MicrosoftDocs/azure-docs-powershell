syntaxes:
- syntax: |-
    ```Syntax
    Set-AzEventHubAuthorizationRule
        -NamespaceName <String>
        -ResourceGroupName <String>
        -Rights <String[]>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetExpandedNamespace
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzEventHubAuthorizationRule
        -NamespaceName <String>
