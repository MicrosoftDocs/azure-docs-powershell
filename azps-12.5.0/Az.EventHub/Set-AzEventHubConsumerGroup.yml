syntaxes:
- syntax: |-
    ```Syntax
    Set-AzEventHubConsumerGroup
        -Name <String>
        -NamespaceName <String>
        -EventHubName <String>
        -ResourceGroupName <String>
        -UserMetadata <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzEventHubConsumerGroup
        -InputObject <IEventHubIdentity>
        -UserMetadata <String>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetViaIdentityExpanded
  isDefault: false
