syntaxes:
- syntax: |-
    ```Syntax
    Set-AzEventHubCluster
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Capacity <Int32>]
        [-Tag <ITrackedResourceTags>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzEventHubCluster
        -InputObject <IEventHubIdentity>
        [-Capacity <Int32>]
        [-Tag <ITrackedResourceTags>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetViaIdentityExpanded
  isDefault: false
