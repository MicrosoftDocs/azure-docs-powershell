syntaxes:
- syntax: |-
    ```Syntax
    New-AzEventHubSchemaGroup
        -Name <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-GroupProperty <Hashtable>]
        [-SchemaCompatibility <String>]
        [-SchemaType <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzEventHubSchemaGroup
        -Name <String>
        -NamespaceInputObject <IEventHubIdentity>
        [-GroupProperty <Hashtable>]
        [-SchemaCompatibility <String>]
        [-SchemaType <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityNamespaceExpanded
