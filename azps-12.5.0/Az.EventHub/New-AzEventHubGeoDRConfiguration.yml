syntaxes:
- syntax: |-
    ```Syntax
    New-AzEventHubGeoDRConfiguration
        -Name <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AlternateName <String>]
        [-PartnerNamespace <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzEventHubGeoDRConfiguration
        -Name <String>
        -NamespaceInputObject <IEventHubIdentity>
        [-AlternateName <String>]
        [-PartnerNamespace <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityNamespaceExpanded
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzEventHubGeoDRConfiguration
        -Name <String>
        -NamespaceInputObject <IEventHubIdentity>
        -Parameter <IArmDisasterRecovery>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
