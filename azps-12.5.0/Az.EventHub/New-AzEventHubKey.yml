syntaxes:
- syntax: |-
    ```Syntax
    New-AzEventHubKey
        -Name <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-KeyType <String>]
        [-KeyValue <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NewExpandedNamespace
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzEventHubKey
        -Name <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        -EventHubName <String>
        [-SubscriptionId <String>]
        [-KeyType <String>]
        [-KeyValue <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
