syntaxes:
- syntax: |-
    ```Syntax
    New-AzEventHubCluster
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Capacity <Int32>]
        [-Location <String>]
        [-SupportsScaling]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
