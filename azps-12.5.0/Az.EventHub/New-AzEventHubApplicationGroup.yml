syntaxes:
- syntax: |-
    ```Syntax
    New-AzEventHubApplicationGroup
        -Name <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ClientAppGroupIdentifier <String>]
        [-IsEnabled]
        [-Policy <IApplicationGroupPolicy[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzEventHubApplicationGroup
        -Name <String>
        -NamespaceInputObject <IEventHubIdentity>
        [-ClientAppGroupIdentifier <String>]
        [-IsEnabled]
        [-Policy <IApplicationGroupPolicy[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityNamespaceExpanded
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzEventHubApplicationGroup
        -Name <String>
        -NamespaceInputObject <IEventHubIdentity>
        -Parameter <IApplicationGroup>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityNamespace
  isDefault: false
