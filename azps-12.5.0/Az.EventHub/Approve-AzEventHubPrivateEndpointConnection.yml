syntaxes:
- syntax: |-
    ```Syntax
    Approve-AzEventHubPrivateEndpointConnection
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-Name <String>]
        [-SubscriptionId <String>]
        [-Description <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [<CommonParameters>]
    ```
  parameterSetName: SetExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Approve-AzEventHubPrivateEndpointConnection
        -InputObject <IEventHubIdentity>
        [-Description <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [<CommonParameters>]
    ```
  parameterSetName: SetViaIdentityExpanded
  isDefault: false
