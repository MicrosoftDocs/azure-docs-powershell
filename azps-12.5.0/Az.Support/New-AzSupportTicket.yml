syntaxes:
- syntax: |-
    ```Syntax
    New-AzSupportTicket
        -Name <String>
        [-SubscriptionId <String>]
        -AdvancedDiagnosticConsent <String>
        -ContactDetailCountry <String>
        -ContactDetailFirstName <String>
        -ContactDetailLastName <String>
        -ContactDetailPreferredContactMethod <String>
        -ContactDetailPreferredSupportLanguage <String>
        -ContactDetailPreferredTimeZone <String>
        -ContactDetailPrimaryEmailAddress <String>
        -Description <String>
        -ProblemClassificationId <String>
        -ServiceId <String>
        -Severity <String>
        -Title <String>
        [-ContactDetailAdditionalEmailAddress <String[]>]
        [-ContactDetailPhoneNumber <String>]
        [-EnrollmentId <String>]
        [-FileWorkspaceName <String>]
        [-ProblemScopingQuestion <String>]
        [-ProblemStartTime <DateTime>]
        [-QuotaTicketDetailQuotaChangeRequest <IQuotaChangeRequest[]>]
        [-QuotaTicketDetailQuotaChangeRequestSubType <String>]
        [-QuotaTicketDetailQuotaChangeRequestVersion <String>]
        [-Require24X7Response]
        [-SecondaryConsent <ISecondaryConsent[]>]
        [-SupportPlanId <String>]
        [-SupportTicketId <String>]
        [-TechnicalTicketDetailResourceId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
