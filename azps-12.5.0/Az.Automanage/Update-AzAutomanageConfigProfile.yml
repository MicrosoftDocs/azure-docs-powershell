syntaxes:
- syntax: |-
    ```Syntax
    Update-AzAutomanageConfigProfile
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Configuration <Hashtable>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzAutomanageConfigProfile
        -InputObject <IAutomanageIdentity>
        [-Configuration <Hashtable>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
