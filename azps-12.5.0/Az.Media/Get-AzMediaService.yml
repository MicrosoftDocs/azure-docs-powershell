syntaxes:
- syntax: |-
    ```Syntax
    Get-AzMediaService
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceGroupParameterSet
  isDefault: false
