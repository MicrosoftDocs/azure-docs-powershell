syntaxes:
- syntax: |-
    ```Syntax
    Sync-AzMediaServiceStorageKey
        [-ResourceGroupName] <String>
        [-AccountName] <String>
        [-StorageAccountId] <String>
        [-DefaultProfile <IAzureContextContainer>]
