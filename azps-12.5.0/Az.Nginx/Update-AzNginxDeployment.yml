syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNginxDeployment
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AutoScaleSettingProfile <IScaleProfile[]>]
        [-AutoUpgradeProfileUpgradeChannel <String>]
        [-EnableDiagnosticsSupport]
        [-IdentityType <IdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-Location <String>]
        [-ScalingPropertyCapacity <Int32>]
        [-SkuName <String>]
        [-StorageAccountContainerName <String>]
        [-StorageAccountName <String>]
        [-Tag <Hashtable>]
        [-UserProfilePreferredEmail <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzNginxDeployment
        -InputObject <INginxIdentity>
        [-AutoScaleSettingProfile <IScaleProfile[]>]
        [-AutoUpgradeProfileUpgradeChannel <String>]
        [-EnableDiagnosticsSupport]
        [-IdentityType <IdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-Location <String>]
        [-ScalingPropertyCapacity <Int32>]
        [-SkuName <String>]
        [-StorageAccountContainerName <String>]
        [-StorageAccountName <String>]
        [-Tag <Hashtable>]
        [-UserProfilePreferredEmail <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
