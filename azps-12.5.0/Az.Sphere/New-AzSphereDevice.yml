syntaxes:
- syntax: |-
    ```Syntax
    New-AzSphereDevice
        -CatalogName <String>
        -GroupName <String>
        -Name <String>
        -ProductName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DeviceId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
