uid: Az.Sphere.New-AzSphereDevice
name: New-AzSphereDevice
module: Az.Sphere
isPreview: false
summary: |-
  Create a Device.
  Use '.unassigned' or '.default' for the device group and product names to claim a device to the catalog only.
