### YamlMime:PowerShellCmdlet1
uid: Az.Sphere.Update-AzSphereDevice
name: Update-AzSphereDevice
module: Az.Sphere
isPreview: false
summary: |-
  Update a Device.
  Use '.unassigned' or '.default' for the device group and product names to move a device to the catalog level.
description: |-
  Update a Device.
  Use '.unassigned' or '.default' for the device group and product names to move a device to the catalog level.
