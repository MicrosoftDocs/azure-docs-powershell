syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSphereCertificate
        -CatalogName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-Filter <String>]
        [-Maxpagesize <Int32>]
        [-Skip <Int32>]
        [-Top <Int32>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSphereCertificate
        -CatalogName <String>
        -ResourceGroupName <String>
        -SerialNumber <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzSphereCertificate
        -SerialNumber <String>
        -CatalogInputObject <ISphereIdentity>
