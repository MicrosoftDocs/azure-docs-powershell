examples:
- title: 'Example 1: Modify an ANF pool'
  description: |-
    ```powershell
    Update-AzNetAppFilesPool -ResourceGroupName "MyRG" -Location "westus2" -AccountName "MyAnfAccount" -PoolName "MyAnfPool" -PoolSize 4398046511104 -QosType "Auto"
    ```

    ```output
    Location          : westus2
    Id                : /subscriptions/subsId/resourceGroups/MyRG/providers/Microsoft.NetApp/netAppAccounts/MyAnfAccount/capacityPools/MyAnfPool
    Name              : MyAnfAccount/MyAnfPool
    Type              : Microsoft.NetApp/netAppAccounts/capacityPools
    Tags              :
    PoolId            : 9fa2ca6d-1e48-4439-30e3-7de056e44e5a
    Size              : 4398046511104
    ServiceLevel      : Standard
    QosType			  : Auto
    ProvisioningState : Succeeded
    ```

    This command changes the ANF pool "MyAnfPool" to have the given size and QosType.
