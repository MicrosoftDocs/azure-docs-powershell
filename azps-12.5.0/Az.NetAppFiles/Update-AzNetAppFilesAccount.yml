syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNetAppFilesAccount
        -ResourceGroupName <String>
        -Name <String>
        [-Location <String>]
        [-ActiveDirectory <PSNetAppFilesActiveDirectory[]>]
        [-Encryption <PSNetAppFilesAccountEncryption>]
        [-EncryptionKeySource <String>]
        [-KeyVaultKeyName <String>]
        [-KeyVaultResourceId <String>]
        [-KeyVaultUri <String>]
        [-IdentityType <String>]
        [-UserAssignedIdentity <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzNetAppFilesAccount
        -ResourceGroupName <String>
        -Name <String>
        -ResourceId <String>
        [-Location <String>]
        [-ActiveDirectory <PSNetAppFilesActiveDirectory[]>]
        [-Encryption <PSNetAppFilesAccountEncryption>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceIdParameterSet
  isDefault: false
- syntax: |-
