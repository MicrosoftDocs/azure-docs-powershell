syntaxes:
- syntax: |-
    ```Syntax
    Get-AzNetAppFilesBackup
        -ResourceGroupName <String>
        -AccountName <String>
        [-PoolName <String>]
        [-VolumeName <String>]
        [-BackupVaultName <String>]
        [-Name <String>]
        [-Filter <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzNetAppFilesBackup
        -ResourceGroupName <String>
        -AccountName <String>
        [-AccountBackupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByAccountBackupFieldsParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzNetAppFilesBackup
        -BackupVaultObject <PSNetAppFilesBackupVault>
        [-Name <String>]
        [-AccountBackupName <String>]
        [-VolumeObject <PSNetAppFilesVolume>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByParentObjectParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzNetAppFilesBackup
        -ResourceId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceIdParameterSet
  isDefault: false
