syntaxes:
- syntax: |-
    ```Syntax
    Set-AzNetAppFilesBackupPolicy
        -ResourceGroupName <String>
        -Location <String>
        -AccountName <String>
        -Name <String>
        [-Enabled]
        [-DailyBackupsToKeep <Int32>]
        [-WeeklyBackupsToKeep <Int32>]
        [-MonthlyBackupsToKeep <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzNetAppFilesBackupPolicy
        -Name <String>
        -AccountObject <PSNetAppFilesAccount>
        [-Enabled]
        [-DailyBackupsToKeep <Int32>]
        [-WeeklyBackupsToKeep <Int32>]
        [-MonthlyBackupsToKeep <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByParentObjectParameterSet
  isDefault: false
- syntax: |-
