syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetAppFilesVolumeQuotaRule
        -ResourceGroupName <String>
        -Location <String>
        -AccountName <String>
        -PoolName <String>
        -VolumeName <String>
        -Name <String>
        -QuotaSize <Int32>
        -QuotaType <String>
        [-Tag <Hashtable>]
        [-QuotaTarget <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzNetAppFilesVolumeQuotaRule
        -Name <String>
        -QuotaSize <Int32>
        -QuotaType <String>
        -VolumeObject <PSNetAppFilesVolume>
        [-Tag <Hashtable>]
        [-QuotaTarget <String>]
        [-DefaultProfile <IAzureContextContainer>]
