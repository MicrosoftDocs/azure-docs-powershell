### YamlMime:PowerShellCmdlet1
uid: Az.Synapse.Submit-AzSynapseSparkJob
name: Submit-AzSynapseSparkJob
module: Az.Synapse
isPreview: false
summary: |-
  Submits a Synapse Analytics Spark job.
description: |-
  The **Submit-AzSynapseSparkJob** cmdlet submits a Synapse Analytics Spark job.
parameters:
