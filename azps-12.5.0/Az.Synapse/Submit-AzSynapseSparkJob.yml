    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The main file used for the job.
      e.g.
      "abfss://filesystem@account.dfs.core.windows.net/mySpark.jar"
    defaultValue: None
    dontShow: false
