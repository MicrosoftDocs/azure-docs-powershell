syntaxes:
- syntax: |-
    ```Syntax
    Reset-AzSynapseSqlPoolAuditSetting
        [[-ResourceGroupName] <String>]
        [-WorkspaceName] <String>
        -SqlPoolName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SqlPoolParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Reset-AzSynapseSqlPoolAuditSetting
        -WorkspaceObject <PSSynapseWorkspace>
