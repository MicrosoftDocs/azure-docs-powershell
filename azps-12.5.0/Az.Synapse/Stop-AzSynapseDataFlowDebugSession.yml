syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzSynapseDataFlowDebugSession
        -WorkspaceName <String>
        -SessionId <String>
        [-PassThru]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopByName
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzSynapseDataFlowDebugSession
        -WorkspaceObject <PSSynapseWorkspace>
        -SessionId <String>
        [-PassThru]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StoptByObject
  isDefault: false
