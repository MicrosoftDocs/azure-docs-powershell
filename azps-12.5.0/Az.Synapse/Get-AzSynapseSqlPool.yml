uid: Az.Synapse.Get-AzSynapseSqlPool
name: Get-AzSynapseSqlPool
module: Az.Synapse
isPreview: false
summary: |-
  Gets a Synapse Analytics SQL pool.
description: |-
  The **Get-AzSynapseSqlPool** cmdlet gets information about an Azure Synapse Analytics SQL pool.
