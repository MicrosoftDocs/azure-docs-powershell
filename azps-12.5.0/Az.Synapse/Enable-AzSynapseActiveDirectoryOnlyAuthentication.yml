syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzSynapseActiveDirectoryOnlyAuthentication
        -WorkspaceName <String>
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnableByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Enable-AzSynapseActiveDirectoryOnlyAuthentication
        -WorkspaceObject <PSSynapseWorkspace>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnableByParentObjectParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-AzSynapseActiveDirectoryOnlyAuthentication
        -ResourceId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnableByResourceIdParameterSet
  isDefault: false
