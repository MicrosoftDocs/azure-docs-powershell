uid: Az.Synapse.New-AzSynapseManagedVirtualNetworkConfig
name: New-AzSynapseManagedVirtualNetworkConfig
module: Az.Synapse
isPreview: false
summary: |-
  Creates managed virtual network configuration.
description: |-
  This **New-AzSynapseManagedVirtualNetworkConfig** cmdlets creates a managed virtual network configuration.
