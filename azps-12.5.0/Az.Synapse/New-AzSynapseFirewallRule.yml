uid: Az.Synapse.New-AzSynapseFirewallRule
name: New-AzSynapseFirewallRule
module: Az.Synapse
isPreview: false
summary: |-
  Creates a Synapse Analytics Firewall Rule.
description: |-
  The **New-AzSynapseFirewallRule** cmdlet creates an Azure Synapse Analytics Firewall Rule.
