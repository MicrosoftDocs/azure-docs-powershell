syntaxes:
- syntax: |-
    ```Syntax
    New-AzSynapseFirewallRule
        -WorkspaceName <String>
        -Name <String>
        -StartIpAddress <String>
        -EndIpAddress <String>
        [-ResourceGroupName <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzSynapseFirewallRule
        -WorkspaceName <String>
        [-ResourceGroupName <String>]
