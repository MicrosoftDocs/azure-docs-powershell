examples:
- title: 'Example 1: Create a Kusto pool principalAssignment'
  description: |-
    ```powershell
    New-AzSynapseKustoPoolPrincipalAssignment -ResourceGroupName testrg -WorkspaceName testws -KustoPoolName testnewkustopool -PrincipalAssignmentName kustoprincipal -PrincipalId "aaaaaaaa-bbbb-cccc-1111-222222222222" -PrincipalType App -Role AllDatabasesAdmin
    ```

    ```output
    Name                                   Type
    ----                                   ----
    testws/testnewkustopool/kustoprincipal Microsoft.Synapse/workspaces/kustoPools/PrincipalAssignments
    ```

    The above command creates a Kusto pool principalAssignment
