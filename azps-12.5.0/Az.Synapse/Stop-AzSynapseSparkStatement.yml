syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzSynapseSparkStatement
        -WorkspaceName <String>
        -SparkPoolName <String>
        -LivyId <Int32>
        -SessionId <Int32>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopSparkStatementByIdParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzSynapseSparkStatement
        -SessionObject <PSSynapseSparkSession>
        -LivyId <Int32>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopSparkStatementByIdFromParentObjectParameterSet
  isDefault: false
