syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzSynapseFirewallRule
        -WorkspaceName <String>
        -Name <String>
        [-ResourceGroupName <String>]
        [-PassThru]
        [-AsJob]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzSynapseFirewallRule
        -Name <String>
        -WorkspaceObject <PSSynapseWorkspace>
        [-PassThru]
        [-AsJob]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
