syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSynapseWorkspaceKey
        -WorkspaceName <String>
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSynapseWorkspaceKey
        -WorkspaceObject <PSSynapseWorkspace>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
