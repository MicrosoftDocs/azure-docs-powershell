syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzSynapsePipeline
        -WorkspaceName <String>
        -PipelineName <String>
        [-Parameter <Hashtable>]
        [-ParameterFile <String>]
        [-ReferencePipelineRunId <String>]
        [-IsRecovery]
        [-StartActivityName <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NewByName
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzSynapsePipeline
        -InputObject <PSPipelineResource>
        [-Parameter <Hashtable>]
        [-ParameterFile <String>]
        [-ReferencePipelineRunId <String>]
        [-IsRecovery]
        [-StartActivityName <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NewByInputObject
  isDefault: false
- syntax: |-
    ```Syntax
    Invoke-AzSynapsePipeline
        -WorkspaceObject <PSSynapseWorkspace>
        -PipelineName <String>
        [-Parameter <Hashtable>]
        [-ParameterFile <String>]
        [-ReferencePipelineRunId <String>]
        [-IsRecovery]
        [-StartActivityName <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NewByObject
  isDefault: false
