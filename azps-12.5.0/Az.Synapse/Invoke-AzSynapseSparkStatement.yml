syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzSynapseSparkStatement
        -WorkspaceName <String>
        -SparkPoolName <String>
        -Language <String>
        -SessionId <Int32>
        -FilePath <String>
        [-Response]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RunSparkStatementByCodePathParameterSet
  isDefault: true
