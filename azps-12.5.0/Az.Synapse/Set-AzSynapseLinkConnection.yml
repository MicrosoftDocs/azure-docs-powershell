syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSynapseLinkConnection
        -WorkspaceName <String>
        -Name <String>
        -DefinitionFile <String>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSynapseLinkConnection
        -WorkspaceObject <PSSynapseWorkspace>
        -Name <String>
        -DefinitionFile <String>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
