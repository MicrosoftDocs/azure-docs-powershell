syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzSynapseManagedPrivateEndpoint
        -WorkspaceName <String>
        -Name <String>
        [-VirtualNetworkName <String>]
        [-PassThru]
        [-AsJob]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzSynapseManagedPrivateEndpoint
        -WorkspaceObject <PSSynapseWorkspace>
        -Name <String>
        [-VirtualNetworkName <String>]
        [-PassThru]
        [-AsJob]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByObject
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzSynapseManagedPrivateEndpoint
        -InputObject <PSManagedPrivateEndpointResource>
        [-VirtualNetworkName <String>]
        [-PassThru]
        [-AsJob]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
