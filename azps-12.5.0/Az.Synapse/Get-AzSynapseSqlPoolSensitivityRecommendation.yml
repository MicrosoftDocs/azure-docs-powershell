syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSynapseSqlPoolSensitivityRecommendation
        -SqlPoolObject <PSSynapseSqlPool>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SqlPoolObjectParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSynapseSqlPoolSensitivityRecommendation
        [-ResourceGroupName] <String>
        [-WorkspaceName] <String>
        [-SqlPoolName] <String>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SqlPoolParameterSet
