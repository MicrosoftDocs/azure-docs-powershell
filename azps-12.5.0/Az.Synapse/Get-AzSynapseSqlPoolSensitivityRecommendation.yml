examples:
- title: 'Example 1: Get recommended information types and sensitivity labels of an Azure Synapse SQL pool.'
  description: |-
    ```powershell
    Get-AzSynapseSqlPoolSensitivityRecommendation -ResourceGroupName ContosoResourceGroup -WorkspaceName ContosoWorkspace -SqlPoolName ContosoSqlPool
    ```

    ```output
    ResourceGroupName : ContosoResourceGroup
    WorkspaceName        : ContosoWorkspace
    SqlPoolName      : ContosoSqlPool
    SensitivityLabels : {{
                            SchemaName: dbo,
                            TableName: Report,
                            ColumnName: ReportEmailBody,
                            InformationType: Contact Info
                        }, {
                            SchemaName: dbo,
                            TableName: Report,
                            ColumnName: ReportEmailSubject,
                            SensitivityLabel: Confidential,
                            Rank: Medium
                        }, {
                            SchemaName: dbo,
                            TableName: EMailLog,
                            ColumnName: BounceEmailSubject,
                            SensitivityLabel: Confidential,
                            InformationType: Contact Info,
                            Rank: Medium
                        }}
    ```
- title: 'Example 2: Get recommended information types and sensitivity labels of an Azure Synapse SQL pool using Piping.'
  description: |-
    ```powershell
    Get-AzSynapseSqlPool -ResourceGroupName ContosoResourceGroup -WorkspaceName ContosoWorkspace -Name ContosoSqlPool | Get-AzSynapseSqlPoolSensitivityRecommendation
    ```

    ```output
    ResourceGroupName : ContosoResourceGroup
    WorkspaceName        : ContosoWorkspace
    SqlPoolName      : ContosoSqlPool
    SensitivityLabels : {{
                            SchemaName: dbo,
                            TableName: Report,
                            ColumnName: ReportEmailBody,
                            InformationType: Contact Info
                        }, {
                            SchemaName: dbo,
                            TableName: Report,
                            ColumnName: ReportEmailSubject,
                            SensitivityLabel: Confidential,
                            Rank: Medium
                        }, {
                            SchemaName: dbo,
                            TableName: EMailLog,
                            ColumnName: BounceEmailSubject,
                            SensitivityLabel: Confidential,
                            InformationType: Contact Info,
                            Rank: Medium
                        }}
    ```
