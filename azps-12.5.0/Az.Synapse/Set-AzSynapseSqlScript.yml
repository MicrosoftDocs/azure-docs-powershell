syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSynapseSqlScript
        -WorkspaceName <String>
        -DefinitionFile <String>
        [-Name <String>]
        [-ResultLimit <Int32>]
        [-FolderPath <String>]
        [-Description <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSynapseSqlScript
        -WorkspaceName <String>
        -SqlPoolName <String>
        -SqlDatabaseName <String>
        -DefinitionFile <String>
        [-Name <String>]
        [-ResultLimit <Int32>]
        [-FolderPath <String>]
        [-Description <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByNameAndSqlPool
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzSynapseSqlScript
        -WorkspaceObject <PSSynapseWorkspace>
        -DefinitionFile <String>
        [-Name <String>]
        [-ResultLimit <Int32>]
        [-FolderPath <String>]
        [-Description <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByObject
