    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSynapseActiveDirectoryOnlyAuthentication
        -WorkspaceName <String>
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSynapseActiveDirectoryOnlyAuthentication
        -WorkspaceObject <PSSynapseWorkspace>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByParentObjectParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzSynapseActiveDirectoryOnlyAuthentication
        -ResourceId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByResourceIdParameterSet
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSSynapseWorkspace" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSAzureADOnlyAuthentication" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzSynapseActiveDirectoryOnlyAuthentication -WorkspaceName ContosoWorkspace
    ```

    ```output
    WorkspaceName     AzureADOnlyAuthenticationProperty State      CreationDate
    -------------     --------------------------------- -----      ------------
    ContosoWorkspace                               True Consistent 3/23/2022 8:27:47 AM
    ```

    This command gets Microsoft Entra-only authentication status for Synapse workspace ContosoWorkspace.
- title: Example 2
  description: |-
    ```powershell
    $ws = Get-AzSynapseWorkspace -Name ContosoWorkspace
    $ws | Get-AzSynapseActiveDirectoryOnlyAuthentication
    ```

    ```output
    WorkspaceName     AzureADOnlyAuthenticationProperty State      CreationDate
    -------------     --------------------------------- -----      ------------
    ContosoWorkspace                               True Consistent 3/23/2022 8:27:47 AM
    ```

    This command gets Microsoft Entra-only authentication status for Synapse workspace ContosoWorkspace through pipeline.
- title: Example 3
  description: |-
    ```powershell
    Get-AzSynapseActiveDirectoryOnlyAuthentication -ResourceId /subscriptions/a0a0a0a0-bbbb-cccc-dddd-e1e1e1e1e1e1/resourceGroups/ContosoResourceGroup/providers/Microsoft.Synapse/workspaces/ContosoWorkspace
    ```

    ```output
    WorkspaceName     AzureADOnlyAuthenticationProperty State      CreationDate
    -------------     --------------------------------- -----      ------------
    ContosoWorkspace                               True Consistent 3/23/2022 8:27:47 AM
    ```

    This command gets Microsoft Entra-only authentication for workspace ContosoWorkspace by ResourceId.
