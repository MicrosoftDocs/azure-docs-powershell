### YamlMime:PowerShellCmdlet1
uid: Az.Synapse.Get-AzSynapseActiveDirectoryOnlyAuthentication
name: Get-AzSynapseActiveDirectoryOnlyAuthentication
module: Az.Synapse
isPreview: false
summary: |-
  Gets Microsoft Entra-only authentication for a specific Synapse workspace.
description: |-
  The **Get-AzSynapseActiveDirectoryOnlyAuthentication** cmdlet gets Microsoft Entra-only authentication for a specific Synapse workspace.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Resource group name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByNameParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Resource identifier of Synapse workspace.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByResourceIdParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WorkspaceName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of Synapse workspace.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByNameParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WorkspaceObject
    type: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSSynapseWorkspace" data-throw-if-not-resolved="False" />
    description: |-
      workspace input object, usually passed through the pipeline.
