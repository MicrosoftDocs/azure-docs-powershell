syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzSynapseKustoPoolDataConnection
        -DataConnectionName <String>
        -DatabaseName <String>
        -KustoPoolName <String>
        -ResourceGroupName <String>
        -WorkspaceName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzSynapseKustoPoolDataConnection
        -InputObject <ISynapseIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteViaIdentity
  isDefault: false
