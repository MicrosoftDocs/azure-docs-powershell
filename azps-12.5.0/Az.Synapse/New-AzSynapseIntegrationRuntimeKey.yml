syntaxes:
- syntax: |-
    ```Syntax
    New-AzSynapseIntegrationRuntimeKey
        -WorkspaceName <String>
        -Name <String>
        -KeyName <String>
        [-ResourceGroupName <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
