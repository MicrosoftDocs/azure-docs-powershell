examples:
- title: Example 1
  description: |-
    ```powershell
    New-AzSynapseIntegrationRuntimeKey -WorkspaceName ContosoWorkspace -Name 'test-selfhost-ir' -KeyName authKey2
    ```

    The cmdlet regenerates key 'authKey2' for integration runtime named 'test-selfhost-ir'.
