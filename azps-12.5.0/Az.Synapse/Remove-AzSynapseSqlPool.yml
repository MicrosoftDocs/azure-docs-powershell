syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzSynapseSqlPool
        -WorkspaceName <String>
        -Name <String>
        [-ResourceGroupName <String>]
        [-Version <Int32>]
        [-PassThru]
        [-AsJob]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzSynapseSqlPool
        -Name <String>
        -WorkspaceObject <PSSynapseWorkspace>
        [-Version <Int32>]
        [-PassThru]
        [-AsJob]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteByParentObjectParameterSet
  isDefault: false
- syntax: |-
