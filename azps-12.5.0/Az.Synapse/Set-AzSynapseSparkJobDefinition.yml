syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSynapseSparkJobDefinition
        -WorkspaceName <String>
        -Name <String>
        -DefinitionFile <String>
        [-FolderPath <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSynapseSparkJobDefinition
        -WorkspaceObject <PSSynapseWorkspace>
        -Name <String>
        -DefinitionFile <String>
        [-FolderPath <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByObject
  isDefault: false
