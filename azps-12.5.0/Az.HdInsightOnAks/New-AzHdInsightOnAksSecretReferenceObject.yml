syntaxes:
- syntax: |-
    ```Syntax
    New-AzHdInsightOnAksSecretReferenceObject
        -ReferenceName <String>
        -SecretName <String>
        -Type <String>
        [-Version <String>]
        [<CommonParameters>]
    ```
