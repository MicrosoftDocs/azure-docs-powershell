syntaxes:
- syntax: |-
    ```Syntax
    Get-AzHdInsightOnAksClusterJob
        -ClusterName <String>
        -ClusterPoolName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-Filter <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
