  Create an in-memory object for ClusterServiceConfig.
description: |-
  Create an in-memory object for ClusterServiceConfig.
parameters:
  cmdletParameters:
  - name: ComponentName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of the component the config files should apply to.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: File
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.HdInsightOnAks.Models.IClusterConfigFile" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of Config Files.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
