syntaxes:
- syntax: |-
    ```Syntax
    Update-AzMariaDbServer
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ReplicationRole <String>]
        [-AdministratorLoginPassword <SecureString>]
        [-SslEnforcement <SslEnforcementEnum>]
        [-BackupRetentionDay <Int32>]
        [-GeoRedundantBackup <GeoRedundantBackup>]
        [-StorageAutogrow <StorageAutogrow>]
        [-StorageInMb <Int32>]
        [-Sku <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ServerName
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzMariaDbServer
        -InputObject <IMariaDbIdentity>
        [-ReplicationRole <String>]
        [-AdministratorLoginPassword <SecureString>]
        [-SslEnforcement <SslEnforcementEnum>]
        [-BackupRetentionDay <Int32>]
        [-GeoRedundantBackup <GeoRedundantBackup>]
        [-StorageAutogrow <StorageAutogrow>]
        [-StorageInMb <Int32>]
        [-Sku <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ServerObject
  isDefault: false
