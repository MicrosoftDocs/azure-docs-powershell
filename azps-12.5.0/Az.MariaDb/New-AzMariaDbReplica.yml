syntaxes:
- syntax: |-
    ```Syntax
    New-AzMariaDbReplica
        -ReplicaName <String>
        -MasterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Location <String>]
        [-Sku <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ServerName
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzMariaDbReplica
        -ReplicaName <String>
        -Master <IServer>
        [-SubscriptionId <String>]
        [-Location <String>]
        [-Sku <String>]
        [-Tag <Hashtable>]
