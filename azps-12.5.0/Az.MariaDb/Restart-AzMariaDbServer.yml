syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzMariaDbServer
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ServerName
  isDefault: true
- syntax: |-
    ```Syntax
    Restart-AzMariaDbServer
        -InputObject <IMariaDbIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ServerObject
  isDefault: false
