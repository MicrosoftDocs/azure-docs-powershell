uid: Az.Attestation.Reset-AzAttestationPolicy
name: Reset-AzAttestationPolicy
module: Az.Attestation
isPreview: false
summary: |-
  Resets the policy from a tenant in Azure Attestation.
description: |-
  The Reset-AzAttestationPolicy cmdlet resets the user defined attestation policy from a tenant in Azure Attestation.
