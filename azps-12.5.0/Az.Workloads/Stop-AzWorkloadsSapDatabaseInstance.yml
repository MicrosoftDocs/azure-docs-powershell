examples:
- title: 'Example 1: Stop Database instance of the SAP system'
  description: |-
    ```powershell
    Stop-AzWorkloadsSapDatabaseInstance -Name db0 -ResourceGroupName db0-vis-rg -SapVirtualInstanceName DB0
    ```

    ```output
