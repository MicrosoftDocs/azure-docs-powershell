syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzWorkloadsSapCentralInstance
        -Name <String>
        -ResourceGroupName <String>
        -SapVirtualInstanceName <String>
        [-SubscriptionId <String>]
        [-DeallocateVM]
        [-SoftStopTimeoutSecond <Int64>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzWorkloadsSapCentralInstance
        -InputObject <ISapVirtualInstanceIdentity>
        [-DeallocateVM]
        [-SoftStopTimeoutSecond <Int64>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopViaIdentityExpanded
  isDefault: false
