syntaxes:
- syntax: |-
    ```Syntax
    Update-AzWorkloadsSapVirtualInstance
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-ManagedResourcesNetworkAccessType <ManagedResourcesNetworkAccessType>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzWorkloadsSapVirtualInstance
        -InputObject <ISapVirtualInstanceIdentity>
        [-IdentityType <ManagedServiceIdentityType>]
        [-ManagedResourcesNetworkAccessType <ManagedResourcesNetworkAccessType>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
