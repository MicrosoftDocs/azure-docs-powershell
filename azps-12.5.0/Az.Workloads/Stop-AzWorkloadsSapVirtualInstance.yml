syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzWorkloadsSapVirtualInstance
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DeallocateVM]
        [-SoftStopTimeoutSecond <Int64>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzWorkloadsSapVirtualInstance
        -InputObject <ISapVirtualInstanceIdentity>
        [-DeallocateVM]
        [-SoftStopTimeoutSecond <Int64>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopViaIdentityExpanded
  isDefault: false
