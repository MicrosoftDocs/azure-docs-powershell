uid: Az.Workloads.Stop-AzWorkloadsSapVirtualInstance
name: Stop-AzWorkloadsSapVirtualInstance
module: Az.Workloads
isPreview: false
summary: |-
  Stops the SAP Application, that is the Application server instances and Central Services instance.
description: |-
  Stops the SAP Application, that is the Application server instances and Central Services instance.
notes: |-
