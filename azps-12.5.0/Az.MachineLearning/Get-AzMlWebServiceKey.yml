### YamlMime:PowerShellCmdlet1
uid: Az.MachineLearning.Get-AzMlWebServiceKey
name: Get-AzMlWebServiceKey
module: Az.MachineLearning
isPreview: false
summary: |-
  Retrieves the web service's keys.
description: |-
  Gets the access keys for the Azure Machine Learning web service's runtime APIs.
notes: |-
  Keywords: azure, azurerm, arm, resource, management, manager, machine, machine learning, azureml
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MlWebService
    type: <xref href="Microsoft.Azure.Management.MachineLearning.WebServices.Models.WebService" data-throw-if-not-resolved="False" />
    description: |-
      The name of the web service for which the access keys are retrieved.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByInstance
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
