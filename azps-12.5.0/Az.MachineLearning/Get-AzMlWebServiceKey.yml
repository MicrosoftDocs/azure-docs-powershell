syntaxes:
- syntax: |-
    ```Syntax
    Get-AzMlWebServiceKey
        -ResourceGroupName <String>
        -Name <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByNameAndResourceGroup
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzMlWebServiceKey
        -MlWebService <WebService>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByInstance
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Management.MachineLearning.WebServices.Models.WebService" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Management.MachineLearning.WebServices.Models.WebServiceKeys" data-throw-if-not-resolved="False" />
examples:
- title: Example 1 - Get the keys for a web service specified by resource group and name
  description: |-
    ```powershell
    Get-AzMlWebServiceKey -ResourceGroupName "myresourcegroup" -Name "mywebservicename"
    ```
- title: Example 2 - Get keys for web service instance
  description: |-
    ```powershell
    Get-AzMlWebServiceKey -MlWebService $mlService
    ```

    $mlService is an object of type Microsoft.Azure.Management.MachineLearning.WebServices.Models.WebService.
