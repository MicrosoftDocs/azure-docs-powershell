examples:
- title: 'Example 1: Get details of specific web service'
  description: |-
    ```powershell
    Get-AzMlWebService -ResourceGroupName "myresourcegroup" -Name "mywebservicename"
    ```
- title: 'Example 2: Get all web service resources in current subscription'
  description: |-
    ```powershell
    Get-AzMlWebService
    ```
- title: 'Example 3: Get all web services in the current subscription and given resource group'
  description: |-
    ```powershell
    Get-AzMlWebService -ResourceGroupName "myresourcegroup"
    ```
