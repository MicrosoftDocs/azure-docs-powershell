syntaxes:
- syntax: |-
    ```Syntax
    New-AzMlWebService
        -ResourceGroupName <String>
        -Location <String>
        -Name <String>
        -DefinitionFile <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateFromFile
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzMlWebService
        -ResourceGroupName <String>
        -Location <String>
        -Name <String>
        -NewWebServiceDefinition <WebService>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateFromInstance
  isDefault: false
