syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzKustoDatabasePrincipal
        -ClusterName <String>
        -DatabaseName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Value <IDatabasePrincipal[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzKustoDatabasePrincipal
        -InputObject <IKustoIdentity>
        [-Value <IDatabasePrincipal[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveViaIdentityExpanded
  isDefault: false
