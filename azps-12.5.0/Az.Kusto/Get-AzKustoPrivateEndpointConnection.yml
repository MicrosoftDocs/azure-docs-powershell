examples:
- title: 'Example 1: List all Kusto PrivateEndpointConnection in a cluster by name'
  description: |-
    ```powershell
    Get-AzKustoPrivateEndpointConnection -ClusterName "mycluster" -ResourceGroupName "testrg" -SubscriptionId "aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e"
    ```

    ```output
    Name                                                       Type
    ----                                                       ----
    privateEndpointConnectionName1                             Microsoft.Kusto/Clusters/PrivateEndpointConnections
    privateEndpointConnectionName2                             Microsoft.Kusto/Clusters/PrivateEndpointConnections
    ```

    The above command returns all Kusto PrivateEndpointConnection in the cluster "mycluster" found in the resource group "testrg".
- title: 'Example 2: Get a specific Kusto PrivateEndpointConnection by name'
  description: |-
    ```powershell
    Get-AzKustoPrivateEndpointConnection -ClusterName "mycluster" -ResourceGroupName "testrg" -SubscriptionId "aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e" -Name "privateEndpointConnectionName"
    ```

    ```output
    Name                                                       Type
    ----                                                       ----
    privateEndpointConnectionName                              Microsoft.Kusto/Clusters/PrivateEndpointConnections
    ```

    The above command returns the Kusto PrivateEndpointConnection named "privateEndpointConnectionName" in the cluster "mycluster" found in the resource group "testrg".
