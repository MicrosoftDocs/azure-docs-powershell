    ```Syntax
    New-AzCostManagementDetailReport
        -Scope <String>
        [-BillingPeriod <String>]
        [-InvoiceId <String>]
        [-Metric <CostDetailsMetricType>]
        [-TimePeriodEnd <String>]
        [-TimePeriodStart <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
