syntaxes:
- syntax: |-
    ```Syntax
    New-AzCostManagementQueryFilterObject
        [-And <IQueryFilter[]>]
        [-Dimensions <IQueryComparisonExpression>]
        [-Not <IQueryFilter>]
        [-Or <IQueryFilter[]>]
        [-Tag <IQueryComparisonExpression>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
