syntaxes:
- syntax: |-
    ```Syntax
    New-AzSelfHelpSolution
        -ResourceName <String>
        -Scope <String>
        [-Parameter <Hashtable>]
        [-TriggerCriterion <ITriggerCriterion[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
