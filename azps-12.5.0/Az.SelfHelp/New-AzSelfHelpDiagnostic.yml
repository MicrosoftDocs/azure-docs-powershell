syntaxes:
- syntax: |-
    ```Syntax
    New-AzSelfHelpDiagnostic
        -SResourceName <String>
        -Scope <String>
        [-GlobalParameter <Hashtable>]
        [-Insight <IDiagnosticInvocation[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
