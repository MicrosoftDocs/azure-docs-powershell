syntaxes:
- syntax: |-
    ```Syntax
    Update-AzAksArcNodepool
        -ClusterName <String>
        -ResourceGroupName <String>
        -Name <String>
        [-SubscriptionId <String>]
        [-Count <Int32>]
        [-NodeLabel <Hashtable>]
        [-NodeTaint <String[]>]
        [-VMSize <String>]
        [-Tag <Hashtable>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzAksArcNodepool
        -ClusterName <String>
        -ResourceGroupName <String>
        -Name <String>
        -InputObject <IAksArcIdentity>
        [-SubscriptionId <String>]
        [-Count <Int32>]
        [-NodeLabel <Hashtable>]
