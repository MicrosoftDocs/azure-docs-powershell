- syntax: |-
    ```Syntax
    Get-AzPrivateDnsVirtualNetworkLink
        -ResourceGroupName <String>
        -ZoneName <String>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
