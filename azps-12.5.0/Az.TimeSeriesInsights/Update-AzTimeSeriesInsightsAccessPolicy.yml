syntaxes:
- syntax: |-
    ```Syntax
    Update-AzTimeSeriesInsightsAccessPolicy
        -EnvironmentName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Description <String>]
        [-Role <AccessPolicyRole[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzTimeSeriesInsightsAccessPolicy
        -InputObject <ITimeSeriesInsightsIdentity>
        [-Description <String>]
        [-Role <AccessPolicyRole[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
