syntaxes:
- syntax: |-
    ```Syntax
    Update-AzLabServicesQuota
        -Lab <Lab>
        -LabQuota <TimeSpan>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Lab
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzLabServicesQuota
        -ResourceGroupName <String>
        -LabName <String>
        -LabQuota <TimeSpan>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
