examples:
- title: 'Example 1: Gets all the Virtual machines in the lab.'
  description: |-
    ```powershell
    Get-AzLabServicesVM -LabName "Lab Name" -ResourceGroupName "Group Name"
    ```

    ```output
    Name
    ----
    0
    1
    2
    ```

    Returns all the VMs.
- title: 'Example 2: Gets the specific VM in the lab.'
  description: |-
    ```powershell
    Get-AzLabServicesVM -LabName "Lab Name" -ResourceGroupName "Group Name" -Name 2
    ```

    ```output
    Name
    ----
    2
    ```

    Returns the specific VM.
