    Name    ProvisioningState SingleSignOnState SingleSignOnUrl             ResourceGroupName
    ----    ----------------- ----------------- ---------------             -----------------
    default Succeeded         Disable           https://app.logz.io/        logz-rg-test
    ```

    This command configures single-sign-on for this resource.
