syntaxes:
- syntax: |-
    ```Syntax
    Update-AzLogzMonitor
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-MonitoringStatus <MonitoringStatus>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzLogzMonitor
        -InputObject <ILogzIdentity>
        [-MonitoringStatus <MonitoringStatus>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
