syntaxes:
- syntax: |-
    ```Syntax
    New-AzLogzSubAccount
        -MonitorName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        [-CompanyName <String>]
        [-EnterpriseAppId <String>]
        [-IdentityType <ManagedIdentityTypes>]
        [-MarketplaceSubscriptionStatus <MarketplaceSubscriptionStatus>]
        [-MonitoringStatus <MonitoringStatus>]
        [-PlanBillingCycle <String>]
        [-PlanDetail <String>]
        [-PlanEffectiveDate <DateTime>]
        [-PlanUsageType <String>]
        [-SingleSignOnUrl <String>]
        [-Tag <Hashtable>]
        [-UserInfoEmailAddress <String>]
        [-UserInfoFirstName <String>]
        [-UserInfoLastName <String>]
        [-UserInfoPhoneNumber <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
