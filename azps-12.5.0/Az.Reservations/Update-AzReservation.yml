        [-InstanceFlexibility <InstanceFlexibility>]
        [-Name <String>]
        [-Renew]
        [-RenewProperty <IPatchPropertiesRenewProperties>]
        [-ReviewDateTime <DateTime>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
