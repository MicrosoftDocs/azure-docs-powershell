        [-DisplayName <String>]
        [-InstanceFlexibility <InstanceFlexibility>]
        [-Location <String>]
        [-Quantity <Int32>]
        [-Renew]
        [-ReservedResourceType <ReservedResourceType>]
        [-ReviewDateTime <DateTime>]
        [-Sku <String>]
        [-Term <ReservationTerm>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
