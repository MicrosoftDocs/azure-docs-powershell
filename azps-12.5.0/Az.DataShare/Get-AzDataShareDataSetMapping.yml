### YamlMime:PowerShellCmdlet1
uid: Az.DataShare.Get-AzDataShareDataSetMapping
name: Get-AzDataShareDataSetMapping
module: Az.DataShare
isPreview: false
summary: |-
  Gets information about dataset mappings in share subscription
description: |-
  The **Get-AzDataShareDataSetMapping** cmdlet gets information about a particular dataset mapping if the name is specified. Otherwise, it gets information about all the dataset mappings in a share subscription.
parameters:
  cmdletParameters:
  - name: AccountName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the Azure storage account that is the source of the data being shared.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFieldsParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Azure data set mapping name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFieldsParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The resource group name of azure data share account.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByFieldsParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The resource id of the azure data set mapping.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByResourceIdParameterSet
      position: Named
      isRequired: true
