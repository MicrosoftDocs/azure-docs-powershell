examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzDataShareDataSet -ResourceGroupName "ADS" -AccountName "WikiAds" -ShareName "AdsShare" -Name "AdsDataSet"
    ```

    ```output
    ContainerName  : AdsContainer
    DataSetId      : d2411889-5357-4ca8-8d65-9363e46ef2ed
    ResourceGroup  : ADS
    SubscriptionId : aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e
    StorageAccount : AdsStorage
    Id             : /subscriptions/aaaa0a0a-bb1b-cc2c-dd3d-eeeeee4e4e4e/resourceGroups/ADS/providers/Microsoft.DataShare/accounts/shelltest/shares/share4/dataSets/AdsDataSet
    Name           : AdsDataSet
    Type           : Microsoft.DataShare/DataSets
    ```

    This command displays information about data set AdsDataSet in share AdsShare in Azure data share account WikiAdsAccount and resource group ADS.
