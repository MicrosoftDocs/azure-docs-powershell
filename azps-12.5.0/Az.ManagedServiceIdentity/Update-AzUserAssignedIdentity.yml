syntaxes:
- syntax: |-
    ```Syntax
    Update-AzUserAssignedIdentity
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Location <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzUserAssignedIdentity
        -InputObject <IManagedServiceIdentity>
        [-Location <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
