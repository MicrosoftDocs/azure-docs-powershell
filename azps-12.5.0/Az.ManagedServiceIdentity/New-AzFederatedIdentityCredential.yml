syntaxes:
- syntax: |-
    ```Syntax
    New-AzFederatedIdentityCredential
        -IdentityName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Audience <String[]>]
        [-Issuer <String>]
        [-Subject <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
