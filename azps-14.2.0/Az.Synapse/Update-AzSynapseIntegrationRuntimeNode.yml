    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      The number of concurrent jobs permitted to run on the integration runtime node.
      Values between 1 and maxConcurrentJobs are allowed.
    defaultValue: None
    dontShow: false
