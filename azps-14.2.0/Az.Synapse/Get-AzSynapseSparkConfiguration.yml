### YamlMime:PowerShellCmdlet1
uid: Az.Synapse.Get-AzSynapseSparkConfiguration
name: Get-AzSynapseSparkConfiguration
module: Az.Synapse
isPreview: false
summary: |-
  Gets information about spark configurations in a workspace.
description: |-
  The **Get-AzSynapseSparkConfiguration** cmdlet gets information about spark configurations in a workspace. If you specify the name of a spark configuration, the cmdlet gets information about that spark configuration. If you do not specify a name, the cmdlet gets information about all spark configurations in the workspace.
