syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSynapseSparkConfiguration
        -WorkspaceName <String>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSynapseSparkConfiguration
        -WorkspaceObject <PSSynapseWorkspace>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByObject
  isDefault: false
