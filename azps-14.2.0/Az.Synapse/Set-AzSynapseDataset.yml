syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSynapseDataset
        -WorkspaceName <String>
        -Name <String>
        -DefinitionFile <String>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetByName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSynapseDataset
        -WorkspaceObject <PSSynapseWorkspace>
        -Name <String>
        -DefinitionFile <String>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
