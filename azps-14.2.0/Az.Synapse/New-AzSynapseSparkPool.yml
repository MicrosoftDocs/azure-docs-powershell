### YamlMime:PowerShellCmdlet1
uid: Az.Synapse.New-AzSynapseSparkPool
name: New-AzSynapseSparkPool
module: Az.Synapse
isPreview: false
summary: |-
  Creates a Synapse Analytics Spark pool.
description: |-
  The **New-AzSynapseSparkPool** cmdlet creates an Azure Synapse Analytics Spark pool.
