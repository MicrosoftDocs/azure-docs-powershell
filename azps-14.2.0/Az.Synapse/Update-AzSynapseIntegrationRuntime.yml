syntaxes:
- syntax: |-
    ```Syntax
    Update-AzSynapseIntegrationRuntime
        -WorkspaceName <String>
        -IntegrationRuntimeName <String>
        [-ResourceGroupName <String>]
        [-AutoUpdate <String>]
        [-AutoUpdateDelayOffset <TimeSpan>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzSynapseIntegrationRuntime
        -IntegrationRuntimeName <String>
        -WorkspaceObject <PSSynapseWorkspace>
        [-AutoUpdate <String>]
        [-AutoUpdateDelayOffset <TimeSpan>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateByParentObjectParameterSet
  isDefault: false
- syntax: |-
