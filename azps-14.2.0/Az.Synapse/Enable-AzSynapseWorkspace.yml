    Enable-AzSynapseWorkspace
        -WorkspaceName <String>
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-EncryptionKeyIdentifier <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnableByNameParameterSet
  isDefault: true
- syntax: |-
