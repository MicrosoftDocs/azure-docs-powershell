syntaxes:
- syntax: |-
    ```Syntax
    New-AzSynapseSparkConfiguration
        -WorkspaceName <String>
        -DefinitionFile <String>
        [-Name <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByName
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzSynapseSparkConfiguration
        -WorkspaceObject <PSSynapseWorkspace>
        -DefinitionFile <String>
        [-Name <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByObject
  isDefault: false
