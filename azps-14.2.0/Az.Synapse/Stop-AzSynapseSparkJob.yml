syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzSynapseSparkJob
        -WorkspaceName <String>
        -SparkPoolName <String>
        -LivyId <Int32>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopSparkJobByIdParameterSet
  isDefault: true
- syntax: |-
