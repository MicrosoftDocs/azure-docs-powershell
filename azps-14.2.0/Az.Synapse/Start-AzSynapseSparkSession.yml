syntaxes:
- syntax: |-
    ```Syntax
    Start-AzSynapseSparkSession
        -WorkspaceName <String>
        -SparkPoolName <String>
        -Name <String>
        -ExecutorCount <Int32>
        -ExecutorSize <String>
        [-Language <String>]
        [-ReferenceFile <String[]>]
        [-Configuration <Hashtable>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzSynapseSparkSession
        -SparkPoolObject <PSSynapseSparkPool>
        -Name <String>
        -ExecutorCount <Int32>
        -ExecutorSize <String>
        [-Language <String>]
        [-ReferenceFile <String[]>]
        [-Configuration <Hashtable>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByParentObjectParameterSet
  isDefault: false
