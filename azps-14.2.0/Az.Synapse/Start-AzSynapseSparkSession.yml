uid: Az.Synapse.Start-AzSynapseSparkSession
name: Start-AzSynapseSparkSession
module: Az.Synapse
isPreview: false
summary: |-
  Starts a Synapse Analytics Spark session.
description: |-
  The **Start-AzSynapseSparkSession** cmdlet starts a Synapse Analytics Spark session.
