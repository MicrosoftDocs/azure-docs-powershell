    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSynapseDroppedSqlPool
        -ResourceGroupName <String>
        -WorkspaceName <String>
        [-Name <String>]
        [-DeletionDate <DateTime>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSynapseDroppedSqlPool
        [-DeletionDate <DateTime>]
        [-ResourceId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByResourceIdParameterSet
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSSynapseWorkspace" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSSynapseResourceGroup" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSDroppedSqlPoolBackupModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a specified dropped sqlpools from a sql pool'
  description: |-
    ```powershell
    Get-AzSynapseDroppedSqlPool -ResourceGroupName ContosoResourceGroup -WorkspaceName ContosoWorkspace -Name "ContosoSqlPool"
    ```

    The cmdlet retrieves dropped sqlpools for a sql pool.
- title: 'Example 2: Get all dropped sqlpool on a workspace'
  description: |-
    ```powershell
    Get-AzSynapseDroppedSqlPool -ResourceGroupName "ContosoResourceGroup" -WorkspaceName "ContosoWorkspace"
    ```

    This command gets all available dropped sqlpool on a specified workspace.
