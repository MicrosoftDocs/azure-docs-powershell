      The Synapse Sql pool.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByNameParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Resource group name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByNameParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
