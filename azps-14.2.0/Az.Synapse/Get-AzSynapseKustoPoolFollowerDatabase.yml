uid: Az.Synapse.Get-AzSynapseKustoPoolFollowerDatabase
name: Get-AzSynapseKustoPoolFollowerDatabase
module: Az.Synapse
isPreview: false
summary: |-
  Returns a list of databases that are owned by this Kusto Pool and were followed by another Kusto Pool.
