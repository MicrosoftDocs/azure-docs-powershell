syntaxes:
- syntax: |-
    ```Syntax
    Add-AzSynapseDataFlowDebugSessionPackage
        -WorkspaceName <String>
        -PackageFile <String>
        [-SessionId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AddByName
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzSynapseDataFlowDebugSessionPackage
        -WorkspaceObject <PSSynapseWorkspace>
        -PackageFile <String>
