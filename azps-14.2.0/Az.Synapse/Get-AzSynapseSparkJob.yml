syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSynapseSparkJob
        -WorkspaceName <String>
        -SparkPoolName <String>
        [-LivyId <Int32>]
        [-Name <String>]
        [-ApplicationId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetSparkJobsByIdParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSynapseSparkJob
        -SparkPoolObject <PSSynapseSparkPool>
        [-LivyId <Int32>]
        [-Name <String>]
        [-ApplicationId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetSparkJobsByIdFromParentObjectParameterSet
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Synapse.Models.PSSynapseSparkPool" data-throw-if-not-resolved="False" />
