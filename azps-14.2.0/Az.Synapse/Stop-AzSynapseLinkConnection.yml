syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzSynapseLinkConnection
        -WorkspaceName <String>
        -Name <String>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopByName
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzSynapseLinkConnection
        -WorkspaceObject <PSSynapseWorkspace>
        -Name <String>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopByObject
  isDefault: false
- syntax: |-
    ```Syntax
    Stop-AzSynapseLinkConnection
        -InputObject <PSLinkConnectionResource>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopByInputObject
  isDefault: false
