syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzSynapseSqlPoolSensitivityRecommendation
        -InputObject <SqlPoolSensitivityClassificationModel>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObjectParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Enable-AzSynapseSqlPoolSensitivityRecommendation
        [-ResourceGroupName] <String>
        [-WorkspaceName] <String>
        [-SqlPoolName] <String>
        -SchemaName <String>
        -TableName <String>
        -ColumnName <String>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ColumnParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-AzSynapseSqlPoolSensitivityRecommendation
        -SqlPoolObject <PSSynapseSqlPool>
        -SchemaName <String>
        -TableName <String>
        -ColumnName <String>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SqlPoolObjectColumnParameterSet
  isDefault: false
