### YamlMime:PowerShellCmdlet1
uid: Az.Synapse.Enable-AzSynapseSqlPoolSensitivityRecommendation
name: Enable-AzSynapseSqlPoolSensitivityRecommendation
module: Az.Synapse
isPreview: false
summary: |-
  Enables sensitivity recommendations on columns (recommendations are enabled by default on all columns) in the SQL pool.
description: |-
  The Enable-AzSynapseSqlPoolSensitivityRecommendation cmdlet enables sensitivity recommendations on columns in the SQL pool.
