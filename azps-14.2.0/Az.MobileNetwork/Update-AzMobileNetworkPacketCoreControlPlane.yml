        [-ControlPlaneAccessInterfaceName <String>]
        [-CoreNetworkTechnology <String>]
        [-CustomLocationId <String>]
        [-EnableSystemAssignedIdentity <Boolean>]
        [-HttpsServerCertificateUrl <String>]
        [-InteropSetting <Hashtable>]
        [-LocalDiagnosticAccessAuthenticationType <String>]
        [-PlatformType <String>]
        [-Site <ISiteResourceId[]>]
        [-Sku <String>]
        [-Tag <Hashtable>]
        [-UeMtu <Int32>]
        [-UserAssignedIdentity <String[]>]
        [-Version <String>]
