syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDatabricksVNetPeering
        -Name <String>
        -ResourceGroupName <String>
        -WorkspaceName <String>
        [-SubscriptionId <String>]
        [-AllowForwardedTraffic <Boolean>]
        [-AllowGatewayTransit <Boolean>]
        [-AllowVirtualNetworkAccess <Boolean>]
        [-DatabricksAddressSpacePrefix <String[]>]
        [-DatabricksVirtualNetworkId <String>]
        [-RemoteAddressSpacePrefix <String[]>]
        [-RemoteVirtualNetworkId <String>]
        [-UseRemoteGateway <Boolean>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDatabricksVNetPeering
        -InputObject <IDatabricksIdentity>
        [-AllowForwardedTraffic <Boolean>]
        [-AllowGatewayTransit <Boolean>]
        [-AllowVirtualNetworkAccess <Boolean>]
        [-DatabricksAddressSpacePrefix <String[]>]
        [-DatabricksVirtualNetworkId <String>]
        [-RemoteAddressSpacePrefix <String[]>]
        [-RemoteVirtualNetworkId <String>]
        [-UseRemoteGateway <Boolean>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
