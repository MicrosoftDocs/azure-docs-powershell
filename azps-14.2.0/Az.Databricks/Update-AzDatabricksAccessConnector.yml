syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDatabricksAccessConnector
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDatabricksAccessConnector
        -InputObject <IDatabricksIdentity>
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
