syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDatabricksWorkspace
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ForceDeletion]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDatabricksWorkspace
        -InputObject <IDatabricksIdentity>
        [-ForceDeletion]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteViaIdentity
  isDefault: false
