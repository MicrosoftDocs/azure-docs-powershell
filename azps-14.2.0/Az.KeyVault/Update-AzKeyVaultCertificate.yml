syntaxes:
- syntax: |-
    ```Syntax
    Update-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        [[-Version] <String>]
        [-Enable <Boolean>]
        [-Tag <Hashtable>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzKeyVaultCertificate
        [-InputObject] <PSKeyVaultCertificateIdentityItem>
        [[-Version] <String>]
        [-Enable <Boolean>]
        [-Tag <Hashtable>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
