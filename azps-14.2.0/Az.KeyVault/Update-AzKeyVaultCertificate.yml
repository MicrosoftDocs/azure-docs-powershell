examples:
- title: 'Example 1: Modify the tags associated with a certificate'
  description: |-
    ```powershell
    $Tags = @{ "Team" = "Azure" ; "Role" = "Engg" }
    Update-AzKeyVaultCertificate -VaultName "ContosoKV01" -Name "TestCert01" -Tag $Tags -PassThru
    ```

    ```output
    Name        : TestCert01
    Certificate : [Subject]
                    CN=AZURE

                  [Issuer]
                    CN=AZURE

                  [Serial Number]
                    XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX

                  [Not Before]
                    7/27/2016 6:50:01 PM

                  [Not After]
                    7/27/2018 7:00:01 PM

                  [Thumbprint]
                    XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX

    Id          : https://ContosoKV01.vault.azure.net:443/certificates/TestCert01
    KeyId       : https://ContosoKV01.vault.azure.net:443/keys/TestCert01
    SecretId    : https://ContosoKV01.vault.azure.net:443/secrets/TestCert01
    Thumbprint  : XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
    Tags        : {[Role, Engg], [Team, Azure]}
    Enabled     : True
    Created     : 7/28/2016 2:00:01 AM
    Updated     : 8/1/2016 5:37:48 PM
    ```

    The first command assigns an array of key/value pairs to the $Tags variable.
    The second command sets the tags value of the certificate named TestCert01 to be $Tags.
- title: Example 2
  description: |-
    Modifies editable attributes of a certificate. (autogenerated)

    <!-- Aladdin Generated Example -->


    ```powershell
    Update-AzKeyVaultCertificate -Enable $true -Name 'TestCert01' -VaultName 'ContosoKV01'
    ```
