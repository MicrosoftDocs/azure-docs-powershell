syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKeyVaultRandomNumber
        [-HsmName] <String>
        -Count <Int32>
        [-DefaultProfile <IAzureContextContainer>]
        [-AsBase64String]
        [<CommonParameters>]
    ```
  parameterSetName: GetByHsmName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzKeyVaultRandomNumber
        [-ResourceId] <String>
        -Count <Int32>
        [-DefaultProfile <IAzureContextContainer>]
        [-AsBase64String]
        [<CommonParameters>]
    ```
  parameterSetName: GetByHsmResourceId
  isDefault: false
- syntax: |-
