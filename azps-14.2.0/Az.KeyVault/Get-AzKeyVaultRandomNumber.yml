uid: Az.KeyVault.Get-AzKeyVaultRandomNumber
name: Get-AzKeyVaultRandomNumber
module: Az.KeyVault
isPreview: false
summary: |-
  Get the requested number of bytes containing random values from a managed HSM.
description: |-
  Get the requested number of bytes containing random values from a managed HSM.
