syntaxes:
- syntax: |-
    ```Syntax
    New-AzKeyVaultCertificateAdministratorDetail
        [-FirstName <String>]
        [-LastName <String>]
        [-EmailAddress <String>]
        [-PhoneNumber <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
