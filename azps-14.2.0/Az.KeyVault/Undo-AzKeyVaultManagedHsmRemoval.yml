syntaxes:
- syntax: |-
    ```Syntax
    Undo-AzKeyVaultManagedHsmRemoval
        [-Name] <String>
        [-ResourceGroupName] <String>
        [-Location] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [-SubscriptionId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Undo-AzKeyVaultManagedHsmRemoval
        [-InputObject] <PSDeletedManagedHsm>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [-SubscriptionId <String>]
