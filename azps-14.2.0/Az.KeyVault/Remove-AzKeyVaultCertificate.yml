syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzKeyVaultCertificate
        [-VaultName] <String>
        [-Name] <String>
        [-InRemovedState]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByVaultNameAndName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzKeyVaultCertificate
        [-InputObject] <PSKeyVaultCertificateIdentityItem>
        [-InRemovedState]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByObject
  isDefault: false
