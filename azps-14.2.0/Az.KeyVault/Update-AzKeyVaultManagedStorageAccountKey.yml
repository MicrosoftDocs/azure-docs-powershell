syntaxes:
- syntax: |-
    ```Syntax
    Update-AzKeyVaultManagedStorageAccountKey
        [-VaultName] <String>
        [-AccountName] <String>
        [-KeyName] <String>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByDefinitionName
