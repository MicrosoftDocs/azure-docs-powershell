syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKeyVault
        [[-VaultName] <String>]
        [[-ResourceGroupName] <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-SubscriptionId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: GetVaultByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzKeyVault
        [-VaultName] <String>
        [-Location] <String>
        [-InRemovedState]
        [-DefaultProfile <IAzureContextContainer>]
        [-SubscriptionId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ByDeletedVault
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzKeyVault
        [-InRemovedState]
        [-DefaultProfile <IAzureContextContainer>]
        [-SubscriptionId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ListAllDeletedVaultsInSubscription
  isDefault: false
