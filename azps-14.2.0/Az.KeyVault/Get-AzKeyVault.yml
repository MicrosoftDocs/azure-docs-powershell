### YamlMime:PowerShellCmdlet1
uid: Az.KeyVault.Get-AzKeyVault
name: Get-AzKeyVault
module: Az.KeyVault
isPreview: false
summary: |-
  Gets key vaults.
description: |-
  The **Get-AzKeyVault** cmdlet gets information about the key vaults in a subscription. You can
  view all key vaults instances in a subscription, or filter your results by a resource group or a
  particular key vault.
  Note that although specifying the resource group is optional for this cmdlet when you get a single
  key vault, you should do so for better performance.

  The cmdlet may call below Microsoft Graph API according to input parameters:

  - GET /directoryObjects/{id}
  - GET /users/{id}
  - GET /servicePrincipals/{id}
  - GET /groups/{id}
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InRemovedState
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether to show the previously deleted vaults in the output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByDeletedVault
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ListAllDeletedVaultsInSubscription
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The location of the deleted vault.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
