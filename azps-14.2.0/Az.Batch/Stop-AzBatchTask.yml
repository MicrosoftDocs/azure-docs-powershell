syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzBatchTask
        [-JobId] <String>
        [-Id] <String>
        -BatchContext <BatchAccountContext>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Stop-AzBatchTask
        [-Task] <PSCloudTask>
        -BatchContext <BatchAccountContext>
        [-DefaultProfile <IAzureContextContainer>]
