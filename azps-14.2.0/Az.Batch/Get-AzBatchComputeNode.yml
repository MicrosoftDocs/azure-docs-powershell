### YamlMime:PowerShellCmdlet1
uid: Az.Batch.Get-AzBatchComputeNode
name: Get-AzBatchComputeNode
module: Az.Batch
isPreview: false
summary: |-
  Gets Batch compute nodes from a pool.
description: |-
  The **Get-AzBatchComputeNode** cmdlet gets Azure Batch compute nodes from a pool.
  Specify either the *PoolID* or *Pool* parameter.
  Specify the *Id* parameter to get a single compute node.
  Specify the *Filter* parameter to get the compute nodes that match an Open Data Protocol (OData) filter.
parameters:
  cmdletParameters:
  - name: BatchContext
    type: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **BatchAccountContext** instance that this cmdlet uses to interact with the Batch service.
      If you use the Get-AzBatchAccount cmdlet to get your BatchAccountContext, then Microsoft Entra authentication will be used when interacting with the Batch service. To use shared key authentication instead, use the Get-AzBatchAccountKey cmdlet to get a BatchAccountContext object with its access keys populated. When using shared key authentication, the primary access key is used by default. To change the key to use, set the BatchAccountContext.KeyInUse property.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an OData filter clause.
      This cmdlet returns compute nodes that match the filter that this parameter specifies.
      If you do not specify a filter, this cmdlet returns all compute nodes for the pool.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ODataFilter
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ParentObject
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of the compute node that this cmdlet gets from the pool.
      You cannot specify wildcard characters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Id
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxCount
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of compute nodes to return.
      If you specify a value of zero (0) or less, the cmdlet does not use an upper limit.
      The default value is 1000.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ODataFilter
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ParentObject
