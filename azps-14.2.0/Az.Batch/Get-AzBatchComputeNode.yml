- title: 'Example 3: Get all compute nodes in a specified pool'
  description: |-
    ```powershell
    Get-AzBatchPool -Id "Pool07" -BatchContext $Context | Get-AzBatchComputeNode -BatchContext $Context
    ```

    ```output
