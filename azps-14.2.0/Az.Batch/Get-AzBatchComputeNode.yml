    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBatchComputeNode
        [-PoolId] <String>
        -BatchContext <BatchAccountContext>
        [-Filter <String>]
        [-MaxCount <Int32>]
        [-Select <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ODataFilter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzBatchComputeNode
        [-PoolId] <String>
        [[-Id] <String>]
        -BatchContext <BatchAccountContext>
        [-Select <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzBatchComputeNode
        [[-Pool] <PSCloudPool>]
        -BatchContext <BatchAccountContext>
        [-Filter <String>]
        [-MaxCount <Int32>]
        [-Select <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ParentObject
  isDefault: false
