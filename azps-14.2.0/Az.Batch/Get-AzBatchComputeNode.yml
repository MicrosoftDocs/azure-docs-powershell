examples:
- title: 'Example 1: Get a compute node by ID'
  description: |-
    ```powershell
    Get-AzBatchComputeNode -PoolId "Pool06" -Id "tvm-2316545714_1-20150725t213220z" -BatchContext $Context
    ```

    ```output
    Id                    : tvm-2316545714_1-20150725t213220z
    Url                   : https://cmdletexample.westus.batch.azure.com/pools/MyPool/nodes/tvm-2316545714_1-20150725t213220z
    State                 : Idle
    StateTransitionTime   : 7/25/2015 9:36:53 PM
    LastBootTime          : 7/25/2015 9:36:53 PM
    AllocationTime        : 7/25/2015 9:32:20 PM
    IPAddress             : 10.14.121.1
    AffinityId            : TVM:tvm-2316545714_1-20150725t213220z
    VirtualMachineSize    : standard_d1_v2
    TotalTasksRun         : 1
    StartTaskInformation  :
    RecentTasks           : {}
    StartTask             :
    CertificateReferences :
    Errors                :
    ```

    This command gets the compute node that has the ID tvm-2316545714_1-20150725t213220z from the pool that has the ID Pool06.
    Use the Get-AzBatchAccountKey cmdlet to assign a context to the $Context variable.
- title: 'Example 2: Get all idle compute nodes from a pool'
  description: |-
    ```powershell
    Get-AzBatchComputeNode -PoolId "Pool06" -Filter "state eq 'idle'" -BatchContext $Context
    ```

