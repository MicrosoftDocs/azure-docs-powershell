### YamlMime:PowerShellCmdlet1
uid: Az.Batch.Set-AzBatchAccount
name: Set-AzBatchAccount
module: Az.Batch
isPreview: false
summary: |-
  Updates a Batch account.
description: |-
  The **Set-AzBatchAccount** cmdlet updates an Azure Batch account.
  Currently, this cmdlet can update only tags.
parameters:
  cmdletParameters:
  - name: AccountName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Batch account that this cmdlet updates.
    aliases:
    - Name
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AutoStorageAccountId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the resource ID of the storage account to be used for auto storage.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the resource group of the account that this cmdlet updates.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Tag
    type: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Key-value pairs in the form of a hash table. For example:
      @{key0="value0";key1=$null;key2="value2"}
    aliases:
    - Tags
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzBatchAccount
        [-AccountName] <String>
        [-Tag] <Hashtable>
        [-ResourceGroupName <String>]
        [-AutoStorageAccountId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Update the tags on a Batch account'
  description: |-
    ```powershell
    Set-AzBatchAccount -AccountName "cmdletexample" -Tag @{key0="value0";key1=$null;key2="value2"}
    ```

    ```output
    AccountName                  : cmdletexample
    Location                     : westus
    ResourceGroupName            : CmdletExampleRG
    DedicatedCoreQuota           : 20
    LowPriorityCoreQuota         : 20
    PoolQuota                    : 20
    ActiveJobAndJobScheduleQuota : 20
    Tags                         :
                                   Name  Value
                                   ====  ======
                                   key0  value0
                                   key1
                                   key2  value2
    TaskTenantUrl                : https://cmdletexample.westus.batch.azure.com
    ```

    This command updates the tags on the account named pfuller.
