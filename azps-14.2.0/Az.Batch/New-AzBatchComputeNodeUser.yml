syntaxes:
- syntax: |-
    ```Syntax
    New-AzBatchComputeNodeUser
        [-PoolId] <String>
        [-ComputeNodeId] <String>
        -Name <String>
        -Password <SecureString>
        -BatchContext <BatchAccountContext>
        [-ExpiryTime <DateTime>]
        [-IsAdmin]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzBatchComputeNodeUser
        [[-ComputeNode] <PSComputeNode>]
        -Name <String>
        -Password <SecureString>
        -BatchContext <BatchAccountContext>
        [-ExpiryTime <DateTime>]
        [-IsAdmin]
        [-DefaultProfile <IAzureContextContainer>]
