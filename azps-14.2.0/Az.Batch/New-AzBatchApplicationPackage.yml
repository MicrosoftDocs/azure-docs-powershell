    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzBatchApplicationPackage
        [-AccountName] <String>
        [-ResourceGroupName] <String>
        [-ApplicationName] <String>
        [-ApplicationVersion] <String>
        [-Format] <String>
        -FilePath <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: UploadAndActivate
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzBatchApplicationPackage
        [-AccountName] <String>
        [-ResourceGroupName] <String>
        [-ApplicationName] <String>
        [-ApplicationVersion] <String>
        [-Format] <String>
        [-ActivateOnly]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ActivateOnly
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.Models.PSApplicationPackage" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Install an application package into a Batch account'
  description: |-
    ```powershell
    New-AzBatchApplicationPackage -AccountName "ContosoBatch" -ResourceGroupName "ContosoBatchGroup" -ApplicationName "Litware" -ApplicationVersion "1.0" -FilePath "litware.1.0.zip" -Format "zip"
    ```

    This command creates and activates version 1.0 of the Litware application, and uploads the contents of litware.1.0.zip as the application package content.
