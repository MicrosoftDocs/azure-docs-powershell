syntaxes:
- syntax: |-
    ```Syntax
    New-AzBatchApplication
        [-AccountName] <String>
        [-ResourceGroupName] <String>
        [-ApplicationName] <String>
        [[-AllowUpdates] <Boolean>]
        [[-DisplayName] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.Models.PSApplication" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add an empty application to a Batch account'
  description: |-
    ```powershell
    New-AzBatchApplication -AccountName "ContosoBatch" -ResourceGroupName "ContosoBatchGroup" -ApplicationName "Litware" -AllowUpdates $True -DisplayName "Litware Advanced Reticulator"
    ```

    This command creates the Litware application in the ContosoBatch account.
    The application initially contains no packages.
