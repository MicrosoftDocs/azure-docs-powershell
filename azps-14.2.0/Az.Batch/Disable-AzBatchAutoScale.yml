outputs:
- name: <xref href="System.Void" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Disable automatic scaling of a pool'
  description: |-
    ```powershell
    Disable-AzBatchAutoScale -Id "MyPool" -BatchContext $Context
    ```

    This command disables automatic scaling for the pool named MyPool.
