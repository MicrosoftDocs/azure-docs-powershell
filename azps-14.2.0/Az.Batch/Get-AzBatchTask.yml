syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBatchTask
        [-JobId] <String>
        -BatchContext <BatchAccountContext>
        [-Filter <String>]
        [-MaxCount <Int32>]
        [-Select <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ODataFilter
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzBatchTask
        [-JobId] <String>
        [[-Id] <String>]
        -BatchContext <BatchAccountContext>
        [-Select <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzBatchTask
        [[-Job] <PSCloudJob>]
        -BatchContext <BatchAccountContext>
        [-Filter <String>]
        [-MaxCount <Int32>]
        [-Select <String>]
        [-Expand <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ParentObject
  isDefault: false
