### YamlMime:PowerShellCmdlet1
uid: Az.Batch.Get-AzBatchTask
name: Get-AzBatchTask
module: Az.Batch
isPreview: false
summary: |-
  Gets the Batch tasks for a job.
description: |-
  The **Get-AzBatchTask** cmdlet gets Azure Batch tasks for a Batch job.
  Specify a job by either the *JobId* parameter or the *Job* parameter.
  To get a single task, specify the *Id* parameter.
  You can specify the *Filter* parameter to get the tasks that match an Open Data Protocol (OData) filter.
parameters:
  cmdletParameters:
  - name: BatchContext
    type: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **BatchAccountContext** instance that this cmdlet uses to interact with the Batch service.
      If you use the Get-AzBatchAccount cmdlet to get your BatchAccountContext, then Microsoft Entra authentication will be used when interacting with the Batch service. To use shared key authentication instead, use the Get-AzBatchAccountKey cmdlet to get a BatchAccountContext object with its access keys populated. When using shared key authentication, the primary access key is used by default. To change the key to use, set the BatchAccountContext.KeyInUse property.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Expand
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an OData expand clause.
      Specify a value for this parameter to get associated entities of the main entity to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an OData filter clause for tasks.
      If you do not specify a filter, this cmdlet returns all tasks for the Batch account or job.
    defaultValue: None
    dontShow: false
    isDynamic: false
