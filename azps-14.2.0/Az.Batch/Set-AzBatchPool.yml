### YamlMime:PowerShellCmdlet1
uid: Az.Batch.Set-AzBatchPool
name: Set-AzBatchPool
module: Az.Batch
isPreview: false
summary: |-
  Updates the properties of a pool.
description: |-
  The **Set-AzBatchPool** cmdlet updates the properties of a pool in the Azure Batch service.
  Use the Get-AzBatchPool cmdlet to get a **PSCloudPool** object.
  Modify the properties of that object, and then use the current cmdlet to commit your changes to the Batch service.
parameters:
  cmdletParameters:
  - name: BatchContext
    type: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **BatchAccountContext** instance that this cmdlet uses to interact with the Batch service.
      If you use the Get-AzBatchAccount cmdlet to get your BatchAccountContext, then Microsoft Entra authentication will be used when interacting with the Batch service. To use shared key authentication instead, use the Get-AzBatchAccountKey cmdlet to get a BatchAccountContext object with its access keys populated. When using shared key authentication, the primary access key is used by default. To change the key to use, set the BatchAccountContext.KeyInUse property.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Pool
    type: <xref href="Microsoft.Azure.Commands.Batch.Models.PSCloudPool" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **PSCloudPool** to which this cmdlet updates the Batch service.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzBatchPool
        [-Pool] <PSCloudPool>
        -BatchContext <BatchAccountContext>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.Batch.Models.PSCloudPool" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Void" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Update a pool'
  description: |-
    ```powershell
    $Pool = Get-AzBatchPool "ContosoPool" -BatchContext $Context
    $StartTask = New-Object Microsoft.Azure.Commands.Batch.Models.PSStartTask
    $StartTask.CommandLine = "cmd /c echo example"
    $Pool.StartTask = $StartTask
    Set-AzBatchPool -Pool $Pool -BatchContext $Context
    ```

    The first command gets a pool by using **Get-AzBatchPool**, and then stores it in the $Pool variable.
    The next three commands modify the start task specification on the $Pool object.
    The final command updates the Batch service to match the local object in $Pool.
