syntaxes:
- syntax: |-
    ```Syntax
    Start-AzBatchPoolResize
        [-Id] <String>
        [-TargetDedicatedComputeNodes <Int32>]
        [-TargetLowPriorityComputeNodes <Int32>]
        [-ResizeTimeout <TimeSpan>]
        [-ComputeNodeDeallocationOption <ComputeNodeDeallocationOption>]
        -BatchContext <BatchAccountContext>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Batch.BatchAccountContext" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Void" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Resize a pool to 12 nodes'
  description: |-
    ```powershell
    Start-AzBatchPoolResize -Id "ContosoPool06" -TargetDedicatedComputeNodes 12 -BatchContext $Context
    ```

    This command starts a resize operation on the pool that has the ID ContosoPool06.
    The target for the operation is 12 dedicated compute nodes.
    Use the Get-AzBatchAccountKey cmdlet to assign a context to the $Context variable.
- title: 'Example 2: Resize a pool using a deallocation option'
  description: |-
    ```powershell
    Get-AzBatchPool -Id "ContosoPool06" -BatchContext $Context | Start-AzBatchPoolResize -TargetDedicatedComputeNodes 5 -ResizeTimeout ([TimeSpan]::FromHours(1)) -ComputeNodeDeallocationOption ([Microsoft.Azure.Batch.Common.ComputeNodeDeallocationOption]::Terminate) -BatchContext $Context
    ```

    This cmdlet resizes a pool to five dedicated compute nodes.
    The command gets the pool that has the ID ContosoPool06 by using the Get-AzBatchPool cmdlet.
    The command passes that pool object to the current cmdlet by using the pipeline operator.
    The command starts a resize operation on the pool.
    The target is five dedicated compute nodes.
    The command specifies time-out period of one hour.
    The command specifies a deallocation option of Terminate.
