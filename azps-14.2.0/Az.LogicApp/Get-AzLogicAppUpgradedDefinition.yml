examples:
- title: 'Example 1: Get a logic app upgraded definition'
  description: |-
    ```powershell
    $UpgradedDefinition = Get-AzLogicAppUpgradedDefinition -ResourceGroupName "ResourceGroup11" -Name "LogicApp01" -TargetSchemaVersion "2016-06-01"
    $UpgradedDefinition.ToString()
    ```

    ```output
    {

      "$schema": "http://schema.management.azure.com/providers/Microsoft.Logic/schemas/2016-06-01/workflowdefinition.json#",

      "contentVersion": "1.0.0.0",

      "parameters": {},

      "triggers": {

        "httpTrigger": {

          "recurrence": {

            "frequency": "Hour",

            "interval": 1

          },

          "type": "Http",

          "inputs": {

            "method": "GET",

            "uri": "http://www.bing.com"

          },

          "conditions": [

            {

              "expression": "@bool('true')"

            }

          ]

        },

        "manualTrigger": {

          "type": "Request",

          "kind": "Http"

        }

      },

      "actions": {

        "httpScope": {

          "actions": {

            "http": {

              "runAfter": {},

              "type": "Http",

              "inputs": {

                "method": "GET",

                "uri": "http://www.bing.com"

              }

            }

          },

          "runAfter": {},

          "else": {

            "actions": {}

          },

          "expression": "@bool('true')",

          "type": "If"

        },

        "http1Scope": {

          "actions": {

            "http1": {

              "runAfter": {},

              "type": "Http",

              "inputs": {

                "method": "GET",

                "uri": "http://www.bing.com"

