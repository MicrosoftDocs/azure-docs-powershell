examples:
- title: 'Example 1: Get a Logic App trigger callback URL'
  description: |-
    ```powershell
    Get-AzLogicAppTriggerCallbackUrl -ResourceGroupName "ResourceGroup11" -Name "LogicApp1" -TriggerName "manual"
    ```

    ```output
    Value
    -----
    https://prod-03.westus.logic.azure.com:443/workflows/c4ed9335bc864140a11f4508d19acea3/triggers/manual/run?api-version=2016-06-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=<value>
    ```

    This command gets a Logic App trigger callback URL.
