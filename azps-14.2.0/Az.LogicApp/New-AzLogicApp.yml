syntaxes:
- syntax: |-
    ```Syntax
    New-AzLogicApp
        -ResourceGroupName <String>
        -Name <String>
        -Location <String>
        -Definition <Object>
        [-State <String>]
        [-IntegrationAccountId <String>]
        [-Parameters <Object>]
        [-ParameterFilePath <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
