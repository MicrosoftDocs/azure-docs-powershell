### YamlMime:PowerShellCmdlet1
uid: Az.LogicApp.Get-AzIntegrationAccount
name: Get-AzIntegrationAccount
module: Az.LogicApp
isPreview: false
summary: |-
  Gets integration accounts.
description: |-
  The **Get-AzIntegrationAccount** cmdlet gets integration accounts from a resource group.
  Specify an integration account name and resource group name.
  This module supports dynamic parameters.
  To use a dynamic parameter, type it in the command.
  To discover the names of dynamic parameters, type a hyphen (-) after the cmdlet name, and then press the Tab key repeatedly to cycle through the available parameters.
  If you omit a required template parameter, the cmdlet prompts you for the value.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an integration account.
    aliases:
    - IntegrationAccountName
    - ResourceName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a resource group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzIntegrationAccount
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Management.Logic.Models.IntegrationAccount" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get an integration account by name'
  description: |-
    ```powershell
    Get-AzIntegrationAccount -ResourceGroupName "ResourceGroup11" -Name "IntegrationAccount31"
    ```

    ```output
    Id          : /subscriptions/<SubscriptionId>/resourceGroups/ResourceGroup11/providers/Microsoft.Logic/integrationAccounts/IntegrationAccount31
    Name        : IntegrationAccount31
    Type        : Microsoft.Logic/integrationAccounts
    Location    : brazilsouth
    Sku         :
    CreatedTime : 3/26/2016 4:26:07 PM
    ChangedTime : 3/26/2016 4:26:07 PM
    ```

    This command gets an integration account named IntegrationAccount31 from the specified resource group.
- title: 'Example 2: Get integration accounts in a resource group'
  description: |-
    ```powershell
    Get-AzIntegrationAccount -ResourceGroupName "ResourceGroup11"
    ```

    ```output
    Id          : /subscriptions/<SubscriptionId>/resourceGroups/ResourceGroup1/providers/Microsoft.Logic/integrationAccounts/IntegrationAccount31
    Name        : IntegrationAccount31
    Type        : Microsoft.Logic/integrationAccounts
    Location    : brazilsouth
    Sku         :
    CreatedTime : 3/26/2016 4:26:07 PM
    ChangedTime : 3/26/2016 4:26:07 PM
    ```

    This command gets integration accounts from a resource group named ResourceGroup11.
- title: 'Example 3: Get all integration accounts'
  description: |-
    ```powershell
    Get-AzIntegrationAccount
    ```

    ```output
    Id          : /subscriptions/<SubscriptionId>/resourceGroups/ResourceGroup11/providers/Microsoft.Logic/integrationAccounts/IntegrationAccount31
    Name        : IntegrationAccount31
    Type        : Microsoft.Logic/integrationAccounts
    Location    : brazilsouth
    Sku         :
    CreatedTime : 3/26/2016 4:26:07 PM
    ChangedTime : 3/26/2016 4:26:07 PM
    ```

    This command gets all the integration accounts in your Azure subscription.
