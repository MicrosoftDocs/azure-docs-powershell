syntaxes:
- syntax: |-
    ```Syntax
    Set-AzIntegrationAccountCertificate
        -ResourceGroupName <String>
        -Name <String>
        -CertificateName <String>
        [-KeyName <String>]
        [-KeyVersion <String>]
        [-KeyVaultId <String>]
        [-PublicCertificateFilePath <String>]
        [-Metadata <Object>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
