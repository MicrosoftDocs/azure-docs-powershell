examples:
- title: 'Example 1: Modify an integration account certificate'
  description: |-
    ```powershell
    Set-AzIntegrationAccountCertificate -ResourceGroupName "ResourceGroup11" -Name "IntegrationAccount31" -CertificateName "IntegrationAccountCertificate01" -KeyName "TestKey" -KeyVersion "1.0" -KeyVaultId "/subscriptions/<subscriptionId>/resourcegroups/ResourceGroup11/providers/microsoft.keyvault/vaults/keyvault" -PublicCertificateFilePath "c:\temp\Certificate.cer"
    ```

    ```output
    Id                : /subscriptions/<SubscriptionId>/resourceGroups/ResourceGroup11/providers/Microsoft.Logic/integrationAccounts/IntegrationAccount31/certificates/IntegrationAccountCertificate01
    Name              : IntegrationAccountCertificate01
    Type              : Microsoft.Logic/integrationAccounts/certificates
    CreatedTime       : 3/26/2016 6:59:07 PM
    ChangedTime       : 3/26/2016 6:59:07 PM
    KeyName           : TestKey
    KeyVersion        : 1.0
    KeyVaultId        : /subscriptions/<SubscriptionId/resourcegroups/ResourceGroup11/providers/microsoft.keyvault/vaults/testkeyvault
    KeyVaultName      : testkeyvault
    KeyVaultName      : testkeyvault
    PublicCertificate :
    MetaData          :
    ```

    This command modifies the integration account certificate in the specified resource group.
