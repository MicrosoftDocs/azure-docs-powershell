syntaxes:
- syntax: |-
    ```Syntax
    New-AzStackHCIVMLogicalNetwork
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        -CustomLocationId <String>
        [-DnsServer <String[]>]
        [-Tag <Hashtable>]
        [-VMSwitchName <String>]
        [-AddressPrefix <String[]>]
        [-IpAllocationMethod <String>]
        [-IpPoolEnd <String>]
        [-IpPoolStart <String>]
        [-IpPoolType <String>]
        [-IpPool <Hashtable[]>]
        [-Route <Hashtable[]>]
        [-SubnetName <String>]
        [-Subnet <Hashtable[]>]
        [-Vlan <Int32>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
