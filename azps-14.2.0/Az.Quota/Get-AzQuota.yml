### YamlMime:PowerShellCmdlet1
uid: Az.Quota.Get-AzQuota
name: Get-AzQuota
module: Az.Quota
isPreview: false
summary: |-
  Get the quota limit of a resource.
  The response can be used to determine the remaining quota to calculate a new quota limit that can be submitted with a PUT request.
description: |-
  Get the quota limit of a resource.
  The response can be used to determine the remaining quota to calculate a new quota limit that can be submitted with a PUT request.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="System.Management.Automation.PSObject" data-throw-if-not-resolved="False" />
    description: |-
      The DefaultProfile parameter is not functional.
      Use the SubscriptionId parameter when available if executing the cmdlet against a different subscription.
    aliases:
    - AzureRMContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Quota.Models.IQuotaIdentity" data-throw-if-not-resolved="False" />
    description: |-
      Identity Parameter
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetViaIdentity
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Resource name for a given resource provider.
      For example:
      - SKU name for Microsoft.Compute
      - SKU or TotalLowPriorityCores for Microsoft.MachineLearningServices
       For Microsoft.Network PublicIPAddresses.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Get
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The target Azure resource URI.
      For example, `/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/qms-test/providers/Microsoft.Batch/batchAccounts/testAccount/`.
      This is the target Azure resource URI for the List GET operation.
      If a `{resourceName}` is added after `/quotas`, then it's the target Azure resource URI in the GET operation for the specific resource.
    defaultValue: None
    dontShow: false
    isDynamic: false
