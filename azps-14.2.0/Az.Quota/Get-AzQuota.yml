syntaxes:
- syntax: |-
    ```Syntax
    Get-AzQuota
        -Scope <String>
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzQuota
        -ResourceName <String>
        -Scope <String>
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: false
- syntax: |-
