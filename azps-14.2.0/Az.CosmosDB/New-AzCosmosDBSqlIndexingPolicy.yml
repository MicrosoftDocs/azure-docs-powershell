syntaxes:
- syntax: |-
    ```Syntax
    New-AzCosmosDBSqlIndexingPolicy
        [-IncludedPath <PSIncludedPath[]>]
        [-SpatialSpec <PSSpatialSpec[]>]
        [-CompositePath <PSCompositePath[][]>]
        [-ExcludedPath <String[]>]
        [-Automatic <Boolean>]
        [-IndexingMode <String>]
        [-VectorIndex <PSVectorIndex[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
