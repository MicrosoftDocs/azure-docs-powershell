        [-ConflictResolutionPolicyProcedure <String>]
        [-ConflictResolutionPolicy <PSSqlConflictResolutionPolicy>]
        [-ClientEncryptionPolicy <PSSqlClientEncryptionPolicy>]
        [-vectorEmbeddingPolicy <PSSqlVectorEmbeddingPolicy>]
