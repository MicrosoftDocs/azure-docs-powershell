syntaxes:
- syntax: |-
    ```Syntax
    New-AzCosmosDBGremlinGraph
        -ResourceGroupName <String>
        -AccountName <String>
        -DatabaseName <String>
        -Name <String>
        -PartitionKeyKind <String>
        -PartitionKeyPath <String[]>
        [-IndexingPolicy <PSIndexingPolicy>]
        [-PartitionKeyVersion <Int32>]
        [-Throughput <Int32>]
        [-AutoscaleMaxThroughput <Int32>]
        [-TtlInSeconds <Int32>]
        [-UniqueKeyPolicy <PSUniqueKeyPolicy>]
        [-ConflictResolutionPolicyMode <String>]
        [-ConflictResolutionPolicyPath <String>]
        [-ConflictResolutionPolicyProcedure <String>]
        [-ConflictResolutionPolicy <PSConflictResolutionPolicy>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzCosmosDBGremlinGraph
        -Name <String>
        -PartitionKeyKind <String>
        -PartitionKeyPath <String[]>
        -ParentObject <PSGremlinDatabaseGetResults>
        [-IndexingPolicy <PSIndexingPolicy>]
        [-PartitionKeyVersion <Int32>]
        [-Throughput <Int32>]
        [-AutoscaleMaxThroughput <Int32>]
        [-TtlInSeconds <Int32>]
        [-UniqueKeyPolicy <PSUniqueKeyPolicy>]
        [-ConflictResolutionPolicyMode <String>]
        [-ConflictResolutionPolicyPath <String>]
        [-ConflictResolutionPolicyProcedure <String>]
        [-ConflictResolutionPolicy <PSConflictResolutionPolicy>]
        [-DefaultProfile <IAzureContextContainer>]
