    Get-AzPowerBIEmbeddedCapacity
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByCapacityOrResourceGroupOrSubscription
  isDefault: true
