- name: <xref href="Microsoft.Azure.Commands.PowerBI.Models.PSPowerBIEmbeddedCapacity" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get resource group capacities'
  description: |-
    ```powershell
    Get-AzPowerBIEmbeddedCapacity -ResourceGroupName "testRG"
    ```

    ```output
    Type                   : Microsoft.PowerBIDedicated/capacities
    Id                     : /subscriptions/78e47976-.../resourceGroups/testRG/providers/Microsoft.PowerBIDedicated/capacities/testcapacity
    ResourceGroup          : testRG
    Name                   : testcapacity
    Location               : West Central US
    State                  : Succeeded
    Administrator          : {admin@microsoft.com}
    Sku                    : A1
    Tier                   : PBIE_Azure
    Tag                    : {}

    Type                   : Microsoft.PowerBIDedicated/capacities
    Id                     : /subscriptions/78e47976-.../resourceGroups/testRG/providers/Microsoft.PowerBIDedicated/capacities/mycapacity
    ResourceGroup          : testRG
    Name                   : mycapacity
    Location               : West Central US
    State                  : Succeeded
    Administrator          : {admin@microsoft.com}
    Sku                    : A4
    Tier                   : PBIE_Azure
    Tag                    : {}
    ```

    This command gets all Azure PowerBI Embedded Capacity in the resource group named testRG
- title: 'Example 2: Get a capacity'
  description: |-
    ```powershell
    Get-AzPowerBIEmbeddedCapacity -ResourceGroupName "testRG" -Name "testcapacity"
    ```

    ```output
    Type                   : Microsoft.PowerBIDedicated/capacities
    Id                     : /subscriptions/78e47976-.../resourceGroups/testRG/providers/Microsoft.PowerBIDedicated/capacities/testcapacity
    ResourceGroup          : testRG
    Name                   : testcapacity
    Location               : West Central US
    State                  : Succeeded
    Administrator          : {admin@microsoft.com}
    Sku                    : A1
    Tier                   : PBIE_Azure
    Tag                    : {}
    ```

    This command gets the Azure PowerBI Embedded Capacity named testcapacity in the resource group named testRG.
