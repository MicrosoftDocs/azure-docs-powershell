syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzResourceAction
        -Action <String>
        -ResourceId <String>
        [-Parameters <Hashtable>]
        [-ODataQuery <String>]
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceId
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzResourceAction
        -Action <String>
        -ResourceName <String>
        -ResourceType <String>
        [-Parameters <Hashtable>]
        [-ExtensionResourceName <String>]
        [-ExtensionResourceType <String>]
        [-ODataQuery <String>]
        [-ResourceGroupName <String>]
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BySubscriptionLevel
  isDefault: false
- syntax: |-
    ```Syntax
    Invoke-AzResourceAction
        -Action <String>
        -ResourceName <String>
        -ResourceType <String>
        [-Parameters <Hashtable>]
        [-ExtensionResourceName <String>]
        [-ExtensionResourceType <String>]
        [-ODataQuery <String>]
        [-TenantLevel]
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
