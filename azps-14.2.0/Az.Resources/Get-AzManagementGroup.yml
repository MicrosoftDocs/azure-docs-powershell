uid: Az.Resources.Get-AzManagementGroup
name: Get-AzManagementGroup
module: Az.Resources
isPreview: false
summary: |-
  Gets Management Group(s)
description: |-
  The **Get-AzManagementGroup** cmdlet Gets all or a specific Management Group by its **GroupName**.
