syntaxes:
- syntax: |-
    ```Syntax
    Export-AzResourceGroup
        -ResourceGroupName <String>
        [-Path <String>]
        [-IncludeParameterDefaultValue]
        [-IncludeComments]
        [-SkipResourceNameParameterization]
        [-SkipAllParameterization]
        [-Resource <String[]>]
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
