syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzADGroupOwner
        -GroupId <String>
        -OwnerId <String>
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
