### YamlMime:PowerShellCmdlet1
uid: Az.Resources.Get-AzProviderFeature
name: Get-AzProviderFeature
module: Az.Resources
isPreview: false
summary: |-
  Gets information about Azure provider features.
description: |-
  The **Get-AzProviderFeature** cmdlet gets the feature name, provider name, and registration status for Azure provider features.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FeatureName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the feature to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetFeature
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ListAvailable
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet gets all features.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListAvailableParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProviderNamespace
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the namespace for which this cmdlet gets provider features.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListAvailableParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzProviderFeature
        [-ProviderNamespace <String>]
        [-ListAvailable]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListAvailableParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzProviderFeature
        -ProviderNamespace <String>
        -FeatureName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetFeature
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.ResourceManager.Cmdlets.SdkModels.PSProviderFeature" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all available features'
  description: |-
    ```powershell
    Get-AzProviderFeature -ListAvailable
    ```

    This command gets all available features.
- title: 'Example 2: Get information about a specific feature'
  description: |-
    ```powershell
    Get-AzProviderFeature -FeatureName "AllowPreReleaseRegions" -ProviderNamespace "Microsoft.Compute"
    ```

    This command gets information for the feature named AllowPreReleaseRegions for the specified provider.
