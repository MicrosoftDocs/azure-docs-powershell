- name: <xref href="Microsoft.Azure.Commands.ResourceManager.Cmdlets.SdkModels.PSResourceProviderLocation" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all locations and the supported resource providers'
  description: |-
    ```powershell
    Get-AzLocation
    ```

    This command gets all locations and the supported resource providers for each location.
- title: 'Example 2: Get all locations supporting resource provider Microsoft.AppConfiguration'
  description: |-
    ```powershell
    Get-AzLocation | Where-Object {$_.Providers -contains "Microsoft.AppConfiguration"}
    ```

    ```output
    Location    : eastasia
    DisplayName : East Asia
    Providers   : {Microsoft.Devices, Microsoft.Cache, Microsoft.AppConfiguration, microsoft.insights…}

    Location    : southeastasia
    DisplayName : Southeast Asia
    Providers   : {Microsoft.Devices, Microsoft.Cache, Microsoft.AppConfiguration, microsoft.insights…}

    Location    : centralus
    DisplayName : Central US
    Providers   : {Microsoft.Devices, Microsoft.Cache, Microsoft.AppConfiguration, microsoft.insights…}
    ...
    ```

    This example gets all locations which supports resource provider "Microsoft.AppConfiguration".
