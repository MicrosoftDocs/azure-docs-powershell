- syntax: |-
    ```Syntax
    Get-AzLocation
        [-ExtendedLocation <Boolean>]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
