uid: Az.Resources.New-AzADAppFederatedCredential
name: New-AzADAppFederatedCredential
module: Az.Resources
isPreview: false
summary: |-
  Create federatedIdentityCredential for applications.
description: |-
  Create federatedIdentityCredential for applications.
parameters:
  cmdletParameters:
