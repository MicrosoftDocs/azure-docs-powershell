syntaxes:
- syntax: |-
    ```Syntax
    New-AzADAppFederatedCredential
        -ApplicationObjectId <String>
        -Audience <String[]>
        -Issuer <String>
        -Name <String>
        -Subject <String>
        [-AdditionalProperties <Hashtable>]
        [-Description <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
