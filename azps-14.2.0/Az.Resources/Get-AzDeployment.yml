syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDeployment
        [[-Name] <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByDeploymentName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDeployment
        -Id <String>
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByDeploymentId
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.ResourceManager.Cmdlets.SdkModels.PSDeployment" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all deployments at subscription scope'
  description: |-
    ```powershell
    Get-AzDeployment
    ```

    This command gets all deployments at the current subscription scope.
- title: 'Example 2: Get a deployment by name'
  description: |-
    ```powershell
    Get-AzDeployment -Name "DeployRoles01"
    ```

    This command gets the DeployRoles01 deployment at the current subscription scope.
    You can assign a name to a deployment when you create it by using the **New-AzDeployment** cmdlets.
    If you do not assign a name, the cmdlets provide a default name based on the template that is used to create the deployment.
