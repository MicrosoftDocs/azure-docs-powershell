### YamlMime:PowerShellCmdlet1
uid: Az.Resources.Set-AzSubscriptionDeploymentStack
name: Set-AzSubscriptionDeploymentStack
module: Az.Resources
isPreview: false
summary: |-
  Sets a new Subscription scoped Deployment Stack.
description: |-
  Update a subscription scoped deployment stack.
parameters:
  cmdletParameters:
  - name: ActionOnUnmanage
    type: <xref href="Microsoft.Azure.Commands.ResourceManager.Cmdlets.SdkModels.DeploymentStacks.PSActionOnUnmanage" data-throw-if-not-resolved="False" />
    description: |-
      Action to take on resources that become unmanaged on deletion or update of the deployment stack. Possible values include: 'detachAll' (do not delete any unmanaged resources), 'deleteResources' (delete all unmanaged resources that are not RGs or MGs), and 'deleteAll' (delete every unmanaged resource).
    acceptedValues:
    - DetachAll
    - DeleteResources
    - DeleteAll
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
