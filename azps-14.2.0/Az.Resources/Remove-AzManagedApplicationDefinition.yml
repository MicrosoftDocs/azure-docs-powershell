syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzManagedApplicationDefinition
        -Name <String>
        -ResourceGroupName <String>
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByNameAndResourceGroup
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzManagedApplicationDefinition
        -Id <String>
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveById
  isDefault: false
