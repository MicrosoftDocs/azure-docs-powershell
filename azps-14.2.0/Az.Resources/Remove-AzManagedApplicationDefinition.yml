- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove managed application definition by resource ID'
  description: |-
    ```powershell
    $ApplicationDefinition = Get-AzManagedApplicationDefinition -Name "myAppDef" -ResourceGroupName "myRG"
    Remove-AzManagedApplicationDefinition -Id $ApplicationDefinition.ResourceId -Force
    ```

    The first command gets a managed application definition named myAppDef by using the Get-AzManagedApplicationDefinition cmdlet.
    The command stores it in the $ApplicationDefinition variable.
    The second command removes the managed application definition identified by the **ResourceId** property of $ApplicationDefinition.
