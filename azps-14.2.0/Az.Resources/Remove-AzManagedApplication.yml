syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzManagedApplication
        -Name <String>
        -ResourceGroupName <String>
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByNameAndResourceGroup
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzManagedApplication
        -Id <String>
        [-Force]
        [-ApiVersion <String>]
        [-Pre]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveById
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove managed application by resource ID'
  description: |-
    ```powershell
    $Application = Get-AzManagedApplication -Name "myApp" -ResourceGroupName "myRG"
    Remove-AzManagedApplication -Id $Application.ResourceId -Force
    ```

    The first command gets a managed application named myApp by using the Get-AzManagedApplication cmdlet.
    The command stores it in the $Application variable.
    The second command removes the managed application identified by the **ResourceId** property of $Application.
