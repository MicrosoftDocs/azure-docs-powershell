### YamlMime:PowerShellCmdlet1
uid: Az.Resources.Get-AzDeploymentScript
name: Get-AzDeploymentScript
module: Az.Resources
isPreview: false
summary: |-
  Gets or lists deployment scripts.
description: |-
  The **Get-AzDeploymentScript** cmdlet gets a single deployment script or a list of deployment scripts.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The fully qualified resource Id of the deployment script.
      Example: /subscriptions/{subId}/resourceGroups/{rgName}/providers/Microsoft.Resources/deploymentScripts/{deploymentScriptName}
    aliases:
    - ResourceId
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetDeploymentScriptByResourceId
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the deployment script
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetDeploymentScriptByName
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the resource group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListDeploymentScript
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDeploymentScript
        [[-ResourceGroupName] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListDeploymentScript
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDeploymentScript
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetDeploymentScriptByName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzDeploymentScript
        [-Id] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetDeploymentScriptByResourceId
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.ResourceManager.Cmdlets.SdkModels.PsDeploymentScript" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzDeploymentScript
    ```

    Lists deployment scripts in the subscription in current user's context.
- title: Example 2
  description: |-
    ```powershell
    Get-AzDeploymentScript -ResourceGroupName DS-TestRg
    ```

    Lists deployment scripts in resource group DS-TestRg.
- title: Example 3
  description: |-
    ```powershell
    Get-AzDeploymentScript -Name MyDeploymentScript -ResourceGroupName DS-TestRg
    ```

    Gets a deployment script with the name MyDeploymentScript in resource group DS-TestRG.
- title: Example 4
  description: |-
    ```powershell
    Get-AzDeploymentScript -Id "/subscriptions/{subId}/resourceGroups/{rgName}/providers/Microsoft.Resources/deploymentScripts/{deploymentScriptName}"
    ```

    Gets a deployment script with the given resource Id.
