### YamlMime:PowerShellCmdlet1
uid: Az.Resources.Get-AzRoleAssignmentScheduleRequest
name: Get-AzRoleAssignmentScheduleRequest
module: Az.Resources
isPreview: false
summary: |-
  Get the specified role assignment schedule request.
description: |-
  Get the specified role assignment schedule request.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="System.Management.Automation.PSObject" data-throw-if-not-resolved="False" />
    description: |-
      The DefaultProfile parameter is not functional.
      Use the SubscriptionId parameter when available if executing the cmdlet against a different subscription.
    aliases:
    - AzureRMContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The filter to apply on the operation.
      Use $filter=atScope() to return all role assignment schedule requests at or above the scope.
      Use $filter=principalId eq {id} to return all role assignment schedule requests at, above or below the scope for the specified principal.
      Use $filter=asRequestor() to return all role assignment schedule requests requested by the current user.
      Use $filter=asTarget() to return all role assignment schedule requests created for the current user.
      Use $filter=asApprover() to return all role assignment schedule requests where the current user is an approver.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: List
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InputObject
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Resources.Authorization.Models.IAuthorizationIdentity" data-throw-if-not-resolved="False" />
    description: |-
      Identity Parameter
      To construct, see NOTES section for INPUTOBJECT properties and create a hash table.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetViaIdentity
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name (guid) of the role assignment schedule request to get.
    aliases:
    - RoleAssignmentScheduleRequestName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Get
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The scope of the role assignment schedule request.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: List
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: Get
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
