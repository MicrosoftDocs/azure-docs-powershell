examples:
- title: 'Example 1: Test Network Watcher Connectivity from a VM to a website with protocol configuration'
  description: |-
    ```powershell
    $config = New-AzNetworkWatcherProtocolConfiguration -Protocol Http -Method Get -Header @{"accept"="application/json"} -ValidStatusCode @(200,202,204)

    Test-AzNetworkWatcherConnectivity -NetworkWatcherName NetworkWatcher -ResourceGroupName NetworkWatcherRG -SourceId "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/ContosoRG/providers/Microsoft.Compute/virtualMachines/MultiTierApp0" -DestinationAddress "bing.com" -DestinationPort 80 -ProtocolConfiguration $config
    ```

    ```output
    ConnectionStatus : Reachable
    AvgLatencyInMs   : 4
    MinLatencyInMs   : 2
    MaxLatencyInMs   : 15
    ProbesSent       : 15
    ProbesFailed     : 0
    Hops             : [
                         {
                           "Type": "Source",
                           "Id": "f8cff464-e13f-457f-a09e-4dcd53d38a85",
                           "Address": "10.1.1.4",
                           "ResourceId": "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/ContosoRG/provi                   iders/Microsoft.Network/networkInterfaces/appNic0/ipConfigurations/ipconfig1",
                           "NextHopIds": [
                             "1034b1bf-0b1b-4f0a-93b2-900477f45485"
                           ],
                           "Issues": []
                         },
                         {
                           "Type": "Internet",
                           "Id": "1034b1bf-0b1b-4f0a-93b2-900477f45485",
                           "Address": "13.107.21.200",
                           "ResourceId": "Internet",
                           "NextHopIds": [],
                           "Issues": []
                         }
                       ]
    ```

    In this example we test connectivity from a VM in Azure to www.bing.com.
