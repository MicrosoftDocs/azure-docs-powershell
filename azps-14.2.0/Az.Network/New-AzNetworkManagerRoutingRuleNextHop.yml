uid: Az.Network.New-AzNetworkManagerRoutingRuleNextHop
name: New-AzNetworkManagerRoutingRuleNextHop
module: Az.Network
isPreview: false
summary: |-
  Creates a network manager routing rule next hop.
description: |-
  The **New-AzNetworkManagerRoutingRuleNextHop** cmdlet creates a network manager routing rule next hop.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
