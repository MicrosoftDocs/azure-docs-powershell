    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NextHopAddress
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      NextHopAddress
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NextHopType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      NextHopAddress NextHopType.
    acceptedValues:
    - Internet
