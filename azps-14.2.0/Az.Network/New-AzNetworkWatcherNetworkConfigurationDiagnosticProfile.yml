syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetworkWatcherNetworkConfigurationDiagnosticProfile
        -Direction <String>
        -Protocol <String>
        -Source <String>
        -Destination <String>
        -DestinationPort <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
