### YamlMime:PowerShellCmdlet1
uid: Az.Network.New-AzExpressRouteCircuitPeeringConfig
name: New-AzExpressRouteCircuitPeeringConfig
module: Az.Network
isPreview: false
summary: |-
  Creates a new peering configuration to be added to an ExpressRoute circuit.
description: |-
  The **New-AzExpressRouteCircuitPeeringConfig** cmdlet adds a peering configuration to an
  ExpressRoute circuit. ExpressRoute circuits connect your on-premises network to the Microsoft cloud
  by using a connectivity provider instead of the public Internet.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LegacyMode
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      The legacy mode of the Peering
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MicrosoftConfigAdvertisedPublicPrefixes
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      For a PeeringType of MicrosoftPeering, you must provide a list of all prefixes you plan to
      advertise over the BGP session. Only public IP address prefixes are accepted. You can send a comma
      separated list if you plan to send a set of prefixes. These prefixes must be registered to you in
      a Routing Registry Name (RIR / IRR).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MicrosoftConfigCustomerAsn
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      If you are advertising prefixes that are not registered to the peering AS number, you can specify
      the AS number to which they are registered.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MicrosoftConfigRoutingRegistryName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The Routing Registry Name (RIR / IRR) to which the AS number and prefixes are registered.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the peering configuration to be created.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PeerAddressType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      PeerAddressType
    acceptedValues:
    - IPv4
    - IPv6
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PeerASN
    type: <xref href="System.UInt32" data-throw-if-not-resolved="False" />
    description: |-
      The AS number of your ExpressRoute circuit. This must be a Public ASN when the PeeringType is
      AzurePublicPeering.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PeeringType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The acceptable values for this parameter are: `AzurePrivatePeering`, `AzurePublicPeering`, and
      `MicrosoftPeering`
    acceptedValues:
    - AzurePrivatePeering
    - AzurePublicPeering
    - MicrosoftPeering
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PrimaryPeerAddressPrefix
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      This is the IP Address range for the primary routing path of this peering relationship. This must
      be a /30 CIDR subnet. The first odd-numbered address in this subnet should be assigned to your
      router interface. Azure will configure the next even-numbered address to the Azure router interface.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RouteFilter
    type: <xref href="Microsoft.Azure.Commands.Network.Models.PSRouteFilter" data-throw-if-not-resolved="False" />
    description: |-
      This is an existing RouteFilter object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: MicrosoftPeeringConfigRoutFilter
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RouteFilterId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      This is the resource Id of an existing RouteFilter object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: MicrosoftPeeringConfigRoutFilterId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SecondaryPeerAddressPrefix
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      This is the IP Address range for the secondary routing path of this peering relationship. This must
      be a /30 CIDR subnet. The first odd-numbered address in this subnet should be assigned to your
      router interface. Azure will configure the next even-numbered address to the Azure router interface.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SharedKey
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      This is an optional MD5 hash used as a pre-shared key for the peering configuration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VlanId
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      This is the Id number of the VLAN assigned for this peering.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
