inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSRouteFilter" data-throw-if-not-resolved="False" />
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Network.Models.PSPeering" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a new ExpressRoute circuit with a peering configuration'
  description: |-
    ```powershell
    $parameters = @{
        Name = 'AzurePrivatePeering'
        PeeringType = 'AzurePrivatePeering'
        PeerASN = 100
        PrimaryPeerAddressPrefix = '10.6.1.0/30'
        SecondaryPeerAddressPrefix = '10.6.2.0/30'
        VlanId  = 200
    }
    $PeerConfig = New-AzExpressRouteCircuitPeeringConfig @parameters

    $parameters = @{
        Name='ExpressRouteCircuit'
        ResourceGroupName='ExpressRouteResourceGroup'
        Location='West US'
        SkuTier='Standard'
        SkuFamily='MeteredData'
        ServiceProviderName='Equinix'
        Peering=$PeerConfig
        PeeringLocation='Silicon Valley'
        BandwidthInMbps=200
    }
    New-AzExpressRouteCircuit @parameters
    ```
