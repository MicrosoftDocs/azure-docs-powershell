syntaxes:
- syntax: |-
    ```Syntax
    New-AzFirewallPolicyDnsSetting
        [-EnableProxy]
        [-Server <String[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
