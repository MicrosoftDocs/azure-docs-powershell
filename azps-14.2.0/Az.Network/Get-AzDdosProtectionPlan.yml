uid: Az.Network.Get-AzDdosProtectionPlan
name: Get-AzDdosProtectionPlan
module: Az.Network
isPreview: false
summary: |-
  Gets a DDoS protection plan.
description: |-
  The Get-AzDdosProtectionPlan cmdlet gets a DDoS protection plan.
