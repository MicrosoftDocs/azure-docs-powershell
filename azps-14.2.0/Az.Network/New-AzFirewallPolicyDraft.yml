        [-Tag <Hashtable>]
        [-Force]
        [-AsJob]
        [-IntrusionDetection <PSAzureFirewallPolicyIntrusionDetection>]
        [-PrivateRange <String[]>]
        [-ExplicitProxy <PSAzureFirewallPolicyExplicitProxy>]
        [-Snat <PSAzureFirewallPolicySNAT>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
