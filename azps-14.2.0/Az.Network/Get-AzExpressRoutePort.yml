syntaxes:
- syntax: |-
    ```Syntax
    Get-AzExpressRoutePort
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceNameParameterSet
  isDefault: true
