### YamlMime:PowerShellCmdlet1
uid: Az.Network.Set-AzRoutingPolicy
name: Set-AzRoutingPolicy
module: Az.Network
isPreview: false
summary: |-
  Updates the destinations or nexthop for the specified Routing Policy of a Routing Intent object.
description: |-
  The **Set-AzRoutingPolicy** cmdlet updates a RoutingPolicy of a RoutingIntent resource. This will only return an updated in-memory routing intent resource. Please use the [Set-AzRoutingIntent](./Set-AzRoutingIntent.yml) cmdlet to update the actual resource and ensure that the policies take effect.
