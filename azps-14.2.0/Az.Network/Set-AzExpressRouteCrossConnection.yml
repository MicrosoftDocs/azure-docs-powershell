syntaxes:
- syntax: |-
    ```Syntax
    Set-AzExpressRouteCrossConnection
        -ExpressRouteCrossConnection <PSExpressRouteCrossConnection>
        [-AsJob]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
