uid: Az.Network.New-AzApplicationGatewayFirewallPolicyManagedRuleOverride
name: New-AzApplicationGatewayFirewallPolicyManagedRuleOverride
module: Az.Network
isPreview: false
summary: |-
  Creates a managedRuleOverride entry for RuleGroupOverrideGroup entry.
description: |-
  The **New-AzApplicationGatewayFirewallPolicyManagedRuleOverride** creates a ruleOverride entry.
parameters:
  cmdletParameters:
  - name: Action
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specify the Action in override rule entry.
    acceptedValues:
    - AnomalyScoring
    - Allow
    - Block
    - Log
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RuleId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specify the RuleId in override rule entry.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Sensitivity
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Describes the override sensitivity to be applied when rule matches.
    acceptedValues:
    - None
    - Low
    - Medium
    - High
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: State
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specify the RuleId in override rule entry.
    acceptedValues:
    - Disabled
    - Enabled
