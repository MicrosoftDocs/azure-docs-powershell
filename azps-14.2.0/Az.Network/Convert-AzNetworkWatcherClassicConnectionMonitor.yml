syntaxes:
- syntax: |-
    ```Syntax
    Convert-AzNetworkWatcherClassicConnectionMonitor
        -NetworkWatcherName <String>
        -ResourceGroupName <String>
        -Name <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
