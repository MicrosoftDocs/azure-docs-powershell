syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzNetworkSecurityPerimeter
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ForceDeletion]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzNetworkSecurityPerimeter
        -InputObject <INetworkSecurityPerimeterIdentity>
        [-ForceDeletion]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
