syntaxes:
- syntax: |-
    ```Syntax
    New-AzIpsecTrafficSelectorPolicy
        -LocalAddressRange <String[]>
        -RemoteAddressRange <String[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
