syntaxes:
- syntax: |-
    ```Syntax
    Get-AzExpressRouteCircuitMicrosoftPeeringPrefixConfig
        -ExpressRouteCircuit <PSExpressRouteCircuit>
        -PeerAddressType <String>
        -Prefix <String>
