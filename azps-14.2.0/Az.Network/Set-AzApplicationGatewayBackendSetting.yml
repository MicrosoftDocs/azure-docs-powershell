        -Port <Int32>
        -Protocol <String>
        [-Timeout <Int32>]
        [-ProbeId <String>]
        [-Probe <PSApplicationGatewayProbe>]
        [-TrustedRootCertificate <PSApplicationGatewayTrustedRootCertificate[]>]
        [-PickHostNameFromBackendAddress]
        [-HostName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
