syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzRouteFilterRuleConfig
        -Name <String>
        -RouteFilter <PSRouteFilter>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
