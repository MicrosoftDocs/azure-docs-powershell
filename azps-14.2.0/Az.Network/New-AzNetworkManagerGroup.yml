examples:
- title: Example 1
  description: |-
    ```powershell
    New-AzNetworkManagerGroup -ResourceGroupName "psTestResourceGroup" -NetworkManagerName "psNetworkManager" -Name psNetworkGroup -Description "psDescription"
    ```

    ```output
