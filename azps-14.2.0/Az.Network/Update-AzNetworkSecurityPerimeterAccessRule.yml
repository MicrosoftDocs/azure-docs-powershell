syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNetworkSecurityPerimeterAccessRule
        -ResourceGroupName <String>
        -Name <String>
        -SecurityPerimeterName <String>
        -ProfileName <String>
        [-SubscriptionId <String>]
        [-AddressPrefix <String[]>]
        [-FullyQualifiedDomainName <String[]>]
        [-EmailAddress <String[]>]
        [-PhoneNumber <String[]>]
        [-ServiceTag <String[]>]
        [-Direction <String>]
        [-Subscription <ISubscriptionId[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
