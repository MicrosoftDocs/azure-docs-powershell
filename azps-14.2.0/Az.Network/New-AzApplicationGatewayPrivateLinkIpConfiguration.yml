syntaxes:
- syntax: |-
    ```Syntax
    New-AzApplicationGatewayPrivateLinkIpConfiguration
        -Name <String>
        -Subnet <PSSubnet>
        [-PrivateIpAddressVersion <String>]
        [-PrivateIpAddress <String>]
        [-Primary]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
