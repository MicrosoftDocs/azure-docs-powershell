examples:
- title: 'Example 1: Get a public IP resource'
  description: |-
    ```powershell
    Get-AzPublicIpAddress -Name myPublicIp1 -ResourceGroupName myRg
    ```

    ```output
    Name                     : myPublicIp1
    ResourceGroupName        : myRg
    Location                 : westus2
    Id                       : /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myRg/providers/Microsoft
                               .Network/publicIPAddresses/myPublicIp1
    Etag                     : W/"00000000-0000-0000-0000-000000000000"
    ResourceGuid             : 00000000-0000-0000-0000-000000000000
    ProvisioningState        : Succeeded
    Tags                     :
    PublicIpAllocationMethod : Dynamic
    IpAddress                : Not Assigned
    PublicIpAddressVersion   : IPv4
    IdleTimeoutInMinutes     : 4
    IpConfiguration          : {
                                 "Id": "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myRg/providers/
                               Microsoft.Network/networkInterfaces/ps-azure-env407/ipConfigurations/ipconfig1"
                               }
    DnsSettings              : null
    Zones                    : {}
    Sku                      : {
                                 "Name": "Basic",
                                 "Tier": "Regional"
                               }
    IpTags                   : []
    ```

    This command gets a public IP address resource with name myPublicIp in the resource group myRg.
- title: 'Example 2: Get public IP resources using filtering'
  description: |-
    ```powershell
    Get-AzPublicIpAddress -Name myPublicIp*
    ```

    ```output
    Name                     : myPublicIp1
    ResourceGroupName        : myRg
    Location                 : westus2
    Id                       : /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myRg/providers/Microsoft
                               .Network/publicIPAddresses/myPublicIp1
    Etag                     : W/"00000000-0000-0000-0000-000000000000"
    ResourceGuid             : 00000000-0000-0000-0000-000000000000
    ProvisioningState        : Succeeded
    Tags                     :
    PublicIpAllocationMethod : Dynamic
    IpAddress                : Not Assigned
    PublicIpAddressVersion   : IPv4
    IdleTimeoutInMinutes     : 4
    IpConfiguration          : {
                                 "Id": "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myRg/providers/
                               Microsoft.Network/networkInterfaces/ps-azure-env407/ipConfigurations/ipconfig1"
                               }
    DnsSettings              : null
    Zones                    : {}
    Sku                      : {
                                 "Name": "Basic",
                                 "Tier": "Regional"
                               }
    IpTags                   : []
    ```

    This command gets all public IP address resources whose name starts with myPublicIp.
