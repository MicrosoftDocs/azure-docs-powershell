    supportsWildcards: false
  - name: Protocol
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the protocol used to send probe.
    acceptedValues:
    - Http
    - Https
    - TCP
    - TLS
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
