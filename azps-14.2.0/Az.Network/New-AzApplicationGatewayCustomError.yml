uid: Az.Network.New-AzApplicationGatewayCustomError
name: New-AzApplicationGatewayCustomError
module: Az.Network
isPreview: false
summary: |-
  Creates a custom error with http status code and custom error page url
description: |-
  The **New-AzApplicationGatewayCustomError** cmdlet creates a custom error.
