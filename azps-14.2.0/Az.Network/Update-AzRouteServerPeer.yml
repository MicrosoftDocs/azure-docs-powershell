syntaxes:
- syntax: |-
    ```Syntax
    Update-AzRouteServerPeer
        -ResourceGroupName <String>
        -RouteServerName <String>
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
