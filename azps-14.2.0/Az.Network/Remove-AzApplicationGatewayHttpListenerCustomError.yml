uid: Az.Network.Remove-AzApplicationGatewayHttpListenerCustomError
name: Remove-AzApplicationGatewayHttpListenerCustomError
module: Az.Network
isPreview: false
summary: |-
  Removes a custom error from a http listener of an application gateway.
description: |-
  The **Remove-AzApplicationGatewayHttpListenerCustomError** cmdlet removes a custom error from a http listener of an application gateway.
