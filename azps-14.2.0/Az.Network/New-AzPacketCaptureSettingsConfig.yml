syntaxes:
- syntax: |-
    ```Syntax
    New-AzPacketCaptureSettingsConfig
        [-FileCount <Int32>]
        [-FileSizeInBytes <Int64>]
        [-SessionTimeLimitInSeconds <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
