syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRouteTable
        [-ResourceGroupName <String>]
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: NoExpand
  isDefault: true
