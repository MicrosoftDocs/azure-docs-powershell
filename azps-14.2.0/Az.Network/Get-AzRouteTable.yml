examples:
- title: 'Example 1: Get a route table'
  description: |-
    ```powershell
    Get-AzRouteTable -ResourceGroupName "ResourceGroup11" -Name "RouteTable01"
    ```

    ```output
    Name              : routetable01
    ResourceGroupName : ResourceGroup11
    Location          : eastus
    Id                : /subscriptions/xxxx-xxxx-xxxx-xxxx/resourceGroups/ResourceGroup11/providers/Microsoft.Networ
                        k/routeTables/routetable01
    Etag              : W/"db5f4e12-3f34-465b-92dd-0ab3bf6fc274"
    ProvisioningState : Succeeded
    Tags              :
    Routes            : [
                          {
                            "Name": "route07",
                            "Etag": "W/\"db5f4e12-3f34-465b-92dd-0ab3bf6fc274\"",
                            "Id": "/subscriptions/xxxx-xxxx-xxxx-xxxx/resourceGroups/ResourceGroup11/providers/Micro
                        soft.Network/routeTables/routetable01/routes/route07",
                            "AddressPrefix": "10.1.0.0/16",
                            "NextHopType": "VnetLocal",
                            "NextHopIpAddress": null,
                            "ProvisioningState": "Succeeded"
                          }
                        ]
    Subnets           : []
    ```

    This command gets the route table named RouteTable01 in the resource group named ResourceGroup11.
- title: 'Example 2: List route tables using filtering'
  description: |-
    ```powershell
    Get-AzRouteTable -Name RouteTable*
    ```

    ```output
