syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzCostManagementQuery
        -Scope <String>
        -Timeframe <String>
        -Type <String>
        [-ConfigurationColumn <String[]>]
        [-DatasetAggregation <Hashtable>]
        [-DatasetFilter <IQueryFilter>]
        [-DatasetGranularity <String>]
        [-DatasetGrouping <IQueryGrouping[]>]
        [-TimePeriodFrom <DateTime>]
        [-TimePeriodTo <DateTime>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UsageExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzCostManagementQuery
        -ExternalCloudProviderId <String>
        -ExternalCloudProviderType <String>
        -Timeframe <String>
        -Type <String>
        [-ConfigurationColumn <String[]>]
        [-DatasetAggregation <Hashtable>]
        [-DatasetFilter <IQueryFilter>]
        [-DatasetGranularity <String>]
        [-DatasetGrouping <IQueryGrouping[]>]
        [-TimePeriodFrom <DateTime>]
        [-TimePeriodTo <DateTime>]
