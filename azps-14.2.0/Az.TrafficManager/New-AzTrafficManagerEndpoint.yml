    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of endpoint that this cmdlet adds to the Traffic Manager profile.
      Valid values are:

      - AzureEndpoints
      - ExternalEndpoints
      - NestedEndpoints
    acceptedValues:
    - AzureEndpoints
    - ExternalEndpoints
    - NestedEndpoints
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Weight
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.UInt32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the weight that Traffic Manager assigns to the endpoint.
      Valid values are integers from 1 through 1000.
      The default value is one (1).
      This parameter is used only if the Traffic Manager profile is configured with the Weighted traffic-routing method.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
