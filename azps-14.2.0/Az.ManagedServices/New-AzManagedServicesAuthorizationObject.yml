### YamlMime:PowerShellCmdlet1
uid: Az.ManagedServices.New-AzManagedServicesAuthorizationObject
name: New-AzManagedServicesAuthorizationObject
module: Az.ManagedServices
isPreview: false
summary: |-
  Create an in-memory object for Authorization.
description: |-
  Create an in-memory object for Authorization.
parameters:
  cmdletParameters:
  - name: DelegatedRoleDefinitionId
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The delegatedRoleDefinitionIds field is required when the roleDefinitionId refers to the User Access Administrator Role.
      It is the list of role definition ids which define all the permissions that the user in the authorization can assign to other principals.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PrincipalId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The identifier of the Azure Active Directory principal.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PrincipalIdDisplayName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The display name of the Azure Active Directory principal.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RoleDefinitionId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The identifier of the Azure built-in role that defines the permissions that the Azure Active Directory principal will have on the projected scope.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzManagedServicesAuthorizationObject
        -PrincipalId <String>
        -RoleDefinitionId <String>
        [-DelegatedRoleDefinitionId <String[]>]
        [-PrincipalIdDisplayName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ManagedServices.Models.Api20200201Preview.Authorization" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create new Azure Lighthouse Authorization object to use with Registration definition'
  description: |-
    ```powershell
    New-AzManagedServicesAuthorizationObject -PrincipalId "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" -RoleDefinitionId "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" -PrincipalIdDisplayName "Test user"
    ```

    ```output
    DelegatedRoleDefinitionId PrincipalId                          PrincipalIdDisplayName RoleDefinitionId
    ------------------------- -----------                          ---------------------- ----------------
                              xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx Test user              xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    ```

    Creates new Azure Lighthouse authorization object to use with Registration definition.
- title: 'Example 2: Create new Azure Lighthouse Authorization object with delegatedRoleDefinitionIds'
  description: |-
    ```powershell
    New-AzManagedServicesAuthorizationObject -PrincipalId "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" -RoleDefinitionId "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" -PrincipalIdDisplayName "Test user" -DelegatedRoleDefinitionId "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    ```

    ```output
    DelegatedRoleDefinitionId                                                    PrincipalId                          PrincipalIdDisplayName RoleDefinitionId
    -------------------------                                                    -----------                          ---------------------- ----------------
    {xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx, xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx} xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx Test user              xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    ```

    Creates new Azure Lighthouse authorization object with delegatedRoleDefinitionIds.
