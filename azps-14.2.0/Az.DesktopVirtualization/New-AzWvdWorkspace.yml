syntaxes:
- syntax: |-
    ```Syntax
    New-AzWvdWorkspace
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        [-SubscriptionId <String>]
        [-ApplicationGroupReference <String[]>]
        [-Description <String>]
        [-FriendlyName <String>]
        [-IdentityType <String>]
        [-Kind <String>]
        [-ManagedBy <String>]
        [-PlanName <String>]
        [-PlanProduct <String>]
        [-PlanPromotionCode <String>]
        [-PlanPublisher <String>]
        [-PlanVersion <String>]
        [-PublicNetworkAccess <String>]
        [-SkuCapacity <Int32>]
        [-SkuFamily <String>]
        [-SkuName <String>]
        [-SkuSize <String>]
        [-SkuTier <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
