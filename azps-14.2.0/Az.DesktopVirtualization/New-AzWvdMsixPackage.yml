- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.DesktopVirtualization.Models.IMsixPackage" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Creates New MSIX Package in the HostPool via Package Alias'
  description: |-
    ```powershell
    New-AzWvdMsixPackage -HostPoolName HostPoolName `
                         -ResourceGroupName resourceGroupName `
                         -SubscriptionId SubscriptionId `
                         -PackageAlias packagealias `
                         -ImagePath ImagePathURI
    ```

    This command adds MSIX package from specified image path to HostPool
- title: 'Example 2: Creates New MSIX Package in the HostPool'
  description: |-
    ```powershell
    $apps = "<PackagedApplication>"
    $deps = "<PackageDependencies>"
    New-AzWvdMsixPackage -FullName PackageFullName `
                         -HostPoolName HostPoolName `
                         -ResourceGroupName ResourceGroupName `
                         -SubscriptionId SubscriptionId `
                         -DisplayName displayname `
                         -ImagePath imageURI `
                         -IsActive:$false `
                         -IsRegularRegistration:$false `
                         -LastUpdated datelastupdated `
                         -PackageApplication $apps `
                         -PackageDependency $deps `
                         -PackageFamilyName packagefamilyname `
                         -PackageName packagename `
                         -PackageRelativePath packagerelativepath `
                         -Version packageversion
    ```

    ```output
    Name                              Type
    ----                              ----
    HotPoolName/PackageFullName       Microsoft.DesktopVirtualization/hostpools/msixpackages
    ```

    This command adds MSIX Package in the specified HostPool
