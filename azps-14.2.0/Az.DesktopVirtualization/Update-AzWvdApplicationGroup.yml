syntaxes:
- syntax: |-
    ```Syntax
    Update-AzWvdApplicationGroup
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Description <String>]
        [-FriendlyName <String>]
        [-ShowInFeed]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
