    Update-AzWvdApplicationGroup
        -Name <String>
        -ResourceGroupName <String>
        -JsonString <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
