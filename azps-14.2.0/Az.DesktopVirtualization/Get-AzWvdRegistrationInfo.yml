syntaxes:
- syntax: |-
    ```Syntax
    Get-AzWvdRegistrationInfo
        -ResourceGroupName <String>
        -HostPoolName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
