    Directory: C:\Documents

    Mode                 LastWriteTime         Length Name
    ----                 -------------         ------ ----
    -a---           7/19/2023  3:19 PM         308946 test-report-detailedComplianceReport.pdf
    ```

    Download detailed compliance report (pdf) of a report.
