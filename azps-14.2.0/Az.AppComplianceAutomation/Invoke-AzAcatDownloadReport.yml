syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzAcatDownloadReport
        -Name <String>
        -DownloadType <String>
        -Path <String>
        -FileName <String>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
