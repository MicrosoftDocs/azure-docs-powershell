examples:
- title: 'Example 1: List webhooks under a report.'
  description: |-
    ```powershell
    Get-AzAcatWebhook -ReportName "test-report"
    ```

    ```output
    Name          SystemDataCreatedAt  SystemDataCreatedBy SystemDataCreatedByType SystemDataLastModifiedAt SystemDataLastM
                                                                                                            odifiedBy
