syntaxes:
- syntax: |-
    ```Syntax
    Update-AzAcatWebhook
        -Name <String>
        -ReportName <String>
        [-EnableSslVerification <String>]
        [-Disable]
        [-TriggerMode <String>]
        [-Event <String[]>]
        [-PayloadUrl <String>]
        [-ContentType <String>]
        [-Secret <SecureString>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzAcatWebhook
        -Name <String>
        -ReportName <String>
        -Parameter <IWebhookResource>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Update
  isDefault: false
