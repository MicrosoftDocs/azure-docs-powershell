        [-SubscriptionId <String>]
        [-Description <String>]
        [-EnableSystemAssignedIdentity]
        [-SchemaRegistryRefResourceId <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
