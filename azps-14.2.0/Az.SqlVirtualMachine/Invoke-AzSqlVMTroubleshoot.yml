syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzSqlVMTroubleshoot
        -ResourceGroupName <String>
        -SqlVirtualMachineName <String>
        [-SubscriptionId <String>]
        [-EndTimeUtc <DateTime>]
        [-StartTimeUtc <DateTime>]
        [-TroubleshootingScenario <TroubleshootingScenario>]
        [-UnhealthyReplicaInfoAvailabilityGroupName <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TroubleshootExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzSqlVMTroubleshoot
        -InputObject <ISqlVirtualMachineIdentity>
        [-EndTimeUtc <DateTime>]
        [-StartTimeUtc <DateTime>]
        [-TroubleshootingScenario <TroubleshootingScenario>]
        [-UnhealthyReplicaInfoAvailabilityGroupName <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: TroubleshootViaIdentityExpanded
  isDefault: false
