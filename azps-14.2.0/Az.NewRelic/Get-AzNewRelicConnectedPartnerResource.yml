    4404219   Account 4404219 /SUBSCRIPTIONS/11111111-2222-3333-4444-123456789101/RESOURCEGROUPS/GROUP-TEST/PROVIDERS/NEWRELIC.OBSERVABILITY/MONITORS/TEST-01 eastus
    ```

