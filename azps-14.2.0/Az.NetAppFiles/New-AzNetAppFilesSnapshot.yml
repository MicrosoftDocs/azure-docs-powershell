syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetAppFilesSnapshot
        -ResourceGroupName <String>
        -Location <String>
        -AccountName <String>
        -PoolName <String>
        -VolumeName <String>
        -Name <String>
        [-FileSystemId <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzNetAppFilesSnapshot
        -Name <String>
        -VolumeObject <PSNetAppFilesVolume>
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByParentObjectParameterSet
  isDefault: false
