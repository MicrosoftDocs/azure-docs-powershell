- title: 'Example 1: Get an ANF pool'
  description: |-
    ```powershell
    Get-AzNetAppFilesPool -ResourceGroupName "MyRG" -AccountName "MyAnfAccount" -Name "MyAnfPool"
    ```

    ```output
