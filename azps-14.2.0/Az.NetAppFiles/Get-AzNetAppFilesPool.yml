    ServiceLevel	  : Premium
    TotalThroughputMibps: 262.144
    UtilizedThroughputMibps: 164.221
    QosType			  : Auto
    ProvisioningState : Succeeded
    ```

    This command gets the account named MyAnfPool from the account "MyAnfAccount".
