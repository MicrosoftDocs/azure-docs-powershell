syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetAppFilesSubvolume
        -ResourceGroupName <String>
        -Location <String>
        -AccountName <String>
        -PoolName <String>
        -VolumeName <String>
        -Name <String>
        -Path <String>
        -Size <Int64>
        [-ParentPath <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzNetAppFilesSubvolume
        -Name <String>
        -Path <String>
        -Size <Int64>
        -VolumeObject <PSNetAppFilesVolume>
        [-ParentPath <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByParentObjectParameterSet
  isDefault: false
