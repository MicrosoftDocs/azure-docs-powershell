syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataShareSynchronizationSetting
        -ResourceGroupName <String>
        -AccountName <String>
        -ShareName <String>
        -Name <String>
        -RecurrenceInterval <String>
        -SynchronizationTime <DateTime>
