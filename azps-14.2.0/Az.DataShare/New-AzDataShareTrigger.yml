syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataShareTrigger
        -ResourceGroupName <String>
        -AccountName <String>
        [-ShareSubscriptionName <String>]
        -Name <String>
        -RecurrenceInterval <String>
        -SynchronizationTime <DateTime>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
