examples:
- title: Example 1
  description: |-
    ```powershell
    New-AzDataShareTrigger -ResourceGroupName "ADS" -AccountName "WikiAds" -ShareSubscriptionName "AdsShareSubscription" -Name "AdsTrigger" -RecurrenceInterval "Day" -SynchronizationTime "9:00"
    ```

    ```output
    CreatedAt           : 7/10/2019 12:16:34 AM
    CreatedBy           : Ads test
    ProvisioningState   : Succeeded
    RecurrenceInterval  : Day
    SynchronizationMode : Incremental
    SynchronizationTime : 7/9/2019 9:00:00 AM
    TriggerStatus       : Active
    Id                  : /subscriptions/1834da9b-787a-44f6-ae81-60707ab8c957/resourceGroups/ADS/providers/Microsoft.DataShare/accounts/WikiAds/shareSubscriptions/AdsShareSubscription/triggers/AdsTrigger
    Name                : AdsTrigger
    Type                : Microsoft.DataShare/Triggers
    ```

    This command creates a new trigger AdsTrigger for share subscription AdsShareSubscription with a daily recurrence interval of 9 am.
