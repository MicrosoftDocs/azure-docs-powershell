syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDtlAllowedVMSizesPolicy
        [[-VmSizes] <String[]>]
        [-LabName] <String>
        [-ResourceGroupName] <String>
        [-Enable]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Enable
  isDefault: true
- syntax: |-
