    Set-AzDtlAllowedVMSizesPolicy
        [[-VmSizes] <String[]>]
        [-LabName] <String>
        [-ResourceGroupName] <String>
        [-Disable]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
