syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDtlVMsPerUserPolicy
        [[-MaxVMs] <Int32>]
        [-LabName] <String>
        [-ResourceGroupName] <String>
        [-Enable]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Enable
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzDtlVMsPerUserPolicy
        [[-MaxVMs] <Int32>]
        [-LabName] <String>
        [-ResourceGroupName] <String>
        [-Disable]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
