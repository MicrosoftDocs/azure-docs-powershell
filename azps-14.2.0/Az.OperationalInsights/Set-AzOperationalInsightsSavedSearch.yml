syntaxes:
- syntax: |-
    ```Syntax
    Set-AzOperationalInsightsSavedSearch
        [-ResourceGroupName] <String>
        [-WorkspaceName] <String>
        [-SavedSearchId] <String>
        [-DisplayName] <String>
        [-Category] <String>
        [-Query] <String>
        [[-Tag] <Hashtable>]
        [[-Version] <Int64>]
        [[-ETag] <String>]
        [[-FunctionAlias] <String>]
        [[-FunctionParameter] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
