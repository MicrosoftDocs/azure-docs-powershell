syntaxes:
- syntax: |-
    ```Syntax
    Get-AzOperationalInsightsWorkspace
        [[-ResourceGroupName] <String>]
        [[-Name] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
