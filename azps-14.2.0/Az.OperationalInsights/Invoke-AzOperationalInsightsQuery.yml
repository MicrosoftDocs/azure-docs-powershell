    ```Syntax
    Invoke-AzOperationalInsightsQuery
        -WorkspaceId <String>
        -Query <String>
        [-Timespan <TimeSpan>]
        [-Wait <Int32>]
        [-IncludeRender]
        [-IncludeStatistics]
        [-AsJob]
