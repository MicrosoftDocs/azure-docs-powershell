syntaxes:
- syntax: |-
    ```Syntax
    New-AzOperationalInsightsLinuxPerformanceObjectDataSource
        [-ResourceGroupName] <String>
        [-WorkspaceName] <String>
        [-Name] <String>
        [-ObjectName] <String>
        [-CounterNames] <String[]>
        [-InstanceName <String>]
        [-IntervalSeconds <Int32>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByWorkspaceName
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzOperationalInsightsLinuxPerformanceObjectDataSource
        [-Workspace] <PSWorkspace>
        [-Name] <String>
        [-ObjectName] <String>
        [-CounterNames] <String[]>
        [-InstanceName <String>]
        [-IntervalSeconds <Int32>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
