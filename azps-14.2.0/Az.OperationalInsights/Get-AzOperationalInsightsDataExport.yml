uid: Az.OperationalInsights.Get-AzOperationalInsightsDataExport
name: Get-AzOperationalInsightsDataExport
module: Az.OperationalInsights
isPreview: false
summary: |-
  Get or list data exports for workspace.
description: |-
  Gets a workspace's Data export by name or all existing workspace's data exports.
parameters:
  cmdletParameters:
  - name: DataExportName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The data export name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByNameParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The resource group name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The destination resource ID.
      This can be copied from the Properties entry of the destination resource in Azure.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetByResourceIdParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
