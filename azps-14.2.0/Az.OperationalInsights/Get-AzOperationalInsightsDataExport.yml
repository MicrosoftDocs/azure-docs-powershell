syntaxes:
- syntax: |-
    ```Syntax
    Get-AzOperationalInsightsDataExport
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ListParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzOperationalInsightsDataExport
        -ResourceGroupName <String>
