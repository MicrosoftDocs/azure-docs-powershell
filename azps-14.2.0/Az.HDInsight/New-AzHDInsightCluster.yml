examples:
- title: 'Example 1: Create an Azure HDInsight cluster'
  description: |-
    ```powershell
    # Primary storage account info
    $storageAccountResourceGroupName = "Group"
    $storageAccountResourceId = "yourstorageaccountresourceid"
    $storageAccountName = "yourstorageacct001"
    $storageAccountKey = Get-AzStorageAccountKey `
        -ResourceGroupName $storageAccountResourceGroupName `
        -Name $storageAccountName | Where-Object {$_.KeyName -eq "key1"} | ForEach-Object{$_.Value}
    $storageContainer = "container002"

    # Cluster configuration info
    $location = "East US 2"
    $clusterResourceGroupName = "Group"
    $clusterName = "your-hadoop-002"
    $clusterCreds = Get-Credential

    # If the cluster's resource group doesn't exist yet, run:
    # New-AzResourceGroup -Name $clusterResourceGroupName -Location $location

    # Create the cluster
    New-AzHDInsightCluster `
        -ClusterType Hadoop `
        -ClusterSizeInNodes 4 `
        -ResourceGroupName $clusterResourceGroupName `
        -ClusterName $clusterName `
        -HttpCredential $clusterCreds `
        -Location $location `
        -StorageAccountResourceId $storageAccountResourceId `
        -StorageAccountKey $storageAccountKey `
        -StorageContainer $storageContainer `
        -SshCredential $clusterCreds
    ```

    This command creates a cluster in the current subscription.
- title: 'Example 2: Create cluster with customer-managed key disk encryption'
  description: |-
    ```powershell
    # Primary storage account info
    $storageAccountResourceGroupName = "Group"
    $storageAccountResourceId = "yourstorageaccountresourceid"
    $storageAccountName = "yourstorageacct001"
    $storageAccountKey = Get-AzStorageAccountKey `
        -ResourceGroupName $storageAccountResourceGroupName `
        -Name $storageAccountName | Where-Object {$_.KeyName -eq "key1"} | ForEach-Object{$_.Value}
    $storageContainer = "container002"

    # Cluster configuration info
    $location = "East US 2"
    $clusterResourceGroupName = "Group"
    $clusterName = "your-cmk-cluster"
    $clusterCreds = Get-Credential

    # Customer-managed Key info
    $assignedIdentity = "your-ami-resource-id"
    $encryptionKeyName = "new-key"
    $encryptionVaultUri = "https://MyKeyVault.vault.azure.net"
    $encryptionKeyVersion = "00000000000000000000000000000000"

    # If the cluster's resource group doesn't exist yet, run:
    # New-AzResourceGroup -Name $clusterResourceGroupName -Location $location

    # Create the cluster
    New-AzHDInsightCluster `
        -ClusterType Spark `
        -ClusterSizeInNodes 4 `
        -ResourceGroupName $clusterResourceGroupName `
        -ClusterName $clusterName `
        -HttpCredential $clusterCreds `
        -Location $location `
        -StorageAccountResourceId $storageAccountResourceId `
        -StorageAccountKey $storageAccountKey `
        -StorageContainer $storageContainer `
        -SshCredential $clusterCreds `
        -AssignedIdentity $assignedIdentity `
        -EncryptionKeyName $encryptionKeyName `
        -EncryptionVaultUri $encryptionVaultUri `
        -EncryptionKeyVersion $encryptionKeyVersion
    ```
