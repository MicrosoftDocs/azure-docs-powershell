### YamlMime:PowerShellCmdlet1
uid: Az.HDInsight.Set-AzHDInsightPersistedScriptAction
name: Set-AzHDInsightPersistedScriptAction
module: Az.HDInsight
isPreview: false
summary: |-
  Sets a previously executed script action to be a persisted script action.
description: |-
  The **Set-AzHDInsightPersistedScriptAction** cmdlet sets a previously executed script action to be a persisted script action.
  The specified script action must have previously succeeded.
  The script action will run each time the Azure HDInsight cluster is scaled up.
parameters:
  cmdletParameters:
  - name: ClusterName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cluster.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the resource group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ScriptExecutionId
    type: <xref href="System.Int64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the execution ID of the script action to promote to persisted.
      This script action must have succeeded in order to be promoted.
      You can find the script action execution ID using Get-AzHDInsightScriptActionHistory.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzHDInsightPersistedScriptAction
        [-ClusterName] <String>
        [-ScriptExecutionId] <Int64>
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Void" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set a previously successful script action to be persisted, or run on cluster scale up'
  description: |-
    ```powershell
    Set-AzHDInsightPersistedScriptAction `
                -ClusterName "your-hadoop-001" `
                -ScriptExecutionId "<id>"
    ```

    This command sets a previously successful script action to be a persisted script action.
