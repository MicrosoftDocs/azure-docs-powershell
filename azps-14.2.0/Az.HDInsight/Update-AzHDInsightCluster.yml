syntaxes:
- syntax: |-
    ```Syntax
    Update-AzHDInsightCluster
        [-ClusterName] <String>
        [-IdentityType <String>]
        [-IdentityId <String[]>]
        [-Tag <System.Collections.Generic.Dictionary`2[System.String,System.String]>]
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
