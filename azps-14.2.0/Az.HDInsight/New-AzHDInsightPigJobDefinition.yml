syntaxes:
- syntax: |-
    ```Syntax
    New-AzHDInsightPigJobDefinition
        [-Arguments <String[]>]
        [-Files <String[]>]
        [-StatusFolder <String>]
        [-File <String>]
        [-Query <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.HDInsight.Models.AzureHDInsightPigJobDefinition" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a Pig job definition'
  description: |-
    ```powershell
    # Cluster info
    $clusterName = "your-hadoop-001"
    $clusterCreds = Get-Credential

    # Pig job details
    $statusFolder = "tempStatusFolder/"
    $query = "SHOW TABLES"

    New-AzHDInsightPigJobDefinition -StatusFolder $statusFolder `
                -Query $query `
            | Start-AzHDInsightJob `
                -ClusterName $clusterName `
                -ClusterCredential $clusterCreds
    ```

    This command creates a Pig job definition.
