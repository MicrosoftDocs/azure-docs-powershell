uid: Az.HDInsight.New-AzHDInsightPigJobDefinition
name: New-AzHDInsightPigJobDefinition
module: Az.HDInsight
isPreview: false
summary: |-
  Creates a Pig job object.
description: |-
  The **New-AzHDInsightPigJobDefinition** cmdlet defines a Pig job object for use with an Azure HDInsight cluster.
