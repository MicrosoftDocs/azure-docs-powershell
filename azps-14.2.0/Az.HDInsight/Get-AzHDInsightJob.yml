syntaxes:
- syntax: |-
    ```Syntax
    Get-AzHDInsightJob
        [-ClusterName] <String>
        [-HttpCredential] <PSCredential>
        [[-JobId] <String>]
        [-NumOfJobs <Int32>]
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
