syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzHDInsightPersistedScriptAction
        [-ClusterName] <String>
        [-Name] <String>
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
