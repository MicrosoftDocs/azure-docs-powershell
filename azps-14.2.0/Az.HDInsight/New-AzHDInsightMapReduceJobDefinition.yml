syntaxes:
- syntax: |-
    ```Syntax
    New-AzHDInsightMapReduceJobDefinition
        [-Arguments <String[]>]
        [-Files <String[]>]
        [-StatusFolder <String>]
        -ClassName <String>
        [-Defines <Hashtable>]
        -JarFile <String>
        [-JobName <String>]
        [-LibJars <String[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
