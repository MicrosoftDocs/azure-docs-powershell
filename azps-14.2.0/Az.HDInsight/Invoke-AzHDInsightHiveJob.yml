examples:
- title: 'Example 1: Submit a Hive query to an Azure HDInsight cluster'
  description: |-
    ```powershell
    # Primary storage account info
    $storageAccountResourceGroupName = "Group"
    $storageAccountName = "yourstorageacct001"
    $storageAccountKey = (Get-AzStorageAccountKey -ResourceGroupName $storageAccountResourceGroupName -Name $storageAccountName)[0].value


    $storageContainer = "container001"

    # Cluster info
    $clusterName = "your-hadoop-001"
    $clusterCreds = Get-Credential

    # Hive job details
    $statusFolder = "tempStatusFolder/"
    $query = "SHOW TABLES"

    Use-AzHDInsightCluster `
                -ClusterCredential $clusterCreds `
                -ClusterName $clusterName

    Invoke-AzHDInsightHiveJob -StatusFolder $statusFolder `
                -Query $query `
                -DefaultContainer $storageContainer `
                -DefaultStorageAccountName "$storageAccountName.blob.core.windows.net" `
                -DefaultStorageAccountKey $storageAccountKey
    ```

    This command submits the query SHOW TABLES to the cluster named your-hadoop-001.
