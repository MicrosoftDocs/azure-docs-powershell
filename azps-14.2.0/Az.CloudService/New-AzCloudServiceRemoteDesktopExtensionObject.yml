syntaxes:
- syntax: |-
    ```Syntax
    New-AzCloudServiceRemoteDesktopExtensionObject
        [-Name] <String>
        [-Credential] <PSCredential>
        [[-Expiration] <DateTime>]
        [[-TypeHandlerVersion] <String>]
        [[-RolesAppliedTo] <String[]>]
        [[-AutoUpgradeMinorVersion] <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
