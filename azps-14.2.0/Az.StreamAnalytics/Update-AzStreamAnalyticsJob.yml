uid: Az.StreamAnalytics.Update-AzStreamAnalyticsJob
name: Update-AzStreamAnalyticsJob
module: Az.StreamAnalytics
isPreview: false
summary: |-
  Creates a streaming job or replaces an already existing streaming job.
