syntaxes:
- syntax: |-
    ```Syntax
    Update-AzStreamAnalyticsJob
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-IfNoneMatch <String>]
        [-DataLocale <String>]
        [-EventsLateArrivalMaxDelayInSecond <Int32>]
        [-EventsOutOfOrderMaxDelayInSecond <Int32>]
        [-EventsOutOfOrderPolicy <EventsOutOfOrderPolicy>]
        [-OutputErrorPolicy <OutputErrorPolicy>]
        [-Tag <Hashtable>]
        [-ClusterId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzStreamAnalyticsJob
        -InputObject <IStreamAnalyticsIdentity>
        [-IfMatch <String>]
        [-IfNoneMatch <String>]
        [-DataLocale <String>]
        [-EventsLateArrivalMaxDelayInSecond <Int32>]
        [-EventsOutOfOrderMaxDelayInSecond <Int32>]
        [-EventsOutOfOrderPolicy <EventsOutOfOrderPolicy>]
        [-OutputErrorPolicy <OutputErrorPolicy>]
        [-Tag <Hashtable>]
        [-ClusterId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
