syntaxes:
- syntax: |-
    ```Syntax
    New-AzStreamAnalyticsCluster
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-IfNoneMatch <String>]
        [-Location <String>]
        [-SkuCapacity <Int32>]
        [-SkuName <ClusterSkuName>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
