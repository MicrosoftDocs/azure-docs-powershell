examples:
- title: 'Example 1: Update an output to a stream analytics job'
  description: |-
    ```powershell
    Update-AzStreamAnalyticsOutput -ResourceGroupName azure-rg-test -JobName sajob-01-pwsh -Name output-01 -File .\test\template-json\StorageAccount.json
    ```

    ```output
    Name      Type                                            ETag
    ----      ----                                            ----
    output-01 Microsoft.StreamAnalytics/streamingjobs/outputs d5a980c2-07cc-4dc7-8dd3-21d27ec1212d
    ```

    This command updates a new output in the stream analytics job.
- title: 'Example 2:  Update an output to a stream analytics job by pipeline'
  description: |-
    ```powershell
    Get-AzStreamAnalyticsOutput -ResourceGroupName azure-rg-test -JobName sajob-01-pwsh -Name output-01| Update-AzStreamAnalyticsOutput -File .\test\template-json\StorageAccount.json
    ```

    ```output
    Name      Type                                            ETag
    ----      ----                                            ----
    output-01 Microsoft.StreamAnalytics/streamingjobs/outputs 6bbe2f2d-519a-4cd9-9fdb-5311ea2617bc
    ```

    This command updates a new output in the stream analytics job by pipeline.
