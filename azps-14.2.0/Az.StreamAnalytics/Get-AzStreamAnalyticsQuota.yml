### YamlMime:PowerShellCmdlet1
uid: Az.StreamAnalytics.Get-AzStreamAnalyticsQuota
name: Get-AzStreamAnalyticsQuota
module: Az.StreamAnalytics
isPreview: false
summary: |-
  Retrieves the subscription's current quota information in a particular region.
description: |-
  Retrieves the subscription's current quota information in a particular region.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="System.Management.Automation.PSObject" data-throw-if-not-resolved="False" />
    description: |-
      The DefaultProfile parameter is not functional.
      Use the SubscriptionId parameter when available if executing the cmdlet against a different subscription.
    aliases:
    - AzureRMContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The region in which to retrieve the subscription's quota information.
      You can find out which regions Azure Stream Analytics is supported in here: https://azure.microsoft.com/en-us/regions/
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubscriptionId
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The ID of the target subscription.
    defaultValue: (Get-AzContext).Subscription.Id
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzStreamAnalyticsQuota
        -Location <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.StreamAnalytics.Models.Api20170401Preview.ISubscriptionQuota" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get information about the Streaming Unit quota for a region'
  description: |-
    ```powershell
    Get-AzStreamAnalyticsQuota -Location 'WestCentralUS'
    ```

    ```output
    Name              Type
    ----              ----
    StreamingUnits    Microsoft.StreamAnalytics/quotas
    StreamingClusters Microsoft.StreamAnalytics/quotas
    ```

    This command returns information about Streaming Unit quota and usage in the WestCentralUS region.
