uid: Az.Dashboard.New-AzGrafana
name: New-AzGrafana
module: Az.Dashboard
isPreview: false
summary: |-
  Create or update a workspace for Grafana resource.
  This API is idempotent, so user can either create a new grafana or update an existing grafana.
