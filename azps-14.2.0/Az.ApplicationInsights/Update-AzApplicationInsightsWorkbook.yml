syntaxes:
- syntax: |-
    ```Syntax
    Update-AzApplicationInsightsWorkbook
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-LinkedSourceId <String>]
        [-Category <String>]
        [-Description <String>]
        [-DisplayName <String>]
        [-Revision <String>]
        [-SerializedData <String>]
        [-SourceTag <String[]>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzApplicationInsightsWorkbook
        -InputObject <IApplicationInsightsIdentity>
        [-LinkedSourceId <String>]
        [-Category <String>]
        [-Description <String>]
        [-DisplayName <String>]
        [-Revision <String>]
        [-SerializedData <String>]
