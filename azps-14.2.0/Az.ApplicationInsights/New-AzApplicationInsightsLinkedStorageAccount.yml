syntaxes:
- syntax: |-
    ```Syntax
    New-AzApplicationInsightsLinkedStorageAccount
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-LinkedStorageAccountResourceId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
