syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzResourceMoverInitiateMove
        -MoveCollectionName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -MoveResource <String[]>
        [-MoveResourceInputType <MoveResourceInputType>]
        [-ValidateOnly]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
