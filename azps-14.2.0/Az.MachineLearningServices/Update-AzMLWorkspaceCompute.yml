uid: Az.MachineLearningServices.Update-AzMLWorkspaceCompute
name: Update-AzMLWorkspaceCompute
module: Az.MachineLearningServices
isPreview: false
summary: |-
  Updates properties of a compute.
  This call will overwrite a compute if it exists.
  This is a nonrecoverable operation.
