- title: 'Example 1: Updates properties of a compute'
  description: |-
    ```powershell
    Update-AzMLWorkspaceCompute -ResourceGroupName ml-rg-test -WorkspaceName mlworkspace-test01 -Name aml02 -MaxNodeCount 8
    ```

