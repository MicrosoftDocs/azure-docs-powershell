- title: 'Example 2: Updates properties of a compute by pipeline'
  description: |-
    ```powershell
    Get-AzMLWorkspaceCompute -ResourceGroupName ml-rg-test -WorkspaceName mlworkspace-test01 -Name aml02 | Update-AzMLWorkspaceCompute -MaxNodeCount 8
