syntaxes:
- syntax: |-
    ```Syntax
    Update-AzMLWorkspaceCompute
        -Name <String>
        -ResourceGroupName <String>
        -WorkspaceName <String>
        [-SubscriptionId <String>]
        [-MaxNodeCount <Int32>]
        [-MinNodeCount <Int32>]
        [-NodeIdleTimeBeforeScaleDown <TimeSpan>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzMLWorkspaceCompute
        -InputObject <IMachineLearningServicesIdentity>
        [-MaxNodeCount <Int32>]
        [-MinNodeCount <Int32>]
        [-NodeIdleTimeBeforeScaleDown <TimeSpan>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
