### YamlMime:PowerShellCmdlet1
uid: Az.Automation.Set-AzAutomationWebhook
name: Set-AzAutomationWebhook
module: Az.Automation
isPreview: false
summary: |-
  Modifies a webhook for an Automation runbook.
description: |-
  The **Set-AzAutomationWebhook** cmdlet modifies a webhook for an Azure Automation runbook.
parameters:
  cmdletParameters:
  - name: AutomationAccountName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an Automation account in which this cmdlet modifies a webhook.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IsEnabled
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Boolean" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies whether the webhook is enabled.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name of the webhook that this cmdlet modifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Parameters
    type: <xref href="System.Collections.IDictionary" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a dictionary of key/value pairs.
      The keys are the runbook parameter names.
      The values are the runbook parameter values.
      When the runbook starts in response to a webhook, these parameters are passed to the runbook.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the resource group for which this cmdlet modifies a webhook.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RunOn
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Optional name of the hybrid agent which should execute the runbook
    aliases:
    - HybridWorker
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzAutomationWebhook
        [-Name] <String>
        [-IsEnabled] <Boolean>
        [[-Parameters] <IDictionary>]
        [-RunOn <String>]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" />
- name: <xref href="System.Collections.IDictionary" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Automation.Model.Webhook" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Disable a webhook'
  description: |-
    ```powershell
    Set-AzAutomationWebhook -Name "Webhook01" -ResourceGroupName "ResourceGroup01" -AutomationAccountName "AutomationAccount01" -IsEnabled $False
    ```

    This command disables a webhook named Webhook01 in the Automation account named AutomationAccount01.
- title: Example 2
  description: |-
    ```powershell
    Set-AzAutomationWebhook -Name "Webhook01" -ResourceGroupName "ResourceGroup01" -AutomationAccountName "AutomationAccount01" -RunOn 'Windows'
    ```

    This command sets the run on value for the webhook and forces the runbook to be run on a Hybrid Worker group called Windows.
- title: Example 3
  description: |-
    ```powershell
    Set-AzAutomationWebhook -Name "Webhook01" -ResourceGroupName "ResourceGroup01" -AutomationAccountName "AutomationAccount01" -RunOn $null
    ```

    This command updates the run on value for the webhook and forces the runbook to be run on an Azure runbook worker.
