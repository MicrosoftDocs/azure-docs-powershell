syntaxes:
- syntax: |-
    ```Syntax
    New-AzAutomationConnection
        [-Name] <String>
        [-ConnectionTypeName] <String>
        [-ConnectionFieldValues] <IDictionary>
        [-Description <String>]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
