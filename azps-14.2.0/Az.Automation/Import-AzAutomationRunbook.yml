syntaxes:
- syntax: |-
    ```Syntax
    Import-AzAutomationRunbook
        [-Path] <String>
        [-Description <String>]
        [-Name <String>]
        [-Tags <IDictionary>]
        -Type <String>
        [-LogProgress <Boolean>]
        [-LogVerbose <Boolean>]
        [-Published]
        [-Force]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
