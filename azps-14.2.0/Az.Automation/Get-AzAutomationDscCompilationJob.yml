    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the status of jobs that this cmdlet gets.
      Valid values are:
      - Completed
      - Failed
      - Queued
      - Starting
      - Resuming
      - Running
      - Stopped
      - Stopping
      - Suspended
      - Suspending
      - Activating
      - New
