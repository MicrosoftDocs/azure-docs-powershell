syntaxes:
- syntax: |-
    ```Syntax
    Export-AzAutomationDscNodeReportContent
        -NodeId <Guid>
        -ReportId <Guid>
        [-OutputFolder <String>]
        [-Force]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
