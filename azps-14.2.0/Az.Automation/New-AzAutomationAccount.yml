syntaxes:
- syntax: |-
    ```Syntax
    New-AzAutomationAccount
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        [-Plan <String>]
        [-Tags <IDictionary>]
        [-AssignSystemIdentity]
        [-AssignUserIdentity <String[]>]
        [-AutomationServicesEncryption]
        [-DisablePublicNetworkAccess]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: AutomationServicesEncryption
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzAutomationAccount
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        -KeyName <String>
        -KeyVersion <String>
        -KeyVaultUri <String>
        [-Plan <String>]
        [-Tags <IDictionary>]
        [-AssignSystemIdentity]
        [-AssignUserIdentity <String[]>]
        [-KeyVaultEncryption]
        [-UserIdentityEncryption <String>]
        [-DisablePublicNetworkAccess]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
