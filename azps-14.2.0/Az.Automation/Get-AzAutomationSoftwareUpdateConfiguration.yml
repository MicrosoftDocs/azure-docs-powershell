syntaxes:
- syntax: |-
    ```Syntax
    Get-AzAutomationSoftwareUpdateConfiguration
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByAll
  isDefault: true
