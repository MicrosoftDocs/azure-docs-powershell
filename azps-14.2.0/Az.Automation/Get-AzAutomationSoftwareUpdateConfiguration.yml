examples:
- title: Example 1
  description: |-
    Get an azure automation software update configuration by name.

    ```powershell
    Get-AzAutomationSoftwareUpdateConfiguration -ResourceGroupName "mygroup" -AutomationAccountName "myaccount" -Name "MyWeeklySchedule"
    ```

