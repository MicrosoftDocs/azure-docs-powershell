### YamlMime:PowerShellCmdlet1
uid: Az.Automation.Register-AzAutomationScheduledRunbook
name: Register-AzAutomationScheduledRunbook
module: Az.Automation
isPreview: false
summary: |-
  Associates a runbook to a schedule.
description: |-
  The **Register-AzAutomationScheduledRunbook** cmdlet associates an Azure Automation runbook to a schedule.
  The runbook starts based on the schedule you specify using the *ScheduleName* parameter.
parameters:
  cmdletParameters:
  - name: AutomationAccountName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Automation account for the runbook on which this cmdlet operates.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Parameters
    type: <xref href="System.Collections.IDictionary" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a hash table of key/value pairs.
      The keys are runbook parameter names.
      The values are runbook parameter values.
      When the runbook starts in response to the associated schedule, these parameters are passed to the runbook.
      Example: -Parameters @{"Key1"="Value1";"Key2"="Value2"}
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByRunbookNameAndScheduleName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a resource group for the scheduled runbook.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RunbookName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the runbook that this cmdlet associates to a schedule.
    aliases:
