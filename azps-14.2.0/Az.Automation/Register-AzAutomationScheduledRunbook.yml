syntaxes:
- syntax: |-
    ```Syntax
    Register-AzAutomationScheduledRunbook
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByRunbookName
  isDefault: true
- syntax: |-
    ```Syntax
    Register-AzAutomationScheduledRunbook
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
