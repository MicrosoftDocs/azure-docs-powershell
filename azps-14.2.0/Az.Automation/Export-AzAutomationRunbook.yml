syntaxes:
- syntax: |-
    ```Syntax
    Export-AzAutomationRunbook
        [-Name] <String>
        [-Slot <String>]
        [-OutputFolder <String>]
        [-Force]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
