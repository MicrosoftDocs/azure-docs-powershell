syntaxes:
- syntax: |-
    ```Syntax
    Set-AzAutomationRunbook
        [-Name] <String>
        [-Description <String>]
        [-Tag <IDictionary>]
        [-LogProgress <Boolean>]
        [-LogVerbose <Boolean>]
        [-ResourceGroupName] <String>
        [-AutomationAccountName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
