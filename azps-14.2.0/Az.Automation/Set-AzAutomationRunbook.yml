uid: Az.Automation.Set-AzAutomationRunbook
name: Set-AzAutomationRunbook
module: Az.Automation
isPreview: false
summary: |-
  Modifies a runbook.
description: |-
  The **Set-AzAutomationRunbook** cmdlet modifies the configuration of an Azure Automation runbook in APS.
