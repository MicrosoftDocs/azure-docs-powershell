syntaxes:
- syntax: |-
    ```Syntax
    Add-AzKustoClusterCalloutPolicy
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-NextLink <String>]
        [-Value <ICalloutPolicy[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AddExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzKustoClusterCalloutPolicy
        -InputObject <IKustoIdentity>
        [-NextLink <String>]
        [-Value <ICalloutPolicy[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
