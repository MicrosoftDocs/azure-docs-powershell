syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKustoClusterCalloutPolicy
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
