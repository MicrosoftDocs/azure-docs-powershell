syntaxes:
- syntax: |-
    ```Syntax
    New-AzKustoPrivateEndpointConnection
        -ClusterName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-PrivateLinkServiceConnectionStateDescription <String>]
        [-PrivateLinkServiceConnectionStateStatus <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzKustoPrivateEndpointConnection
        -ClusterName <String>
        -Name <String>
        -ResourceGroupName <String>
        -Parameter <IPrivateEndpointConnection>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
