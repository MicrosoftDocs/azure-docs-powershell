syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzKustoClusterMigration
        -Name <String>
        -ResourceGroupName <String>
        -ClusterResourceId <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: MigrateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzKustoClusterMigration
        -Name <String>
        -ResourceGroupName <String>
        -ClusterMigrateRequest <IClusterMigrateRequest>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
