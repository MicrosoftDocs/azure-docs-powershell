syntaxes:
- syntax: |-
    ```Syntax
    Get-AzKustoClusterFollowerDatabase
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
