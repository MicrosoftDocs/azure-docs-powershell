syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzKustoDetachClusterFollowerDatabase
        -ClusterName <String>
        -ResourceGroupName <String>
        -AttachedDatabaseConfigurationName <String>
        -ClusterResourceId <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DetachExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzKustoDetachClusterFollowerDatabase
        -InputObject <IKustoIdentity>
        -AttachedDatabaseConfigurationName <String>
        -ClusterResourceId <String>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DetachViaIdentityExpanded
  isDefault: false
