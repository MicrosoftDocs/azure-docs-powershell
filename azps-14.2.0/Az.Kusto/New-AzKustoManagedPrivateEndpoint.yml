syntaxes:
- syntax: |-
    ```Syntax
    New-AzKustoManagedPrivateEndpoint
        -ClusterName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-GroupId <String>]
        [-PrivateLinkResourceId <String>]
        [-PrivateLinkResourceRegion <String>]
        [-RequestMessage <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzKustoManagedPrivateEndpoint
        -ClusterName <String>
        -Name <String>
        -ResourceGroupName <String>
        -Parameter <IManagedPrivateEndpoint>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
