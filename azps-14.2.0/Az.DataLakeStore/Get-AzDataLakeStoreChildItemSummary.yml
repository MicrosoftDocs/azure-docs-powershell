    ```Syntax
    Get-AzDataLakeStoreChildItemSummary
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [-Concurrency <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
