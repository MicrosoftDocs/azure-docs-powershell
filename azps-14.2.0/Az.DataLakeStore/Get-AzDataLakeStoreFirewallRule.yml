    Get-AzDataLakeStoreFirewallRule
        [-Account] <String>
        [[-Name] <String>]
        [[-ResourceGroupName] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
