syntaxes:
- syntax: |-
    ```Syntax
    Import-AzDataLakeStoreItem
        [-Account] <String>
        [-Path] <String>
        [-Destination] <DataLakeStorePathInstance>
        [-Recurse]
        [-Resume]
        [-ForceBinary]
        [-Force]
        [-Concurrency <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NoDiagnosticLogging
  isDefault: true
- syntax: |-
    ```Syntax
    Import-AzDataLakeStoreItem
        [-Account] <String>
        [-Path] <String>
        [-Destination] <DataLakeStorePathInstance>
        -DiagnosticLogPath <String>
        [-Recurse]
        [-Resume]
        [-ForceBinary]
        [-Force]
        [-Concurrency <Int32>]
        [-DiagnosticLogLevel <LogLevel>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IncludeDiagnosticLogging
  isDefault: false
