syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDataLakeStoreItemExpiry
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [[-Expiration] <DateTimeOffset>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetAbsoluteNeverExpireExpiry
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzDataLakeStoreItemExpiry
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [-RelativeFileExpiryOption] <PathRelativeExpiryOptions>
        [[-RelativeTime] <Int64>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
