syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataLakeStoreItem
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [[-Value] <Object>]
        [[-Encoding] <Encoding>]
        [-Folder]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
