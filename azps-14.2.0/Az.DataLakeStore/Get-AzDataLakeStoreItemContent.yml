syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataLakeStoreItemContent
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [[-Offset] <Int64>]
        [[-Length] <Int64>]
        [[-Encoding] <Encoding>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PreviewFileContent
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDataLakeStoreItemContent
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [[-Head] <Int32>]
        [[-Encoding] <Encoding>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PreviewFileRowsFromHead
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzDataLakeStoreItemContent
        [-Account] <String>
        [-Path] <DataLakeStorePathInstance>
        [[-Tail] <Int32>]
        [[-Encoding] <Encoding>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PreviewFileRowsFromTail
  isDefault: false
