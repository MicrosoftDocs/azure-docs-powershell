uid: Az.DataLakeStore.Get-AzDataLakeStoreItemContent
name: Get-AzDataLakeStoreItemContent
module: Az.DataLakeStore
isPreview: false
summary: |-
  Gets the contents of a file in Data Lake Store.
description: |-
  The **Get-AzDataLakeStoreItemContent** cmdlet gets the contents of a file in Data Lake Store.
