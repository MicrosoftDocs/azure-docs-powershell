examples:
- title: 'Example 1: Get the ACL for a folder'
  description: |-
    ```powershell
    Get-AzDataLakeStoreItemAclEntry -AccountName 'ContosoADL' -Path '/'
    ```

    This command gets the ACL for the root directory of the specified Data Lake Store account
