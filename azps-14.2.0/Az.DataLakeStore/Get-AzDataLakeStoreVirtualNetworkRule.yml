syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataLakeStoreVirtualNetworkRule
        [-Account] <String>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
