    ```powershell
    $clusterResourceGroupName = "Group"
    $clusterpoolName = "your-clusterpool"
    $tag = @{name = "value"}

    Update-AzHdInsightOnAksClusterPoolTag `
        -ClusterPoolName $clusterpoolName `
        -ResourceGroupName $clusterResourceGroupName `
        -Tag $tag
    ```

