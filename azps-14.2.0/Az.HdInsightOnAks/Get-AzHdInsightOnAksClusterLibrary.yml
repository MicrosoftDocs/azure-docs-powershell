syntaxes:
- syntax: |-
    ```Syntax
    Get-AzHdInsightOnAksClusterLibrary
        -ClusterName <String>
        -ClusterPoolName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        -Category <String>
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
