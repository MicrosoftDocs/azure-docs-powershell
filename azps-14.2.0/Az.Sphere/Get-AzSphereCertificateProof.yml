syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSphereCertificateProof
        -CatalogName <String>
        -ResourceGroupName <String>
        -SerialNumber <String>
        -ProofOfPossessionNonce <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RetrieveExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSphereCertificateProof
        -SerialNumber <String>
        -CatalogInputObject <ISphereIdentity>
        -ProofOfPossessionNonce <String>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RetrieveViaIdentityCatalogExpanded
  isDefault: false
- syntax: |-
