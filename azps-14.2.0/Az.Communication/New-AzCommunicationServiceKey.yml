syntaxes:
- syntax: |-
    ```Syntax
    New-AzCommunicationServiceKey
        -CommunicationServiceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-KeyType <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RegenerateExpanded
  isDefault: true
- syntax: |-
