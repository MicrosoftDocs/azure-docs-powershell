syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataTransferPendingConnection
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
