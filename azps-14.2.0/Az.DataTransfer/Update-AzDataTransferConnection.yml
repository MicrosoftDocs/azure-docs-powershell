examples:
- title: 'Example 1: Update tags for a connection'
  description: |-
    ```powershell
    Update-AzDataTransferConnection -ResourceGroupName ResourceGroup01 -Name Connection01 -Tag @{Environment="Production"; Department="IT"} -Confirm:$false
    ```

    ```output
