syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataTransferPendingFlow
        -ConnectionName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
