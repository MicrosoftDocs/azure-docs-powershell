examples:
- title: 'Example 1: List all pending flows for a specific connection'
  description: |-
    ```powershell
    $pendingFlows = Get-AzDataTransferPendingFlow -ResourceGroupName ResourceGroup01 -ConnectionName Connection01
    ```

    ```output
