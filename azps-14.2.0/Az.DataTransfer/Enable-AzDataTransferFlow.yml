syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzDataTransferFlow
        -ConnectionName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Enable
  isDefault: true
- syntax: |-
    ```Syntax
    Enable-AzDataTransferFlow
        -Name <String>
        -ConnectionInputObject <IDataTransferIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnableViaIdentityConnection
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-AzDataTransferFlow
        -InputObject <IDataTransferIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnableViaIdentity
  isDefault: false
