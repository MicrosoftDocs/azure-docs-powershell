syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetworkFabricController
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        [-SubscriptionId <String>]
        [-Annotation <String>]
        [-InfrastructureExpressRouteConnection <IExpressRouteConnectionInformation[]>]
        [-Ipv4AddressSpace <String>]
        [-Ipv6AddressSpace <String>]
        [-IsWorkloadManagementNetworkEnabled <String>]
        [-ManagedResourceGroupConfigurationLocation <String>]
        [-ManagedResourceGroupConfigurationName <String>]
        [-NfcSku <String>]
        [-Tag <Hashtable>]
        [-WorkloadExpressRouteConnection <IExpressRouteConnectionInformation[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
