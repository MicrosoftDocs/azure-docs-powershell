        [-AppliedScopePropertyManagementGroupId <String>]
        [-AppliedScopePropertyResourceGroupId <String>]
        [-AppliedScopePropertySubscriptionId <String>]
        [-AppliedScopePropertyTenantId <String>]
        [-AppliedScopeType <String>]
        [-BillingPlan <String>]
        [-BillingScopeId <String>]
        [-DisplayName <String>]
        [-Location <String>]
        [-Quantity <Int32>]
        [-Renew]
        [-ReservedResourcePropertyInstanceFlexibility <String>]
        [-ReservedResourceType <String>]
        [-ReviewDateTime <DateTime>]
        [-SkuName <String>]
        [-Term <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
