    ```Syntax
    Get-AzStorageEncryptionScope
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        [-EncryptionScopeName <String>]
        [-MaxPageSize <Int32>]
        [-Filter <String>]
        [-Include <String>]
        [-DefaultProfile <IAzureContextContainer>]
