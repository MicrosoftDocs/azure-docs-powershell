syntaxes:
- syntax: |-
    ```Syntax
    Update-AzStorageServiceProperty
        [-ServiceType] <StorageServiceType>
        [-DefaultServiceVersion <String>]
        [-PassThru]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
