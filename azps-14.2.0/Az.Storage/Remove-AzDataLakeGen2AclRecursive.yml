syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataLakeGen2AclRecursive
        [-FileSystem] <String>
        [[-Path] <String>]
        [-ContinuationToken <String>]
        -Acl <PSPathAccessControlEntry[]>
        [-ContinueOnFailure]
        [-BatchSize <Int32>]
        [-MaxBatchCount <Int32>]
        [-AsJob]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
