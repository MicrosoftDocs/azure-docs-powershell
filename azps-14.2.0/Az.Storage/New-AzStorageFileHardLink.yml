syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageFileHardLink
        [-ShareName] <String>
        [-Path] <String>
        [-TargetFile] <String>
        [-TargetFileLeaseId <String>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ShareName
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzStorageFileHardLink
        [-ShareClient] <ShareClient>
        [-Path] <String>
        [-TargetFile] <String>
        [-TargetFileLeaseId <String>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Share
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzStorageFileHardLink
        [-ShareDirectoryClient] <ShareDirectoryClient>
        [-Path] <String>
        [-TargetFile] <String>
        [-TargetFileLeaseId <String>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Directory
  isDefault: false
