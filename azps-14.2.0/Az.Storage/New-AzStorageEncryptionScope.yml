syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageEncryptionScope
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        -EncryptionScopeName <String>
        [-StorageEncryption]
        [-RequireInfrastructureEncryption]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountName
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzStorageEncryptionScope
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        -EncryptionScopeName <String>
        -KeyUri <String>
        [-KeyvaultEncryption]
        [-RequireInfrastructureEncryption]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountNameKeyVault
  isDefault: false
- syntax: |-
