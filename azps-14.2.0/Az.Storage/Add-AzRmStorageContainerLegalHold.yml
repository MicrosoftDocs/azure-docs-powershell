syntaxes:
- syntax: |-
    ```Syntax
    Add-AzRmStorageContainerLegalHold
        [-ResourceGroupName] <String>
        [-StorageAccountName] <String>
        -Name <String>
        -Tag <String[]>
        [-AllowProtectedAppendWriteAll <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountName
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzRmStorageContainerLegalHold
        -Name <String>
        -StorageAccount <PSStorageAccount>
        -Tag <String[]>
        [-AllowProtectedAppendWriteAll <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AccountObject
  isDefault: false
- syntax: |-
