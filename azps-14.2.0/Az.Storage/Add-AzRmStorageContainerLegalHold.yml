    Add-AzRmStorageContainerLegalHold
        -Container <PSContainer>
        -Tag <String[]>
        [-AllowProtectedAppendWriteAll <Boolean>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
