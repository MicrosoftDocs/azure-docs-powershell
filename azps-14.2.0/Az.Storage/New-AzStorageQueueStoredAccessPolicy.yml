    New-AzStorageQueueStoredAccessPolicy
        [-Queue] <String>
        [-Policy] <String>
        [-Permission <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-Context <IStorageContext>]
