### YamlMime:PowerShellCmdlet1
uid: Az.Storage.New-AzStorageObjectReplicationPolicyRule
name: New-AzStorageObjectReplicationPolicyRule
module: Az.Storage
isPreview: false
summary: |-
  Creates an object replication policy rule.
description: |-
  The **Get-AzStorageObjectReplicationPolicy** cmdlet creates an object replication policy rule, which will be used in Set-AzStorageObjectReplicationPolicy cmdlet.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationContainer
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The Destination Container name to replicate to.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MinCreationTime
    type: <xref href="System.DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Blobs created after the time will be replicated to the destination..
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PrefixMatch
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Filters the results to replicate only blobs whose names begin with the specified prefix.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RuleId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Object Replication Rule Id.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceContainer
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The Source Container name to replicate from.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageObjectReplicationPolicyRule
        -SourceContainer <String>
        -DestinationContainer <String>
        [-PrefixMatch <String[]>]
        [-MinCreationTime <DateTime>]
        [-RuleId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Management.Storage.Models.PSObjectReplicationPolicyRule" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an object replication policy rule with only source and destination account, and show its properties'
  description: |-
    ```powershell
    $rule1 = New-AzStorageObjectReplicationPolicyRule -SourceContainer src1 -DestinationContainer dest1

    $rule1
    ```

    ```output
    RuleId SourceContainer DestinationContainer Filters.PrefixMatch Filters.MinCreationTime
    ------ --------------- -------------------- ------------------- -----------------------
           src1            dest1                {}
    ```

    This command creates an object replication policy rule with only source and destination account, and show its properties.
- title: 'Example 2: Create an object replication policy rule with all properties, and show its properties'
  description: |-
    ```powershell
    $rule2 = New-AzStorageObjectReplicationPolicyRule -SourceContainer src -DestinationContainer dest -MinCreationTime 2019-01-01T16:00:00Z -PrefixMatch a,abc,dd

    $rule2
    ```

    ```output
    RuleId SourceContainer DestinationContainer Filters.PrefixMatch Filters.MinCreationTime
    ------ --------------- -------------------- ------------------- -----------------------
           src             dest                 {a, abc, dd}        2019-01-01T16:00:00Z
    ```

    This command an object replication policy rule with all properties, and show its properties.
