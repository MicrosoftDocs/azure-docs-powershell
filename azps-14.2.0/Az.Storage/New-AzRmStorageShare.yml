### YamlMime:PowerShellCmdlet1
uid: Az.Storage.New-AzRmStorageShare
name: New-AzRmStorageShare
module: Az.Storage
isPreview: false
summary: |-
  Creates a Storage file share.
description: |-
  The **New-AzRmStorageShare** cmdlet creates a Storage file share.
parameters:
  cmdletParameters:
  - name: AccessTier
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Access tier for specific share. StorageV2 account can choose between TransactionOptimized (default), Hot, and Cool. FileStorage account can choose Premium.
    acceptedValues:
    - TransactionOptimized
    - Premium
    - Hot
    - Cool
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EnabledProtocol
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Sets protocols for file shares. It cannot be changed after file share creation. Possible values include: 'SMB', 'NFS'
    acceptedValues:
    - NFS
    - SMB
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
