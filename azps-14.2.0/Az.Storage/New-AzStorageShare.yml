  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageShare
        [-Name] <String>
        [-Protocol <String>]
        [-EnableSnapshotVirtualDirectoryAccess <Boolean>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.IStorageContext" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.Common.Storage.ResourceModel.AzureStorageFileShare" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a file share'
  description: |-
    ```powershell
    New-AzStorageShare -Name "ContosoShare06"
    ```

    This command creates a file share named ContosoShare06.
- title: 'Example 2: Create a file share with NFS protocol and EnableSnapshotVirtualDirectoryAccess'
  description: |-
    ```powershell
    New-AzStorageShare -Name "contososhare07" -Protocol Nfs -EnableSnapshotVirtualDirectoryAccess $true
    ```

    This command creates a file share named contososhare07 with NFS protocol, and EnableSnapshotVirtualDirectoryAccess as true.
