syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataLakeGen2Item
        [-FileSystem] <String>
        [-Path] <String>
        [-Force]
        [-AsJob]
        [-PassThru]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ReceiveManual
  isDefault: true
