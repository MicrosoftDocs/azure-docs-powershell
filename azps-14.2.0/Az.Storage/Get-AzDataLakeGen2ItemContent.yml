syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataLakeGen2ItemContent
        [-FileSystem] <String>
        [-Path] <String>
        [-Destination <String>]
        [-CheckMd5]
        [-Force]
        [-AsJob]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ReceiveManual
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDataLakeGen2ItemContent
        -InputObject <AzureDataLakeGen2Item>
        [-Destination <String>]
        [-CheckMd5]
        [-Force]
        [-AsJob]
        [-Context <IStorageContext>]
        [-DefaultProfile <IAzureContextContainer>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ItemPipeline
  isDefault: false
