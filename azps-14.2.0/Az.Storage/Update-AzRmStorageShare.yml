### YamlMime:PowerShellCmdlet1
uid: Az.Storage.Update-AzRmStorageShare
name: Update-AzRmStorageShare
module: Az.Storage
isPreview: false
summary: |-
  Modifies a Storage file share.
description: |-
  The **New-AzRmStorageShare** cmdlet modifies a Storage file share.
