- title: 'Example 2: Create Or Update a Experiment resource for Json String.'
  description: |-
    ```powershell
    $jsonStr = '
    {
      "location": "eastus",
      "identity": {
        "type": "SystemAssigned"
      },
      "properties": {
        "steps": [
          {
            "name": "step1",
            "branches": [
              {
                "name": "branch1",
                "actions": [
                  {
                    "type": "continuous",
                    "name": "urn:csci:microsoft:virtualMachine:shutdown/1.0",
                    "selectorId": "selector1",
                    "duration": "PT10M",
                    "parameters": [
                      {
                        "key": "abruptShutdown",
                        "value": "false"
                      }
                    ]
                  }
                ]
              }
            ]
          }
        ],
        "selectors": [
          {
            "type": "List",
            "id": "selector1",
            "targets": [
              {
                "type": "ChaosTarget",
                "id": "/subscriptions/9e223dbe-3399-4e19-88eb-0975f02ac87f/resourceGroups/azps_test_group_chaos/providers/Microsoft.Compute/virtualMachines/azpstest1/providers/Microsoft.Chaos/targets/microsoft-virtualmachine"
              }
            ]
          }
        ]
      }
    }'

    New-AzChaosExperiment -Name experiment-test -ResourceGroupName azps_test_group_chaos -JsonString $jsonStr
    ```

