syntaxes:
- syntax: |-
    ```Syntax
    Update-AzChaosExperiment
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-EnableSystemAssignedIdentity <Boolean>]
        [-Location <String>]
        [-Selector <ISelector[]>]
        [-Step <IStep[]>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
