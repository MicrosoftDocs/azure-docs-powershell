syntaxes:
- syntax: |-
    ```Syntax
    New-AzConnectedVMwareVM
        -MachineId <String>
        [-ExtendedLocationName <String>]
        [-ExtendedLocationType <String>]
        [-HardwareProfileMemorySizeMb <Int32>]
        [-HardwareProfileNumCoresPerSocket <Int32>]
        [-HardwareProfileNumCpus <Int32>]
        [-InfrastructureProfileFirmwareType <String>]
        [-InfrastructureProfileInventoryItemId <String>]
        [-InfrastructureProfileSmbiosUuid <String>]
        [-InfrastructureProfileTemplateId <String>]
        [-InfrastructureProfileVCenterId <String>]
        [-NetworkProfileNetworkInterface <INetworkInterface[]>]
        [-OSProfileAdminPassword <String>]
        [-OSProfileAdminUsername <String>]
        [-OSProfileComputerName <String>]
        [-OSProfileGuestId <String>]
        [-OSProfileOstype <String>]
        [-PlacementProfileClusterId <String>]
        [-PlacementProfileDatastoreId <String>]
        [-PlacementProfileHostId <String>]
        [-PlacementProfileResourcePoolId <String>]
        [-StorageProfileDisk <IVirtualDisk[]>]
        [-UefiSettingSecureBootEnabled]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzConnectedVMwareVM
        -MachineId <String>
        -JsonFilePath <String>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaJsonFilePath
  isDefault: false
- syntax: |-
