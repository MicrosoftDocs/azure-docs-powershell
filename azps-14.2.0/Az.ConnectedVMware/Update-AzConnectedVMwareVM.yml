syntaxes:
- syntax: |-
    ```Syntax
    Update-AzConnectedVMwareVM
        -MachineId <String>
        [-HardwareProfileMemorySizeMb <Int32>]
        [-HardwareProfileNumCoresPerSocket <Int32>]
        [-HardwareProfileNumCpus <Int32>]
        [-NetworkProfileNetworkInterface <INetworkInterfaceUpdate[]>]
        [-StorageProfileDisk <IVirtualDiskUpdate[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzConnectedVMwareVM
        -MachineId <String>
        -JsonFilePath <String>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaJsonFilePath
  isDefault: false
- syntax: |-
