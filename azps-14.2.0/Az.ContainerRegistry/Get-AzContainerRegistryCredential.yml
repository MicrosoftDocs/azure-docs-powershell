syntaxes:
- syntax: |-
    ```Syntax
    Get-AzContainerRegistryCredential
        -RegistryName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: List
