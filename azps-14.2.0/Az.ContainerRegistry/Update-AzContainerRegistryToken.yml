syntaxes:
- syntax: |-
    ```Syntax
    Update-AzContainerRegistryToken
        -Name <String>
        -RegistryName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-CredentialsCertificate <ITokenCertificate[]>]
        [-CredentialsPassword <ITokenPassword[]>]
        [-ScopeMapId <String>]
        [-Status <TokenStatus>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzContainerRegistryToken
        -InputObject <IContainerRegistryIdentity>
        [-CredentialsCertificate <ITokenCertificate[]>]
        [-CredentialsPassword <ITokenPassword[]>]
        [-ScopeMapId <String>]
        [-Status <TokenStatus>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
