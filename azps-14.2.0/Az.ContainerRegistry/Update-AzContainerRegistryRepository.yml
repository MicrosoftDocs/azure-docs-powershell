syntaxes:
- syntax: |-
    ```Syntax
    Update-AzContainerRegistryRepository
        -Name <String>
        [-DeleteEnabled <Boolean>]
        [-WriteEnabled <Boolean>]
        [-ListEnabled <Boolean>]
        [-ReadEnabled <Boolean>]
        -RegistryName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
