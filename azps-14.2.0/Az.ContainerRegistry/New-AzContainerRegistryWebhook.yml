syntaxes:
- syntax: |-
    ```Syntax
    New-AzContainerRegistryWebhook
        -Name <String>
        -RegistryName <String>
        -ResourceGroupName <String>
        -Action <WebhookAction[]>
        [-SubscriptionId <String>]
        [-Location <String>]
        [-CustomHeader <Hashtable>]
        [-Scope <String>]
        [-ServiceUri <String>]
        [-Status <WebhookStatus>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzContainerRegistryWebhook
        -Name <String>
        -Registry <IRegistry>
        -Action <WebhookAction[]>
        [-SubscriptionId <String>]
        [-Location <String>]
        [-CustomHeader <Hashtable>]
        [-Scope <String>]
        [-ServiceUri <String>]
        [-Status <WebhookStatus>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
