syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDataLakeAnalyticsComputePolicy
        [-ResourceGroupName <String>]
        [-Account] <String>
        [-Name] <String>
        [-MaxAnalyticsUnitsPerJob <Int32>]
        [-MinPriorityPerJob <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
