### YamlMime:PowerShellCmdlet1
uid: Az.DataLakeAnalytics.Get-AzDataLakeAnalyticsJob
name: Get-AzDataLakeAnalyticsJob
module: Az.DataLakeAnalytics
isPreview: false
summary: |-
  Gets a Data Lake Analytics job.
description: |-
  The **Get-AzDataLakeAnalyticsJob** cmdlet gets an Azure Data Lake Analytics job.
  If you do not specify a job, this cmdlet gets all jobs.
