syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataLakeAnalyticsJob
        [-Account] <String>
        [[-Name] <String>]
        [[-Submitter] <String>]
        [[-SubmittedAfter] <DateTimeOffset>]
        [[-SubmittedBefore] <DateTimeOffset>]
        [[-State] <JobState[]>]
        [[-Result] <JobResult[]>]
        [-Top <Int32>]
        [-PipelineId <Guid>]
        [-RecurrenceId <Guid>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetAllInResourceGroupAndAccount
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDataLakeAnalyticsJob
        [-Account] <String>
        [-JobId] <Guid>
        [[-Include] <ExtendedJobData>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetBySpecificJobInformation
  isDefault: false
