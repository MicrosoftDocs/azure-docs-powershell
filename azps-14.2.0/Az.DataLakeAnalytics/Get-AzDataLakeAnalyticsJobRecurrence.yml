syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataLakeAnalyticsJobRecurrence
        [-Account] <String>
        [-SubmittedAfter <DateTimeOffset>]
        [-SubmittedBefore <DateTimeOffset>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetAllInAccount
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDataLakeAnalyticsJobRecurrence
        [-Account] <String>
        [-RecurrenceId] <Guid>
        [-SubmittedAfter <DateTimeOffset>]
        [-SubmittedBefore <DateTimeOffset>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetBySpecificJobRecurrence
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Guid" data-throw-if-not-resolved="False" />
- name: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.DataLakeAnalytics.Models.PSJobRecurrenceInformation" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a specified recurrence'
  description: |-
    ```powershell
    Get-AzDataLakeAnalyticsJobRecurrence -Account "contosoadla" -RecurrenceId 83cb7ad2-3523-4b82-b909-d478b0d8aea3
    ```

    This command gets the specified job recurrence with id '83cb7ad2-3523-4b82-b909-d478b0d8aea3' in account 'contosoadla'.
- title: 'Example 2: Get a list of all recurrences in the account'
  description: |-
    ```powershell
    Get-AzDataLakeAnalyticsJobRecurrence -AccountName "contosoadla"
    ```

    This command gets a list of all recurrences in the account "contosoadla"
