uid: Az.DataLakeAnalytics.Submit-AzDataLakeAnalyticsJob
name: Submit-AzDataLakeAnalyticsJob
module: Az.DataLakeAnalytics
isPreview: false
summary: |-
  Submits a job.
description: |-
  The **Submit-AzDataLakeAnalyticsJob** cmdlet submits an Azure Data Lake Analytics job.
