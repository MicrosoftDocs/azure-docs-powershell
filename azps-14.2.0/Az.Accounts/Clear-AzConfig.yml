syntaxes:
- syntax: |-
    ```Syntax
    Clear-AzConfig
        [-Force]
        [-PassThru]
        [-AppliesTo <String>]
        [-Scope <ConfigScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClearAll
  isDefault: true
- syntax: |-
    ```Syntax
    Clear-AzConfig
        [-PassThru]
        [-AppliesTo <String>]
        [-Scope <ConfigScope>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [-CheckForUpgrade]
        [-DefaultSubscriptionForLogin]
        [-DisableInstanceDiscovery]
        [-DisplayBreakingChangeWarning]
        [-DisplayRegionIdentified]
        [-DisplaySecretsWarning]
        [-DisplaySurveyMessage]
        [-EnableDataCollection]
        [-EnableErrorRecordsPersistence]
        [-EnableLoginByWam]
        [-LoginExperienceV2]
        [<CommonParameters>]
    ```
  parameterSetName: ClearByKey
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Clear-AzConfig -Force
    ```

    Clear all the configs. `-Force` suppresses the prompt for confirmation.
- title: Example 2
  description: |-
    ```powershell
    Clear-AzConfig -EnableDataCollection
    ```

    Clear the "EnableDataCollection" config.
