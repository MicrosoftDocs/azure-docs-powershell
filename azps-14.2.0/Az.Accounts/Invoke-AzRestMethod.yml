        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPath
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzRestMethod
        -ApiVersion <String>
        [-SubscriptionId <String>]
        [-ResourceGroupName <String>]
        [-ResourceProviderName <String>]
        [-ResourceType <String[]>]
        [-Name <String[]>]
        [-Method <String>]
        [-Payload <String>]
        [-AsJob]
