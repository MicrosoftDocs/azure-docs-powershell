### YamlMime:PowerShellCmdlet1
uid: Az.Accounts.Get-AzDefault
name: Get-AzDefault
module: Az.Accounts
isPreview: false
summary: |-
  Get the defaults set by the user in the current context.
description: |-
  The Get-AzDefault cmdlet gets the Resource Group that the
  user has set as default in the current context.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroup
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Display Default Resource Group
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDefault
        [-ResourceGroup]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Profile.Models.PSResourceGroup" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzDefault
    ```

    ```Output
    Id         : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup
    Name       : myResourceGroup
    Properties : Microsoft.Azure.Management.Internal.Resources.Models.ResourceGroupProperties
    Location   : eastus
    ManagedBy  :
    Tags       :
    ```

    This command returns the current defaults if there are defaults set, or returns nothing if no default is set.
- title: Example 2
  description: |-
    ```powershell
    Get-AzDefault -ResourceGroup
    ```

    ```Output
    Id         : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/myResourceGroup
    Name       : myResourceGroup
    Properties : Microsoft.Azure.Management.Internal.Resources.Models.ResourceGroupProperties
    Location   : eastus
    ManagedBy  :
    Tags       :
    ```

    This command returns the current default Resource Group if there is a default set, or returns nothing if no default is set.
