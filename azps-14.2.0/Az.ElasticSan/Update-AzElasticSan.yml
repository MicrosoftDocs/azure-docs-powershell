syntaxes:
- syntax: |-
    ```Syntax
    Update-AzElasticSan
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-BaseSizeTiB <Int64>]
        [-ExtendedCapacitySizeTiB <Int64>]
        [-PublicNetworkAccess <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzElasticSan
        -InputObject <IElasticSanIdentity>
        [-BaseSizeTiB <Int64>]
        [-ExtendedCapacitySizeTiB <Int64>]
        [-PublicNetworkAccess <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
