syntaxes:
- syntax: |-
    ```Syntax
    Set-AzServiceBusNamespace
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AlternateName <String>]
        [-DisableLocalAuth]
        [-KeyVaultProperty <IKeyVaultProperties[]>]
        [-RequireInfrastructureEncryption]
        [-IdentityType <String>]
        [-UserAssignedIdentityId <String[]>]
        [-MinimumTlsVersion <String>]
        [-PublicNetworkAccess <String>]
        [-SkuName <String>]
        [-SkuCapacity <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzServiceBusNamespace
        [-InputObject <IServiceBusIdentity>]
        [-AlternateName <String>]
        [-DisableLocalAuth]
        [-KeyVaultProperty <IKeyVaultProperties[]>]
        [-RequireInfrastructureEncryption]
        [-IdentityType <String>]
        [-UserAssignedIdentityId <String[]>]
        [-MinimumTlsVersion <String>]
        [-PublicNetworkAccess <String>]
        [-SkuName <String>]
        [-SkuCapacity <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetViaIdentityExpanded
  isDefault: false
