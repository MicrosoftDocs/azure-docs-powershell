    New-AzServiceBusQueue
        -Name <String>
        -NamespaceInputObject <IServiceBusIdentity>
        -Parameter <ISbQueue>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityNamespace
  isDefault: false
