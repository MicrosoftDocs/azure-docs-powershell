syntaxes:
- syntax: |-
    ```Syntax
    Set-AzServiceBusGeoDRConfigurationFailOver
        -Name <String>
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Fail
  isDefault: true
- syntax: |-
