syntaxes:
- syntax: |-
    ```Syntax
    New-AzSqlSyncAgent
        [-Name] <String>
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        -SyncDatabaseName <String>
        [-SyncDatabaseServerName <String>]
        [-SyncDatabaseResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SyncDatabaseComponent
  isDefault: true
- syntax: |-
    ```Syntax
