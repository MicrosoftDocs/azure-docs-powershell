examples:
- title: 'Example 1: Create a sync agent for an Azure SQL server.'
  description: |-
    ```powershell
    New-AzSqlSyncAgent -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -Name "SyncAgent01" -SyncDatabaseServerName "syncDatabaseServer01" `
    -SyncDatabaseName "syncDatabaseName01" -SyncDatabaseResourceGroupName "syncDatabaseResourceGroup01" | Format-List
    ```

    ```output
    ResourceId                  : subscriptions/{subscriptionId}/resourceGroups/{ResourceGroup01}/servers/{Server01}/syncAgents/{SyncAgent01}
    ResourceGroupName           : ResourceGroup01
    ServerName                  : Server01
    DatabaseName                : Database01
    SyncAgentName               : SyncAgent01
    SyncDatabaseId              : subscriptions/{subscriptionId}/resourceGroups/{syncDatabaseResourceGroup01}/servers/{syncDatabaseServer01}/databases/{syncDatabaseName01}
    LastAliveTime:              :
    Version                     : 4.2.0.0
    IsUpToDate                  : True
    ExpiryTime                  : 12/31/9999 11:59:59 PM
    State                       : NeverConnected
    ```

    This command creates a sync agent for an Azure SQL server.
