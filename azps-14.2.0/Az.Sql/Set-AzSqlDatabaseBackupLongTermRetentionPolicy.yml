syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseBackupLongTermRetentionPolicy
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        -WeeklyRetention <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WeeklyRetentionRequired
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseBackupLongTermRetentionPolicy
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        [-RemovePolicy]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemovePolicy
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseBackupLongTermRetentionPolicy
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        -MonthlyRetention <String>
        [-WeeklyRetention <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: MonthlyRetentionRequired
  isDefault: false
- syntax: |-
