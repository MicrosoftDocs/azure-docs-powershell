syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlServerActiveDirectoryAdministrator
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
