syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzSqlDatabaseLongTermRetentionBackup
        [-Location] <String>
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-BackupName] <String>
        [-ResourceGroupName <String>]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveBackupDefault
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzSqlDatabaseLongTermRetentionBackup
        [-InputObject] <AzureSqlDatabaseLongTermRetentionBackupModel>
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveBackupByInputObject
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzSqlDatabaseLongTermRetentionBackup
        [-ResourceId] <String>
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
