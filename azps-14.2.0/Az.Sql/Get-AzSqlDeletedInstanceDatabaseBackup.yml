### YamlMime:PowerShellCmdlet1
uid: Az.Sql.Get-AzSqlDeletedInstanceDatabaseBackup
name: Get-AzSqlDeletedInstanceDatabaseBackup
module: Az.Sql
isPreview: false
summary: |-
  Gets a deleted database that you can restore.
description: |-
  The **Get-AzSqlDeletedInstanceDatabaseBackup** cmdlet gets a specified deleted SQL Instance database backup that you can restore, or all deleted backups that you can restore.
  This cmdlet is also supported by the SQL Instance Stretch Database service on Azure.
parameters:
  cmdletParameters:
  - name: DatabaseName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the Azure SQL Instance Database to retrieve backups for.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DeletedDatabaseList
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DeletionDate
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.DateTime" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      The deletion date of the Azure SQL Instance Database to retrieve backups for, with millisecond precision (e.g. 2016-02-23T00:21:22.847Z)
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DeletedDatabaseByNameAndDeletedTime
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InstanceName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the Azure SQL Managed Instance the database is in.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the resource group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlDeletedInstanceDatabaseBackup
        [-ResourceGroupName] <String>
        [-InstanceName] <String>
        [-DatabaseName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: DeletedDatabaseList
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSqlDeletedInstanceDatabaseBackup
        [-ResourceGroupName] <String>
        [-InstanceName] <String>
        [-DeletionDate] <DateTime>
        -DatabaseName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: DeletedDatabaseByNameAndDeletedTime
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.ManagedDatabaseBackup.Model.AzureSqlDeletedManagedDatabaseBackupModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all deleted database backups on a server'
