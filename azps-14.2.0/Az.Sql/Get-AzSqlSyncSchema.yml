syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlSyncSchema
        [-SyncGroupName] <String>
        [-SyncMemberName <String>]
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
