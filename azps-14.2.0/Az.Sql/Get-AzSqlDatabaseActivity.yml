syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlDatabaseActivity
        [-ServerName] <String>
        [-ElasticPoolName <String>]
        -DatabaseName <String>
        [-OperationId <Guid>]
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
