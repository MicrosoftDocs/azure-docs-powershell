syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlInstanceDatabaseSensitivityClassification

        -ClassificationObject <ManagedDatabaseSensitivityClassificationModel>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClassificationObjectParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSqlInstanceDatabaseSensitivityClassification
        [-ResourceGroupName] <String>
        [-InstanceName] <String>
        [-DatabaseName] <String>
        -SchemaName <String>
        -TableName <String>
        -ColumnName <String>
        [-SensitivityLabel <String>]
        [-InformationType <String>]
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ColumnParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzSqlInstanceDatabaseSensitivityClassification
        -DatabaseObject <AzureSqlManagedDatabaseModel>
        -SchemaName <String>
        -TableName <String>
        -ColumnName <String>
        [-SensitivityLabel <String>]
        [-InformationType <String>]
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DatabaseObjectColumnParameterSet
  isDefault: false
