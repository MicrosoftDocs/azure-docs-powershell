### YamlMime:PowerShellCmdlet1
uid: Az.Sql.Remove-AzSqlInstanceKeyVaultKey
name: Remove-AzSqlInstanceKeyVaultKey
module: Az.Sql
isPreview: false
summary: |-
  Removes a Key Vault key from a SQL managed instance
description: |-
  The Remove-AzSqlInstanceKeyVaultKey cmdlet  removes the Key Vault key from the specified Managed Instance. Note that the SQL managed instance's permissions to the key's vault are not changed. To change permissions, use Set-AzKeyVaultAccessPolicy. Note that this cmdlet makes no changes to Key Vault. To remove a key from Key Vault, use Remove-AzureKeyVaultKey.
