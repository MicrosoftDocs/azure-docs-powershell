syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseTransparentDataEncryption
        [-State] <TransparentDataEncryptionStateType>
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
