examples:
- title: 'Example 1: Enable TDE for a database'
  description: |-
    ```powershell
    Set-AzSqlDatabaseTransparentDataEncryption -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -DatabaseName "Database01" -State Enabled
    ```

    ```output
    ResourceGroupName             ServerName                    DatabaseName                                          State
    -----------------             ----------                    ------------                                          -----
    ResourceGroup01               Server01                      Database01                                            Enabled
    ```

    This command enables TDE for the database named Database01 on the server named Server01.
