syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseBackupShortTermRetentionPolicy
        [-ResourceGroupName] <String>
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-RetentionDays <Int32>]
        [-DiffBackupIntervalInHours <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PolicyByResourceServerDatabaseSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseBackupShortTermRetentionPolicy
        -AzureSqlDatabaseObject <AzureSqlDatabaseModel>
        [-RetentionDays <Int32>]
        [-DiffBackupIntervalInHours <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PolicyByInputObjectSet
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseBackupShortTermRetentionPolicy
        -ResourceId <String>
        [-RetentionDays <Int32>]
        [-DiffBackupIntervalInHours <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PolicyByResourceIdSet
  isDefault: false
