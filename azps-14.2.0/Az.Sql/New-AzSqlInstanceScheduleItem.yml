syntaxes:
- syntax: |-
    ```Syntax
    New-AzSqlInstanceScheduleItem
        -StartDay <DayOfWeek>
        -StartTime <String>
        -StopDay <DayOfWeek>
        -StopTime <String>
        [-ScheduleList <ScheduleItem[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.ManagedInstanceSchedule.Model.ScheduleItem" data-throw-if-not-resolved="False" />
