    description: |-
      Specifies the maximum number of Database Throughput Units (DTUs) that any single database in the pool can consume.
      The default values for the different editions are as follows:
      - Basic. 5 DTUs
      - Standard. 100 DTUs
      - Premium. 125 DTUs
