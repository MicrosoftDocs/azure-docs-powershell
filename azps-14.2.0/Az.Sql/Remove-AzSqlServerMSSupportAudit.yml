examples:
- title: 'Example 1: Remove the Microsoft support operations auditing settings of an Azure SQL server'
  description: |-
    ```powershell
    Remove-AzSqlServerMSSupportAudit -ResourceGroupName "ResourceGroup01" -ServerName "Server01"
    ```
- title: 'Example 2: Remove, through pipeline, the Microsoft support auditing settings of an Azure SQL server'
  description: |-
    ```powershell
    Get-AzSqlServer -ResourceGroupName "ResourceGroup01" -ServerName "Server01" | Remove-AzSqlServerMSSupportAudit
    ```
