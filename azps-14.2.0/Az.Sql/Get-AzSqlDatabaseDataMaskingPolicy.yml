examples:
- title: 'Example 1: Get the data masking policy for an Azure SQL database'
  description: |-
    ```powershell
    Get-AzSqlDatabaseDataMaskingPolicy -ResourceGroupName "ResourceGroup01" -ServerName "Server01" -DatabaseName "Database01"
    ```

    ```output
    DatabaseName      : Database01
    ResourceGroupName : ResourceGroup01
    ServerName        : Server01
    DataMaskingState  : Enabled
    PrivilegedUsers  :
    ```

    This command gets the data masking policy from database Database01 in resource group ResourceGroup01 on server Server01.
