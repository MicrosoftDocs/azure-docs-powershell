- syntax: |-
    ```Syntax
    Get-AzSqlDatabaseDataMaskingPolicy
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
