syntaxes:
- syntax: |-
    ```Syntax
    New-AzSqlInstanceLink
        [-ResourceGroupName] <String>
        [-InstanceName] <String>
        [-Name] <String>
        -PartnerAvailabilityGroupName <String>
        -InstanceAvailabilityGroupName <String>
        -Database <String[]>
        -PartnerEndpoint <String>
        [-FailoverMode <String>]
        [-InstanceLinkRole <String>]
        [-SeedingMode <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateByNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzSqlInstanceLink
        [-Name] <String>
        [-InstanceObject] <AzureSqlManagedInstanceModel>
        -PartnerAvailabilityGroupName <String>
        -InstanceAvailabilityGroupName <String>
        -Database <String[]>
        -PartnerEndpoint <String>
        [-FailoverMode <String>]
        [-InstanceLinkRole <String>]
        [-SeedingMode <String>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
