syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlDatabaseExpanded
        [-ServerName] <String>
        [[-DatabaseName] <String>]
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
