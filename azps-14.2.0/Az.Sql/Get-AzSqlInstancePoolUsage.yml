    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlInstancePoolUsage
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-ExpandChildren]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: InstancePoolUsageDefaultParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzSqlInstancePoolUsage
        [-InstancePool] <AzureSqlInstancePoolModel>
        [-ExpandChildren]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: InstancePoolUsageParentObjectParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzSqlInstancePoolUsage
        [-ResourceId] <String>
        [-ExpandChildren]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: InstancePoolUsageResourceIdParameterSet
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.Instance_Pools.Model.AzureSqlInstancePoolModel" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.Usages.Models.AzureSqlUsageModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1 : Gets the usage of an Azure SQL Instance pool'
  description: |-
    ```powershell
    Get-AzSqlInstancePoolUsage -ResourceGroupName resourcegroup01 -Name instancepool0
    ```

    ```output
    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/vcore_utilization
    CurrentValue   : 2
    Limit          : 8
    RequestedLimit :
    Unit           : VCores
    Name           : VCore utilization
    Type           : Microsoft.Sql/instancePools/usages

    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/storage_utilization
    CurrentValue   : 32
    Limit          : 8192
    RequestedLimit :
    Unit           : Gigabytes
    Name           : Storage utilization
    Type           : Microsoft.Sql/instancePools/usages

    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/database_utilization
    CurrentValue   : 0
    Limit          : 100
    RequestedLimit :
    Unit           : Number Of Databases
    Name           : Database utilization
    Type           : Microsoft.Sql/instancePools/usages
    ```

    Gets the usage for the Azure SQL Instance pool instancepool0.
- title: 'Example 2: Gets the usage of an Azure SQL Instance pool using an instance pool object'
  description: |-
    ```powershell
    $instancePool = Get-AzSqlInstancePool -ResourceGroupName resourcegroup01 -Name instancepool0
    Get-AzSqlInstancePoolUsage -InstancePool $instancePool
    ```

    ```output
    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/vcore_utilization
    CurrentValue   : 2
    Limit          : 8
    RequestedLimit :
    Unit           : VCores
    Name           : VCore utilization
    Type           : Microsoft.Sql/instancePools/usages

    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/storage_utilization
    CurrentValue   : 32
    Limit          : 8192
    RequestedLimit :
    Unit           : Gigabytes
    Name           : Storage utilization
    Type           : Microsoft.Sql/instancePools/usages

    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/database_utilization
    CurrentValue   : 0
    Limit          : 100
    RequestedLimit :
    Unit           : Number Of Databases
    Name           : Database utilization
    Type           : Microsoft.Sql/instancePools/usages
    ```

    Gets the usage for the Azure SQL Instance pool instancepool0 using an instance pool object.
- title: 'Example 3: Gets the usage of an Azure SQL Instance pool using an instance pool resource id'
  description: |-
    ```powershell
    Get-AzSqlInstancePoolUsage -ResourceId "/subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancePool0"
    ```

    ```output
    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/vcore_utilization
    CurrentValue   : 2
    Limit          : 8
    RequestedLimit :
    Unit           : VCores
    Name           : VCore utilization
    Type           : Microsoft.Sql/instancePools/usages

    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/storage_utilization
    CurrentValue   : 32
    Limit          : 8192
    RequestedLimit :
    Unit           : Gigabytes
    Name           : Storage utilization
    Type           : Microsoft.Sql/instancePools/usages

    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/database_utilization
    CurrentValue   : 0
    Limit          : 100
    RequestedLimit :
    Unit           : Number Of Databases
    Name           : Database utilization
    Type           : Microsoft.Sql/instancePools/usages
    ```

    Gets the usage for the Azure SQL Instance pool instancepool0 using an instance pool resource identifier.
- title: 'Example 3: Gets the usage of an Azure SQL Instance pool with a breakdown of the managed instance usages within the pool.'
  description: |-
    ```powershell
    Get-AzSqlInstancePoolUsage -ResourceGroupName resourcegroup01 -Name instancepool0 -ExpandChildren
    ```

    ```output
    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/vcore_utilization
    CurrentValue   : 2
    Limit          : 8
    RequestedLimit :
    Unit           : VCores
    Name           : VCore utilization
    Type           : Microsoft.Sql/instancePools/usages

    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/storage_utilization
    CurrentValue   : 32
    Limit          : 8192
    RequestedLimit :
    Unit           : Gigabytes
    Name           : Storage utilization
    Type           : Microsoft.Sql/instancePools/usages

    Id             : /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx/resourceGroups/resourcegroup01/providers/Microsoft.Sql/instancePools/instancepool0/usages/database_utilization
    CurrentValue   : 0
    Limit          : 100
    RequestedLimit :
    Unit           : Number Of Databases
    Name           : Database utilization
    Type           : Microsoft.Sql/instancePools/usages

    Id             : /subscriptions/2e7fe4bd-90c7-454e-8bb6-dc44649f27b2/resourceGroups/poolsPS/providers/Microsoft.Sql/instancePools/instancepool0/managedInstances/managedinstance0/usages/vcore_utilization
    CurrentValue   :
    Limit          : 2
    RequestedLimit :
    Unit           : VCores
    Name           : VCore utilization
    Type           : Microsoft.Sql/instancePools/managedInstances/usages

    Id             : /subscriptions/2e7fe4bd-90c7-454e-8bb6-dc44649f27b2/resourceGroups/poolsPS/providers/Microsoft.Sql/instancePools/instancepool0/managedInstances/managedinstance0/usages/storage_utilization
    CurrentValue   :
    Limit          : 32
    RequestedLimit :
    Unit           : Gigabytes
    Name           : Storage utilization
    Type           : Microsoft.Sql/instancePools/managedInstances/usages

    Id             : /subscriptions/2e7fe4bd-90c7-454e-8bb6-dc44649f27b2/resourceGroups/poolsPS/providers/Microsoft.Sql/instancePools/instancepool0/managedInstances/managedinstance0/usages/database_utilization
    CurrentValue   : 0
    Limit          : 100
    RequestedLimit :
    Unit           : Number Of Databases
    Name           : Database utilization
    Type           : Microsoft.Sql/instancePools/managedInstances/usages
    ```

    Gets the usage for the Azure SQL Instance pool instancepool0 along with the usages of the managed instances within instancepool0.
