    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InstancePoolUsageParentObjectParameterSet
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The managed instance pool name.
    aliases:
    - InstancePoolName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InstancePoolUsageDefaultParameterSet
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
