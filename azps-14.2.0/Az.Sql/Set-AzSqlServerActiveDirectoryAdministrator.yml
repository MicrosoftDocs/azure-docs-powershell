syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlServerActiveDirectoryAdministrator
        [-DisplayName] <String>
        [[-ObjectId] <Guid>]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
