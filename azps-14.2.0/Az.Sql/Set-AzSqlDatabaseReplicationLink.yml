syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSqlDatabaseReplicationLink
        [-DatabaseName] <String>
        -PartnerResourceGroupName <String>
        -LinkId <Guid>
        [-PartnerServerName <String>]
        [-LinkType <String>]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
