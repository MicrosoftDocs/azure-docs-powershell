examples:
- title: 'Example 1: Get the Microsoft support operations auditing settings of an Azure SQL server'
  description: |-
    ```powershell
    Get-AzSqlServerMSSupportAudit -ResourceGroupName "resourcegroup01" -ServerName "server01"
    ```

    ```output
    ServerName                          : server01
    ResourceGroupName                   : resourcegroup01
    BlobStorageTargetState              : Enabled
    StorageAccountResourceId            : /subscriptions/7fe3301d-31d3-4668-af5e-211a890ba6e3/resourceGroups/resourcegroup01/providers/Microsoft.Storage/storageAccounts/mystorage
    EventHubTargetState                 : Enabled
    EventHubName                        : eventHubName
    EventHubAuthorizationRuleResourceId : EventHubAuthorizationRuleResourceId
    LogAnalyticsTargetState             : Enabled
    WorkspaceResourceId                 : "/subscriptions/4b9e8510-67ab-4e9a-95a9-e2f1e570ea9c/resourceGroups/insights-integration/providers/Microsoft.OperationalInsights/workspaces/viruela2"
    ```
- title: 'Example 2: Get, through pipeline, the Microsoft support operations auditing settings of an Azure SQL server'
  description: |-
    ```powershell
    Get-AzSqlServer -ResourceGroupName "ResourceGroup01" -ServerName "Server01" | Get-AzSqlServerMSSupportAudit
    ```

    ```output
    ServerName                          : server01
    ResourceGroupName                   : resourcegroup01
    BlobStorageTargetState              : Enabled
    StorageAccountResourceId            : /subscriptions/7fe3301d-31d3-4668-af5e-211a890ba6e3/resourceGroups/resourcegroup01/providers/Microsoft.Storage/storageAccounts/mystorage
    EventHubTargetState                 : Enabled
    EventHubName                        : eventHubName
    EventHubAuthorizationRuleResourceId : EventHubAuthorizationRuleResourceId
    LogAnalyticsTargetState             : Enabled
    WorkspaceResourceId                 : "/subscriptions/4b9e8510-67ab-4e9a-95a9-e2f1e570ea9c/resourceGroups/insights-integration/providers/Microsoft.OperationalInsights/workspaces/viruela2"
    ```
- title: 'Example 3: Get the Microsoft support operations auditing settings of an Azure SQL server'
  description: |-
    ```powershell
    Get-AzSqlServerMSSupportAudit -ResourceGroupName "resourcegroup01" -ServerName "server01"
    ```

    ```output
    ServerName                          : server01
    ResourceGroupName                   : resourcegroup01
    BlobStorageTargetState              : Enabled
    StorageAccountResourceId            : /subscriptions/7fe3301d-31d3-4668-af5e-211a890ba6e3/resourceGroups/resourcegroup01/providers/Microsoft.Storage/storageAccounts/mystorage
    EventHubTargetState                 : Enabled
    EventHubName                        : eventHubName
    EventHubAuthorizationRuleResourceId : EventHubAuthorizationRuleResourceId
    LogAnalyticsTargetState             : Disabled
    WorkspaceResourceId                 :
    ```
