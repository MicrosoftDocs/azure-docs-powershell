syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzSqlInstanceOperation
        [-Name] <String>
        [-ManagedInstanceName] <String>
        [-ResourceGroupName] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: StopByNameAndManagedInstanceAndResourceGroupParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzSqlInstanceOperation
        [-ResourceId] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
