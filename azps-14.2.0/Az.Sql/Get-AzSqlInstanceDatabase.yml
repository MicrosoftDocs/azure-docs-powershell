    ```Syntax
    Get-AzSqlInstanceDatabase
        [[-Name] <String>]
        [-InstanceName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetInstanceDatabaseFromInputParameters
  isDefault: true
