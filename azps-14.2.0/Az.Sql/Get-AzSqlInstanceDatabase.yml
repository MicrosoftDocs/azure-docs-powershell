- title: 'Example 2: Get a database by name on a Managed instance'
  description: |-
    ```powershell
    Get-AzSqlInstanceDatabase -Name "managedDatabase1" -InstanceName "managedInstance1" -ResourceGroupName "ResourceGroup01"
    ```

