    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlServerAdvisor
        [-AdvisorName <String>]
        [-ExpandRecommendedActions]
        -ServerName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Sql.Advisor.Model.AzureSqlServerAdvisorModel" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: List all the advisors for the server'
  description: |-
    ```powershell
    Get-AzSqlServerAdvisor -ResourceGroupName "WIRunnersProd" -ServerName "wi-runner-australia-east"
    ```

    ```output
    ResourceGroupName              : WIRunnersProd
    ServerName                     : wi-runner-australia-east
    AdvisorName                    : CreateIndex
    AdvisorStatus                  : GA
    AutoExecuteStatus              : Disabled
    AutoExecuteStatusInheritedFrom : Database
    LastChecked                    : 8/1/2016 2:36:47 PM
    RecommendationsStatus          : Ok
    RecommendedActions             : {}

    ResourceGroupName              : WIRunnersProd
    ServerName                     : wi-runner-australia-east
    AdvisorName                    : DropIndex
    AdvisorStatus                  : PublicPreview
    AutoExecuteStatus              : Disabled
    AutoExecuteStatusInheritedFrom : Database
    LastChecked                    : 7/31/2016 8:41:19 PM
    RecommendationsStatus          : Ok
    RecommendedActions             : {}
    ResourceGroupName              : WIRunnersProd
    ServerName                     : wi-runner-australia-east
    AdvisorName                    : DbParameterization
    AdvisorStatus                  : PublicPreview
    AutoExecuteStatus              : Disabled
    AutoExecuteStatusInheritedFrom : Default
    LastChecked                    : 7/31/2016 2:46:58 PM
    RecommendationsStatus          : NoDbParameterizationIssue
    RecommendedActions             : {}

    ResourceGroupName              : WIRunnersProd
    ServerName                     : wi-runner-australia-east
    AdvisorName                    : SchemaIssue
    AdvisorStatus                  : PublicPreview
    AutoExecuteStatus              : Disabled
    AutoExecuteStatusInheritedFrom : Default
    LastChecked                    : 8/1/2016 3:01:41 PM
    RecommendationsStatus          : SchemaIsConsistent
    RecommendedActions             : {}
    ```

    This command gets a list of all the advisors for the server named wi-runner-australia-east that belongs to the resource group named WIRunnersProd.
- title: 'Example 2: Get a single advisor for the server'
  description: |-
    ```powershell
    Get-AzSqlServerAdvisor -ResourceGroupName "WIRunnersProd" -ServerName "wi-runner-australia-east" -AdvisorName "CreateIndex"
    ```

    ```output
    ResourceGroupName              : WIRunnersProd
    ServerName                     : wi-runner-australia-east
    AdvisorName                    : CreateIndex
    AdvisorStatus                  : GA
    AutoExecuteStatus              : Disabled
    AutoExecuteStatusInheritedFrom : Database
    LastChecked                    : 8/1/2016 2:36:47 PM
    RecommendationsStatus          : Ok
    RecommendedActions             : {}
    ```

    This command gets the advisor named CreateIndex for the server named wi-runner-australia-east.
