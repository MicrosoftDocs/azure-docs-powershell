syntaxes:
- syntax: |-
    ```Syntax
    Update-AzSqlDatabaseAdvancedThreatProtectionSetting
        -Enable <Boolean>
        [-PassThru]
        [-ServerName] <String>
        [-DatabaseName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
