### YamlMime:PowerShellCmdlet1
uid: Az.Sql.Update-AzSqlDatabaseAdvancedThreatProtectionSetting
name: Update-AzSqlDatabaseAdvancedThreatProtectionSetting
module: Az.Sql
isPreview: false
summary: |-
  Sets the Advanced Threat Protection settings on a database.
description: |-
  The **Update-AzSqlDatabaseAdvancedThreatProtectionSetting** cmdlet sets the Advanced Threat Protection settings on an Azure SQL database.
  To use this cmdlet, specify the *ResourceGroupName*, *ServerName* and *DatabaseName* parameters to identify the database.
