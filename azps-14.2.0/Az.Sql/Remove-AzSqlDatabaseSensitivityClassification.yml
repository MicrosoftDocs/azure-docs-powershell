syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzSqlDatabaseSensitivityClassification
        -ClassificationObject <SqlDatabaseSensitivityClassificationModel>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClassificationObjectParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzSqlDatabaseSensitivityClassification
        [-ResourceGroupName] <String>
        [-ServerName] <String>
        [-DatabaseName] <String>
        -SchemaName <String>
        -TableName <String>
        -ColumnName <String>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ColumnParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzSqlDatabaseSensitivityClassification
        -DatabaseObject <AzureSqlDatabaseModel>
        -SchemaName <String>
        -TableName <String>
        -ColumnName <String>
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DatabaseObjectColumnParameterSet
  isDefault: false
