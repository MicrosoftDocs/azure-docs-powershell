syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlServerCommunicationLink
        [[-LinkName] <String>]
        [-ServerName] <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
