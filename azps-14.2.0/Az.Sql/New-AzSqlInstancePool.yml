syntaxes:
- syntax: |-
    ```Syntax
    New-AzSqlInstancePool
        [-ResourceGroupName] <String>
        [-Name] <String>
        -Location <String>
        -SubnetId <String>
        -VCore <Int32>
        -Edition <String>
        -ComputeGeneration <String>
        -LicenseType <String>
        [-Tag <Hashtable>]
        -MaintenanceConfigurationId <String>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
