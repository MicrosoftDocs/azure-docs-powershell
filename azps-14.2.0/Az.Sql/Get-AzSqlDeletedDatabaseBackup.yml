syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSqlDeletedDatabaseBackup
        [-ExpandKeyList]
        [-KeysFilter <String>]
        [-DatabaseId <String>]
        [-ServerName] <String>
        [[-DatabaseName] <String>]
        [[-DeletionDate] <DateTime>]
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
