examples:
- title: Example 1 - Disable managed instance Advanced Data Security
  description: |-
    ```powershell
    Disable-AzSqlInstanceAdvancedDataSecurity `
                -ResourceGroupName "ResourceGroup01" `
                -InstanceName "ManagedInstance01"
    ```

    ```output
    ResourceGroupName	         : ResourceGroup01
    ManagedInstanceName		     : ManagedInstance01
    IsEnabled		             : False
    ```
- title: Example 2 - Disable server Advanced Data Security from managed instance resource
  description: |-
    ```powershell
    Get-AzSqlInstance `
               -ResourceGroupName "ResourceGroup01" `
               -Name "ManagedInstance01" `
               | Disable-AzSqlInstanceAdvancedDataSecurity
    ```

    ```output
    ResourceGroupName	         : ResourceGroup01
    ManagedInstanceName		     : ManagedInstance01
    IsEnabled		             : False
    ```
