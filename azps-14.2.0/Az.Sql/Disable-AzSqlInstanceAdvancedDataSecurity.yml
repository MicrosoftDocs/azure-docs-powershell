syntaxes:
- syntax: |-
    ```Syntax
    Disable-AzSqlInstanceAdvancedDataSecurity
        [-InputObject <AzureSqlManagedInstanceModel>]
        -InstanceName <String>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
