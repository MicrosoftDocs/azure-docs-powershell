syntaxes:
- syntax: |-
    ```Syntax
    Start-AzEventHubNamespaceFailOver
        -NamespaceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Force]
        [-PrimaryLocation <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-Confirm]
        [-WhatIf]
        [<CommonParameters>]
    ```
  parameterSetName: SetExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzEventHubNamespaceFailOver
        -InputObject <IEventHubIdentity>
        [-Force]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-Confirm]
        [-WhatIf]
        [<CommonParameters>]
    ```
  parameterSetName: SetViaIdentityExpanded
  isDefault: false
