syntaxes:
- syntax: |-
    ```Syntax
    New-AzFluidRelayServer
        -Name <String>
        -ResourceGroup <String>
        -Location <String>
        [-SubscriptionId <String>]
        [-CustomerManagedKeyEncryptionKeyUrl <String>]
        [-EnableSystemAssignedIdentity]
        [-KeyEncryptionKeyIdentityType <String>]
        [-KeyEncryptionKeyIdentityUserAssignedIdentityResourceId <String>]
        [-ProvisioningState <String>]
        [-Storagesku <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzFluidRelayServer
        -Name <String>
        -ResourceGroup <String>
        -JsonString <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaJsonString
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzFluidRelayServer
        -Name <String>
        -ResourceGroup <String>
        -JsonFilePath <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaJsonFilePath
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzFluidRelayServer
        -Name <String>
        -ResourceGroupInputObject <IFluidRelayIdentity>
        -Location <String>
        [-CustomerManagedKeyEncryptionKeyUrl <String>]
        [-EnableSystemAssignedIdentity]
        [-KeyEncryptionKeyIdentityType <String>]
        [-KeyEncryptionKeyIdentityUserAssignedIdentityResourceId <String>]
        [-ProvisioningState <String>]
        [-Storagesku <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityResourceGroupExpanded
  isDefault: false
