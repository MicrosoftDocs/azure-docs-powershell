syntaxes:
- syntax: |-
    ```Syntax
    Deploy-AzNetworkCloudCluster
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-SkipValidationsForMachine <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeployExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Deploy-AzNetworkCloudCluster
        -InputObject <INetworkCloudIdentity>
        [-SkipValidationsForMachine <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeployViaIdentityExpanded
  isDefault: false
