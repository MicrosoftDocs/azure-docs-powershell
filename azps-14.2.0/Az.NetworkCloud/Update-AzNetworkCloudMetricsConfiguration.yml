syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudMetricsConfiguration
        -ClusterName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-CollectionInterval <Int64>]
        [-EnabledMetric <String[]>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudMetricsConfiguration
        -InputObject <INetworkCloudIdentity>
        [-CollectionInterval <Int64>]
        [-EnabledMetric <String[]>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
