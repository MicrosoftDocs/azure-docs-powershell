uid: Az.NetworkCloud.Update-AzNetworkCloudMetricsConfiguration
name: Update-AzNetworkCloudMetricsConfiguration
module: Az.NetworkCloud
isPreview: false
summary: |-
  Patch properties of metrics configuration for the provided cluster, or update the tags associated with it.
  Properties and tag updates can be done independently.
