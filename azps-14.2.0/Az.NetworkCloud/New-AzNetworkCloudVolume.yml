syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetworkCloudVolume
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -ExtendedLocationName <String>
        -ExtendedLocationType <String>
        -Location <String>
        -SizeMiB <Int64>
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
