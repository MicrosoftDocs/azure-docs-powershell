syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzNetworkCloudBareMetalMachineDataExtract
        -InputObject <INetworkCloudIdentity>
        -Command <IBareMetalMachineCommandSpecification[]>
        -LimitTimeSecond <Int64>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RunViaIdentityExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzNetworkCloudBareMetalMachineDataExtract
        -BareMetalMachineName <String>
        -ResourceGroupName <String>
        -Command <IBareMetalMachineCommandSpecification[]>
        -LimitTimeSecond <Int64>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RunExpanded
  isDefault: false
