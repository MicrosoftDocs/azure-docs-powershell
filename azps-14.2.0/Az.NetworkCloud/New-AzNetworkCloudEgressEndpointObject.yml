    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetworkCloudEgressEndpointObject
        -Category <String>
        -Endpoint <IEndpointDependency[]>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.NetworkCloud.Models.Api20240701.EgressEndpoint" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an in-memory object for EgressEndpointObject.'
  description: |-
    ```powershell
    $endpointDependency=New-AzNetworkCloudEndpointDependencyObject -DomainName domainName -Port 1234

    New-AzNetworkCloudEgressEndpointObject -Category "azure-resource-management" -Endpoint ($endpointDependency)
    ```

    ```output
    Category
    --------
    azure-resource-management
    ```

    Create an in-memory object for EgressEndpoint.
