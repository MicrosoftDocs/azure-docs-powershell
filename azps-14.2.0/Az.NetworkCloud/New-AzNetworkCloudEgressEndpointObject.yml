uid: Az.NetworkCloud.New-AzNetworkCloudEgressEndpointObject
name: New-AzNetworkCloudEgressEndpointObject
module: Az.NetworkCloud
isPreview: false
summary: |-
  Create an in-memory object for EgressEndpoint.
description: |-
  Create an in-memory object for EgressEndpoint.
parameters:
  cmdletParameters:
  - name: Category
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The descriptive category name of endpoints accessible by the AKS agent node.
      For example, azure-resource-management, API server, etc.
      The platform egress endpoints provided by default will use the category 'default'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Endpoint
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.NetworkCloud.Models.Api20240701.IEndpointDependency" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The list of endpoint dependencies.
      To construct, see NOTES section for ENDPOINT properties and create a hash table.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
