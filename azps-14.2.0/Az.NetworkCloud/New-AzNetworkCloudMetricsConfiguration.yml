syntaxes:
- syntax: |-
    ```Syntax
    New-AzNetworkCloudMetricsConfiguration
        -ClusterName <String>
        -MetricsConfigurationName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -CollectionInterval <Int64>
        -ExtendedLocationName <String>
        -ExtendedLocationType <String>
        -Location <String>
        [-EnabledMetric <String[]>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
