### YamlMime:PowerShellCmdlet1
uid: Az.NetworkCloud.Update-AzNetworkCloudAgentPool
name: Update-AzNetworkCloudAgentPool
module: Az.NetworkCloud
isPreview: false
summary: |-
  Patch the properties of the provided Kubernetes cluster agent pool, or update the tags associated with the Kubernetes cluster agent pool.
  Properties and tag updates can be done independently.
description: |-
  Patch the properties of the provided Kubernetes cluster agent pool, or update the tags associated with the Kubernetes cluster agent pool.
  Properties and tag updates can be done independently.
