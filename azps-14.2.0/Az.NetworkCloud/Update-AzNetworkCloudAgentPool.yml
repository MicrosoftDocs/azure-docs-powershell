syntaxes:
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudAgentPool
        -KubernetesClusterName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AdministratorConfigurationSshPublicKey <ISshPublicKey[]>]
        [-Count <Int64>]
        [-Tag <Hashtable>]
        [-UpgradeSettingDrainTimeout <Int64>]
        [-UpgradeSettingMaxSurge <String>]
        [-UpgradeSettingMaxUnavailable <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzNetworkCloudAgentPool
        -InputObject <INetworkCloudIdentity>
        [-AdministratorConfigurationSshPublicKey <ISshPublicKey[]>]
        [-Count <Int64>]
        [-Tag <Hashtable>]
        [-UpgradeSettingDrainTimeout <Int64>]
        [-UpgradeSettingMaxSurge <String>]
        [-UpgradeSettingMaxUnavailable <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
