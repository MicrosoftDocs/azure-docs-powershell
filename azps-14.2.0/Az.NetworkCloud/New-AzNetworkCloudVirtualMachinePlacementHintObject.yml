uid: Az.NetworkCloud.New-AzNetworkCloudVirtualMachinePlacementHintObject
name: New-AzNetworkCloudVirtualMachinePlacementHintObject
module: Az.NetworkCloud
isPreview: false
summary: |-
  Create an in-memory object for VirtualMachinePlacementHint.
description: |-
  Create an in-memory object for VirtualMachinePlacementHint.
parameters:
  cmdletParameters:
  - name: HintType
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.NetworkCloud.Support.VirtualMachinePlacementHintType" data-throw-if-not-resolved="False" />
    description: |-
      The specification of whether this hint supports affinity or anti-affinity with the referenced resources.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The resource ID of the target object that the placement hints will be checked against, e.g., the bare metal node to host the virtual machine.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SchedulingExecution
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.NetworkCloud.Support.VirtualMachineSchedulingExecution" data-throw-if-not-resolved="False" />
    description: |-
      The indicator of whether the hint is a hard or soft requirement during scheduling.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.NetworkCloud.Support.VirtualMachinePlacementHintPodAffinityScope" data-throw-if-not-resolved="False" />
    description: |-
      The scope for the virtual machine affinity or anti-affinity placement hint.
      It should always be "Machine" in the case of node affinity.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
