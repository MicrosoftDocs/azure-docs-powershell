syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzNetworkCloudClusterVersionUpdate
        -ClusterName <String>
        -ResourceGroupName <String>
        -TargetClusterVersion <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzNetworkCloudClusterVersionUpdate
        -InputObject <INetworkCloudIdentity>
        -TargetClusterVersion <String>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
