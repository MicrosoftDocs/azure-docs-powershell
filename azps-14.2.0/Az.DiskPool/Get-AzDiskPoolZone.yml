uid: Az.DiskPool.Get-AzDiskPoolZone
name: Get-AzDiskPoolZone
module: Az.DiskPool
isPreview: false
summary: |-
  Lists available Disk Pool Skus in an Azure location.
description: |-
  Lists available Disk Pool Skus in an Azure location.
