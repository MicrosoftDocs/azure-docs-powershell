syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDiskPoolZone
        -Location <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
