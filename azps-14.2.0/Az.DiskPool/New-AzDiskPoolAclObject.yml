### YamlMime:PowerShellCmdlet1
uid: Az.DiskPool.New-AzDiskPoolAclObject
name: New-AzDiskPoolAclObject
module: Az.DiskPool
isPreview: false
summary: |-
  Create an in-memory object for Acl.
description: |-
  Create an in-memory object for Acl.
parameters:
  cmdletParameters:
  - name: InitiatorIqn
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      iSCSI initiator IQN (iSCSI Qualified Name); example: "iqn.2005-03.org.iscsi:client".
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MappedLun
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of LUN names mapped to the ACL.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzDiskPoolAclObject
        -InitiatorIqn <String>
        -MappedLun <String[]>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.DiskPool.Models.Acl" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an acl object'
  description: |-
    ```powershell
    New-AzDiskPoolAclObject -InitiatorIqn 'iqn.2021-05.com.microsoft:target0' -MappedLun @('lun0')
    ```

    ```output
    InitiatorIqn                      MappedLun
    ------------                      ---------
    iqn.2021-05.com.microsoft:target0 {lun0}
    ```

    This command creates an acl object.
