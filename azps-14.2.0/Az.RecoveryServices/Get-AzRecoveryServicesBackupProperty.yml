### YamlMime:PowerShellCmdlet1
uid: Az.RecoveryServices.Get-AzRecoveryServicesBackupProperty
name: Get-AzRecoveryServicesBackupProperty
module: Az.RecoveryServices
isPreview: false
summary: |-
  Gets Backup properties.
description: |-
  The **Get-AzRecoveryServicesBackupProperty** cmdlet gets backup properties for a Recovery Services vault.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Vault
    type: <xref href="Microsoft.Azure.Commands.RecoveryServices.ARSVault" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the vault.
      The vault must be an **AzureRmRecoveryServicesVault** object.
      Run the [Get-AzRecoveryServicesVault](https://learn.microsoft.com/powershell/module/az.recoveryservices/get-azrecoveryservicesvault) cmdlet to get the recovery services vault details.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesBackupProperty
        -Vault <ARSVault>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.ARSVault" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.ASRVaultBackupProperties" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzRecoveryServicesBackupProperty -Vault $vault
    ```

    Get the backup vault property for vault.
