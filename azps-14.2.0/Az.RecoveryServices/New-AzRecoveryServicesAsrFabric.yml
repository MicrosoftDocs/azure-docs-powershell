### YamlMime:PowerShellCmdlet1
uid: Az.RecoveryServices.New-AzRecoveryServicesAsrFabric
name: New-AzRecoveryServicesAsrFabric
module: Az.RecoveryServices
isPreview: false
summary: |-
  Creates an Azure Site Recovery Fabric.
description: |-
  The **New-AzRecoveryServicesAsrFabric** cmdlet creates an Azure Site Recovery Fabric of the specified type.
