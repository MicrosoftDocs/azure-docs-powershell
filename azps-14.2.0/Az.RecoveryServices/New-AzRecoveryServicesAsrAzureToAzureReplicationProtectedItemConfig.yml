uid: Az.RecoveryServices.New-AzRecoveryServicesAsrAzureToAzureReplicationProtectedItemConfig
name: New-AzRecoveryServicesAsrAzureToAzureReplicationProtectedItemConfig
module: Az.RecoveryServices
isPreview: false
summary: |-
  Creates a replication protected item mapping object for Azure virtual machine to be replicated.
description: |-
  Creates a protected item mapping object to get target properties (recovery region) to be used to replicate the protected item.
