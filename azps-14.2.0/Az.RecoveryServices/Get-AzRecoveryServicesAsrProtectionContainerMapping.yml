### YamlMime:PowerShellCmdlet1
uid: Az.RecoveryServices.Get-AzRecoveryServicesAsrProtectionContainerMapping
name: Get-AzRecoveryServicesAsrProtectionContainerMapping
module: Az.RecoveryServices
isPreview: false
summary: |-
  Gets Azure Site Recovery Protection Container mappings.
description: |-
  The **Get-AzRecoveryServicesAsrProtectionContainerMapping** cmdlet gets information about the protection container to replication policy mappings(association) in the vault for the specified ASR protection container.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the protection container mapping to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByObjectWithName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProtectionContainer
    type: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRProtectionContainer" data-throw-if-not-resolved="False" />
    description: |-
      Get protection container mappings corresponding to the specified ASR protection container object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrProtectionContainerMapping
        -ProtectionContainer <ASRProtectionContainer>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByObject
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrProtectionContainerMapping
        -Name <String>
        -ProtectionContainer <ASRProtectionContainer>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByObjectWithName
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRProtectionContainer" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRProtectionContainerMapping" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $ProtectionContainerMappings = Get-AzRecoveryServicesAsrProtectionContainerMapping -ProtectionContainer $Container
    ```

    List of protection container mappings for container.
- title: Example 2
  description: |-
    ```powershell
    $ProtectionContainerMappings = Get-AzRecoveryServicesAsrProtectionContainerMapping -ProtectionContainer $Container -Name $PrimaryProtectionContainerMapping
    ```

    ```output
    Name                                  : pcmmapping
    ID                                    : /Subscriptions/xxxxxxxxxxxx/resourceGroups/canaryexproute/providers/Microsoft.RecoveryServices/vaults/IbizaV2ATest/replicationFabrics/d011a5abf48190235963ee3a88ad188ee6bca8a4c6cd0c8d7ce5d439aa77ffd9/replica
                                            tionProtectionContainers/cloud_5dc96260-9f00-42e4-aca7-24ad27fc2078/replicationProtectionContainerMappings/pcmmapping
    Health                                : Normal
    HealthErrorDetails                    : {}
    PolicyFriendlyName                    : V2aTestPolicy
    PolicyId                              : /Subscriptions/xxxxxxxxxxxx/resourceGroups/canaryexproute/providers/Microsoft.RecoveryServices/vaults/IbizaV2ATest/replicationPolicies/V2aTestPolicy
    SourceFabricFriendlyName              : V2A-W2K12-400
    SourceProtectionContainerFriendlyName : V2A-W2K12-400
    State                                 : Paired
    TargetFabricFriendlyName              : Microsoft Azure
    TargetProtectionContainerFriendlyName : Microsoft Azure
    TargetProtectionContainerId           : Microsoft Azure
    ```

    Gets all protection container mappings for the specified protection container.
