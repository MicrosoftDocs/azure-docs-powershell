    Update-AzRecoveryServicesAsrPolicy
        -InputObject <ASRPolicy>
        [-VMwareToAzure]
        [-RecoveryPointRetentionInHours <Int32>]
        [-ApplicationConsistentSnapshotFrequencyInHours <Int32>]
