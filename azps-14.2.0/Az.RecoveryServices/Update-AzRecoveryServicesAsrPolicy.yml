### YamlMime:PowerShellCmdlet1
uid: Az.RecoveryServices.Update-AzRecoveryServicesAsrPolicy
name: Update-AzRecoveryServicesAsrPolicy
module: Az.RecoveryServices
isPreview: false
summary: |-
  Updates an Azure Site Recovery replication policy.
description: |-
  The **Update-AzRecoveryServicesAsrPolicy** cmdlet updates the specified Azure Site Recovery replication policy.
