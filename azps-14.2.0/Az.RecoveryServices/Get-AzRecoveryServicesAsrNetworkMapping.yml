syntaxes:
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrNetworkMapping
        -Network <ASRNetwork>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByObject
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzRecoveryServicesAsrNetworkMapping
        -PrimaryFabric <ASRFabric>
        [-Name <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFabricObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRNetwork" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRFabric" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.RecoveryServices.SiteRecovery.ASRNetworkMapping" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    $Networkmappings = Get-AzRecoveryServicesAsrNetworkMapping -Network $Network
    ```

    Gets all networks mappings for the passed Network.
- title: Example 2
  description: |-
    ```powershell
    $primaryFabric = Get-AzRecoveryServicesAsrFabric -Name xxxx
    $Networkmappings = Get-AzRecoveryServicesAsrNetworkMapping -Name $networkMappingName -PrimaryFabric $primaryFabric
    ```

    Gets networks mapping with provided name in specified azure site recovery fabric.
