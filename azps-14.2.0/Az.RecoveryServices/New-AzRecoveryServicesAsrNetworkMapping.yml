syntaxes:
- syntax: |-
    ```Syntax
    New-AzRecoveryServicesAsrNetworkMapping
        -Name <String>
        -PrimaryNetwork <ASRNetwork>
        -RecoveryNetwork <ASRNetwork>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: EnterpriseToEnterprise
  isDefault: true
