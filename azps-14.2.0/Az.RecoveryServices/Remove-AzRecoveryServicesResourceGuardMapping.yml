syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzRecoveryServicesResourceGuardMapping
        [-VaultId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-Token <String>]
        [-SecureToken <SecureString>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
