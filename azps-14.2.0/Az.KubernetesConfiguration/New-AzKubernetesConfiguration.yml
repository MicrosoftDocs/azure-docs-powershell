syntaxes:
- syntax: |-
    ```Syntax
    New-AzKubernetesConfiguration
        -ClusterName <String>
        -ClusterType <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ConfigurationProtectedSetting <Hashtable>]
        [-EnableHelmOperator]
        [-HelmOperatorChartValue <String>]
        [-HelmOperatorChartVersion <String>]
        [-OperatorInstanceName <String>]
        [-OperatorNamespace <String>]
        [-OperatorParam <String>]
        [-OperatorScope <String>]
        [-OperatorType <String>]
        [-ClusterScoped]
        [-RepositoryUrl <String>]
        [-SshKnownHost <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
