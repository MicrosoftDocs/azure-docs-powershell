syntaxes:
- syntax: |-
    ```Syntax
    Update-AzKubernetesExtension
        -ClusterName <String>
        -ClusterType <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AutoUpgradeMinorVersion]
        [-ConfigurationProtectedSetting <Hashtable>]
        [-ConfigurationSetting <Hashtable>]
        [-ReleaseTrain <String>]
        [-Version <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzKubernetesExtension
        -InputObject <IKubernetesConfigurationIdentity>
        [-AutoUpgradeMinorVersion]
        [-ConfigurationProtectedSetting <Hashtable>]
