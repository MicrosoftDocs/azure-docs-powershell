syntaxes:
- syntax: |-
    ```Syntax
    New-AzHpcCacheStorageTarget
        -ResourceGroupName <String>
        -CacheName <String>
        -Name <String>
        [-CLFS]
        [-StorageContainerID <String>]
        [-Junction <Hashtable[]>]
        [-AsJob]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ClfsParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzHpcCacheStorageTarget
        -ResourceGroupName <String>
        -CacheName <String>
        -Name <String>
        [-NFS]
        [-HostName <String>]
        [-UsageModel <String>]
        [-Junction <Hashtable[]>]
        [-AsJob]
