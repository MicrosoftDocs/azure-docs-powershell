examples:
- title: 'Example 1: List all event subscriptions from the given location under a specific Azure subscription.'
  description: |-
    ```powershell
    Get-AzEventGridSubscriptionRegional -Location eastus
    ```

    ```output
    Name              ResourceGroupName
    ----              -----------------
    azps-eventsub     azps_test_group_eventgrid
    azps-eventsubname azps_test_group_eventgrid
    ```

    List all event subscriptions from the given location under a specific Azure subscription.
- title: 'Example 2: List all event subscriptions from the given location under a specific Azure subscription.'
