uid: Az.EventGrid.New-AzEventGridStorageQueueEventSubscriptionDestinationObject
name: New-AzEventGridStorageQueueEventSubscriptionDestinationObject
module: Az.EventGrid
isPreview: false
summary: |-
  Create an in-memory object for StorageQueueEventSubscriptionDestination.
description: |-
  Create an in-memory object for StorageQueueEventSubscriptionDestination.
parameters:
  cmdletParameters:
  - name: QueueMessageTimeToLiveInSecond
    type: <xref href="System.Int64" data-throw-if-not-resolved="False" />
    description: |-
      Storage queue message time to live in seconds.
      This value cannot be zero or negative with the exception of using -1 to indicate that the Time To Live of the message is Infinite.
