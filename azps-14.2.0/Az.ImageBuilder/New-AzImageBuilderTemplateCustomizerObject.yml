### YamlMime:PowerShellCmdlet1
uid: Az.ImageBuilder.New-AzImageBuilderTemplateCustomizerObject
name: New-AzImageBuilderTemplateCustomizerObject
module: Az.ImageBuilder
isPreview: false
summary: |-
  Create an in-memory object for ImageTemplateCustomizer.
description: |-
  Create an in-memory object for ImageTemplateCustomizer.
parameters:
  cmdletParameters:
  - name: Destination
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The absolute path to a file (with nested directory structures already created) where the file (from sourceUri) will be uploaded to in the VM.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FileCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FileCustomizer
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Uploads files to VMs (Linux, Windows).
      Corresponds to Packer file provisioner.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FileCustomizer
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Array of filters to select updates to apply.
      Omit or specify empty array to use the default (no filter).
      Refer to above link for examples and detailed description of this field.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WindowsUpdateCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Inline
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Array of PowerShell commands to execute.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ShellCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: PowerShellCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Friendly Name to provide context on what this customization step does.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PowerShellCustomizer
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs the specified PowerShell on the VM (Windows).
      Corresponds to Packer powershell provisioner.
      Exactly one of 'scriptUri' or 'inline' can be specified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PowerShellCustomizer
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RestartCheckCommand
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Command to check if restart succeeded [Default: ''].
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RestartCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RestartCommand
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Command to execute the restart [Default: 'shutdown /r /f /t 0 /c "packer restart"'].
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RestartCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RestartCustomizer
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Reboots a VM and waits for it to come back online (Windows).
      Corresponds to Packer windows-restart provisioner
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RestartCustomizer
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RestartTimeout
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Restart timeout specified as a string of magnitude and unit, e.g.
      '5m' (5 minutes) or '2h' (2 hours) [Default: '5m'].
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RestartCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RunAsSystem
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      If specified, the PowerShell script will be run with elevated privileges using the Local System user.
      Can only be true when the runElevated field above is set to true.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PowerShellCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RunElevated
    type: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
    description: |-
      If specified, the PowerShell script will be run with elevated privileges.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PowerShellCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ScriptUri
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      URI of the PowerShell script to be run for customizing.
      It can be a github link, SAS URI for Azure Storage, etc.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ShellCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: PowerShellCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SearchCriterion
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Criteria to search updates.
      Omit or specify empty string to use the default (search all).
      Refer to above link for examples and detailed description of this field.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WindowsUpdateCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Sha256Checksum
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      SHA256 checksum of the file provided in the sourceUri field above.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FileCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ShellCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: PowerShellCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ShellCustomizer
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Runs a shell script during the customization phase (Linux).
      Corresponds to Packer shell provisioner.
      Exactly one of 'scriptUri' or 'inline' can be specified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ShellCustomizer
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceUri
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The URI of the file to be uploaded for customizing the VM.
      It can be a github link, SAS URI for Azure Storage, etc.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FileCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UpdateLimit
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Maximum number of updates to apply at a time.
      Omit or specify 0 to use the default (1000).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WindowsUpdateCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ValidExitCode
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Valid exit codes for the PowerShell script.
      [Default: 0].
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: PowerShellCustomizer
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WindowsUpdateCustomizer
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Installs Windows Updates.
      Corresponds to Packer Windows Update Provisioner (https://github.com/rgl/packer-provisioner-windows-update)
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WindowsUpdateCustomizer
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzImageBuilderTemplateCustomizerObject
        [-FileCustomizer]
        [-Destination <String>]
        [-Sha256Checksum <String>]
        [-SourceUri <String>]
        [-Name <String>]
        [<CommonParameters>]
    ```
  parameterSetName: FileCustomizer
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzImageBuilderTemplateCustomizerObject
        [-Sha256Checksum <String>]
        [-Name <String>]
        [-Inline <String[]>]
        [-ScriptUri <String>]
        [-ShellCustomizer]
        [<CommonParameters>]
    ```
  parameterSetName: ShellCustomizer
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzImageBuilderTemplateCustomizerObject
        [-Sha256Checksum <String>]
        [-Name <String>]
        [-PowerShellCustomizer]
        [-Inline <String[]>]
        [-RunAsSystem <Boolean>]
        [-RunElevated <Boolean>]
        [-ScriptUri <String>]
        [-ValidExitCode <Int32[]>]
        [<CommonParameters>]
    ```
  parameterSetName: PowerShellCustomizer
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzImageBuilderTemplateCustomizerObject
        [-Name <String>]
        [-RestartCustomizer]
        [-RestartCheckCommand <String>]
        [-RestartCommand <String>]
        [-RestartTimeout <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RestartCustomizer
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzImageBuilderTemplateCustomizerObject
        [-Name <String>]
        [-WindowsUpdateCustomizer]
        [-Filter <String[]>]
        [-SearchCriterion <String>]
        [-UpdateLimit <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: WindowsUpdateCustomizer
  isDefault: false
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ImageBuilder.Models.ImageTemplateFileCustomizer" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ImageBuilder.Models.ImageTemplatePowerShellCustomizer" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ImageBuilder.Models.ImageTemplateRestartCustomizer" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ImageBuilder.Models.ImageTemplateShellCustomizer" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ImageBuilder.Models.ImageTemplateWindowsUpdateCustomizer" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a windows update customizer.'
  description: |-
    ```powershell
    New-AzImageBuilderTemplateCustomizerObject -WindowsUpdateCustomizer -Name 'WindUpdate' -Filter ("BrowseOnly", "IsInstalled") -SearchCriterion "BrowseOnly=0 and IsInstalled=0" -UpdateLimit 100
    ```

    ```output
    Name       Filter                    SearchCriterion                UpdateLimit
    ----       ------                    ---------------                -----------
    WindUpdate {BrowseOnly, IsInstalled} BrowseOnly=0 and IsInstalled=0 100
    ```

    This command creates a windows update customizer.
- title: 'Example 2: Create a file customizer.'
  description: |-
    ```powershell
    New-AzImageBuilderTemplateCustomizerObject -FileCustomizer -Name 'filecus' -Destination 'c:\\buildArtifacts\\index.html' -SourceUri 'https://github.com/danielsollondon/azvmimagebuilder/blob/master/quickquickstarts/exampleArtifacts/buildArtifacts/index.html'
    ```

    ```output
    Name    Destination                    Sha256Checksum SourceUri
    ----    -----------                    -------------- ---------
    filecus c:\\buildArtifacts\\index.html                https://github.com/danielsollondon/azvmimagebuilder/blob/master/quickquickstarts/exampleArtifacts/buildArtifacts/index.html
    ```

    This command creates a file customizer.
- title: 'Example 3: Create a powershell customizer.'
  description: |-
    ```powershell
    New-AzImageBuilderTemplateCustomizerObject -PowerShellCustomizer -Name settingUpMgmtAgtPath -RunElevated $false -Inline "mkdir c:\\buildActions", "echo Azure-Image-Builder-Was-Here  > c:\\buildActions\\buildActionsOutput.txt"
    ```

    ```output
    Name                 Inline                                                                                                  RunAsSystem RunElevated ScriptUri Sha256Checksum ValidExitCode
    ----                 ------                                                                                                  ----------- ----------- --------- -------------- -------------
    settingUpMgmtAgtPath {mkdir c:\\buildActions, echo Azure-Image-Builder-Was-Here  > c:\\buildActions\\buildActionsOutput.txt}             False
    ```

    This command creates a powershell customizer.
- title: 'Example 4: Create a restart customizer.'
  description: |-
    ```powershell
    New-AzImageBuilderTemplateCustomizerObject -RestartCustomizer -Name 'restcus' -RestartCommand 'shutdown /f /r /t 0 /c \"packer restart\"' -RestartCheckCommand 'powershell -command "& {Write-Output "restarted."}"' -RestartTimeout '10m'
    ```

    ```output
    Name    RestartCheckCommand                                 RestartCommand                            RestartTimeout
    ----    -------------------                                 --------------                            --------------
    restcus powershell -command "& {Write-Output "restarted."}" shutdown /f /r /t 0 /c \"packer restart\" 10m
    ```

    This command creates a restart customizer.
- title: 'Example 5: Create a shell customizer.'
  description: |-
    ```powershell
    New-AzImageBuilderTemplateCustomizerObject -ShellCustomizer -Name downloadBuildArtifacts -ScriptUri "https://raw.githubusercontent.com/danielsollondon/azvmimagebuilder/master/quickquickstarts/customizeScript2.sh"
    ```

    ```output
    Name                   Inline ScriptUri                                                                                                      Sha256Checksum
    ----                   ------ ---------                                                                                                      --------------
    downloadBuildArtifacts        https://raw.githubusercontent.com/danielsollondon/azvmimagebuilder/master/quickquickstarts/customizeScript2.sh
    ```

    This command creates a shell customizer.
