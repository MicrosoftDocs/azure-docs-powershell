syntaxes:
- syntax: |-
    ```Syntax
    New-AzImageBuilderTemplate
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        -Customize <IImageTemplateCustomizer[]>
        -Distribute <IImageTemplateDistributor[]>
        -Source <IImageTemplateSource>
        [-SubscriptionId <String>]
        [-BuildTimeoutInMinute <Int32>]
        [-StagingResourceGroup <String>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-VMBootState <String>]
        [-VMProfileOsdiskSizeGb <Int32>]
        [-VMProfileUserAssignedIdentity <String[]>]
        [-VMProfileVmsize <String>]
        [-ValidateContinueDistributeOnFailure]
        [-ValidateSourceValidationOnly]
        [-Validator <IImageTemplateInVMValidator[]>]
        [-VnetConfigProxyVMSize <String>]
        [-VnetConfigSubnetId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
