syntaxes:
- syntax: |-
    ```Syntax
    New-AzNotificationHub
        [-ResourceGroup] <String>
        [-Namespace] <String>
        [-InputFile] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputFileParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzNotificationHub
        [-ResourceGroup] <String>
        [-Namespace] <String>
        [-NotificationHubObj] <NotificationHubAttributes>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NotificationHubParameterSet
  isDefault: false
