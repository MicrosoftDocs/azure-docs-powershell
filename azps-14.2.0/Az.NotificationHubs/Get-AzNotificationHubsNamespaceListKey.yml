### YamlMime:PowerShellCmdlet1
uid: Az.NotificationHubs.Get-AzNotificationHubsNamespaceListKey
name: Get-AzNotificationHubsNamespaceListKey
module: Az.NotificationHubs
isPreview: false
summary: |-
  Gets the primary and secondary connection strings associated with a notification hub namespace authorization rule.
description: |-
  The **Get-AzNotificationHubsNamespaceListKey** cmdlet returns the primary and secondary connection strings for a Shared Access Signature (SAS) authorization rule assigned to a notification hub namespace.
  Authorization rules manage user rights to a notification hub namespace.
  Each rule includes a primary and a secondary connection string.
parameters:
  cmdletParameters:
  - name: AuthorizationRule
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a SAS authentication rule.
      These rules determine the type of access that users have to the notification hub.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Namespace
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the namespace containing the connection strings that this cmdlet gets.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroup
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the resource group to which the namespace is assigned.
      Resource groups organize items such as namespaces, notification hubs, and authorization rules in ways that help simply inventory management and Azure administration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
