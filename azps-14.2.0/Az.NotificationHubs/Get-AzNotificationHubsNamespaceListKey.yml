syntaxes:
- syntax: |-
    ```Syntax
    Get-AzNotificationHubsNamespaceListKey
        [-ResourceGroup] <String>
        [-Namespace] <String>
        [-AuthorizationRule] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
