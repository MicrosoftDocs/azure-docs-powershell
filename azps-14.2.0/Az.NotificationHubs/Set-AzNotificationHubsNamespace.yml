syntaxes:
- syntax: |-
    ```Syntax
    Set-AzNotificationHubsNamespace
        [-ResourceGroup] <String>
        [-Namespace] <String>
        [-Location] <String>
        [[-State] <NamespaceState>]
        [[-Critical] <Boolean>]
        [[-Tag] <Hashtable>]
        [[-SkuTier] <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
