syntaxes:
- syntax: |-
    ```Syntax
    New-AzMariaDbVirtualNetworkRule
        -Name <String>
        -ResourceGroupName <String>
        -ServerName <String>
        [-SubscriptionId <String>]
        [-IgnoreMissingVnetServiceEndpoint]
        [-SubnetId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
