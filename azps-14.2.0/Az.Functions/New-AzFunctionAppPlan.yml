syntaxes:
- syntax: |-
    ```Syntax
    New-AzFunctionAppPlan
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        [-SubscriptionId <String>]
        -Sku <String>
        [-MaximumWorkerCount <Int32>]
        [-MinimumWorkerCount <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        -WorkerType <String>
        [-NoWait]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
