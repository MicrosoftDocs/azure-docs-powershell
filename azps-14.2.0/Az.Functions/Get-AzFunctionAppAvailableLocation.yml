syntaxes:
- syntax: |-
    ```Syntax
    Get-AzFunctionAppAvailableLocation
        [[-SubscriptionId] <String[]>]
        [[-PlanType] <String>]
        [[-OSType] <String>]
        [[-DefaultProfile] <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Functions.Models.Api20231201.IGeoRegion" data-throw-if-not-resolved="False" />
examples:
- title: "Example 1: Get the locations where Premium is available for Windows. If no parameters are specified, PlanType is set to 'Premium' and OSType is set to 'Windows'."
  description: |-
    ```powershell
    Get-AzFunctionAppAvailableLocation
    ```

    ```output
    Name
    ----
    Central US
    North Europe
    West Europe
    Southeast Asia
    East Asia
    West US
    East US
    Japan West
    Japan East
    East US 2
    North Central US
    South Central US
    Brazil South
    Australia East
    Australia Southeast
    East Asia (Stage)
