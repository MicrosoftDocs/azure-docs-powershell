### YamlMime:PowerShellCmdlet1
uid: Az.Functions.Get-AzFunctionAppAvailableLocation
name: Get-AzFunctionAppAvailableLocation
module: Az.Functions
isPreview: false
summary: |-
  Gets the location where a function app for the given os and plan type is available.
description: |-
  Gets the location where a function app for the given os and plan type is available.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="System.Management.Automation.PSObject" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzureRMContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OSType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The OS type for the service plan.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PlanType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
