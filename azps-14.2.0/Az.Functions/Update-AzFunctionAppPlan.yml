syntaxes:
- syntax: |-
    ```Syntax
    Update-AzFunctionAppPlan
        -ResourceGroupName <String>
        -Name <String>
        [-SubscriptionId <String>]
        [-Sku <String>]
        [-MaximumWorkerCount <Int32>]
        [-MinimumWorkerCount <Int32>]
        [-Force]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-NoWait]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzFunctionAppPlan
        -InputObject <IAppServicePlan>
        [-Sku <String>]
        [-MaximumWorkerCount <Int32>]
        [-MinimumWorkerCount <Int32>]
        [-Force]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-NoWait]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByObjectInput
  isDefault: false
