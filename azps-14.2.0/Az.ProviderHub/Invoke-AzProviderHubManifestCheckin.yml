syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzProviderHubManifestCheckin
        -ProviderNamespace <String>
        -BaselineArmManifestLocation <String>
        -Environment <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ManifestExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzProviderHubManifestCheckin
        -ProviderNamespace <String>
        -JsonFilePath <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ManifestViaJsonFilePath
  isDefault: false
- syntax: |-
