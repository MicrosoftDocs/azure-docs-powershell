syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDeviceRegistryAssetEndpointProfile
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDeviceRegistryAssetEndpointProfile
        -InputObject <IDeviceRegistryIdentity>
        [-DefaultProfile <PSObject>]
