syntaxes:
- syntax: |-
    ```Syntax
    New-AzVMwarePlacementPolicy
        -ClusterName <String>
        -Name <String>
        -PrivateCloudName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Property <IPlacementPolicyProperties>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
