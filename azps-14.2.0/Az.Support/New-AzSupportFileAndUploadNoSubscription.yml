examples:
- title: 'Example 1: Create and upload a file to a file workspace'
  description: |-
    ```powershell
    New-AzSupportFileAndUploadNoSubscription -WorkspaceName "testworkspace" -FilePath "C:\path\to\file\test.txt"
    ```

