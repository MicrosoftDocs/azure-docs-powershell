syntaxes:
- syntax: |-
    ```Syntax
    Connect-AzDevCenterAdminCatalog
        -DevCenterName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Connect
  isDefault: true
- syntax: |-
    ```Syntax
    Connect-AzDevCenterAdminCatalog
        -InputObject <IDevCenterIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ConnectViaIdentity
  isDefault: false
