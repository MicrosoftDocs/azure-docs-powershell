        [-CreatorRoleAssignmentRole <Hashtable>]
        [-DisplayName <String>]
        [-IdentityType <ManagedServiceIdentityType>]
        [-IdentityUserAssignedIdentity <Hashtable>]
        [-Location <String>]
        [-Tag <Hashtable>]
        [-UserRoleAssignment <Hashtable>]
