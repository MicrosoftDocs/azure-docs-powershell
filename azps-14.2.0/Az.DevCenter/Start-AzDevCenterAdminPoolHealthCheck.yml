syntaxes:
- syntax: |-
    ```Syntax
    Start-AzDevCenterAdminPoolHealthCheck
        -PoolName <String>
        -ProjectName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Run
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzDevCenterAdminPoolHealthCheck
        -InputObject <IDevCenterIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
