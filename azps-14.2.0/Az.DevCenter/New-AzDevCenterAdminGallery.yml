syntaxes:
- syntax: |-
    ```Syntax
    New-AzDevCenterAdminGallery
        -DevCenterName <String>
        -Name <String>
        -ResourceGroupName <String>
        -GalleryResourceId <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDevCenterAdminGallery
        -InputObject <IDevCenterIdentity>
        -GalleryResourceId <String>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityExpanded
  isDefault: false
