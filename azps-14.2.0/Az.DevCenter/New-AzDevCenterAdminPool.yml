syntaxes:
- syntax: |-
    ```Syntax
    New-AzDevCenterAdminPool
        -Name <String>
        -ProjectName <String>
        -ResourceGroupName <String>
        -Location <String>
        -DevBoxDefinitionName <String>
        -LocalAdministrator <LocalAdminStatus>
        -NetworkConnectionName <String>
        [-SubscriptionId <String>]
        [-DisplayName <String>]
        [-ManagedVirtualNetworkRegion <String[]>]
        [-SingleSignOnStatus <SingleSignOnStatus>]
        [-StopOnDisconnectGracePeriodMinute <Int32>]
        [-StopOnDisconnectStatus <StopOnDisconnectEnableStatus>]
        [-Tag <Hashtable>]
        [-VirtualNetworkType <VirtualNetworkType>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDevCenterAdminPool
        -InputObject <IDevCenterIdentity>
        -Location <String>
        -DevBoxDefinitionName <String>
        -LocalAdministrator <LocalAdminStatus>
        -NetworkConnectionName <String>
        [-DisplayName <String>]
        [-ManagedVirtualNetworkRegion <String[]>]
        [-SingleSignOnStatus <SingleSignOnStatus>]
        [-StopOnDisconnectGracePeriodMinute <Int32>]
        [-StopOnDisconnectStatus <StopOnDisconnectEnableStatus>]
        [-Tag <Hashtable>]
        [-VirtualNetworkType <VirtualNetworkType>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentityExpanded
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.DevCenter.Models.IDevCenterIdentity" data-throw-if-not-resolved="False" />
