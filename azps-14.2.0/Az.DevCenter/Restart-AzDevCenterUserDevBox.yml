syntaxes:
- syntax: |-
    ```Syntax
    Restart-AzDevCenterUserDevBox
        -Endpoint <String>
        -Name <String>
        -ProjectName <String>
        [-UserId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Restart
  isDefault: true
- syntax: |-
