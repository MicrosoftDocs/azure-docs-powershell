syntaxes:
- syntax: |-
    ```Syntax
    Get-AzPeeringLegacy
        [-SubscriptionId <String[]>]
        -Kind <String>
        -PeeringLocation <String>
        [-Asn <Int32>]
        [-DirectPeeringType <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
