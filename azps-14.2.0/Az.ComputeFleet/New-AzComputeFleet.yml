syntaxes:
- syntax: |-
    ```Syntax
    New-AzComputeFleet
        -InputObject <IComputeFleetIdentity>
        -Resource <IFleet>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaIdentity
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzComputeFleet
        -Name <String>
        -ResourceGroupName <String>
        -Resource <IFleet>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Create
  isDefault: false
