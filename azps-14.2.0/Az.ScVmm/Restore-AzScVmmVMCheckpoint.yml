- syntax: |-
    ```Syntax
    Restore-AzScVmmVMCheckpoint
        -Name <String>
        -ResourceGroupName <String>
        -CheckpointId <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RestoreExpanded
  isDefault: true
