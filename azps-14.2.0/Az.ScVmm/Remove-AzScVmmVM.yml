syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzScVmmVM
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DeleteFromHost]
        [-Force]
        [-DeleteMachine]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
