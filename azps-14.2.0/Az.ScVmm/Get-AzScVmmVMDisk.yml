syntaxes:
- syntax: |-
    ```Syntax
    Get-AzScVmmVMDisk
        -vmName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DiskName <String>]
        [-DiskId <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
