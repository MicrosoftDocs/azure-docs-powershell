syntaxes:
- syntax: |-
    ```Syntax
    Get-AzScVmmVMExtension
        -vmName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-Expand <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzScVmmVMExtension
        -vmName <String>
        -ResourceGroupName <String>
        -ExtensionName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: false
