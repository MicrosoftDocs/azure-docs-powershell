syntaxes:
- syntax: |-
    ```Syntax
    New-AzScVmmServer
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        -Fqdn <String>
        -Port <Int32>
        -Username <String>
        -Password <SecureString>
        -CustomLocationId <String>
        [-SubscriptionId <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzScVmmServer
        -Name <String>
        -ResourceGroupName <String>
        -JsonString <String>
        [-SubscriptionId <String>]
