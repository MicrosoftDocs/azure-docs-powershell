syntaxes:
- syntax: |-
    ```Syntax
    Update-AzScVmmVM
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-CpuCount <Int32>]
        [-DynamicMemoryEnabled]
        [-DynamicMemoryMaxMb <Int32>]
        [-DynamicMemoryMinMb <Int32>]
        [-LimitCpuForMigration]
        [-MemoryMb <Int32>]
        [-CheckpointType <String>]
        [-AvailabilitySetName <String[]>]
        [-AvailabilitySetId <String[]>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzScVmmVM
        -Name <String>
        -ResourceGroupName <String>
        -JsonFilePath <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaJsonFilePath
  isDefault: false
- syntax: |-
    ```Syntax
    Update-AzScVmmVM
        -Name <String>
        -ResourceGroupName <String>
        -JsonString <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
