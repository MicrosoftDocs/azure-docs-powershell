- title: 'Example 2: Get-AzConnectedNetworkVendor using Identity'
  description: |-
    ```powershell
    $vendor = @{ VendorName = "myVendor1"; SubscriptionId = "xxxxx-00000-xxxxx-00000"}
    Get-AzConnectedNetworkVendor -InputObject $vendor
    ```

    ```output
