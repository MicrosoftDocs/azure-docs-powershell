examples:
- title: 'Example 1: Get-AzConnectedNetworkDeviceRegistrationKey using Resource Group, Resource name'
  description: |-
    ```powershell
    Get-AzConnectedNetworkDeviceRegistrationKey -DeviceName myMecDevice -ResourceGroupName myResources
    ```

    ```output
    
    ```

    Getting the registration key for NFM device in resource group myResources with resource name myMecDevice.
    To register the device, use the cmdlet Invoke-MecRegister with the registration key in the minishell session.
- title: 'Example 2: Get-AzConnectedNetworkDeviceRegistrationKey using Resource Group, Resource name and Subscription Id'
  description: |-
    ```powershell
    Get-AzConnectedNetworkDeviceRegistrationKey -DeviceName myMecDevice -ResourceGroupName myResources -SubscriptionId xxxxx-00000-xxxxx-00000
    ```

    ```output
    
    ```

    Getting the registration key for NFM device in resource group myResources with resource name myMecDevice.
    To register the device, use the cmdlet Invoke-MecRegister with the registration key in the minishell session.
