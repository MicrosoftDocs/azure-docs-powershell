syntaxes:
- syntax: |-
    ```Syntax
    Get-AzConnectedNetworkDeviceRegistrationKey
        -DeviceName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
