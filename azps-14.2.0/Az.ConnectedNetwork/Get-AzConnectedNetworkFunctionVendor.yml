    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzConnectedNetworkFunctionVendor
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ConnectedNetwork.Models.INetworkFunctionVendor" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get-AzConnectedNetworkFunctionVendor'
  description: |-
    ```powershell
    Get-AzConnectedNetworkFunctionVendor
    ```

    ```output
    SkuList                                                                                         VendorName
    -------                                                                                         ----------
    {vendor-sku, vendor-sku1, vendor-sku2, vendor-sku3, vendor-sku4, vendor-sku4, vendor-sku5...}   myVendor
    {vendor1-sku, vendor1-sku2}                                                                     myVendor1
    {vendor2-sku1}                                                                                  myVendor2
    ```

    Getting information about the vendors and their skus
- title: 'Example 2: Get-AzConnectedNetworkFunctionVendor via Subscription Id'
  description: |-
    ```powershell
    Get-AzConnectedNetworkFunctionVendor -SubscriptionId "xxxxx-00000-xxxxx-00000"
    ```

    ```output
    SkuList                                                                                         VendorName
    -------                                                                                         ----------
    {vendor1-sku, vendor1-sku2}                                                                     myVendor1
    {vendor2-sku1}                                                                                  myVendor2
    ```

    Gets information about the vendors and their skus in the given subscription.
