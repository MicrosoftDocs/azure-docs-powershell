syntaxes:
- syntax: |-
    ```Syntax
    New-AzTimeSeriesInsightsEnvironment
        -Name <String>
        -ResourceGroupName <String>
        -Kind <Kind>
        -Location <String>
        -Sku <SkuName>
        -Capacity <Int32>
        -DataRetentionTime <TimeSpan>
        [-SubscriptionId <String>]
        [-PartitionKeyProperty <ITimeSeriesIdProperty[]>]
        [-StorageLimitExceededBehavior <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Gen1
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzTimeSeriesInsightsEnvironment
        -Name <String>
        -ResourceGroupName <String>
        -Kind <Kind>
        -Location <String>
        -Sku <SkuName>
        -TimeSeriesIdProperty <ITimeSeriesIdProperty[]>
        -StorageAccountName <String>
        -StorageAccountKey <SecureString>
        [-SubscriptionId <String>]
        [-Tag <Hashtable>]
        [-WarmStoreDataRetentionTime <TimeSpan>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Gen2
  isDefault: false
outputs:
