syntaxes:
- syntax: |-
    ```Syntax
    Update-AzTimeSeriesInsightsEventSource
        -EnvironmentName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzTimeSeriesInsightsEventSource
        -InputObject <ITimeSeriesInsightsIdentity>
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
