        -TargetType <String>
        [-SourceConnection <ConnectionInfo>]
        [-TargetConnection <ConnectionInfo>]
        [-DatabaseInfo <DatabaseInfo[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
