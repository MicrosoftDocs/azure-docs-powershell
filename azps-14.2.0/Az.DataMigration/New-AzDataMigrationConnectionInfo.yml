### YamlMime:PowerShellCmdlet1
uid: Az.DataMigration.New-AzDataMigrationConnectionInfo
name: New-AzDataMigrationConnectionInfo
module: Az.DataMigration
isPreview: false
summary: |-
  Creates a new Connection Info object specifying the server type and name for connection.
description: |-
  The New-AzDataMigrationConnectionInfo cmdlet creates new a Connection Info object specifying the server type for connection.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerType
    type: <xref href="Microsoft.Azure.Commands.DataMigration.Models.ServerTypeEnum" data-throw-if-not-resolved="False" />
    description: |-
      Enum that describes server type to connect to. Currently supported values are SQL for SQL Server, Azure SQL Managed Instance, MongoDb, CosmosDb and Azure SQL Database.
    acceptedValues:
    - SQL
    - MongoDb
    - SQLMI
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataMigrationConnectionInfo
        -ServerType <ServerTypeEnum>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Management.DataMigration.Models.ConnectionInfo" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    New-AzDataMigrationConnectionInfo -ServerType SQL
    ```

    The preceding example creates a new Connection Info object providing SQL as ServerType parameter.
