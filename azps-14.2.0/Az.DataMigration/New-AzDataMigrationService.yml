    New-AzDataMigrationService
        -ResourceGroupName <String>
        -Name <String>
        -Location <String>
        -Sku <String>
        -VirtualSubnetId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
