syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataMigrationAssessment
        -ConnectionString <String[]>
        [-OutputFolder <String>]
        [-Overwrite]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: CommandLine
  isDefault: true
- syntax: |-
