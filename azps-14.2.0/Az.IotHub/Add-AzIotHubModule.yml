syntaxes:
- syntax: |-
    ```Syntax
    Add-AzIotHubModule
        [-ResourceGroupName] <String>
        [-IotHubName] <String>
        [-DeviceId] <String>
        [-ModuleId] <String>
        [-AuthMethod <PSDeviceAuthType>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceSet
  isDefault: true
- syntax: |-
