syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzIotHubQuery
        [-ResourceGroupName] <String>
        [-IotHubName] <String>
        [-Query] <String>
        [-Top <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceSet
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzIotHubQuery
        [-InputObject] <PSIotHub>
        [-Query] <String>
        [-Top <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObjectSet
  isDefault: false
- syntax: |-
    ```Syntax
    Invoke-AzIotHubQuery
        [-ResourceId] <String>
        [-Query] <String>
        [-Top <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceIdSet
  isDefault: false
