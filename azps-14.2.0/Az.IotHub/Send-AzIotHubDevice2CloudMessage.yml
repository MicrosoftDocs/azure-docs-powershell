syntaxes:
- syntax: |-
    ```Syntax
    Send-AzIotHubDevice2CloudMessage
        [-ResourceGroupName] <String>
        [-IotHubName] <String>
        -DeviceId <String>
        -Message <String>
        [-TransportType <PSTransportType>]
