syntaxes:
- syntax: |-
    ```Syntax
    New-AzIotHubKey
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-KeyName] <String>
        [-RenewKey] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzIotHubKey
        [-HubId] <String>
        [-KeyName] <String>
        [-RenewKey] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
