syntaxes:
- syntax: |-
    ```Syntax
    Add-AzIotHubDevice
        [-ResourceGroupName] <String>
        [-IotHubName] <String>
        [-DeviceId] <String>
        [-AuthMethod <PSDeviceAuthType>]
        [-Status <PSDeviceStatus>]
        [-StatusReason <String>]
        [-EdgeEnabled]
        [-Children <String[]>]
        [-ParentDeviceId <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceSet
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzIotHubDevice
        [-InputObject] <PSIotHub>
        [-DeviceId] <String>
        [-AuthMethod <PSDeviceAuthType>]
        [-Status <PSDeviceStatus>]
        [-StatusReason <String>]
        [-EdgeEnabled]
        [-Children <String[]>]
        [-ParentDeviceId <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObjectSet
  isDefault: false
- syntax: |-
    ```Syntax
    Add-AzIotHubDevice
        [-ResourceId] <String>
        [-DeviceId] <String>
        [-AuthMethod <PSDeviceAuthType>]
        [-Status <PSDeviceStatus>]
        [-StatusReason <String>]
        [-EdgeEnabled]
        [-Children <String[]>]
        [-ParentDeviceId <String>]
