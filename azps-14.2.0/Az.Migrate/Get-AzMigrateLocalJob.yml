### YamlMime:PowerShellCmdlet1
uid: Az.Migrate.Get-AzMigrateLocalJob
name: Get-AzMigrateLocalJob
module: Az.Migrate
isPreview: false
summary: |-
  Retrieves the status of an Azure Migrate job.
description: |-
  The Get-AzMigrateLocalJob cmdlet retrieves the status of an Azure Migrate job.
