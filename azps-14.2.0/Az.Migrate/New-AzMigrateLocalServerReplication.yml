syntaxes:
- syntax: |-
    ```Syntax
    New-AzMigrateLocalServerReplication
        -MachineId <String>
        -TargetStoragePathId <String>
        -TargetResourceGroupId <String>
        -TargetVMName <String>
        -TargetVirtualSwitchId <String>
        -OSDiskID <String>
        [-TargetVMCPUCore <Int32>]
        [-TargetTestVirtualSwitchId <String>]
        [-IsDynamicMemoryEnabled <String>]
        [-TargetVMRam <Int64>]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByIdDefaultUser
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzMigrateLocalServerReplication
        -MachineId <String>
        -TargetStoragePathId <String>
        -TargetResourceGroupId <String>
        -TargetVMName <String>
        -DiskToInclude <AzLocalDiskInput[]>
        -NicToInclude <AzLocalNicInput[]>
        [-TargetVMCPUCore <Int32>]
        [-IsDynamicMemoryEnabled <String>]
        [-TargetVMRam <Int64>]
