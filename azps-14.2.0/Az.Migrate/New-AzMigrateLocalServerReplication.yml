### YamlMime:PowerShellCmdlet1
uid: Az.Migrate.New-AzMigrateLocalServerReplication
name: New-AzMigrateLocalServerReplication
module: Az.Migrate
isPreview: false
summary: |-
  Starts replication for the specified server.
description: |-
  The New-AzMigrateLocalServerReplication cmdlet starts the replication for a particular discovered server in the Azure Migrate project.
