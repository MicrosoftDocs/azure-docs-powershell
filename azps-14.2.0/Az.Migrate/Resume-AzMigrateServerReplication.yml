uid: Az.Migrate.Resume-AzMigrateServerReplication
name: Resume-AzMigrateServerReplication
module: Az.Migrate
isPreview: false
summary: |-
  Starts the replication that has been suspended.
description: |-
  The Resume-AzMigrateServerReplication starts the replication that has been suspended.
