syntaxes:
- syntax: |-
    ```Syntax
    Resume-AzMigrateServerReplication
        -TargetObjectID <String>
        [-DeleteMigratedResource]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByIDVMwareCbt
  isDefault: true
- syntax: |-
    ```Syntax
    Resume-AzMigrateServerReplication
        -InputObject <IMigrationItem>
        [-DeleteMigratedResource]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInputObjectVMwareCbt
  isDefault: false
