syntaxes:
- syntax: |-
    ```Syntax
    Get-AzMigrateServerMigrationStatus
        -ResourceGroupName <String>
        -ProjectName <String>
        [-SubscriptionId <String>]
        [-Filter <String>]
        [-SkipToken <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: ListByName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzMigrateServerMigrationStatus
        -ResourceGroupName <String>
        -ProjectName <String>
        -ApplianceName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: GetByApplianceName
  isDefault: false
- syntax: |-
