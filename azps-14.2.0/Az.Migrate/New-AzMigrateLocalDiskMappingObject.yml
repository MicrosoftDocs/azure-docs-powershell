syntaxes:
- syntax: |-
    ```Syntax
    New-AzMigrateLocalDiskMappingObject
        -DiskID <String>
        -IsOSDisk <String>
        -IsDynamic <String>
        -Size <Int64>
        -Format <String>
        [-PhysicalSectorSize <Int64>]
        [-TargetStoragePathId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Migrate.Models.Api20240901.AzLocalDiskInput" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Creates Disk to migrate'
  description: |-
    ```powershell
    New-AzMigrateLocalDiskMappingObject -DiskID a -IsOSDisk true -IsDynamic true -Size 1 -Format VHDX
    ```

    ```output
    DiskFileFormat     : VHDX
    DiskId             : a
    DiskSizeGb         : 1
    IsDynamic          : True
    IsOSDisk           : True
    StorageContainerId :
    ```

    Get disk object to provide input for New-AzMigrateLocalServerReplication
