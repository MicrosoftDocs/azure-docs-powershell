### YamlMime:PowerShellCmdlet1
uid: Az.Migrate.New-AzMigrateLocalDiskMappingObject
name: New-AzMigrateLocalDiskMappingObject
module: Az.Migrate
isPreview: false
summary: |-
  Creates a new disk mapping
description: |-
  The New-AzMigrateLocalDiskMappingObject cmdlet creates a mapping of the source disk attached to the server to be migrated
parameters:
  cmdletParameters:
  - name: DiskID
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the disk ID of the disk attached to the discovered server to be migrated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Format
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the disk format.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IsDynamic
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether the disk is dynamic.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IsOSDisk
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether the disk contains the Operating System for the source server to be migrated.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PhysicalSectorSize
    type: <xref href="System.Int64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the disk physical sector size in bytes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Size
    type: <xref href="System.Int64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the disk size in GB.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TargetStoragePathId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the storage path ARM ID where the disk will be stored.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
