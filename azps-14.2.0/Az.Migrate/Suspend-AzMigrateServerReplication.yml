    Suspend-AzMigrateServerReplication
        -InputObject <IMigrationItem>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByInputObjectVMwareCbt
  isDefault: false
