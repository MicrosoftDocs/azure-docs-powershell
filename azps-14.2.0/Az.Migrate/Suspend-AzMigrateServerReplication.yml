syntaxes:
- syntax: |-
    ```Syntax
    Suspend-AzMigrateServerReplication
        -TargetObjectID <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByIDVMwareCbt
  isDefault: true
- syntax: |-
