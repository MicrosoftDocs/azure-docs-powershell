uid: Az.Migrate.Suspend-AzMigrateServerReplication
name: Suspend-AzMigrateServerReplication
module: Az.Migrate
isPreview: false
summary: |-
  Suspends the ongoing replication.
description: |-
  The Suspend-AzMigrateServerReplication suspends the ongoing replication.
