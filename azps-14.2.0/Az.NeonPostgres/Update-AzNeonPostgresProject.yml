        [-Database <INeonDatabaseProperties[]>]
        [-DefaultEndpointSettingAutoscalingLimitMaxCu <Single>]
        [-DefaultEndpointSettingAutoscalingLimitMinCu <Single>]
        [-Endpoint <IEndpointProperties[]>]
        [-EntityName <String>]
        [-HistoryRetention <Int32>]
        [-PgVersion <Int32>]
