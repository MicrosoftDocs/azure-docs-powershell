### YamlMime:PowerShellCmdlet1
uid: Az.App.New-AzContainerAppRegistryCredentialObject
name: New-AzContainerAppRegistryCredentialObject
module: Az.App
isPreview: false
summary: |-
  Create an in-memory object for RegistryCredentials.
description: |-
  Create an in-memory object for RegistryCredentials.
parameters:
  cmdletParameters:
  - name: Identity
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      A Managed Identity to use to authenticate with Azure Container Registry.
      For user-assigned identities, use the full user-assigned identity Resource ID.
      For system-assigned identities, use 'system'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PasswordSecretRef
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the Secret that contains the registry login password.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Container Registry Server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Username
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Container Registry Username.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzContainerAppRegistryCredentialObject
        [-Identity <String>]
        [-PasswordSecretRef <String>]
        [-Server <String>]
        [-Username <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.App.Models.RegistryCredentials" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a RegistryCredentials object for ContainerApp.'
  description: |-
    ```powershell
    New-AzContainerAppRegistryCredentialObject -Identity system -PasswordSecretRef "myloginpassword" -Server azps-containerapp-1 -Username azps-container-user
    ```

    ```output
    Identity PasswordSecretRef Server              Username
    -------- ----------------- ------              --------
    system   myloginpassword   azps-containerapp-1 azps-container-user
    ```

    Create a RegistryCredentials object for ContainerApp.
