syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzContainerApp
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
