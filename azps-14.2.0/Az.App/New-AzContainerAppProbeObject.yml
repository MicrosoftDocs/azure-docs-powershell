### YamlMime:PowerShellCmdlet1
uid: Az.App.New-AzContainerAppProbeObject
name: New-AzContainerAppProbeObject
module: Az.App
isPreview: false
summary: |-
  Create an in-memory object for ContainerAppProbe.
description: |-
  Create an in-memory object for ContainerAppProbe.
parameters:
  cmdletParameters:
  - name: FailureThreshold
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Minimum consecutive failures for the probe to be considered failed after having succeeded.
      Defaults to 3.
      Minimum value is 1.
      Maximum value is 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HttpGetHost
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Host name to connect to, defaults to the pod IP.
      You probably want to set "Host" in httpHeaders instead.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HttpGetHttpHeader
    type: <xref href="Microsoft.Azure.PowerShell.Cmdlets.App.Models.IContainerAppProbeHttpGetHttpHeadersItem" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Custom headers to set in the request.
      HTTP allows repeated headers.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HttpGetPath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Path to access on the HTTP server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HttpGetPort
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Name or number of the port to access on the container.
      Number must be in the range 1 to 65535.
      Name must be an IANA_SVC_NAME.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HttpGetScheme
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Scheme to use for connecting to the host.
      Defaults to HTTP.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InitialDelaySecond
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Number of seconds after the container has started before liveness probes are initiated.
      Minimum value is 1.
      Maximum value is 60.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PeriodSecond
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      How often (in seconds) to perform the probe.
      Default to 10 seconds.
      Minimum value is 1.
      Maximum value is 240.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SuccessThreshold
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Minimum consecutive successes for the probe to be considered successful after having failed.
      Defaults to 1.
      Must be 1 for liveness and startup.
      Minimum value is 1.
      Maximum value is 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TcpSocketHost
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Optional: Host name to connect to, defaults to the pod IP.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TcpSocketPort
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Number or name of the port to access on the container.
      Number must be in the range 1 to 65535.
      Name must be an IANA_SVC_NAME.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TerminationGracePeriodSecond
    type: <xref href="System.Int64" data-throw-if-not-resolved="False" />
    description: |-
      Optional duration in seconds the pod needs to terminate gracefully upon probe failure.
      The grace period is the duration in seconds after the processes running in the pod are sent a termination signal and the time when the processes are forcibly halted with a kill signal.
      Set this value longer than the expected cleanup time for your process.
      If this value is nil, the pod's terminationGracePeriodSeconds will be used.
      Otherwise, this value overrides the value provided by the pod spec.
      Value must be non-negative integer.
      The value zero indicates stop immediately via the kill signal (no opportunity to shut down).
      This is an alpha field and requires enabling ProbeTerminationGracePeriod feature gate.
      Maximum value is 3600 seconds (1 hour).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TimeoutSecond
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Number of seconds after which the probe times out.
      Defaults to 1 second.
      Minimum value is 1.
      Maximum value is 240.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Type
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The type of probe.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzContainerAppProbeObject
        [-FailureThreshold <Int32>]
        [-HttpGetHost <String>]
        [-HttpGetHttpHeader <IContainerAppProbeHttpGetHttpHeadersItem[]>]
        [-HttpGetPath <String>]
        [-HttpGetPort <Int32>]
        [-HttpGetScheme <String>]
        [-InitialDelaySecond <Int32>]
        [-PeriodSecond <Int32>]
        [-SuccessThreshold <Int32>]
        [-TcpSocketHost <String>]
        [-TcpSocketPort <Int32>]
        [-TerminationGracePeriodSecond <Int64>]
        [-TimeoutSecond <Int32>]
        [-Type <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.App.Models.ContainerAppProbe" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an in-memory object for ContainerAppProbe.'
  description: |-
    ```powershell
    $probeHttpGetHttpHeader = New-AzContainerAppProbeHeaderObject -Name "Custom-Header" -Value "Awesome"

    New-AzContainerAppProbeObject -Type "Liveness" -HttpGetPath "/health" -HttpGetPort 8080 -InitialDelaySecond 3 -PeriodSecond 3 -HttpGetHttpHeader $probeHttpGetHttpHeader
    ```

    ```output
    FailureThreshold InitialDelaySecond PeriodSecond SuccessThreshold TerminationGracePeriodSecond TimeoutSecond
    ---------------- ------------------ ------------ ---------------- ---------------------------- -------------
                     3                  3
    ```

    Create an in-memory object for ContainerAppProbe.
