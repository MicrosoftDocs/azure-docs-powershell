syntaxes:
- syntax: |-
    ```Syntax
    Get-AzContainerAppAuthToken
        -ContainerAppName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: true
