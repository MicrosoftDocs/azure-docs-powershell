uid: Az.App.New-AzContainerAppIPSecurityRestrictionRuleObject
name: New-AzContainerAppIPSecurityRestrictionRuleObject
module: Az.App
isPreview: false
summary: |-
  Create an in-memory object for IPSecurityRestrictionRule.
description: |-
  Create an in-memory object for IPSecurityRestrictionRule.
parameters:
  cmdletParameters:
  - name: Action
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Allow or Deny rules to determine for incoming IP.
      Note: Rules can only consist of ALL Allow or ALL Deny.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
