- title: 'Example 1: Create an in-memory object for IPSecurityRestrictionRule.'
  description: |-
    ```powershell
    New-AzContainerAppIPSecurityRestrictionRuleObject -Action "Allow" -IPAddressRange "192.168.1.1/32" -Name "Allow work IP A subnet"
