syntaxes:
- syntax: |-
    ```Syntax
    Add-AzVmssSkuProfileVMSize
        [-VirtualMachineScaleSet] <PSVirtualMachineScaleSet>
        [-VmSize] <String>
        [[-Rank] <Int32>]
        [[-AllocationStrategy] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
