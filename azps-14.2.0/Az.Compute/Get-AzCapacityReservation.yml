syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCapacityReservation
        -ResourceGroupName <String>
        -ReservationGroupName <String>
        [-Name <String>]
        [-InstanceView]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
