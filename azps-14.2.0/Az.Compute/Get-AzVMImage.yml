### YamlMime:PowerShellCmdlet1
uid: Az.Compute.Get-AzVMImage
name: Get-AzVMImage
module: Az.Compute
isPreview: false
summary: |-
  Gets all the versions of a VMImage.
description: |-
  The **Get-AzVMImage** cmdlet gets all the versions of a VMImage.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EdgeZone
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Set the extended location name for EdgeZone. If not set, VM Image will be queried from Azure main region. Otherwise it will be queried from the specified extended location
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Expand
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The expand expression to apply on the operation. Possible values are: 'properties', and 'properties/imageDeprecationStatus'
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListVMImage
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the location of a VMImage.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Offer
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of VMImage offer.
      To obtain an image offer, use the Get-AzVMImageOffer cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OrderBy
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the order of the results returned. Formatted as an OData query.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListVMImage
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PublisherName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the publisher of a VMImage.
      To obtain an image publisher, use the Get-AzVMImagePublisher cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Skus
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a VMImage SKU.
      To obtain an SKU, use the Get-AzVMImageSku cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Top
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.Int32" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies the maximum number of virtual machine images returned.
    defaultValue: None
