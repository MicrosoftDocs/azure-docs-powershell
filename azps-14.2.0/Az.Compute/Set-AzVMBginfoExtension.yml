uid: Az.Compute.Set-AzVMBginfoExtension
name: Set-AzVMBginfoExtension
module: Az.Compute
isPreview: false
summary: |-
  Adds the BGInfo extension to a virtual machine.
description: |-
  The **Set-AzVMBGInfoExtension** cmdlet adds the BGInfo extension to a virtual machine.
