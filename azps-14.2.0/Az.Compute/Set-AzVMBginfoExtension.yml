syntaxes:
- syntax: |-
    ```Syntax
    Set-AzVMBginfoExtension
        [-ResourceGroupName] <String>
        [-VMName] <String>
        -Name <String>
        [-TypeHandlerVersion <String>]
        [-Location <String>]
        [-DisableAutoUpgradeMinorVersion]
        [-ForceRerun <String>]
        [-NoWait]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
