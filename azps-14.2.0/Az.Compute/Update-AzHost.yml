uid: Az.Compute.Update-AzHost
name: Update-AzHost
module: Az.Compute
isPreview: false
summary: |-
  Updates the Dedicated Host.
description: |-
  This cmdlet can be used to update the Dedicated Host Sku, LicenseType and AutoReplaceOnFailure property.
