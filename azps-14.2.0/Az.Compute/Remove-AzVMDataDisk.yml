syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzVMDataDisk
        [-VM] <PSVirtualMachine>
        [[-DataDiskNames] <String[]>]
        [-ForceDetach]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
