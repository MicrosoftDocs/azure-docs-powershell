syntaxes:
- syntax: |-
    ```Syntax
    Get-AzImage
        [[-ResourceGroupName] <String>]
        [[-ImageName] <String>]
        [[-Expand] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
