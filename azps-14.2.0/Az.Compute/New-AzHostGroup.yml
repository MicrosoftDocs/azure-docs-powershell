syntaxes:
- syntax: |-
    ```Syntax
    New-AzHostGroup
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        -PlatformFaultDomain <Int32>
        [-Zone <String[]>]
        [-SupportAutomaticPlacement <Boolean>]
        [-Tag <Hashtable>]
        [-EnableUltraSSD]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
