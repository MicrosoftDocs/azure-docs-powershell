uid: Az.Compute.Set-AzVMChefExtension
name: Set-AzVMChefExtension
module: Az.Compute
isPreview: false
summary: |-
  Adds a Chef extension to a virtual machine.
description: |-
  The **Set-AzVMChefExtension** cmdlet adds the Chef extension to the virtual machine.
