### YamlMime:PowerShellCmdlet1
uid: Az.Compute.Test-AzVMAEMExtension
name: Test-AzVMAEMExtension
module: Az.Compute
isPreview: false
summary: |-
  Checks the configuration of the AEM extension.
description: |-
  The **Test-AzVMAEMExtension** cmdlet checks the configuration of the Azure Enhanced Monitoring (AEM) extension.
  The AEM extension collects the performance data.
  This cmdlet checks whether performance data is available.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OSType
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of the operating system of the operating system disk.
      If the operating system disk does not have a type, you must specify this parameter.
      The acceptable values for this parameter are: Windows and Linux.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the resource group of the virtual machine that this cmdlet checks.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SkipStorageCheck
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet skips the check of storage configuration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VMName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a virtual machine.
      This cmdlet tests the AEM extension for the virtual machine that this parameter specifies.
    aliases:
    - ResourceName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WaitTimeInMinutes
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a time-out period, in minutes, for the storage configuration check.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Test-AzVMAEMExtension
        [-ResourceGroupName] <String>
        [-VMName] <String>
        [[-OSType] <String>]
        [[-WaitTimeInMinutes] <Int32>]
        [-SkipStorageCheck]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Extension.AEM.AEMTestResult" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Check the configuration of the AEM extension'
  description: |-
    ```powershell
    Test-AzVMAEMExtension -ResourceGroupName "ResourceGroup11" -VMName "contoso-server"
    ```

    This command checks the configuration of the AEM extension for the virtual machine named contoso-server.
