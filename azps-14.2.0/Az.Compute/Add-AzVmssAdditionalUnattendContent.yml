syntaxes:
- syntax: |-
    ```Syntax
    Add-AzVmssAdditionalUnattendContent
        [-VirtualMachineScaleSet] <PSVirtualMachineScaleSet>
        [[-PassName] <PassNames>]
        [[-ComponentName] <ComponentNames>]
        [[-SettingName] <SettingNames>]
        [[-Content] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
