syntaxes:
- syntax: |-
    ```Syntax
    New-AzSshKey
        -ResourceGroupName <String>
        -Name <String>
        [-PublicKey <String>]
        [-SshKeyType <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
