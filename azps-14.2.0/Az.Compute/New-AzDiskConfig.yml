### YamlMime:PowerShellCmdlet1
uid: Az.Compute.New-AzDiskConfig
name: New-AzDiskConfig
module: Az.Compute
isPreview: false
summary: |-
  Creates a configurable disk object.
description: |-
  The **New-AzDiskConfig** cmdlet creates a configurable disk object.
