    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzVMAEMExtension
        [-ResourceGroupName] <String>
        [-VMName] <String>
        [[-Name] <String>]
        [[-OSType] <String>]
        [-NoWait]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Compute.Models.PSAzureOperationResponse" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove the AEM extension'
  description: |-
    ```powershell
    Remove-AzVMAEMExtension -ResourceGroupName "ResourceGroup11" -VMName "contoso-server"
    ```

    This command removes the AEM extension for the virtual machine named contoso-server.
