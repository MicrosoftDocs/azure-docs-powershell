syntaxes:
- syntax: |-
    ```Syntax
    New-AzAvailabilitySet
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        [[-PlatformUpdateDomainCount] <Int32>]
        [[-PlatformFaultDomainCount] <Int32>]
        [[-Sku] <String>]
        [-ProximityPlacementGroupId <String>]
        [-Tag <Hashtable>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
