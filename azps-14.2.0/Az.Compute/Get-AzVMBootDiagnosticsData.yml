syntaxes:
- syntax: |-
    ```Syntax
    Get-AzVMBootDiagnosticsData
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-LocalPath] <String>
        [-Windows]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: WindowsParamSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzVMBootDiagnosticsData
        [-ResourceGroupName] <String>
        [-Name] <String>
        [[-LocalPath] <String>]
        [-Linux]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: LinuxParamSet
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
