uid: Az.Compute.Add-AzVmssExtension
name: Add-AzVmssExtension
module: Az.Compute
isPreview: false
summary: |-
  Adds an extension to the VMSS.
description: |-
  The **Add-AzVmssExtension** cmdlet adds an extension to the Virtual Machine Scale Set (VMSS).
