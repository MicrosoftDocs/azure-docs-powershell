syntaxes:
- syntax: |-
    ```Syntax
    Set-AzSnapshotUpdateDiskEncryptionKey
        [-SnapshotUpdate] <PSSnapshotUpdate>
        [[-SecretUrl] <String>]
        [[-SourceVaultId] <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
