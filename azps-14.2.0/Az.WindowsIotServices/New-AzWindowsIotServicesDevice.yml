syntaxes:
- syntax: |-
    ```Syntax
    New-AzWindowsIotServicesDevice
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-AdminDomainName <String>]
        [-BillingDomainName <String>]
        [-Etag <String>]
        [-Location <String>]
        [-Note <String>]
        [-Quantity <Int64>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
