uid: Az.Search.Remove-AzSearchPrivateEndpointConnection
name: Remove-AzSearchPrivateEndpointConnection
module: Az.Search
isPreview: false
summary: |-
  Remove the private endpoint connection from the Azure Cognitive Search service.
description: |-
