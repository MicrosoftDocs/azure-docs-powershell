syntaxes:
- syntax: |-
    ```Syntax
    New-AzDnsResolverPolicyDnsSecurityRule
        -DnsResolverPolicyName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-IfNoneMatch <String>]
        -DnsResolverDomainList <ISubResource[]>
        -Location <String>
        -Priority <Int32>
        [-ActionBlockResponseCode <BlockResponseCode>]
        [-ActionType <ActionType>]
        [-DnsSecurityRuleState <DnsSecurityRuleState>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
