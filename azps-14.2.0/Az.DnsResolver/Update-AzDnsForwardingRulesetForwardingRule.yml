syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDnsForwardingRulesetForwardingRule
        -DnsForwardingRulesetName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-IfMatch <String>]
        [-ForwardingRuleState <ForwardingRuleState>]
        [-Metadata <Hashtable>]
        [-TargetDnsServer <ITargetDnsServer[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDnsForwardingRulesetForwardingRule
        -InputObject <IDnsResolverIdentity>
        [-IfMatch <String>]
        [-ForwardingRuleState <ForwardingRuleState>]
        [-Metadata <Hashtable>]
        [-TargetDnsServer <ITargetDnsServer[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
