examples:
- title: 'Example 1: Unlink database'
  description: |-
    ```powershell
    Invoke-AzRedisEnterpriseCacheForceDatabaseUnlink -ResourceGroupName "MyGroup" -ClusterName "MyCache3" -Id @("databaseId")
    ```

