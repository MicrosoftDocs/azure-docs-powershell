syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzRedisEnterpriseCacheAccessPolicyAssignment
        -ClusterName <String>
        -DatabaseName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzRedisEnterpriseCacheAccessPolicyAssignment
        -InputObject <IRedisEnterpriseCacheIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
