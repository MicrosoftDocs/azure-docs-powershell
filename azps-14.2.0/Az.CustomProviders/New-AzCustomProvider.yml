syntaxes:
- syntax: |-
    ```Syntax
    New-AzCustomProvider
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        [-SubscriptionId <String>]
        [-Action <ICustomRpActionRouteDefinition[]>]
        [-ResourceType <ICustomRpResourceTypeRouteDefinition[]>]
        [-Tag <Hashtable>]
        [-Validation <ICustomRpValidations[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzCustomProvider
        -Name <String>
        -ResourceGroupName <String>
        -JsonFilePath <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaJsonFilePath
  isDefault: false
- syntax: |-
