examples:
- title: 'Example 1: Update tags for a Confidential Ledger'
  description: |-
    ```powershell
    Update-AzConfidentialLedger `
      -Name test-ledger `
      -ResourceGroupName rg-000 `
      -SubscriptionId 00000000-0000-0000-0000-000000000000 `
      -AadBasedSecurityPrincipal `
          @{
              LedgerRoleName="Administrator";
              PrincipalId="00001111-aaaa-2222-bbbb-3333cccc4444";
              TenantId="00001111-aaaa-2222-bbbb-3333cccc4444"
          } `
      -CertBasedSecurityPrincipal `
          @{
              Cert="-----BEGIN CERTIFICATE-----********************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************************-----END CERTIFICATE-----";
              LedgerRoleName="Reader"
          } `
      -LedgerType Public `
      -Location eastus `
      -Tag `
          @{
              Location="additional properties 0"
              NewTag="New tag"
          }
    ```

    ```output
    Location Name
    eastus   test-ledger
    ```

    Updates metadata for an existing Confidential Ledger.
