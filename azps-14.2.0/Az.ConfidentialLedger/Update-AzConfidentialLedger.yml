syntaxes:
- syntax: |-
    ```Syntax
    Update-AzConfidentialLedger
        -Name <String>
        -ResourceGroupName <String>
        -Location <String>
        [-SubscriptionId <String>]
        [-AadBasedSecurityPrincipal <IAadBasedSecurityPrincipal[]>]
        [-CertBasedSecurityPrincipal <ICertBasedSecurityPrincipal[]>]
        [-LedgerType <LedgerType>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzConfidentialLedger
        -InputObject <IConfidentialLedgerIdentity>
        -Location <String>
        [-AadBasedSecurityPrincipal <IAadBasedSecurityPrincipal[]>]
        [-CertBasedSecurityPrincipal <ICertBasedSecurityPrincipal[]>]
        [-LedgerType <LedgerType>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
