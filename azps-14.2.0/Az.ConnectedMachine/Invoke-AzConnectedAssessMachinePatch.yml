    Invoke-AzConnectedAssessMachinePatch
        -InputObject <IConnectedMachineIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
