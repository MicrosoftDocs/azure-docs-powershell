syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzConnectedAssessMachinePatch
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Assess
  isDefault: true
- syntax: |-
