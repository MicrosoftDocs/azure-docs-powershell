syntaxes:
- syntax: |-
    ```Syntax
    Update-AzAppConfigurationStore
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DisableLocalAuth]
        [-EnablePurgeProtection]
        [-EnableSystemAssignedIdentity <Boolean>]
        [-EncryptionKeyIdentifier <String>]
        [-KeyVaultIdentityClientId <String>]
        [-PublicNetworkAccess <String>]
        [-Sku <String>]
        [-SoftDeleteRetentionInDay <Int32>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzAppConfigurationStore
        -InputObject <IAppConfigurationIdentity>
        [-DisableLocalAuth]
        [-EnablePurgeProtection]
        [-EnableSystemAssignedIdentity <Boolean>]
        [-EncryptionKeyIdentifier <String>]
        [-KeyVaultIdentityClientId <String>]
        [-PublicNetworkAccess <String>]
        [-Sku <String>]
        [-SoftDeleteRetentionInDay <Int32>]
        [-Tag <Hashtable>]
        [-UserAssignedIdentity <String[]>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
