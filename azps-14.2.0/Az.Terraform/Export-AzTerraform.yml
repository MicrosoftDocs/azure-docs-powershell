syntaxes:
- syntax: |-
    ```Syntax
    Export-AzTerraform
        -ExportParameter <IBaseExportModel>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
