syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBillingInvoice
        [-MaxCount <Int32>]
        [-GenerateDownloadUrl]
        [-DefaultProfile <IAzureContextContainer>]
        [-BillingAccountName]
        [-BillingProfileName]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzBillingInvoice
        [-Latest]
        [-DefaultProfile <IAzureContextContainer>]
        [-BillingAccountName]
        [-BillingProfileName]
        [<CommonParameters>]
    ```
  parameterSetName: Latest
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzBillingInvoice
        -Name <System.Collections.Generic.List`1[System.String]>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Single
  isDefault: false
