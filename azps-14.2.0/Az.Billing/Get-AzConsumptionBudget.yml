    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzConsumptionBudget
        [-DefaultProfile <IAzureContextContainer>]
        [-ResourceGroupName <String>]
        [-Name <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Consumption.Models.PSBudget" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a list of budgets at subscription level'
  description: |-
    ```powershell
    Get-AzConsumptionBudget
    ```

    ```output
    Amount:  60
    Category:  Cost
    CurrentSpend:  null
    Id:  subscriptions/1caaa5a3-2b66-438e-8ab4-bce37d518c5d/providers/Microsoft.Consumption/budgets/PSBudget
    Name:  PSBudget
    TimeGrain:  Monthly
    TimePeriod:  EndDate:  11/1/2018 12:00:00 AM
                 StartDate:  6/1/2018 12:00:00 AM
    Type:  Microsoft.Consumption/budgets
    ```
- title: 'Example 2: Get a list of budgets at resource group level'
  description: |-
    ```powershell
    Get-AzConsumptionBudget -ResourceGroupName RGBudgets
    ```

    ```output
    Amount:  60
    Category:  Cost
    CurrentSpend:  null
    Id:  subscriptions/1caaa5a3-2b66-438e-8ab4-bce37d518c5d/resourceGroups/RGBudgets/providers/Microsoft.Consumption/budgets/PSBudgetRG
    Name:  PSBudgetRG
    TimeGrain:  Monthly
    TimePeriod:  EndDate:  11/1/2018 12:00:00 AM
                 StartDate:  6/1/2018 12:00:00 AM
    Type:  Microsoft.Consumption/budgets
    ```
- title: 'Example 3: Get a budget with the budget name at subscription level'
  description: |-
    ```powershell
    Get-AzConsumptionBudget -Name PSBudget
    ```

    ```output
    Amount:  60
    Category:  Cost
    CurrentSpend:  null
    Id:  subscriptions/1caaa5a3-2b66-438e-8ab4-bce37d518c5d/providers/Microsoft.Consumption/budgets/PSBudget
    Name:  PSBudget
    TimeGrain:  Monthly
    TimePeriod:  EndDate:  11/1/2018 12:00:00 AM
                 StartDate:  6/1/2018 12:00:00 AM
    Type:  Microsoft.Consumption/budgets
    ```
- title: 'Example 4: Get a budget with the budget name at resource group level'
  description: |-
    ```powershell
    Get-AzConsumptionBudget -ResourceGroupName RGBudgets -Name PSBudgetRG
    ```

    ```output
    Amount:  60
    Category:  Cost
    CurrentSpend:  null
    Id:  subscriptions/1caaa5a3-2b66-438e-8ab4-bce37d518c5d/resourceGroups/RGBudgets/providers/Microsoft.Consumption/budgets/PSBudgetRG
    Name:  PSBudgetRG
    TimeGrain:  Monthly
    TimePeriod:  EndDate:  11/1/2018 12:00:00 AM
                 StartDate:  6/1/2018 12:00:00 AM
    Type:  Microsoft.Consumption/budgets
    ```
