### YamlMime:PowerShellCmdlet1
uid: Az.Billing.Get-AzConsumptionReservationSummary
name: Get-AzConsumptionReservationSummary
module: Az.Billing
isPreview: false
summary: |-
  Get reservation summaries for daily or monthly grain.
description: |-
  The **Get-AzConsumptionReservationSummary** cmdlet gets reservation summaries for daily or monthly grain.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EndDate
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.DateTime" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      The end data (YYYY-MM-DD in UTC) of the reservation summary, required only for daily grain.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Grain
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The time grain of the reservation summary, can be daily or monthly.
    acceptedValues:
    - daily
    - monthly
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReservationId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The identifier of a reservation within a reservation order.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReservationOrderId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The identifier of a reservation purchase.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StartDate
    type: <xref href="System.Nullable`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.DateTime" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      The start data (YYYY-MM-DD in UTC) of the reservation summary, required only for daily grain.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzConsumptionReservationSummary
        -Grain <String>
        -ReservationOrderId <String>
        [-ReservationId <String>]
        [-StartDate <DateTime>]
        [-EndDate <DateTime>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Consumption.Models.PSReservationSummary" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get reservation summaries with reservation order Id for monthly grain'
  description: |-
    ```powershell
    Get-AzConsumptionReservationSummary -Grain monthly -ReservationOrderId ca69259e-bd4f-45c3-bf28-3f353f9cce9b
    ```

    ```output
    AvgUtilizationPercentage:  100
    Id:  providers/Microsoft.Capacity/reservationOrders/ca69259e-bd4f-45c3-bf28-3f353f9cce9b/reservations/f37f4b70-52ba-4344-a8bd-28abfd21d640/providers/Microsoft.Consumption/reservationSummaries/20170901
    MaxUtilizationPercentage:  100
    MinUtilizationPercentage:  100
