examples:
- title: 'Example 1: Create a cost budget with a budget name at subscription level'
  description: |-
    ```powershell
    New-AzConsumptionBudget -Amount 60 -Name PSBudget -Category Cost -StartDate 2018-06-01 -EndDate 2018-11-01 -TimeGrain Monthly
    ```

    ```output
    Amount:  60
    Category:  Cost
    CurrentSpend:  null
    Id:  subscriptions/1caaa5a3-2b66-438e-8ab4-bce37d518c5d/providers/Microsoft.Consumption/budgets/PSBudget
    Name:  PSBudget
    TimeGrain:  Monthly
    TimePeriod:  EndDate:  11/1/2018 12:00:00 AM
                 StartDate:  6/1/2018 12:00:00 AM
    Type:  Microsoft.Consumption/budgets
    ```
- title: 'Example 2: Create a cost budget with a budget name at resource group level'
  description: |-
    ```powershell
    New-AzConsumptionBudget -ResourceGroupName RGBudgets -Amount 60 -Name PSBudgetRG -Category Cost -StartDate 2018-06-01 -EndDate 2018-11-01 -TimeGrain Monthly
    ```

    ```output
    Amount:  60
    Category:  Cost
    CurrentSpend:  null
    Id:  subscriptions/1caaa5a3-2b66-438e-8ab4-bce37d518c5d/resourceGroups/RGBudgets/providers/Microsoft.Consumption/budgets/PSBudgetRG
    Name:  PSBudgetRG
    TimeGrain:  Monthly
    TimePeriod:  EndDate:  11/1/2018 12:00:00 AM
                 StartDate:  6/1/2018 12:00:00 AM
    Type:  Microsoft.Consumption/budgets
    ```
