### YamlMime:PowerShellCmdlet1
uid: Az.Billing.New-AzConsumptionBudget
name: New-AzConsumptionBudget
module: Az.Billing
isPreview: false
summary: |-
  Create a budget in either a subscription or a resource group.
description: |-
  The New-AzConsumptionBudget cmdlet creates a budget in either a subscription or a resource group.
notes: |-
  - Currently, PowerShell SDK for Consumption is only available to Enterprise Agreement customers.
  - PowerShell SDK for Consumption is using an older version of Budgets API and few backwards non-compatible items like listing Budgets with filters will not work as expected.
