syntaxes:
- syntax: |-
    ```Syntax
    New-AzConsumptionBudget
        -Name <String>
        -Amount <Decimal>
        -Category <String>
        -TimeGrain <String>
        -StartDate <DateTime>
        [-DefaultProfile <IAzureContextContainer>]
        [-EndDate <DateTime>]
        [-ResourceGroupName <String>]
        [-MeterFilter <String[]>]
        [-ResourceFilter <String[]>]
        [-ResourceGroupFilter <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Subscription
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzConsumptionBudget
        -Name <String>
        -Amount <Decimal>
        -Category <String>
        -TimeGrain <String>
        -StartDate <DateTime>
        -NotificationKey <String>
        -NotificationThreshold <Decimal>
        -ContactEmail <String[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-EndDate <DateTime>]
        [-ResourceGroupName <String>]
        [-MeterFilter <String[]>]
        [-ResourceFilter <String[]>]
        [-ResourceGroupFilter <String[]>]
        [-NotificationEnabled]
        [-ContactGroup <String[]>]
        [-ContactRole <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Notification
  isDefault: false
