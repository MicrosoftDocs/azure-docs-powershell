syntaxes:
- syntax: |-
    ```Syntax
    Get-AzConsumptionMarketplace
        [-BillingPeriodName <String>]
        [-EndDate <DateTime>]
        [-InstanceId <String>]
        [-InstanceName <String>]
        [-ResourceGroup <String>]
        [-StartDate <DateTime>]
        [-Top <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
