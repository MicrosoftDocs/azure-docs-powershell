### YamlMime:PowerShellCmdlet1
uid: Az.Billing.Get-AzBillingProfile
name: Get-AzBillingProfile
module: Az.Billing
isPreview: false
summary: |-
  Get billing profiles.
description: |-
  The **Get-AzBillingProfile** cmdlet gets billing profiles under the specified billing account.
parameters:
  cmdletParameters:
  - name: BillingAccountName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Name of the specific billing account.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExpandInvoiceSection
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Include the invoices sections under billing profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.Collections.Generic.List`1" data-throw-if-not-resolved="False" /><span>[</span><xref href="System.String" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Name of a specific billing profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Single
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzBillingProfile
        -BillingAccountName <String>
        -BillingProfileName <String>
        [-ExpandInvoiceSection]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzBillingProfile
        -BillingAccountName <String>
        -BillingProfileName <String>
        -Name <System.Collections.Generic.List`1[System.String]>
        [-ExpandInvoiceSection]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Single
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Billing.Models.PSBillingProfile" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzBillingProfile -BillingAccountName 00000000-0000-0000-0000-000000000000
    ```

    Get all billing profiles under the specified billing account.
- title: Example 2
  description: |-
    ```powershell
    Get-AzBillingProfile -BillingAccountName 00000000-0000-0000-0000-000000000000 -Name AAAA-0A00-AAA-ZZZ
    ```

    Get the billing profile with the specified name.
- title: Example 3
  description: |-
    ```powershell
    Get-AzBillingProfile -BillingAccountName 00000000-0000-0000-0000-000000000000 -ExpandInvoiceSection
    ```

    Get all billing profiles under specified billing account, and include the invoice sections in the result.
- title: Example 4
  description: |-
    ```powershell
    Get-AzBillingProfile -BillingAccountName 00000000-0000-0000-0000-000000000000 -ExpandInvoiceSection -Name <System.Collections.Generic.List`1[System.String]>
    ```

    Get the billing profile with the specified name, and include the invoice sections in the result.
