syntaxes:
- syntax: |-
    ```Syntax
    New-AzIoTDeviceProvisioningService
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location <String>]
        [-AllocationPolicy <String>]
        [-SkuName <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
