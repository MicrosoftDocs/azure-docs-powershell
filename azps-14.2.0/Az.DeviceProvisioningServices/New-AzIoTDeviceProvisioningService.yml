examples:
- title: Example 1
  description: |-
    ```powershell
    $tags = @{}
    $tags.Add('key1','value1')
    New-AzIoTDeviceProvisioningService -ResourceGroupName "myresourcegroup" -Name "myiotdps" -Tag $tags
    ```

    ```output
    ResourceGroupName			: myresourcegroup
    Name						: myiotdps
    Location					: westus
    Type						: Microsoft.Devices/provisioningServices
    ServiceOperationsHostName	: myiotdps.azure-devices-provisioning.net
    IotHubs						: 0
    State						: Active
    AllocationPolicy			: Hashed
    Tags						: {[key1, value1]}
    SkuName						: S1
    SkuTier						: Standard
    Etag						: AAAAAAAT52k=
    ```

    Create an Azure IoT Hub device provisioning service with the standard pricing tier S1 and tags, in the region of the resource group.
- title: Example 2
  description: |-
    ```powershell
    New-AzIoTDeviceProvisioningService -ResourceGroupName "myresourcegroup" -Name "myiotdps" -Location "eastus"
    ```

    ```output
    ResourceGroupName			: myresourcegroup
    Name						: myiotdps
    Location					: eastus
    Type						: Microsoft.Devices/provisioningServices
    ServiceOperationsHostName	: myiotdps.azure-devices-provisioning.net
    IotHubs						: 0
    State						: Active
    AllocationPolicy			: Hashed
    Tags						: {}
    SkuName						: S1
    SkuTier						: Standard
    Etag						: AAAAAAAPoOk=
    ```

    Create an Azure IoT Hub device provisioning service with the standard pricing tier S1, in the 'eastus' region.
