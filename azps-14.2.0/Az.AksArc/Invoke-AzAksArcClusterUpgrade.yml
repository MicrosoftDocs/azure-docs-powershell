syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzAksArcClusterUpgrade
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzAksArcClusterUpgrade
        -ClusterName <String>
        -ResourceGroupName <String>
        -KubernetesVersion <String>
        [-SubscriptionId <String>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
