syntaxes:
- syntax: |-
    ```Syntax
    Set-AzPurviewDefaultAccount
        -AccountName <String>
        -ResourceGroupName <String>
        -ScopeTenantId <String>
        [-Scope <String>]
        [-ScopeType <String>]
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzPurviewDefaultAccount
        -JsonFilePath <String>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SetViaJsonFilePath
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzPurviewDefaultAccount
        -JsonString <String>
        [-DefaultProfile <PSObject>]
