syntaxes:
- syntax: |-
    ```Syntax
    Update-AzPurviewTrigger
        -Endpoint <String>
        -DataSourceName <String>
        -ScanName <String>
        [-IncrementalScanStartTime <DateTime>]
        [-Interval <Int32>]
        [-RecurrenceEndTime <DateTime>]
        [-RecurrenceFrequency <String>]
        [-RecurrenceInterval <String>]
        [-RecurrenceScheduleAdditionalProperty <Hashtable>]
        [-RecurrenceScheduleHour <Int32[]>]
        [-RecurrenceScheduleMinute <Int32[]>]
        [-RecurrenceScheduleMonthDay <Int32[]>]
        [-RecurrenceScheduleMonthlyOccurrence <IRecurrenceScheduleOccurrence[]>]
        [-RecurrenceScheduleWeekDay <String[]>]
        [-RecurrenceStartTime <DateTime>]
        [-RecurrenceTimeZone <String>]
        [-ScanLevel <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
