syntaxes:
- syntax: |-
    ```Syntax
    Update-AzConnectedKubernetes
        -ClusterName <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AzureHybridBenefit <String>]
        [-AcceptEULA]
        [-Distribution <String>]
        [-DistributionVersion <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzConnectedKubernetes
        -ClusterName <String>
        -ResourceGroupName <String>
        -JsonFilePath <String>
        [-SubscriptionId <String>]
        [-AcceptEULA]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
