syntaxes:
- syntax: |-
    ```Syntax
    New-AzBlueprintArtifact
        -Name <String>
        -Type <PSArtifactKind>
        -Blueprint <PSBlueprintBase>
        -TemplateParameterFile <String>
        -TemplateFile <String>
        [-Description <String>]
        [-DependsOn <System.Collections.Generic.List`1[System.String]>]
        [-ResourceGroupName <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateTemplateArtifact
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzBlueprintArtifact
        -Name <String>
        -Blueprint <PSBlueprintBase>
        -ArtifactFile <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateArtifactByInputFile
  isDefault: false
- syntax: |-
