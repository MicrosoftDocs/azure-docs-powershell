syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzBlueprintAssignment
        [-Name] <String>
        [[-SubscriptionId] <String>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
