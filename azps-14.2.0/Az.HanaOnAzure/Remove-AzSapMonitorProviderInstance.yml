syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzSapMonitorProviderInstance
        -Name <String>
        -ResourceGroupName <String>
        -SapMonitorName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Delete
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzSapMonitorProviderInstance
        -Name <String>
        -SapMonitorInputObject <IHanaOnAzureIdentity>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: DeleteViaIdentitySapMonitor
  isDefault: false
