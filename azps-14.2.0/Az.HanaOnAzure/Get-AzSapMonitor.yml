syntaxes:
- syntax: |-
    ```Syntax
    Get-AzSapMonitor
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
