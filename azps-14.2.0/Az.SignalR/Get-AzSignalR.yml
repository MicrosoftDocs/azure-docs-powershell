examples:
- title: 'Example 1: Get all SignalR services in the subscription'
  description: |-
    ```powershell
    Get-AzSignalR
    ```

    ```output
    HostName                                           Location       ServerPort PublicPort ProvisioningState Version
    --------                                           --------       ---------- ---------- ----------------- -------
    mysignalr1.service.signalr.net                     eastus         5002       5001       Succeeded         1.0
    mysignalr2.service.signalr.net                     eastus         5002       5001       Succeeded         1.0
    mysignalr3.service.signalr.net                     eastus         5002       5001       Creating          1.0
    ```
- title: 'Example 2: Get all SignalR services in a resource group'
  description: |-
    ```powershell
    Get-AzSignalR -ResourceGroupName myResourceGroup
    ```

    ```output
    HostName                                           Location       ServerPort PublicPort ProvisioningState Version
    --------                                           --------       ---------- ---------- ----------------- -------
    mysignalr1.service.signalr.net                     eastus         5002       5001       Succeeded         1.0
    mysignalr2.service.signalr.net                     eastus         5002       5001       Succeeded         1.0
    ```
- title: 'Example 3: Get a specific SignalR service'
  description: |-
    ```powershell
    Get-AzSignalR -ResourceGroupName myResourceGroup -Name mysignalr1
    ```

    ```output
    HostName                                           Location       ServerPort PublicPort ProvisioningState Version
    --------                                           --------       ---------- ---------- ----------------- -------
    mysignalr1.service.signalr.net                     eastus         5002       5001       Succeeded         1.0
    ```
- title: 'Example 4: Get a specific SignalR service from the default resource group'
  description: |-
    ```powershell
    Get-AzSignalR -Name mysignalr2
    ```

    ```output
    HostName                                           Location       ServerPort PublicPort ProvisioningState Version
    --------                                           --------       ---------- ---------- ----------------- -------
    mysignalr2.service.signalr.net                     eastus         5002       5001       Succeeded         1.0
    ```

    The default resource group can be set by \`Set-AzDefault -ResourceGroupName myResourceGroup\`.
