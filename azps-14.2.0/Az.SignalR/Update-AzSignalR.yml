syntaxes:
- syntax: |-
    ```Syntax
    Update-AzSignalR
        [-Name] <String>
        [-ResourceGroupName <String>]
        [-Sku <String>]
        [-UnitCount <Int32>]
        [-Tag <System.Collections.Generic.IDictionary`2[System.String,System.String]>]
        [-ServiceMode <String>]
        [-AllowedOrigin <String[]>]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceGroupParameterSet
  isDefault: true
- syntax: |-
