syntaxes:
- syntax: |-
    ```Syntax
    New-AzKubernetesRuntimeStorageClass
        -ArcConnectedClusterId <String>
        -Name <String>
        [-AccessMode <String[]>]
        [-AllowVolumeExpansion <String>]
        [-DataResilience <String>]
        [-FailoverSpeed <String>]
        [-Limitation <String[]>]
        [-MountOption <String[]>]
        [-Performance <String>]
        [-Priority <Int64>]
        [-Provisioner <String>]
        [-TypeProperty <IStorageClassTypeProperties>]
        [-VolumeBindingMode <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzKubernetesRuntimeStorageClass
        -ArcConnectedClusterId <String>
        -Name <String>
        -JsonFilePath <String>
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CreateViaJsonFilePath
  isDefault: false
- syntax: |-
