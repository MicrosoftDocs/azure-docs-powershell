syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementCustomHostnameConfiguration
        -Hostname <String>
        -HostnameType <PsApiManagementHostnameType>
        -HostNameCertificateInformation <PsApiManagementCertificateInformation>
        [-DefaultSslBinding]
        [-NegotiateClientCertificate]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: NoChangeCertificate
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzApiManagementCustomHostnameConfiguration
        -Hostname <String>
        -HostnameType <PsApiManagementHostnameType>
        -PfxPath <String>
        [-PfxPassword <SecureString>]
        [-DefaultSslBinding]
        [-NegotiateClientCertificate]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SslCertificateFromFile
  isDefault: false
- syntax: |-
