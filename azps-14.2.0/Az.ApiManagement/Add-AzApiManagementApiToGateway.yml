syntaxes:
- syntax: |-
    ```Syntax
    Add-AzApiManagementApiToGateway
        -Context <PsApiManagementContext>
        -GatewayId <String>
        -ApiId <String>
        [-ProvisioningState <PsApiManagementGatewayApiProvisioningState>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
