name: Remove-AzApiManagementApiFromProduct
module: Az.ApiManagement
isPreview: false
summary: |-
  Removes an API from a product.
description: |-
  The **Remove-AzApiManagementApiFromProduct** cmdlet removes an Azure API Management API from a product.
