syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzApiManagementApiFromProduct
        -Context <PsApiManagementContext>
        -ProductId <String>
        -ApiId <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
