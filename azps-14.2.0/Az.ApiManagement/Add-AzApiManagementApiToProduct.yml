syntaxes:
- syntax: |-
    ```Syntax
    Add-AzApiManagementApiToProduct
        -Context <PsApiManagementContext>
        -ProductId <String>
        -ApiId <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
