uid: Az.ApiManagement.Get-AzApiManagementUser
name: Get-AzApiManagementUser
module: Az.ApiManagement
isPreview: false
summary: |-
  Gets a user or users.
description: |-
  The **Get-AzApiManagementUser** cmdlet gets a specified user, or all users, if no user is specified.
