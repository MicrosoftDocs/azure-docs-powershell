syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementApiSchema
        -Context <PsApiManagementContext>
        -ApiId <String>
        -SchemaDocumentContentType <String>
        -SchemaDocument <String>
        [-SchemaId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SchemaDocumentInline
  isDefault: true
- syntax: |-
