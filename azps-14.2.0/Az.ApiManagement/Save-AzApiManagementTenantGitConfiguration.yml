syntaxes:
- syntax: |-
    ```Syntax
    Save-AzApiManagementTenantGitConfiguration
        -Context <PsApiManagementContext>
        -Branch <String>
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
