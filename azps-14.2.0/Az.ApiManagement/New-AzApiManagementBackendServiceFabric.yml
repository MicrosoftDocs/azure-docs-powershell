    New-AzApiManagementBackendServiceFabric
        -ManagementEndpoint <String[]>
        [-ClientCertificateThumbprint <String>]
        [-ClientCertificateId <String>]
        [-MaxPartitionResolutionRetry <Int32>]
        [-ServerX509Name <Hashtable>]
