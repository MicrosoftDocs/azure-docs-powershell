syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzApiManagementProductFromGroup
        -Context <PsApiManagementContext>
        -GroupId <String>
        -ProductId <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
