syntaxes:
- syntax: |-
    ```Syntax
    Get-AzApiManagementApiSchema
        -Context <PsApiManagementContext>
        -ApiId <String>
        [-SchemaId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ContextParameterSet
  isDefault: true
