syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementUser
        -Context <PsApiManagementContext>
        [-UserId <String>]
        -FirstName <String>
        -LastName <String>
        -Email <String>
        -Password <SecureString>
        [-State <PsApiManagementUserState>]
        [-Note <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
