uid: Az.ApiManagement.New-AzApiManagementAuthorizationServer
name: New-AzApiManagementAuthorizationServer
module: Az.ApiManagement
isPreview: false
summary: |-
  Creates an authorization server.
description: |-
  The **New-AzApiManagementAuthorizationServer** cmdlet creates an Azure API Management authorization server.
