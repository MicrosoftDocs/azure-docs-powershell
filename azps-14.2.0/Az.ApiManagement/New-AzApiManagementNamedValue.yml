syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementNamedValue
        -Context <PsApiManagementContext>
        [-NamedValueId <String>]
        [-Name <String>]
        [-Value <String>]
        [-Secret]
        [-Tag <String[]>]
        [-KeyVault <PsApiManagementKeyVaultEntity>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
