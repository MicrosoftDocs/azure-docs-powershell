### YamlMime:PowerShellCmdlet1
uid: Az.ApiManagement.Get-AzApiManagementDiagnostic
name: Get-AzApiManagementDiagnostic
module: Az.ApiManagement
isPreview: false
summary: |-
  Get details of the Diagnostic configured at the service level or the Api Level. Diagnostics are used to log requests/responses from Api Management gateway.
description: |-
  The **Get-AzApiManagementDiagnostic** gets details of the diagnostics configured in the Api management service at a given scope.
parameters:
  cmdletParameters:
  - name: ApiId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Identifier of existing API.
      If specified will return API-scope diagnostic.
      This parameters is required.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ContextParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementContext" data-throw-if-not-resolved="False" />
    description: |-
      Instance of PsApiManagementContext.
      This parameter is required.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ContextParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DiagnosticId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Identifier of existing diagnostic.
      If specified will return product-scope policy.
      This parameters is optional.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ContextParameterSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Arm Resource Identifier of a Diagnostic or Api Diagnostic. If specified will try to find diagnostic by the identifier. This parameter is required.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ResourceIdParameterSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzApiManagementDiagnostic
        -Context <PsApiManagementContext>
        [-DiagnosticId <String>]
        [-ApiId <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ContextParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzApiManagementDiagnostic
        -ResourceId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceIdParameterSet
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementContext" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementDiagnostic" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all the diagnostic configured at the tenant scope.'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Get-AzApiManagementDiagnostic -Context $apimContext
    ```

    ```output
    DiagnosticId                 : applicationinsights
    ApiId                        :
    AlwaysLog                    : allErrors
    LoggerId                     : backendapisachinc
    EnableHttpCorrelationHeaders : True
    SamplingSetting              : Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementSamplingSetting
    FrontendSetting              :
    BackendSetting               :
    Id                           : /subscriptions/subid/resourceGroups/Api-Default-WestUS/providers/Microsoft.ApiManagement/service/contoso/diagnostics/applicationinsights
    ResourceGroupName            : Api-Default-WestUS
    ServiceName                  : contoso

    DiagnosticId                 : azuremonitor
    ApiId                        :
    AlwaysLog                    :
    LoggerId                     : azuremonitor
    EnableHttpCorrelationHeaders :
    SamplingSetting              : Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementSamplingSetting
    FrontendSetting              :
    BackendSetting               :
    Id                           : /subscriptions/subid/resourceGroups/Api-Default-WestUS/providers/Microsoft.ApiManagement/service/contoso/diagnostics/azuremonitor
    ResourceGroupName            : Api-Default-WestUS
    ServiceName                  : contoso
    ```

    This command gets all the diagnostics configured in the Api Management service.
- title: 'Example 2: Get all the diagnostics configured at the Api scope'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Get-AzApiManagementDiagnostic -Context $apimContext -ApiId "echo-api"
    ```

    ```output
    DiagnosticId                 : applicationinsights
    ApiId                        : echo-api
    AlwaysLog                    : allErrors
    LoggerId                     : backendapisachinc
    EnableHttpCorrelationHeaders : True
    SamplingSetting              : Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementSamplingSetting
    FrontendSetting              : Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementPipelineDiagnosticSetting
    BackendSetting               : Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementPipelineDiagnosticSetting
    Id                           : /subscriptions/subid/resourceGroups/Api-Default-WestUS/providers/Microsoft.ApiManagement/service/contoso/apis/echo-api/diagnostics/applicationinsights
    ResourceGroupName            : Api-Default-WestUS
    ServiceName                  : contoso
    ```

    This command gets all the diagnostics configured at the `echo-api` Api scope
- title: 'Example 3: Get the API-scope diagnostic specified by an Id'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Get-AzApiManagementDiagnostic -Context $apimContext -ApiId "echo-api" -DiagnosticId "applicationinsights"
    ```

    ```output
    DiagnosticId                 : applicationinsights
    ApiId                        : echo-api
    AlwaysLog                    : allErrors
    LoggerId                     : backendapisachinc
    EnableHttpCorrelationHeaders : True
    SamplingSetting              : Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementSamplingSetting
    FrontendSetting              :
    BackendSetting               :
    Id                           : /subscriptions/subid/resourceGroups/Api-Default-WestUS/providers/Microsoft.ApiManagement/service/contoso/diagnostics/applicationinsights
    ResourceGroupName            : Api-Default-WestUS
    ServiceName                  : contoso
    ```

    This command gets the `applicationinsights` diagnostics configured in api `echo-api`.
