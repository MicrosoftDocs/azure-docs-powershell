syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzApiManagementProduct
        -Context <PsApiManagementContext>
        -ProductId <String>
        [-DeleteSubscriptions]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
