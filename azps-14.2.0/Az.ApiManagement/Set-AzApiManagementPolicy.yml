### YamlMime:PowerShellCmdlet1
uid: Az.ApiManagement.Set-AzApiManagementPolicy
name: Set-AzApiManagementPolicy
module: Az.ApiManagement
isPreview: false
summary: |-
  Sets the specified scope policy for API Management.
description: |-
  The **Set-AzApiManagementPolicy** cmdlet sets the specified scope policy for API Management.
parameters:
  cmdletParameters:
  - name: ApiId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the identifier of the existing API.
      If you specify this parameter, the cmdlet sets the API-scope policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SetApiLevel
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: SetOperationLevel
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ApiRevision
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Identifier of API Revision. This parameter is optional. If not specified, the policy will be updated in the currently active api revision.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SetApiLevel
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: SetOperationLevel
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Context
    type: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the instance of **PsApiManagementContext**.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Format
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the format of the policy. When using `application/vnd.ms-azure-apim.policy+xml`,
      expressions contained within the policy must be XML-escaped. When using `application/vnd.ms-azure-apim.policy.raw+xml` it
      is **not** necessary for the policy to be XML-escaped.
      The default value is `application/vnd.ms-azure-apim.policy+xml`.
      This parameter is optional.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: OperationId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the identifier of the existing operation.
      If specified with ApiId will set operation-scope policy.
      This parameters is required.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SetOperationLevel
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      passthru
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Policy
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the policy document as a string.
      This parameter is required if the -*PolicyFilePath* is not specified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PolicyFilePath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the policy document file path.
      This parameter is required if the *Policy* parameter is not specified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PolicyUrl
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The Url where the Policy document is hosted. This parameter is required if -Policy or -PolicyFilePath is not specified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProductId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the identifier of the existing product.
      If this parameter is specified, the cmdlet sets the product-scope policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
