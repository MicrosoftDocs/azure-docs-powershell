syntaxes:
- syntax: |-
    ```Syntax
    Set-AzApiManagementPolicy
        -Context <PsApiManagementContext>
        [-Format <String>]
        [-Policy <String>]
        [-PolicyFilePath <String>]
        [-PolicyUrl <String>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SetTenantLevel
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzApiManagementPolicy
        -Context <PsApiManagementContext>
        -ProductId <String>
        [-Format <String>]
        [-Policy <String>]
        [-PolicyFilePath <String>]
        [-PolicyUrl <String>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SetProductLevel
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzApiManagementPolicy
        -Context <PsApiManagementContext>
        -ApiId <String>
        [-Format <String>]
        [-ApiRevision <String>]
        [-Policy <String>]
        [-PolicyFilePath <String>]
        [-PolicyUrl <String>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SetApiLevel
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzApiManagementPolicy
        -Context <PsApiManagementContext>
        -ApiId <String>
        -OperationId <String>
        [-Format <String>]
        [-ApiRevision <String>]
        [-Policy <String>]
        [-PolicyFilePath <String>]
        [-PolicyUrl <String>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: SetOperationLevel
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementContext" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set the tenant level policy'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Set-AzApiManagementPolicy -Context $apimContext -PolicyFilePath "C:\contoso\policies\tenantpolicy.xml"
    ```

    This command sets the tenant level policy from a file named tenantpolicy.xml.
- title: 'Example 2: Set a product-scope policy'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Set-AzApiManagementPolicy -Context $apimContext -ProductId "0123456789" -Policy $PolicyString
    ```

    This command sets the product-scope policy for API Management.
- title: 'Example 3: Set API-scope policy'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Set-AzApiManagementPolicy -Context $apimContext -ApiId "9876543210" -Policy $PolicyString
    ```

    This command sets API-scope policy for API Management.
- title: 'Example 4: Set operation-scope policy'
  description: |-
    ```powershell
    $apimContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Set-AzApiManagementPolicy -Context $apimContext -ApiId "9876543210" -OperationId "777" -Policy $PolicyString
    ```

    This command sets operation-scope policy for API Management.
