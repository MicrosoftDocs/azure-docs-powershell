outputs:
- name: <xref href="Microsoft.Azure.Commands.ApiManagement.ServiceManagement.Models.PsApiManagementOAuth2AuthorizationServer" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all authorization servers'
  description: |-
    ```powershell
    $ApiMgmtContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Get-AzApiManagementAuthorizationServer -Context $ApiMgmtContext
    ```

    This command gets all API Management authorization servers.
- title: 'Example 2: Get a specified authorization server'
  description: |-
    ```powershell
    $ApiMgmtContext = New-AzApiManagementContext -ResourceGroupName "Api-Default-WestUS" -ServiceName "contoso"
    Get-AzApiManagementAuthorizationServer -Context $ApiMgmtContext -ServerId "0123456789"
    ```

    This command gets the specified authorization server.
