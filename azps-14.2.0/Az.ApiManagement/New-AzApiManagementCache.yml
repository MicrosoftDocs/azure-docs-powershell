syntaxes:
- syntax: |-
    ```Syntax
    New-AzApiManagementCache
        -Context <PsApiManagementContext>
        [-CacheId <String>]
        -ConnectionString <String>
        [-AzureRedisResourceId <String>]
        [-Description <String>]
        [-UseFromLocation <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
