examples:
- title: 'Example 1 : Create a new Cache entity'
  description: |-
    ```powershell
    New-AzApiManagementCache -Context $context -ConnectionString "teamdemo.redis.cache.windows.net:6380,password=xxxxxx+xxxxx=,ssl=True,abortConnect=False" -Description "Team Cache"
    ```

    ```output
    CacheId           : centralus
    Description       : Team Cache
    ConnectionString  : {{5cc19889e6ed3b0524c3f7d3}}
    ResourceId        :
    Id                : /subscriptions/subid/resourceGroups/Api-Default-WestUS/providers/Microsof
                        t.ApiManagement/service/contoso/caches/centralus
    ResourceGroupName : Api-Default-WestUS
    ServiceName       : contoso
    ```

    The cmdlets creates a new cache entity in the master location of the Api Management service.
