syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzApiManagementLogger
        -Context <PsApiManagementContext>
        -LoggerId <String>
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
