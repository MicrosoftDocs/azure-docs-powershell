syntaxes:
- syntax: |-
    ```Syntax
    Export-AzApiManagementApi
        -Context <PsApiManagementContext>
        -ApiId <String>
        -SpecificationFormat <PsApiManagementApiFormat>
        [-ApiRevision <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ExportToPipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Export-AzApiManagementApi
        -Context <PsApiManagementContext>
        -ApiId <String>
        -SpecificationFormat <PsApiManagementApiFormat>
        -SaveAs <String>
        [-ApiRevision <String>]
        [-Force]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ExportToFile
  isDefault: false
