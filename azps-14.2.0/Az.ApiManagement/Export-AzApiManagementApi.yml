### YamlMime:PowerShellCmdlet1
uid: Az.ApiManagement.Export-AzApiManagementApi
name: Export-AzApiManagementApi
module: Az.ApiManagement
isPreview: false
summary: |-
  Exports an API to a file.
description: |-
  The **Export-AzApiManagementApi** cmdlet exports an Azure API Management API to a file in one of the supported formats.
