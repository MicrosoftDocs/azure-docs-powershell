syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzLabServicesVM
        -ResourceId <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ResourceId
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzLabServicesVM
        -LabName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Stop
  isDefault: false
