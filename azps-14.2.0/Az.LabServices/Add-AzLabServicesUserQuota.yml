syntaxes:
- syntax: |-
    ```Syntax
    Add-AzLabServicesUserQuota
        -UsageQuotaToAddToExisting <TimeSpan>
        -User <User>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: User
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzLabServicesUserQuota
        -ResourceGroupName <String>
        -LabName <String>
        -Email <String>
        -UsageQuotaToAddToExisting <TimeSpan>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
