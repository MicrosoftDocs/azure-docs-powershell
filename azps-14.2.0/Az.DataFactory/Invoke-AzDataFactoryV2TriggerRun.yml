uid: Az.DataFactory.Invoke-AzDataFactoryV2TriggerRun
name: Invoke-AzDataFactoryV2TriggerRun
module: Az.DataFactory
isPreview: false
summary: |-
  Invokes another instance of a trigger run.
description: |-
  The **Invoke-AzDataFactoryV2TriggerRun** command starts another instance of a trigger run with a new trigger run id.
