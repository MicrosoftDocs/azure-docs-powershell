syntaxes:
- syntax: |-
    ```Syntax
    Update-AzDataFactoryV2
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-IdentityType <String>]
        [-PublicNetworkAccess <String>]
        [-UserAssignedIdentity <System.Collections.Generic.IDictionary`2[System.String,System.Object]>]
        [-EncryptionVaultBaseUrl <String>]
        [-EncryptionKeyName <String>]
        [-EncryptionKeyVersion <String>]
        [-EncryptionUserAssignedIdentity <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzDataFactoryV2
        [-InputObject] <PSDataFactory>
        [-IdentityType <String>]
        [-PublicNetworkAccess <String>]
        [-UserAssignedIdentity <System.Collections.Generic.IDictionary`2[System.String,System.Object]>]
        [-EncryptionVaultBaseUrl <String>]
        [-EncryptionKeyName <String>]
        [-EncryptionKeyVersion <String>]
        [-EncryptionUserAssignedIdentity <String>]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryObject
  isDefault: false
- syntax: |-
    ```Syntax
    Update-AzDataFactoryV2
        [-ResourceId] <String>
        [-IdentityType <String>]
        [-PublicNetworkAccess <String>]
        [-UserAssignedIdentity <System.Collections.Generic.IDictionary`2[System.String,System.Object]>]
        [-EncryptionVaultBaseUrl <String>]
        [-EncryptionKeyName <String>]
        [-EncryptionKeyVersion <String>]
        [-EncryptionUserAssignedIdentity <String>]
        [-Tag <Hashtable>]
