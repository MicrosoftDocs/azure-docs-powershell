syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataFactoryHub
        [-Name] <String>
        [-File] <String>
        [-DataFactoryName] <String>
        [-ResourceGroupName] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzDataFactoryHub
        [-Name] <String>
        [-File] <String>
        [-DataFactory] <PSDataFactory>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
