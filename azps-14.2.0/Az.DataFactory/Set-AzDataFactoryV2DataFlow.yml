syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDataFactoryV2DataFlow
        [-Name] <String>
        [-DefinitionFile] <String>
        [-ResourceGroupName] <String>
        [-DataFactoryName] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzDataFactoryV2DataFlow
        [-DefinitionFile] <String>
        [-ResourceId] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByResourceId
  isDefault: false
