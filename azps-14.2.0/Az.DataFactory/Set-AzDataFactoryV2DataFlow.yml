examples:
- title: 'Example 1: Create a data flow'
  description: |-
    ```powershell
    Set-AzDataFactoryV2DataFlow -ResourceGroupName "ADF" -DataFactoryName "WikiADF" -Name "TaxiDemo1" -DefinitionFile "C:\\samples\\WikiSample\\TaxiDemo1.json"
    ```

    ```output
    DataFlowName           DataFactoryName ResourceGroupName                                                    Properties
    ------------           --------------- -----------------                                                    ----------
    TaxiDemo1                      WikiADF               adf Microsoft.Azure.Management.DataFactory.Models.MappingDataFlow
    ```

    This command creates a data flow named TaxiDemo1 in the data factory named WikiADF.
    The command bases the data flow on information in the TaxiDemo1.json file.
