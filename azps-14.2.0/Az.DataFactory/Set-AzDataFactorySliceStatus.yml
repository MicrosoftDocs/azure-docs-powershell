    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzDataFactorySliceStatus
        [[-EndDateTime] <DateTime>]
        [-Status] <String>
        [[-UpdateType] <String>]
        [-DataFactoryName] <String>
        [-DatasetName] <String>
        [-StartDateTime] <DateTime>
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzDataFactorySliceStatus
        [[-EndDateTime] <DateTime>]
        [-Status] <String>
        [[-UpdateType] <String>]
        [-DataFactory] <PSDataFactory>
        [-DatasetName] <String>
        [-StartDateTime] <DateTime>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.DataFactories.Models.PSDataFactory" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set the status of all slices'
  description: |-
    ```powershell
    Set-AzDataFactorySliceStatus -ResourceGroupName "ADF" -DataFactoryName "WikiADF" -DatasetName "DAWikiAggregatedData" -StartDateTime 2014-05-21T16:00:00Z -EndDateTime 2014-05-21T20:00:00Z -Status "Waiting" -UpdateType "UpstreamInPipeline"
    ```

    ```output
    True
    ```

    This command sets the status of all slices for the dataset named DAWikiAggregatedData to Waiting in the data factory named WikiADF.
    The *UpdateType* parameter has a value of UpstreamInPipeline, and so the command sets the status of each slice for the dataset and all dependent datasets.
    Dependent datasets are used as input datasets for activities in the pipeline.
    This command returns a value of $True.
