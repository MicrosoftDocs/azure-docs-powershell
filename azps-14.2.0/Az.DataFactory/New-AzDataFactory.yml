### YamlMime:PowerShellCmdlet1
uid: Az.DataFactory.New-AzDataFactory
name: New-AzDataFactory
module: Az.DataFactory
isPreview: false
summary: |-
  Creates a data factory.
description: |-
  The **New-AzDataFactory** cmdlet creates a data factory with the specified resource group name and location.
  Perform these operations in the following order:
  - Create a data factory.
  - Create linked services.
  - Create datasets.
  - Create a pipeline.
notes: |-
  * Keywords: azure, azurerm, arm, resource, management, manager, data, factories
