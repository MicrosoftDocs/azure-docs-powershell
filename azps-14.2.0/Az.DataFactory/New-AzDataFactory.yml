syntaxes:
- syntax: |-
    ```Syntax
    New-AzDataFactory
        [-Name] <String>
        [-Location] <String>
        [[-Tag] <Hashtable>]
        [-Force]
        [-ResourceGroupName] <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
