examples:
- title: 'Example 1: Create a data factory'
  description: |-
    ```powershell
    New-AzDataFactory -ResourceGroupName "ADF" -Name "WikiADF" -Location "WestUS"
    ```

    ```output
    DataFactoryName   : WikiADF
    ResourceGroupName : ADF
    Location          : WestUS
    Tags              : {}
    Properties        : Microsoft.WindowsAzure.Commands.Utilities.PSDataFactoryConfiguration
    ```

    This command creates a data factory named WikiADF in the resource group named ADF in the WestUS location.
