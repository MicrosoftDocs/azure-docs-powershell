examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzDataFactoryV2TriggerSubscriptionStatus -ResourceGroupName ADF -DataFactoryName WikiADF -Name Trigger1
    ```

    ```output
    TriggerName Status
    ----------- ------
    Trigger1    Enabled
    ```

    This command will get the status of the subscription for BlobEnetTrigger1 trigger to the external service events.
