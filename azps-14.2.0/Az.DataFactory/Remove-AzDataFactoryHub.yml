syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzDataFactoryHub
        [-Name] <String>
        [-DataFactoryName] <String>
        [-ResourceGroupName] <String>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzDataFactoryHub
        [-Name] <String>
        [-DataFactory] <PSDataFactory>
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
