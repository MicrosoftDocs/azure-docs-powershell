syntaxes:
- syntax: |-
    ```Syntax
    Get-AzDataFactoryActivityWindow
        [-DataFactoryName] <String>
        [[-DatasetName] <String>]
        [[-PipelineName] <String>]
        [[-ActivityName] <String>]
        [-ResourceGroupName] <String>
        [-WindowState <String>]
        [-WindowSubstate <String>]
        [-Filter <String>]
        [-OrderBy <String>]
        [-WindowStart <DateTime>]
        [-WindowEnd <DateTime>]
        [-RunStart <DateTime>]
        [-RunEnd <DateTime>]
        [-Top <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzDataFactoryActivityWindow
        [-DataFactory] <PSDataFactory>
        [[-DatasetName] <String>]
        [[-PipelineName] <String>]
        [[-ActivityName] <String>]
        [-WindowState <String>]
        [-WindowSubstate <String>]
        [-Filter <String>]
        [-OrderBy <String>]
        [-WindowStart <DateTime>]
        [-WindowEnd <DateTime>]
        [-RunStart <DateTime>]
        [-RunEnd <DateTime>]
        [-Top <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: ByFactoryObject
  isDefault: false
