syntaxes:
- syntax: |-
    ```Syntax
    New-AzMySqlFlexibleServerReplica
        -Replica <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Master <IServerAutoGenerated>
        [-Zone <Int32>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
