uid: Az.Aks.Get-AzAksManagedClusterOutboundNetworkDependencyEndpoint
name: Get-AzAksManagedClusterOutboundNetworkDependencyEndpoint
module: Az.Aks
isPreview: false
summary: |-
  Gets a list of egress endpoints (network endpoints of all outbound dependencies) in the specified managed cluster.
  The operation returns properties of each egress endpoint.
description: |-
  Gets a list of egress endpoints (network endpoints of all outbound dependencies) in the specified managed cluster.
  The operation returns properties of each egress endpoint.
