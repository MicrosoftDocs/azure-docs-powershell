syntaxes:
- syntax: |-
    ```Syntax
    Start-AzAksManagedClusterCommand
        -ResourceGroupName <String>
        -ResourceName <String>
        -Command <String>
        [-SubscriptionId <String>]
        [-ClusterToken <String>]
        [-Context <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RunExpanded
  isDefault: true
