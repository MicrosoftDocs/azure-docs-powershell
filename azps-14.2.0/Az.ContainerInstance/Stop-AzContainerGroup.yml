uid: Az.ContainerInstance.Stop-AzContainerGroup
name: Stop-AzContainerGroup
module: Az.ContainerInstance
isPreview: false
summary: |-
  Stops all containers in a container group.
  Compute resources will be deallocated and billing will stop.
