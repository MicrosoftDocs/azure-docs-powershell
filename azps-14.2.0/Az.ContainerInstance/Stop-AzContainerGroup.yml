syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzContainerGroup
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Stop
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzContainerGroup
        -InputObject <IContainerInstanceIdentity>
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
