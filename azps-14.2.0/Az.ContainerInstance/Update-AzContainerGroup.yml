syntaxes:
- syntax: |-
    ```Syntax
    Update-AzContainerGroup
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-Location <String>]
        [-Tag <Hashtable>]
        [-Zone <String[]>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
