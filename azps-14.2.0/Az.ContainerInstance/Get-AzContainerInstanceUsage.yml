### YamlMime:PowerShellCmdlet1
uid: Az.ContainerInstance.Get-AzContainerInstanceUsage
name: Get-AzContainerInstanceUsage
module: Az.ContainerInstance
isPreview: false
summary: |-
  Get the usage for a subscription
description: |-
  Get the usage for a subscription
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="System.Management.Automation.PSObject" data-throw-if-not-resolved="False" />
    description: |-
      The DefaultProfile parameter is not functional.
      Use the SubscriptionId parameter when available if executing the cmdlet against a different subscription.
    aliases:
    - AzureRMContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the Azure region.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubscriptionId
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The ID of the target subscription.
      The value must be an UUID.
    defaultValue: (Get-AzContext).Subscription.Id
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzContainerInstanceUsage
        -Location <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.ContainerInstance.Models.Api20240501Preview.IUsage" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the usage of the location'
  description: |-
    ```powershell
    Get-AzContainerInstanceUsage -Location eastus
    ```

    ```output
    CurrentValue Limit Unit
    ------------ ----- ----
    9            100   Count
    9            100   Count
    1            48    Count
    0            0     Count
    0            0     Count
    0            0     Count
    0            3000  Count
    ```

    Get the usage for the current subscription in the region `eastus`.
