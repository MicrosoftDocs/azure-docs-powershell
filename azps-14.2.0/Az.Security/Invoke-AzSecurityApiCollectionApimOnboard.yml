syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzSecurityApiCollectionApimOnboard
        -ApiId <String>
        -ResourceGroupName <String>
        -ServiceName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Azure
  isDefault: true
- syntax: |-
    ```Syntax
    Invoke-AzSecurityApiCollectionApimOnboard
        -InputObject <ISecurityIdentity>
        [-DefaultProfile <PSObject>]
