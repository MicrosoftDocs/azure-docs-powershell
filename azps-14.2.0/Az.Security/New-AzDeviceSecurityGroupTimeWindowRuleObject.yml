syntaxes:
- syntax: |-
    ```Syntax
    New-AzDeviceSecurityGroupTimeWindowRuleObject
        -TimeWindowSize <TimeSpan>
        -MinThreshold <Int32>
        -MaxThreshold <Int32>
        -Enabled <Boolean>
        -Type <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
