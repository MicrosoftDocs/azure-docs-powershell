- syntax: |-
    ```Syntax
    Enable-AzSecurityAdvancedThreatProtection
        -ResourceId <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
