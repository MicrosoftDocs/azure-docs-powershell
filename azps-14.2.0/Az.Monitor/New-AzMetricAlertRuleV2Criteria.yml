syntaxes:
- syntax: |-
    ```Syntax
    New-AzMetricAlertRuleV2Criteria
        -MetricName <String>
        -TimeAggregation <String>
        -Operator <String>
        -Threshold <Double>
        [-MetricNamespace <String>]
        [-SkipMetricValidation <Boolean>]
        [-DimensionSelection <PSMetricDimension[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: StaticThresholdParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzMetricAlertRuleV2Criteria
        -MetricName <String>
        -TimeAggregation <String>
        -Operator <String>
        [-DynamicThreshold]
        [-MetricNamespace <String>]
        [-SkipMetricValidation <Boolean>]
        [-DimensionSelection <PSMetricDimension[]>]
        [-ThresholdSensitivity <String>]
        [-ViolationCount <Int32>]
        [-ExaminedAggregatedPointCount <Int32>]
        [-IgnoreDataBefore <DateTime>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: DynamicThresholdParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzMetricAlertRuleV2Criteria
        -WebTestId <String>
        -ApplicationInsightsId <String>
        [-WebTest]
        [-FailedLocationCount <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: WebtestParameterSet
  isDefault: false
