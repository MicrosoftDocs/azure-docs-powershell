### YamlMime:PowerShellCmdlet1
uid: Az.Monitor.New-AzPerfCounterDataSourceObject
name: New-AzPerfCounterDataSourceObject
module: Az.Monitor
isPreview: false
summary: |-
  Create an in-memory object for PerfCounterDataSource.
description: |-
  Create an in-memory object for PerfCounterDataSource.
parameters:
  cmdletParameters:
  - name: CounterSpecifier
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      A list of specifier names of the performance counters you want to collect.
              Use a wildcard (*) to collect a counter for all instances.
              To get a list of performance counters on Windows, run the command 'typeperf'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      A friendly name for the data source.
              This name should be unique across all data sources (regardless of type) within the data collection rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SamplingFrequencyInSecond
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      The number of seconds between consecutive counter measurements (samples).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Stream
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of streams that this data source will be sent to.
              A stream indicates what schema will be used for this data and usually what table in Log Analytics the data will be sent to.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzPerfCounterDataSourceObject
        [-CounterSpecifier <String[]>]
        [-Name <String>]
        [-SamplingFrequencyInSecond <Int32>]
        [-Stream <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Monitor.DataCollection.Models.PerfCounterDataSource" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: creates a PerfCounterDataSource with Microsoft-InsightsMetrics'
  description: |-
    ```powershell
    New-AzPerfCounterDataSourceObject -CounterSpecifier "\\Processor(_Total)\\% Processor Time" -Name perfCounter01 -SamplingFrequencyInSecond 60 -Stream Microsoft-InsightsMetrics
    ```

    ```output
    CounterSpecifier                        Name          SamplingFrequencyInSecond Stream
    ----------------                        ----          ------------------------- ------
    {\\Processor(_Total)\\% Processor Time} perfCounter01                        60 {Microsoft-InsightsMetrics}
    ```

    This command creates a PerfCounterDataSource with Microsoft-InsightsMetrics.
- title: 'Example 2: Create a PerfCounterDataSource with Microsoft-Perf'
  description: |-
    ```powershell
    New-AzPerfCounterDataSourceObject -CounterSpecifier "\\Processor(_Total)\\% Processor Time","\\Memory\\Committed Bytes","\\LogicalDisk(_Total)\\Free Megabytes","\\PhysicalDisk(_Total)\\Avg. Disk Queue Length" -Name cloudTeamCoreCounters -SamplingFrequencyInSecond 15 -Stream Microsoft-Perf
    ```

    ```output
    CounterSpecifier                                                                                                                                          Name                  SamplingFrequencyInSecond Stream
    ----------------                                                                                                                                          ----                  ------------------------- ------
    {\\Processor(_Total)\\% Processor Time, \\Memory\\Committed Bytes, \\LogicalDisk(_Total)\\Free Megabytes, \\PhysicalDisk(_Total)\\Avg. Disk Queue Length} cloudTeamCoreCounters                        15 {Microsoft-Perf}
    ```

    This command creates a PerfCounterDataSource with Microsoft-Perf.
