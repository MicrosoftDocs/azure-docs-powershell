uid: Az.Monitor.New-AzActionGroupArmRoleReceiverObject
name: New-AzActionGroupArmRoleReceiverObject
module: Az.Monitor
isPreview: false
summary: |-
  Create an in-memory object for ArmRoleReceiver.
description: |-
  Create an in-memory object for ArmRoleReceiver.
