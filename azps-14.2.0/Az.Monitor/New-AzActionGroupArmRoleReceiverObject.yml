syntaxes:
- syntax: |-
    ```Syntax
    New-AzActionGroupArmRoleReceiverObject
        -Name <String>
        -RoleId <String>
        [-UseCommonAlertSchema <Boolean>]
        [<CommonParameters>]
    ```
