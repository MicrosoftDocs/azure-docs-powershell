examples:
- title: 'Example 1: create action group arm role receiver'
  description: |-
    ```powershell
    New-AzActionGroupArmRoleReceiverObject -Name "sample arm role" -RoleId "8e3af657-a8ff-443c-a75c-2fe8c4bcb635" -UseCommonAlertSchema $true
    ```

