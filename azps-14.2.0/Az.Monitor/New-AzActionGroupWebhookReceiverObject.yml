uid: Az.Monitor.New-AzActionGroupWebhookReceiverObject
name: New-AzActionGroupWebhookReceiverObject
module: Az.Monitor
isPreview: false
summary: |-
  Create an in-memory object for WebhookReceiver.
description: |-
  Create an in-memory object for WebhookReceiver.
parameters:
  cmdletParameters:
