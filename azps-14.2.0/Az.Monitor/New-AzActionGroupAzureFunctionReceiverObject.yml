syntaxes:
- syntax: |-
    ```Syntax
    New-AzActionGroupAzureFunctionReceiverObject
        -FunctionAppResourceId <String>
        -FunctionName <String>
        -HttpTriggerUrl <String>
        -Name <String>
        [-UseCommonAlertSchema <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
