syntaxes:
- syntax: |-
    ```Syntax
    New-AzStorageBlobDestinationObject
        [-ContainerName <String>]
        [-Name <String>]
        [-StorageAccountResourceId <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
