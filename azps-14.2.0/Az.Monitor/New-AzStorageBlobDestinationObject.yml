uid: Az.Monitor.New-AzStorageBlobDestinationObject
name: New-AzStorageBlobDestinationObject
module: Az.Monitor
isPreview: false
summary: |-
  Create an in-memory object for StorageBlobDestination.
description: |-
  Create an in-memory object for StorageBlobDestination.
