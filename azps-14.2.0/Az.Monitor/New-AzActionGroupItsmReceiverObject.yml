### YamlMime:PowerShellCmdlet1
uid: Az.Monitor.New-AzActionGroupItsmReceiverObject
name: New-AzActionGroupItsmReceiverObject
module: Az.Monitor
isPreview: false
summary: |-
  Create an in-memory object for ItsmReceiver.
description: |-
  Create an in-memory object for ItsmReceiver.
parameters:
  cmdletParameters:
  - name: ConnectionId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Unique identification of ITSM connection among multiple defined in above workspace.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the Itsm receiver.
      Names must be unique across all receivers within an action group.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Region
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Region in which workspace resides.
      Supported values:'centralindia','japaneast','southeastasia','australiasoutheast','uksouth','westcentralus','canadacentral','eastus','westeurope'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TicketConfiguration
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      JSON blob for the configurations of the ITSM action.
      CreateMultipleWorkItems option will be part of this blob as well.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WorkspaceId
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      OMS LA instance identifier.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzActionGroupItsmReceiverObject
        -ConnectionId <String>
        -Name <String>
        -Region <String>
        -TicketConfiguration <String>
        -WorkspaceId <String>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Monitor.ActionGroup.Models.ItsmReceiver" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: create action group IT service management receiver'
  description: |-
    ```powershell
    New-AzActionGroupItsmReceiverObject -ConnectionId a3b9076c-ce8e-434e-85b4-aff10cb3c8f1 -Name "sample itsm" -Region "westcentralus" -TicketConfiguration "{ 'PayloadRevision':0, 'WorkItemType':'Incident', 'UseTemplate':false,'WorkItemData':'{}','CreateOneWIPerCI':false}" -WorkspaceId "5def922a-3ed4-49c1-b9fd-05ec533819a3|55dfd1f8-7e59-4f89-bf56-4c82f5ace23c"
    ```

    ```output
    ConnectionId        : a3b9076c-ce8e-434e-85b4-aff10cb3c8f1
    Name                : sample itsm
    Region              : westcentralus
    TicketConfiguration : { 'PayloadRevision':0, 'WorkItemType':'Incident', 'UseTemplate':false,'WorkItemData':'{}','CreateOneWIPerCI':false}
    WorkspaceId         : 5def922a-3ed4-49c1-b9fd-05ec533819a3|55dfd1f8-7e59-4f89-bf56-4c82f5ace23c
    ```

    This command creates action group IT Service Management receiver object.
