### YamlMime:PowerShellCmdlet1
uid: Az.Monitor.New-AzPrometheusForwarderDataSourceObject
name: New-AzPrometheusForwarderDataSourceObject
module: Az.Monitor
isPreview: false
summary: |-
  Create an in-memory object for PrometheusForwarderDataSource.
description: |-
  Create an in-memory object for PrometheusForwarderDataSource.
parameters:
  cmdletParameters:
  - name: LabelIncludeFilter
    type: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      The list of label inclusion filters in the form of label "name-value" pairs.
              Currently only one label is supported: 'microsoft_metrics_include_label'.
              Label values are matched case-insensitively.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      A friendly name for the data source.
              This name should be unique across all data sources (regardless of type) within the data collection rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Stream
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of streams that this data source will be sent to.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzPrometheusForwarderDataSourceObject
        [-LabelIncludeFilter <Hashtable>]
        [-Name <String>]
        [-Stream <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Monitor.DataCollection.Models.PrometheusForwarderDataSource" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create prometheus forwarder data source object'
  description: |-
    ```powershell
    New-AzPrometheusForwarderDataSourceObject -LabelIncludeFilter @{"microsoft_metrics_include_label"="MonitoringData"} -Name "myPromDataSource1" -Stream "Microsoft-PrometheusMetrics"
    ```

    ```output
    LabelIncludeFilter                                          Name              Stream
    ------------------                                          ----              ------
    {…                                                          myPromDataSource1 {Microsoft-PrometheusMetrics}
    ```

    This command creates a prometheus forwarder data source object.
