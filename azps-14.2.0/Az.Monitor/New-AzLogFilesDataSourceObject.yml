uid: Az.Monitor.New-AzLogFilesDataSourceObject
name: New-AzLogFilesDataSourceObject
module: Az.Monitor
isPreview: false
summary: |-
  Create an in-memory object for LogFilesDataSource.
description: |-
  Create an in-memory object for LogFilesDataSource.
parameters:
