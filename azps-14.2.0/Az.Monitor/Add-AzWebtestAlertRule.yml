### YamlMime:PowerShellCmdlet1
uid: Az.Monitor.Add-AzWebtestAlertRule
name: Add-AzWebtestAlertRule
module: Az.Monitor
isPreview: false
summary: |-
  Adds or updates a classic webtest alert rule (already retired on public cloud).
  To create a new webtest alert rule, use the [Add-AzMetricAlertRuleV2](./Add-AzMetricAlertRuleV2.yml) cmdlet, passing a criteria object for webtest (created via the [New-AzMetricAlertRuleV2Criteria](./New-AzMetricAlertRuleV2Criteria.yml) cmdlet with a "-WebTest" criteria type).
description: |-
  The **Add-AzWebtestAlertRule** cmdlet adds or updates an alert rule of either metric, event, or webtest type.
  The added rule is associated to a resource group and has a name.
  This cmdlet implements the ShouldProcess pattern, i.e. it might request confirmation from the user before actually creating, modifying, or removing the resource.
