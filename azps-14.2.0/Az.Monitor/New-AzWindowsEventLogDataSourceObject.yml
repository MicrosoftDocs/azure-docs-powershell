### YamlMime:PowerShellCmdlet1
uid: Az.Monitor.New-AzWindowsEventLogDataSourceObject
name: New-AzWindowsEventLogDataSourceObject
module: Az.Monitor
isPreview: false
summary: |-
  Create an in-memory object for WindowsEventLogDataSource.
description: |-
  Create an in-memory object for WindowsEventLogDataSource.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      A friendly name for the data source.
              This name should be unique across all data sources (regardless of type) within the data collection rule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Stream
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      List of streams that this data source will be sent to.
              A stream indicates what schema will be used for this data and usually what table in Log Analytics the data will be sent to.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: XPathQuery
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      A list of Windows Event Log queries in XPATH format.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzWindowsEventLogDataSourceObject
        [-Name <String>]
        [-Stream <String[]>]
        [-XPathQuery <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.Monitor.DataCollection.Models.WindowsEventLogDataSource" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a windows event log data source object'
  description: |-
    ```powershell
    New-AzWindowsEventLogDataSourceObject -Name cloudSecurityTeamEvents -Stream Microsoft-WindowsEvent -XPathQuery "Security!"
    ```

    ```output
    Name                    Stream                   XPathQuery
    ----                    ------                   ----------
    cloudSecurityTeamEvents {Microsoft-WindowsEvent} {Security!}
    ```

    This command creates a windows event log data source object with XPathQuery.
- title: 'Example 2: Create a windows event log data source object'
  description: |-
    ```powershell
    New-AzWindowsEventLogDataSourceObject -Name appTeam1AppEvents -Stream Microsoft-WindowsEvent -XPathQuery "System![System[(Level = 1 or Level = 2 or Level = 3)]]","Application!*[System[(Level = 1 or Level = 2 or Level = 3)]]"
    ```

    ```output
    Name              Stream                   XPathQuery
    ----              ------                   ----------
    appTeam1AppEvents {Microsoft-WindowsEvent} {System![System[(Level = 1 or Level = 2 or Level = 3)]], Application!*[System[(Level = 1 or Level = 2 or Level = 3)]]}
    ```

    This command creates a windows event log data source object with XPathQueries.
