syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzWebAppSSLBinding
        [-Name] <String>
        [[-DeleteCertificate] <Boolean>]
        [-ResourceGroupName] <String>
        [-WebAppName] <String>
        [[-Slot] <String>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: S1
  isDefault: false
