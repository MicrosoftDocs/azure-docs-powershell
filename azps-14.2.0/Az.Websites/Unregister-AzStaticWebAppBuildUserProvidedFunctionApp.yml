syntaxes:
- syntax: |-
    ```Syntax
    Unregister-AzStaticWebAppBuildUserProvidedFunctionApp
        -EnvironmentName <String>
        -FunctionAppName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Detach
  isDefault: true
