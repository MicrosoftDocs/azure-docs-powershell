syntaxes:
- syntax: |-
    ```Syntax
    New-AzAppServiceEnvironmentInboundServices
        [-ResourceGroupName] <String>
        [-Name] <String>
        -VirtualNetworkName <String>
        -SubnetName <String>
        [-SkipDns]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SubnetNameParameterSet
  isDefault: true
- syntax: |-
