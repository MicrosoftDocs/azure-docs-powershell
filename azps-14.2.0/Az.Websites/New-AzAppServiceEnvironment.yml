syntaxes:
- syntax: |-
    ```Syntax
    New-AzAppServiceEnvironment
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-Location] <String>
        [[-Kind] <String>]
        -VirtualNetworkName <String>
        -SubnetName <String>
        -LoadBalancerMode <String>
        [-SkipRouteTable]
        [-SkipNetworkSecurityGroup]
        [-PassThru]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ASEv2SubnetNameParameterSet
  isDefault: true
