        [-Location <String>]
        [-DeletedId <String>]
        [-TargetResourceGroupName <String>]
        [-TargetName <String>]
        [-TargetSlot <String>]
        [-TargetAppServicePlanName <String>]
        [-RestoreContentOnly]
        [-UseDisasterRecovery]
        [-Force]
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FromDeletedResourceName
  isDefault: true
