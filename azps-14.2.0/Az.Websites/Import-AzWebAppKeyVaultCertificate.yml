syntaxes:
- syntax: |-
    ```Syntax
    Import-AzWebAppKeyVaultCertificate
        [-KeyVaultName] <String>
        [-CertName] <String>
        [-ResourceGroupName] <String>
        [-WebAppName] <String>
        [-Slot <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
