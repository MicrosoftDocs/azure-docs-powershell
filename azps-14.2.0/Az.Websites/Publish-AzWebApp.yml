syntaxes:
- syntax: |-
    ```Syntax
    Publish-AzWebApp
        [-WebApp] <PSSite>
        [-ArchivePath <String>]
        [-ArchiveURL <String>]
        [-Type <String>]
        [-Clean]
        [-Async]
        [-Restart]
        [-TargetPath <String>]
        [-PullIdentity <String>]
        [-IgnoreStack]
        [-Reset]
        [-Force]
        [-AsJob]
        [-Timeout <Double>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: FromWebApp
  isDefault: true
- syntax: |-
    ```Syntax
    Publish-AzWebApp
        [-ResourceGroupName] <String>
        [-Name] <String>
        [[-Slot] <String>]
        [-ArchivePath <String>]
        [-ArchiveURL <String>]
        [-Type <String>]
        [-Clean]
        [-Async]
        [-Restart]
        [-TargetPath <String>]
        [-PullIdentity <String>]
        [-IgnoreStack]
        [-Reset]
        [-Force]
        [-AsJob]
        [-Timeout <Double>]
        [-DefaultProfile <IAzureContextContainer>]
