syntaxes:
- syntax: |-
    ```Syntax
    Invoke-AzComputeScheduleSubmitDeallocate
        -Location <String>
        [-SubscriptionId <String>]
        -CorrelationId <String>
        -DeadlineType <String>
        -ResourceId <String[]>
        [-Deadline <DateTime>]
        [-RetryCount <Int32>]
        [-RetryWindowInMinutes <Int32>]
        [-Timezone <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
