uid: Az.DataProtection.Edit-AzDataProtectionPolicyRetentionRuleClientObject
name: Edit-AzDataProtectionPolicyRetentionRuleClientObject
module: Az.DataProtection
isPreview: false
summary: |-
  Adds or removes Retention Rule to existing Policy
description: |-
  Adds or removes Retention Rule to existing Policy
