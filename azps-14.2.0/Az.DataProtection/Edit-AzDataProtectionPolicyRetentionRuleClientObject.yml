    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Edit-AzDataProtectionPolicyRetentionRuleClientObject
        -Policy <IBackupPolicy>
        -Name <RetentionRuleName>
        [-RemoveRule]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveRetention
  isDefault: true
- syntax: |-
    ```Syntax
    Edit-AzDataProtectionPolicyRetentionRuleClientObject
        -Policy <IBackupPolicy>
        -Name <RetentionRuleName>
        -IsDefault <Boolean>
        -LifeCycles <ISourceLifeCycle[]>
        [-OverwriteLifeCycle <Boolean>]
        [<CommonParameters>]
    ```
  parameterSetName: AddRetention
  isDefault: false
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.DataProtection.Models.Api202501.IBackupPolicy" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add Weekly Retention Rule'
  description: |-
    ```powershell
    $pol = Get-AzDataProtectionPolicyTemplate
    $lifecycle = New-AzDataProtectionRetentionLifeCycleClientObject -SourceDataStore OperationalStore -SourceRetentionDurationType Weeks -SourceRetentionDurationCount 5
    Edit-AzDataProtectionPolicyRetentionRuleClientObject -Policy $pol -Name Weekly -LifeCycles $lifecycle -IsDefault $false
    ```

    ```output
    DatasourceType            ObjectType
    --------------            ----------
    {Microsoft.Compute/disks} BackupPolicy
    ```

    The first command gets the default policy template.
    The second command creates a weekly lifecycle object.
    The third command adds a weekly retention rule to the default policy.
- title: 'Example 2: Remove Weekly Retention Rule'
  description: |-
    ```powershell
    Edit-AzDataProtectionPolicyRetentionRuleClientObject -Policy $pol -Name Weekly -RemoveRule
    ```

    ```output
    DatasourceType            ObjectType
    --------------            ----------
    {Microsoft.Compute/disks} BackupPolicy
    ```

    This command removes weekly retention rule if it exists in given backup policy.
