syntaxes:
- syntax: |-
    ```Syntax
    New-AzServiceFabricApplicationTypeVersion
        [-ResourceGroupName] <String>
        [-ClusterName] <String>
        [-Name] <String>
        [-Version] <String>
        -PackageUrl <String>
        [-DefaultParameter <Hashtable>]
        [-Force]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
