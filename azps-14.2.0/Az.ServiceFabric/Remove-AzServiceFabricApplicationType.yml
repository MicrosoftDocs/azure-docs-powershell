uid: Az.ServiceFabric.Remove-AzServiceFabricApplicationType
name: Remove-AzServiceFabricApplicationType
module: Az.ServiceFabric
isPreview: false
summary: |-
  Remove Service fabric an application type from the cluster. This will remove all type versions under this resource. Only supports ARM deployed application types.
description: |-
  This cmdlet removes an application type form the cluster and will remove all type version under this resource, but all applications under it should be removed before running this command.
