syntaxes:
- syntax: |-
    ```Syntax
    Update-AzServiceFabricNodeType
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-IsPrimaryNodeType <Boolean>]
        -NodeType <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
