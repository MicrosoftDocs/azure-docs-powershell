syntaxes:
- syntax: |-
    ```Syntax
    Add-AzServiceFabricClientCertificate
        [-ResourceGroupName] <String>
        [-Name] <String>
        -Thumbprint <String>
        [-Admin]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SingleUpdateWithThumbprint
  isDefault: false
- syntax: |-
    ```Syntax
    Add-AzServiceFabricClientCertificate
        [-ResourceGroupName] <String>
        [-Name] <String>
        -CommonName <String>
        -IssuerThumbprint <String>
        [-Admin]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SingleUpdateWithCommonName
  isDefault: false
- syntax: |-
    ```Syntax
    Add-AzServiceFabricClientCertificate
        [-ResourceGroupName] <String>
        [-Name] <String>
        -ClientCertificateCommonName <PSClientCertificateCommonName[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: MultipleUpdatesWithCommonName
  isDefault: false
- syntax: |-
    ```Syntax
    Add-AzServiceFabricClientCertificate
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-AdminClientThumbprint <String[]>]
        [-ReadonlyClientThumbprint <String[]>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: MultipleUpdatesWithThumbprint
  isDefault: false
