examples:
- title: Example 1
  description: |-
    ```powershell
    $rgName = "testRG"
    $clusterName = "testCluster"
    $tags = @{"test"="tag"}
    Set-AzServiceFabricManagedCluster -ResourceGroupName $rgName -Name $clusterName -DnsName testnewdns -ClientConnectionPort 50000 -Tag $tags -Verbose
    ```

    Update dns name and client connection port for the cluster.
- title: Example 2
  description: |-
    ```powershell
    $rgName = "testRG"
    $clusterName = "testCluster"
    $cluster = Get-AzServiceFabricManagedCluster -ResourceGroupName $rgName -Name $clusterName

    $cluster.DnsName = "testnewdns"
    $cluster.ClientConnectionPort = 50000
    $cluster | Set-AzServiceFabricManagedCluster
    ```

    Update dns name and client connection port for the cluster, with piping.
