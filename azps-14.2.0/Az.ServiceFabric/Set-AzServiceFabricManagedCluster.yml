syntaxes:
- syntax: |-
    ```Syntax
    Set-AzServiceFabricManagedCluster
        [-InputObject] <PSManagedCluster>
        [-AsJob]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByObj
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzServiceFabricManagedCluster
        [-ResourceGroupName] <String>
        [-Name] <String>
        [-UpgradeMode <ClusterUpgradeMode>]
        [-CodeVersion <String>]
        [-HttpGatewayConnectionPort <Int32>]
        [-ClientConnectionPort <Int32>]
        [-DnsName <String>]
        [-AsJob]
        [-Tag <Hashtable>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: WithParamsByName
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzServiceFabricManagedCluster
        [-ResourceId] <String>
        [-UpgradeMode <ClusterUpgradeMode>]
        [-CodeVersion <String>]
        [-HttpGatewayConnectionPort <Int32>]
        [-ClientConnectionPort <Int32>]
        [-DnsName <String>]
