syntaxes:
- syntax: |-
    ```Syntax
    Set-AzServiceFabricSetting
        [-ResourceGroupName] <String>
        [-Name] <String>
        -Section <String>
        -Parameter <String>
        -Value <String>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: OneSetting
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzServiceFabricSetting
        [-ResourceGroupName] <String>
        [-Name] <String>
        -SettingsSectionDescription <PSSettingsSectionDescription[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
