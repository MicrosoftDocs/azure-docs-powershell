syntaxes:
- syntax: |-
    ```Syntax
    New-AzStackHciExtension
        -ArcSettingName <String>
        -ClusterName <String>
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-ExtensionParameterAutoUpgradeMinorVersion]
        [-ExtensionParameterEnableAutomaticUpgrade]
        [-ExtensionParameterForceUpdateTag <String>]
        [-ExtensionParameterProtectedSetting <Hashtable>]
        [-ExtensionParameterPublisher <String>]
        [-ExtensionParameterSetting <Hashtable>]
        [-ExtensionParameterType <String>]
        [-ExtensionParameterTypeHandlerVersion <String>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.StackHCI.Models.Api20240401.IExtension" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1:'
  description: |-
    ```powershell
    New-AzStackHciExtension -ArcSettingName "default" -ClusterName "myCluster" -Name "MicrosoftMonitoringAgent" -ResourceGroupName test-rg
    ```

    ```output
    Name                     Resource Group
    ----                     -----------------
    MicrosoftMonitoringAgent test-rg
    ```

    Creates a new arc extension.
- title: 'Example 2:'
  description: |-
    ```powershell
    $Settings = @{ "commandToExecute" = "powershell.exe -c Get-Process" }
    New-AzStackHciExtension -ArcSettingName "default" -ClusterName "myCluster" -Name "MicrosoftMonitoringAgent" -ResourceGroupName test-rg -ExtensionParameterPublisher "Microsoft.Compute" -ExtensionParameterType "MicrosoftMonitoringAgent" -ExtensionParameterProtectedSetting $Settings
    ```

    ```output
    Name                     Resource Group
    ----                     -----------------
    MicrosoftMonitoringAgent test-rg
    ```

    Creates new arc extension with the given parameters
