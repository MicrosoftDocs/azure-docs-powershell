examples:
- title: 'Example 1: Get all job definitions under a Storage mover'
  description: |-
    ```powershell
    Get-AzStorageMoverJobDefinition -ProjectName myProject -ResourceGroupName myResourceGroup -StorageMoverName myStorageMover
    ```

