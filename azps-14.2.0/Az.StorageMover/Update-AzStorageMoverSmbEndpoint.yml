syntaxes:
- syntax: |-
    ```Syntax
    Update-AzStorageMoverSmbEndpoint
        -Name <String>
        -ResourceGroupName <String>
        -StorageMoverName <String>
        [-SubscriptionId <String>]
        [-CredentialsUsernameUri <String>]
        [-CredentialsPasswordUri <String>]
        [-Description <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzStorageMoverSmbEndpoint
        -InputObject <IStorageMoverIdentity>
        [-CredentialsUsernameUri <String>]
        [-CredentialsPasswordUri <String>]
        [-Description <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
