### YamlMime:PowerShellCmdlet1
uid: Az.RedisCache.Export-AzRedisCache
name: Export-AzRedisCache
module: Az.RedisCache
isPreview: false
summary: |-
  Exports data from Azure Redis Cache to a container.
description: |-
  The **Export-AzRedisCache** cmdlet exports data from Azure Redis Cache to a container.
