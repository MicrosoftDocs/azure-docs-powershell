syntaxes:
- syntax: |-
    ```Syntax
    Export-AzRedisCache
        [-ResourceGroupName <String>]
        -Name <String>
        -Prefix <String>
        -Container <String>
        [-Format <String>]
        [-PreferredDataArchiveAuthMethod <String>]
        [-StorageSubscriptionId <String>]
        [-PassThru]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
