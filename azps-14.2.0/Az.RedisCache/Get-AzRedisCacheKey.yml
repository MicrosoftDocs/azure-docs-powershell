uid: Az.RedisCache.Get-AzRedisCacheKey
name: Get-AzRedisCacheKey
module: Az.RedisCache
isPreview: false
summary: |-
  Gets the access keys for a Redis Cache.
description: |-
  The **Get-AzRedisCacheKey** cmdlet gets the access keys for an Azure Redis Cache.
