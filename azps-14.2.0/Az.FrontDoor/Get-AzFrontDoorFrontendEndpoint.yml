examples:
- title: 'Example 1: Get all frontend endpoints in Front Door "frontdoor1" which is part of resource group "rg1".'
  description: |-
    ```powershell
    Get-AzFrontDoorFrontendEndpoint -ResourceGroupName "rg1" -FrontDoorName "frontdoor1"
    ```

