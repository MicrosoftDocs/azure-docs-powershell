syntaxes:
- syntax: |-
    ```Syntax
    Update-AzFrontDoorWafPolicy
        -ResourceGroupName <String>
        -Name <String>
        [-EnabledState <PSEnabledState>]
        [-Mode <String>]
        [-Customrule <PSCustomRule[]>]
        [-ManagedRule <PSManagedRule[]>]
        [-RedirectUrl <String>]
        [-CustomBlockResponseStatusCode <Int32>]
        [-CustomBlockResponseBody <String>]
        [-RequestBodyCheck <String>]
        [-LogScrubbingSetting <PSFrontDoorWafLogScrubbingSetting>]
        [-JavascriptChallengeExpirationInMinutes <Int32>]
        [-CaptchaExpirationInMinutes <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzFrontDoorWafPolicy
        -InputObject <PSPolicy>
        [-EnabledState <PSEnabledState>]
        [-Mode <String>]
        [-Customrule <PSCustomRule[]>]
        [-ManagedRule <PSManagedRule[]>]
        [-RedirectUrl <String>]
        [-CustomBlockResponseStatusCode <Int32>]
        [-CustomBlockResponseBody <String>]
        [-RequestBodyCheck <String>]
        [-LogScrubbingSetting <PSFrontDoorWafLogScrubbingSetting>]
        [-JavascriptChallengeExpirationInMinutes <Int32>]
        [-CaptchaExpirationInMinutes <Int32>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByObjectParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Update-AzFrontDoorWafPolicy
        -ResourceId <String>
        [-EnabledState <PSEnabledState>]
        [-Mode <String>]
        [-Customrule <PSCustomRule[]>]
        [-ManagedRule <PSManagedRule[]>]
        [-RedirectUrl <String>]
