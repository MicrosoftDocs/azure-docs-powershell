syntaxes:
- syntax: |-
    ```Syntax
    New-AzFrontDoorWafManagedRuleObject
        -Type <String>
        -Version <String>
        [-Action <String>]
        [-RuleGroupOverride <PSAzureRuleGroupOverride[]>]
        [-Exclusion <PSManagedRuleExclusion[]>]
