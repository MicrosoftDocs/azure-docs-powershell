syntaxes:
- syntax: |-
    ```Syntax
    New-AzFrontDoor
        -ResourceGroupName <String>
        -Name <String>
        -RoutingRule <PSRoutingRule[]>
        -BackendPool <PSBackendPool[]>
        -FrontendEndpoint <PSFrontendEndpoint[]>
        -LoadBalancingSetting <PSLoadBalancingSetting[]>
        -HealthProbeSetting <PSHealthProbeSetting[]>
        [-Tag <Hashtable>]
        [-EnabledState <PSEnabledState>]
        [-BackendPoolsSetting <PSBackendPoolsSetting>]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsWithBackendPoolsSettingParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzFrontDoor
        -ResourceGroupName <String>
        -Name <String>
        -RoutingRule <PSRoutingRule[]>
        -BackendPool <PSBackendPool[]>
        -FrontendEndpoint <PSFrontendEndpoint[]>
        -LoadBalancingSetting <PSLoadBalancingSetting[]>
        -HealthProbeSetting <PSHealthProbeSetting[]>
        [-Tag <Hashtable>]
        [-EnabledState <PSEnabledState>]
        [-DisableCertificateNameCheck]
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByFieldsWithCertificateNameCheckParameterSet
  isDefault: false
