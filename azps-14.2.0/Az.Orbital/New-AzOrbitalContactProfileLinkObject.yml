syntaxes:
- syntax: |-
    ```Syntax
    New-AzOrbitalContactProfileLinkObject
        -Channel <IContactProfileLinkChannel[]>
        -Direction <String>
        -Name <String>
        -Polarization <String>
        [-EirpdBw <Single>]
        [-GainOverTemperature <Single>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
