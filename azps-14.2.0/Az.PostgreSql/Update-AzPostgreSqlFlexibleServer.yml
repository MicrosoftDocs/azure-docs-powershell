syntaxes:
- syntax: |-
    ```Syntax
    Update-AzPostgreSqlFlexibleServer
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-AdministratorLoginPassword <SecureString>]
        [-Sku <String>]
        [-SkuTier <SkuTier>]
        [-HaEnabled <Object>]
        [-BackupRetentionDay <Int32>]
        [-MaintenanceWindow <String>]
        [-StorageInMb <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Update-AzPostgreSqlFlexibleServer
        -InputObject <IPostgreSqlIdentity>
        [-AdministratorLoginPassword <SecureString>]
        [-Sku <String>]
        [-SkuTier <SkuTier>]
        [-HaEnabled <Object>]
        [-BackupRetentionDay <Int32>]
        [-MaintenanceWindow <String>]
        [-StorageInMb <Int32>]
        [-Tag <Hashtable>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateViaIdentityExpanded
  isDefault: false
