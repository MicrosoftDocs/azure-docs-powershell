syntaxes:
- syntax: |-
    ```Syntax
    New-AzPostgreSqlServer
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        -Location <String>
        -AdministratorUserName <String>
        -AdministratorLoginPassword <SecureString>
        -Sku <String>
        [-SslEnforcement <SslEnforcementEnum>]
        [-MinimalTlsVersion <MinimalTlsVersionEnum>]
        [-BackupRetentionDay <Int32>]
        [-GeoRedundantBackup <GeoRedundantBackup>]
        [-StorageAutogrow <StorageAutogrow>]
        [-StorageInMb <Int32>]
        [-Tag <Hashtable>]
        [-Version <ServerVersion>]
        [-DefaultProfile <PSObject>]
        [-AsJob]
        [-NoWait]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.PostgreSql.Models.Api20171201.IServer" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create a new PostgreSql server'
  description: |-
    ```powershell
    New-AzPostgreSqlServer -Name PostgreSqlTestServer -ResourceGroupName PostgreSqlTestRG -Location eastus -AdministratorUserName pwsh -AdministratorLoginPassword $password -Sku GP_Gen5_4
    ```

    ```output
    Name                 Location AdministratorLogin Version StorageProfileStorageMb SkuName   SkuTier        SslEnforcement
    ----                 -------- ------------------ ------- ----------------------- -------   -------        --------------
    postgresqltestserver eastus   pwsh               9.6     5120                    GP_Gen5_4 GeneralPurpose Enabled
    ```

    These cmdlets create a new PostgreSql server.
