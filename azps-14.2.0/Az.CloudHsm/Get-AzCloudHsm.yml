### YamlMime:PowerShellCmdlet1
uid: Az.CloudHsm.Get-AzCloudHsm
name: Get-AzCloudHsm
module: Az.CloudHsm
isPreview: false
summary: |-
  Gets Cloud HSMs.
description: |-
  The Get-AzCloudHsm cmdlet gets information about the Cloud HSMs in a subscription.
  You can view all Cloud HSMs instances in a subscription, or filter your results by a resource group or a particular Cloud HSM.
  Note that although specifying the resource group is optional for this cmdlet when you get a single Cloud HSM, you should do so for better performance.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="System.Management.Automation.PSObject" data-throw-if-not-resolved="False" />
    description: |-
      The DefaultProfile parameter is not functional.
      Use the SubscriptionId parameter when available if executing the cmdlet against a different subscription.
    aliases:
    - AzureRMContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the Cloud HSM Cluster within the specified resource group.
      Cloud HSM Cluster names must be between 3 and 23 characters in length.
    aliases:
    - CloudHsmClusterName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Get
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceGroupName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the resource group.
      The name is case insensitive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Get
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: List
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SubscriptionId
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The ID of the target subscription.
      The value must be an UUID.
    defaultValue: (Get-AzContext).Subscription.Id
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCloudHsm
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: List1
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzCloudHsm
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Get
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzCloudHsm
        -ResourceGroupName <String>
        [-SubscriptionId <String[]>]
        [-DefaultProfile <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: false
outputs:
- name: <xref href="Microsoft.Azure.PowerShell.Cmdlets.CloudHsm.Models.ICloudHsmCluster" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all Cloud HSMs in your current subscription'
  description: |-
    ```powershell
    Get-AzCloudHsm
    ```

    ```output
    IdentityPrincipalId IdentityTenantId IdentityType Location      Name                 SkuCapacity SkuFamily SkuName
    ------------------- ---------------- ------------ --------      ----                 ----------- --------- -------
                                         UserAssigned ukwest        chsm1                      B         Standard_B1
                                         UserAssigned ukwest        chsm2                      B         Standard_B1
    ```

    This command gets all the Cloud HSMs in your current subscription
- title: 'Example 2:  Get a specific Cloud HSM'
  description: |-
    ```powershell
    Get-AzCloudHsm -Name chsm1
    ```

