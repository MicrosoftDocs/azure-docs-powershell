### YamlMime:PowerShellCmdlet1
uid: Az.CloudHsm.Backup-AzCloudHsm
name: Backup-AzCloudHsm
module: Az.CloudHsm
isPreview: false
summary: |-
  Begin a backup of the Cloud HSM.
description: |-
  Backups a Cloud HSM to a storage account.
  Use `Restore-AzCloudHsm` to restore the backup.
