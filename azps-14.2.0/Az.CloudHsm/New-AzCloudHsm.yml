uid: Az.CloudHsm.New-AzCloudHsm
name: New-AzCloudHsm
module: Az.CloudHsm
isPreview: false
summary: |-
  Creates a Cloud HSM.
description: |-
  The New-AzCloudHsm cmdlet creates a Cloud HSM in the specified resource group.
