syntaxes:
- syntax: |-
    ```Syntax
    Set-AzWcfRelay
        -Name <String>
        -Namespace <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-UserMetadata <String>]
        [-WcfRelayType <Relaytype>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExpanded
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzWcfRelay
        -Name <String>
        -Namespace <String>
        -ResourceGroupName <String>
        -InputObject <IWcfRelay>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Update
  isDefault: false
