                                   ce-pwsh01/networkRuleSets/default
    Name                         : default
    PublicNetworkAccess          : Enabled
    ResourceGroupName            : lucas-relay-rg
    SystemDataCreatedAt          :
    SystemDataCreatedBy          :
    SystemDataCreatedByType      :
    SystemDataLastModifiedAt     :
    SystemDataLastModifiedBy     :
