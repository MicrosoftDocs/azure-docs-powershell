examples:
- title: 'Example 1: Gets NetworkRuleSet for a Relay Namespace'
  description: |-
    ```powershell
    Get-AzRelayNamespaceNetworkRuleSet -ResourceGroupName lucas-relay-rg -NamespaceName namespace-pwsh01 | Format-List
    ```

    ```output
    DefaultAction                : Deny
    IPRule                       : {{
                                     "ipMask": "1.1.1.1",
                                     "action": "Allow"
                                   }, {
                                     "ipMask": "1.1.1.2",
                                     "action": "Allow"
                                   }, {
                                     "ipMask": "1.1.1.3",
                                     "action": "Allow"
                                   }}
