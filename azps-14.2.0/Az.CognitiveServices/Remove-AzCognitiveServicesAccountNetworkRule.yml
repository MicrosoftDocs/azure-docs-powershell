syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzCognitiveServicesAccountNetworkRule
        [-ResourceGroupName] <String>
        [-Name] <String>
        -VirtualNetworkResourceId <String[]>
        [-DefaultProfile <IAzureContextContainer>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
