### YamlMime:PowerShellCmdlet1
uid: Az.CognitiveServices.Get-AzCognitiveServicesAccountType
name: Get-AzCognitiveServicesAccountType
module: Az.CognitiveServices
isPreview: false
summary: |-
  Gets the available Cognitive Services Account Types.
description: |-
  The **Get-AzCognitiveServicesAccountType** cmdlet gets the available Cognitive Services Account Types under this subscription.
parameters:
  cmdletParameters:
  - name: DefaultProfile
    type: <xref href="Microsoft.Azure.Commands.Common.Authentication.Abstractions.Core.IAzureContextContainer" data-throw-if-not-resolved="False" />
    description: |-
      The credentials, account, tenant, and subscription used for communication with Azure.
    aliases:
    - AzContext
    - AzureRmContext
    - AzureCredential
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Cognitive Services Account Location.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetAccountTypes
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TypeName
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Cognitive Services Account Type Name.
    aliases:
    - CognitiveServicesAccountTypeName
    - AccountTypeName
    - KindName
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetAccountTypeWithName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzCognitiveServicesAccountType
        [-Location <String>]
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetAccountTypes
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzCognitiveServicesAccountType
        -TypeName <String>
        [-DefaultProfile <IAzureContextContainer>]
        [<CommonParameters>]
    ```
  parameterSetName: GetAccountTypeWithName
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    Get-AzCognitiveServicesAccountType
    ```

    ```output
    CognitiveServices
    ComputerVision
    Face
    FormRecognizer
    LUIS
    ```

    Get the list of available Types.
- title: Example 2
  description: |-
    ```powershell
    Get-AzCognitiveServicesAccountType -Location westus
    ```

    ```output
    CognitiveServices
    ComputerVision
    Face
    FormRecognizer
    LUIS
    ```

    Get the list of available Types in westus.
- title: Example 3
  description: |-
    ```powershell
    Get-AzCognitiveServicesAccountType -TypeName Face
    ```

    ```output
    Face
    ```

    Check if `Face` is a valid Type name, the name will be returned if it is a valid name.
