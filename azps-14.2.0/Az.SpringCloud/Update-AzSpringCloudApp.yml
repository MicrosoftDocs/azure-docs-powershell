examples:
- title: 'Example 1: Update Spring Cloud App by name'
  description: |-
    ```powershell
    Update-AzSpringCloudApp -ResourceGroupName spring-cloud-rg -ServiceName spring-cloud-service -AppName gateway -AddonConfig @{'test' = 'value1'}
    ```

    ```output
