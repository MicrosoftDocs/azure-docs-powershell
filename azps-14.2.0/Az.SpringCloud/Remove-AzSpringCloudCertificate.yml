    ```powershell
    Get-AzSpringCloudCertificate -ResourceGroupName SpringCloud-gp-junxi -ServiceName springcloud-service -Name mycertificate | Remove-AzSpringCloudCertificate -InputObject $data
    ```

    Delete the certificate resource.
