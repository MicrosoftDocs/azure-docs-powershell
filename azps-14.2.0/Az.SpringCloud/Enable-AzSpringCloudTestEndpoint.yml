syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzSpringCloudTestEndpoint
        -Name <String>
        -ResourceGroupName <String>
        [-SubscriptionId <String>]
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Enable
  isDefault: true
- syntax: |-
    ```Syntax
    Enable-AzSpringCloudTestEndpoint
        -InputObject <ISpringCloudIdentity>
        [-DefaultProfile <PSObject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
