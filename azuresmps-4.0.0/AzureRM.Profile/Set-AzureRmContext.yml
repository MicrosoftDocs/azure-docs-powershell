syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureRmContext
        [-SubscriptionName <String>]
        [-TenantId <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SubscriptionName
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzureRmContext
        -Context <PSAzureContext>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Context
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureRmContext
        [-TenantId <String>]
        [-SubscriptionId <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SubscriptionId
  isDefault: false
outputs:
- name: <xref href="PSAzureContext" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set the subscription context'
  description: |-
    ```
    PS C:\>Set-AzureRmContext -SubscriptionId "xxxx-xxxx-xxxx-xxxx"

    Account      : PFuller@contoso.com
    Environment  : AzureCloud
    Subscription : xxxx-xxxx-xxxx-xxxx
    Tenant       : yyyy-yyyy-yyyy-yyyy
    ```

    This command sets the context to use the specified subscription.
