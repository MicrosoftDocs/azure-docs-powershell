syntaxes:
- syntax: |-
    ```Syntax
    Save-AzureRmContext
        [[-Profile] <AzureRmProfile>]
        [-Path] <String>
        [-Force]
        [-WhatIf]
        [-Confirm]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.Common.Authentication.Models.AzureRMProfile" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.Azure.Commands.Profile.Models.PSAzureProfile" data-throw-if-not-resolved="False" />
examples:
- title: "Example 1: Saving the current session's context"
  description: |-
    ```
    PS C:\> Add-AzureRmAccount
    PS C:\> Save-AzureRmContext -Path C:\test.json
    ```

    This example saves the current session's Azure context to the JSON file provided.
- title: 'Example 2: Saving a given context'
  description: |-
    ```
    PS C:\> Save-AzureRmContext -Profile (Add-AzureRmAccount) -Path C:\test.json
    ```

    This example saves the Azure context that is passed through to the cmdlet to the JSON file provided.
