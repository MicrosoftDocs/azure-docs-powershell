### YamlMime:PowerShellCmdlet1
uid: AzureRM.Profile.Import-AzureRmContext
name: Import-AzureRmContext
module: AzureRM.Profile
isPreview: false
summary: |-
  Loads Azure authentication information from a file.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The Import-AzureRmContext cmdlet loads authentication information from a file to set the Azure environment and context.
  Cmdlets that you run in the current session use this information to authenticate requests to Azure Resource Manager.
parameters:
  cmdletParameters:
  - name: AzureContext
    type: <xref href="AzureRmProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure context from which this cmdlet reads.
      If you do not specify a context, this cmdlet reads from the local default context.
    aliases:
    - Profile
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: InMemoryProfile
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to context information saved by using Save-AzureRMContext.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ProfileFromDisk
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
syntaxes:
- syntax: |-
    ```Syntax
    Import-AzureRmContext
        [-AzureContext] <AzureRmProfile>
        [-WhatIf]
        [-Confirm]
    ```
  parameterSetName: InMemoryProfile
  isDefault: false
- syntax: |-
    ```Syntax
    Import-AzureRmContext
        [-Path] <String>
        [-WhatIf]
        [-Confirm]
    ```
  parameterSetName: ProfileFromDisk
  isDefault: false
inputs:
- name: <xref href="Microsoft.Azure.Commands.Common.Authentication.Models.AzureRMProfile" data-throw-if-not-resolved="False" />
  description: |-
    System.String
outputs:
- name: <xref href="Microsoft.Azure.Commands.Profile.Models.PSAzureProfile" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Importing a context from a AzureRmProfile'
  description: |-
    ```
    PS C:\> Import-AzureRmContext -AzureContext (Add-AzureRmAccount)

    Environment           : AzureCloud
    Account               : test@outlook.com
    TenantId              : xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    SubscriptionId        : yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy
    SubscriptionName      : Test Subscription
    CurrentStorageAccount :
    ```

    This example imports a context from a PSAzureProfile that is passed through to the cmdlet.
- title: 'Example 2: Importing a context from a JSON file'
  description: |-
    ```
    PS C:\> Import-AzureRmContext -Path C:\test.json

    Environment           : AzureCloud
    Account               : test@outlook.com
    TenantId              : xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    SubscriptionId        : yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy
    SubscriptionName      : Test Subscription
    CurrentStorageAccount :
    ```

    This example selects a context from a JSON file that is passed through to the cmdlet.
    This JSON file can be created from Import-AzureRmContext.
