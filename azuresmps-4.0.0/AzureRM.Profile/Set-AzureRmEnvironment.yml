### YamlMime:PowerShellCmdlet1
uid: AzureRM.Profile.Set-AzureRmEnvironment
name: Set-AzureRmEnvironment
module: AzureRM.Profile
isPreview: false
summary: |-
  Sets properties for an Azure environment.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The Set-AzureRMEnvironment cmdlet sets endpoints and metadata for connecting to an instance of Azure.
