syntaxes:
- syntax: |-
    ```Syntax
    Save-AzureRmProfile
        [[-Profile] <AzureRMProfile>]
        [-Path] <String>
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="PSAzureProfile" data-throw-if-not-resolved="False" />
examples:
- title: "Example 1: Saving the current session's profile"
  description: |-
    ```
    PS C:\> Add-AzureRmAccount
    PS C:\> Save-AzureRmProfile -Path C:\test.json
    ```

    This example saves the current session's Azure profile to the JSON file provided.
- title: 'Example 2: Saving a given profile'
  description: |-
    ```
    PS C:\> Save-AzureRmProfile -Profile (Add-AzureRmAccount) -Path C:\test.json
    ```

    This example saves the Azure profile that is passed through to the cmdlet to the JSON file provided.
