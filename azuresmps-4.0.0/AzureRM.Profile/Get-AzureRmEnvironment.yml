### YamlMime:PowerShellCmdlet1
uid: AzureRM.Profile.Get-AzureRmEnvironment
name: Get-AzureRmEnvironment
module: AzureRM.Profile
isPreview: false
summary: |-
  Get endpoints and metadata for an instance of Azure services.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The Get-AzureRmEnvironment cmdlet gets endpoints and metadata for an instance of Azure services.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Azure instance to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureRmEnvironment
        [[-Name] <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="PSAzureEnvironment" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Getting the AzureCloud environment'
  description: |-
    ```
    PS C:\> Get-AzureRmEnvironment AzureCloud

    Name                                              : AzureCloud
    EnableAdfsAuthentication                          : False
    ActiveDirectoryServiceEndpointResourceId          : https://management.core.windows.net/
    AdTenant                                          :
    GalleryUrl                                        : https://gallery.azure.com/
    ManagementPortalUrl                               : https://go.microsoft.com/fwlink/?LinkId=254433
    ServiceManagementUrl                              : https://management.core.windows.net/
    PublishSettingsFileUrl                            : https://go.microsoft.com/fwlink/?LinkID=301775
    ResourceManagerUrl                                : https://management.azure.com/
    SqlDatabaseDnsSuffix                              : .database.windows.net
    StorageEndpointSuffix                             : core.windows.net
    ActiveDirectoryAuthority                          : https://login.microsoftonline.com/
    GraphUrl                                          : https://graph.windows.net/
    GraphEndpointResourceId                           : https://graph.windows.net/
    TrafficManagerDnsSuffix                           : trafficmanager.net
    AzureKeyVaultDnsSuffix                            : vault.azure.net
    AzureDataLakeStoreFileSystemEndpointSuffix        : azuredatalakestore.net
    AzureDataLakeAnalyticsCatalogAndJobEndpointSuffix : azuredatalakeanalytics.net
    AzureKeyVaultServiceEndpointResourceId            : https://vault.azure.net
    ```

    This example shows how to get the endpoints and metadata for the AzureCloud (default) environment.
- title: 'Example 2: Getting the AzureChinaCloud environment'
  description: |-
    ```
    PS C:\> Get-AzureRmEnvironment AzureChinaCloud

    Name                                              : AzureChinaCloud
    EnableAdfsAuthentication                          : False
    ActiveDirectoryServiceEndpointResourceId          : https://management.core.chinacloudapi.cn/
    AdTenant                                          :
    GalleryUrl                                        : https://gallery.chinacloudapi.cn/
    ManagementPortalUrl                               : https://go.microsoft.com/fwlink/?LinkId=301902
    ServiceManagementUrl                              : https://management.core.chinacloudapi.cn/
    PublishSettingsFileUrl                            : https://go.microsoft.com/fwlink/?LinkID=301776
    ResourceManagerUrl                                : https://management.chinacloudapi.cn/
    SqlDatabaseDnsSuffix                              : .database.chinacloudapi.cn
    StorageEndpointSuffix                             : core.chinacloudapi.cn
    ActiveDirectoryAuthority                          : https://login.chinacloudapi.cn/
    GraphUrl                                          : https://graph.chinacloudapi.cn/
    GraphEndpointResourceId                           : https://graph.chinacloudapi.cn/
    TrafficManagerDnsSuffix                           : trafficmanager.cn
    AzureKeyVaultDnsSuffix                            : vault.azure.cn
    AzureDataLakeStoreFileSystemEndpointSuffix        :
    AzureDataLakeAnalyticsCatalogAndJobEndpointSuffix :
    AzureKeyVaultServiceEndpointResourceId            : https://vault.azure.cn
    ```

    This example shows how to get the endpoints and metadata for the AzureChinaCloud environment.
- title: 'Example 3: Getting the AzureUSGovernment environment'
  description: |-
    ```
    PS C:\> Get-AzureRmEnvironment AzureUSGovernment

    Name                                              : AzureUSGovernment
    EnableAdfsAuthentication                          : False
    ActiveDirectoryServiceEndpointResourceId          : https://management.core.usgovcloudapi.net/
    AdTenant                                          :
    GalleryUrl                                        : https://gallery.usgovcloudapi.net/
    ManagementPortalUrl                               : https://manage.windowsazure.us
    ServiceManagementUrl                              : https://management.core.usgovcloudapi.net/
    PublishSettingsFileUrl                            : https://manage.windowsazure.us/publishsettings/index
    ResourceManagerUrl                                : https://management.usgovcloudapi.net/
    SqlDatabaseDnsSuffix                              : .database.usgovcloudapi.net
    StorageEndpointSuffix                             : core.usgovcloudapi.net
    ActiveDirectoryAuthority                          : https://login-us.microsoftonline.com/
    GraphUrl                                          : https://graph.windows.net/
    GraphEndpointResourceId                           : https://graph.windows.net/
    TrafficManagerDnsSuffix                           : usgovtrafficmanager.net
    AzureKeyVaultDnsSuffix                            : vault.usgovcloudapi.net
    AzureDataLakeStoreFileSystemEndpointSuffix        :
    AzureDataLakeAnalyticsCatalogAndJobEndpointSuffix :
    AzureKeyVaultServiceEndpointResourceId            : https://vault.usgovcloudapi.net
    ```

    This example shows how to get the endpoints and metadata for the AzureUSGovernment environment.
