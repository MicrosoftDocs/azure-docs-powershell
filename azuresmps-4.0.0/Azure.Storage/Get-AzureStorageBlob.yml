### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.Get-AzureStorageBlob
name: Get-AzureStorageBlob
module: Azure.Storage
isPreview: false
summary: |-
  Lists blobs in a container.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-AzureStorageBlob** cmdlet lists blobs in the specified container in an Azure storage account.
notes: |-
  * SYNOPSIS
parameters:
  cmdletParameters:
  - name: Blob
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name or name pattern, which can be used for a wildcard search.
      If no blob name is specified, the cmdlet lists all the blobs in the specified container.
      If a value is specified for this parameter, the cmdlet lists all blobs with names that match this parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BlobName
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClientTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the client-side time-out interval, in seconds, for one service request.
      If the previous call fails in the specified interval, this cmdlet retries the request.
      If this cmdlet does not receive a successful response before the interval elapses, this cmdlet returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentTaskCount
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum concurrent network calls.
      You can use this parameter to limit the concurrency to throttle local CPU and bandwidth usage by specifying the maximum number of concurrent network calls.
      The specified value is an absolute count and is not multiplied by the core count.
      This parameter can help reduce network connection problems in low bandwidth environments, such as 100 kilobits per second.
      The default value is 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Container
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the container.
    aliases:
    - N
    - Name
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Context
    type: <xref href="IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure storage account from which you want to get a list of blobs.
      You can use the New-AzureStorageContext cmdlet to create a storage context.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ContinuationToken
    type: <xref href="BlobContinuationToken" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a continuation token for the blob list.
      Use this parameter and the *MaxCount* parameter to list blobs in multiple batches.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxCount
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of objects that this cmdlet returns.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Prefix
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a prefix for the blob names that you want to get.
      This parameter does not support using regular expressions or wildcard characters to search.
      This means that if the container has only blobs named "My", "MyBlob1", and "MyBlob2" and you specify "-Prefix My*", the cmdlet returns no blobs.
      However, if you specify "-Prefix My", the cmdlet returns "My", "MyBlob1", and "MyBlob2".
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BlobPrefix
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the service side time-out interval, in seconds, for a request.
      If the specified interval elapses before the service processes the request, the storage service returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureStorageBlob
        [[-Blob] <String>]
        [-Container] <String>
        [-MaxCount <Int32>]
        [-ContinuationToken <BlobContinuationToken>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: BlobName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzureStorageBlob
        [-Container] <String>
        [-Prefix <String>]
        [-MaxCount <Int32>]
        [-ContinuationToken <BlobContinuationToken>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: BlobPrefix
  isDefault: false
outputs:
- name: <xref href="AzureStorageBlob" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get a blob by blob name'
  description: |-
    ```
    PS C:\>Get-AzureStorageBlob -Container "ContainerName" -Blob blob*
    ```

    This command uses a blob name and wildcard to get a blob.
- title: 'Example 2: Get a blob by using the pipeline'
  description: |-
    ```
    PS C:\>Get-AzureStorageContainer -Name container* | Get-AzureStorageBlob
    ```

    This command uses the pipeline to get a blob.
- title: 'Example 3: Get a blob by name prefix'
  description: |-
    ```
    PS C:\>Get-AzureStorageBlob -Container "ContainerName" -Prefix "blob"
    ```

    This command uses a name prefix to get a blob.
- title: 'Example 4: List blobs in multiple batches'
  description: |-
    ```
    PS C:\>$MaxReturn = 10000
    PS C:\> $ContainerName = "abc"
    PS C:\> $Total = 0
    PS C:\> $Token = $Null
    PS C:\> do
     {
         $Blobs = Get-AzureStorageBlob -Container $ContainerName -MaxCount $MaxReturn  -ContinuationToken $Token
         $Total += $Blobs.Count
         if($Blobs.Length -le 0) { Break;}
         $Token = $Blobs[$blobs.Count -1].ContinuationToken;
     }
     While ($Token -ne $Null)
    PS C:\> Echo "Total $Total blobs in container $ContainerName"
    ```

    This example uses the *MaxCount* and *ContinuationToken* parameters to list Azure Storage blobs in multiple batches.
    The first four commands assign values to variables to use in the example.

    The fifth command specifies a **Do-While** statement that uses the **Get-AzureStorageBlob** cmdlet to get blobs.
    The statement includes the continuation token stored in the $Token variable.
    $Token changes value as the loop runs.
    For more information, type `Get-Help About_Do`.

    The final command uses the **Echo** command to display the total.
