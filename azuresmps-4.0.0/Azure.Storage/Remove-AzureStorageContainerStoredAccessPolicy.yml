syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureStorageContainerStoredAccessPolicy
        [-Container] <String>
        [-Policy] <String>
        [-PassThru]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Remove a stored access policy from a storage container'
  description: |-
    ```
    PS C:\>Remove-AzureStorageContainerStoredAccessPolicy -Container "MyContainer" -Policy "Policy03"
    ```

    This command removes an access policy named Policy03 from the stored container named MyContainer.
