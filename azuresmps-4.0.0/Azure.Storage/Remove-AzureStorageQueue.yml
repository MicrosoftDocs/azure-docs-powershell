syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureStorageQueue
        [-Name] <String>
        [-Force]
        [-PassThru]
        [-Context <IStorageContext>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Remove a storage queue by name'
  description: |-
    ```
    PS C:\>Remove-AzureStorageQueue "ContosoQueue01"
    ```

    This command removes a queue named ContosoQueue01.
- title: 'Example 2: Remove multiple storage queues'
  description: |-
    ```
    PS C:\>Get-AzureStorageQueue "Contoso*" | Remove-AzureStorageQueue
    ```

    This command removes all queues with names that start with Contoso.
