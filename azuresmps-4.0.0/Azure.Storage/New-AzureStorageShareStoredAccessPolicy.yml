### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.New-AzureStorageShareStoredAccessPolicy
name: New-AzureStorageShareStoredAccessPolicy
module: Azure.Storage
isPreview: false
summary: |-
  Creates a stored access policy on a Storage share.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-AzureStorageShareStoredAccessPolicy** cmdlet creates a stored access policy on an Azure Storage share.
parameters:
  cmdletParameters:
  - name: ClientTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the client-side time-out interval, in seconds, for one service request.
      If the previous call fails in the specified interval, this cmdlet retries the request.
      If this cmdlet does not receive a successful response before the interval elapses, this cmdlet returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentTaskCount
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum concurrent network calls.
      You can use this parameter to limit the concurrency to throttle local CPU and bandwidth usage by specifying the maximum number of concurrent network calls.
      The specified value is an absolute count and is not multiplied by the core count.
      This parameter can help reduce network connection problems in low bandwidth environments, such as 100 kilobits per second.
      The default value is 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Context
    type: <xref href="IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure storage context.
      To obtain a storage context, use the [New-AzureStorageContext](./New-AzureStorageContext.yml) cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExpiryTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time at which the stored access policy becomes invalid.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Permission
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies permissions in the stored access policy to access the Storage share or files under it.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Policy
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name for the stored access policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the length of the time-out period for the server part of a request.
    defaultValue: None
    dontShow: false
