### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.New-AzureStorageAccountSASToken
name: New-AzureStorageAccountSASToken
module: Azure.Storage
isPreview: false
summary: |-
  Creates an SAS token.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-AzureStorageSASToken** cmdlet creates an account-level shared access signature (SAS) token for an Azure Storage account.

  You can use the SAS token to delegate permissions for multiple services, or to delegate permissions for services not available with an object-level SAS token.
parameters:
  cmdletParameters:
  - name: Context
    type: <xref href="IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure storage context.
      You can use the New-AzureStorageContext cmdlet to get an **AzureStorageContext** object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExpiryTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time at which the shared access signature becomes invalid.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IPAddressOrRange
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address or range of IP addresses from which to accept requests, such as 168.1.5.65 or 168.1.5.60-168.1.5.70.
      The range is inclusive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Permission
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the permissions for Storage account.
      Permissions are valid only if they match the specified resource type.
      For more information about acceptable permission values, see [Constructing an Account SAS](https://go.microsoft.com/fwlink/?LinkId=799514)
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="SharedAccessProtocol" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the protocol permitted for a request made with the account SAS.
      The acceptable values for this parameter are:

      - HttpsOnly
      - HttpsOrHttp

      The default value is HttpsOrHttp.
    acceptedValues:
    - HttpsOnly
    - HttpsOrHttp
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResourceType
    type: <xref href="SharedAccessAccountResourceTypes" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the resource types that are available with the SAS token.
      The acceptable values for this parameter are:

      - None
      - Service
      - Container
      - Object
    acceptedValues:
    - None
    - Service
    - Container
    - Object
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Service
    type: <xref href="SharedAccessAccountServices" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the service.
      The acceptable values for this parameter are:

      - None
      - Blob
      - File
      - Queue
      - Table
    acceptedValues:
    - None
    - Blob
    - File
    - Queue
    - Table
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StartTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time, as a **DateTime** object, at which the SAS becomes valid.
      To get a **DateTime** object, use the Get-Date cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzureStorageAccountSASToken
        -Service <SharedAccessAccountServices>
        -ResourceType <SharedAccessAccountResourceTypes>
        [-Permission <String>]
        [-Protocol <SharedAccessProtocol>]
        [-IPAddressOrRange <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-Context <IStorageContext>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Create an SAS token'
  description: |-
    ```
    PS C:\> New-AzureStorageAccountSASToken -Service Blob,File,Table,Queue -ResourceType Service,Container,Object -Permission "racwdlup"
    ```

    This command creates an account-level SAS token with full permission.
- title: 'Example 2: Create an SAS token for a range of IP addresses'
  description: |-
    ```
    PS C:\> New-AzureStorageAccountSASToken -Service Blob,File,Table,Queue -ResourceType Service,Container,Object -Permission "racwdlup" -Protocol HttpsOnly -IPAddressOrRange 168.1.5.60-168.1.5.70
    ```

    This command creates an SAS token for HTTPS-only requests from the specified range of IP addresses.
