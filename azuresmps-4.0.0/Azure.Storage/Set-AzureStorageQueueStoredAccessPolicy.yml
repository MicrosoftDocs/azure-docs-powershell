syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureStorageQueueStoredAccessPolicy
        [-Queue] <String>
        [-Policy] <String>
        [-Permission <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-NoStartTime]
        [-NoExpiryTime]
        [-Context <IStorageContext>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Set a stored access policy in the queue'
  description: |-
    ```
    PS C:\> Set-AzureStorageQueueStoredAccessPolicy -Queue "MyQueue" -Policy "Policy07"
    ```

    This command sets an access policy named Policy07 for storage queue named MyQueue.
