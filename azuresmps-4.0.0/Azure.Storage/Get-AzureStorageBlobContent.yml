syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureStorageBlobContent
        [-Blob] <String>
        [-Container] <String>
        [-Destination <String>]
        [-CheckMd5]
        [-Force]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ReceiveManual
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzureStorageBlobContent
        -CloudBlob <CloudBlob>
        [-Destination <String>]
        [-CheckMd5]
        [-Force]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BlobPipeline
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureStorageBlobContent
        [-Blob] <String>
        -CloudBlobContainer <CloudBlobContainer>
        [-Destination <String>]
        [-CheckMd5]
        [-Force]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ContainerPipeline
  isDefault: false
outputs:
- name: <xref href="AzureStorageContainer" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Download blob content by name'
  description: |-
    ```
    PS C:\>Get-AzureStorageBlobContent -Container "ContainerName" -Blob "Blob" -Destination "C:\test\"
    ```

    This command downloads a blob by name.
- title: 'Example 2: Download blob content using the pipeline'
  description: |-
    ```
    PS C:\>Get-AzureStorageBlob -Container containername -Blob blobname | Get-AzureStorageBlobContent
    ```

    This command uses the pipeline to find and download blob content.
- title: 'Example 3: Download blob content using the pipeline and a wildcard character'
  description: |-
    ```
    PS C:\>Get-AzureStorageContainer container* | Get-AzureStorageBlobContent -Blob "cbox.exe" -Destination "C:\test"
    ```

    This example uses the asterisk wildcard character and the pipeline to find and download blob content.
