syntaxes:
- syntax: |-
    ```Syntax
    New-AzureStorageShareSASToken
        [-ShareName] <String>
        -Policy <String>
        [-Protocol <SharedAccessProtocol>]
        [-IPAddressOrRange <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-FullUri]
        [-Context <IStorageContext>]
        [<CommonParameters>]
    ```
  parameterSetName: SasPolicy
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzureStorageShareSASToken
        [-ShareName] <String>
        [-Permission <String>]
        [-Protocol <SharedAccessProtocol>]
        [-IPAddressOrRange <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-FullUri]
        [-Context <IStorageContext>]
        [<CommonParameters>]
    ```
