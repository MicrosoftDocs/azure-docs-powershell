### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.Stop-AzureStorageFileCopy
name: Stop-AzureStorageFileCopy
module: Azure.Storage
isPreview: false
summary: |-
  Stops a copy operation to the specified destination file.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Stop-AzureStorageFileCopy** cmdlet stops copying a file to a destination file.
parameters:
  cmdletParameters:
  - name: ClientTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the client-side time-out interval, in seconds, for one service request.
      If the previous call fails in the specified interval, this cmdlet retries the request.
      If this cmdlet does not receive a successful response before the interval elapses, this cmdlet returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentTaskCount
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum concurrent network calls.
      You can use this parameter to limit the concurrency to throttle local CPU and bandwidth usage by specifying the maximum number of concurrent network calls.
      The specified value is an absolute count and is not multiplied by the core count.
      This parameter can help reduce network connection problems in low bandwidth environments, such as 100 kilobits per second.
      The default value is 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Context
    type: <xref href="IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure storage context.
      To obtain a storage context, use the [New-AzureStorageContext](./New-AzureStorageContext.yml) cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ShareName
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CopyId
