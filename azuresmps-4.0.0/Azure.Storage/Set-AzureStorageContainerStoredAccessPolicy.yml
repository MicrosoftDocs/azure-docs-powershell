syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureStorageContainerStoredAccessPolicy
        [-Container] <String>
        [-Policy] <String>
        [-Permission <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-NoStartTime]
        [-NoExpiryTime]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Set a stored access policy in a storage container'
  description: |-
    ```
    PS C:\>Set-AzureStorageContainerStoredAccessPolicy -Container "MyContainer" -Policy "Policy06"
    ```

    This command sets an access policy named Policy06 for storage container named MyContainer.
