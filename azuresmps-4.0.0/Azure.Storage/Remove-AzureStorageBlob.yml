### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.Remove-AzureStorageBlob
name: Remove-AzureStorageBlob
module: Azure.Storage
isPreview: false
summary: |-
  Removes the specified storage blob.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Remove-AzureStorageBlob** cmdlet removes the specified blob from a storage account in Azure.
parameters:
  cmdletParameters:
  - name: Blob
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the blob you want to remove.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NamePipeline
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ContainerPipeline
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClientTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the client-side time-out interval, in seconds, for one service request.
      If the previous call fails in the specified interval, this cmdlet retries the request.
      If this cmdlet does not receive a successful response before the interval elapses, this cmdlet returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CloudBlob
    type: <xref href="CloudBlob" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a cloud blob.
      To obtain a **CloudBlob** object, use the Get-AzureStorageBlob cmdlet.
    aliases:
    - ICloudBlob
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BlobPipeline
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CloudBlobContainer
    type: <xref href="CloudBlobContainer" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **CloudBlobContainer** object from the Azure Storage Client library.
      You can use the Get-AzureStorageContainer cmdlet to get it.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ContainerPipeline
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentTaskCount
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum concurrent network calls.
      You can use this parameter to limit the concurrency to throttle local CPU and bandwidth usage by specifying the maximum number of concurrent network calls.
      The specified value is an absolute count and is not multiplied by the core count.
      This parameter can help reduce network connection problems in low bandwidth environments, such as 100 kilobits per second.
      The default value is 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
