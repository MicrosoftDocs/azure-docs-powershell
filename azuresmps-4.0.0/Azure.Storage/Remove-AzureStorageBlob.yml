syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureStorageBlob
        [-Blob] <String>
        [-Container] <String>
        [-DeleteSnapshot]
        [-Force]
        [-PassThru]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NamePipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzureStorageBlob
        -CloudBlob <CloudBlob>
        [-DeleteSnapshot]
        [-Force]
        [-PassThru]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BlobPipeline
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzureStorageBlob
        [-Blob] <String>
        -CloudBlobContainer <CloudBlobContainer>
        [-DeleteSnapshot]
        [-Force]
        [-PassThru]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ContainerPipeline
  isDefault: false
examples:
- title: 'Example 1: Remove a storage blob by name'
  description: |-
    ```
    PS C:\>Remove-AzureStorageBlob -Container "ContainerName" -Blob "BlobName"
    ```

    This command removes a blob identified by its name.
- title: 'Example 2: Remove a storage blob using the pipeline'
  description: |-
    ```
    PS C:\>Get-AzureStorageBlob -Container "ContainerName" -Blob "BlobName" | Remove-AzureStorageBlob
    ```

    This command uses the pipeline.
- title: 'Example 3: Remove storage blobs using the pipeline'
  description: |-
    ```
    PS C:\>Get-AzureStorageContainer -Container container* | Remove-AzureStorageBlob -Blob "BlobName"
    ```

    This command uses the asterisk (*) wildcard character and the pipeline to retrieve the blob or blobs and then removes them.
