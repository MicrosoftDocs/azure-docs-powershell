syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureStorageFile
        [-ShareName] <String>
        [-Path] <String>
        [-PassThru]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ShareName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzureStorageFile
        [-Share] <CloudFileShare>
        [-Path] <String>
        [-PassThru]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Share
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzureStorageFile
        [-Directory] <CloudFileDirectory>
        [-Path] <String>
        [-PassThru]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Directory
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzureStorageFile
        [-File] <CloudFile>
        [-PassThru]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: File
  isDefault: false
examples:
- title: 'Example 1: Delete a file from a file share'
  description: |-
    ```
    PS C:\>Remove-AzureStorageFile -ShareName "ContosoShare06" -Path "ContosoFile22"
    ```

    This command deletes the file that is named ContosoFile22 from the file share named ContosoShare06.
- title: 'Example 2: Get a file from a file share by using a file share object'
  description: |-
    ```
    PS C:\>Get-AzureStorageShare -Name "ContosoShare06" | Remove-AzureStorageFile -Path "ContosoFile22"
    ```

    This command uses the **Get-AzureStorageShare** cmdlet to get the file share named ContosoShare06, and then passes that object to the current cmdlet by using the pipeline operator.
    The current command deletes the file that is named ContosoFile22 from ContosoShare06.
