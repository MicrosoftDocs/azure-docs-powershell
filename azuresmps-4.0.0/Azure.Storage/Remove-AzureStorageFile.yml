  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of a file.
      This cmdlet deletes the file that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
