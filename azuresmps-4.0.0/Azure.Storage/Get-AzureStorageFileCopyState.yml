### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.Get-AzureStorageFileCopyState
name: Get-AzureStorageFileCopyState
module: Azure.Storage
isPreview: false
summary: |-
  Gets the state of a copy operation.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-AzureStorageFileCopyState** cmdlet gets the state of an Azure Storage file copy operation.
parameters:
  cmdletParameters:
  - name: ClientTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the client-side time-out interval, in seconds, for one service request.
      If the previous call fails in the specified interval, this cmdlet retries the request.
      If this cmdlet does not receive a successful response before the interval elapses, this cmdlet returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentTaskCount
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum concurrent network calls.
      You can use this parameter to limit the concurrency to throttle local CPU and bandwidth usage by specifying the maximum number of concurrent network calls.
      The specified value is an absolute count and is not multiplied by the core count.
      This parameter can help reduce network connection problems in low bandwidth environments, such as 100 kilobits per second.
      The default value is 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Context
    type: <xref href="IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure Storage context.
      To obtain a context, use the [New-AzureStorageContext](./New-AzureStorageContext.yml) cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ShareName
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: File
    type: <xref href="CloudFile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **CloudFile** object.
      You can create a cloud file or obtain one by using the Get-AzureStorageFile cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: File
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FilePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of the file relative to an Azure Storage share.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ShareName
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the length of the time-out period for the server part of a request.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ShareName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a share.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ShareName
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WaitForComplete
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet waits for the copy to finish.
      If you do not specify this parameter, this cmdlet returns a result immediately.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureStorageFileCopyState
        [-ShareName] <String>
        [-FilePath] <String>
        [-WaitForComplete]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: ShareName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureStorageFileCopyState
        [-File] <CloudFile>
        [-WaitForComplete]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: File
  isDefault: false
examples:
- title: 'Example 1: Get the copy state by file name'
  description: |-
    ```
    PS C:\>Get-AzureStorageFileCopyState -ShareName "ContosoShare" -FilePath "ContosoFile"
    ```

    This command gets the state of the copy operation for a file that has the specified name.
