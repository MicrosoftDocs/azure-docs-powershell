syntaxes:
- syntax: |-
    ```Syntax
    New-AzureStorageQueueSASToken
        [-Name] <String>
        -Policy <String>
        [-Protocol <SharedAccessProtocol>]
        [-IPAddressOrRange <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-FullUri]
        [-Context <IStorageContext>]
        [<CommonParameters>]
    ```
  parameterSetName: SasPolicy
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzureStorageQueueSASToken
        [-Name] <String>
        [-Permission <String>]
        [-Protocol <SharedAccessProtocol>]
        [-IPAddressOrRange <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-FullUri]
        [-Context <IStorageContext>]
        [<CommonParameters>]
    ```
  parameterSetName: SasPermission
  isDefault: false
examples:
- title: 'Example 1: Generate a queue SAS token with full permission'
  description: |-
    ```
    PS C:\>New-AzureStorageQueueSASToken -Name "Test" -Permission raup
    ```

    This example generates a queue SAS token with full permission.
