syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureStorageFileContent
        [-ShareName] <String>
        [-Path] <String>
        [[-Destination] <String>]
        [-CheckMd5]
        [-PassThru]
        [-Force]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ShareName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzureStorageFileContent
        [-Share] <CloudFileShare>
        [-Path] <String>
        [[-Destination] <String>]
        [-CheckMd5]
        [-PassThru]
        [-Force]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Share
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureStorageFileContent
        [-Directory] <CloudFileDirectory>
        [-Path] <String>
        [[-Destination] <String>]
        [-CheckMd5]
        [-PassThru]
        [-Force]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Directory
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureStorageFileContent
        [-File] <CloudFile>
        [[-Destination] <String>]
        [-CheckMd5]
        [-PassThru]
        [-Force]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: File
  isDefault: false
examples:
- title: 'Example 1: Download a file from a folder'
  description: |-
    ```
    PS C:\>Get-AzureStorageFileContent -ShareName "ContosoShare06" -Path "ContosoWorkingFolder/CurrentDataFile"
    ```

    This command downloads a file that is named CurrentDataFile in the folder ContosoWorkingFolder from the file share ContosoShare06 to current folder.
