    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureStorageBlobCopyState
        [-Blob] <String>
        [-Container] <String>
        [-WaitForComplete]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: NamePipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzureStorageBlobCopyState
        -CloudBlob <CloudBlob>
        [-WaitForComplete]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: BlobPipeline
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureStorageBlobCopyState
        [-Blob] <String>
        -CloudBlobContainer <CloudBlobContainer>
        [-WaitForComplete]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: ContainerPipeline
  isDefault: false
outputs:
- name: <xref href="CopyState" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the copy status of a blob'
  description: |-
    ```
    C:\PS>Get-AzureStorageBlobCopyState -Blob "ContosoPlanning2015" -Container "ContosoUploads"
    ```

    This command gets the copy status of the blob named ContosoPlanning2015 in the container ContosoUploads.
- title: 'Example 2: Get the copy status for of a blob by using the pipeline'
  description: |-
    ```
    C:\PS>Get-AzureStorageBlob -Blob "ContosoPlanning2015" -Container "ContosoUploads" | Get-AzureStorageBlobCopyState
    ```

    This command gets the blob named ContosoPlanning2015 in the container named ContosoUploads by using the **Get-AzureStorageBlob** cmdlet, and then passes the result to the current cmdlet by using the pipeline operator.
    The **Get-AzureStorageBlobCopyState** cmdlet gets the copy status for that blob.
- title: 'Example 3: Get the copy status for a blob in a container by using the pipeline'
  description: |-
    ```
    C:\PS>Get-AzureStorageContainer -Name "ContosoUploads" | Get-AzureStorageBlobCopyState -Blob "ContosoPlanning2015"
    ```

    This command gets the container named by using the **Get-AzureStorageBlob** cmdlet, and then passes the result to the current cmdlet.
    The **Get-AzureStorageContainer** cmdlet gets the copy status for the blob named ContosoPlanning2015 in that container.
