### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.Get-AzureStorageBlobCopyState
name: Get-AzureStorageBlobCopyState
module: Azure.Storage
isPreview: false
summary: |-
  Gets the copy status of an Azure Storage blob.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-AzureStorageBlobCopyState** cmdlet gets the copy status of an Azure Storage blob.
parameters:
  cmdletParameters:
  - name: Blob
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a blob.
      This cmdlet gets the state of the blob copy operation for the Azure Storage blob that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NamePipeline
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ContainerPipeline
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClientTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the client-side time-out interval, in seconds, for one service request.
      If the previous call fails in the specified interval, this cmdlet retries the request.
      If this cmdlet does not receive a successful response before the interval elapses, this cmdlet returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CloudBlob
    type: <xref href="CloudBlob" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **CloudBlob** object from Azure Storage Client library.
      To obtain a **CloudBlob** object, use the Get-AzureStorageBlob cmdlet.
    aliases:
    - ICloudBlob
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: BlobPipeline
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CloudBlobContainer
    type: <xref href="CloudBlobContainer" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a **CloudBlobContainer** object from the Azure Storage Client library.
      This cmdlet gets the copy status of a blob in the container that this parameter specifies.
      To obtain a **CloudBlobContainer** object, use the Get-AzureStorageContainer cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ContainerPipeline
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentTaskCount
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum concurrent network calls.
      You can use this parameter to limit the concurrency to throttle local CPU and bandwidth usage by specifying the maximum number of concurrent network calls.
      The specified value is an absolute count and is not multiplied by the core count.
      This parameter can help reduce network connection problems in low bandwidth environments, such as 100 kilobits per second.
      The default value is 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Container
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a container.
      This cmdlet gets the copy status for a blob in the container that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NamePipeline
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Context
    type: <xref href="IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure storage context.
      To obtain a storage context, use the New-AzureStorageContext cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the service side time-out interval, in seconds, for a request.
      If the specified interval elapses before the service processes the request, the storage service returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
