### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.Set-AzureStorageServiceLoggingProperty
name: Set-AzureStorageServiceLoggingProperty
module: Azure.Storage
isPreview: false
summary: |-
  Modifies logging for Azure Storage services.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Set-AzureStorageServiceLoggingProperty** cmdlet modifies logging for Azure Storage services.
parameters:
  cmdletParameters:
  - name: Context
    type: <xref href="IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure storage context.
      To obtain a storage context, use the New-AzureStorageContext cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LoggingOperations
    type: <xref href="LoggingOperations" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of Azure Storage service operations.
      Azure Storage services logs the operations that this parameter specifies.
      The acceptable values for this parameter are:

      - None
      - Read
      - Write
      - Delete
      - All
    acceptedValues:
    - None
    - Read
    - Write
    - Delete
    - All
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet returns the updated logging properties.
      If you do not specify this parameter, this cmdlet does not return a value.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RetentionDays
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of days that the Azure Storage service retains logged information.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServiceType
    type: <xref href="StorageServiceType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the storage service type.
      This cmdlet modifies the logging properties for the service type that this parameter specifies.
      The acceptable values for this parameter are:

      - Blob
      - Table
      - Queue
      - File

      The value of File is not currently supported.
    acceptedValues:
    - Blob
    - Table
    - Queue
    - File
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Version
    type: <xref href="Double" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the version of the Azure Storage service logging.
      The default value is 1.0.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureStorageServiceLoggingProperty
        [-ServiceType] <StorageServiceType>
        [-Version <Double>]
        [-RetentionDays <Int32>]
        [-LoggingOperations <LoggingOperations[]>]
        [-PassThru]
        [-Context <IStorageContext>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Modify logging properties for the Blob service'
  description: |-
    ```
    C:\PS>Set-AzureStorageServiceLoggingProperty -ServiceType Blob -LoggingOperations Read,Write -PassThru -RetentionDays 10 -Version 1.0
    ```

    This command modifies version 1.0 logging for blob storage to include read and write operations.
    Azure Storage service logging retains entries for 10 days.
    Because this command specifies the *PassThru* parameter, the command displays the modified logging properties.
