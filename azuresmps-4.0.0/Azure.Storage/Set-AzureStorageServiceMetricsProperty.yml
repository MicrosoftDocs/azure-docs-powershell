### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.Set-AzureStorageServiceMetricsProperty
name: Set-AzureStorageServiceMetricsProperty
module: Azure.Storage
isPreview: false
summary: |-
  Modifies metrics properties for the Azure Storage service.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Set-AzureStorageServiceMetricsProperty** cmdlet modifies metrics properties for the Azure Storage service.
parameters:
  cmdletParameters:
  - name: Context
    type: <xref href="IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure storage context.
      To obtain a storage context, use the New-AzureStorageContext cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MetricsLevel
    type: <xref href="MetricsLevel" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the metrics level that Azure Storage uses for the service.
      The acceptable values for this parameter are:

      - None
      - Service
      - ServiceAndApi
    acceptedValues:
    - None
    - Service
    - ServiceAndApi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MetricsType
    type: <xref href="ServiceMetricsType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a metrics type.
      This cmldet sets the Azure Storage service metrics type to the value that this parameter specifies.
      The acceptable values for this parameter are: Hour and Minute.
    acceptedValues:
    - Hour
    - Minute
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlets returns the updated metrics properties.
      If you do not specify this parameter, this cmdlet does not return a value.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RetentionDays
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of days that the Azure Storage service retains metrics information.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServiceType
    type: <xref href="StorageServiceType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the storage service type.
      This cmdlet modifies the metrics properties for the service type that this parameter specifies.
      The acceptable values for this parameter are:

      - Blob
      - Table
      - Queue
      - File

      The value of File is not currently supported.
    acceptedValues:
    - Blob
    - Table
    - Queue
    - File
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Version
    type: <xref href="Double" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the version of the Azure Storage metrics.
      The default value is 1.0.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureStorageServiceMetricsProperty
        [-ServiceType] <StorageServiceType>
        [-MetricsType] <ServiceMetricsType>
        [-Version <Double>]
        [-RetentionDays <Int32>]
        [-MetricsLevel <MetricsLevel>]
        [-PassThru]
        [-Context <IStorageContext>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Modify metrics properties for the Blob service'
  description: |-
    ```
    C:\PS>Set-AzureStorageServiceMetricsProperty -ServiceType Blob -MetricsType Hour -MetricsLevel Service -PassThru -RetentionDays 10 -Version 1.0
    ```

    This command modifies version 1.0 metrics for blob storage to a level of Service.
    Azure Storage service metrics retains entries for 10 days.
    Because this command specifies the *PassThru* parameter, the command displays the modified metrics properties.
