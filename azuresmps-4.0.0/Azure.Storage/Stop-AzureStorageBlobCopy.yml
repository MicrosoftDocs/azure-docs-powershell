syntaxes:
- syntax: |-
    ```Syntax
    Stop-AzureStorageBlobCopy
        [-Blob] <String>
        [-Container] <String>
        [-Force]
        [-CopyId <String>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NamePipeline
  isDefault: true
- syntax: |-
    ```Syntax
    Stop-AzureStorageBlobCopy
        -CloudBlob <CloudBlob>
        [-Force]
        [-CopyId <String>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BlobPipeline
  isDefault: false
- syntax: |-
    ```Syntax
    Stop-AzureStorageBlobCopy
        [-Blob] <String>
        -CloudBlobContainer <CloudBlobContainer>
        [-Force]
        [-CopyId <String>]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ContainerPipeline
  isDefault: false
examples:
- title: 'Example 1: Stop copy operation by name'
  description: |-
    ```
    PS C:\>Stop-AzureStorageBlobCopy -Container "ContainerName" -Blob "BlobName" -CopyId "CopyID"
    ```

    This command stops the copy operation by name.
- title: 'Example 2: Stop copy operation by using the pipeline'
  description: |-
    ```
    PS C:\>Get-AzureStorageContainer container* | Stop-AzureStorageBlobCopy -Blob "BlobName"
    ```

    This command stops the copy operation by passing the container on the pipeline from **Get-AzureStorageContainer**.
- title: 'Example 3: Stop copy operation by using the pipeline and Get-AzureStorageBlob'
  description: |-
    ```
    PS C:\>Get-AzureStorageBlob -Container "ContainerName" | Stop-AzureStorageBlobCopy -Force
    ```

    This example stops the copy operation by passing the container on the pipeline from the Get-AzureStorageBlob cmdlet.
