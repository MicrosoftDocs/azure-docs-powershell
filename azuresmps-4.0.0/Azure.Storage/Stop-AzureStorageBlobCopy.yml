### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.Stop-AzureStorageBlobCopy
name: Stop-AzureStorageBlobCopy
module: Azure.Storage
isPreview: false
summary: |-
  Stops a copy operation.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Stop-AzureStorageBlobCopy** cmdlet stops a copy operation to the specified destination blob.
parameters:
  cmdletParameters:
  - name: Blob
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the blob.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NamePipeline
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ContainerPipeline
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ClientTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the client-side time-out interval, in seconds, for one service request.
      If the previous call fails in the specified interval, this cmdlet retries the request.
      If this cmdlet does not receive a successful response before the interval elapses, this cmdlet returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CloudBlob
