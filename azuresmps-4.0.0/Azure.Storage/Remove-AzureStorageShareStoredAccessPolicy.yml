syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureStorageShareStoredAccessPolicy
        [-ShareName] <String>
        [-Policy] <String>
        [-PassThru]
        [-Context <IStorageContext>]
        [-ServerTimeoutPerRequest <Int32>]
        [-ClientTimeoutPerRequest <Int32>]
        [-ConcurrentTaskCount <Int32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Remove a stored access policy from an Azure Storage share'
  description: |-
    ```
    PS C:\>Remove-AzureStorageShareStoredAccessPolicy -ShareName "ContosoShare" -Policy "GeneralPolicy"
    ```

    This command removes a stored access policy named GeneralPolicy from ContosoShare.
