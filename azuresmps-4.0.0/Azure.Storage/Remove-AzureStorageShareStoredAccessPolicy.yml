### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.Remove-AzureStorageShareStoredAccessPolicy
name: Remove-AzureStorageShareStoredAccessPolicy
module: Azure.Storage
isPreview: false
summary: |-
  Removes a stored access policy from a Storage share.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Remove-AzureStorageShareStoredAccessPolicy** cmdlet removes a stored access policy from an Azure Storage share.
parameters:
  cmdletParameters:
  - name: ClientTimeoutPerRequest
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the client-side time-out interval, in seconds, for one service request.
      If the previous call fails in the specified interval, this cmdlet retries the request.
      If this cmdlet does not receive a successful response before the interval elapses, this cmdlet returns an error.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConcurrentTaskCount
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum concurrent network calls.
      You can use this parameter to limit the concurrency to throttle local CPU and bandwidth usage by specifying the maximum number of concurrent network calls.
      The specified value is an absolute count and is not multiplied by the core count.
      This parameter can help reduce network connection problems in low bandwidth environments, such as 100 kilobits per second.
      The default value is 10.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
