syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureStorageTableStoredAccessPolicy
        [-Table] <String>
        [-Policy] <String>
        [-Permission <String>]
        [-StartTime <DateTime>]
        [-ExpiryTime <DateTime>]
        [-NoStartTime]
        [-NoExpiryTime]
        [-Context <IStorageContext>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Set a stored access policy in table with full permission'
  description: |-
    ```
    PS C:\>Set-AzureStorageTableStoredAccessPolicy -Table "MyTable" -Policy "Policy08"
    ```

    This command sets an access policy named Policy08 for storage table named MyTable.
