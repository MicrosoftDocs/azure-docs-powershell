### YamlMime:PowerShellCmdlet1
uid: Azure.Storage.New-AzureStorageContainerSASToken
name: New-AzureStorageContainerSASToken
module: Azure.Storage
isPreview: false
summary: |-
  Generates an SAS token for an Azure storage container.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-AzureStorageContainerSASToken** cmdlet generates a Shared Access Signature (SAS) token for an Azure storage container.
parameters:
  cmdletParameters:
  - name: Context
    type: <xref href="IStorageContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure storage context.
      You can create it by using the New-AzureStorageContext cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExpiryTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time at which the shared access signature becomes invalid.

      If the user sets the start time but not the expiry time, the expiry time is set to the start time plus one hour.
      If neither the start time nor the expiry time is specified, the expiry time is set to the current time plus one hour.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: FullUri
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet return the full blob URI and the shared access signature token.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IPAddressOrRange
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address or range of IP addresses from which to accept requests, such as 168.1.5.65 or 168.1.5.60-168.1.5.70.
      The range is inclusive.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure storage container name.
    aliases:
    - N
    - Container
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Permission
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies permissions for a storage container.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SasPermission
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Policy
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure Stored Access Policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SasPolicy
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Protocol
    type: <xref href="SharedAccessProtocol" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the protocol permitted for a request.
      The acceptable values for this parameter are:
      * HttpsOnly
      * HttpsOrHttp

      The default value is HttpsOrHttp.
    acceptedValues:
    - HttpsOnly
    - HttpsOrHttp
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StartTime
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time at which the shared access signature becomes valid.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
