syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureService
        [[-ServiceName] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="HostedServiceContext" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get information about all services'
  description: |-
    ```
    PS C:\> Get-AzureService
    ```

    This command returns an object that contains information about all of the Azure services associated with the current subscription.
- title: 'Example 2: Get information about a specified service'
  description: |-
    ```
    PS C:\> Get-AzureService -ServiceName $MySvc
    ```

    This command returns information about the $MySvc service.
- title: 'Example 3: Display available methods and properties'
  description: |-
    ```
    PS C:\> Get-AzureService | Get-Member
    ```

    This command displays the properties and methods that are available from the **Get-AzureService** cmdlet.
