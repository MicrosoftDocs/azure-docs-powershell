syntaxes:
- syntax: |-
    ```Syntax
    Add-AzureDataDisk
        [-DiskSizeInGB] <Int32>
        [-DiskLabel] <String>
        [-LUN] <Int32>
        -VM <IPersistentVM>
        [-CreateNew]
        [-MediaLocation <String>]
        [-HostCaching <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: CreateNew
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzureDataDisk
        [-DiskName] <String>
        [-LUN] <Int32>
        -VM <IPersistentVM>
        [-Import]
        [-HostCaching <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Import
  isDefault: false
- syntax: |-
    ```Syntax
    Add-AzureDataDisk
        [-DiskLabel] <String>
        [-LUN] <Int32>
        -MediaLocation <String>
        -VM <IPersistentVM>
        [-ImportFrom]
        [-HostCaching <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
