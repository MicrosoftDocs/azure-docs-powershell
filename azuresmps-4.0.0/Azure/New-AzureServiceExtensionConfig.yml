### YamlMime:PowerShellCmdlet1
uid: Azure.New-AzureServiceExtensionConfig
name: New-AzureServiceExtensionConfig
module: Azure
isPreview: false
summary: |-
  Creates a cloud service extension configuration for a deployment.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-AzureServiceExtensionConfig** cmdlet creates a cloud service extension configuration for a deployment.
parameters:
  cmdletParameters:
  - name: CertificateThumbprint
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a certificate thumbprint to use to encrypt the private configuration.
      This certificate has to already exist in the certificate store.
      If you do not specify a certificate, this cmdlet creates a certificate.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NewExtensionUsingThumbprint
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExtensionId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the extension.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NewExtension
      position: "8"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: NewExtensionUsingThumbprint
      position: "8"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExtensionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the extension.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NewExtension
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: NewExtensionUsingThumbprint
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExtensionState
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the state of the extension.
      The acceptable values for this parameter are:

      - Enable
      - Disable
      - Uninstall
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UpdateExtensionStatusParameterSetName
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InformationAction
    type: <xref href="ActionPreference" data-throw-if-not-resolved="False" />
    description: |-
      Specifies how this cmdlet responds to an information event.

      The acceptable values for this parameter are:

      - Continue
      - Ignore
      - Inquire
      - SilentlyContinue
      - Stop
      - Suspend
    aliases:
    - infa
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InformationVariable
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an information variable.
    aliases:
    - iv
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PrivateConfiguration
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the private configuration text.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NewExtension
      position: "6"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: NewExtensionUsingThumbprint
      position: "6"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProviderNamespace
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Extension's Provider Namespace.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NewExtension
      position: "4"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: NewExtensionUsingThumbprint
      position: "4"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PublicConfiguration
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the public configuration text.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NewExtension
      position: "5"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: NewExtensionUsingThumbprint
      position: "5"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Role
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an optional array of roles to specify the remote desktop configuration for.
      If not specified the remote desktop configuration is applied as the default configuration for all roles.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ThumbprintAlgorithm
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a thumbprint hashing algorithm which is used with the thumbprint to identify the certificate.
      This parameter is optional and the default is sha1.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NewExtension
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: NewExtensionUsingThumbprint
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Version
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the extension version.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NewExtension
      position: "7"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: NewExtensionUsingThumbprint
      position: "7"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: X509Certificate
    type: <xref href="X509Certificate2" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an x509 certificate that when specified will be automatically uploaded to the cloud service and used for encrypting the extension private configuration.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NewExtension
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzureServiceExtensionConfig
        [[-Role] <String[]>]
        [[-X509Certificate] <X509Certificate2>]
        [[-ThumbprintAlgorithm] <String>]
        [-ExtensionName] <String>
        [-ProviderNamespace] <String>
        [-PublicConfiguration] <String>
        [-PrivateConfiguration] <String>
        [-Version] <String>
        [[-ExtensionId] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: NewExtension
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzureServiceExtensionConfig
        [[-Role] <String[]>]
        [-CertificateThumbprint] <String>
        [[-ThumbprintAlgorithm] <String>]
        [-ExtensionName] <String>
        [-ProviderNamespace] <String>
        [-PublicConfiguration] <String>
        [-PrivateConfiguration] <String>
        [-Version] <String>
        [[-ExtensionId] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: NewExtensionUsingThumbprint
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzureServiceExtensionConfig
        [[-Role] <String[]>]
        [-ExtensionId] <String>
        [-ExtensionState] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateExtensionStatusParameterSetName
  isDefault: false
examples:
- title: 'Example 1: Create an extension configuration'
  description: |-
    ```
    PS C:\> New-AzureServiceExtensionConfig -ExtensionName 'RDP' -Version '1.0' -ProviderNamespace Microsoft.Windows.Azure.Extensions -PublicConfiguration $p1 -PrivateConfiguration $p2;
    ```

    This command specifies an extension configuration.
- title: 'Example 2: Create an extension configuration for a role'
  description: |-
    ```
    PS C:\> New-AzureServiceExtensionConfig -Role WebRole1 -ExtensionName 'RDP' -ProviderNamespace Microsoft.Windows.Azure.Extensions -PublicConfiguration $p1 -PrivateConfiguration $p2;
    ```

    This command specifies an extension configuration for the role WebRole1.
