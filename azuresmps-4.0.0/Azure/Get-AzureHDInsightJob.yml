syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureHDInsightJob
        -Cluster <String>
        [-Credential <PSCredential>]
        [-IgnoreSslErrors <Boolean>]
        [-JobId <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Get jobDetails History of a HDInsight Cluster
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzureHDInsightJob
