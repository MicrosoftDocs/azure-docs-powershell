        [-Endpoint <Uri>]
        [-IgnoreSslErrors <Boolean>]
        [-JobId <String>]
        [-Subscription <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Get jobDetails History of a HDInsight Cluster (with Specific Subscription Credential)
