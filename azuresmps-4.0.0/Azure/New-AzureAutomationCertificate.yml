### YamlMime:PowerShellCmdlet1
uid: Azure.New-AzureAutomationCertificate
name: New-AzureAutomationCertificate
module: Azure
isPreview: false
summary: |-
  Creates an Azure Automation certificate.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  [!INCLUDE [aa-deprecation](../include/aa-deprecation.yml)]

  The **New-AzureAutomationCertificate** cmdlet creates a certificate in Microsoft Azure Automation.
  You provide the path to a certificate file to upload.
