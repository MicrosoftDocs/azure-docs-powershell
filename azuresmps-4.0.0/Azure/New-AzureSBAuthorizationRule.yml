### YamlMime:PowerShellCmdlet1
uid: Azure.New-AzureSBAuthorizationRule
name: New-AzureSBAuthorizationRule
module: Azure
isPreview: false
summary: |-
  Creates new Service Bus authorization rule.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-AzureSBAuthorizationRule** cmdlet creates a Service Bus authorization rule.

  [!INCLUDE [sb-deprecation.md](../include/sb-deprecation.yml)]
parameters:
  cmdletParameters:
  - name: EntityName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the entity name to apply rule at.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EntitySAS
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EntityType
    type: <xref href="ServiceBusEntityType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the entity type.
      Valid values are:

      - Queue
      - Topic
      - Relay
      - NotificationHub
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EntitySAS
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the unique authorization rule name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Namespace
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the namespace name to apply the authorization rule.
      If no *EntityName* provided the rule will be on the namespace level.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Permission
    type: <xref href="AccessRights" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The authorization permissions (Send, Manage, Listen).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PrimaryKey
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Shared Access Signature primary key.
      Will be generated if not provided.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SecondaryKey
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Shared Access Signature secondary key.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzureSBAuthorizationRule
        -Name <String>
        -Namespace <String>
        -EntityName <String>
        -EntityType <ServiceBusEntityType>
        [-Permission <AccessRights[]>]
        [-PrimaryKey <String>]
        [-SecondaryKey <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: EntitySAS
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzureSBAuthorizationRule
        -Name <String>
        -Namespace <String>
        [-Permission <AccessRights[]>]
        [-PrimaryKey <String>]
        [-SecondaryKey <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: NamespaceSAS
  isDefault: false
examples:
- title: 'Example 1: Create an authorization rule with generated primary key'
  description: |-
    ```
    PS C:\> New-AzureSBAuthorizationRule -Name MyRule -Namespace MyNamespace -Permission $("Send")
    ```

    Creates new authorization rule on namespace level with Send permission.
- title: 'Example 2: Creates an authorization rule by providing the primary key'
  description: |-
    ```
    PS C:\> New-AzureSBAuthorizationRule -Name MyRule -Namespace MyNamespace -Permission $("Manage", "Listen", "Send") -EntityName MyEntity -EntityType Queue -PrimaryKey P+lL/Mnd2Z9sj5hwMrRyAxQDdX8RHfbdqU2eIAqs1rc=
    ```

    Creates new authorization rule on MyEntity Queue level with all permissions.
