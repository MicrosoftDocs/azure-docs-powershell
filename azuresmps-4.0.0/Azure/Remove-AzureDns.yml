syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureDns
        [-Name] <String>
        [-ServiceName] <String>
        [-Force]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
