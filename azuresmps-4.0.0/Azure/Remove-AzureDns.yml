examples:
- title: 'Example 1: Remove a DNS server from a service'
  description: |-
    ```
    PS C:\> Remove-AzureDns -ServiceName "ContosoService" -Name "Dns07"
    ```

    This command removes the DNS server named Dns07 from ContosoService.
