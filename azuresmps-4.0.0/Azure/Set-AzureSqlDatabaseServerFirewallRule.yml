syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureSqlDatabaseServerFirewallRule
        -ServerName <String>
        -RuleName <String>
        -StartIpAddress <String>
        -EndIpAddress <String>
        [-Force]
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.SqlDatabase.Model.SqlDatabaseServerFirewallRuleContext" data-throw-if-not-resolved="False" />
