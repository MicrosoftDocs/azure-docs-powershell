syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureVMExtension
        [[-ReferenceName] <String>]
        -VM <IPersistentVM>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ListByReferenceName
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzureVMExtension
        [-ExtensionName] <String>
        [-Publisher] <String>
        [[-Version] <String>]
        -VM <IPersistentVM>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ListByExtensionName
  isDefault: false
examples:
- title: 'Example 1: Get the resource extensions applied to a virtual machine'
  description: |-
    ```
    PS C:\> Get-AzureVM -ServiceName $SVC -Name $VM | Get-AzureVMExtension;
    ```

    This command gets the resource extensions applied to the specified virtual machine as stored in the variable $VM.
