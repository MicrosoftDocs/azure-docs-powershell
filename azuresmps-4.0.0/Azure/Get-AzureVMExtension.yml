uid: Azure.Get-AzureVMExtension
name: Get-AzureVMExtension
module: Azure
isPreview: false
summary: |-
  Gets resource extensions applied to virtual machines.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
