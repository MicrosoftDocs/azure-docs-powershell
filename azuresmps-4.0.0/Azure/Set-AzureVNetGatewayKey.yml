### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureVNetGatewayKey
name: Set-AzureVNetGatewayKey
module: Azure
isPreview: false
summary: |-
  Sets the pre-shared key for the connection between an Azure VPN gateway and a local network site.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Set-AzureVNetGatewayKey** cmdlet sets the pre-shared key for the connection between an Azure virtual private network (VPN) gateway and an on-premises local network site.
  The key must be equal to the key configured on the gateway of the local network site.
  If the keys do not match, a connection cannot establish.
parameters:
  cmdletParameters:
  - name: LocalNetworkSiteName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the local network site that connects to the virtual network gateway.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SharedKey
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the shared key to assign to the VPN gateway.
      The value must be an alpha-numerical string no longer than 128 characters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VNetName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the virtual network for which this cmdlet sets the shared key for the connection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureVNetGatewayKey
        -VNetName <String>
        -LocalNetworkSiteName <String>
        -SharedKey <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
