### YamlMime:PowerShellCmdlet1
uid: Azure.Get-AzureStoreAddOn
name: Get-AzureStoreAddOn
module: Azure
isPreview: false
summary: |-
  Gets the available Azure Store add-ons.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  This topic describes the cmdlet in the 0.8.10 version of the Microsoft Azure PowerShell module.
  To get the version of the module you're using, in the Azure PowerShell console, type `(Get-Module -Name Azure).Version`.

  Gets all the available add-ons for purchasing from the Azure Store, or gets the existing add-on instances for the current subscription.
parameters:
  cmdletParameters:
  - name: Country
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      If specified, returns only the Azure Store add-on instances available in the specified country.
      The default is "US".
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListAvailable
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ListAvailable
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      If specified, gets available add-ons for purchasing from the Azure Store.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListAvailable
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Returns the add-on that matches the specified name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: GetAddOn
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureStoreAddOn
        [-ListAvailable]
        [-Country <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ListAvailable
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureStoreAddOn
        [-Name <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: GetAddOn
  isDefault: false
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Get-AzureStoreAddOn
    ```

    This example gets all purchased add-on instances for the current subscription.
- title: Example 2
  description: |-
    ```
    PS C:\> Get-AzureStoreAddOn -ListAvailable
    ```

    This example gets all the available add-ons for purchasing in United States from the Azure Store.
- title: Example 3
  description: |-
    ```
    PS C:\> Get-AzureStoreAddOn -Name MyAddOn
    ```

    This example gets an add-on named MyAddOn from the purchased add-on instance in the current subscription.
