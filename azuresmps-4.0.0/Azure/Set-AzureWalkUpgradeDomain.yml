    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureWalkUpgradeDomain
        [-ServiceName] <String>
        [-Slot] <String>
        [-DomainNumber] <Int32>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="ManagementOperationContext" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Initiate an upgrade of a production deployment'
  description: |-
    ```
    PS C:\> Set-AzureWalkUpgradeDomain -ServiceName "MySvc1" -slot "Production" -UpgradeDomain 2
    ```

    This command initiates the upgrade of Upgrade Domain 2 of the production deployment of the MySvc1 service.
