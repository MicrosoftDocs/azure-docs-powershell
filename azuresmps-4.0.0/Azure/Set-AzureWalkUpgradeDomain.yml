### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureWalkUpgradeDomain
name: Set-AzureWalkUpgradeDomain
module: Azure
isPreview: false
summary: |-
  Walks the specified upgrade domain.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Set-AzureWalkUpgradeDomain** cmdlet initiates the actual upgrade of an Azure deployment.
  The upgrade package and configuration are set by using the **Set-AzureDeployment** cmdlet with the -Upgrade switch.
parameters:
  cmdletParameters:
  - name: DomainNumber
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the upgrade domain to upgrade.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InformationAction
