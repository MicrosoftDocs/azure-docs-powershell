syntaxes:
- syntax: |-
    ```Syntax
    Start-AzureAutomationRunbook
        -Name <String>
        [-Parameters <IDictionary>]
        [-RunOn <String>]
        -AutomationAccountName <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.Commands.Automation.Model.Job" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Start a runbook job'
  description: |-
    ```
    PS C:\> Start-AzureAutomationRunbook -AutomationAccountName "Contoso17" -Name "Runbk01"
    ```

    This command starts a runbook job for the runbook named Runbk01 in the Automation account named Contoso17.
