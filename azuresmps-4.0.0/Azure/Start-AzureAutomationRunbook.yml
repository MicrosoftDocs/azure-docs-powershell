### YamlMime:PowerShellCmdlet1
uid: Azure.Start-AzureAutomationRunbook
name: Start-AzureAutomationRunbook
module: Azure
isPreview: false
summary: |-
  Starts a runbook job.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  [!INCLUDE [aa-deprecation](../include/aa-deprecation.yml)]

  The **Start-AzureAutomationRunbook** cmdlet starts a Microsoft Azure Automation runbook job.
  Specify the ID or name of a runbook.
