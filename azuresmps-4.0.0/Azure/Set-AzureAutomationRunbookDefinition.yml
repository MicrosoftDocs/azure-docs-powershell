syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureAutomationRunbookDefinition
        -Name <String>
        -Path <String>
        [-Overwrite]
        -AutomationAccountName <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.Commands.Automation.Model.RunbookDefinition" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Overwrite an existing draft definition of a runbook'
  description: |-
    ```
    PS C:\> Set-AzureAutomationRunbookDefinition -AutomationAccountName "Contoso17" -Name "Runbk01" -Path ".\App01.ps1" -Overwrite
    ```

    This command overwrites the existing draft definition of a runbook.
