### YamlMime:PowerShellCmdlet1
uid: Azure.Remove-AzureSchedulerJob
name: Remove-AzureSchedulerJob
module: Azure
isPreview: false
summary: |-
  Deletes a scheduler job.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  This topic describes the cmdlet in the 0.8.10 version of the Microsoft Azure PowerShell module.
  To get the version of the module you're using, in the Azure PowerShell console, type `(Get-Module -Name Azure).Version`.

  The **Remove-AzureSchedulerJob** cmdlet deletes a scheduler job.
parameters:
  cmdletParameters:
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet removes the scheduler job without prompting you for confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: JobCollectionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the collection that contains the scheduler job to delete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: JobName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a scheduler job to delete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the location that hosts the cloud service.
      Valid values are:

      - Anywhere Asia
      - Anywhere Europe
      - Anywhere US
      - East Asia
      - East US
      - North Central US
      - North Europe
      - South Central US
      - Southeast Asia
      - West Europe
      - West US
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureSchedulerJob
        [-Force]
        [-Location <String>]
        -JobCollectionName <String>
        -JobName <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Delete a scheduler job'
  description: |-
    ```
    PS C:\> Remove-AzureSchedulerJob -Location "North Central US" -JobCollectionName "JobCollection01" -JobName "Job17"
    ```

    This command deletes the job named Job17.
    That job is part of the job collection named JobCollection01 and is in of the specified location.
