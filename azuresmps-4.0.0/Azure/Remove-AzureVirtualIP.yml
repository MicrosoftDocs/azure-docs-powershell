examples:
- title: 'Example 1: Remove a virtual IP address from a service'
  description: |-
    ```
    PS C:\> Remove-AzureVirtualIP -VirtualIPName "Vip01" -ServiceName "ContosoService03"
    ```

    This command removes a virtual IP address from a service.
