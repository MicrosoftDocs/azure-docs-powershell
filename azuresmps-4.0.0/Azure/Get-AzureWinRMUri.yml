syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureWinRMUri
        [-ServiceName] <String>
        [[-Name] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get the URI of the WinRM https listener to a virtual machine'
  description: |-
    ```
    PS C:\> Get-AzureWinRMUri -ServiceName MyService -Name MyVM
    ```

    This command gets the UIR of the WinRM https listener to a virtual machine.
- title: 'Example 2: Get the URI of the WinRM https listener to a virtual machine of a specific service'
  description: |-
    ```
    PS C:\> Get-AzureWinRMUri -ServiceName MyService
    ```

    This command gets the UIR of the WinRM https listener to a virtual machine.
