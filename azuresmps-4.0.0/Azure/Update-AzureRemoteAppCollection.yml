syntaxes:
- syntax: |-
    ```Syntax
    Update-AzureRemoteAppCollection
        [-CollectionName] <String>
        [-ImageName] <String>
        [[-SubnetName] <String>]
        [-ForceLogoffWhenUpdateComplete]
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
