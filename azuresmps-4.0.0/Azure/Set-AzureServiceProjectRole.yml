syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureServiceProjectRole
        -Instances <Int32>
        [-RoleName <String>]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Instances
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureServiceProjectRole
        -Runtime <String>
        -Version <String>
        [-RoleName <String>]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Runtime
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureServiceProjectRole
        -VMSize <String>
        [-RoleName <String>]
        [-PassThru]
        [-Profile <AzureSMProfile>]
