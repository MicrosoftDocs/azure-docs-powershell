  isDefault: false
- syntax: |-
    ```Syntax
    Move-AzureService
        [-ServiceName] <String>
        [-DeploymentName] <String>
        [-Validate]
        [-CreateNewVirtualNetwork]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
