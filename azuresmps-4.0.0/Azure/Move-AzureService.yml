    ```
  parameterSetName: ValidateNewMigrationParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Move-AzureService
        [-ServiceName] <String>
        [-DeploymentName] <String>
        [-VirtualNetworkResourceGroupName] <String>
        [-VirtualNetworkName] <String>
        [-SubnetName] <String>
        [-Validate]
        [-UseExistingVirtualNetwork]
