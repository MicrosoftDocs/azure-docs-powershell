syntaxes:
- syntax: |-
    ```Syntax
    Move-AzureService
        [-ServiceName] <String>
        [-DeploymentName] <String>
        [-Abort]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: AbortMigrationParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Move-AzureService
        [-ServiceName] <String>
        [-DeploymentName] <String>
        [-Commit]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: CommitMigrationParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Move-AzureService
        [-ServiceName] <String>
        [-DeploymentName] <String>
        [-Prepare]
