  cmdletParameters:
  - name: AutomationAccountName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an Automation account.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
