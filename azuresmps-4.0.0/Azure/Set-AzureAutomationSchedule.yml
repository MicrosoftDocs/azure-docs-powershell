### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureAutomationSchedule
name: Set-AzureAutomationSchedule
module: Azure
isPreview: false
summary: |-
  Modifies an Automation schedule.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  [!INCLUDE [aa-deprecation](../include/aa-deprecation.yml)]

  The **Set-AzureAutomationSchedule** cmdlet modifies a schedule in Microsoft Azure Automation.
