syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureAutomationSchedule
        -Name <String>
        [-IsEnabled <Boolean>]
        [-Description <String>]
        -AutomationAccountName <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.Commands.Automation.Model.Schedule" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Modify a schedule'
  description: |-
    ```
    PS C:\> Set-AzureAutomationSchedule -AutomationAccountName "Contoso17" -Name "Schedule01" -Description "Automation Schedule"
    ```

    This command modifies the description of the schedule named Schedule01.
