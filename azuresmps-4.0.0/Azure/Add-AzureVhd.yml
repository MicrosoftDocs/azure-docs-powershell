  - name: BaseImageUriToPatch
    type: <xref href="Uri" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an URI to a base image blob in Azure Blob Storage.
      SAS in URI input is supported as well.
    aliases:
    - bs
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Destination
    type: <xref href="Uri" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a URI to a blob in Microsoft Azure Blob Storage.
      SAS in URI input is supported.
      However, in patching scenarios the destination cannot be a SAS URI.
    aliases:
    - dst
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
