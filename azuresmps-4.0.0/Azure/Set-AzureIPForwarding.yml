### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureIPForwarding
name: Set-AzureIPForwarding
module: Azure
isPreview: false
summary: |-
  Enables or disables IP forwarding.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Set-AzureIPForwarding** cmdlet enables or disables IP forwarding for a virtual machine, for a platform as a service (PaaS) role, or a network adapter that belongs to a virtual machine or PaaS role.
parameters:
  cmdletParameters:
  - name: Disable
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet disables IP forwarding.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DisableIaaSIPForwardingParamSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: DisableSlotIPForwardingParamSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Enable
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet enables IP forwarding.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableIaaSIPForwardingParamSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: EnableSlotIPForwardingParamSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NetworkInterfaceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the network adapter on which this cmdlet sets IP forwarding.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RoleName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a PaaS role on which this cmdlet sets IP forwarding.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableSlotIPForwardingParamSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: DisableSlotIPForwardingParamSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServiceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a cloud service.
      The PaaS role belongs to the service that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Slot
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a PaaS slot.
      The PaaS role for which this cmdlet sets forwarding has the slot that this parameter specifies.
      Valid values are:

      - Production
      - Staging

      The default value is Production.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableSlotIPForwardingParamSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: DisableSlotIPForwardingParamSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VM
    type: <xref href="PersistentVMRoleContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the virtual machine object on which this cmdlet sets IP forwarding.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnableIaaSIPForwardingParamSet
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: DisableIaaSIPForwardingParamSet
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureIPForwarding
        -VM <PersistentVMRoleContext>
        -ServiceName <String>
        [-NetworkInterfaceName <String>]
        [-Enable]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: EnableIaaSIPForwardingParamSet
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureIPForwarding
        -VM <PersistentVMRoleContext>
        -ServiceName <String>
        [-NetworkInterfaceName <String>]
        [-Disable]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: DisableIaaSIPForwardingParamSet
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureIPForwarding
        -ServiceName <String>
        -RoleName <String>
        [-Slot <String>]
        [-NetworkInterfaceName <String>]
        [-Enable]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: EnableSlotIPForwardingParamSet
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureIPForwarding
        -ServiceName <String>
        -RoleName <String>
        [-Slot <String>]
        [-NetworkInterfaceName <String>]
        [-Disable]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: DisableSlotIPForwardingParamSet
  isDefault: false
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Enable IP forwarding for a virtual machine'
  description: |-
    ```
    PS C:\> Get-AzureVM -ServiceName "ContosoService" -Name "ContosoVM06" | Set-AzureIPForwarding -Enable
    ```

    This command gets a virtual machine named ContosoVM06 for the service named ContosoService, and passes that virtual machine object to the current cmdlet.
    The current cmdlet enables IP forwarding for that virtual machine.
- title: 'Example 2: Disable IP forwarding for a virtual machine'
  description: |-
    ```
    PS C:\> Get-AzureVM -ServiceName "ContosoService" -Name "ContosoVM06" | Set-AzureIPForwarding -Disable
    ```

    This command gets a virtual machine named ContosoVM06 for the service named ContosoService, and passes that virtual machine object to the current cmdlet.
    The current cmdlet disables IP forwarding for that virtual machine.
