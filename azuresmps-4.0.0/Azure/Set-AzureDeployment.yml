syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureDeployment
        [-ServiceName] <String>
        [-Package] <String>
        [-Configuration] <String>
        [-Slot] <String>
        [[-Mode] <String>]
        [[-Label] <String>]
        [[-RoleName] <String>]
        [[-ExtensionConfiguration] <ExtensionConfigurationInput[]>]
        [-Upgrade]
        [-Force]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Upgrade
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureDeployment
        [-ServiceName] <String>
        [-Configuration] <String>
        [-Slot] <String>
        [[-ExtensionConfiguration] <ExtensionConfigurationInput[]>]
        [-Config]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Config
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureDeployment
        [-ServiceName] <String>
        [-Slot] <String>
        [-NewStatus] <String>
        [-Status]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Status
  isDefault: false
examples:
- title: 'Example 1: Change the status of a deployment'
  description: |-
    ```
    PS C:\> Set-AzureDeployment -Status -ServiceName "ContosoService" -Slot "Production" -NewStatus "Running"
    ```

    This command sets the status of the deployment for the service named ContosoService in the production environment to Running.
- title: 'Example 2: Assign a different configuration file to a deployment'
  description: |-
    ```
    PS C:\> Set-AzureDeployment -Config -ServiceName "ContosoService" -Slot "Staging" -Configuration "C:\Temp\MyServiceConfig.Cloud.cscfg"
    ```

    This command assigns a different configuration file for the deployment for the service named ContosoService in the staging environment.
- title: 'Example 3: Set the upgrade mode to Auto'
  description: |-
    ```
    PS C:\> Set-AzureDeployment -Upgrade -ServiceName "ContosoService" -Mode Auto -Package "C:\packages\ContosoApp.cspkg" -Configuration "C:\Config\ContosoServiceConfig.Cloud.cscfg"
    ```

    This command sets the upgrade mode to Auto, and specifies an upgrade package and a new configuration file.
- title: 'Example 4: Install extension configuration in a service'
  description: |-
    ```
    PS C:\> Set-AzureDeployment -Config -ServiceName "ContosoService" -Mode "Automatic" -Package "https://contosostorage.blob.core.windows.net/container06/ContosoPackage.cspkg" -Configuration "C:\packages\ContosoConfiguration.cscfg" -Slot "Production" -ExtensionConfiguration "C:\packages\ContosoExtensionConfig.cscfg"
    ```

    This command installs the extension configuration in the specified Cloud Service and applies them on roles.
