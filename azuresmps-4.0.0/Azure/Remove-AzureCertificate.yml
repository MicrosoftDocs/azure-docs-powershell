syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureCertificate
        [-ServiceName] <String>
        [-ThumbprintAlgorithm] <String>
        [-Thumbprint] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
