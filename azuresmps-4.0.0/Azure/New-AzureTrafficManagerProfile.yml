### YamlMime:PowerShellCmdlet1
uid: Azure.New-AzureTrafficManagerProfile
name: New-AzureTrafficManagerProfile
module: Azure
isPreview: false
summary: |-
  Creates a Traffic Manager profile.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-AzureTrafficManagerProfile** cmdlet creates a Microsoft Azure Traffic Manager profile.

  After you create a profile where you set the *LoadBalancingMethod* value to "Failover", you can determine the failover order of the endpoints you add to your profile with the Add-AzureTrafficManagerEndpoint cmdlet.
  For more information, see Example 2 below.
parameters:
  cmdletParameters:
  - name: DomainName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the domain name of the Traffic Manager profile.
      This must be a subdomain of trafficmanager.net.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LoadBalancingMethod
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the load balancing method to use to distribute the connection.
      Valid values are:

      - Performance
      - Failover
      - RoundRobin
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MonitorPort
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the port used to monitor endpoint health.
      Valid values are integer values greater than 0 and less than or equal to 65,535.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MonitorProtocol
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the protocol to use to monitor endpoint health.
      Valid values are:

      - Http

      - Https
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MonitorRelativePath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path relative to the endpoint domain name to probe for health state.
      The path must meet the following restrictions:

      - The path must be from 1 through 1000 characters.

      - It must start with a forward slash, /.

      - It must contain no XML elements, \<\>.

      - It must contain no double slashes, //.

      - It must contain no invalid HTML escape characters.
      For example, %XY.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Traffic Manager profile to create.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Ttl
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the DNS Time-to-Live (TTL) that informs the Local DNS resolvers how long to cache DNS entries.
      Valid values are integers from 30 through 999,999.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
