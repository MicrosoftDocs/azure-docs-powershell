    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureVMAccessExtension
        [[-UserName] <String>]
        [[-Password] <String>]
        [[-ReferenceName] <String>]
        [[-Version] <String>]
        -VM <IPersistentVM>
        [-ForceUpdate]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: EnableAccessExtension
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzureVMAccessExtension
        [[-ReferenceName] <String>]
        [[-Version] <String>]
        -VM <IPersistentVM>
        [-Disable]
        [-ForceUpdate]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: DisableAccessExtension
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureVMAccessExtension
        [[-ReferenceName] <String>]
        [[-Version] <String>]
        -VM <IPersistentVM>
        [-Uninstall]
        [-ForceUpdate]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: UninstallAccessExtension
  isDefault: false
examples:
- title: 'Example 1: Set the VMAccess extension applied to a specified virtual machine'
  description: |-
    ```
    PS C:\> Set-AzureVMAccessExtension -VM $VM -UserName $User -Password $PWD;
    ```

    This command sets the VMAccess extension applied to the specified virtual machine as stored in the variable $VM.
