syntaxes:
- syntax: |-
    ```Syntax
    New-AzureCertificateSetting
        [[-StoreName] <String>]
        [-Thumbprint] <String>
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
