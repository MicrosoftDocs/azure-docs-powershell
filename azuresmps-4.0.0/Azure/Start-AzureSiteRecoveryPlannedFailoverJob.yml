### YamlMime:PowerShellCmdlet1
uid: Azure.Start-AzureSiteRecoveryPlannedFailoverJob
name: Start-AzureSiteRecoveryPlannedFailoverJob
module: Azure
isPreview: false
summary: |-
  Starts a Site Recovery planned failover operation.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Start-AzureSiteRecoveryPlannedFailoverJob** cmdlet starts a planned failover for an Azure Site Recovery protection entity or recovery plan.
  You can check whether the job succeeds by using the **Get-AzureSiteRecoveryJob** cmdlet.
parameters:
  cmdletParameters:
  - name: Direction
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the direction of the failover.
      The acceptable values for this parameter are:

      - PrimaryToRecovery
      - RecoveryToPrimary
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Optimize
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies what to optimize for.
      This parameter applies for failover from an Azure site to an on-premise site which requires a significant data synchronization.
      The acceptable values for this parameter are:

      - ForDowntime
      - ForSynchronization

      When **ForDowntime** is specified, this indicates that data is synchronized before failover to minimize downtime.
      Synchronization is performed without shutting down the virtual machine.
      After synchronization is complete, the job is suspended.
      Resume the job to do an additional synchronization operation that shuts down the virtual machine.

      When **ForSynchronization** is specified, this indicates that data is synchronized during failover only so data synchronization is minimized.
      Because this setting is enabled, the virtual machine is shut down immediately.
      Synchronization starts after shutdown to complete the failover operation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProtectionContainerId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of the protected container for which to start the job.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPEId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProtectionEntity
    type: <xref href="ASRProtectionEntity" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Site Recovery protection entity object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPEObject
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProtectionEntityId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an **ASRProtectionEntity** object for which to start the job.
      To obtain an **ASRProtectionEntity** object, use the **Get-AzureSiteRecoveryProtectionEntity** cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPEId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RecoveryPlan
    type: <xref href="ASRRecoveryPlan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a recovery plan object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByRPObject
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RPId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of a recovery plan for which to start the job.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByRPId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WaitForCompletion
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet waits for the operation to complete before it returns control to the Windows PowerShell console.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
