syntaxes:
- syntax: |-
    ```Syntax
    Start-AzureSiteRecoveryPlannedFailoverJob
        -RPId <String>
        -Direction <String>
        [-WaitForCompletion]
        [-Optimize <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByRPId
  isDefault: true
- syntax: |-
    ```Syntax
    Start-AzureSiteRecoveryPlannedFailoverJob
        -ProtectionEntityId <String>
        -ProtectionContainerId <String>
        -Direction <String>
        [-WaitForCompletion]
        [-Optimize <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByPEId
  isDefault: false
- syntax: |-
    ```Syntax
    Start-AzureSiteRecoveryPlannedFailoverJob
        -RecoveryPlan <ASRRecoveryPlan>
