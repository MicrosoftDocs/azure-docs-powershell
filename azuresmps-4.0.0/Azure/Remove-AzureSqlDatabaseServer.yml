examples:
- title: 'Example 1: Remove a database server'
  description: |-
    ```
    PS C:\>Remove-AzureSqlDatabaseServer -ServerName "lpqd0zbr8y"
    ```

    This command removes the Azure SQL Database server named lpqd0zbr8y.
