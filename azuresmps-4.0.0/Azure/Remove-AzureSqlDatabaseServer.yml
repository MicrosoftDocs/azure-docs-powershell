syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureSqlDatabaseServer
        -ServerName <String>
        [-Force]
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
