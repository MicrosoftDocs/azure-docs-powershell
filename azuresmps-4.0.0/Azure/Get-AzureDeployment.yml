    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the service.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
