    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Update-AzureDisk
        [-DiskName] <String>
        [[-Label] <String>]
        [-ResizedSizeInGB] <Int32>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Resize
  isDefault: false
- syntax: |-
    ```Syntax
    Update-AzureDisk
        [-DiskName] <String>
        [-Label] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: NoResize
  isDefault: false
outputs:
- name: <xref href="DiskContext" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Change the label of a disk'
  description: |-
    ```
    PS C:\> Update-AzureDisk ?DiskName "ContosoOSDisk" -Label "DoNotUse"
    ```

    This command changes the label of the disk named ContosoOSDisk to DoNotUse.
