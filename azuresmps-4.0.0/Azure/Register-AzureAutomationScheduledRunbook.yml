syntaxes:
- syntax: |-
    ```Syntax
    Register-AzureAutomationScheduledRunbook
        -AutomationAccountName <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByRunbookName
  isDefault: true
- syntax: |-
    ```Syntax
    Register-AzureAutomationScheduledRunbook
        -RunbookName <String>
        -ScheduleName <String>
        -AutomationAccountName <String>
        [-Parameters <IDictionary>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByRunbookNameAndScheduleName
  isDefault: false
outputs:
- name: <xref href="Microsoft.Azure.Commands.Automation.Model.JobSchedule" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Associate a runbook with a schedule'
  description: |-
    ```
    PS C:\> Register-AzureAutomationScheduledRunbook -AutomationAccountName "Contoso17" -Name "Runbk01" -ScheduleName "Sched01"
    ```

    This command associates the runbook named Runbk01 with the schedule named Sched01 in the Azure Automation account named Contoso17.
