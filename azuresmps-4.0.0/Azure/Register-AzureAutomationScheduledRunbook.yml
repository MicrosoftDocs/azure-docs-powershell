### YamlMime:PowerShellCmdlet1
uid: Azure.Register-AzureAutomationScheduledRunbook
name: Register-AzureAutomationScheduledRunbook
module: Azure
isPreview: false
summary: |-
  Associates a runbook with a schedule.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  [!INCLUDE [aa-deprecation](../include/aa-deprecation.yml)]

  The **Register-AzureAutomationScheduledRunbook** cmdlet associates a runbook with a schedule.
  The runbook starts based on the schedule you specify using the *ScheduleName* parameter.
