syntaxes:
- syntax: |-
    ```Syntax
    New-AzureInternalLoadBalancerConfig
        [-InternalLoadBalancerName] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ServiceAndSlot
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzureInternalLoadBalancerConfig
        [-InternalLoadBalancerName] <String>
        [-SubnetName] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SubnetNameOnly
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzureInternalLoadBalancerConfig
        [-InternalLoadBalancerName] <String>
        [-SubnetName] <String>
        [-StaticVNetIPAddress] <IPAddress>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SubnetNameAndIP
  isDefault: false
outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.ServiceManagement.Model.InternalLoadBalancerConfig" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Create an internal load balancer configuration'
  description: |-
    ```
    PS C:\> $IlbConfig = New-AzureInternalLoadBalancerConfig -InternalLoadBalancerName "Contoso" -SubnetName "FrontEndSubnet"
    ```

    This command creates an internal load balancer configuration for the subnet named FrontEndSubnet.
    The command stores the configuration in the $IlbConfig variable for you to use for a virtual machine deployment.
