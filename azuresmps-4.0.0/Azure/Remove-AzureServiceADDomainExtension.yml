    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureServiceADDomainExtension
        [[-ServiceName] <String>]
        [[-Slot] <String>]
        [[-Role] <String[]>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByRoles
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzureServiceADDomainExtension
        [[-ServiceName] <String>]
        [[-Slot] <String>]
        [-UninstallConfiguration]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveAllRoles
  isDefault: false
examples:
- title: 'Example 1: Remove an AD domain extension'
  description: |-
    ```
    PS C:\> Remove-AzureServiceADDomainExtension -ServiceName $Svc
    ```

    This command removes the extension specified by the $Svc variable.
- title: 'Example 2: Remove an AD Domain extension for a specified role'
  description: |-
    ```
    PS C:\> Remove-AzureServiceADDomainExtension -ServiceName $Svc -Role "WebRole1"
    ```

    This command removes the service extension for the specified role.
