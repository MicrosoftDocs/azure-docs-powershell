uid: Azure.Get-AzureWebsiteJobHistory
name: Get-AzureWebsiteJobHistory
module: Azure
isPreview: false
summary: |-
  Gets a web job history.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
