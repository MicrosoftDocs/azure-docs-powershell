syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureWebsiteJobHistory
        -JobName <String>
        [-Name <String>]
        [-Slot <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: HistoryParameterSetName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureWebsiteJobHistory
        -JobName <String>
        -RunId <String>
        [-Name <String>]
        [-Slot <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: RunIdParameterSetName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureWebsiteJobHistory
        -JobName <String>
        [-Latest]
        [-Name <String>]
        [-Slot <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: LatestParameterSetName
  isDefault: false
examples:
- title: 'Example 1: Get complete history for a web job'
  description: |-
    ```
    PS C:\> Get-AzureWebsiteJobHistory -Name MyWebsite -JobName MyWebJob
    ```

    Gets complete history for MyWebJob.
- title: 'Example 2: Get latest run for a web job'
  description: |-
    ```
    PS C:\> Get-AzureWebsiteJobHistory -Name MyWebsite -JobName MyWebJob -Latest
    ```

    Gets latest run info for MyWebJob.
- title: 'Example 3: Get specific run for a web job'
  description: |-
    ```
    PS C:\> Get-AzureWebsiteJobHistory -Name MyWebsite -JobName MyWebJob -RunId 10
    ```

    Gets all info about run with id 10 for MyWebJob.
