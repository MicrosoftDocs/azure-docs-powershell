syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureReservedIP
        [[-ReservedIPName] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get all reserved IP addresses'
  description: |-
    ```
    PS C:\> Get-AzureReservedIP
    ```

    This command gets all reserved IP addresses.
- title: 'Example 2: Get a reserved IP address with a specified name'
  description: |-
    ```
    PS C:\> Get-AzureReservedIP -ReservedIPName $IpName
    ```

    This command gets the reserved IP address that has the name specified by the $IpName variable.
