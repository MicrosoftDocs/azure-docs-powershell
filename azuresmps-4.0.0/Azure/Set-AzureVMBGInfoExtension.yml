syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureVMBGInfoExtension
        [[-ReferenceName] <String>]
        [[-Version] <String>]
        -VM <IPersistentVM>
        [-Disable]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SetBGInfoExtension
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzureVMBGInfoExtension
        [[-ReferenceName] <String>]
        [[-Version] <String>]
        -VM <IPersistentVM>
        [-Uninstall]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: UninstallBGInfoExtension
  isDefault: false
examples:
- title: 'Example 1: Set the BGInfo extension for a virtual machine'
  description: |-
    ```
    PS C:\> Set-AzureVMBGInfoExtension -VM $VM
    ```

    This command sets the BGInfo extension for the specified virtual machine as stored in the variable $VM.
