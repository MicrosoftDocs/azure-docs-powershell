syntaxes:
- syntax: |-
    ```Syntax
    New-WAPackQuickVM
        -Name <String>
        -Template <VMTemplate>
        -VMCredential <PSCredential>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
