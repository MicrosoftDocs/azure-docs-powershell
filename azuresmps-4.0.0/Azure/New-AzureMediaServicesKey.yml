syntaxes:
- syntax: |-
    ```Syntax
    New-AzureMediaServicesKey
        -Name <String>
        -KeyType <MediaServicesKeyType>
        [-Force]
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Update a Media Services account key'
  description: |-
    ```
    PS C:\> New-AzureMediaServicesKey -Name "mediaservicesaccount" -KeyType "Primary" -Force
    ```
