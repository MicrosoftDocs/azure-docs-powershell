syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureVMExtension
        [-ExtensionName] <String>
        [-Publisher] <String>
        -VM <IPersistentVM>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByExtensionName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzureVMExtension
        [-ReferenceName] <String>
        -VM <IPersistentVM>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByReferenceName
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzureVMExtension
        -VM <IPersistentVM>
        [-RemoveAll]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveAll
  isDefault: false
examples:
- title: 'Example 1: Remove an extension using a specific name and publisher'
  description: |-
    ```
    PS C:\> $VM = Remove-AzureVMExtension -VM $VM -ExtensionName $EXT -Publisher $PUB;
    ```

    This command removes an extension with the specified name and publisher.
- title: 'Example 2: Remove all extensions from a specific virtual machine'
  description: |-
    ```
    PS C:\> $VM = Remove-AzureVMExtension -VM $VM -RemoveAll;
    ```

    This command removes all extensions from the specified virtual machine as stored in the variable $VM.
