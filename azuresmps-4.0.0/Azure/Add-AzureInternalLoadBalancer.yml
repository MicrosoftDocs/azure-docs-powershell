syntaxes:
- syntax: |-
    ```Syntax
    Add-AzureInternalLoadBalancer
        [-InternalLoadBalancerName] <String>
        [-ServiceName] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ServiceAndSlot
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzureInternalLoadBalancer
        [-InternalLoadBalancerName] <String>
        [-ServiceName] <String>
        [-SubnetName] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SubnetNameOnly
  isDefault: false
- syntax: |-
    ```Syntax
    Add-AzureInternalLoadBalancer
        [-InternalLoadBalancerName] <String>
        [-ServiceName] <String>
        [-SubnetName] <String>
        [-StaticVNetIPAddress] <IPAddress>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SubnetNameAndIP
  isDefault: false
