syntaxes:
- syntax: |-
    ```Syntax
    New-AzureWebsiteJob
        -JobName <String>
        -JobType <WebJobType>
        -JobFile <String>
        [-Name <String>]
        [-Slot <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Create new web job for a website'
  description: |-
    ```
    PS C:\> New-AzureWebsiteJob -Name MyWebsite -JobName MyWebJob -JobType Continuous -JobFile job.bat
    ```

    Creates a continuous job to call job.bat on website MyWebsite.
