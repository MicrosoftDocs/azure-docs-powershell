uid: Azure.New-AzureWebsiteJob
name: New-AzureWebsiteJob
module: Azure
isPreview: false
summary: |-
  Creates a web job for a website.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-AzureWebsiteJob** cmdlet creates a web job for a website.
