### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureRoute
name: Set-AzureRoute
module: Azure
isPreview: false
summary: |-
  Creates a route in a route table.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Set-AzureRoute** cmdlet creates a route in a route table.
  The new route takes effect almost immediately on the virtual machines that are associated with the route table.
parameters:
  cmdletParameters:
  - name: AddressPrefix
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an address prefix for the new route.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NextHopIpAddress
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the IP address of the appliance that is the next hop for traffic that uses this route.
      Specify this value only if you specify a value of VirtualAppliance for the *NextHopType* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: NextHopType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the next hop type for traffic that uses this route.
      Valid values are:

      - VPNGateway
      - VNETLocal
      - Internet
      - VirtualAppliance
      - Null
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RouteName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name for the new route that this cmdlet adds.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RouteTable
    type: <xref href="IRouteTable" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the route table to which this cmdlet adds the new route.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureRoute
        -RouteName <String>
        -AddressPrefix <String>
        -NextHopType <String>
        [-NextHopIpAddress <String>]
        -RouteTable <IRouteTable>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Add a virtual appliance next hop route'
  description: |-
    ```
    PS C:\> New-AzureRouteTable -Name "ApplianceRouteTable" -Location "Central US" -Label "Appliance Route Table" | Set-AzureRoute -RouteName "ApplianceRoute03" -AddressPrefix "10.0.0.0/24" -NextHopType VirtualAppliance -NextHopIpAddress "10.0.1.5"

    Routes                        Name                          Location                      Label
    ------                        ----                          --------                      -----
    {approute}                    AppRT                         Central US                    Appliance Route Table
    ```

    This command creates a route table named ApplianceRouteTable in the specified location.
    The command passes that route table to the current cmdlet.
    The current cmdlet adds a route named ApplianceRoute03, which is a VirtualAppliance next hop type.
    The command specifies the next hop IP address and the address prefix for the route.
- title: 'Example 2: Add an Internet next hop route'
  description: |-
    ```
    PS C:\> Get-AzureRouteTable -Name "ApplianceRouteTable" | Set-AzureRoute -RouteName "InternetRoute" -AddressPrefix "0.0.0.0/0" -NextHopType Internet

    Routes                        Name                          Location                      Label
    ------                        ----                          --------                      -----
    {approute, internetroute}     AppRT                         Central US                    Appliance Route Table
    ```

    This command gets a route table named ApplianceRouteTable.
    The command passes that route table to the current cmdlet.
    The current cmdlet adds a route named InternetRoute, which is an Internet next hop type.
    The command specifies the address prefix for the route.
