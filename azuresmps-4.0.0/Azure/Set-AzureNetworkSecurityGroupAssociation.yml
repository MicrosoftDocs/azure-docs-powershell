syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureNetworkSecurityGroupAssociation
        -Name <String>
        -VirtualNetworkName <String>
        -SubnetName <String>
        [-Force]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: AddNetworkSecurityGroupAssociationToSubnet
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureNetworkSecurityGroupAssociation
        -Name <String>
        -VM <PersistentVMRoleContext>
        -ServiceName <String>
        [-Force]
        [-PassThru]
        [-NetworkInterfaceName <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: AddNetworkSecurityGroupAssociationToIaaSRole
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureNetworkSecurityGroupAssociation
        -Name <String>
        -RoleName <String>
        -ServiceName <String>
        [-Force]
        [-PassThru]
        [-Slot <String>]
        [-NetworkInterfaceName <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: AddNetworkSecurityGroupAssociationToPaaSRole
  isDefault: false
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Assign a virtual machine to a network security group'
  description: |-
    ```
    PS C:\> Get-AzureVM -ServiceName "ContosoService" -Name "ContosoVM06" | Set-AzureNetworkSecurityGroupAssociation -Name "ContosoNetworkSecurityGroup"
    ```

    This command gets a virtual machine named ContosoVM06 for the service named ContosoService, and passes that virtual machine object to the current cmdlet.
    The current cmdlet assigns the network security group named ContosoNetworkSecurityGroup to that virtual machine.
