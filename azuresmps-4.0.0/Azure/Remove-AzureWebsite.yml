syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureWebsite
        [-Force]
        [-Name <String>]
        [-Slot <String>]
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Remove the current website'
  description: |-
    ```
    PS C:\> Remove-AzureWebsite
    ```

    This example removes the website in Azure associated with the current directory.
- title: 'Example 2: Remove a website without confirmation'
  description: |-
    ```
    PS C:\> Remove-AzureWebsite -Name mySite -Force
    ```

    This example deletes the website named mySite without prompting for confirmation.
