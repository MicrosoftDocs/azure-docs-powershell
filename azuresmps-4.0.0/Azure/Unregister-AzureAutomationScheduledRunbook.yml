syntaxes:
- syntax: |-
    ```Syntax
    Unregister-AzureAutomationScheduledRunbook
        -JobScheduleId <Guid>
        -AutomationAccountName <String>
        [-Force]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByJobScheduleId
  isDefault: true
- syntax: |-
    ```Syntax
    Unregister-AzureAutomationScheduledRunbook
        -RunbookName <String>
        -ScheduleName <String>
        -AutomationAccountName <String>
        [-Force]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByRunbookNameAndScheduleName
  isDefault: false
examples:
- title: 'Example 1: Remove the association between a runbook and a schedule'
  description: |-
    ```
    PS C:\> Unregister-AzureAutomationScheduledRunbook -AutomationAccountName "Contoso17" -Name "Runbk01" -ScheduleName "Runbk01Sched"
    ```

    This command removes the association between the runbook named Runbk01 and the schedule named Runbk01Sched.
