### YamlMime:PowerShellCmdlet1
uid: Azure.Unregister-AzureAutomationScheduledRunbook
name: Unregister-AzureAutomationScheduledRunbook
module: Azure
isPreview: false
summary: |-
  Removes an association between a runbook and a schedule.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  [!INCLUDE [aa-deprecation](../include/aa-deprecation.yml)]

  The **Unregister-AzureAutomationScheduledRunbook** cmdlet removes the association between a Microsoft Azure Automation runbook and a schedule, which stops the runbook from starting when the schedule fires.
