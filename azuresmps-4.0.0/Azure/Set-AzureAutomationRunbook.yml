### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureAutomationRunbook
name: Set-AzureAutomationRunbook
module: Azure
isPreview: false
summary: |-
  Modifies the configuration of a runbook.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  [!INCLUDE [aa-deprecation](../include/aa-deprecation.yml)]

  The **Set-AzureAutomationRunbook** cmdlet modifies the configuration of a Microsoft Azure Automation runbook.
