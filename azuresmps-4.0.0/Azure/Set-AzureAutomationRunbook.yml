syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureAutomationRunbook
        -Name <String>
        [-Description <String>]
        [-Tags <String[]>]
        [-LogProgress <Boolean>]
        [-LogVerbose <Boolean>]
        -AutomationAccountName <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.Azure.Commands.Automation.Model.Runbook" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Enable verbose logging for a runbook'
  description: |-
    ```
    PS C:\> Set-AzureAutomationRunbook -AutomationAccountName "Contoso17" -Name "MyRunbook" -LogVerbose $True
    ```

    This command enables verbose logging for the jobs of the specified runbook in the Automation account named Contoso17.
