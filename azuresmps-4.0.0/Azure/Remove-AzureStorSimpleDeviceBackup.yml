### YamlMime:PowerShellCmdlet1
uid: Azure.Remove-AzureStorSimpleDeviceBackup
name: Remove-AzureStorSimpleDeviceBackup
module: Azure
isPreview: false
summary: |-
  Deletes a backup object.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Remove-AzureStorSimpleDeviceBackup** cmdlet deletes a single backup object.
  If you attempt to delete a backup that has already been deleted, this cmdlet returns an error.
parameters:
  cmdletParameters:
  - name: Backup
    type: <xref href="Backup" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **Backup** object to delete.
      To obtain a **Backup** object, use the **Get-AzureStorSimpleDeviceBackup** cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IdentifyByObject
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BackupId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the instance ID of a backup to delete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IdentifyById
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DeviceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the StorSimple device on which to delete a backup.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet does not prompt you for confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WaitForComplete
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet waits for the operation to complete before it returns control to the Windows PowerShell console.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
