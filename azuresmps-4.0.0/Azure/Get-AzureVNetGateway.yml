### YamlMime:PowerShellCmdlet1
uid: Azure.Get-AzureVNetGateway
name: Get-AzureVNetGateway
module: Azure
isPreview: false
summary: |-
  Gets the status of a virtual network gateway.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-AzureVNetGateway** cmdlet gets the status of an existing virtual network gateway.
parameters:
  cmdletParameters:
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VNetName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the virtual network that contains the virtual network gateway for which this cmdlet gets status.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureVNetGateway
        -VNetName <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get the status of a virtual network gateway'
  description: |-
    ```
    PS C:\> Get-AzureVNetGateway -VNetName "ContosoVN07"
    ```

    This command gets that status of the virtual network gateway for the virtual network named ContosoVN07.
