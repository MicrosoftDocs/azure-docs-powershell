### YamlMime:PowerShellCmdlet1
uid: Azure.Get-AzureRemoteAppWorkspace
name: Get-AzureRemoteAppWorkspace
module: Azure
isPreview: false
summary: |-
  Retrieves information about an Azure RemoteApp workspace.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-AzureRemoteAppWorkspace** cmdlet retrieves information about an Azure RemoteApp workspace.
parameters:
  cmdletParameters:
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureRemoteAppWorkspace
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Retrieve information about a workspace'
  description: |-
    ```
    PS C:\> Get-AzureRemoteAppWorkspace
    ClientUrl                               EndUserFeedName
    ---------                               ---------------
    https://www.remoteapp.windowsazure.com/ Contoso Work Applications
    ```

    This command retrieves information about the Azure RemoteApp workspace.
