syntaxes:
- syntax: |-
    ```Syntax
    Save-AzureVMImage
        [-ServiceName] <String>
        [-Name] <String>
        [-ImageName] <String>
        [[-ImageLabel] <String>]
        [[-OSState] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Save an existing virtual machine and then delete it from a deployment'
  description: |-
    ```
    PS C:\> Save-AzureVMImage -ServiceName "MyService" -Name "MyVM" -NewImageName "MyBaseImage" -NewImageLabel "MyBaseVM"
    ```

    This command captures an existing virtual machine and deletes it from the deployment.
