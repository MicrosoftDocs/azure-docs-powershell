syntaxes:
- syntax: |-
    ```Syntax
    New-AzureAutomationSchedule
        -Name <String>
        -StartTime <DateTimeOffset>
        -DayInterval <Byte>
        -AutomationAccountName <String>
        [-Description <String>]
        [-ExpiryTime <DateTimeOffset>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByDaily
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzureAutomationSchedule
        -Name <String>
        -StartTime <DateTimeOffset>
        -AutomationAccountName <String>
        [-Description <String>]
        [-OneTime]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByOneTime
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzureAutomationSchedule
        -Name <String>
