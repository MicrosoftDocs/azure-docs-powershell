syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureSqlDatabaseServerFirewallRule
        -ServerName <String>
        -RuleName <String>
        [-Force]
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
