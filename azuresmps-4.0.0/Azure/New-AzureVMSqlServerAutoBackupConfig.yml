    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Backup schedule type, manual or automated
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BackupSystemDbs
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Backup system databases
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CertificatePassword
    type: <xref href="SecureString" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a password to encrypt the certificate that is used to perform SQL Server encrypted backups.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
