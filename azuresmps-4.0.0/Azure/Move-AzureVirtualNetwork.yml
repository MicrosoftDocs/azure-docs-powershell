syntaxes:
- syntax: |-
    ```Syntax
    Move-AzureVirtualNetwork
        [-VirtualNetworkName] <String>
        [-Validate]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ValidateMigrationParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Move-AzureVirtualNetwork
        [-VirtualNetworkName] <String>
        [-Abort]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: AbortMigrationParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Move-AzureVirtualNetwork
        [-VirtualNetworkName] <String>
        [-Commit]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CommitMigrationParameterSet
  isDefault: false
- syntax: |-
