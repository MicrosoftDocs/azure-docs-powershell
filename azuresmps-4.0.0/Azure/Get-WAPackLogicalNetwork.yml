### YamlMime:PowerShellCmdlet1
uid: Azure.Get-WAPackLogicalNetwork
name: Get-WAPackLogicalNetwork
module: Azure
isPreview: false
summary: |-
  Gets logical network objects.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  These topics are deprecated and will be removed in the future.
  This topic describes the cmdlet in the 0.8.1 version of the Microsoft Azure PowerShell module.
  To find out the version of the module you're using, from the Azure PowerShell console, type `(Get-Module -Name Azure).Version`.

  The **Get-WAPackLogicalNetwork** cmdlet gets logical network objects.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a logical network.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WAPackLogicalNetwork
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Empty
  isDefault: true
- syntax: |-
    ```Syntax
    Get-WAPackLogicalNetwork
        [-Name <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: FromName
  isDefault: false
examples:
- title: 'Example 1: Get a logical network by using a name'
  description: |-
    ```
    PS C:\> Get-WAPackLogicalNetwork -Name "ContosoLogicalNetwork01"
    ```

    This command gets a logical network named ContosoLogicalNetwork01.
- title: 'Example 2: Get all logical networks'
  description: |-
    ```
    PS C:\> Get-WAPackLogicalNetwork
    ```

    This command gets all logical networks.
