uid: Azure.New-AzureAutomationVariable
name: New-AzureAutomationVariable
module: Azure
isPreview: false
summary: |-
  Creates an Automation variable.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  [!INCLUDE [aa-deprecation](../include/aa-deprecation.yml)]

  The **New-AzureAutomationVariable** cmdlet creates a variable in Microsoft Azure Automation.
