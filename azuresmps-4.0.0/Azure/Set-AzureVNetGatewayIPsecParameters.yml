### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureVNetGatewayIPsecParameters
name: Set-AzureVNetGatewayIPsecParameters
module: Azure
isPreview: false
summary: |-
  Sets IPsec parameters for the connection between a virtual network gateway and a local network site.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Set-AzureVNetGatewayIPsecParameters** cmdlet sets Internet Protocol security (IPsec) and Internet Key Exchange (IKE) parameters for the connection between a virtual network gateway and a local network site.
parameters:
  cmdletParameters:
  - name: EncryptionType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the encryption type for the virtual network gateway.
      Valid values are:

      - NoEncryption
      - RequireEncryption
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LocalNetworkSiteName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the local network site connection on which this cmdlet configures the IPsec and IKE parameters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PfsGroup
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the perfect forward secrecy (PFS) group.
      Valid values are:

      - PFS1
      - None
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SADataSizeKilobytes
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the size, in kilobytes, of the security association (SA).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SALifetimeSeconds
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the period, in seconds, of the security association.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VNetName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the virtual network for which this cmdlet sets IPsec parameters for the connection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureVNetGatewayIPsecParameters
        -VNetName <String>
        -LocalNetworkSiteName <String>
        [-EncryptionType <String>]
        [-PfsGroup <String>]
        [-SADataSizeKilobytes <Int32>]
        [-SALifetimeSeconds <Int32>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
