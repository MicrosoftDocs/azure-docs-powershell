### YamlMime:PowerShellCmdlet1
uid: Azure.Get-AzureSiteRecoveryServer
name: Get-AzureSiteRecoveryServer
module: Azure
isPreview: false
summary: |-
  Gets Site Recovery servers registered a Site Recovery vault.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-AzureSiteRecoveryServer** cmdlet gets information about Azure Site Recovery servers registered to the current Site Recovery vault.
parameters:
  cmdletParameters:
  - name: Id
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of a server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ById
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureSiteRecoveryServer
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzureSiteRecoveryServer
        -Id <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ById
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureSiteRecoveryServer
        -Name <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByName
  isDefault: false
examples:
- title: 'Example 1: Get information about a Site Recovery server'
  description: |-
    ```
    PS C:\> Get-AzureSiteRecoveryServer
    ID              : cd7dec80-1144-4531-9ab3-888b8ab39bee
    Name            : server1.contoso.com
    LastHeartbeat   : 9/23/2014 3:51:22 PM
    ProviderVersion : 3.5.520.0
    ServerVersion   : 3.2.7634.0

    ID              : f5e713fe-5b6d-4641-9690-6fe74c976b8e
    Name            : Server2.contoso.com
    LastHeartbeat   : 8/13/2014 2:28:58 PM
    ProviderVersion : 3.5
    ServerVersion   : 3.2.7510.0
    ```

    This command gets information about an Azure Site Recovery server.
