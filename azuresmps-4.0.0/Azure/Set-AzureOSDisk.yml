### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureOSDisk
name: Set-AzureOSDisk
module: Azure
isPreview: false
summary: |-
  Modifies the host cache mode of an Azure virtual machine.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Set-AzureOSDisk** cmdlet modifies the host cache mode of the operating system disk of an Azure virtual machine.
  The supported host cache modes are ReadOnly and ReadWrite.
  If you run this cmdlet on a virtual machine that is running, that virtual machine restarts.
parameters:
  cmdletParameters:
  - name: HostCaching
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the host cache attribute for the operating system disk.
      Valid values are:

      - ReadOnly
      - ReadWrite
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: NoResize
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InformationAction
    type: <xref href="ActionPreference" data-throw-if-not-resolved="False" />
    description: |-
      Specifies how this cmdlet responds to an information event.

      The acceptable values for this parameter are:

      - Continue
      - Ignore
      - Inquire
      - SilentlyContinue
      - Stop
      - Suspend
    aliases:
    - infa
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InformationVariable
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an information variable.
    aliases:
    - iv
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ResizedSizeInGB
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a new size, in gigabytes, for the operating system disk.
      The size must be larger than the current size.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Resize
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VM
    type: <xref href="IPersistentVM" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the virtual machine for which this cmdlet modifies the operating system disk.
      To obtain a virtual machine object, use the **Get-AzureVM** cmdlet.
    aliases:
    - InputObject
    defaultValue: None
    dontShow: false
