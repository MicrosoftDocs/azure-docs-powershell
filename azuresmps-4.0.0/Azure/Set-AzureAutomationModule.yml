syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureAutomationModule
        -Name <String>
        [-Tags <IDictionary>]
        [-ContentLinkUri <Uri>]
        [-ContentLinkVersion <String>]
        -AutomationAccountName <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="Microsoft.Azure.Commands.Automation.Model.Module" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Update a module'
  description: |-
    ```
    PS C:\> Set-AzureAutomationModule -AutomationAccountName "Contoso17" -Name "ContosoModule" -ContentLinkUri ".\ContosoModule.zip" -ContentLinkVersion "1.1"
    ```

    This command imports an updated version of an existing module named ContosoModule into the Azure Automation account named Contoso17.
