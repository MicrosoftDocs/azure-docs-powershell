### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureAutomationModule
name: Set-AzureAutomationModule
module: Azure
isPreview: false
summary: |-
  Updates a module in Automation.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  [!INCLUDE [aa-deprecation](../include/aa-deprecation.yml)]

  The **Set-AzureAutomationModule** cmdlet imports a new version of a module or changes the configuration of the module in Azure Automation.
