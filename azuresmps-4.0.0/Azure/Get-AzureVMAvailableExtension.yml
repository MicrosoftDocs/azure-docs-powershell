### YamlMime:PowerShellCmdlet1
uid: Azure.Get-AzureVMAvailableExtension
name: Get-AzureVMAvailableExtension
module: Azure
isPreview: false
summary: |-
  Gets information for the latest available extensions for virtual machines.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-AzureVMAvailableExtension** cmdlet gets information for the latest available extensions for virtual machines.
parameters:
  cmdletParameters:
  - name: AllVersions
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet lists all versions of an extension.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListAllVersions
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ExtensionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the available extension.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListLatestExtensions
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InformationAction
    type: <xref href="ActionPreference" data-throw-if-not-resolved="False" />
    description: |-
      Specifies how this cmdlet responds to an information event.

      The acceptable values for this parameter are:

      - Continue
      - Ignore
      - Inquire
      - SilentlyContinue
      - Stop
      - Suspend
    aliases:
    - infa
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InformationVariable
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an information variable.
    aliases:
    - iv
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Publisher
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the publisher of the extension.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListLatestExtensions
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Version
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the version of the extension.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ListSingleVersion
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureVMAvailableExtension
        [[-ExtensionName] <String>]
        [[-Publisher] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ListLatestExtensions
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzureVMAvailableExtension
        [-ExtensionName] <String>
        [-Publisher] <String>
        [-AllVersions]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ListAllVersions
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureVMAvailableExtension
        [-ExtensionName] <String>
        [-Publisher] <String>
        [-Version] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: ListSingleVersion
  isDefault: false
examples:
- title: 'Example 1: Get information for the latest available extensions'
  description: |-
    ```
    PS C:\> Get-AzureVMAvailableExtension
              Publisher                  : Microsoft.Compute
              ExtensionName              : VMAccessAgent
              Version                    : 1.0
              PublicConfigurationSchema  : <?xml version="1.0" encoding="utf-8"?>
              <xs:schema attributeFormDefault="unqualified" elementFormDefault="qualified"
              xmlns:xs="http://www.w3.org/2001/XMLSchema">
              <xs:element name="PublicConfig">
              <xs:complexType>
              <xs:sequence>
              <xs:element name="UserName" type="xs:string" minOccurs="0" />
              </xs:sequence>
              </xs:complexType>
              </xs:element>
              </xs:schema>
              PrivateConfigurationSchema : <?xml version="1.0" encoding="utf-8"?>
              <xs:schema attributeFormDefault="unqualified" elementFormDefault="qualified"
              xmlns:xs="http://www.w3.org/2001/XMLSchema">
              <xs:element name="PrivateConfig">
              <xs:complexType>
              <xs:sequence>
              <xs:element name="Password" type="xs:string" minOccurs="0" />
              </xs:sequence>
              </xs:complexType>
              </xs:element>
              </xs:schema>
              SampleConfig               :
              OperationDescription       : Get-AzureVMAvailableExtension
              OperationId                : xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
              OperationStatus            : Succeeded
    ```

    This command gets information for the latest available extensions for all virtual machines.
