examples:
- title: 'Example 1: Update Website Remote Repositories'
  description: |-
    ```
    PS C:\> Update-AzureWebsiteRepository -Name MyWebsite
    ```

    Updates the remote repositories of a local git repository for all the slots for website MyWebsite.
