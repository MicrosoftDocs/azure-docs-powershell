syntaxes:
- syntax: |-
    ```Syntax
    Update-AzureWebsiteRepository
        [-Name <String>]
        -PublishingUsername <String>
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
