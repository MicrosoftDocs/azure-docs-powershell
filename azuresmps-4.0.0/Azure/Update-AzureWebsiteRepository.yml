uid: Azure.Update-AzureWebsiteRepository
name: Update-AzureWebsiteRepository
module: Azure
isPreview: false
summary: |-
  Updates the remote repositories of a local git repository for all the slots.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
