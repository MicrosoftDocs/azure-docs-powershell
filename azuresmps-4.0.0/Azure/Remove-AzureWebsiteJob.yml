syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureWebsiteJob
        -JobName <String>
        -JobType <WebJobType>
        [-Force]
        [-Name <String>]
        [-Slot <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Remove an existing web job for a website'
  description: |-
    ```
    PS C:\> Remove-AzureWebsiteJob -Name MyWebsite -JobName MyWebJob -JobType Continuous
    ```

    Removes a web job called MyWebJob for MyWebSite.
