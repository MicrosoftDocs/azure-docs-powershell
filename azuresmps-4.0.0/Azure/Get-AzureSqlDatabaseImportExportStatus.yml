### YamlMime:PowerShellCmdlet1
uid: Azure.Get-AzureSqlDatabaseImportExportStatus
name: Get-AzureSqlDatabaseImportExportStatus
module: Azure
isPreview: false
summary: |-
  Gets the status of an import or export request.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-AzureSqlDatabaseImportExportStatus** cmdlet gets the status of an import or export request.
  The Start-AzureSqlDatabaseImport or Start-AzureSqlDatabaseExport cmdlet initiates requests.
  You can specify the request object by using the *Request* parameter, or you can identify the request by using the *RequestId* parameter and the *Username*, *Password*, and *ServerName* parameters.
parameters:
  cmdletParameters:
  - name: Password
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the password that is required to connect to the Azure SQL Database server.
      You must specify this parameter if you specified the *RequestId* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByConnectionInfo
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Request
    type: <xref href="ImportExportRequest" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an **ImportExportRequest** object.
      To obtain an import or export request object, use the Start-AzureSqlDatabaseImport or Start-AzureSqlDatabaseExport cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByRequestObject
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RequestId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the GUID of the import or export operation for which this cmdlet gets status.
      If you specify this parameter, you must specify the *UserName*, *Password*, and *ServerName* parameters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByConnectionInfo
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Azure SQL Database server.
      You must specify this parameter if you specified the *RequestId* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByConnectionInfo
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Username
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the user name required to connect to the Azure SQL Database server.
      You must specify this parameter if you specified the *RequestId* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByConnectionInfo
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureSqlDatabaseImportExportStatus
        -Username <String>
        -Password <String>
        -ServerName <String>
        -RequestId <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByConnectionInfo
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureSqlDatabaseImportExportStatus
        -Request <ImportExportRequest>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByRequestObject
  isDefault: false
outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.SqlDatabase.Services.ImportExport.StatusInfo" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the status of an export request'
  description: |-
    ```
    PS C:\> $ExportRequest = Start-AzureSqlDatabaseExport -SqlConnectionContext $SqlContext -StorageContainer $Container -DatabaseName $DatabaseName -BlobName $BlobName
    PS C:\> Get-AzureSqlDatabaseImportExportStatus -Request $ExportRequest
    ```

    The first command creates an export request, and then stores it in the $ExportRequest variable.

    The second command gets the status of the export request stored in $ExportRequest.
