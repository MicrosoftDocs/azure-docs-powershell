    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureStorSimpleVirtualDevice
        -DeviceName <String>
        -SecretKey <String>
        -AdministratorPassword <String>
        -SnapshotManagerPassword <String>
        [-TimeZone <TimeZoneInfo>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="TimeZoneInfo" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a **TimeZoneInfo** object to this cmdlet.
outputs:
- name: <xref href="DeviceJobDetails" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns updated device details for the virtual device.
examples:
- title: 'Example 1: Update a virtual device'
  description: |-
    ```
    PS C:\>$TimeZoneInfo = [System.TimeZoneInfo]::GetSystemTimeZones() | where { $_.Id -eq "Pacific Standard Time" }
    PS C:\> Set-AzureStorSimpleVirtualDevice -DeviceName "Contoso23" -SecretKey "wcZBlBGpCMf4USdSKyt/SQ==" -TimeZone $TimeZoneInfo
    VERBOSE: ClientRequestId: e31f0d6b-451d-4c1d-b2f1-3fc84c13972c_PS
