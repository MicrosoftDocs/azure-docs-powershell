### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureStorSimpleVirtualDevice
name: Set-AzureStorSimpleVirtualDevice
module: Azure
isPreview: false
summary: |-
  Creates or updates the device configuration of a StorSimple virtual device.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Set-AzureStorSimpleVirtualDevice** cmdlet creates or updates the device configuration of an Azure StorSimple virtual device.
parameters:
  cmdletParameters:
  - name: AdministratorPassword
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the administrator password of the virtual device to configure.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DeviceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the virtual device to configure.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SecretKey
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a service encryption key for the virtual device.
      This key is generated when the first physical device is registered with a resource.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SnapshotManagerPassword
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the snapshot manager password.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TimeZone
    type: <xref href="TimeZoneInfo" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a time zone for the device.
      You can create a **TimeZoneInfo** object by using the **GetSystemTimeZone()** method.
      For example, this command creates a time zone information object for Pacific Standard Time: `\[System.TimeZoneInfo\]::GetSystemTimeZones() | where { $_.Id -eq "Pacific Standard Time" }`
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
