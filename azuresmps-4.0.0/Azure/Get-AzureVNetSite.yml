syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureVNetSite
        [[-VNetName] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get information about all virtual networks in the current subscription'
  description: |-
    ```
    PS C:\> Get-AzureVNetSite
    ```

    This command gets information about all the virtual networks in the current subscription.
- title: 'Example 2: Get information about a specific virtual network in the current subscription'
  description: |-
    ```
    PS C:\> Get-AzureVNetSite -VNetName "MyProductionNetwork"
    ```

    This command retrieves information on the MyProductionNetwork virtual network only.
