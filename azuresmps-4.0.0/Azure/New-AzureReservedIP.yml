syntaxes:
- syntax: |-
    ```Syntax
    New-AzureReservedIP
        [-ReservedIPName] <String>
        [[-Label] <String>]
        [-Location] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: CreateNewReservedIP
  isDefault: true
- syntax: |-
