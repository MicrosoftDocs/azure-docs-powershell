    New-AzureReservedIP
        [-ReservedIPName] <String>
        [[-Label] <String>]
        [-Location] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: CreateInUseReservedIPUsingSlot
  isDefault: false
- syntax: |-
