syntaxes:
- syntax: |-
    ```Syntax
    Add-AzureVMImage
        [-ImageName] <String>
        [-MediaLocation] <String>
        [-OS] <String>
        [[-Label] <String>]
        [[-Eula] <String>]
        [[-Description] <String>]
        [[-ImageFamily] <String>]
        [[-PublishedDate] <DateTime>]
        [[-PrivacyUri] <Uri>]
        [[-RecommendedVMSize] <String>]
        [[-IconName] <String>]
        [[-SmallIconName] <String>]
        [-ShowInGui]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: OSImage
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzureVMImage
        [-ImageName] <String>
        [-DiskConfig] <VirtualMachineImageDiskConfigSet>
        [[-OS] <String>]
        [[-Label] <String>]
        [[-Eula] <String>]
        [[-Description] <String>]
        [[-ImageFamily] <String>]
        [[-PublishedDate] <DateTime>]
        [[-PrivacyUri] <Uri>]
        [[-RecommendedVMSize] <String>]
        [[-IconName] <String>]
        [[-SmallIconName] <String>]
        [-ShowInGui]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: VMImage
  isDefault: false
