syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureStorSimpleDevice
        [-Type <String>]
        [-ModelID <String>]
        [-Detailed]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Empty
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzureStorSimpleDevice
        [-DeviceId <String>]
        [-Type <String>]
        [-ModelID <String>]
        [-Detailed]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: IdentifyById
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureStorSimpleDevice
        [-DeviceName <String>]
        [-Type <String>]
        [-ModelID <String>]
        [-Detailed]
        [-Profile <AzureSMProfile>]
