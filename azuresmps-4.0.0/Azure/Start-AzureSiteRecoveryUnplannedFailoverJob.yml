syntaxes:
- syntax: |-
    ```Syntax
    Start-AzureSiteRecoveryUnplannedFailoverJob
        -RPId <String>
        -Direction <String>
        [-PrimaryAction <Boolean>]
        [-PerformSourceSideActions]
        [-WaitForCompletion]
        [-Profile <AzureSMProfile>]
