uid: Azure.Start-AzureVM
name: Start-AzureVM
module: Azure
isPreview: false
summary: |-
  Starts an Azure virtual machine.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Start-AzureVM** cmdlet requests the start of an Azure virtual machine.
