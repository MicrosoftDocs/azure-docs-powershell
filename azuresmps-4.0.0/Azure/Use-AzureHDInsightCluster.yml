syntaxes:
- syntax: |-
    ```Syntax
    Use-AzureHDInsightCluster
        [-Certificate <X509Certificate2>]
        [-HostedService <String>]
        [-Endpoint <Uri>]
        [-IgnoreSslErrors <Boolean>]
        -Name <String>
        [-Subscription <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
