syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureVMImageDataDiskConfig
        [-DiskConfig] <VirtualMachineImageDiskConfigSet>
        [-DataDiskName] <String>
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByDiskName
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzureVMImageDataDiskConfig
        [-DiskConfig] <VirtualMachineImageDiskConfigSet>
        [-Lun] <Int32>
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByDiskLun
  isDefault: false
outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.ServiceManagement.Model.VirtualMachineImageDiskConfigSet" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove the data disk configuration from the DiskConfigSet object'
  description: |-
    ```
    PS C:\> $Disk = New-AzureDiskConfigSet
    PS C:\> $Disk = Set-AzureDataDiskConfig -DiskConfig $Disk -HostCaching ReadWrite
    PS C:\> Remove-AzureVMImageDataDiskConfig -DiskConfig $Disk
    ```

    This example creates a **DiskConfigSet**, configures it, then removes the data disk.
