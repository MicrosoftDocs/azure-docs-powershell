  cmdletParameters:
  - name: DataDiskName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the data disk that this cmdlet removes.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
