syntaxes:
- syntax: |-
    ```Syntax
    Update-AzureSiteRecoveryProtectionDirection
        -RecoveryPlan <ASRRecoveryPlan>
        -Direction <String>
        [-WaitForCompletion]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByRPObject
  isDefault: true
- syntax: |-
