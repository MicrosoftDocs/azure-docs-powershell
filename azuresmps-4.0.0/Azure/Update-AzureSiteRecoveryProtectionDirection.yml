### YamlMime:PowerShellCmdlet1
uid: Azure.Update-AzureSiteRecoveryProtectionDirection
name: Update-AzureSiteRecoveryProtectionDirection
module: Azure
isPreview: false
summary: |-
  Updates the source and target server for the protection of a Site Recovery object.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Update-AzureSiteRecoveryProtectionDirection** cmdlet updates the source and target server for the protection of an Azure Site Recovery object after a commit failover operation finishes.
parameters:
  cmdletParameters:
  - name: Direction
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the direction of the commit.
      The acceptable values for this parameter are:

      - PrimaryToRecovery
      - RecoveryToPrimary
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProtectionContainerId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of a protected container.
      This cmdlet modifies the direction for a protected virtual machine that belongs to the container that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPEId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProtectionEntity
    type: <xref href="ASRProtectionEntity" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the protection entity object.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPEObject
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProtectionEntityId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of a protected virtual machine.
      This cmdlet modifies the direction for the protected virtual machine that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
