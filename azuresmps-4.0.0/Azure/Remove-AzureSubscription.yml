syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureSubscription
        -SubscriptionName <String>
        [-Force]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
