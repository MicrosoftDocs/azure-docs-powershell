uid: Azure.Move-AzureReservedIP
name: Move-AzureReservedIP
module: Azure
isPreview: false
summary: |-
  Migrates a reserved IP address to the Azure Resource Manager stack.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
