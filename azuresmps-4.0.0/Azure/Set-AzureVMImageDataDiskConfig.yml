syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureVMImageDataDiskConfig
        [-DiskConfig] <VirtualMachineImageDiskConfigSet>
        [-DataDiskName] <String>
        [-Lun] <Int32>
        [-HostCaching] <String>
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateAzureVMImageParamSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzureVMImageDataDiskConfig
        [-DiskConfig] <VirtualMachineImageDiskConfigSet>
        [-Lun] <Int32>
        [-HostCaching] <String>
        [-MediaLink] <Uri>
        [-InformationAction <ActionPreference>]
