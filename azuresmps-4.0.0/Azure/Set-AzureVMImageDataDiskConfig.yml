outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.ServiceManagement.Model.VirtualMachineImageDiskConfigSet" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set Data Disk properties on a virtual machine image'
  description: |-
    ```
    PS C:\> $Disk = New-AzureDiskConfigSet
    PS C:\> $Disk = Set-AzureOSDiskConfig -DiskConfig $Disk -HostCaching ReadWrite
    PS C:\> $Disk = Set-AzureDataDiskConfig -DiskConfig $Disk -Name "Test" -HostCaching "ReadWrite" -LUN 0
    PS C:\> Update-AzureVMImage -ImageName "Image2" -Label "Test1" -Description "Test1" -DiskConfigSet $Disk;
    ```

    This command sets data disk properties on a virtual machine then updates the virtual machine image.
