### YamlMime:PowerShellCmdlet1
uid: Azure.New-AzureVMSqlServerAutoPatchingConfig
name: New-AzureVMSqlServerAutoPatchingConfig
module: Azure
isPreview: false
summary: |-
  Creates a configuration object for virtual machine automatic patching.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-AzureVMSqlServerAutoPatchingConfig** cmdlet creates a configuration object for virtual machine automatic patching.
parameters:
  cmdletParameters:
  - name: DayOfWeek
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the day of the week when updates should be installed.

      The acceptable values for this parameter are:

      - Sunday
      - Monday
      - Tuesday
      - Wednesday
      - Thursday
      - Friday
      - Saturday
      - Everyday
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Enable
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that automated patching for the virtual machine is enabled.
      If you enable automated patching the cmdlet will put Windows Update into interactive mode.
      If you disable automated patching, Windows Update settings will not change.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InformationAction
    type: <xref href="ActionPreference" data-throw-if-not-resolved="False" />
    description: |-
      Specifies how this cmdlet responds to an information event.

      The acceptable values for this parameter are:

      - Continue
      - Ignore
      - Inquire
      - SilentlyContinue
      - Stop
      - Suspend
    aliases:
    - infa
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InformationVariable
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an information variable.
    aliases:
    - iv
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaintenanceWindowDuration
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the duration of the maintenance window.
      Automated patching will avoid performing an action that can impact a virtual machine availability outside of that window.
      Only 30 minutes increments are allowed.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaintenanceWindowStartingHour
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the hour of the day when maintenance window starts.
      This time defines when updates start installing and is rounded to the hour.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PatchCategory
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies whether important updates should be included.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzureVMSqlServerAutoPatchingConfig
        [-Enable]
        [-DayOfWeek <String>]
        [-MaintenanceWindowStartingHour <Int32>]
        [-MaintenanceWindowDuration <Int32>]
        [-PatchCategory <String>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="AutoPatchingSettings" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns object contains settings for automated patching.
examples:
- title: 'Example 1: Create a configuration object to configure automatic patching'
  description: |-
    ```
    PS C:\> $APS = New-AzureVMSqlServerAutoPatchingConfig -Enable -DayOfWeek "Thursday" -MaintenanceWindowStartingHour 11 -MaintenanceWindowDuration 120 -PatchCategory "Important"
              Enable                        : True
              DayOfWeek                     : Thursday
              MaintenanceWindowStartingHour : 11
              MaintenanceWindowDuration     : 120
              PatchCategory                 : Important
    ```

    This command creates configuration object that can be used to configure automatic patching using Set-AzureVMSqlServerExtension.
