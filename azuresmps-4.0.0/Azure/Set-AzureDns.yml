syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureDns
        [-Name] <String>
        [-IPAddress] <String>
        [-ServiceName] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.Utilities.Common.ManagementOperationContext" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Modify the IP address of a DNS server'
  description: |-
    ```
    PS C:\> Set-AzureDns -ServiceName "ContosoService" -IPAddress 10.1.2.5 -Name "Dns07"
    ```

    This command modifies the IP address of the DNS server named Dns07 for the service named ContosoService.
