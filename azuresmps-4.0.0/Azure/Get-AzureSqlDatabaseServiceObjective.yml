### YamlMime:PowerShellCmdlet1
uid: Azure.Get-AzureSqlDatabaseServiceObjective
name: Get-AzureSqlDatabaseServiceObjective
module: Azure
isPreview: false
summary: |-
  Gets service objectives for an Azure SQL Database server.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-AzureSqlDatabaseServiceObjective** cmdlet gets service objectives for an Azure SQL Database server.
  Service objectives are referred to as performance levels.
  If you do not specify a service objective, this cmdlet returns all valid service objectives for the specified server.

  This cmdlet applies to Basic, Standard, and Premium service tiers.
parameters:
  cmdletParameters:
  - name: Context
    type: <xref href="IServerDataServiceContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the connection context of a server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByConnectionContext
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a server.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByServerName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServiceObjective
    type: <xref href="ServiceObjective" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an object that represents the service objective that this cmdlet gets.
      Valid values are:

      - Basic: dd6d99bb-f193-4ec1-86f2-43d3bccbc49c
      - Standard (S0): f1173c43-91bd-4aaa-973c-54e79e15235b
      - Standard (S1): 1b1ebd4d-d903-4baa-97f9-4ea675f5e928
      - Standard (S2): 455330e1-00cd-488b-b5fa-177c226f28b7
      - *Standard (S3): 789681b8-ca10-4eb0-bdf2-e0b050601b40
      - Premium (P1): 7203483a-c4fb-4304-9e9f-17c71c904f5d
      - Premium (P1): 7203483a-c4fb-4304-9e9f-17c71c904f5d
      - Premium (P2): a7d1b92d-c987-4375-b54d-2b1d0e0f5bb0
      - Premium (P3): a7c4c615-cfb1-464b-b252-925be0a19446

      *Standard (S3) is part of the Latest SQL Database Update V12 (preview).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServiceObjectiveName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a service objective to get.
      Valid values are: Basic, S0, S1, S2, S3, P1, P2, and P3.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureSqlDatabaseServiceObjective
        -Context <IServerDataServiceContext>
        [-ServiceObjective <ServiceObjective>]
        [-ServiceObjectiveName <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByConnectionContext
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzureSqlDatabaseServiceObjective
        -ServerName <String>
        [-ServiceObjective <ServiceObjective>]
        [-ServiceObjectiveName <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByServerName
  isDefault: false
inputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.SqlDatabase.Services.Server.ServiceObjective" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="IEnumerable" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all the service objectives by using a connection context'
  description: |-
    ```
    PS C:\> Get-AzureSqlDatabaseServiceObjective -Context $Context
    ```

    This command gets all the service objectives for the server that the connection context $Context specifies.
- title: 'Example 2: Get all the service objectives by using a server name'
  description: |-
    ```
    PS C:\> Get-AzureSqlDatabaseServiceObjective -ServerName "Server01"
    ```

    This command gets all the service objectives for the server named Server01.
