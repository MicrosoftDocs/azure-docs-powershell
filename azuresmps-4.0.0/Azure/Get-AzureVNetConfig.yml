syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureVNetConfig
        [-ExportToFile <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get the virtual network configuration of a current Azure subscription'
  description: |-
    ```
    PS C:\> Get-AzureVNetConfig
    ```

    This command gets the virtual network configuration of the current Azure subscription and displays it.
- title: 'Example 2: Get the virtual network configuration of the current Azure subscription and save it to a local file'
  description: |-
    ```
    PS C:\> Get-AzureVNetConfig -ExportToFile "c:\temp\MyAzNets.netcfg"
    ```

    This command gets the virtual network configuration of the current Azure subscription and then saves it to a local file.
