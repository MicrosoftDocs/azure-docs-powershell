uid: Azure.New-WAPackVMSubnet
name: New-WAPackVMSubnet
module: Azure
isPreview: false
summary: |-
  Creates a virtual machine subnet.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-WAPackVMSubnet** cmdlet creates a virtual machine subnet.
