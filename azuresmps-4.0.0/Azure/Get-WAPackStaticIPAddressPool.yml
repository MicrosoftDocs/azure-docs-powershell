### YamlMime:PowerShellCmdlet1
uid: Azure.Get-WAPackStaticIPAddressPool
name: Get-WAPackStaticIPAddressPool
module: Azure
isPreview: false
summary: |-
  Gets static IP address pool objects.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  These topics are deprecated and will be removed in the future.
  This topic describes the cmdlet in the 0.8.1 version of the Microsoft Azure PowerShell module.
  To find out the version of the module you're using, from the Azure PowerShell console, type `(Get-Module -Name Azure).Version`.

  The **Get-WAPackStaticIPAddressPool** cmdlet gets static IP address pool objects.
