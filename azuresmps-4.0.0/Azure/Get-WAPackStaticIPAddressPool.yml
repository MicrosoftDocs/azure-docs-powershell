syntaxes:
- syntax: |-
    ```Syntax
    Get-WAPackStaticIPAddressPool
        -VMSubnet <VMSubnet>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: FromVMSubnetObject
  isDefault: true
- syntax: |-
    ```Syntax
    Get-WAPackStaticIPAddressPool
        -VMSubnet <VMSubnet>
