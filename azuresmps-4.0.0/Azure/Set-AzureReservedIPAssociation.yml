syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureReservedIPAssociation
        [-ReservedIPName] <String>
        [-ServiceName] <String>
        [[-VirtualIPName] <String>]
        [[-Slot] <String>]
        [-Profile <AzureSMProfile>]
