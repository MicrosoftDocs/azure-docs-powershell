### YamlMime:PowerShellCmdlet1
uid: Azure.Remove-AzureStorSimpleDeviceBackupPolicy
name: Remove-AzureStorSimpleDeviceBackupPolicy
module: Azure
isPreview: false
summary: |-
  Removes an existing backup policy.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Remove-AzureStorSimpleDeviceBackupPolicy** cmdlet removes an existing **BackupPolicy** object.
  After you remove a backup policy, no further backups take place based on that policy.
  This cmdlet also deletes all schedules associated with the deleted policy.
parameters:
  cmdletParameters:
  - name: BackupPolicy
    type: <xref href="BackupPolicyDetails" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **BackupPolicyDetails** object to delete.
      To obtain a **BackupPolicyDetails** object, use the **Get-AzureStorSimpleDeviceBackupPolicy** cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IdentifyByObject
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BackupPolicyId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the instance ID of the **BackupPolicy** object to delete.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IdentifyById
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DeviceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the StorSimple device on which to delete the backup policy.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet does not prompt you for confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WaitForComplete
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
