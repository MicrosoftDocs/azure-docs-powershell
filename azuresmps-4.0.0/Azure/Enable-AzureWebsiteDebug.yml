uid: Azure.Enable-AzureWebsiteDebug
name: Enable-AzureWebsiteDebug
module: Azure
isPreview: false
summary: |-
  Enables the website's debug.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  Enables the website's debug feature in Visual Studio.
parameters:
  cmdletParameters:
