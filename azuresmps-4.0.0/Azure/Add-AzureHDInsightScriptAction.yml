### YamlMime:PowerShellCmdlet1
uid: Azure.Add-AzureHDInsightScriptAction
name: Add-AzureHDInsightScriptAction
module: Azure
isPreview: false
summary: |-
  Adds an HDInsight script action.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  This version of Azure PowerShell HDInsight is deprecated.
  These cmdlets will be removed by January 1, 2017.
  Please use the newer version of Azure PowerShell HDInsight.

  For information about how to use the new HDInsight to create a cluster, see [Create Linux-based clusters in HDInsight using Azure PowerShell](/azure/hdinsight/hdinsight-hadoop-create-linux-clusters-azure-powershell) (/azure/hdinsight/hdinsight-hadoop-create-linux-clusters-azure-powershell).
  For information about how to submit jobs by using Azure PowerShell and other approaches, see [Submit Hadoop jobs in HDInsight](/azure/hdinsight/hadoop/submit-apache-hadoop-jobs-programmatically) (/azure/hdinsight/hadoop/submit-apache-hadoop-jobs-programmatically).
  For reference information about Azure PowerShell HDInsight, see [Azure HDInsight Cmdlets](/powershell/module/servicemanagement/azure/?view=azuresmps-4.0.0#hd-insights).

  The **Add-AzureHDInsightScriptAction** cmdlet provides Azure HDInsight functionality that is used to install additional software or to change the configuration of applications that run on a Hadoop cluster by using Windows PowerShell scripts.

  A script action runs on the cluster nodes when HDInsight clusters are deployed, and they run after nodes in the cluster complete HDInsight configuration.
  The script action runs under system administrator account privileges and provides full access rights to the cluster nodes.
  You can provide each cluster with a list of script actions to run in a specified sequence.
