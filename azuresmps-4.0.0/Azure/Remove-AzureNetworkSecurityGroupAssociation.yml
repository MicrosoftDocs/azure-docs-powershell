syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureNetworkSecurityGroupAssociation
        -Name <String>
        -VirtualNetworkName <String>
        -SubnetName <String>
        [-Force]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveNetworkSecurityGroupAssociationFromSubnet
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzureNetworkSecurityGroupAssociation
        -Name <String>
        -VM <PersistentVMRoleContext>
        -ServiceName <String>
        [-NetworkInterfaceName <String>]
        [-Force]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveNetworkSecurityGroupAssociationFromIaaSRole
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzureNetworkSecurityGroupAssociation
        -Name <String>
        -RoleName <String>
        -ServiceName <String>
        [-Slot <String>]
        [-NetworkInterfaceName <String>]
        [-Force]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveNetworkSecurityGroupAssociationFromPaaSRole
  isDefault: false
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove a virtual machine to a network security group'
  description: |-
    ```
    PS C:\> Get-AzureVM -ServiceName "ContosoService" -Name "ContosoVM06" | Remove-AzureNetworkSecurityGroupAssociation -Name "ContosoNetworkSecurityGroup"
    ```

    This command gets a virtual machine named ContosoVM06 for the service named ContosoService, and passes that virtual machine object to the current cmdlet.
    The current cmdlet removes the network security group named ContosoNetworkSecurityGroup from that virtual machine.
