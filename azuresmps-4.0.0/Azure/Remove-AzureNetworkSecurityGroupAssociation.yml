uid: Azure.Remove-AzureNetworkSecurityGroupAssociation
name: Remove-AzureNetworkSecurityGroupAssociation
module: Azure
isPreview: false
summary: |-
  Removes a network security group.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Remove-AzureNetworkSecurityGroupAssociation** cmdlet removes a network security group from a virtual machine.
