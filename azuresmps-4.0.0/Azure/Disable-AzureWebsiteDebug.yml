### YamlMime:PowerShellCmdlet1
uid: Azure.Disable-AzureWebsiteDebug
name: Disable-AzureWebsiteDebug
module: Azure
isPreview: false
summary: |-
  Disables the website's debugging.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  Disables the website's debugging in Visual Studio.
