syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureServiceRemoteDesktopExtension
        [[-ServiceName] <String>]
        [[-Slot] <String>]
        [[-Role] <String[]>]
        [[-X509Certificate] <X509Certificate2>]
        [[-ThumbprintAlgorithm] <String>]
        [-Credential] <PSCredential>
        [[-Expiration] <DateTime>]
        [[-Version] <String>]
        [[-ExtensionId] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SetExtension
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzureServiceRemoteDesktopExtension
        [[-ServiceName] <String>]
        [[-Slot] <String>]
        [[-Role] <String[]>]
        [-CertificateThumbprint] <String>
        [[-ThumbprintAlgorithm] <String>]
        [-Credential] <PSCredential>
        [[-Expiration] <DateTime>]
        [[-Version] <String>]
        [[-ExtensionId] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SetExtensionUsingThumbprint
  isDefault: false
examples:
- title: 'Example 1: Enable remote desktop extension'
  description: |-
    ```
    PS C:\> Set-AzureServiceRemoteDesktopExtension -ServiceName $svc -Credentials $creds
    ```

    This command enables the remote desktop extension for the specified service.
- title: 'Example 2: Enable remote desktop extension for a specified role'
  description: |-
    ```
    PS C:\> Set-AzureServiceRemoteDesktopExtension -ServiceName $svc -Credentials $creds -Role "WebRole1"
    ```

    This command enables the remote desktop extension for the specified service and role.
