syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureSBAuthorizationRule
        -Name <String>
        -Namespace <String>
        -EntityName <String>
        -EntityType <ServiceBusEntityType>
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: EntitySAS
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-AzureSBAuthorizationRule
        -Name <String>
        -Namespace <String>
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: NamespaceSAS
  isDefault: false
examples:
- title: 'Example 1: Remove authorization rule at namespace level'
  description: |-
    ```
    PS C:\> Remove-AzureSBAuthorizationRule -Name MyRule -Namespace MyNamespace
    ```

    Removes authorization rule MyRule from MyNamespace.
- title: 'Example 2: Remove authorization rule for a Queue'
  description: |-
    ```
    PS C:\> Remove-AzureSBAuthorizationRule -Name MyRule -Namespace MyNamespace -EntityName MyEntity -EntityType Queue
    ```

    Removes authorization rule called MyRule for a MyEntity Queue on MyNamespace.
