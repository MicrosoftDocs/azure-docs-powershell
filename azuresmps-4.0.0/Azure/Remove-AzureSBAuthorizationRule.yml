uid: Azure.Remove-AzureSBAuthorizationRule
name: Remove-AzureSBAuthorizationRule
module: Azure
isPreview: false
summary: |-
  Removes existing Service Bus authorization rule.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  Removes existing Service Bus authorization rule.

  [!INCLUDE [sb-deprecation.md](../include/sb-deprecation.yml)]
