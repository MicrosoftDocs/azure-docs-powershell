syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureSBAuthorizationRule
        -Name <String>
        -Namespace <String>
        -EntityName <String>
        -EntityType <ServiceBusEntityType>
        [-Permission <AccessRights[]>]
        [-PrimaryKey <String>]
        [-SecondaryKey <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: EntitySAS
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureSBAuthorizationRule
        -Name <String>
        -Namespace <String>
        [-Permission <AccessRights[]>]
        [-PrimaryKey <String>]
        [-SecondaryKey <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: NamespaceSAS
  isDefault: false
examples:
- title: 'Example 1: Renew primary key for authorization rule at namespace level'
  description: |-
    ```
    PS C:\> Set-AzureSBAuthorizationRule -Name MyRule -Namespace MyNamespace -Permission $("Send")
    ```

    The primary key is renewed.
- title: 'Example 2: Update authorization rule permission'
  description: |-
    ```
    PS C:\> Set-AzureSBAuthorizationRule -Name MyRule -Namespace MyNamespace -Permission $("Listen", "Send") -EntityName MyEntity -EntityType Queue
    ```

    Updates the permissions.
