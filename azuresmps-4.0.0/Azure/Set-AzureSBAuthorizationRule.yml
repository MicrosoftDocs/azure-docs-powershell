### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureSBAuthorizationRule
name: Set-AzureSBAuthorizationRule
module: Azure
isPreview: false
summary: |-
  Updates existing Service Bus authorization rule.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  Updates existing Service Bus authorization rule.

  [!INCLUDE [sb-deprecation.md](../include/sb-deprecation.yml)]
