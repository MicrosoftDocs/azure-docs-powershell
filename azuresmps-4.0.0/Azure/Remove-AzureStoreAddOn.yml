### YamlMime:PowerShellCmdlet1
uid: Azure.Remove-AzureStoreAddOn
name: Remove-AzureStoreAddOn
module: Azure
isPreview: false
summary: |-
  Removes an existing add-on instance.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  This topic describes the cmdlet in the 0.8.10 version of the Microsoft Azure PowerShell module.
  To get the version of the module you're using, in the Azure PowerShell console, type `(Get-Module -Name Azure).Version`.

  Removes an existing add-on instance from the current subscription.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the add-on instance to remove.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureStoreAddOn
        -Name <String>
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Remove-AzureStoreAddOn MyAddOn
    ```

    This example removes an add-on named MyAddOn from the current subscription.
