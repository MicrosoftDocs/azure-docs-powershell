syntaxes:
- syntax: |-
    ```Syntax
    Update-AzureVMImage
        [-ImageName] <String>
        [-Label] <String>
        [[-Eula] <String>]
        [[-Description] <String>]
        [[-ImageFamily] <String>]
        [[-PublishedDate] <DateTime>]
        [[-PrivacyUri] <Uri>]
        [[-RecommendedVMSize] <String>]
        [[-DiskConfig] <VirtualMachineImageDiskConfigSet>]
        [[-Language] <String>]
        [[-IconName] <String>]
        [[-SmallIconName] <String>]
        [-DontShowInGui]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="OSImageContext" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Update an image by changing the image label'
  description: |-
    ```
    PS C:\> Update-AzureVMImage -ImageName "Windows-Server-2008-SP2" -Label "DoNotUse"
    ```

    This command updates the image named Windows-Server-2008-SP2 by changing the image label to DoNotUse.
- title: 'Example 2: Get all operating systems by label and then update the label'
  description: |-
    ```
    PS C:\> Get-AzureVMImage | Where-Object {$_.Label -eq "DoNotUse" } | Update-AzureVMImage -Label "Updated"
    ```

    This command gets all the operating system images labeled DoNotUse and changes the label to Updated.
