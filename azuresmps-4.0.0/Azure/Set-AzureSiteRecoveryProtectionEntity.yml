syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureSiteRecoveryProtectionEntity
        -ProtectionEntity <ASRProtectionEntity>
        -Protection <String>
        [-ProtectionProfile <ASRProtectionProfile>]
        [-OSDiskName <String>]
        [-OS <String>]
        [-WaitForCompletion]
        [-Force]
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPEObject
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzureSiteRecoveryProtectionEntity
        -Id <String>
        -ProtectionContainerId <String>
        -Protection <String>
        [-ProtectionProfile <ASRProtectionProfile>]
        [-OSDiskName <String>]
        [-OS <String>]
        [-WaitForCompletion]
        [-Force]
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
