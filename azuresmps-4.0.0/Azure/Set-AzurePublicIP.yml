syntaxes:
- syntax: |-
    ```Syntax
    Set-AzurePublicIP
        [-PublicIPName] <String>
        [[-IdleTimeoutInMinutes] <Int32>]
        [[-DomainNameLabel] <String>]
        -VM <IPersistentVM>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
