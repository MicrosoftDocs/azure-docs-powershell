uid: Azure.Get-AzureOSVersion
name: Get-AzureOSVersion
module: Azure
isPreview: false
summary: |-
  Lists all Azure guest operating systems.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
