        [-SSHKeyPairs <SSHKeyPairList>]
        [-VNetName <String>]
        [-SubnetNames <String[]>]
        [-DnsSettings <DnsServer[]>]
        [-HostCaching <String>]
        [-AvailabilitySetName <String>]
        [-InstanceSize <String>]
