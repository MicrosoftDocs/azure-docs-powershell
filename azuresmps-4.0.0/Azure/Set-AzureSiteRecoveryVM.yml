syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureSiteRecoveryVM
        -VirtualMachine <ASRVirtualMachine>
        [-Name <String>]
        [-Size <String>]
        [-PrimaryNic <String>]
        [-RecoveryNetworkId <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Allow the update on a protected virtual machine'
  description: |-
    ```
    PS C:\> $ProtectionContainer = Get-AzureSiteRecoveryProtectionContainer
    PS C:\> $VirtualMachines = Get-AzureSiteRecoveryVM -ProtectionContainer $ProtectionContainer
    PS C:\> Set-AzureSiteRecoveryVM -VirtualMachine $VirtualMachines[0] -Name "NewVirtualMachine05"
    Name             :
    ID               : 8170d274-1e48-404a-b080-172ada140bc3
    ClientRequestId  : 09354052-8430-4fa8-9a35-63196dd4b2b4-2015-02-03 04:19:06Z-P
    State            : NotStarted
    StateDescription : NotStarted
    StartTime        :
    EndTime          :
    AllowedActions   :
    Tasks            : {}
    Errors           : {}
    ```

    The first command uses the **Get-AzureSiteRecoveryProtectionContainer** cmdlet to get a protected container, and then stores it in the $ProtectionContainer variable.

    The second command gets the virtual machines in $ProtectionContainer, by using the **Get-AzureSiteRecoveryVM** cmdlet, and then stores them in the $VirtualMachines variable.

    The final command allows updates for the first virtual machine in the $VirtualMachines array, named NewVirtualMachine05.
