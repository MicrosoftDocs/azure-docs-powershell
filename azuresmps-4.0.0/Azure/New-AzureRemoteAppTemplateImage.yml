### YamlMime:PowerShellCmdlet1
uid: Azure.New-AzureRemoteAppTemplateImage
name: New-AzureRemoteAppTemplateImage
module: Azure
isPreview: false
summary: |-
  Uploads or imports an Azure RemoteApp template image.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-AzureRemoteAppTemplateImage** cmdlet uploads or imports an Azure RemoteApp template image.
parameters:
  cmdletParameters:
  - name: AzureVmImageName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an Azure virtual machine to use as a template image.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: AzureVmUpload
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ImageName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an Azure RemoteApp template image.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure region of the template image.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the file path of the template image.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UploadLocalVhd
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Resume
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet resumes if the upload of a template image is interrupted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: UploadLocalVhd
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzureRemoteAppTemplateImage
        [-ImageName] <String>
        [-Location] <String>
        [-Path] <String>
        [-Resume]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: UploadLocalVhd
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzureRemoteAppTemplateImage
        [-ImageName] <String>
        [-Location] <String>
        -AzureVmImageName <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: AzureVmUpload
  isDefault: false
examples:
- title: 'Example 1: Upload a VHD file to create a template image'
  description: |-
    ```
    PS C:\> New-AzureRemoteAppTemplateImage -ImageName "ContosoApps" -Location "North Europe" -Path "C:\RemoteAppImages\ContosoApps.vhd"
    ```

    This command uploads C:\RemoteAppImages\ContosoApps.vhd to create a template image named ContosoApps in the North Europe data center.
