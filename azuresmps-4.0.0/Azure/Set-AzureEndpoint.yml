syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureEndpoint
        [-Name] <String>
        [[-Protocol] <String>]
        [[-LocalPort] <Int32>]
        [-PublicPort <Int32>]
        [-DirectServerReturn <Boolean>]
        [-ACL <NetworkAclObject>]
        [-InternalLoadBalancerName <String>]
        [-IdleTimeoutInMinutes <Int32>]
        [-LoadBalancerDistribution <String>]
        [-VirtualIPName <String>]
        -VM <IPersistentVM>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Modify an endpoint to listen on a port'
  description: |-
    ```
    PS C:\> Get-AzureVM -ServiceName "ContosoService" -Name "VirtualMachine01" | Set-AzureEndpoint -Name "Web" -PublicPort 443 -LocalPort 443 -Protocol tcp | Update-AzureVM
    ```

    This command retrieves the configuration of a virtual machine named VirtualMachine01 by using the **Get-AzureVM** cmdlet.
    The command passes it to the current cmdlet by using the pipeline operator.
    This cmdlet modifies the endpoint named Web to listen on port 443.
    The command passes the virtual machine object to the **Update-AzureVM** cmdlet, which implements your changes.
