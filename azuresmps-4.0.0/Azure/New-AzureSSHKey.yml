syntaxes:
- syntax: |-
    ```Syntax
    New-AzureSSHKey
        [-Fingerprint] <String>
        [-Path] <String>
        [-KeyPair]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
