### YamlMime:PowerShellCmdlet1
uid: Azure.New-AzureStorSimpleDeviceBackupScheduleUpdateConfig
name: New-AzureStorSimpleDeviceBackupScheduleUpdateConfig
module: Azure
isPreview: false
summary: |-
  Creates a backup schedule update configuration object.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-AzureStorSimpleDeviceBackupScheduleUpdateConfig** cmdlet creates a **BackupScheduleUpdateRequest** configuration object.
  Use this configuration object to update a backup policy by using the **Set-AzureStorSimpleDeviceBackupPolicy** cmdlet.
parameters:
  cmdletParameters:
  - name: BackupType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the backup type.
      Valid values are: LocalSnapshot and CloudSnapshot.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Enabled
    type: <xref href="Boolean" data-throw-if-not-resolved="False" />
    description: |-
      Indicates whether to enable the backup schedule.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the instance ID of the backup schedule to update.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an Azure profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RecurrenceType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of recurrence for this backup schedule.
      Valid values are:

      - Minutes
      - Hourly
      - Daily
      - Weekly
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RecurrenceValue
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies how often to make a backup.
      This parameter uses the unit specified by the *RecurrenceType* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RetentionCount
    type: <xref href="Int64" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of days to keep a backup.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StartFromDateTime
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the date from which to start making backups.
      The default value is the current time.
    defaultValue: None
