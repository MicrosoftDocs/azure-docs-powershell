syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureSqlDatabase
        -ConnectionContext <IServerDataServiceContext>
        [-Database <Database>]
        [-DatabaseName <String>]
        [-RestorableDropped]
        [-RestorableDroppedDatabase <RestorableDroppedDatabase>]
        [-DatabaseDeletionDate <DateTime>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByConnectionContext
  isDefault: true
- syntax: |-
    ```Syntax
    Get-AzureSqlDatabase
        -ServerName <String>
        [-Database <Database>]
        [-DatabaseName <String>]
        [-RestorableDropped]
        [-RestorableDroppedDatabase <RestorableDroppedDatabase>]
        [-DatabaseDeletionDate <DateTime>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByServerName
  isDefault: false
inputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.SqlDatabase.Services.Server.Database" data-throw-if-not-resolved="False" />
- name: <xref href="Microsoft.WindowsAzure.Commands.SqlDatabase.Services.Server.RestorableDroppedDatabase" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="IEnumerable" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns a *Database* object if you do not specify the *RestorableDropped* parameter.
- name: <xref href="IEnumerable" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns a *RestorableDroppedDatabase* object if you specify the *RestorableDropped* parameter.
examples:
- title: 'Example 1: Retrieve all databases on a server'
  description: |-
    ```
    PS C:\> Get-AzureSqlDatabase -ServerName "lpqd0zbr8y"
    ```

    This command retrieves all databases on the server named lpqd0zbr8y.
- title: 'Example 2: Retrieve all restorable dropped databases on a server'
  description: |-
    ```
    PS C:\> Get-AzureSqlDatabase -ServerName "lpqd0zbr8y" -RestorableDropped
    ```

    This command retrieves all restorable dropped databases on the server named lpqd0zbr8y.
- title: 'Example 3: Retrieve a database from a server specified by a connection context'
  description: |-
    ```
    PS C:\> $Database01 = Get-AzureSqlDatabase -ConnectionContext $Context -DatabaseName "Database01"
    ```

    This command retrieves database named Database01 from the server specified by the connection context $Context.
- title: 'Example 4: Store a database object in a variable'
  description: |-
    ```
    PS C:\> $Database01 = Get-AzureSqlDatabase -ServerName "lpqd0zbr8y" -DatabaseName "Database01"
    ```

    This command retrieves database named Database01 from the server named lpqd0zbr8y.
    The command stores the database object in the $Database01 variable.
- title: 'Example 5: Retrieve a restorable dropped database'
  description: |-
    ```
    PS C:\> $DroppedDB = Get-AzureSqlDatabase -ServerName "lpqd0zbr8y" -DatabaseName "Database01" -DatabaseDeletionDate "2012-11-09T22:59:43.000Z" -RestorableDropped
    ```

    This command retrieves the restorable dropped database named Database01 that was deleted on 11/9/2012 from the server named lpqd0zbr8y.
    This command stores the results in the $DroppedDB variable.
- title: 'Example 6: Retrieve all restorable dropped databases on a server and filter the results'
  description: |-
    ```
    PS C:\> Get-AzureSqlDatabase -ServerName "lpqd0zbr8y" -RestorableDropped | Where-Object {$_.Name -eq "ContactDB"}
    ```

    This command retrieves all restorable dropped databases on the server named lpqd0zbr8y, and then filters the results to only the databases named ContactDB.
