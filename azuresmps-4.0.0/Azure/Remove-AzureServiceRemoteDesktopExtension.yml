### YamlMime:PowerShellCmdlet1
uid: Azure.Remove-AzureServiceRemoteDesktopExtension
name: Remove-AzureServiceRemoteDesktopExtension
module: Azure
isPreview: false
summary: |-
  Removes the cloud service remote desktop extension applied on all roles or named roles at a specified deployment slot.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]

  [!INCLUDE [rdfe-deprecation-banner](../../includes/rdfe-deprecation-banner.md)]
description: |-
  The **Remove-AzureServiceRemoteDesktopExtension** cmdlet removes the cloud service remote desktop extension applied on all roles or named roles at a certain deployment slot.
parameters:
  cmdletParameters:
  - name: InformationAction
    type: <xref href="ActionPreference" data-throw-if-not-resolved="False" />
    description: |-
      Specifies how this cmdlet responds to an information event.

      The acceptable values for this parameter are:

      - Continue
      - Ignore
      - Inquire
      - SilentlyContinue
      - Stop
      - Suspend
    aliases:
    - infa
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InformationVariable
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an information variable.
    aliases:
    - iv
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Role
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an optional array of roles to specify the remote desktop configuration for.
      If not specified the remote desktop configuration is applied as the default configuration for all roles.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RemoveByRoles
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServiceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure service name of the deployment.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Slot
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the environment of the deployment to modify.
      Supported values are "Production" or "Staging".
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: UninstallConfiguration
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that this cmdlet uninstalls all RDP configurations from the cloud service.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: RemoveAllRoles
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureServiceRemoteDesktopExtension
        [[-ServiceName] <String>]
        [[-Slot] <String>]
        [[-Role] <String[]>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveByRoles
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-AzureServiceRemoteDesktopExtension
        [[-ServiceName] <String>]
        [[-Slot] <String>]
        [-UninstallConfiguration]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveAllRoles
  isDefault: false
examples:
- title: 'Example 1: Remove the remote desktop extension'
  description: |-
    ```
    PS C:\> Remove-AzureServiceRemoteDesktopExtension -ServiceName $svc
    ```

    This command removes the remote desktop extension.
- title: 'Example 2: Remove the remote desktop extension from a specified role'
  description: |-
    ```
    PS C:\> Remove-AzureServiceRemoteDesktopExtension -ServiceName $svc -Role "WebRole1"
    ```

    This command removes the remote desktop extension from a specified role.
