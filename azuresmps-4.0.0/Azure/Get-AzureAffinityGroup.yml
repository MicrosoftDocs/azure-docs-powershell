    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureAffinityGroup
        [[-Name] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="AffinityGroup" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get properties of an affinity group'
  description: |-
    ```
    PS C:\> Get-AzureAffinityGroup -Name "South01"
    ```

    This command gets the properties of the affinity group named South01.
