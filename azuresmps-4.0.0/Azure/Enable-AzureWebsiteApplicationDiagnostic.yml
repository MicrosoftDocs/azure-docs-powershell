syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzureWebsiteApplicationDiagnostic
        -LogLevel <LogEntryType>
        [-PassThru]
        [-File]
        [-Name <String>]
        [-Slot <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: FileParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-AzureWebsiteApplicationDiagnostic
        -LogLevel <LogEntryType>
        [-PassThru]
        [-TableStorage]
        [-StorageAccountName <String>]
        [-StorageTableName <String>]
        [-Name <String>]
        [-Slot <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: TableStorageParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Enable-AzureWebsiteApplicationDiagnostic
        -LogLevel <LogEntryType>
        [-PassThru]
        [-BlobStorage]
        [-StorageAccountName <String>]
        [-StorageBlobContainerName <String>]
        [-Name <String>]
        [-Slot <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: BlobStorageParameterSet
  isDefault: false
examples:
- title: 'Example 1: Enable diagnostics using file system'
  description: |-
    ```
    PS C:\> Enable-AzureWebsiteApplicationDiagnostic -Name MyWebsite -File -LogLevel Verbose
    ```

    This example enables application logging on file system with verbose level.
- title: 'Example 2: Enable logging using Azure Storage'
  description: |-
    ```
    PS C:\> Enable-AzureWebsiteApplicationDiagnostic -Name MyWebsite -Storage -LogLevel Information -StorageAccountName myaccount
    ```

    This example enables application logging using storage account named myaccount with logging level set to Information.
