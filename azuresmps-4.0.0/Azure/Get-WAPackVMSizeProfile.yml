### YamlMime:PowerShellCmdlet1
uid: Azure.Get-WAPackVMSizeProfile
name: Get-WAPackVMSizeProfile
module: Azure
isPreview: false
summary: |-
  Gets size profile objects.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  These topics are deprecated and will be removed in the future.
  This topic describes the cmdlet in the 0.8.1 version of the Microsoft Azure PowerShell module.
  To find out the version of the module you're using, from the Azure PowerShell console, type `(Get-Module -Name Azure).Version`.

  The **Get-WAPackVMSizeProfile** cmdlet gets size profile objects for virtual machines.
parameters:
  cmdletParameters:
  - name: ID
    type: <xref href="Guid" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the unique ID of a size profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromId
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a size profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromName
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
