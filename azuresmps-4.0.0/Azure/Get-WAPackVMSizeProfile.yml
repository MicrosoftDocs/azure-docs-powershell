syntaxes:
- syntax: |-
    ```Syntax
    Get-WAPackVMSizeProfile
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Empty
  isDefault: true
- syntax: |-
    ```Syntax
    Get-WAPackVMSizeProfile
        [-ID <Guid>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: FromId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-WAPackVMSizeProfile
        [-Name <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: FromName
  isDefault: false
examples:
- title: 'Example 1: Get a size profile by using a name'
  description: |-
    ```
    PS C:\> Get-WAPackVMSizeProfile -Name "ContosoSizeProfile07"
    ```

    This command gets the size profile named ContosoSizeProfile07.
- title: 'Example 2: Get a size profile by using an ID'
  description: |-
    ```
    PS C:\> Get-WAPackVMSizeProfile -ID 66242D17-189F-480D-87CF-8E1D749998C8
    ```

    This command gets the size profile that has the specified ID.
- title: 'Example 3: Get all size profiles'
  description: |-
    ```
    PS C:\> Get-WAPackVMSizeProfile
    ```

    This command gets all the size profiles.
