syntaxes:
- syntax: |-
    ```Syntax
    Remove-WAPackVM
        -VM <VirtualMachine>
        [-PassThru]
        [-Force]
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Remove a virtual machine'
  description: |-
    ```
    PS C:\> $VirtualMachine = Get-WAPackVM -Name "ContosoV126"
    PS C:\> Remove-WAPackVM -VM $VirtualMachine
    ```

    The first command gets the virtual machine named ContosoV126 by using the **Get-WAPackVM** cmdlet, and then stores that object in the $VirtualMachine variable.

    The second command removes the virtual machine stored in $VirtualMachine.
    The command prompts you for confirmation.
- title: 'Example 2: Remove a virtual machine without confirmation'
  description: |-
    ```
    PS C:\> $VirtualMachine = Get-WAPackVM -Name "ContosoV126"
    PS C:\> Remove-WAPackVM -VM $VirtualMachine -Force
    ```

    The first command gets the virtual machine named ContosoV126 by using the **Get-WAPackVM** cmdlet, and then stores that object in the $VirtualMachine variable.

    The second command removes the virtual machine stored in $VirtualMachine.
    This command includes the *Force* parameter.
    The command does not prompt you for confirmation.
