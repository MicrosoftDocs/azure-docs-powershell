syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureAutomationConnectionFieldValue
        -Name <String>
        -ConnectionFieldName <String>
        -Value <Object>
        -AutomationAccountName <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
