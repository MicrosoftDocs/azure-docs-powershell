### YamlMime:PowerShellCmdlet1
uid: Azure.New-AzureRoleTemplate
name: New-AzureRoleTemplate
module: Azure
isPreview: false
summary: |-
  Creates web and worker role templates.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  This topic describes the cmdlet in the 0.8.10 version of the Microsoft Azure PowerShell module.
  To get the version of the module you're using, in the Azure PowerShell console, type `(Get-Module -Name Azure).Version`.

  The **New-AzureRoleTemplate** cmdlet creates web and worker role templates.
parameters:
  cmdletParameters:
  - name: Output
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the output path of generated template.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Web
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that you want to create a web role template.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WebRole
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Worker
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Specifies that you want to create a worker role template.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: WorkerRole
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzureRoleTemplate
        [-Web]
        [-Output <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: WebRole
  isDefault: false
- syntax: |-
    ```Syntax
    New-AzureRoleTemplate
        [-Worker]
        [-Output <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: WorkerRole
  isDefault: false
examples:
- title: 'Example 1: Create a web role template'
  description: |-
    ```
    PS C:\> New-AzureRoleTemplate -Web
    ```

    This example creates a new web role template in a folder named WebRoleTemplate in the current directory.
- title: 'Example 2: Create a worker role template'
  description: |-
    ```
    PS C:\> New-AzureRoleTemplate -Worker
    ```

    This example creates a new worker role template in a folder named WebRoleTemplate in the current directory.
- title: 'Example 3: Create a role template in a custom directory'
  description: |-
    ```
    PS C:\> New-AzureRoleTemplate -Web -Output C:\MyWebRoleTemplate
    ```

    This example creates a new web role template in directory named MyWebRoleTemplate, instead of in the current directory.
