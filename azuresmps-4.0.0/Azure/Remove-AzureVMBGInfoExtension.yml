examples:
- title: 'Example 1: Remove the BGInfo extension on a virtual machine'
  description: |-
    ```
    PS C:\> Remove-AzureVMBGInfoExtension -VM $VM;
    ```

    This command removes the BGInfo extension applied on a virtual machine.
