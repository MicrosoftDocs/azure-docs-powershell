uid: Azure.Remove-AzureAutomationRunbook
name: Remove-AzureAutomationRunbook
module: Azure
isPreview: false
summary: |-
  Removes a runbook.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  [!INCLUDE [aa-deprecation](../include/aa-deprecation.yml)]

  The **Remove-AzureAutomationRunbook** cmdlet removes a runbook from Microsoft Azure Automation.
