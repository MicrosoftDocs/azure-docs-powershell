syntaxes:
- syntax: |-
    ```Syntax
    Revoke-AzureHDInsightHttpServicesAccess
        [-Certificate <X509Certificate2>]
        [-HostedService <String>]
        [-IgnoreSslErrors <Boolean>]
        [-Endpoint <Uri>]
        -Location <String>
        -Name <String>
        [-Subscription <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
