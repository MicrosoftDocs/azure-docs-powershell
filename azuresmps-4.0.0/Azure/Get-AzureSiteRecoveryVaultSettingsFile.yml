### YamlMime:PowerShellCmdlet1
uid: Azure.Get-AzureSiteRecoveryVaultSettingsFile
name: Get-AzureSiteRecoveryVaultSettingsFile
module: Azure
isPreview: false
summary: |-
  Gets the Site Recovery vault settings file.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-AzureSiteRecoveryVaultSettingsFile** cmdlet gets the settings file for an Azure Site Recovery vault.
parameters:
  cmdletParameters:
  - name: Location
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the geographical location to which the vault belongs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByParam
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a vault.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByParam
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of the Site Recovery vault settings file.
      To store this file locally, download it from the Site Recovery vault portal after the command has finished running.
    defaultValue: None
    dontShow: false
    isDynamic: false
