    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum frequency that can be specified on any job in this scheduler job collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Interval
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the interval of recurrence at the frequency specified by using the *Frequency* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: JobCollectionName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name for the new scheduler job collection.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Location
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the location that hosts the cloud service.
      Valid values are:

      - Anywhere Asia
      - Anywhere Europe
      - Anywhere US
      - East Asia
      - East US
      - North Central US
      - North Europe
      - South Central US
      - Southeast Asia
      - West Europe
      - West US
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaxJobCount
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
