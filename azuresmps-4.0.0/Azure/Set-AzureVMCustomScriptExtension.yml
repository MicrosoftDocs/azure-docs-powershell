syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureVMCustomScriptExtension
        [[-ReferenceName] <String>]
        [[-Version] <String>]
        [-ContainerName] <String>
        [-FileName] <String[]>
        [[-StorageAccountName] <String>]
        [[-StorageEndpointSuffix] <String>]
        [[-StorageAccountKey] <String>]
        [[-Run] <String>]
        [[-Argument] <String>]
        -VM <IPersistentVM>
        [-ForceUpdate]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SetCustomScriptExtensionByContainerAndFileNames
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzureVMCustomScriptExtension
        [[-ReferenceName] <String>]
        [[-Version] <String>]
        -VM <IPersistentVM>
        [-Disable]
        [-ForceUpdate]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: DisableCustomScriptExtension
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureVMCustomScriptExtension
        [[-ReferenceName] <String>]
        [[-Version] <String>]
        -VM <IPersistentVM>
        [-Uninstall]
        [-ForceUpdate]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: UninstalleCustomScriptExtension
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureVMCustomScriptExtension
        [[-ReferenceName] <String>]
        [[-Version] <String>]
        [[-FileUri] <String[]>]
        [-Run] <String>
        [[-Argument] <String>]
        -VM <IPersistentVM>
        [-ForceUpdate]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SetCustomScriptExtensionByUriLinks
  isDefault: false
examples:
- title: 'Example 1: Set information for a virtual machine custom script extension'
  description: |-
    ```
    PS C:\> $VM = Set-AzureVMCustomScriptExtension -VM $VM -ContainerName "Container01" -FileName "script1.ps1","script2.ps1" -Run "script1.ps1" -Argument "arg1 arg2";
    PS C:\> New-AzureVM -Location "West US" -ServiceName $SVC -VM $VM;
    ```

    This command sets information for a virtual machine custom script extension.
- title: 'Example 2: Set information for a virtual machine custom script extension using a file path'
  description: |-
    ```
    PS C:\> Set-AzureVMCustomScriptExtension -VM $VM -FileUri "http://www.blob.core.contoso.net/bar/script1.ps1","http://www.blob.core.contoso.net/baz/script2.ps1" -Run "script1.ps1" -Argument "arg1 arg2";
    PS C:\> Update-AzureVM -ServiceName $SVC -Name $Name -VM VM;
    ```

    This command sets information for a virtual machine custom script extension using multiple file URLs.
