### YamlMime:PowerShellCmdlet1
uid: Azure.Add-AzureDns
name: Add-AzureDns
module: Azure
isPreview: false
summary: |-
  Adds a DNS server to an Azure service.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Add-AzureDns** cmdlet adds a DNS server to an Azure service.
