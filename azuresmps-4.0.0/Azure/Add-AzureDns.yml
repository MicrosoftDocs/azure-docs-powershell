- name: <xref href="Microsoft.WindowsAzure.Commands.Utilities.Common.ManagementOperationContext" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add a DNS server'
  description: |-
    ```
    PS C:\> Add-AzureDns -ServiceName "ContosoService" -IPAddress 10.1.2.4 -Name "Dns07"
    ```

    This command adds the DNS server that has the address 10.1.2.4 to ContosoService.
