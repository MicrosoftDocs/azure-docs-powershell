syntaxes:
- syntax: |-
    ```Syntax
    Add-AzureDns
        [-Name] <String>
        [-IPAddress] <String>
        [-ServiceName] <String>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
