### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureVMChefExtension
name: Set-AzureVMChefExtension
module: Azure
isPreview: false
summary: |-
  Adds the Chef extension to the virtual machine.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
