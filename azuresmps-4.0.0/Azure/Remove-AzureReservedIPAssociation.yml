syntaxes:
- syntax: |-
    ```Syntax
    Remove-AzureReservedIPAssociation
        [-ReservedIPName] <String>
        [-ServiceName] <String>
        [[-VirtualIPName] <String>]
        [[-Slot] <String>]
        [-Force]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
