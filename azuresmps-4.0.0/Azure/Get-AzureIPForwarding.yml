### YamlMime:PowerShellCmdlet1
uid: Azure.Get-AzureIPForwarding
name: Get-AzureIPForwarding
module: Azure
isPreview: false
summary: |-
  Gets the status of IP forwarding.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-AzureIPForwarding** cmdlet gets the status of IP forwarding.
parameters:
  cmdletParameters:
  - name: NetworkInterfaceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the network adapter for which this cmdlet gets IP forwarding status.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RoleName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a PaaS role for which this cmdlet gets IP forwarding status.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SlotIPForwardingParamSet
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ServiceName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a cloud service.
      The PaaS role belongs to the service that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Slot
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a PaaS slot.
      The PaaS role for which this cmdlet gets forwarding status has the slot that this parameter specifies.
      Valid values are:

      - Production
      - Staging

      The default value is Production.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SlotIPForwardingParamSet
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VM
    type: <xref href="PersistentVMRoleContext" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the virtual machine object for which this cmdlet gets IP forwarding status.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: IaaSIPForwardingParamSet
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureIPForwarding
        -VM <PersistentVMRoleContext>
        -ServiceName <String>
        [-NetworkInterfaceName <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: IaaSIPForwardingParamSet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-AzureIPForwarding
        -ServiceName <String>
        -RoleName <String>
        [-Slot <String>]
        [-NetworkInterfaceName <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: SlotIPForwardingParamSet
  isDefault: false
outputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get IP forwarding status for a virtual machine'
  description: |-
    ```
    PS C:\> Get-AzureVM -ServiceName "ContosoService" -Name "ContosoVM06" | Get-AzureIPForwarding
    Disabled
    ```

    This command gets a virtual machine named ContosoVM06 for the service named ContosoService, and passes that virtual machine object to the current cmdlet.
    The current cmdlet gets the status of IP forwarding for that virtual machine.
