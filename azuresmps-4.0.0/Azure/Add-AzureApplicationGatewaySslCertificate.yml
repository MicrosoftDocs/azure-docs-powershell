### YamlMime:PowerShellCmdlet1
uid: Azure.Add-AzureApplicationGatewaySslCertificate
name: Add-AzureApplicationGatewaySslCertificate
module: Azure
isPreview: false
summary: |-
  Adds an SSL certificate to an Application Gateway.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Add-AzureApplicationGatewaySslCertificate** cmdlet adds a Secure Sockets Layer (SSL) certificate to an Azure Application Gateway.
parameters:
  cmdletParameters:
  - name: CertificateFile
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of an SSL certificate file.
      This cmdlet adds the certificate in the file that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CertificateName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an SSL certificate.
      This cmdlet adds the certificate that this parameter specifies.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Application Gateway to which this cmdlet adds an SSL certificate.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Password
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the password of the SSL certificate that this cmdlet adds.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Add-AzureApplicationGatewaySslCertificate
        -Name <String>
        -CertificateName <String>
        -Password <String>
        -CertificateFile <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.WindowsAzure.Management.ApplicationGateway.Models.ApplicationGatewayOperationResponse" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Add an SSL certificate'
  description: |-
    ```
    PS C:\> Add-AzureApplicationGatewaySslCertificate -Name "ApplicationGateway08" -CertificateName "SslCertificate13" -Password "password" -CertificateFile "c:\Certs\sslCertificate.pfx"
    ```

    This command adds an SSL certificate named SslCertificate13 to the Application Gateway named ApplicationGateway08.
    The command specifies the path of the certificate file and the password for the certificate.
