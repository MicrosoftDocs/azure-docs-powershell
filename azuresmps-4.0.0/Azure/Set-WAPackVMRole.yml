syntaxes:
- syntax: |-
    ```Syntax
    Set-WAPackVMRole
        -VMRole <VMRole>
        -InstanceCount <Int32>
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
