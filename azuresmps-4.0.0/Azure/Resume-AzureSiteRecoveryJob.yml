### YamlMime:PowerShellCmdlet1
uid: Azure.Resume-AzureSiteRecoveryJob
name: Resume-AzureSiteRecoveryJob
module: Azure
isPreview: false
summary: |-
  Resumes a suspended Site Recovery job.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Resume-AzureSiteRecoveryJob** cmdlet resumes a suspended Azure Site Recovery job.
parameters:
  cmdletParameters:
  - name: Comments
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the comments for the job log.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of a job to resume.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ById
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Job
    type: <xref href="ASRJob" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the job to resume.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByObject
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Resume-AzureSiteRecoveryJob
        -Job <ASRJob>
        [-Comments <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ByObject
  isDefault: true
- syntax: |-
    ```Syntax
    Resume-AzureSiteRecoveryJob
        -Id <String>
        [-Comments <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ById
  isDefault: false
examples:
- title: 'Example 1: Resume all jobs'
  description: |-
    ```
    PS C:\> $Jobs = Get-AzureSiteRecoveryJob
    PS C:\> Resume-AzureSiteRecoveryJob -Job $Jobs
    ID               : d16397fb-cdf1-4972-b677-c333f3c557b4
    ClientRequestId  : 32ace403-0916-4967-83a1-529176bd6e88-2014-49-06 15:49:24Z-P
    State            : Suspended
    StateDescription : WaitingForManualAction
    StartTime        : 10/6/2014 10:19:28 AM
    EndTime          : 10/6/2014 10:19:31 AM
    AllowedActions   : {Cancel, RestartTestFailoverCleanup}
    Name             : Test failover
    Tasks            : {Recovery plan preflight checks, Create test environment, All groups failover: Pre steps (1),
                       Recovery plan failover...}
    Errors           : {}
    ```

    The first command gets all the Azure Site Recovery jobs for the current Site Recovery vault by using the **Get-AzureSiteRecoveryJob** cmdlet, and then stores the results in the $Jobs variable.

    The second command resumes the job specified by $Jobs.
