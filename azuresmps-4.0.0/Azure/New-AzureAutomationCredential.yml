### YamlMime:PowerShellCmdlet1
uid: Azure.New-AzureAutomationCredential
name: New-AzureAutomationCredential
module: Azure
isPreview: false
summary: |-
  Creates a credential in Automation.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  [!INCLUDE [aa-deprecation](../include/aa-deprecation.yml)]

  The **New-AzureAutomationCredential** cmdlet creates a credential as a **PSCredential** object in Microsoft Azure Automation.
