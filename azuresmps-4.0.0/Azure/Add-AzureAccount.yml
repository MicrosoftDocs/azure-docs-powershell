syntaxes:
- syntax: |-
    ```Syntax
    Add-AzureAccount
        [-Environment <String>]
        [-Credential <PSCredential>]
        [-Tenant <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: User
  isDefault: true
- syntax: |-
    ```Syntax
    Add-AzureAccount
        -Credential <PSCredential>
        -Tenant <String>
        [-Environment <String>]
        [-ServicePrincipal]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: ServicePrincipal
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    You cannot pipe input to this cmdlet
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet does not return any output.
examples:
- title: 'Example 1: Add an account'
  description: |-
    ```
    PS C:\> Add-AzureAccount
    ```

    This command adds an Azure account to Windows PowerShell.
    When you run the command, a windows pops up to request the user name and password of the account.
- title: 'Example 2: Use an alternate subscription data file'
  description: |-
    ```
    PS C:\> Add-AzureAccount -SubscriptionDataFile C:\Testing\SDF.xml
    ```

    This command uses the **SubscriptionDataFile** parameter to direct **Add-AzureAccount** to store the account data in the C:\Testing\SDF.xml file, instead of the default file.
