### YamlMime:PowerShellCmdlet1
uid: Azure.Get-WAPackVNet
name: Get-WAPackVNet
module: Azure
isPreview: false
summary: |-
  Gets virtual networks.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Get-WAPackVNet** cmdlet gets virtual networks.
parameters:
  cmdletParameters:
  - name: ID
    type: <xref href="Guid" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the unique ID of a virtual network.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a virtual network.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: FromName
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-WAPackVNet
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Empty
  isDefault: true
- syntax: |-
    ```Syntax
    Get-WAPackVNet
        -ID <Guid>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: FromId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-WAPackVNet
        -Name <String>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: FromName
  isDefault: false
examples:
- title: 'Example 1: Get all virtual networks'
  description: |-
    ```
    PS C:\> Get-WAPackVNet
    ```

    This command gets all virtual networks.
- title: 'Example 2: Get a virtual network by using an ID'
  description: |-
    ```
    PS C:\> Get-WAPackVNet -ID 66242D17-189F-480D-87CF-8E1D749998C8
    ```

    This command gets the virtual network that has the specified ID.
- title: 'Example 3: Get a virtual network by using a name'
  description: |-
    ```
    PS C:\> Get-WAPackVNet -Name "ContosoVNet08"
    ```

    This command gets the virtual network named ContosoVNet08.
