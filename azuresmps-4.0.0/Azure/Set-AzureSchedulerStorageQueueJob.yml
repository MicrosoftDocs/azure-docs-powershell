### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureSchedulerStorageQueueJob
name: Set-AzureSchedulerStorageQueueJob
module: Azure
isPreview: false
summary: |-
  Updates a scheduler job that has a storage action.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  This topic describes the cmdlet in the 0.8.10 version of the Microsoft Azure PowerShell module.
  To get the version of the module you're using, in the Azure PowerShell console, type `(Get-Module -Name Azure).Version`.

  The **Set-AzureSchedulerStorageQueueJob** cmdlet updates a scheduler job that has an Azure Storage action.
