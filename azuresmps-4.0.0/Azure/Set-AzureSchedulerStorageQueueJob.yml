syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureSchedulerStorageQueueJob
        -Location <String>
        -JobCollectionName <String>
        -JobName <String>
        [-StorageQueueAccount <String>]
        [-StorageQueueName <String>]
        [-SASToken <String>]
        [-StorageQueueMessage <String>]
        [-StartTime <DateTime>]
        [-Interval <Int32>]
        [-Frequency <String>]
        [-EndTime <DateTime>]
        [-ExecutionCount <Int32>]
        [-JobState <String>]
        [-ErrorActionMethod <String>]
        [-ErrorActionURI <Uri>]
        [-ErrorActionRequestBody <String>]
        [-ErrorActionHeaders <Hashtable>]
        [-ErrorActionStorageAccount <String>]
        [-ErrorActionStorageQueue <String>]
        [-ErrorActionSASToken <String>]
        [-ErrorActionQueueMessageBody <String>]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Required
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureSchedulerStorageQueueJob
        [-Interval <Int32>]
        [-Frequency <String>]
        [-EndTime <DateTime>]
        [-ExecutionCount <Int32>]
        [-JobState <String>]
        [-ErrorActionHeaders <Hashtable>]
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Recurring
  isDefault: false
examples:
- title: 'Example 1: Update a Storage queue message'
  description: |-
    ```
    PS C:\> Set-AzureSchedulerStorageQueueJob -Location "North Central US" -JobCollectionName "JobCollection01 -JobName "Job12" -StorageQueueMessage "Updated message"
    ```

    This command updates the queue message for the Storage job named Job12.
    The command specifies the job collection name and the location.
- title: 'Example 2: Enable a Storage queue job'
  description: |-
    ```
    PS C:\> Set-AzureSchedulerStorageQueueJob -Location "North Central US" -JobCollectionName "JobCollection02" -JobName "Job16" -JobState "Enabled"
    ```

    This command enables the job named Job16.
    The command changes the state of the job to Enabled by specifying that value for the *JobState* parameter.
