### YamlMime:PowerShellCmdlet1
uid: Azure.Enable-AzureTrafficManagerProfile
name: Enable-AzureTrafficManagerProfile
module: Azure
isPreview: false
summary: |-
  Enables a Traffic Manager profile.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Enable-AzureTrafficManagerProfile** cmdlet enables a Microsoft Azure Traffic Manager profile.
  Specify the *PassThru* parameter to display whether the operation succeeds.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the Traffic Manager profile to enable.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns $True if the operation succeeded; otherwise, $False.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Enable-AzureTrafficManagerProfile
        -Name <String>
        [-PassThru]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="System.Boolean" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet generates $True or $False.
    If the operation succeeds and if you specify the *PassThru* parameter, this cmdlet returns a value of $True.
examples:
- title: 'Example 1: Enable a Traffic Manager profile'
  description: |-
    ```
    PS C:\>Enable-AzureTrafficManagerProfile -Name "MyProfile"
    ```

    This command enables the Traffic Manager profile named MyProfile.
- title: 'Example 2: Enable a Traffic Manager profile and display the results'
  description: |-
    ```
    PS C:\>Enable-AzureTrafficManagerProfile -Name "MyProfile" -PassThru
    True
    ```

    This command enables the Traffic Manager profile named MyProfile and displays whether the command succeeded.
