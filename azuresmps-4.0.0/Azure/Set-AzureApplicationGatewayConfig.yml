uid: Azure.Set-AzureApplicationGatewayConfig
name: Set-AzureApplicationGatewayConfig
module: Azure
isPreview: false
summary: |-
  Configures an application gateway.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Set-AzureApplicationGatewayConfig** cmdlet configures an application gateway.
parameters:
  cmdletParameters:
  - name: Config
    type: <xref href="ApplicationGatewayConfiguration" data-throw-if-not-resolved="False" />
    description: |-
      Specifies an application gateway configuration object.
      This cmdlet assigns the configuration that this parameter specifies to an application gateway.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: configObject
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ConfigFile
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path of a configuration file, in XML format, for an application gateway.
      This cmdlet assigns the configuration that this parameter specifies to an application gateway.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: configFile
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the application gateway that this cmdlet configures.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
