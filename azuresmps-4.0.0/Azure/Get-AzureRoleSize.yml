      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InstanceSize
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the role size name, for example: ExtraSmall, Small, Large, ExtraLarge, A5, A6, A7.
