syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureRoleSize
        [[-InstanceSize] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get role size information'
  description: |-
    ```
    PS C:\> Get-AzureRoleSize

              InstanceSize               : A6
              RoleSizeLabel              :
              Cores                      : 4
              MemoryInMb                 : 28672
              SupportedByWebWorkerRoles  : True
              SupportedByVirtualMachines : True
              OperationDescription       : Get-AzureRoleSize
              OperationId                : c5ed7b3a-03b3-548d-876b-6688c5b29cce
              OperationStatus            : Succeeded

              InstanceSize               : A7
              RoleSizeLabel              :
              Cores                      : 8
              MemoryInMb                 : 57344
              SupportedByWebWorkerRoles  : True
              SupportedByVirtualMachines : True
              OperationDescription       : Get-AzureRoleSize
              OperationId                : c5ed7b3a-03b3-548d-876b-6688c5b29cce
              OperationStatus            : Succeeded
    ```

    This command gets role size information for the current subscription.
- title: 'Example 2: Get role size information and specify the role size name'
  description: |-
    ```
    PS C:\> Get-AzureRoleSize -InstanceSize A7

              InstanceSize               : A7
              RoleSizeLabel              :
              Cores                      : 8
              MemoryInMb                 : 57344
              SupportedByWebWorkerRoles  : True
              SupportedByVirtualMachines : True
              OperationDescription       : Get-AzureRoleSize
              OperationId                : c5ed7b3a-03b3-548d-876b-6688c5b29cce
              OperationStatus            : Succeeded
    ```

    This command gets role size information for the specified role size.
- title: 'Example 3: Get role size information for all virtual machines in all of the Azure services'
  description: |-
    ```
    PS C:\> Get-AzureService | Get-AzureVM | Get-AzureRoleSize
    ```

    This command gets role size information for all virtual machines in all of the Azure services.
