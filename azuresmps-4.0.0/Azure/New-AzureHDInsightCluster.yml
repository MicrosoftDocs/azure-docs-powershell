        [-SshPublicKey <String>]
        [-RdpCredential <PSCredential>]
        [-RdpAccessExpiry <DateTime>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Cluster By Config (with Specific Subscription Credential)
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzureHDInsightCluster
        -ClusterSizeInNodes <Int32>
