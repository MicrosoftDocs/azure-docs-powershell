  - name: CertificateThumbprint
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a certificate thumbprint to use to encrypt the private configuration.
      This certificate has to already exist in the certificate store.
      If you do not specify a certificate, this cmdlet creates a certificate.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SetExtensionUsingThumbprint
      position: "3"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DiagnosticsConfiguration
    type: <xref href="ExtensionConfigurationInput" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of configuration for Azure Diagnostics.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SetExtensionUsingDiagnosticsConfiguration
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DiagnosticsConfigurationPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the configuration for Azure Diagnostics.
      You can download the schema by using the following command:

      `(Get-AzureServiceAvailableExtension -ExtensionName 'PaaSDiagnostics' -ProviderNamespace 'Microsoft.Azure.Diagnostics').PublicConfigurationSchema | Out-File -Encoding utf8 -FilePath 'WadConfig.xsd'`
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SetExtension
      position: "9"
