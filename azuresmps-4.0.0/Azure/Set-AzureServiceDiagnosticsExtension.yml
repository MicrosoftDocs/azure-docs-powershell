      Specifies the extension ID
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SetExtension
      position: "11"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    - name: SetExtensionUsingThumbprint
      position: "11"
      isRequired: false
