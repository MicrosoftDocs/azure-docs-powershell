syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureServiceDiagnosticsExtension
        [[-ServiceName] <String>]
        [[-Slot] <String>]
        [[-Role] <String[]>]
        [[-X509Certificate] <X509Certificate2>]
        [[-ThumbprintAlgorithm] <String>]
        [[-StorageAccountName] <String>]
        [[-StorageAccountKey] <String>]
        [[-StorageAccountEndpoint] <String>]
        [[-StorageContext] <AzureStorageContext>]
        [-DiagnosticsConfigurationPath] <String>
        [[-Version] <String>]
        [[-ExtensionId] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SetExtension
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzureServiceDiagnosticsExtension
        [[-ServiceName] <String>]
        [[-Slot] <String>]
        [[-Role] <String[]>]
        [[-CertificateThumbprint] <String>]
        [[-ThumbprintAlgorithm] <String>]
        [[-StorageAccountName] <String>]
        [[-StorageAccountKey] <String>]
        [[-StorageAccountEndpoint] <String>]
        [[-StorageContext] <AzureStorageContext>]
        [-DiagnosticsConfigurationPath] <String>
        [[-Version] <String>]
        [[-ExtensionId] <String>]
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SetExtensionUsingThumbprint
  isDefault: false
- syntax: |-
    ```Syntax
    Set-AzureServiceDiagnosticsExtension
        [[-ServiceName] <String>]
        [[-Slot] <String>]
        [-DiagnosticsConfiguration] <ExtensionConfigurationInput[]>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: SetExtensionUsingDiagnosticsConfiguration
  isDefault: false
examples:
- title: 'Example 1: Enable Azure Diagnostics extension'
  description: |-
    ```
    PS C:\> Set-AzureServiceDiagnosticsExtension -ServiceName $Svc -StorageContext $StorageContext -DiagnosticsConfigurationPath $WadConfigXML
    ```

    This command enables the Azure Diagnostics extension for all roles.
- title: 'Example 2: Enable Azure Diagnostics extension for a specified role'
  description: |-
    ```
    PS C:\> Set-AzureServiceDiagnosticsExtension -ServiceName $Svc -StorageContext $StorageContext -DiagnosticsConfigurationPath $WadConfigXML -Role "WebRole01"
    ```

    This command enables the Azure Diagnostics extension for a specified role.
