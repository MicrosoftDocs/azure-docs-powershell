syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureVMSqlServerExtension
        -VM <IPersistentVM>
        [-Profile <AzureSMProfile>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Get the settings of a SQL Server extension on a virtual machine'
  description: |-
    ```
    PS C:\> Get-AzureVMSqlServerExtension-VM $VM
              ExtensionName        : SqlIaaSAgent
              Publisher            : Microsoft.SqlServer.Management
              Version              : 1.0
              State                : Enable
              RoleName             : VMName
              AutoPatchingSettings : Microsoft.WindowsAzure.Commands.ServiceManagement.IaaS.Extensions.AutoPatchingSettings
              AutoBackupSettings   : Microsoft.WindowsAzure.Commands.ServiceManagement.IaaS.Extensions.AutoBackupSettings
    ```

    Gets the settings of the SQL Server extension on a particular virtual machine.
- title: 'Example 2: Get the settings of a SQL Server IaaS Agent on a virtual machine'
  description: |-
    ```
    PS C:\> Get-AzureVM -ServiceName "Service" -Name "VMName" | Get-AzureVMSqlServerExtension
              ExtensionName        : SqlIaaSAgent
              Publisher            : Microsoft.SqlServer.Management
              Version              : 1.0
              State                : Enable
              RoleName             : VMName
              AutoPatchingSettings : Microsoft.WindowsAzure.Commands.ServiceManagement.IaaS.Extensions.AutoPatchingSettings
              AutoBackupSettings   : Microsoft.WindowsAzure.Commands.ServiceManagement.IaaS.Extensions.AutoBackupSettings
    ```

    Gets the settings of the SQL Server IaaS Agent on a particular virtual machine using piped input.
- title: 'Example 3: Get the settings of specific SQL Server version IaaS Agent on a virtual machine'
  description: |-
    ```
    PS C:\> Get-AzureVMSqlServerExtension -VM $VM -Version "1.0"
              ExtensionName        : SqlIaaSAgent
              Publisher            : Microsoft.SqlServer.Management
              Version              : 1.0
              State                : Enable
              RoleName             : VMName
              AutoPatchingSettings : Microsoft.WindowsAzure.Commands.ServiceManagement.IaaS.Extensions.AutoPatchingSettings
              AutoBackupSettings   : Microsoft.WindowsAzure.Commands.ServiceManagement.IaaS.Extensions.AutoBackupSettings
    ```

    This command gets the settings of the particular version of SQL Server IaaS Agent on a virtual machine.
