### YamlMime:PowerShellCmdlet1
uid: Azure.Get-AzureWebsiteMetric
name: Get-AzureWebsiteMetric
module: Azure
isPreview: false
summary: |-
  Gets metrics for the Azure website in the current subscription.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  This topic describes the cmdlet in the 0.8.10 version of the Microsoft Azure PowerShell module.
  To get the version of the module you're using, in the Azure PowerShell console, type `(Get-Module -Name Azure).Version`.

  The **Get-AzureWebsiteMetric** cmdlet gets metrics for the Azure website in the current subscription.
parameters:
  cmdletParameters:
  - name: EndDate
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time, as a **DateTime** object, to stop getting metrics.
      To obtain a **DateTime** object, use the **Get-Date** cmdlet.
      For more information, type `Get-Help Get-Date`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InstanceDetails
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet includes details on a per-instance level.
      If the web hosting plan runs on two or more computers, this cmdlet returns metrics for each computer.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MetricNames
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of metrics to get.
      If you do not specify this parameter, the cmdlet gets all metrics.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a website in the subscription.
      This parameter does not support wildcard characters.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Slot
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the environment of a cloud service deployment.
      Valid values are: Production and Staging.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SlotView
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet gets metrics for the host names that receive traffic at the current slot.
      If a swap occurs during the time period, the metrics are merged.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: StartDate
    type: <xref href="DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time, as a **DateTime** object, to start getting metrics.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TimeGrain
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the time unit for metrics.
      Valid values are:

      - PT1M (Minute)
      - PT1H (Hour)
      - P1D (Day)

      The default value is PT1H.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-AzureWebsiteMetric
        [-MetricNames <String[]>]
        [-StartDate <DateTime>]
        [-EndDate <DateTime>]
        [-TimeGrain <String>]
        [-InstanceDetails]
        [-SlotView]
        [-Name <String>]
        [-Slot <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <span>undefined</span>
  description: |-
    You can pass input to this cmdlet by property name, but not by value.
outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.Utilities.Websites.Services.WebEntities.MetricResponse" data-throw-if-not-resolved="False" />
  description: |-
    By default, **Get-AzureWebsiteMetric** returns an array of **MetricResponse** objects.
examples:
- title: 'Example 1: Get metrics for the last three hours on a per-instance level for a website'
  description: |-
    ```
    PS C:\> Get-AzureWebsiteMetric -Name "ContosoWebSite" -StartDate (get-date).AddHours(-3) -MetricNames "Requests" -InstanceDetails -SlotView -TimeGrain "PT1M"
    PS C:\> $metrics[1].Data Name : Requests

    Unit : Count

    StartTime : 8/11/2014 7:05:00 AM

    EndTime : 8/11/2014 5:06:01 PM

    TimeGrain : PT1M
    PrimaryAggregationType : Instance
    Values : {Time:8/11/2014 7:05:00 AM, Total:4, Min:, Max:, Time:8/11/2014 7:06:00 AM, Total:3, Min:, Max:,
    Time:8/11/2014 7:07:00 AM, Total:3, Min:, Max:, Time:8/11/2014 7:08:00 AM, Total:12, Min:, Max:...}
    $metrics[1].Data.Values | ft
    TimeCreated Total Minimum Maximum Count InstanceName
    ----------- ----- ------- ------- ----- ------------
    8/11/2014 7:05:00 AM 4 1 RD00155DC24599
    8/11/2014 7:06:00 AM 3 1 RD00155DC24599
    8/11/2014 7:07:00 AM 3 1 RD00155DC24589
    8/11/2014 7:08:00 AM 12 1 RD00155DC24599
    8/11/2014 7:09:00 AM 37 1 RD00155DC24599
    8/11/2014 7:10:00 AM 9 1 RD00155DC24599
    ```

    This command gets metrics for the last three hours on a per-instance level for a website.
