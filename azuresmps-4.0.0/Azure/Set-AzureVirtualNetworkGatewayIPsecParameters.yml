### YamlMime:PowerShellCmdlet1
uid: Azure.Set-AzureVirtualNetworkGatewayIPsecParameters
name: Set-AzureVirtualNetworkGatewayIPsecParameters
module: Azure
isPreview: false
summary: |-
  Sets IPsec parameters for a virtual network gateway.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Set-AzureVirtualNetworkGatewayIPsecParameters** cmdlet sets IPsec parameters for a virtual network gateway.
parameters:
  cmdletParameters:
  - name: ConnectedEntityId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of a connected entity.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EncryptionType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the encryption type for the virtual network gateway.
      The acceptable values for this parameter are:

      - NoEncryption
      - RequireEncryption
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: GatewayId
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID of a gateway.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PfsGroup
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the perfect forward secrecy (PFS) group.
      The acceptable values for this parameter are:

      - PFS1
      - None
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SADataSizeKilobytes
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the size, in kilobytes, of the security association (SA).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SALifetimeSeconds
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the period, in seconds, of the security association.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureVirtualNetworkGatewayIPsecParameters
        -GatewayId <String>
        -ConnectedEntityId <String>
        [-EncryptionType <String>]
        [-PfsGroup <String>]
        [-SADataSizeKilobytes <Int32>]
        [-SALifetimeSeconds <Int32>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
