examples:
- title: 'Example 1: Import a file'
  description: |-
    ```
    PS C:\> Import-AzurePublishSettingsFile -PublishSettingsFile C:\Temp\MyAccount.publishsettings
    ```

    This command imports the "C:\Temp\MyAccount.publishsettings" file.
