    ```Syntax
    Import-AzurePublishSettingsFile
        -PublishSettingsFile <String>
        [-Environment <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
