### YamlMime:PowerShellCmdlet1
uid: Azure.New-AzureSiteRecoveryProtectionProfileObject
name: New-AzureSiteRecoveryProtectionProfileObject
module: Azure
isPreview: false
summary: |-
  Creates a Site Recovery protection profile object.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **New-AzureSiteRecoveryProtectionProfileObject** cmdlet creates an Azure Site Recovery protection profile object.
  This cmdlet creates an **ASRProtectionProfile** object to use with other cmdlets.
parameters:
  cmdletParameters:
  - name: AllowReplicaDeletion
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the protection profile enables deletion of replica entities.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnterpriseToEnterprise
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ApplicationConsistentSnapshotFrequencyInHours
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the frequency, in hours, for application consistent snapshots.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Authentication
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of authentication to use.
      The acceptable values for this parameter are: Certificate and Kerberos.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnterpriseToEnterprise
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CompressionEnabled
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the protection profile enables compression.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnterpriseToEnterprise
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a name for the protection profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Profile
    type: <xref href="AzureSMProfile" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the Azure profile from which this cmdlet reads.
      If you do not specify a profile, this cmdlet reads from the local default profile.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RecoveryAzureStorageAccount
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of an Azure Storage account on which to store the Azure replica entity.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnterpriseToAzure
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RecoveryAzureSubscription
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID for an Azure Subscription for a storage account.
      This parameter refers to the account on which to store the Azure replica entity.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnterpriseToAzure
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RecoveryPoints
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of hours to retain recovery points.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReplicationFrequencyInSeconds
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the frequency interval, in seconds, for replication.
      The acceptable values for this parameter are:

      - 30
      - 300
      - 900
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReplicationMethod
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the replication method.
      The acceptable values for this parameter are:

      - Online.
      Replication over the network.
      - Offline.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnterpriseToEnterprise
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReplicationPort
    type: <xref href="UInt16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the number of the port on which the replication occurs.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: EnterpriseToEnterprise
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReplicationProvider
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type of replication provider.
      The acceptable values for this parameter are: HyperVReplica and HyperVReplicaAzure.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ReplicationStartTime
    type: <xref href="TimeSpan" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the start time of the replication.
      Specify a time within 24 hours after you start the job.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-AzureSiteRecoveryProtectionProfileObject
        -ReplicationProvider <String>
        -RecoveryAzureSubscription <String>
        -RecoveryAzureStorageAccount <String>
        -ReplicationFrequencyInSeconds <String>
        [-Name <String>]
        [-RecoveryPoints <Int32>]
        [-ApplicationConsistentSnapshotFrequencyInHours <Int32>]
        [-ReplicationStartTime <TimeSpan>]
        [-Force]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: EnterpriseToAzure
  isDefault: true
- syntax: |-
    ```Syntax
    New-AzureSiteRecoveryProtectionProfileObject
        -ReplicationProvider <String>
        -ReplicationFrequencyInSeconds <String>
        -ReplicationPort <UInt16>
        [-Name <String>]
        [-ReplicationMethod <String>]
        [-RecoveryPoints <Int32>]
        [-ApplicationConsistentSnapshotFrequencyInHours <Int32>]
        [-CompressionEnabled]
        [-Authentication <String>]
        [-ReplicationStartTime <TimeSpan>]
        [-AllowReplicaDeletion]
        [-Force]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: EnterpriseToEnterprise
  isDefault: false
examples:
- title: 'Example 1: Create a protection profile'
  description: |-
    ```
    PS C:\> New-AzureSiteRecoveryProtectionProfileObject -ReplicationProvider "HyperVReplica" -AllowReplicaDeletion -ApplicationConsistentSnapshotFrequencyInHours 1 -CompressionEnabled -RecoveryPoints 2 -ReplicationFrequencyInSeconds 30 -ReplicationMethod "Online" -ReplicationPort 8085 -ReplicationStartTime 1
    Name                                     :
    ID                                       :
    ReplicationProvider                      : HyperVReplica
    HyperVReplicaProviderSettingsObject      : Microsoft.Azure.Portal.RecoveryServices.Models.Common.HyperVReplicaProviderSettings
    HyperVReplicaAzureProviderSettingsObject :
    ```

    This command creates a protection profile object.
- title: 'Example 2: Create a protection profile for HyperVReplicaAzure provider'
  description: |-
    ```
    PS C:\> New-AzureSiteRecoveryProtectionProfileObject -Name "ProtectionProfile" -ReplicationProvider "HyperVReplicaAzure" -RecoveryAzureSubscription "cb53d0c3-bd59-4721-89bc-06916a9147ef" -RecoveryAzureStorageAccount "Contoso01" -ReplicationFrequencyInSeconds 30 -RecoveryPoints 1 -Force
    Name                                     : ProtectionProfile
    ID                                       :
    ReplicationProvider                      : HyperVReplicaAzure
    HyperVReplicaProviderSettingsObject      :
    HyperVReplicaAzureProviderSettingsObject : Microsoft.Azure.Portal.RecoveryServices.Models.Common.HyperVReplicaAzureProviderSettings
    ```

    This command creates a protection profile for a HyperVReplicaAzure provider.
