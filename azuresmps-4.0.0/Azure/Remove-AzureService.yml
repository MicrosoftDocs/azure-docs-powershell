    Remove-AzureService
        [-ServiceName <String>]
        [-Force]
        [-PassThru]
        [-DeleteAll]
        [-Profile <AzureSMProfile>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
