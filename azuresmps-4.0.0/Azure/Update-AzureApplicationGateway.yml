### YamlMime:PowerShellCmdlet1
uid: Azure.Update-AzureApplicationGateway
name: Update-AzureApplicationGateway
module: Azure
isPreview: false
summary: |-
  Updates an application gateway.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Update-AzureApplicationGateway** cmdlet updates an existing application gateway.
parameters:
  cmdletParameters:
  - name: Description
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a description that this cmdlet assigns to the application gateway.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
