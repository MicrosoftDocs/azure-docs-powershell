  - name: GatewaySize
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the size that this cmdlet assigns to the application gateway.
      Valid values are:

      - Small
      - Medium
      - Large
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
