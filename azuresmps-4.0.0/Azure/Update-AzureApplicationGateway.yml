syntaxes:
- syntax: |-
    ```Syntax
    Update-AzureApplicationGateway
        -Name <String>
        [-VnetName <String>]
        [-Subnets <System.Collections.Generic.List`1[System.String]>]
        [-InstanceCount <UInt32>]
        [-GatewaySize <String>]
        [-Description <String>]
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
