- syntax: |-
    ```Syntax
    Start-AzureVNetGatewayDiagnostics
        -VNetName <String>
        -CaptureDurationInSeconds <Int32>
        [-ContainerName <String>]
        -StorageContext <AzureStorageContext>
        [-Profile <AzureSMProfile>]
        [<CommonParameters>]
    ```
