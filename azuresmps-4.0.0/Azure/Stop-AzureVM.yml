### YamlMime:PowerShellCmdlet1
uid: Azure.Stop-AzureVM
name: Stop-AzureVM
module: Azure
isPreview: false
summary: |-
  Shuts down an Azure virtual machine.

  [!INCLUDE [rdfe-banner](../../includes/rdfe-banner.md)]
description: |-
  The **Stop-AzureVM** cmdlet shuts down a virtual machine.
