      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: HostCaching
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the host cache attribute for the operating system disk.

      Valid values are:

      --ReadOnly
      --ReadWrite
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
