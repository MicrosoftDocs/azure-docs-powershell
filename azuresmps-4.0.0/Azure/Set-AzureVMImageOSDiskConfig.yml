syntaxes:
- syntax: |-
    ```Syntax
    Set-AzureVMImageOSDiskConfig
        [-DiskConfig] <VirtualMachineImageDiskConfigSet>
        [[-HostCaching] <String>]
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: UpdateAzureVMImageParamSet
  isDefault: true
- syntax: |-
    ```Syntax
    Set-AzureVMImageOSDiskConfig
        [-DiskConfig] <VirtualMachineImageDiskConfigSet>
        [[-HostCaching] <String>]
        [-MediaLink] <Uri>
        [-OSState] <String>
        [-OS] <String>
        [-InformationAction <ActionPreference>]
        [-InformationVariable <String>]
        [<CommonParameters>]
    ```
  parameterSetName: AddAzureVMImageParamSet
  isDefault: false
outputs:
- name: <xref href="Microsoft.WindowsAzure.Commands.ServiceManagement.Model.VirtualMachineImageDiskConfigSet" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Set the operating system disk properties on a virtual machine image'
  description: |-
    ```
    PS C:\> $Disk = New-AzureDiskConfigSet
    PS C:\> $Disk = Set-AzureOSDiskConfig -DiskConfig $Disk -HostCaching ReadWrite
    PS C:\> $Disk = Set-AzureDataDiskConfig -DiskConfig $Disk -Name "Test" -HostCaching "ReadWrite" -LUN 0
    PS C:\> Update-AzureVMImage -ImageName "Image2" -Label "Test1" -Description "Test1" -DiskConfigSet $Disk;
    ```

    This example sets the operating system disk properties on a virtual machine image.
